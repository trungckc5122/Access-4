                     <br><br>

                <strong>Girl:</strong> Yeah. <span class="highlightable" data-q="8">The instructor did everything possible to make me feel good about myself when I wasn't feeling too positive! Which is really important</span>.<br>
                <em>Now listen again.</em> [repeat]</p>

                <strong>Girl:</strong> Thanks, but actually I'll be in town already. So I'll see you there.<br>
                <em>Now listen again.</em> [repeat]</p>

                <p><strong>Question 10</strong><br>
                <strong>Boy:</strong> I'm really looking forward to learning to sail with an instructor on Saturday. Are you?<br>
                <strong>Girl:</strong> Yes and no. It's going to be really windy on Saturday afternoon – I saw the forecast but, of course, you need wind for sailing.<br>
                <strong>Boy:</strong> Or else we won't actually get anywhere.<br>
                <strong>Girl:</strong> I know – that's not what's bothering me. <span class="highlightable" data-q="10">It's more whether I'll be able to keep sailing in a straight line without hitting anything else on the lake! How do you avoid that?</span><br>
                <strong>Boy:</strong> I don't know but we'll find out.<br>
                <strong>Girl:</strong> I suppose we won't do anything too challenging as it's our first lesson.<br>
                <strong>Boy:</strong> No.<br>
                <em>Now listen again.</em> [repeat]</p>

                <strong>Boy:</strong> What did you think of the film?<br>
                <strong>Girl:</strong> I liked it – <span class="highlightable" data-q="11">I thought the main actor was fantastic – but he's one of my favourites, so I like whatever he's in!</span><br>
                <strong>Boy:</strong> He was OK. I wonder if this was the right sort of film for him though ... Anyway, <span class="highlightable" data-q="11">I really didn't expect that final scene, did you?</span><br>
                <strong>Girl:</strong> <span class="highlightable" data-q="11">I was sure I knew exactly what was going to happen – until the last 5 minutes!</span> I wonder where it was filmed? Using that power station really added something to the atmosphere.<br>
                <strong>Boy:</strong> I didn't get that – why a power station? But the beach scene was amazing.<br>
                <em>Now listen again.</em> [repeat]</p>

                <strong>Boy:</strong> Yeah – my dad got tickets! Our seats were quite far back, not right near the speakers like when you're in the ones at the front.<br>
                <strong>Girl:</strong> I hate it if it's too loud.<br>
                <strong>Boy:</strong> <span class="highlightable" data-q="12">I don't mind it</span>. <span class="highlightable" data-q="12">Everyone in the rows in front was jumping up and down though, so I couldn't always see, which spoilt it a little</span>. But the band played all their biggest hits. It was all over so quickly. It's a shame they couldn't go on for longer, but I hope I can go and see them again some time.<br>
