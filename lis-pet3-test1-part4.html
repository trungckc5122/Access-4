        <button class="btn btn-success" id="explainBtn" disabled>Xem giải thích</button>
        <button class="btn btn-danger" id="resetBtn">Reset tất cả</button>
        <div class="progress" id="progressDisplay">Đã làm: 0/6</div>

    <div onclick="applyHighlight('green')">Highlight xanh lá</div>
    <div onclick="applyHighlight('pink')">Highlight hồng</div>
    <div onclick="removeHighlight()">Xóa highlight</div>

<!-- Core Listening Engine -->
<script src="core-listening.js"></script>

<script>
    // Test Data for PET 3 Test 1 Part 4
    const pet3Test1Part4Data = {
        title: "B1 Preliminary 3 · Test 1 · Part 4",
        type: "multiple-choice",
        part: 4,
    book: 3,
    test: 1,

        answerKey: { q20: 'B', q21: 'C', q22: 'B', q23: 'A', q24: 'B', q25: 'C' },
        displayAnswers: { q20: 'B', q21: 'C', q22: 'B', q23: 'A', q24: 'B', q25: 'C' },

        detailedExplanations: {
            q20: `<strong>Đáp án: B – hearing stories about one (nghe những câu chuyện về một con gấu)</strong><br>
                  Sofia nói: <em>"<span class='keyword-highlight'>Because of a bear called Bernie! He belonged to my dad – he was given Bernie as a kid. Dad has a great imagination, and he'd entertain me with Bernie's adventures. That's how I got into it all</span>."</em> Bố cô kể những câu chuyện phiêu lưu của Bernie cho cô nghe.<br><br>

            <p><em>Now look at Part Four. For each question, choose the correct answer. Look at questions 20 to 25 now. You have 45 seconds. You will hear an interview with a girl called Sofia, who collects toy bears.</em></p>

            <p><strong>Man:</strong> Why do you like collecting bears so much?</p>

            <p><strong>Man:</strong> How do you find bears to buy?</p>
            <p><strong>Sofia:</strong> I go to markets. I go alone – friends can put you off if they don't like something. Then you might not buy the bear you've seen and another collector buys it instead! <span class="highlightable" data-q="22">When I get a new bear, I really look forward to adding it to the collection</span> and seeing how it fits in.</p>
            <p><strong>Man:</strong> Any advice for people who want to collect bears?</p>
            <p><strong>Sofia:</strong> Not really, but I know some collectors often just buy one kind and become experts on them – like antique ones or famous brands. I guess <span class="highlightable" data-q="23">the main thing is to find out information about what you're getting</span> – its history, interesting facts. It could be one of a particular kind, or completely individual.</p>
            <p><strong>Man:</strong> What mistakes can you make when collecting bears?</p>

            <p><strong>Man:</strong> You recently appeared on a TV programme with your bears!</p>
            <p><strong>Sofia:</strong> Yes. <span class="highlightable" data-q="25">I wasn't that comfortable with the idea of the programme's audience thinking I was silly.</span> That'd be embarrassing. I wanted to explain why as a teenager I was still collecting toys! Actually, the presenters were really interested in what I do and asked me loads of things. It was cool being on a show I'd seen so many celebrities on.</p>
