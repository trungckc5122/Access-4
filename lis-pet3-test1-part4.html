            <p><strong>Man:</strong> What mistakes can you make when collecting bears?</p>
            <p><strong>Sofia:</strong> If you're buying a bear that's supposed to be made by a designer, make sure it isn't a copy. That'd be a waste of money, but it's pretty rare. <span class="highlightable" data-q="24">And take care of your bears – they'll lose their bright colours in direct sunlight or if you wash them</span> – as so many collectors have found out. And avoid giving a favourite bear away even if a friend tries to persuade you! Most collectors are unlikely to do that.</p>
            <p><strong>Man:</strong> You recently appeared on a TV programme with your bears!</p>
            <p><strong>Sofia:</strong> Yes. <span class="highlightable" data-q="25">I wasn't that comfortable with the idea of the programme's audience thinking I was silly. That'd be embarrassing.</span> I wanted to explain why as a teenager I was still collecting toys! Actually, the presenters were really interested in what I do and asked me loads of things. It was cool being on a show I'd seen so many celebrities on.</p>
