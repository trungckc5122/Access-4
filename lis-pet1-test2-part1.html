<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PET 1 - Test 2 - Part 1</title>
    <link rel="stylesheet" href="listening-pet-common.css" id="styleLink">
</head>
<body>
<div class="test-wrapper" id="testWrapper">
    <!-- Header -->
    <div class="ielts-header">
        <div class="brand">
            <div class="ielts-logo">PET</div>
            <div class="candidate">B1 Preliminary 1 · Test 2 · Part 1</div>
            <div class="audio-controls">
                <audio id="listeningAudio" controls>
                    <source src="audio/B1 Preliminary 1 - Test 2 Part 1.mp3" type="audio/mpeg">
                    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg">
                </audio>
                <select class="speed-select" id="speedSelect">
                    <option value="0.7">0.7x</option>
                    <option value="0.9">0.9x</option>
                    <option value="1.0" selected>1x</option>
                    <option value="1.1">1.1x</option>
                    <option value="1.25">1.25x</option>
                </select>
                <span class="volume-icon">🔊</span>
            </div>
        </div>
        <div class="font-controls">
            <button class="font-btn" id="fontSmall">A-</button>
            <button class="font-btn" id="fontMedium">A</button>
            <button class="font-btn active" id="fontLarge">A+</button>
        </div>
        <div class="mode-toggle" id="modeToggleContainer">
            <span class="mode-label">Hiện đại</span>
            <label class="mode-switch" title="Chuyển đổi chế độ Cổ điển/Hiện đại">
                <input type="checkbox" id="modeToggle">
                <span class="mode-slider"></span>
            </label>
            <span class="mode-label">Cổ điển</span>
        </div>
        <button class="theme-toggle-btn" id="themeToggle" title="Chuyển đổi Dark/Light mode">
            <span class="icon-moon">🌙</span>
            <span class="icon-sun">☀️</span>
        </button>
    </div>

    <!-- Question navigator (1-7) -->
    <div class="question-nav">
        <span style="font-weight:600; color:#1e3a5f;">Câu 1-7:</span>
        <div class="nav-buttons" id="navButtons"></div>
    </div>

    <!-- Main area -->
    <div class="main-area" id="mainArea">
        <!-- Transcript panel (ẩn ban đầu) -->
        <div class="transcript-panel" id="transcriptPanel">
            <div class="panel-header">
                <span>TRANSCRIPT</span>
            </div>
            <div class="transcript-content font-large" id="transcriptContent"></div>
        </div>
        <div class="resizer" id="resizer"></div>

        <!-- Questions panel -->
        <div class="questions-panel" id="questionsPanel">
            <div class="panel-header">
                <span>QUESTIONS 1-7</span>
                <span class="answer-badge" id="answeredCount">0/7 answered</span>
            </div>
            <div class="questions-list font-large centered" id="questionsContent">
                <div>
                    <h3>PART 1 Questions 1-7</h3>
                    <p><em>Choose the correct answer (A, B or C).</em></p>
                    <div class="notes-box" id="questionsContainer"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bottom bar -->
    <div class="bottom-bar">
        <button class="btn btn-primary" id="submitBtn">Nộp bài</button>
        <button class="btn btn-success" id="explainBtn" disabled>Xem giải thích</button>
        <button class="btn btn-danger" id="resetBtn">Reset tất cả</button>
        <div class="progress" id="progressDisplay">Đã làm: 0/7</div>
    </div>

    <!-- Explanation panel -->
    <div class="explanation-panel" id="explanationPanel">
        <div class="resize-handle" id="explanationResizer"></div>
        <div class="explanation-header">
            <span id="explanationTitle">Giải thích</span>
            <span class="close-btn" id="closeExplanation">✕ Đóng</span>
        </div>
        <div class="explanation-content" id="explanationText"></div>
    </div>
</div>

<!-- Context menu for manual highlighting -->
<div class="context-menu" id="contextMenu">
    <div onclick="applyHighlight('yellow')">Highlight vàng</div>
    <div onclick="applyHighlight('green')">Highlight xanh lá</div>
    <div onclick="applyHighlight('pink')">Highlight hồng</div>
    <div onclick="removeHighlight()">Xóa highlight</div>
</div>

<!-- Core Listening Engine -->
<script src="core-listening.js"></script>

<script>
    // Test Data for PET 1 Test 2 Part 1
    const pet1Test2Part1Data = {
        title: "B1 Preliminary 1 · Test 2 · Part 1",
        type: "multiple-choice",
        part: 1,
        book: 1,
        test: 2,

        // Answer Key
        answerKey: {
            q1: 'A',
            q2: 'C',
            q3: 'B',
            q4: 'A',
            q5: 'B',
            q6: 'A',
            q7: 'C'
        },

        // Display Answers
        displayAnswers: {
            q1: 'A',
            q2: 'C',
            q3: 'B',
            q4: 'A',
            q5: 'B',
            q6: 'A',
            q7: 'C'
        },

        // Detailed Explanations
        detailedExplanations: {
            q1: `<strong>Đáp án: A (torch)</strong><br>
                  Trong đoạn hội thoại, người đàn ông nói: <em>"I've just realised I've left my torch behind."</em> Anh ấy vừa nhận ra mình đã để quên đèn pin. 
                  <br><br>
                  <strong>✗ B (sleeping bag) không đúng:</strong> Người đàn ông nói: "I didn't want to forget my sleeping bag like the last time", nhưng lần này anh ấy nhớ mang theo túi ngủ.
                  <br>
                  <strong>✗ C (walking boots) không đúng:</strong> Anh ấy nói: "At least I've got my walking boots" - anh ấy có mang giày đi bộ đường dài.
                  <br>
                  <strong>✓ A (torch) là vật mà anh ấy quên.</strong>`,

            q2: `<strong>Đáp án: C (12.15)</strong><br>
                  Thông báo của sân bay: <em>"the flight is delayed and is unlikely to take off until 12.15"</em> - chuyến bay bị hoãn và dự kiến không cất cánh trước 12.15.
                  <br><br>
                  <strong>✗ A (10.45) không đúng:</strong> Đây là giờ khởi hành dự kiến ban đầu, nhưng bị hoãn.
                  <br>
                  <strong>✗ B (11.30) không đúng:</strong> Đây là thời gian đóng quầy check-in, không phải giờ cất cánh.
                  <br>
                  <strong>✓ C (12.15) là giờ khởi hành mới.</strong>`,

            q3: `<strong>Đáp án: B (castle)</strong><br>
                  Người phụ nữ nói: <em>"We ended up getting some discount tickets to visit a castle."</em> Cuối cùng họ đã mua vé giảm giá để tham quan lâu đài.
                  <br><br>
                  <strong>✗ A (theatre) không đúng:</strong> Họ định xem kịch nhưng đã đổi ý.
                  <br>
                  <strong>✗ C (art gallery) không đúng:</strong> Họ đã đi phòng tranh vào lần trước ("last time we had a family day out"), không phải cuối tuần này.
                  <br>
                  <strong>✓ B (castle) là nơi họ đã đi.</strong>`,

            q4: `<strong>Đáp án: A (a jug of tap water)</strong><br>
                  Người phụ nữ đề xuất: <em>"What about asking for a jug of tap water - it tastes just as good."</em> Cả hai đồng ý vì nước đóng chai đắt.
                  <br><br>
                  <strong>✗ B (a large bottle of sparkling water) không đúng:</strong> Họ cân nhắc nhưng thấy giá đắt.
                  <br>
                  <strong>✗ C (a glass of still water and a glass of sparkling) không đúng:</strong> Họ cũng nghĩ đến phương án này nhưng cuối cùng chọn bình nước máy.
                  <br>
                  <strong>✓ A (a jug of tap water) là thứ họ gọi.</strong>`,

            q5: `<strong>Đáp án: B (rain)</strong><br>
                  Người đàn ông nói: <em>"I'm interested in water, especially scenes showing rain. Have a look at this one of mine."</em> Anh ấy thích chụp ảnh mưa và đó là bức ảnh của anh.
                  <br><br>
                  <strong>✗ A (desert) không đúng:</strong> Bức ảnh sa mạc là do bạn anh chụp.
                  <br>
                  <strong>✗ C (lake and trees) không đúng:</strong> Người phụ nữ hỏi "And is this one yours?" nhưng người đàn ông nói đó là tác phẩm của người khác.
                  <br>
                  <strong>✓ B (rain) là bức ảnh anh chụp.</strong>`,

            q6: `<strong>Đáp án: A (by underground)</strong><br>
                  Người đàn ông gợi ý: <em>"You could always take the underground to Greenoaks station"</em> - họ có thể đi tàu điện ngầm.
                  <br><br>
                  <strong>✗ B (by taxi) không đúng:</strong> Anh ấy nói "I'm sure you and Jack'll be able to take a taxi home afterwards" - chỉ gợi ý taxi lúc về, không phải đi đến buổi hòa nhạc.
                  <br>
                  <strong>✗ C (by car) không đúng:</strong> Ban đầu anh định cho đi nhờ nhưng không thể, nên đề xuất tàu điện ngầm.
                  <br>
                  <strong>✓ A (by underground) là cách anh khuyên.</strong>`,

            q7: `<strong>Đáp án: C (snow showers)</strong><br>
                  Dự báo thời tiết: <em>"There'll be heavy snow showers, mainly in northern areas"</em> - mưa tuyết lớn ở phía bắc vào sáng nay.
                  <br><br>
                  <strong>✗ A (strong winds) không đúng:</strong> Gió mạnh sẽ xuất hiện vào chiều tối ("towards the evening"), không phải sáng nay.
                  <br>
                  <strong>✗ B (fog) không đúng:</strong> Sương mù dày đặc ở khu vực phía nam ("In southern areas"), không phải phía bắc.
                  <br>
                  <strong>✓ C (snow showers) là dự báo cho phía bắc vào sáng nay.</strong>`
        },

        // Transcript with highlightable spans
        transcript: `
            <p><strong>Question 1</strong><br>
            <strong>Woman:</strong> Hi Freddy! All ready for the camping trip? Your backpack looks very full.<br>
            <strong>Man:</strong> Well, I didn't want to forget my sleeping bag like the last time I went camping. I was lucky then and it wasn't too cold. I hope I've remembered everything this time.<br>
            <strong>Woman:</strong> Well, so long as you've got your sleeping bag, plus a torch and walking boots, you'll be fine.<br>
            <strong>Man:</strong> Oh dear. <span class="highlightable" data-q="1">I've just realised I've left my torch behind.</span> At least I've got my walking boots. Never mind I'll probably manage.<br>
            <strong>Woman:</strong> You'll be fine.</p>

            <p><strong>Question 2</strong><br>
            <strong>Man:</strong> This is an announcement for all passengers waiting to travel on the 10.45 flight to Glasgow. Due to poor weather, this flight is delayed and <span class="highlightable" data-q="2">is unlikely to take off until 12.15.</span> All passengers travelling on this flight can collect a special ticket at the information desk, which they can exchange for a drink and a snack at the cafe. Please note the check-in desk will close at 11.30. We apologise for the delay to your flight and will give you further updates as soon as we can.</p>

            <p><strong>Question 3</strong><br>
            <strong>Man:</strong> How was your weekend? Were there any tickets left for the play you wanted to see?<br>
            <strong>Woman:</strong> Yes, but we decided to do something else in the end. I found a few more options online. <span class="highlightable" data-q="3">We ended up getting some discount tickets to visit a castle.</span> We all enjoyed it far more than the art gallery we went to last time we had a family day out. We're actually thinking of going there again. It's just as much fun as going to see a show at the theatre.</p>

            <p><strong>Question 4</strong><br>
            <strong>Man:</strong> What shall we have to drink? I'm quite thirsty, so I think I'll just have water.<br>
            <strong>Woman:</strong> Me, too. Let's get a large bottle to share.<br>
            <strong>Man:</strong> Yes, we could do that. Do you prefer sparkling? I always have still.<br>
            <strong>Woman:</strong> Oh, I like sparkling water. How about getting a glass of still and a glass of sparkling? (short pause) Actually, have you seen the prices? <span class="highlightable" data-q="4">What about asking for a jug of tap water - it tastes just as good.</span><br>
            <strong>Man:</strong> Especially if they put ice and lemon in it. Good idea.</p>

            <p><strong>Question 5</strong><br>
            <strong>Woman:</strong> Your website's great. Did you take all these photos?<br>
            <strong>Man:</strong> Not all of them. I included some others that were taken by friends, like this one of the desert. You can tell which are mine because the style's different. <span class="highlightable" data-q="5">I'm interested in water, especially scenes showing rain. Have a look at this one of mine.</span><br>
            <strong>Woman:</strong> Nice! And is this one yours? I love how the water in the lake's like a mirror for the trees.<br>
            <strong>Man:</strong> It's beautiful, isn't it? It's actually someone else's work though.</p>

            <p><strong>Question 6</strong><br>
            <strong>Man:</strong> Hi, it's Neil. Listen, I know I was supposed to give you and Jack a lift to the concert tonight in my car but I'm not going to be able to make it. It's a shame my ticket'll be wasted. Anyway, it's not that far to the concert hall from where you both live. <span class="highlightable" data-q="6">You could always take the underground to Greenoaks station</span> and it's only a short walk from there. I'm sure you and Jack'll be able to take a taxi home afterwards? Anyway, I hope you both have fun. Bye!</p>

            <p><strong>Question 7</strong><br>
            <strong>Woman:</strong> Now for an update on the weather. Well, it's looking very different from yesterday in both the north and the south. In southern areas, there'll be some thick fog to begin with, making conditions difficult for people driving to work. That should disappear by around eleven, though. <span class="highlightable" data-q="7">There'll be heavy snow showers, mainly in northern areas, but hopefully these will be over by lunchtime.</span> It'll be calm everywhere for most of the day, but with some strong winds coming in towards the evening.</p>

            <p><em>Now listen again.</em></p>
            <p style="color:#666;">That is the end of Part One.</p>
        `,

        // Questions Data
        questions: [
            { num: 1, text: "What has the man forgotten to pack for the trip?", options: ["torch", "sleeping bag", "walking boots"] },
            { num: 2, text: "What time is the plane expected to depart?", options: ["10.45", "11.30", "12.15"] },
            { num: 3, text: "Where did the family go at the weekend?", options: ["theatre", "castle", "art gallery"] },
            { num: 4, text: "What are the man and woman going to order?", options: ["a jug of tap water", "a large bottle of sparkling water", "a glass of still water and a glass of sparkling"] },
            { num: 5, text: "Which photograph did the man take?", options: ["desert", "rain", "lake and trees"] },
            { num: 6, text: "How does the man suggest his friends should travel to the concert?", options: ["by underground", "by taxi", "by car"] },
            { num: 7, text: "What is the weather forecast for the north this morning?", options: ["strong winds", "fog", "snow showers"] }
        ]
    };

    // Initialize the listening test when DOM is loaded
    document.addEventListener('DOMContentLoaded', function() {
        window.listeningCore = new ListeningCore();
        window.listeningCore.initializeTest(pet1Test2Part1Data);
        console.log('PET 1 Test 2 Part 1 loaded with core listening engine');
    });
</script>
</body>
</html>
