<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PET 1 - Test 2 - Part 1</title>
    <style>
        /* Giữ nguyên style từ mẫu */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        body {
            background: #1a1a2a;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }
        .test-wrapper {
            width: 100%;
            max-width: 1600px;
            background: #f5f3ee;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        .ielts-header {
            background: #1e3a5f;
            color: white;
            padding: 8px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #e6b422;
            flex-wrap: wrap;
        }
        .brand {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        .ielts-logo {
            background: #e6b422;
            color: #1e3a5f;
            font-weight: 800;
            font-size: 24px;
            padding: 4px 18px;
            border-radius: 40px;
        }
        .candidate {
            background: #2d4b77;
            padding: 4px 16px;
            border-radius: 30px;
            font-size: 14px;
        }
        .audio-controls {
            display: flex;
            align-items: center;
            gap: 15px;
            background: #0f2a44;
            padding: 6px 18px;
            border-radius: 40px;
            border: 1px solid #e6b422;
        }
        .audio-controls audio {
            height: 40px;
            width: 400px;
            border-radius: 20px;
        }
        .speed-select {
            background: #1e3a5f;
            color: white;
            border: 1px solid #e6b422;
            border-radius: 20px;
            padding: 4px 8px;
            font-size: 14px;
            cursor: pointer;
            outline: none;
        }
        .speed-select option {
            background: #1e3a5f;
        }
        .volume-icon {
            font-size: 20px;
            cursor: pointer;
            color: #e6b422;
        }
        .font-controls {
            display: flex;
            gap: 5px;
            background: #2d4b77;
            padding: 3px;
            border-radius: 30px;
        }
        .font-btn {
            width: 32px; height: 32px;
            border-radius: 50%;
            border: none;
            background: transparent;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        .font-btn:hover { background: #3e5f8a; }
        .font-btn.active { background: #e6b422; color: #1e3a5f; }
        .question-nav {
            background: #d2cbbc;
            padding: 6px 20px;
            border-bottom: 2px solid #b0aa9a;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .nav-buttons { display: flex; gap: 4px; flex-wrap: wrap; }
        .nav-btn {
            width: 32px; height: 32px;
            border-radius: 6px;
            border: 2px solid #1e3a5f;
            background: white;
            color: #1e3a5f;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .nav-btn:hover { background: #e6b422; }
        .nav-btn.answered { background: #4CAF50; color: white; border-color: #2e7d32; }
        .nav-btn.unanswered { background: #e0e0e0; color: #757575; border-color: #9e9e9e; }
        .nav-btn.active { border: 3px solid #e6b422; transform: scale(1.05); }
        .main-area {
            display: flex;
            flex: 1;
            overflow: hidden;
            position: relative;
        }
        .transcript-panel {
            width: 0;
            background: #fffcf5;
            border-right: 2px solid #b0aa9a;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: width 0.2s ease;
        }
        .questions-panel {
            width: 100%;
            background: #f8f6f0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: width 0.2s ease;
        }
        .main-area.show-transcript .transcript-panel {
            width: 45%;
        }
        .main-area.show-transcript .questions-panel {
            width: 55%;
        }
        .resizer {
            width: 8px;
            background: #b0aa9a;
            cursor: col-resize;
            display: none;
        }
        .main-area.show-transcript .resizer {
            display: block;
        }
        .resizer:hover { background: #e6b422; }
        .panel-header {
            background: #d2cbbc;
            padding: 8px 15px;
            font-weight: 600;
            color: #1e3a5f;
            border-bottom: 1px solid #b0aa9a;
            display: flex;
            justify-content: space-between;
        }
        .transcript-content, .questions-list {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            line-height: 1.7;
        }
        .font-small { font-size: 13px; }
        .font-medium { font-size: 15px; }
        .font-large { font-size: 17px; }
        .questions-list.centered {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100%;
        }
        .questions-list.centered > div {
            width: 100%;
            max-width: 750px;
            margin: 0 auto;
        }
        .notes-box {
            background: #f0ebe0;
            border-left: 4px solid #e6b422;
            padding: 15px 20px;
            border-radius: 8px;
            margin: 10px 0;
        }
        .question-item {
            margin-bottom: 25px;
            padding: 10px;
            border-radius: 8px;
            background: #f9f7f2;
            border: 1px solid #e0d6c8;
            position: relative;
        }
        .question-item.correct {
            background: #e8f5e8;
            border-color: #4CAF50;
        }
        .question-item.incorrect {
            background: #ffebee;
            border-color: #f44336;
        }
        .question-text {
            font-weight: 600;
            margin-bottom: 8px;
            color: #1e3a5f;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-left: 15px;
        }
        .option {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .option input[type="radio"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
        }
        .option label {
            cursor: pointer;
            font-size: 15px;
        }
        .eye-icon {
            margin-left: 10px;
            cursor: pointer;
            font-size: 18px;
            opacity: 0.7;
            display: none;
        }
        .eye-icon:hover { opacity: 1; color: #e6b422; }
        .correct-answer-badge {
            display: inline-block;
            background: #4CAF50;
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 12px;
            margin-left: 15px;
            text-transform: uppercase;
            font-weight: bold;
        }
        .bottom-bar {
            background: #d2cbbc;
            padding: 10px 20px;
            display: flex;
            gap: 15px;
            border-top: 1px solid #b0aa9a;
            align-items: center;
        }
        .btn {
            padding: 6px 20px;
            border: none;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
        }
        .btn-primary { background: #1e3a5f; color: white; }
        .btn-primary:hover { background: #2d4b77; }
        .btn-primary:disabled { background: #9aaec2; cursor: not-allowed; }
        .btn-success { background: #4CAF50; color: white; }
        .btn-success:disabled { background: #a5d6a7; }
        .btn-danger { background: #f44336; color: white; }
        .progress { background: white; border-radius: 20px; padding: 4px 12px; font-weight: 600; color: #1e3a5f; }
        .explanation-panel {
            background: #fffef9; border-left: 4px solid #e6b422; padding: 12px 20px; margin: 0 20px 12px 20px; border-radius: 8px; display: none;
        }
        .explanation-panel.show { display: block; }
        .explanation-header { font-weight: 700; color: #1e3a5f; display: flex; justify-content: space-between; }
        .close-btn { cursor: pointer; }
        .transcript-highlight {
            background-color: #f9e79f !important;
            border-radius: 3px;
            padding: 0 2px;
        }
        .keyword-highlight {
            text-decoration: underline;
            text-decoration-color: #e67e22;
            text-decoration-thickness: 3px;
            background-color: #fff3cd;
            font-weight: 600;
        }
        .scroll-highlight {
            animation: highlightFlash 1s ease;
        }
        @keyframes highlightFlash {
            0% { background-color: #f9e79f; }
            50% { background-color: #f1c40f; }
            100% { background-color: #f9e79f; }
        }

        /* ===== THÊM CÁC CLASS HIGHLIGHT THỦ CÔNG ===== */
        .highlight-yellow {
            background-color: #f9e79f;
            border-radius: 3px;
            padding: 0 2px;
            display: inline;
        }
        .highlight-green {
            background-color: #a9d6b0;
            border-radius: 3px;
            padding: 0 2px;
            display: inline;
        }
        .highlight-pink {
            background-color: #fbb9c0;
            border-radius: 3px;
            padding: 0 2px;
            display: inline;
        }

        /* Context menu */
        .context-menu {
            position: fixed;
            background: white;
            border: 1px solid #9a8c7a;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.2);
            padding: 5px 0;
            border-radius: 8px;
            z-index: 1000;
            display: none;
            min-width: 150px;
        }
        .context-menu div {
            padding: 8px 20px;
            cursor: pointer;
            transition: 0.2s;
        }
        .context-menu div:hover {
            background: #1e3a5f;
            color: white;
        }
    </style>
</head>
<body>
<div class="test-wrapper" id="testWrapper">
    <!-- Header -->
    <div class="ielts-header">
        <div class="brand">
            <div class="ielts-logo">PET</div>
            <div class="candidate">B1 Preliminary 1 · Test 2 · Part 1</div>
            <div class="audio-controls">
                <audio id="listeningAudio" controls>
                    <source src="B1 Preliminary 1 - Test 2 Part 1.mp3" type="audio/mpeg">
                    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg"> <!-- fallback -->
                </audio>
                <select class="speed-select" id="speedSelect">
                    <option value="0.7">0.7x</option>
                    <option value="0.9">0.9x</option>
                    <option value="1.0" selected>1x</option>
                    <option value="1.1">1.1x</option>
                    <option value="1.25">1.25x</option>
                </select>
                <span class="volume-icon">🔊</span>
            </div>
        </div>
        <div class="font-controls">
            <button class="font-btn" id="fontSmall">A-</button>
            <button class="font-btn" id="fontMedium">A</button>
            <button class="font-btn active" id="fontLarge">A+</button>
        </div>
    </div>

    <!-- Question navigator (1-7) -->
    <div class="question-nav">
        <span style="font-weight:600; color:#1e3a5f;">Câu 1-7:</span>
        <div class="nav-buttons" id="navButtons"></div>
    </div>

    <!-- Main area -->
    <div class="main-area" id="mainArea">
        <!-- Transcript panel (ẩn ban đầu) -->
        <div class="transcript-panel" id="transcriptPanel">
            <div class="panel-header">
                <span>TRANSCRIPT</span>
            </div>
            <div class="transcript-content font-large" id="transcriptContent"></div>
        </div>
        <div class="resizer" id="resizer"></div>

        <!-- Questions panel -->
        <div class="questions-panel" id="questionsPanel">
            <div class="panel-header">
                <span>QUESTIONS 1-7</span>
                <span class="answer-badge" id="answeredCount">0/7 answered</span>
            </div>
            <div class="questions-list font-large centered" id="questionsContent">
                <div>
                    <h3>PART 1 Questions 1-7</h3>
                    <p><em>Choose the correct answer (A, B or C).</em></p>

                    <div class="notes-box" id="questionsContainer">
                        <!-- Các câu hỏi sẽ được tạo bằng JavaScript -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bottom bar -->
    <div class="bottom-bar">
        <button class="btn btn-primary" id="submitBtn">Nộp bài</button>
        <button class="btn btn-success" id="explainBtn" disabled>Xem giải thích</button>
        <button class="btn btn-danger" id="resetBtn">Reset tất cả</button>
        <div class="progress" id="progressDisplay">Đã làm: 0/7</div>
    </div>

    <!-- Explanation panel -->
    <div class="explanation-panel" id="explanationPanel">
        <div class="explanation-header">
            <span id="explanationTitle">Giải thích</span>
            <span class="close-btn" id="closeExplanation">✕ Đóng</span>
        </div>
        <div class="explanation-content" id="explanationText"></div>
    </div>
</div>

<!-- ===== CONTEXT MENU CHO HIGHLIGHT THỦ CÔNG ===== -->
<div class="context-menu" id="contextMenu">
    <div onclick="applyHighlight('yellow')">Highlight vàng</div>
    <div onclick="applyHighlight('green')">Highlight xanh lá</div>
    <div onclick="applyHighlight('pink')">Highlight hồng</div>
    <div onclick="removeHighlight()">Xóa highlight</div>
</div>

<script>
    (function() {
        // ---------- ANSWER KEY (chữ cái) ----------
        // Dựa trên transcript và giải thích từ ảnh
        const answerKey = {
            q1: 'A',
            q2: 'C',
            q3: 'B',
            q4: 'A',
            q5: 'B',
            q6: 'A',
            q7: 'C'
        };

        // ---------- Đáp án hiển thị (dạng chữ cái) ----------
        const displayAnswers = {
            q1: 'A',
            q2: 'C',
            q3: 'B',
            q4: 'A',
            q5: 'B',
            q6: 'A',
            q7: 'C'
        };

        // ---------- GIẢI THÍCH CHI TIẾT (dựa theo ảnh) ----------
        const detailedExplanations = {
            q1: `<strong>Đáp án: A</strong><br>
                  Người đàn ông nói: "I've just realised I've left my torch behind." Anh ấy đã quên đèn pin. Anh ấy có sleeping bag và walking boots.`,
            q2: `<strong>Đáp án: C</strong><br>
                  Thông báo: "the flight is delayed and is unlikely to take off until 12.15". Thời gian khởi hành dự kiến là 12.15.`,
            q3: `<strong>Đáp án: B</strong><br>
                  Người phụ nữ: "We ended up getting some discount tickets to visit a castle." Họ đã đi lâu đài.`,
            q4: `<strong>Đáp án: A</strong><br>
                  Họ quyết định gọi "a jug of tap water" vì nước đóng chai đắt và họ thích loại khác nhau.`,
            q5: `<strong>Đáp án: B</strong><br>
                  Người đàn ông: "I'm interested in water, especially scenes showing rain. Have a look at this one of mine." Bức ảnh của anh ấy là về mưa.`,
            q6: `<strong>Đáp án: A</strong><br>
                  Anh ấy gợi ý: "You could always take the underground to Greenoaks station." Đi tàu điện ngầm.`,
            q7: `<strong>Đáp án: C</strong><br>
                  Dự báo: "There'll be heavy snow showers, mainly in northern areas" vào sáng nay.`
        };

        // ---------- TRANSCRIPT với các span highlight ----------
        const transcriptHTML = `
            <p><strong>Question 1</strong><br>
            <strong>Woman:</strong> Hi Freddy! All ready for the camping trip? Your backpack looks very full.<br>
            <strong>Man:</strong> Well, I didn’t want to forget my sleeping bag like the last time I went camping. I was lucky then and it wasn’t too cold. I hope I’ve remembered everything this time.<br>
            <strong>Woman:</strong> Well, so long as you’ve got your sleeping bag, plus a torch and walking boots, you’ll be fine.<br>
            <strong>Man:</strong> Oh dear. <span class="highlightable" data-q="1">I’ve just realised I’ve left my torch behind.</span> At least I’ve got my walking boots. Never mind I’ll probably manage.<br>
            <strong>Woman:</strong> You’ll be fine.</p>

            <p><strong>Question 2</strong><br>
            <strong>Man:</strong> This is an announcement for all passengers waiting to travel on the 10.45 flight to Glasgow. Due to poor weather, this flight is delayed and <span class="highlightable" data-q="2">is unlikely to take off until 12.15.</span> All passengers travelling on this flight can collect a special ticket at the information desk, which they can exchange for a drink and a snack at the cafe. Please note the check-in desk will close at 11.30. We apologise for the delay to your flight and will give you further updates as soon as we can.</p>

            <p><strong>Question 3</strong><br>
            <strong>Man:</strong> How was your weekend? Were there any tickets left for the play you wanted to see?<br>
            <strong>Woman:</strong> Yes, but we decided to do something else in the end. I found a few more options online. <span class="highlightable" data-q="3">We ended up getting some discount tickets to visit a castle.</span> We all enjoyed it far more than the art gallery we went to last time we had a family day out. We’re actually thinking of going there again. It’s just as much fun as going to see a show at the theatre.</p>

            <p><strong>Question 4</strong><br>
            <strong>Man:</strong> What shall we have to drink? I'm quite thirsty, so I think I'll just have water.<br>
            <strong>Woman:</strong> Me, too. Let's get a large bottle to share.<br>
            <strong>Man:</strong> Yes, we could do that. Do you prefer sparkling? I always have still.<br>
            <strong>Woman:</strong> Oh, I like sparkling water. How about getting a glass of still and a glass of sparkling? (short pause) Actually, have you seen the prices? <span class="highlightable" data-q="4">What about asking for a jug of tap water – it tastes just as good.</span><br>
            <strong>Man:</strong> Especially if they put ice and lemon in it. Good idea.</p>

            <p><strong>Question 5</strong><br>
            <strong>Woman:</strong> Your website's great. Did you take all these photos?<br>
            <strong>Man:</strong> Not all of them. I included some others that were taken by friends, like this one of the desert. You can tell which are mine because the style's different. <span class="highlightable" data-q="5">I'm interested in water, especially scenes showing rain. Have a look at this one of mine.</span><br>
            <strong>Woman:</strong> Nice! And is this one yours? I love how the water in the lake's like a mirror for the trees.<br>
            <strong>Man:</strong> It's beautiful, isn't it? It's actually someone else's work though.</p>

            <p><strong>Question 6</strong><br>
            <strong>Man:</strong> Hi, it's Neil. Listen, I know I was supposed to give you and Jack a lift to the concert tonight in my car but I'm not going to be able to make it. It's a shame my ticket'll be wasted. Anyway, it's not that far to the concert hall from where you both live. <span class="highlightable" data-q="6">You could always take the underground to Greenoaks station</span> and it's only a short walk from there. I'm sure you and Jack'll be able to take a taxi home afterwards? Anyway, I hope you both have fun. Bye!</p>

            <p><strong>Question 7</strong><br>
            <strong>Woman:</strong> Now for an update on the weather. Well, it's looking very different from yesterday in both the north and the south. In southern areas, there'll be some thick fog to begin with, making conditions difficult for people driving to work. That should disappear by around eleven, though. <span class="highlightable" data-q="7">There'll be heavy snow showers, mainly in northern areas, but hopefully these will be over by lunchtime.</span> It'll be calm everywhere for most of the day, but with some strong winds coming in towards the evening.</p>

            <p><em>Now listen again.</em></p>
            <p style="color:#666;">That is the end of Part One.</p>
        `;

        // ---------- Dữ liệu câu hỏi (các lựa chọn A, B, C là mô tả bằng từ vựng thay cho hình ảnh) ----------
        const questionsData = [
            { num: 1, text: "What has the man forgotten to pack for the trip?", options: ["torch", "sleeping bag", "walking boots"] },
            { num: 2, text: "What time is the plane expected to depart?", options: ["10.45", "11.30", "12.15"] },
            { num: 3, text: "Where did the family go at the weekend?", options: ["theatre", "castle", "art gallery"] },
            { num: 4, text: "What are the man and woman going to order?", options: ["a jug of tap water", "a large bottle of sparkling water", "a glass of still water and a glass of sparkling"] },
            { num: 5, text: "Which photograph did the man take?", options: ["desert", "rain", "lake and trees"] },
            { num: 6, text: "How does the man suggest his friends should travel to the concert?", options: ["by underground", "by taxi", "by car"] },
            { num: 7, text: "What is the weather forecast for the north this morning?", options: ["strong winds", "fog", "snow showers"] }
        ];

        // ---------- STATE ----------
        let examSubmitted = false;
        let explanationMode = false;
        const audio = document.getElementById('listeningAudio');
        const speedSelect = document.getElementById('speedSelect');

        speedSelect.addEventListener('change', function() {
            audio.playbackRate = parseFloat(this.value);
        });

        function getUserAnswer(q) {
            const radios = document.getElementsByName(`q${q}`);
            for (let radio of radios) {
                if (radio.checked) return radio.value;
            }
            return null;
        }

        function isAnswerCorrect(q, userAnswer) {
            return userAnswer === answerKey[`q${q}`];
        }

        function updateAnswerCount() {
            let answered = 0;
            for (let i = 1; i <= 7; i++) if (getUserAnswer(i)) answered++;
            document.getElementById('answeredCount').textContent = `${answered}/7 answered`;
            document.getElementById('progressDisplay').textContent = `Đã làm: ${answered}/7`;
            for (let i = 1; i <= 7; i++) {
                const btn = document.querySelector(`.nav-btn[data-question="${i}"]`);
                if (btn) {
                    btn.classList.remove('answered', 'unanswered');
                    btn.classList.add(getUserAnswer(i) ? 'answered' : 'unanswered');
                }
            }
        }

        function createNavButtons() {
            const nav = document.getElementById('navButtons');
            nav.innerHTML = '';
            for (let i = 1; i <= 7; i++) {
                const btn = document.createElement('button');
                btn.className = 'nav-btn unanswered';
                btn.textContent = i;
                btn.dataset.question = i;
                btn.addEventListener('click', function() {
                    const q = this.dataset.question;
                    document.getElementById(`question-${q}`)?.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                });
                nav.appendChild(btn);
            }
        }

        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            questionsData.forEach(q => {
                const div = document.createElement('div');
                div.className = 'question-item';
                div.id = `question-${q.num}`;
                div.innerHTML = `
                    <div class="question-text">${q.num}. ${q.text}</div>
                    <div class="options">
                        ${q.options.map((opt, index) => `
                            <div class="option">
                                <input type="radio" name="q${q.num}" value="${String.fromCharCode(65 + index)}" id="q${q.num}${String.fromCharCode(65 + index)}">
                                <label for="q${q.num}${String.fromCharCode(65 + index)}">${String.fromCharCode(65 + index)}. ${opt}</label>
                            </div>
                        `).join('')}
                    </div>
                    <span class="eye-icon" data-question="${q.num}">👁️</span>
                `;
                container.appendChild(div);
            });
        }

        function markAnswers() {
            for (let i = 1; i <= 7; i++) {
                const questionDiv = document.getElementById(`question-${i}`);
                if (!questionDiv) continue;
                const user = getUserAnswer(i);
                const correct = isAnswerCorrect(i, user);
                questionDiv.classList.remove('correct', 'incorrect');
                const oldBadge = questionDiv.querySelector('.correct-answer-badge');
                if (oldBadge) oldBadge.remove();
                if (correct) {
                    questionDiv.classList.add('correct');
                } else {
                    questionDiv.classList.add('incorrect');
                    const badge = document.createElement('span');
                    badge.className = 'correct-answer-badge';
                    badge.textContent = `Đáp án đúng: ${displayAnswers[`q${i}`]}`;
                    questionDiv.appendChild(badge);
                }
            }
        }

        function showExplanation(questionNum) {
            if (!explanationMode && !examSubmitted) return;

            document.querySelectorAll('.transcript-highlight').forEach(el => el.classList.remove('transcript-highlight'));
            document.querySelectorAll('.keyword-highlight').forEach(el => el.classList.remove('keyword-highlight'));

            const highlightSpans = document.querySelectorAll(`.highlightable[data-q="${questionNum}"]`);
            highlightSpans.forEach(span => {
                const parentP = span.closest('p');
                if (parentP) parentP.classList.add('transcript-highlight');
                span.classList.add('keyword-highlight');
                span.scrollIntoView({ behavior: 'smooth', block: 'center' });
                span.classList.add('scroll-highlight');
                setTimeout(() => span.classList.remove('scroll-highlight'), 1000);
            });

            document.getElementById('explanationPanel').classList.add('show');
            document.getElementById('explanationTitle').textContent = `Giải thích câu ${questionNum}`;
            let html = detailedExplanations[`q${questionNum}`] || `<strong>Đáp án: ${displayAnswers[`q${questionNum}`]}</strong><br>`;
            if (examSubmitted) {
                const user = getUserAnswer(questionNum) || '(chưa chọn)';
                const isCorrect = isAnswerCorrect(questionNum, user);
                html += `<div style="margin-top:10px;padding:10px; background:${isCorrect ? '#e8f5e8' : '#ffebee'}; border-radius:5px;">`;
                html += `<strong>Câu trả lời của bạn:</strong> ${user}<br>`;
                if (!isCorrect) html += `<strong>Đáp án đúng:</strong> ${displayAnswers[`q${questionNum}`]}`;
                else html += `<strong>✅ Đúng!</strong>`;
                html += `</div>`;
            }
            document.getElementById('explanationText').innerHTML = html;
        }

        function resetAll() {
            examSubmitted = false;
            explanationMode = false;
            for (let i = 1; i <= 7; i++) {
                const radios = document.getElementsByName(`q${i}`);
                radios.forEach(r => r.checked = false);
                const questionDiv = document.getElementById(`question-${i}`);
                if (questionDiv) {
                    questionDiv.classList.remove('correct', 'incorrect');
                    const badge = questionDiv.querySelector('.correct-answer-badge');
                    if (badge) badge.remove();
                }
            }
            const mainArea = document.getElementById('mainArea');
            mainArea.classList.remove('show-transcript');
            document.getElementById('transcriptContent').innerHTML = '';
            document.querySelectorAll('.eye-icon').forEach(icon => icon.style.display = 'none');
            document.querySelectorAll('.transcript-highlight').forEach(el => el.classList.remove('transcript-highlight'));
            document.querySelectorAll('.keyword-highlight').forEach(el => el.classList.remove('keyword-highlight'));
            document.getElementById('submitBtn').disabled = false;
            document.getElementById('submitBtn').textContent = 'Nộp bài';
            document.getElementById('explainBtn').disabled = true;
            document.getElementById('explainBtn').textContent = 'Xem giải thích';
            document.getElementById('explanationPanel').classList.remove('show');
            updateAnswerCount();
        }

        // ---------- EVENT LISTENERS ----------
        document.querySelectorAll('input[type="radio"]').forEach(radio => {
            radio.addEventListener('change', updateAnswerCount);
        });

        document.getElementById('submitBtn').addEventListener('click', function() {
            if (examSubmitted) return;
            let unanswered = [];
            for (let i = 1; i <= 7; i++) if (!getUserAnswer(i)) unanswered.push(i);
            if (unanswered.length > 0 && !confirm(`Bạn còn ${unanswered.length} câu chưa chọn. Nộp bài?`)) return;

            examSubmitted = true;
            const mainArea = document.getElementById('mainArea');
            mainArea.classList.add('show-transcript');
            document.getElementById('transcriptContent').innerHTML = transcriptHTML;
            markAnswers();
            document.getElementById('submitBtn').disabled = true;
            document.getElementById('submitBtn').textContent = 'Đã nộp bài';
            document.getElementById('explainBtn').disabled = false;
            document.querySelectorAll('.eye-icon').forEach(icon => icon.style.display = 'inline-block');

            let correctCount = 0;
            for (let i = 1; i <= 7; i++) {
                if (isAnswerCorrect(i, getUserAnswer(i))) correctCount++;
            }
            document.getElementById('explanationPanel').classList.add('show');
            document.getElementById('explanationTitle').textContent = 'KẾT QUẢ';
            document.getElementById('explanationText').innerHTML = `
                <h4>Bạn đã nộp bài</h4>
                <p><strong>Đúng:</strong> ${correctCount}/7</p>
                <p>Nhấn vào biểu tượng 👁️ để xem vị trí đáp án trong transcript.</p>
            `;
        });

        document.getElementById('explainBtn').addEventListener('click', function() {
            if (!examSubmitted) return;
            explanationMode = true;
            document.querySelectorAll('.eye-icon').forEach(icon => icon.style.display = 'inline-block');
            this.disabled = true;
            this.textContent = 'Đang xem giải thích';
            document.getElementById('explanationPanel').classList.remove('show');
        });

        document.getElementById('resetBtn').addEventListener('click', function() {
            if (confirm('Reset tất cả câu trả lời?')) resetAll();
        });

        document.getElementById('closeExplanation').addEventListener('click', function() {
            document.getElementById('explanationPanel').classList.remove('show');
            document.querySelectorAll('.transcript-highlight').forEach(el => el.classList.remove('transcript-highlight'));
            document.querySelectorAll('.keyword-highlight').forEach(el => el.classList.remove('keyword-highlight'));
        });

        document.addEventListener('click', function(e) {
            if (e.target.classList.contains('eye-icon')) {
                const q = e.target.dataset.question;
                showExplanation(q);
            }
        });

        // Font size
        function setFontSize(size) {
            document.querySelectorAll('.font-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`font${size.charAt(0).toUpperCase()+size.slice(1)}`).classList.add('active');
            document.querySelectorAll('.transcript-content, .questions-list').forEach(el => {
                el.className = `transcript-content font-${size}`;
                if (el.classList.contains('questions-list')) {
                    el.classList.add('centered');
                }
            });
        }
        document.getElementById('fontSmall').addEventListener('click', () => setFontSize('small'));
        document.getElementById('fontMedium').addEventListener('click', () => setFontSize('medium'));
        document.getElementById('fontLarge').addEventListener('click', () => setFontSize('large'));

        // Resizer
        const transcriptPanel = document.getElementById('transcriptPanel');
        const questionsPanel = document.getElementById('questionsPanel');
        const resizer = document.getElementById('resizer');
        let isResizing = false;
        resizer.addEventListener('mousedown', () => { isResizing = true; document.body.style.cursor = 'col-resize'; });
        document.addEventListener('mousemove', (e) => {
            if (!isResizing) return;
            const mainArea = document.getElementById('mainArea');
            const rect = mainArea.getBoundingClientRect();
            let leftWidth = e.clientX - rect.left - 4;
            if (leftWidth < 250) leftWidth = 250;
            if (leftWidth > rect.width - 250) leftWidth = rect.width - 250;
            transcriptPanel.style.width = leftWidth + 'px';
            questionsPanel.style.width = (rect.width - leftWidth - 8) + 'px';
        });
        document.addEventListener('mouseup', () => { isResizing = false; document.body.style.cursor = 'default'; });

        // Khởi tạo
        createNavButtons();
        renderQuestions();
        updateAnswerCount();
        document.querySelectorAll('.eye-icon').forEach(icon => icon.style.display = 'none');
        setFontSize('large');
    })();

    // ========== THÊM CHỨC NĂNG HIGHLIGHT THỦ CÔNG ==========
    (function() {
        let selectedRange = null;
        const contextMenu = document.getElementById('contextMenu');
        const transcriptContent = document.getElementById('transcriptContent');
        const questionsContent = document.getElementById('questionsContent');

        function handleRightClick(e) {
            e.preventDefault();
            const selection = window.getSelection();
            if (selection.toString().trim()) {
                selectedRange = selection.getRangeAt(0);
                contextMenu.style.left = e.pageX + 'px';
                contextMenu.style.top = e.pageY + 'px';
                contextMenu.style.display = 'block';
            }
        }

        if (transcriptContent) {
            transcriptContent.addEventListener('contextmenu', handleRightClick);
        }
        if (questionsContent) {
            questionsContent.addEventListener('contextmenu', handleRightClick);
        }

        document.addEventListener('click', () => {
            contextMenu.style.display = 'none';
            selectedRange = null;
        });

        window.applyHighlight = function(color) {
            if (!selectedRange) return;
            try {
                const span = document.createElement('span');
                span.className = `highlight-${color}`;
                span.appendChild(selectedRange.extractContents());
                selectedRange.insertNode(span);
            } catch (e) {
                console.warn('Không thể highlight đoạn này');
            }
            contextMenu.style.display = 'none';
            selectedRange = null;
        };

        window.removeHighlight = function() {
            if (!selectedRange) return;
            try {
                const iterator = document.createNodeIterator(
                    selectedRange.commonAncestorContainer,
                    NodeFilter.SHOW_ELEMENT,
                    {
                        acceptNode: function(node) {
                            if (node.classList && (node.classList.contains('highlight-yellow') || node.classList.contains('highlight-green') || node.classList.contains('highlight-pink'))) {
                                if (selectedRange.intersectsNode(node)) {
                                    return NodeFilter.FILTER_ACCEPT;
                                }
                            }
                            return NodeFilter.FILTER_REJECT;
                        }
                    }
                );
                let node;
                while (node = iterator.nextNode()) {
                    node.replaceWith(...node.childNodes);
                }
            } catch (e) {
                console.warn('Không thể xoá highlight');
            }
            contextMenu.style.display = 'none';
            selectedRange = null;
        };
    })();
</script>
