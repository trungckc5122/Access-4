<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PET 3 - Test 1 - Part 1</title>
    <link rel="stylesheet" href="listening-pet-common.css" id="styleLink">
</head>
<body>
    <div class="test-wrapper" id="testWrapper">
        <!-- Header -->
        <div class="ielts-header">
            <div class="brand">
                <div class="ielts-logo">PET</div>
                <div class="candidate"></div>
                <div class="audio-controls">
                    <audio id="listeningAudio" controls>
                        <source src="audio/B1 Preliminary 3 - Test 1 Part 1.mp3" type="audio/mpeg">
                        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg">
                    </audio>
                    <select class="speed-select" id="speedSelect">
                        <option value="0.7">0.7x</option>
                        <option value="0.9">0.9x</option>
                        <option value="1.0" selected>1x</option>
                        <option value="1.1">1.1x</option>
                        <option value="1.25">1.25x</option>
                    </select>
                    <span class="volume-icon">🔊</span>
                </div>
            </div>

</div>

        <!-- Question navigator (1-7) -->
        <div class="question-nav">
            
            <div class="nav-buttons" id="navButtons"></div>
        </div>

        <!-- Main area -->
        <div class="main-area" id="mainArea">
            <!-- Transcript panel (ẩn ban đầu) -->
            <div class="transcript-panel" id="transcriptPanel">
                <div class="panel-header">
                    <span>TRANSCRIPT</span>
                </div>
                <div class="transcript-content font-large" id="transcriptContent"></div>
            </div>
            <div class="resizer" id="resizer"></div>

            <!-- Questions panel -->
            <div class="questions-panel" id="questionsPanel">
                <div class="panel-header">
                    <span>QUESTIONS 1-7</span>
                    <span class="answer-badge" id="answeredCount">0/7 answered</span>
                </div>
                <div class="questions-list font-large centered" id="questionsContent">
                <div>
                    <h3>PART 1 Questions 1-7</h3>
                    <p><em>Choose the correct answer (A, B or C).</em></p>
                    <div class="notes-box" id="questionsContainer"></div>
                </div>
            </div>
            </div>
        </div>

        <!-- Bottom bar -->
        <div class="bottom-bar">
            <button class="btn btn-primary" id="submitBtn">Nộp bài</button>
            <button class="btn btn-success" id="explainBtn" disabled>Xem giải thích</button>
            <button class="btn btn-danger" id="resetBtn">Reset</button>
            <div class="progress" id="progressDisplay">Đã làm: 0/7</div>
        </div>

        <!-- Explanation panel -->
        <div class="explanation-panel" id="explanationPanel">
            <div class="resize-handle" id="explanationResizer"></div>
            <div class="explanation-header">
                <span id="explanationTitle">Giải thích</span>
                <span class="close-btn" id="closeExplanation">✕ Đóng</span>
            </div>
            <div class="explanation-content" id="explanationText"></div>
        </div>
    </div>

    <!-- Context menu for manual highlighting -->
    <div class="context-menu" id="contextMenu">
        <div onclick="applyHighlight('yellow')">Highlight vàng</div>
        <div onclick="applyHighlight('green')">Highlight xanh lá</div>
        <div onclick="applyHighlight('pink')">Highlight hồng</div>
        <div onclick="removeHighlight()">Xóa highlight</div>
    </div>

    <!-- Core Listening Engine -->
    <script src="core-listening.js"></script>
    
    <script>
        // Test Data for PET 3 Test 1 Part 1
        const pet3Test1Part1Data = {
            title: "B1 Preliminary 3 · Test 1 · Part 1",
            type: "multiple-choice",
            part: 1,
            book: 3,
            test: 1,
            
            // Answer Key
            answerKey: {
                q1: 'C',
                q2: 'C',
                q3: 'A',
                q4: 'C',
                q5: 'A',
                q6: 'B',
                q7: 'B'
            },

            // Display Answers
            displayAnswers: {
                q1: 'C',
                q2: 'C',
                q3: 'A',
                q4: 'C',
                q5: 'A',
                q6: 'B',
                q7: 'B'
            },

            // Detailed Explanations
            detailedExplanations: {
                q1: `<strong>Đáp án: C – visit her grandfather</strong><br>
                      Cô gái nói: <em>"<span class='keyword-highlight'>My mum's arranged for us to visit my grandpa that evening</span>."</em> Mẹ cô đã sắp xếp để họ thăm ông tối thứ Bảy.
                      <br><br>
                      <strong>✗ A (watch a film at the club) không đúng:</strong> Câu lạc bộ phim chiếu phim khoa học viễn tưởng vào thứ Bảy nhưng cô không thể đi.
                      <br>
                      <strong>✗ B (go to a party) không đúng:</strong> Bữa tiệc của Luke là điều cậu bé mong chờ nhưng cô gái không thể đi.
                      <br>
                      <strong>✓ C (visit her grandfather) là đáp án đúng.</strong>`,

                q2: `<strong>Đáp án: C – some boots</strong><br>
                      Người mẹ hỏi: <em>"<span class='keyword-highlight'>And your boots?</span>"</em> Cậu bé nói: <em>"<span class='keyword-highlight'>Just look at them! I doubt they'll still fit!</span>"</em> và mẹ đề nghị: <em>"<span class='keyword-highlight'>Let's replace them</span>."</em> Họ cần mua ủng mới.
                      <br><br>
                      <strong>✗ A (a torch) không đúng:</strong> Bố cho mượn đèn pin của ông, không cần mua.
                      <br>
                      <strong>✗ B (a tent) không đúng:</strong> Cậu bé sẽ chia sẻ lều với Steve, không cần mua.
                      <br>
                      <strong>✓ C (some boots) là đáp án đúng.</strong>`,

                q3: `<strong>Đáp án: A – a man with a moustache and short hair</strong><br>
                      Cô gái nói: <em>"<span class='keyword-highlight'>I'm sure he didn't have a moustache the last time I saw him</span>."</em> và <em>"<span class='keyword-highlight'>He used to have quite long hair as well, down to his shoulders</span>."</em> Anh họ đã thay đổi: có ria mép và tóc ngắn hơn.
                      <br><br>
                      <strong>✗ B (a girl with long hair) không đúng:</strong> Không phải cô gái.
                      <br>
                      <strong>✗ C (a man with no moustache and short hair) không đúng:</strong> Bây giờ anh có ria mép.
                      <br>
                      <strong>✓ A là đáp án đúng.</strong>`,

                q4: `<strong>Đáp án: C – next to the wardrobe in his room</strong><br>
                      Cậu bé nói: <em>"<span class='keyword-highlight'>I put it next to the wardrobe in my room</span>"</em> vì bố nói túi vướng víu dưới bàn phòng khách.
                      <br><br>
                      <strong>✗ A (by the front door) không đúng:</strong> Cậu nói tuần sau sẽ để ở cửa trước để không quên.
                      <br>
                      <strong>✗ B (under the living room table) không đúng:</strong> Bố nói túi vướng víu dưới bàn phòng khách nên cậu đã chuyển đi.
                      <br>
                      <strong>✓ C là đáp án đúng.</strong>`,

                q5: `<strong>Đáp án: A – take some photographs</strong><br>
                      Cậu bé nói: <em>"<span class='keyword-highlight'>I'll be waiting at the finish line ready to get some good pictures of the runners</span>."</em> Cậu sẽ chờ ở vạch đích để chụp ảnh.
                      <br><br>
                      <strong>✗ B (give out water bottles) không đúng:</strong> Cậu được yêu cầu phát nước nhưng đã từ chối để chụp ảnh.
                      <br>
                      <strong>✗ C (run in the race) không đúng:</strong> Cậu bị chấn thương đầu gối nên không thể chạy.
                      <br>
                      <strong>✓ A là đáp án đúng.</strong>`,

                q6: `<strong>Đáp án: B – at the library</strong><br>
                      Cậu bé nói: <em>"<span class='keyword-highlight'>I'm going to the library tomorrow afternoon... Do you want to meet there?</span>"</em> Cô gái đồng ý: <em>"<span class='keyword-highlight'>I'll come over to meet you afterwards</span>."</em>
                      <br><br>
                      <strong>✗ A (at the train station) không đúng:</strong> Cô gái đáng lẽ phải gặp Lisa ở quán cà gần ga tàu nhưng sẽ đến thư viện sau.
                      <br>
                      <strong>✗ C (at a café) không đúng:</strong> Cô gái sẽ gặp Lisa ở quán cà trước nhưng họ sẽ gặp nhau ở thư viện sau đó.
                      <br>
                      <strong>✓ B là đáp án đúng.</strong>`,

                q7: `<strong>Đáp án: B – 12.00</strong><br>
                      Người phụ nữ nói: <em>"<span class='keyword-highlight'>The original start time was eleven this morning but due to the very bad weather conditions, we're going to see what's happening in the next hour or so, around midday, and make a decision then. If it's stopped raining heavily at that time, we can start immediately.</span>"</em> Nếu trời ngừng mưa lúc giữa trưa (midday = 12:00), trận đấu có thể bắt đầu ngay.
                      <br><br>
                      <strong>✗ A (11.00) không đúng:</strong> Đây là thời gian bắt đầu ban đầu đã bị hoãn.
                      <br>
                      <strong>✗ C (13.00) không đúng:</strong> 1 giờ chiều là thời gian bắt đầu nếu trời vẫn mưa lúc giữa trưa.
                      <br>
                      <strong>✓ B là đáp án đúng.</strong>`
            },

            // AI HIGHLIGHT RULE: Always highlight the FULL CONTEXT including the answer.
            // Do NOT highlight only the answer word/phrase. Include complete sentences.
            // Transcript with highlightable spans
            transcript: `
            <p><strong>Test One. There are four parts to the test. You will hear each part twice. We will now stop for a moment.</strong></p>
            <p><strong>Please ask any questions now because you must not speak during the test.</strong></p>
            <p><strong>PART 1</strong></p>
            <p><strong>Now open your question papers and look at Part One.</strong></p>
            <p><strong>For each question, choose the correct answer. Look at question one.</strong></p>

            <p><strong>Question 1</strong><br>
            <strong>Boy:</strong> I'm really looking forward to Luke's party on Saturday night. His brother's band's playing at it you know. Can we pick you up on the way?<br>
            <strong>Girl:</strong> I meant to tell you. <span class="highlightable" data-q="1">My mum's arranged for us to visit my grandpa that evening</span> – she planned it ages ago. Give Luke a big hug from me, though, won't you?<br>
            <strong>Boy:</strong> I will. Saturday's busy for lots of people. The school film club's showing that sci-fi film we were talking about too.<br>
            <strong>Girl:</strong> Really? We must get to see that sometime. It sounds great.</p>
            <p><em>Now listen again.</em></p>

            <p><strong>Question 2</strong><br>
            <strong>Woman:</strong> What do we need to organise for your camping trip? That tent of yours is no good.<br>
            <strong>Boy:</strong> I know, Mum. I was going to look online and find another one, 'cos it's full of holes. But Steve's suggested I share his.<br>
            <strong>Woman:</strong> Oh, good idea. And <span class="highlightable" data-q="2">your boots?</span><br>
            <strong>Boy:</strong> Just look at them! I doubt they'll still fit!<br>
            <strong>Woman:</strong> <span class="highlightable" data-q="2">Let's replace them.</span> And we'll get you a proper torch. Not that toy thing you've got.<br>
            <strong>Boy:</strong> Oh, don't worry about that! Dad's lending me his one. The light's amazingly bright.</p>
            <p><em>Now listen again.</em></p>

            <p><strong>Question 3</strong><br>
            <strong>Boy:</strong> Do you want to see my holiday photos?<br>
            <strong>Girl:</strong> Sure... Wow! Looks like a great place you went to. Is that your cousin? <span class="highlightable" data-q="3">He looks different from how I remember – I'm sure he didn't have a moustache the last time I saw him.</span><br>
            <strong>Boy:</strong> That was ages ago – he's grown up a lot since then! <span class="highlightable" data-q="3">He used to have quite long hair as well, down to his shoulders.</span><br>
            <strong>Girl:</strong> I remember now. <span class="highlightable" data-q="3">It suits him shorter.</span> You actually look quite similar now.<br>
            <strong>Boy:</strong> A lot of people say that.</p>
            <p><em>Now listen again.</em></p>

            <p><strong>Question 4</strong><br>
            <strong>Boy:</strong> Hi Mum, it's Paul. Can you help me? I haven't got my sports bag at school and we're playing volleyball later. I know where it is – <span class="highlightable" data-q="4">I put it next to the wardrobe in my room</span> because Dad said it was in the way next to the table in the living room. Anyway you should find it! Please can you bring it over to school? I don't want to get into trouble! Next week I'll put it by the front door, so I won't forget it. Thanks!</p>
            <p><em>Now listen again.</em></p>

            <p><strong>Question 5</strong><br>
            <strong>Girl:</strong> So have you signed up to enter the fun run?<br>
            <strong>Boy:</strong> Oh, didn't you know? I've got a problem with my knee so I'm out of this year's race. But <span class="highlightable" data-q="5">I'll be waiting at the finish line ready to get some good pictures of the runners.</span><br>
            <strong>Girl:</strong> For the school magazine?<br>
            <strong>Boy:</strong> Yeah. <span class="highlightable" data-q="5">I was asked to be one of the people giving out water bottles along the route.</span><br>
            <strong>Girl:</strong> I'm going to do that.<br>
            <strong>Boy:</strong> Right – but what I'm doing will make me feel more part of the race somehow.</p>
            <p><em>Now listen again.</em></p>

            <p><strong>Question 6</strong><br>
            <strong>Boy:</strong> <span class="highlightable" data-q="6">I'm going to the library tomorrow afternoon to work on that geography project. Do you want to meet there?</span><br>
            <strong>Girl:</strong> I ought to do something on it too. I'm supposed to see Lisa in the café at the station, though if I don't stay long with her I could still come. I'm not really sure because she wants to discuss something.<br>
            <strong>Boy:</strong> Well, it's up to you.<br>
            <strong>Girl:</strong> <span class="highlightable" data-q="6">I'll come over to meet you afterwards</span>, but I'll have to get the train home about four.<br>
            <strong>Boy:</strong> I'll get the train back too.</p>
            <p><em>Now listen again.</em></p>

            <p><strong>Question 7</strong><br>
            <strong>Woman:</strong> I'm afraid today's football match will be postponed until a bit later. The original start time was eleven this morning but due to the very bad weather conditions, <span class="highlightable" data-q="7">we're going to see what's happening in the next hour or so, around midday, and make a decision then. If it's stopped raining heavily at that time, we can start immediately.</span> If not, maybe we can begin playing at one. If we can't do that, that we'll have to cancel.</p>
            <p><em>Now listen again.</em></p>
            <p><em>That is the end of Part One.</em></p>
            `,

            // Questions Data
            questions: [
                { num: 1, text: "What is the girl going to do on Saturday?", options: ["watch a film at the club", "go to a party", "visit her grandfather"] },
                { num: 2, text: "What does the boy need to get for his camping trip?", options: ["a torch", "a tent", "some boots"] },
                { num: 3, text: "Who is in the photo?", options: ["a man with a moustache and short hair", "a girl with long hair", "a man with no moustache and short hair"] },
                { num: 4, text: "Where is the boy's sports bag?", options: ["by the front door", "under the living room table", "next to the wardrobe in his room"] },
                { num: 5, text: "What is the boy going to do at the running event?", options: ["take some photographs", "give out water bottles", "run in the race"] },
                { num: 6, text: "Where will the friends meet?", options: ["at the train station", "at the library", "at a café"] },
                { num: 7, text: "What is the earliest time today's football match could start?", options: ["11.00", "12.00", "13.00"] }
            ]
        };

        // Initialize the listening test when DOM is loaded
        document.addEventListener('DOMContentLoaded', function() {
            window.listeningCore = new ListeningCore();
            window.listeningCore.initializeTest(pet3Test1Part1Data);
            console.log('PET 3 Test 1 Part 1 loaded with core listening engine');
        });
    </script>
