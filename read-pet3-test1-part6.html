<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>PET 3 - Test 1 - Reading Part 6</title>
    <link rel="stylesheet" href="reading-pet-common.css" id="styleLink">
</head>
<body>
<div class="test-wrapper" id="testWrapper">
    <div class="ielts-header">
        <div class="brand"><div class="ielts-logo">PET</div><div class="candidate"></div></div>
    </div>

    <div class="question-nav">
        
        <div class="nav-buttons" id="navButtons"></div>
        <span id="answeredCount" style="font-size:13px; color:#555; margin-left:10px;">0/6 answered</span>
    </div>

    <!-- Main area -->
    <div class="main-area split-layout" id="mainArea"></div>

    <div class="bottom-bar">
        <button class="btn btn-primary" id="submitBtn">Nộp bài</button>
        <button class="btn btn-success" id="explainBtn" disabled>Xem giải thích</button>
        <button class="btn btn-danger" id="resetBtn">Reset</button>
        <div class="progress" id="progressDisplay">Đã làm: 0/6</div>
    </div>

    <div class="context-menu" id="contextMenu">
        <div onclick="applyHighlight('yellow')">Highlight vàng</div>
        <div onclick="applyHighlight('green')">Highlight xanh lá</div>
        <div onclick="applyHighlight('pink')">Highlight hồng</div>
        <div onclick="removeHighlight()">Xóa highlight</div>
    </div>
</div>

<script src="core-reading.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const testData = {
            type: 'split-layout',
            part: 6,
            answerKey: { q27: "like", q28: "be", q29: "of", q30: "who", q31: "to", q32: "far" },
            displayAnswers: { q27: "like", q28: "be/become", q29: "of", q30: "who/that", q31: "to", q32: "far" },
            detailedExplanations: {
                27: `<div><strong>"Like"</strong> = giống như.<br>
                Câu đầy đủ: <em>"The owners are looking for another teenage assistant like me at the moment"</em><br>
                Dịch: Chủ cửa hàng đang tìm thêm một trợ lý tuổi teen giống như tôi.<br>
                <strong>Lưu ý:</strong> "like" dùng để so sánh/chỉ người tương tự.</div>`,
                28: `<div><strong>"Be/Become"</strong> = trở nên.<br>
                Câu: <em>"I hope someone else my age will be interested in joining me there"</em><br>
                Dịch: Tôi hy vọng ai đó cùng tuổi sẽ quan tâm đến việc tham gia cùng tôi.<br>
                <strong>Hoặc:</strong> "become interested" = trở nên quan tâm.</div>`,
                29: `<div>Cụm từ <strong>"the rest of"</strong> = phần còn lại của.<br>
                Câu: <em>"the rest of the week I'm at school"</em><br>
                Dịch: Phần còn lại của tuần thì tôi đi học.</div>`,
                30: `<div><strong>"Who/That"</strong> = đại từ quan hệ chỉ người.<br>
                Câu: <em>"the people who come into the shop are just as interesting"</em><br>
                Dịch: Những người vào cửa hàng cũng thú vị như vậy.<br>
                <strong>Lưu ý:</strong> "who" hoặc "that" đều có thể dùng để thay thế cho "people" làm chủ ngữ.</div>`,
                31: `<div>Cụm từ <strong>"places to go"</strong> = những nơi để đi.<br>
                Câu: <em>"great places to go cycling"</em><br>
                Dịch: Những nơi tuyệt vời để đi đạp xe.<br>
                <strong>Lưu ý:</strong> "to + V" dùng để chỉ mục đích.</div>`,
                32: `<div>Cụm từ <strong>"so far"</strong> = cho đến nay.<br>
                Câu: <em>"So far, I've only managed to carry out basic bike repairs"</em><br>
                Dịch: Cho đến nay, tôi mới chỉ thực hiện được những sửa chữa cơ bản.<br>
                <strong>Lưu ý:</strong> "so far" thường dùng với thì hiện tại hoàn thành.</div>`
            },
            template: `
                <div class="reading-card" id="passageCard">
                    <div class="review-title">My part-time job at a bicycle repair shop</div>
                    <p>I work part-time in a large bicycle shop at the weekend. The owners are looking for another teenage assistant
                        <span class="input-wrapper">
                            <input type="text" id="q27" class="gap-input" data-q="27" autocomplete="off">
                            <span class="eye-icon" data-question="27">👁️</span>
                        </span>
                        me at the moment, so I hope someone else my age will
                        <span class="input-wrapper">
                            <input type="text" id="q28" class="gap-input" data-q="28" autocomplete="off">
                            <span class="eye-icon" data-question="28">👁️</span>
                        </span>
                        interested in joining me there!
                    </p>
                    <p>
                        I only work in the shop on Saturdays because the rest
                        <span class="input-wrapper">
                            <input type="text" id="q29" class="gap-input" data-q="29" autocomplete="off">
                            <span class="eye-icon" data-question="29">👁️</span>
                        </span>
                        the week I'm at school. I love being at the shop. Obviously, the bikes are great, but the people
                        <span class="input-wrapper">
                            <input type="text" id="q30" class="gap-input" data-q="30" autocomplete="off">
                            <span class="eye-icon" data-question="30">👁️</span>
                        </span>
                        come into the shop are just as interesting. They tell me all about their cycling adventures while they're waiting for their bikes to be fixed. They've given me lots of tips about great places
                        <span class="input-wrapper">
                            <input type="text" id="q31" class="gap-input" data-q="31" autocomplete="off">
                            <span class="eye-icon" data-question="31">👁️</span>
                        </span>
                        go cycling, too. I also attend cycling events, where I help fix problems the cyclists have with their bikes.
                    </p>
                    <p>
                        So
                        <span class="input-wrapper">
                            <input type="text" id="q32" class="gap-input" data-q="32" autocomplete="off">
                            <span class="eye-icon" data-question="32">👁️</span>
                        </span>
                        , I've only managed to carry out basic bike repairs, but I'm learning fast and my boss says I'll be a great bike mechanic one day!
                    </p>
                </div>
            `,
            questions: [
                { num: 27 }, { num: 28 }, { num: 29 }, { num: 30 }, { num: 31 }, { num: 32 }
            ]
        };

        window.readingCore = new ReadingCore();
        window.readingCore.initializeTest(testData);
    });
</script>
</body>
</html>
