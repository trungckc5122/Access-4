                <strong>Boy:</strong> No, I've only had a few lessons so far. I'm just not really good enough yet. Maybe one day.<br>
                <em>Now listen again.</em></p>

                <strong>Boy:</strong> I haven't seen you at chess club. Everyone's been asking about you, hoping you're coming back.<br>
                <strong>Girl:</strong> Yeah. They're lovely, but I'm not coming this term. <span class="highlightable" data-q="11">I was talking to the woman next door, Tanya, about chess</span> – she's a coach. <span class="highlightable" data-q="11">And she suggested she could help me with my game.</span> The price she's charging isn't too bad so ...<br>
