<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KET 3 - Test 2 - Listening Part 4</title>
    <link rel="stylesheet" href="listening-pet-common.css" id="styleLink">
</head>

<body>
    <div class="test-wrapper" id="testWrapper">
        <!-- Header -->
        <div class="ielts-header">
            <div class="brand">
                <div class="ielts-logo">KET</div>
                <div class="candidate"></div>
                <div class="audio-controls">
                    <audio id="listeningAudio" controls>
                        <source src="audio/KET 3 - Test 2 Part 4.mp3" type="audio/mpeg">
                    </audio>
                    <select class="speed-select" id="speedSelect">
                        <option value="0.7">0.7x</option>
                        <option value="0.9">0.9x</option>
                        <option value="1.0" selected>1x</option>
                        <option value="1.1">1.1x</option>
                        <option value="1.25">1.25x</option>
                    </select>
                    <span class="volume-icon">🔊</span>
                </div>
            </div>
        </div>

        <!-- Question navigator -->
        <div class="question-nav">
            <div class="nav-buttons" id="navButtons"></div>
        </div>

        <!-- Main area -->
        <div class="main-area" id="mainArea">
            <!-- Transcript panel -->
            <div class="transcript-panel" id="transcriptPanel">
                <div class="panel-header"><span>TRANSCRIPT</span></div>
                <div class="transcript-content font-large" id="transcriptContent"></div>
            </div>
            <div class="resizer" id="resizer"></div>

            <!-- Questions panel -->
            <div class="questions-panel" id="questionsPanel">
                <div class="panel-header">
                    <span>QUESTIONS 16–20</span>
                    <span class="answer-badge" id="answeredCount">0/5 answered</span>
                </div>
                <div class="questions-list font-large centered" id="questionsContent">
                    <div>
                        <h3>PART 4 &nbsp; Questions 16–20</h3>
                        <p><em>For each question, choose the correct answer.</em></p>
                        <div class="notes-box" id="questionsContainer"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Bottom bar -->
        <div class="bottom-bar">
            <button class="btn btn-primary" id="submitBtn">Nộp bài</button>
            <button class="btn btn-success" id="explainBtn" disabled>Xem giải thích</button>
            <button class="btn btn-danger" id="resetBtn">Reset</button>
            <div class="progress" id="progressDisplay">Đã làm: 0/5</div>
        </div>

        <!-- Explanation panel -->
        <div class="explanation-panel" id="explanationPanel">
            <div class="resize-handle" id="explanationResizer"></div>
            <div class="explanation-header">
                <span id="explanationTitle">Giải thích</span>
                <span class="close-btn" id="closeExplanation">✕ Đóng</span>
            </div>
            <div class="explanation-content" id="explanationText"></div>
        </div>
    </div>

    <!-- Context menu -->
    <div class="context-menu" id="contextMenu">
        <div onclick="applyHighlight('yellow')">Highlight vàng</div>
        <div onclick="applyHighlight('green')">Highlight xanh lá</div>
        <div onclick="applyHighlight('pink')">Highlight hồng</div>
        <div onclick="removeHighlight()">Xóa highlight</div>
    </div>

    <script src="core-listening-ket.js"></script>
    <script>
        const ketTest2Part4Data = {
            title: "KET 3 · Test 2 · Listening Part 4",
            type: "multiple-choice",
            part: 4,
            book: 3,
            test: 2,

            answerKey: { q16: 'C', q17: 'C', q18: 'B', q19: 'B', q20: 'B' },
            displayAnswers: { q16: 'C', q17: 'C', q18: 'B', q19: 'B', q20: 'B' },

            detailedExplanations: {
                q16: `<strong>Đáp án: C – She had to look after her sister (Cô ấy phải chăm sóc em gái)</strong><br>
                      Con trai nói: <em>"Marco's party on Saturday night was great. It's a shame you missed it. Haven't you feeling well or something?"</em><br>
                      Con gái đáp: <em>"Actually, Mum was working late so <span class='keyword-highlight'>I had to give Annie her tea and a bath</span>."</em><br>
                      Con trai hỏi: <em>"Your baby sister?"</em><br>
                      Con gái đáp: <em>"Yeah."</em><br><br>
                      <strong>✗ A (She was feeling ill) sai:</strong> Con trai đoán nhưng con gái phủ nhận ("Actually...").<br>
                      <strong>✗ B (She needed to do her homework) sai:</strong> Cô ấy nói làm bài tập SAU khi chăm em ("after that I did my homework").<br>
                      <strong>✓ C (She had to look after her sister) là đúng – Cô ấy phải cho em ăn và tắm ("give Annie her tea and a bath").</strong>`,

                q17: `<strong>Đáp án: C – change the subject of her project (thay đổi chủ đề dự án)</strong><br>
                      Giáo viên nói: <em>"About your project, Danielle. <span class='keyword-highlight'>I'm not really sure there's enough to write on the topic you've chosen, so I'd like you to choose something else to write about.</span> I'm happy for you to have an extra five days to get it finished, although of course, if you're able to do it earlier, then give it to me when it's completed."</em><br><br>
                      <strong>✗ A (make her project longer than it is) sai:</strong> Không yêu cầu làm dài hơn.<br>
                      <strong>✗ B (try to finish her project earlier) sai:</strong> Có thể nộp sớm hơn nhưng không bắt buộc.<br>
                      <strong>✓ C (change the subject of her project) là đúng – Giáo viên muốn Danielle chọn chủ đề khác ("choose something else").</strong>`,

                q18: `<strong>Đáp án: B – It's a good size (Kích thước phù hợp)</strong><br>
                      Con gái nói: <em>"Cool bag!"</em><br>
                      Con trai đáp: <em>"Maybe it's too bright! But my old one was really big because of all my books. <span class='keyword-highlight'>Now I use my laptop, so I got one which was a better size for that.</span>"</em><br>
                      Về da: <em>"Yeah. So it won't be as heavy as my old leather one."</em><br><br>
                      <strong>✗ A (It's made of leather) sai:</strong> Cái cũ làm bằng da ("old leather one"), cái mới nhẹ hơn.<br>
                      <strong>✗ C (It's a bright colour) sai:</strong> Con trai nói có thể quá sáng màu ("Maybe it's too bright"), không phải lý do thích.<br>
                      <strong>✓ B (It's a good size) là đúng – Cái cũ quá to vì nhiều sách, cái mới vừa laptop ("better size").</strong>`,

                q19: `<strong>Đáp án: B – to explain a problem to her (giải thích vấn đề)</strong><br>
                      Bố nói: <em>"Hi! It's Dad. Sorry, I can't meet you from school this afternoon. <span class='keyword-highlight'>Your brother somehow caught the wrong train to get to his friend's house.</span> He managed to get directions and finally arrived at his friend's, but I've offered to drive there and bring him back. <span class='keyword-highlight'>You'll have to get the bus home</span> – hope you don't mind."</em><br><br>
                      <strong>✗ A (to offer her a lift) sai:</strong> Ngược lại, bố nói con phải đi xe buýt về.<br>
                      <strong>✗ C (to ask her about some directions) sai:</strong> Không hỏi về chỉ đường.<br>
                      <strong>✓ B (to explain a problem to her) là đúng – Bố giải thích vấn đề (em trai đi nhầm tàu) và xin lỗi không đón được.</strong>`,

                q20: `<strong>Đáp án: B – worried she won't be very good (lo lắng cô ấy sẽ không giỏi)</strong><br>
                      Con gái nói: <em>"It's my first surfing lesson tomorrow. I've done some surfing already with my friend, but <span class='keyword-highlight'>what if everyone's better than me – I don't want to feel embarrassed</span>. I've checked the weather forecast and it's going to be windy, so there'll be some lovely big waves to practise on."</em><br><br>
                      <strong>✗ A (upset that the weather might be bad) sai:</strong> Cô ấy vui vì thời tiết sẽ có sóng lớn để luyện tập ("windy... lovely big waves").<br>
                      <strong>✗ C (sorry that her friend can't go) sai:</strong> Cô ấy từng đi với bạn nhưng bài không nói bạn không đi lần này.<br>
                      <strong>✓ B (worried she won't be very good) là đúng – Cô ấy lo ngại mọi người giỏi hơn ("what if everyone's better than me").</strong>`
            },

            transcript: `
            <p><strong>PART 4</strong></p>
            <p><em>For each question, choose the correct answer.</em></p>

            <p><strong>Question 16</strong><br>
            You will hear two friends talking about a party. Why couldn't the girl go to it?<br>
            <strong>Boy:</strong> <span class="highlightable" data-q="16">Marco's party on Saturday night was great. It's a shame you missed it. Haven't you feeling well or something?</span><br>
            <strong>Girl:</strong> <span class="highlightable" data-q="16">Actually, Mum was working late so I had to give Annie her tea and a bath.</span><br>
            <strong>Boy:</strong> Your baby sister?<br>
            <strong>Girl:</strong> Yeah. But after that I didn't just watch TV, I did my homework so then I was free on Sunday.</p>

            <p><strong>Question 17</strong><br>
            You will hear a teacher talking to a student called Danielle. What does he want Danielle to do?<br>
            <strong>Teacher:</strong> About your project, Danielle. <span class="highlightable" data-q="17">I'm not really sure there's enough to write on the topic you've chosen, so I'd like you to choose something else to write about.</span> I'm happy for you to have an extra five days to get it finished, although of course, if you're able to do it earlier, then give it to me when it's completed.</p>

            <p><strong>Question 18</strong><br>
            You will hear a boy talking to his friend about his new school bag. Why does he like his new bag?<br>
            <strong>Girl:</strong> <span class="highlightable" data-q="18">Cool bag!</span><br>
            <strong>Boy:</strong> <span class="highlightable" data-q="18">Maybe it's too bright! But my old one was really big because of all my books. Now I use my laptop, so I got one which was a better size for that.</span><br>
            <strong>Girl:</strong> You cycle to school, don't you?<br>
            <strong>Boy:</strong> Yeah. So it won't be as heavy as my old leather one.<br>
            <strong>Girl:</strong> Well, nobody will miss that colour when you go past!</p>

            <p><strong>Question 19</strong><br>
            You will hear a father leaving a message for his daughter. Why is he phoning his daughter?<br>
            <strong>Dad:</strong> Hi! It's Dad. Sorry, I can't meet you from school this afternoon. <span class="highlightable" data-q="19">Your brother somehow caught the wrong train to get to his friend's house.</span> He managed to get directions and finally arrived at his friend's, but I've offered to drive there and bring him back. <span class="highlightable" data-q="19">You'll have to get the bus home</span> – hope you don't mind. I'll see you later.</p>

            <p><strong>Question 20</strong><br>
            You will hear a girl talking about going to her first surfing lesson. How is she feeling about it?<br>
            <strong>Girl:</strong> It's my first surfing lesson tomorrow. I've done some surfing already with my friend, but <span class="highlightable" data-q="20">what if everyone's better than me – I don't want to feel embarrassed</span>. I've checked the weather forecast and it's going to be windy, so there'll be some lovely big waves to practise on.</p>

            <p><em>That is the end of Part Four.</em></p>
            `,

            questions: [
                { num: 16, text: "You will hear two friends talking about a party. Why couldn't the girl go to it?", options: ["She was feeling ill.", "She needed to do her homework.", "She had to look after her sister."] },
                { num: 17, text: "You will hear a teacher talking to a student called Danielle. What does he want Danielle to do?", options: ["make her project longer than it is", "try to finish her project earlier", "change the subject of her project"] },
                { num: 18, text: "You will hear a boy talking to his friend about his new school bag. Why does he like his new bag?", options: ["It's made of leather.", "It's a good size.", "It's a bright colour."] },
                { num: 19, text: "You will hear a father leaving a message for his daughter. Why is he phoning his daughter?", options: ["to offer her a lift", "to explain a problem to her", "to ask her about some directions"] },
                { num: 20, text: "You will hear a girl talking about going to her first surfing lesson. How is she feeling about it?", options: ["upset that the weather might be bad", "worried she won't be very good", "sorry that her friend can't go"] }
            ]
        };

        document.addEventListener('DOMContentLoaded', function () {
            window.listeningCore = new ListeningCore();
            window.listeningCore.initializeTest(ketTest2Part4Data);
            console.log('KET 3 Test 2 Listening Part 4 loaded');
        });
    </script>
</body>
