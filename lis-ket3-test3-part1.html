                      <strong>✗ C (Purse) sai:</strong> Ví/purse là đồ của mẹ ("Mum's purse"), được nhắc đến như một vật tham chiếu vị trí, không phải thứ Daisy làm mất.<br>

                      <strong>✗ C (Salad) sai:</strong> Cô gái nói thích salad ("I really like the salads") nhưng quyết định ăn pizza vì đói ("I'm so hungry"), và cậu bé nói sẽ ăn salad tối nay.<br>
                      <strong>✓ A (Pizza) là đúng – cô gái đề xuất "why don't we share a pizza today?" và cậu bé đồng ý "OK, great idea!".</strong>`,

                      <strong>✓ A (Garden/barbecue) là đúng – Calom muốn tổ chức barbecue trong vườn ("have a barbecue in his garden").</strong>`,

                      <strong>✗ B (Cinema) sai:</strong> Cậu bé đề xuất gặp ở rạp nhưng cô gái từ chối vì quá đông ("It's always busy at the cinema").<br>
                      <strong>✓ C (Tram stop) là đúng – cô gái đề xuất gặp ở trạm xe điện ("meet you at your tram stop") và cậu bé đồng ý "Good idea".</strong>`

            <em>Now listen again. [repeat]</em></p>
