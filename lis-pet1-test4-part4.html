            q20: `<strong>Đáp án: A – by reading it at home.</strong><br>
              Laura nói: <em>"Well, my dad loves literature so there were always <u>lots of poetry books on the shelves around the house. I used to spend hours looking at them.</u>"</em> (Bố tôi rất yêu văn học nên luôn có rất nhiều sách thơ trên kệ quanh nhà. Tôi thường dành hàng giờ để xem chúng).
              <br><br>
              <strong>✗ Phương án B sai:</strong> Laura nói rằng môn thơ cần được dành nhiều thời gian hơn ở trường, điều đó cho thấy mối quan tâm của cô không thực sự bắt đầu từ trường học.
              <br>
              <strong>✗ Phương án C sai:</strong> Dù bố cô yêu văn học và có nhiều sách thơ, nhưng cô là người tự mình dành hàng giờ để xem/đọc chúng chứ không phải bố dạy cô.
              <br>

            q21: `<strong>Đáp án: C – She won a poetry prize.</strong><br>
              Laura giải thích lý do cô quyết định theo đuổi sự nghiệp chuyên nghiệp: <em>"I... suggested that <u>I enter a poetry competition. I did, and two months later found out I'd come first.</u> That's when I knew I wanted to do this full-time."</em> (Tôi được gợi ý tham gia cuộc thi thơ. Tôi đã làm vậy, và hai tháng sau biết mình đứng nhất. Đó là lúc tôi biết mình muốn làm công việc này toàn thời gian).

              <br><br>
              <strong>✗ Phương án B sai:</strong> Cô nhận thấy ngôn ngữ khác biệt, nhưng không hề nói rằng chúng khó hiểu.

              <br><br>
              <strong>✗ Phương án A sai:</strong> Ban tổ chức lễ hội thơ mời cô đến đọc tác phẩm của mình chứ cô không tổ chức lễ hội.
              <br>
              <strong>✗ Phương án B sai:</strong> Cô nói rằng các bài thơ mới luôn xuất hiện trong đầu cô, và cô sẽ lo lắng nếu phải ngừng viết.

        transcript: `
            <p><em>You will hear an interview with a young poet called Laura Dickson.</em></p>
            <p><strong>Presenter:</strong> Laura Dickson, you've already had two books of your poems published. How did you become interested in poetry?</p>
            <p><strong>Laura:</strong> Well, my dad loves literature so there were always <span class="highlightable" data-q="20">lots of poetry books on the shelves around the house. I used to spend hours looking at them.</span> I'm pleased it happened that way, because there needs to be more time spent on it at school. I think students would enjoy it.</p>
            <p><strong>Presenter:</strong> And how did you decide to turn your interest into a career as a professional poet?</p>
            <p><strong>Laura:</strong> I started doing some classes in journalism. I showed my poems to the woman running the course. She was a well-known reporter on a national newspaper, and she suggested that <span class="highlightable" data-q="21">I enter a poetry competition. I did, and two months later found out I'd come first.</span> That's when I knew I wanted to do this full-time.</p>
            <p><strong>Presenter:</strong> So, I hear you've just finished a new book of poems. What's it about?</p>
            <p><strong>Laura:</strong> You never exactly know what poems are going to be about until you start writing them, and my previous books have included my thoughts about architecture - ancient and new. In this one, though, <span class="highlightable" data-q="22">I focus on connections with the people I'm close to.</span> I actually started out with the idea of writing about global warming and the environment, which is very different to what I produced in the end.</p>
            <p><strong>Presenter:</strong> Your poetry's very modern. Do you read poetry written a long time ago?</p>
            <p><strong>Laura:</strong> Yes, I do. The words and style are often very different from modern English. But you soon notice how carefully the poems have been put together. <span class="highlightable" data-q="23">I think they took more skill to write than many modern ones do.</span></p>
            <p><strong>Presenter:</strong> And you've also started teaching poetry at a university recently. How's that going?</p>
            <p><strong>Laura:</strong> I'm certainly enjoying it, even if I'm not always sure how much my students are actually learning. <span class="highlightable" data-q="24">Thankfully the other teachers have a lot more experience than me and are happy to share their ideas.</span> I was warned about how much preparation there'd be, so that wasn't too much of a shock.</p>
            <p><strong>Presenter:</strong> And what are your plans for the future?</p>
            <p><strong>Laura:</strong> Well, there's a poetry festival soon, and the organisers have asked me to read my work at it. <span class="highlightable" data-q="25">I'm hoping to turn some of my previous work into songs</span> - after all, hip-hop and rap are just poetry with a tune. New poems come into my head all the time too - I'd get worried if I had to stop writing because I'd run out of ideas.</p>
            <p><strong>Presenter:</strong> Thank you, Laura…. (fade)</p>
