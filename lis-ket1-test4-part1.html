<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KET 1 - Test 4 - Listening Part 1</title>
    <link rel="stylesheet" href="listening-pet-common.css" id="styleLink">
</head>

<body>
    <div class="test-wrapper" id="testWrapper">
        <!-- Header -->
        <div class="ielts-header">
            <div class="brand">
                <div class="ielts-logo">KET</div>
                <div class="candidate"></div>
                <div class="audio-controls">
                    <audio id="listeningAudio" controls>
                        <source src="audio/KET 1 - Test 4 Part 1.mp3" type="audio/mpeg">
                    </audio>
                    <select class="speed-select" id="speedSelect">
                        <option value="0.7">0.7x</option>
                        <option value="0.9">0.9x</option>
                        <option value="1.0" selected>1x</option>
                        <option value="1.1">1.1x</option>
                        <option value="1.25">1.25x</option>
                    </select>
                    <span class="volume-icon">🔊</span>
                </div>
            </div>
        </div>

        <!-- Question navigator -->
        <div class="question-nav">
            <div class="nav-buttons" id="navButtons"></div>
        </div>

        <!-- Main area -->
        <div class="main-area" id="mainArea">
            <!-- Transcript panel -->
            <div class="transcript-panel" id="transcriptPanel">
                <div class="panel-header"><span>TRANSCRIPT</span></div>
                <div class="transcript-content font-large" id="transcriptContent"></div>
            </div>
            <div class="resizer" id="resizer"></div>

            <!-- Questions panel -->
            <div class="questions-panel" id="questionsPanel">
                <div class="panel-header">
                    <span>QUESTIONS 1–5</span>
                    <span class="answer-badge" id="answeredCount">0/5 answered</span>
                </div>
                <div class="questions-list font-large centered" id="questionsContent">
                    <div>
                        <h3>PART 1 &nbsp; Questions 1–5</h3>
                        <p><em>For each question, choose the correct answer.</em></p>
                        <div class="notes-box" id="questionsContainer"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Bottom bar -->
        <div class="bottom-bar">
            <button class="btn btn-primary" id="submitBtn">Nộp bài</button>
            <button class="btn btn-success" id="explainBtn" disabled>Xem giải thích</button>
            <button class="btn btn-danger" id="resetBtn">Reset</button>
            <div class="progress" id="progressDisplay">Đã làm: 0/5</div>
        </div>

        <!-- Explanation panel -->
        <div class="explanation-panel" id="explanationPanel">
            <div class="resize-handle" id="explanationResizer"></div>
            <div class="explanation-header">
                <span id="explanationTitle">Giải thích</span>
                <span class="close-btn" id="closeExplanation">✕ Đóng</span>
            </div>
            <div class="explanation-content" id="explanationText"></div>
        </div>
    </div>

    <!-- Context menu -->
    <div class="context-menu" id="contextMenu">
        <div onclick="applyHighlight('yellow')">Highlight vàng</div>
        <div onclick="applyHighlight('green')">Highlight xanh lá</div>
        <div onclick="applyHighlight('pink')">Highlight hồng</div>
        <div onclick="removeHighlight()">Xóa highlight</div>
    </div>

    <script src="core-listening-ket.js"></script>
    <script>
        const ketTest4Part1Data = {
            title: "KET 1 · Test 4 · Listening Part 1",
            type: "multiple-choice",
            part: 1,
            book: 1,
            test: 4,

            answerKey: { q1: 'B', q2: 'C', q3: 'C', q4: 'A', q5: 'A' },
            displayAnswers: { q1: 'B', q2: 'C', q3: 'C', q4: 'A', q5: 'A' },

            detailedExplanations: {
                q1: `<strong>Đáp án: B – clouds (nhiều mây)</strong><br>
                      Người phụ nữ hỏi: <em>"Was it sunny for the match?"</em><br>
                      Người đàn ông đáp: <em>"Well, actually it was <span class='keyword-highlight'>quite cloudy</span>, but at least it wasn't wet."</em><br><br>
                      <strong>✗ A (cloud with rain) sai:</strong> Không mưa ("it wasn't wet").<br>
                      <strong>✗ C (sun) sai:</strong> Không nắng, trời nhiều mây.<br>
                      <strong>✓ B (clouds) là đáp án đúng – trời nhiều mây nhưng không mưa.</strong>`,

                q2: `<strong>Đáp án: C – cycling (đạp xe)</strong><br>
                      Người phụ nữ nói: <em>"Yes, but I'm a bit bored of running. Actually, <span class='keyword-highlight'>I'm on my way to buy a bike now</span>, so you'll see me out on that next time."</em><br><br>
                      <strong>✗ A (football) sai:</strong> Người đàn ông đang đi đá bóng, không phải người phụ nữ.<br>
                      <strong>✗ B (running) sai:</strong> Cô ấy đang chán chạy bộ.<br>
                      <strong>✓ C (cycling) là môn thể thao cô ấy sắp bắt đầu – đi mua xe đạp.</strong>`,

                q3: `<strong>Đáp án: C – cars in traffic (kẹt xe)</strong><br>
                      Người đàn ông nói: <em>"I got up as soon as I heard the alarm clock, and I was at the bus stop five minutes before the bus arrived. But <span class='keyword-highlight'>there was so much traffic</span> that it took longer than normal to get here."</em><br><br>
                      <strong>✗ A (man sleeping with an alarm clock) sai:</strong> Anh ấy đã nghe đồng hồ báo thức và dậy ngay.<br>
                      <strong>✗ B (man running for a bus) sai:</strong> Anh ấy đến trạm xe buýt sớm 5 phút.<br>
                      <strong>✓ C (cars in traffic) là lý do – kẹt xe khiến đi muộn.</strong>`,

                q4: `<strong>Đáp án: A – a bowl of pasta (mì Ý)</strong><br>
                      Người phụ nữ hỏi: <em>"How long do you have to cook the pasta for?"</em><br>
                      Người đàn ông đáp: <em>"About ten minutes. <span class='keyword-highlight'>It's quicker to make a sandwich</span>, but it doesn't taste as good."</em><br>
                      Về pizza: <em>"It's just as easy as making a pizza."</em> → Không phải pizza.<br><br>
                      <strong>✗ B (a pizza) sai:</strong> Anh ấy so sánh làm pasta dễ như làm pizza, không phải đang làm pizza.<br>
                      <strong>✗ C (a sandwich) sai:</strong> Sandwich nhanh hơn nhưng không ngon bằng.<br>
                      <strong>✓ A (a bowl of pasta) là đáp án đúng – đang nấu pasta với thịt và cà chua.</strong>`,

                q5: `<strong>Đáp án: A – a pair of boots (đôi bốt)</strong><br>
                      Người đàn ông nói: <em>"The gloves kept my hands really warm, but look what's happened to <span class='keyword-highlight'>these</span>."</em> (đưa đôi bốt bị hỏng).<br>
                      Người phụ nữ nói: <em>"I only went walking in the mountains in them once. I wore a good pair of socks with them too."</em><br>
                      Về gloves: <em>"The gloves kept my hands really warm"</em> → Gloves tốt, không có vấn đề.<br><br>
                      <strong>✗ B (a pair of gloves) sai:</strong> Gloves giữ ấm tốt, không có vấn đề.<br>
                      <strong>✗ C (a pair of socks) sai:</strong> Socks tốt, chỉ là đi kèm với bốt.<br>
                      <strong>✓ A (a pair of boots) là đáp án đúng – bốt bị hỏng sau một lần đi bộ núi.</strong>`
            },

            transcript: `
            <p><strong>PART 1</strong></p>
            <p><em>For each question, choose the correct answer.</em></p>

            <p><strong>Question 1</strong><br>
            <strong>Woman:</strong> Hi, Harry. How are you? Is it still raining?<br>
            <strong>Man:</strong> Yes. It's a good thing it wasn't like this for the football yesterday.<br>
            <strong>Woman:</strong> Was it sunny for the match?<br>
            <strong>Man:</strong> <span class="highlightable" data-q="1">Well, actually it was quite cloudy, but at least it wasn't wet.</span><br>
            <strong>Woman:</strong> That's the important thing.</p>

            <p><strong>Question 2</strong><br>
            <strong>Woman:</strong> Hi, how are you? Are you on your way to play football?<br>
            <strong>Man:</strong> I am. You're still doing lots to keep fit I see.<br>
            <strong>Woman:</strong> Yes, but I'm a bit bored of running. Actually, <span class="highlightable" data-q="2">I'm on my way to buy a bike now, so you'll see me out on that next time.</span><br>
            <strong>Man:</strong> Well, it's always good to try something new!</p>

            <p><strong>Question 3</strong><br>
            <strong>Woman:</strong> Alex, you're late! Is everything OK?<br>
            <strong>Man:</strong> <span class="highlightable" data-q="3">I got up as soon as I heard the alarm clock, and I was at the bus stop five minutes before the bus arrived. But there was so much traffic that it took longer than normal to get here.</span> Sorry!<br>
            <strong>Woman:</strong> Well, tomorrow you should wake up earlier and get an earlier bus!<br>
            <strong>Man:</strong> You're right.</p>

            <p><strong>Question 4</strong><br>
            <strong>Woman:</strong> Mmm, that looks lovely. Was it easy to make?<br>
            <strong>Man:</strong> <span class="highlightable" data-q="4">Yes, you cook the onions and the meat together in a pan, then put in the tomatoes. It's just as easy as making a pizza.</span><br>
            <strong>Woman:</strong> How long do you have to cook the pasta for?<br>
            <strong>Man:</strong> <span class="highlightable" data-q="4">About ten minutes. It's quicker to make a sandwich, but it doesn't taste as good.</span></p>

            <p><strong>Question 5</strong><br>
            <strong>Woman:</strong> Can I help you?<br>
            <strong>Man:</strong> <span class="highlightable" data-q="5">Yes, I bought some things here last week. The gloves kept my hands really warm, but look what's happened to these.</span><br>
            <strong>Woman:</strong> Oh dear!<br>
            <strong>Man:</strong> I only went walking in the mountains in them once. I wore a good pair of socks with them too.<br>
            <strong>Woman:</strong> But these aren't strong enough for doing that. They're for wearing in town.</p>

            <p><em>That is the end of Part One.</em></p>
            `,

            questions: [
                { num: 1, text: "What was the weather like for the football match?", options: ["cloud with rain", "clouds", "sun"] },
                { num: 2, text: "What sport is the woman going to start doing soon?", options: ["football", "running", "cycling"] },
                { num: 3, text: "Why was the man late for work?", options: ["man sleeping with an alarm clock", "man running for a bus", "cars in traffic"] },
                { num: 4, text: "Which food is the man eating?", options: ["a bowl of pasta", "a pizza", "a sandwich"] },
                { num: 5, text: "What has the man had problems with?", options: ["a pair of boots", "a pair of gloves", "a pair of socks"] }
            ]
        };

        document.addEventListener('DOMContentLoaded', function () {
            window.listeningCore = new ListeningCore();
            window.listeningCore.initializeTest(ketTest4Part1Data);
            console.log('KET 1 Test 4 Listening Part 1 loaded');
        });
    </script>
</body>

</html>
