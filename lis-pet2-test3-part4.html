            book: 2,
            test: 3,

                q21: 'A',
                q22: 'B',

                q24: 'B',

            displayAnswers: {
                q20: 'B',

                q22: 'B',
                q23: 'C',
                q24: 'B',
                q25: 'B'

            // Detailed Explanations
            detailedExplanations: {
                q20: `<strong>Đáp án: B – listening to a talk (nghe một bài nói chuyện)</strong><br>
                      Alexis nói: <em>"<span class='keyword-highlight'>Then a modern-day explorer who'd written a really popular book about her travels came to my school and told us about the places she'd been to. I knew then I wanted to do what she did</span>."</em> Một nhà thám hiểm hiện đại đến trường anh và kể về những nơi cô ấy đã đến.

                      <strong>✓ B (listening to a talk) là đáp án đúng.</strong>`,
                q21: `<strong>Đáp án: A – he didn't know what to expect (anh không biết phải mong đợi gì)</strong><br>

                      <br><br>

                      <br>
                      <strong>✗ C (he'd never been very far away from home) sai:</strong> Anh đã sống ở New Zealand vài năm, cách gia đình hàng nghìn dặm.

                q22: `<strong>Đáp án: B – to provide scientists with information (cung cấp thông tin cho các nhà khoa học)</strong><br>

            <p><em>Now look at Part Four. For each question, choose the correct answer. Look at questions 20 to 25 now. You have 45 seconds. You will hear an interview with a professional explorer called Alexis Bartoli, who travels to places that few other people visit.</em></p>
            <hr style="margin:10px 0; border-color:#d2cbbc;">
            <p><strong>Woman:</strong> With us today is professional explorer Alexis Bartoli. You spend your life travelling to places that few people have visited before. When did you first want to become an explorer, Alexis?</p>
            <p><strong>Man:</strong> My father loved stories about explorers from the past, so we often watched documentaries on TV about them, but I soon got bored because it'd all happened so long ago. <span class="highlightable" data-q="20">Then a modern-day explorer who'd written a really popular book about her travels came to my school and told us about the places she'd been to. I knew then I wanted to do what she did</span>.</p>
            <p><strong>Woman:</strong> How did you feel before your first expedition?</p>
            <p><strong>Man:</strong> <span class="highlightable" data-q="21">Very anxious!</span> I'd spent a few years studying in New Zealand, thousands of miles from my family, so I was used to being away, but <span class="highlightable" data-q="21">I just couldn't imagine what a day in the life of an explorer would be like</span>. Some of the places I was planning to visit weren't very safe, but that excited me rather than making me feel scared.</p>
            <p><strong>Woman:</strong> You started making films on your expeditions. Why was that?</p>
            <p><strong>Man:</strong> In some places, there were plants and animals that few people had ever seen. I'd already learned about film making at university, so <span class="highlightable" data-q="22">I could easily record these rare species and show the films to science experts when I got home</span>. Later on, I was surprised when TV companies wanted to buy them, but this helped pay for other trips.</p>
            <p><strong>Woman:</strong> What's your favourite part of an expedition?</p>
            <p><strong>Man:</strong> I enjoy so many things, but if I had to choose one, <span class="highlightable" data-q="23">it'd be getting to know members of the local population</span>. Seeing the incredible geography and the environment where they live comes a close second, though. The weather can be a problem as well as a pleasure, so that's not usually top of my list.</p>
            <p><strong>Woman:</strong> Your latest expedition was unusual ...</p>
            <p><strong>Man:</strong> Yes, because up till then, l'd always explored places on land, from rainforests to the world's highest mountains. <span class="highlightable" data-q="24">This time, though, I spent four months at sea on a tiny boat</span>, travelling from America to Australia. After walking alone across the world's largest desert, that felt very different!</p>
            <p><strong>Woman:</strong> What are your plans for the future?</p>
            <p><strong>Man:</strong> I'm not a person who likes going back somewhere l've already explored – I like to keep doing new things. I love what I do though, so it would feel wrong to start thinking about any other kind of career. <span class="highlightable" data-q="25">Actually, l've spent so long abroad that I haven't had time to see much of where I'm from, so that's my next project</span>.</p>
            <p><strong>Woman:</strong> Thanks Alexis.</p>
            <p><em>Now listen again.</em></p>

            `,
