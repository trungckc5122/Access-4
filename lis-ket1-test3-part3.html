<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KET 1 - Test 3 - Listening Part 3</title>
    <link rel="stylesheet" href="listening-pet-common.css" id="styleLink">
</head>

<body>
    <div class="test-wrapper" id="testWrapper">
        <!-- Header -->
        <div class="ielts-header">
            <div class="brand">
                <div class="ielts-logo">KET</div>
                <div class="candidate"></div>
                <div class="audio-controls">
                    <audio id="listeningAudio" controls>
                        <source src="audio/KET 1 - Test 3 Part 3.mp3" type="audio/mpeg">
                    </audio>
                    <select class="speed-select" id="speedSelect">
                        <option value="0.7">0.7x</option>
                        <option value="0.9">0.9x</option>
                        <option value="1.0" selected>1x</option>
                        <option value="1.1">1.1x</option>
                        <option value="1.25">1.25x</option>
                    </select>
                    <span class="volume-icon">🔊</span>
                </div>
            </div>
        </div>

        <!-- Question navigator -->
        <div class="question-nav">
            <div class="nav-buttons" id="navButtons"></div>
        </div>

        <!-- Main area -->
        <div class="main-area" id="mainArea">
            <!-- Transcript panel -->
            <div class="transcript-panel" id="transcriptPanel">
                <div class="panel-header"><span>TRANSCRIPT</span></div>
                <div class="transcript-content font-large" id="transcriptContent"></div>
            </div>
            <div class="resizer" id="resizer"></div>

            <!-- Questions panel -->
            <div class="questions-panel" id="questionsPanel">
                <div class="panel-header">
                    <span>QUESTIONS 11–15</span>
                    <span class="answer-badge" id="answeredCount">0/5 answered</span>
                </div>
                <div class="questions-list font-large centered" id="questionsContent">
                    <div>
                        <h3>PART 3 &nbsp; Questions 11–15</h3>
                        <p><em>For each question, choose the correct answer.</em></p>
                        <p style="margin-bottom:8px;">You will hear Phil talking to his friend Jess about a new sports centre.</p>
                        <div class="notes-box" id="questionsContainer"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Bottom bar -->
        <div class="bottom-bar">
            <button class="btn btn-primary" id="submitBtn">Nộp bài</button>
            <button class="btn btn-success" id="explainBtn" disabled>Xem giải thích</button>
            <button class="btn btn-danger" id="resetBtn">Reset</button>
            <div class="progress" id="progressDisplay">Đã làm: 0/5</div>
        </div>

        <!-- Explanation panel -->
        <div class="explanation-panel" id="explanationPanel">
            <div class="resize-handle" id="explanationResizer"></div>
            <div class="explanation-header">
                <span id="explanationTitle">Giải thích</span>
                <span class="close-btn" id="closeExplanation">✕ Đóng</span>
            </div>
            <div class="explanation-content" id="explanationText"></div>
        </div>
    </div>

    <!-- Context menu -->
    <div class="context-menu" id="contextMenu">
        <div onclick="applyHighlight('yellow')">Highlight vàng</div>
        <div onclick="applyHighlight('green')">Highlight xanh lá</div>
        <div onclick="applyHighlight('pink')">Highlight hồng</div>
        <div onclick="removeHighlight()">Xóa highlight</div>
    </div>

    <script src="core-listening-ket.js"></script>
    <script>
        const ketTest3Part3Data = {
            title: "KET 1 · Test 3 · Listening Part 3",
            type: "multiple-choice",
            part: 3,
            book: 1,
            test: 3,

            answerKey: { q11: 'A', q12: 'B', q13: 'A', q14: 'C', q15: 'B' },
            displayAnswers: { q11: 'A', q12: 'B', q13: 'A', q14: 'C', q15: 'B' },

            detailedExplanations: {
                q11: `<strong>Đáp án: A – She saw a poster</strong><br>
                      Phil hỏi: <em>"Did you hear about the new sports centre on the radio this morning?"</em><br>
                      Jess đáp: <em>"The one that you and your friend Bob went to? No... actually, there was a <span class='keyword-highlight'>poster about it near my work</span>."</em><br><br>
                      <strong>✗ B (A friend of hers works there) sai:</strong> Bạn của Phil là Bob, không phải bạn của Jess.<br>
                      <strong>✗ C (She heard about it on the radio) sai:</strong> Jess không nghe trên radio.<br>
                      <strong>✓ A (She saw a poster) là đúng – Jess thấy poster gần nơi làm việc.</strong>`,

                q12: `<strong>Đáp án: B – It's very expensive</strong><br>
                      Phil nói: <em>"It costs a lot. <span class='keyword-highlight'>Too much.</span>"</em><br>
                      Về không gian: <em>"it's bigger than the old one"</em><br>
                      Về âm nhạc: <em>"especially with the great loud music they play"</em> → Phil thích nhạc to.<br><br>
                      <strong>✗ A (It's too noisy) sai:</strong> Phil thích nhạc to.<br>
                      <strong>✗ C (It's not big enough) sai:</strong> Trung tâm mới lớn hơn trung tâm cũ.<br>
                      <strong>✓ B (It's very expensive) là điều Phil không thích.</strong>`,

                q13: `<strong>Đáp án: A – early in the morning</strong><br>
                      <strong>Phil:</strong> If I can. <span class="highlightable" data-q="13">Mornings are best because it's less busy, especially very early.</span>"</em><br>
                      Về giờ làm việc: <em>"Schools use it during the day, but that's fine because I'm at work then."</em><br>
                      Về cuối tuần: <em>"Weekends are too crowded."</em><br><br>
                      <strong>✗ B (at the weekend) sai:</strong> Cuối tuần quá đông.<br>
                      <strong>✗ C (during working hours) sai:</strong> Phil đi làm trong giờ hành chính.<br>
                      <strong>✓ A (early in the morning) là thời điểm Phil thích nhất.</strong>`,

                q14: `<strong>Đáp án: C – The water's cold</strong><br>
                      Jess nói về bể bơi: <em>"I'd like to enter one of their swimming competitions, but <span class='keyword-highlight'>the heating for the water isn't working, so it's not open yet</span>."</em><br><br>
                      <strong>✗ A (They are cleaning it) sai:</strong> Không đề cập đến việc dọn dẹp.<br>
                      <strong>✗ B (There's a competition) sai:</strong> Jess muốn tham gia cuộc thi nhưng đó không phải lý do bể bơi đóng.<br>
                      <strong>✓ C (The water's cold) là đúng – hệ thống sưởi không hoạt động nên nước lạnh.</strong>`,

                q15: `<strong>Đáp án: B – can get a discount in the café</strong><br>
                      Phil nói về thành viên: <em>"we'll go to the café afterwards – <span class='keyword-highlight'>it's cheaper for members</span>."</em><br>
                      Về giày: <em>"I'm not a member and I need new trainers."</em> → Jess cần giày mới nhưng không phải là yêu cầu bắt buộc.<br>
                      Về lớp học: Phil đề nghị đi gym, không đề cập lớp học miễn phí.<br><br>
                      <strong>✗ A (should buy special shoes) sai:</strong> Jess cần giày mới nhưng không phải yêu cầu của thành viên.<br>
                      <strong>✗ C (needn't pay for exercise classes) sai:</strong> Không đề cập lớp học miễn phí.<br>
                      <strong>✓ B (can get a discount in the café) là đúng – thành viên được giảm giá ở quán café.</strong>`
            },

            transcript: `
            <p><strong>PART 3</strong></p>
            <p><em>For each question, choose the correct answer.</em></p>
            <p>You will hear Phil talking to his friend Jess about a new sports centre.</p>

            <p><strong>Phil:</strong> Hi, Jess. Did you hear about the new sports centre on the radio this morning?<br>
            <strong>Jess:</strong> <span class="highlightable" data-q="11">The one that you and your friend Bob went to? No... actually, there was a poster about it near my work.</span> Is it good?<br>
            <strong>Phil:</strong> <span class="highlightable" data-q="12">Yes, it's bigger than the old one and it's fun, especially with the great loud music they play! It costs a lot. Too much.</span><br>
            <strong>Jess:</strong> Do you go every day?<br>
            <strong>Phil:</strong> If I can. <span class="highlightable" data-q="13">Mornings are best because it's less busy, especially very early.</span> Schools use it during the day, but that's fine because I'm at work then. Weekends are too crowded.<br>
            <strong>Jess:</strong> The pool in the old sports centre's quite dirty, so I'd love to try this new one. I'd like to enter one of their swimming competitions, but <span class="highlightable" data-q="14">the heating for the water isn't working, so it's not open yet.</span><br>
            <strong>Phil:</strong> Let's go to the gym together instead!<br>
            <strong>Jess:</strong> I'm not a member and I need new trainers.<br>
            <strong>Phil:</strong> <span class="highlightable" data-q="15">That doesn't matter. You can join when you get there, and we'll go to the café afterwards – it's cheaper for members. So are the classes.</span><br>
            <strong>Jess:</strong> OK, great.</p>

            <p><em>That is the end of Part Three.</em></p>
            `,

            questions: [
                { num: 11, text: "How did Jess find out about the new sports centre?", options: ["She saw a poster.", "A friend of hers works there.", "She heard about it on the radio."] },
                { num: 12, text: "What doesn't Phil like about the sports centre?", options: ["It's too noisy.", "It's very expensive.", "It's not big enough."] },
                { num: 13, text: "Phil prefers to go to the sports centre", options: ["early in the morning.", "at the weekend.", "during working hours."] },
                { num: 14, text: "Why is the new swimming pool closed at the moment?", options: ["They are cleaning it.", "There's a competition.", "The water's cold."] },
                { num: 15, text: "Members of the sports centre", options: ["should buy special shoes.", "can get a discount in the café.", "needn't pay for exercise classes."] }
            ]
        };

        document.addEventListener('DOMContentLoaded', function () {
            window.listeningCore = new ListeningCore();
            window.listeningCore.initializeTest(ketTest3Part3Data);
            console.log('KET 1 Test 3 Listening Part 3 loaded');
        });
    </script>
</body>

</html>
