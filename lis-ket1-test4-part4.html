<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KET 1 - Test 4 - Listening Part 4</title>
    <link rel="stylesheet" href="listening-pet-common.css" id="styleLink">
</head>

<body>
    <div class="test-wrapper" id="testWrapper">
        <!-- Header -->
        <div class="ielts-header">
            <div class="brand">
                <div class="ielts-logo">KET</div>
                <div class="candidate"></div>
                <div class="audio-controls">
                    <audio id="listeningAudio" controls>
                        <source src="audio/KET 1 - Test 4 Part 4.mp3" type="audio/mpeg">
                    </audio>
                    <select class="speed-select" id="speedSelect">
                        <option value="0.7">0.7x</option>
                        <option value="0.9">0.9x</option>
                        <option value="1.0" selected>1x</option>
                        <option value="1.1">1.1x</option>
                        <option value="1.25">1.25x</option>
                    </select>
                    <span class="volume-icon">🔊</span>
                </div>
            </div>
        </div>

        <!-- Question navigator -->
        <div class="question-nav">
            <div class="nav-buttons" id="navButtons"></div>
        </div>

        <!-- Main area -->
        <div class="main-area" id="mainArea">
            <!-- Transcript panel -->
            <div class="transcript-panel" id="transcriptPanel">
                <div class="panel-header"><span>TRANSCRIPT</span></div>
                <div class="transcript-content font-large" id="transcriptContent"></div>
            </div>
            <div class="resizer" id="resizer"></div>

            <!-- Questions panel -->
            <div class="questions-panel" id="questionsPanel">
                <div class="panel-header">
                    <span>QUESTIONS 16–20</span>
                    <span class="answer-badge" id="answeredCount">0/5 answered</span>
                </div>
                <div class="questions-list font-large centered" id="questionsContent">
                    <div>
                        <h3>PART 4 &nbsp; Questions 16–20</h3>
                        <p><em>For each question, choose the correct answer.</em></p>
                        <div class="notes-box" id="questionsContainer"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Bottom bar -->
        <div class="bottom-bar">
            <button class="btn btn-primary" id="submitBtn">Nộp bài</button>
            <button class="btn btn-success" id="explainBtn" disabled>Xem giải thích</button>
            <button class="btn btn-danger" id="resetBtn">Reset</button>
            <div class="progress" id="progressDisplay">Đã làm: 0/5</div>
        </div>

        <!-- Explanation panel -->
        <div class="explanation-panel" id="explanationPanel">
            <div class="resize-handle" id="explanationResizer"></div>
            <div class="explanation-header">
                <span id="explanationTitle">Giải thích</span>
                <span class="close-btn" id="closeExplanation">✕ Đóng</span>
            </div>
            <div class="explanation-content" id="explanationText"></div>
        </div>
    </div>

    <!-- Context menu -->
    <div class="context-menu" id="contextMenu">
        <div onclick="applyHighlight('yellow')">Highlight vàng</div>
        <div onclick="applyHighlight('green')">Highlight xanh lá</div>
        <div onclick="applyHighlight('pink')">Highlight hồng</div>
        <div onclick="removeHighlight()">Xóa highlight</div>
    </div>

    <script src="core-listening-ket.js"></script>
    <script>
        const ketTest4Part4Data = {
            title: "KET 1 · Test 4 · Listening Part 4",
            type: "multiple-choice",
            part: 4,
            book: 1,
            test: 4,

            answerKey: { q16: 'C', q17: 'B', q18: 'A', q19: 'C', q20: 'A' },
            displayAnswers: { q16: 'C', q17: 'B', q18: 'A', q19: 'C', q20: 'A' },

            detailedExplanations: {
                q16: `<strong>Đáp án: C – The screen isn't bright enough (màn hình không đủ sáng)</strong><br>
                      Người đàn ông nói: <em>"It seems to be working – I can click on websites and type documents and messages, but <span class='keyword-highlight'>it's really difficult to read what I've written on the screen. It's too dark</span>."</em><br>
                      Về tắt máy: <em>"I've tried turning it off and then turning it on again"</em> → Máy vẫn bật được.<br>
                      Về bàn phím: <em>"I can... type documents and messages"</em> → Bàn phím hoạt động.<br><br>
                      <strong>✗ A (The computer won't turn off) sai:</strong> Anh ấy đã thử tắt và bật lại.<br>
                      <strong>✗ B (The keyboard isn't working) sai:</strong> Anh ấy vẫn gõ được.<br>
                      <strong>✓ C (The screen isn't bright enough) là đúng – màn hình tối, khó đọc.</strong>`,

                q17: `<strong>Đáp án: B – at the airport (ở sân bay)</strong><br>
                      Người phụ nữ nói: <em>"He <span class='keyword-highlight'>lands</span> at ten and the trains aren't very frequent in the evenings. So let's go and get him."</em> (lands = hạ cánh – đến sân bay).<br>
                      Về ga tàu: <em>"the trains aren't very frequent"</em> → Không đón ở ga tàu.<br>
                      Về nhà: <em>"Are we going to pick him up or will he come to our flat by train?"</em> → Quyết định đi đón, không về nhà.<br><br>
                      <strong>✗ A (at the railway station) sai:</strong> Tàu không thuận tiện.<br>
                      <strong>✗ C (at their home) sai:</strong> Họ đi đón chứ không về nhà.<br>
                      <strong>✓ B (at the airport) là đúng – họ đi đón ở sân bay vì anh trai hạ cánh lúc 10 giờ.</strong>`,

                q18: `<strong>Đáp án: A – a mountain (núi)</strong><br>
                      Người đàn ông nói: <em>"It's a long time since I crossed it on foot – it was harder than <span class='keyword-highlight'>climbing Mount Everest</span>, which I did not long ago."</em><br>
                      Về sa mạc: Đã đi bộ qua Sahara từ lâu.<br>
                      Về đảo: <em>"But the most fun was living in the jungle on an island – that was the first trip I made."</em> → Chuyến đi đầu tiên, không phải gần nhất.<br><br>
                      <strong>✗ B (a desert) sai:</strong> Đã đi qua Sahara từ lâu.<br>
                      <strong>✗ C (an island) sai:</strong> Đây là chuyến đi đầu tiên.<br>
                      <strong>✓ A (a mountain) là đúng – leo núi Everest gần đây.</strong>`,

                q19: `<strong>Đáp án: C – because it has a good camera (vì camera tốt)</strong><br>
                      Người đàn ông nói về điện thoại cũ: <em>"It's really slow at taking pictures. And the ones I do take aren't clear enough."</em><br>
                      Về điện thoại mới: <em>"But your new phone doesn't look as good as your other one."</em> → Không phải vì đẹp.<br>
                      Về nhẹ: <em>"Mine's really heavy!"</em> → Đây là lý do người phụ nữ muốn điện thoại cũ, không phải lý do anh ấy mua mới.<br><br>
                      <strong>✗ A (because it's really light) sai:</strong> Đây là lý do em gái muốn điện thoại cũ.<br>
                      <strong>✗ B (because it looks modern) sai:</strong> Điện thoại mới trông không đẹp bằng.<br>
                      <strong>✓ C (because it has a good camera) là đúng – chụp ảnh nhanh và rõ nét hơn.</strong>`,

                q20: `<strong>Đáp án: A – pleased (hài lòng)</strong><br>
                      Người đàn ông nói: <em>"I'm glad we discussed our new work schedule at the meeting."</em><br>
                      Người phụ nữ nói: <em>"Me too. I was worried they might offer us fewer hours, so we'd get less money... Well, almost always. I mean, <span class='keyword-highlight'>our hours are actually going up, so we'll earn more</span>."</em><br>
                      Về lo lắng: Họ đã lo lắng trước cuộc họp nhưng kết quả tốt hơn mong đợi.<br>
                      Về mệt mỏi: Không đề cập.<br><br>
                      <strong>✗ B (worried) sai:</strong> Họ đã lo trước cuộc họp, sau cuộc họp thì không.<br>
                      <strong>✗ C (tired) sai:</strong> Không đề cập mệt mỏi.<br>
                      <strong>✓ A (pleased) là đúng – họ hài lòng vì giờ làm tăng, kiếm được nhiều tiền hơn.</strong>`
            },

            transcript: `
            <p><strong>PART 4</strong></p>
            <p><em>For each question, choose the correct answer.</em></p>

            <p><strong>Question 16</strong><br>
            You will hear a man asking for help with his computer. What's the problem with it?<br>
            <strong>Man:</strong> <span class="highlightable" data-q="16">Claire, can you look at my PC for me? It seems to be working – I can click on websites and type documents and messages, but it's really difficult to read what I've written on the screen. It's too dark.</span> I've tried turning it off and then turning it on again, but the problem's still there.</p>

            <p><strong>Question 17</strong><br>
            You will hear a woman talking to her husband. Where are they planning to meet the woman's brother?<br>
            <strong>Woman:</strong> My brother's arriving from California tonight.<br>
            <strong>Man:</strong> Great. Are we going to pick him up or will he come to our flat by train?<br>
            <strong>Woman:</strong> <span class="highlightable" data-q="17">He lands at ten and the trains aren't very frequent in the evenings. So let's go and get him.</span><br>
            <strong>Man:</strong> OK. We should leave home as soon as we get back from work. We mustn't be late for his flight.</p>

            <p><strong>Question 18</strong><br>
            You will hear an explorer talking on the radio. What was the last place that he visited?<br>
            <strong>Man:</strong> <span class="highlightable" data-q="18">I love going to the most extreme places in the world, like the Sahara Desert. It's a long time since I crossed it on foot – it was harder than climbing Mount Everest, which I did not long ago.</span> But the most fun was living in the jungle on an island – that was the first trip I made.</p>

            <p><strong>Question 19</strong><br>
            You will hear a man talking to his sister about his new phone. Why did he choose this phone?<br>
            <strong>Man:</strong> <span class="highlightable" data-q="19">It's really slow at taking pictures. And the ones I do take aren't clear enough.</span><br>
            <strong>Woman:</strong> But your new phone doesn't look as good as your other one. Would you mind giving me your old phone? Mine's really heavy!<br>
            <strong>Man:</strong> Yes, sure!</p>

            <p><strong>Question 20</strong><br>
            You will hear two colleagues talking about a meeting. How do they feel after the meeting?<br>
            <strong>Man:</strong> I'm glad we discussed our new work schedule at the meeting.<br>
            <strong>Woman:</strong> Me too. I was worried they might offer us fewer hours, so we'd get less money.<br>
            <strong>Man:</strong> <span class="highlightable" data-q="20">Yeah, work's always really quiet this time of year. Well, almost always. I mean, our hours are actually going up, so we'll earn more.</span><br>
            <strong>Woman:</strong> I can't remember the last time that happened.</p>

            <p><em>That is the end of Part Four.</em></p>
            `,

            questions: [
                { num: 16, text: "You will hear a man asking for help with his computer. What's the problem with it?", options: ["The computer won't turn off.", "The keyboard isn't working.", "The screen isn't bright enough."] },
                { num: 17, text: "You will hear a woman talking to her husband. Where are they planning to meet the woman's brother?", options: ["at the railway station", "at the airport", "at their home"] },
                { num: 18, text: "You will hear an explorer talking on the radio. What was the last place that he visited?", options: ["a mountain", "a desert", "an island"] },
                { num: 19, text: "You will hear a man talking to his sister about his new phone. Why did he choose this phone?", options: ["because it's really light", "because it looks modern", "because it has a good camera"] },
                { num: 20, text: "You will hear two colleagues talking about a meeting. How do they feel after the meeting?", options: ["pleased", "worried", "tired"] }
            ]
        };

        document.addEventListener('DOMContentLoaded', function () {
            window.listeningCore = new ListeningCore();
            window.listeningCore.initializeTest(ketTest4Part4Data);
            console.log('KET 1 Test 4 Listening Part 4 loaded');
        });
    </script>
</body>

</html>
