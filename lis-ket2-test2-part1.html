<head>

    <link rel="stylesheet" href="listening-pet-common.css" id="styleLink">
</head>

<body>
    <div class="test-wrapper" id="testWrapper">
        <!-- Header -->
        <div class="ielts-header">

                <div class="candidate"></div>
                <div class="audio-controls">
                    <audio id="listeningAudio" controls>

                    </audio>

                        <option value="0.7">0.7x</option>
                        <option value="0.9">0.9x</option>

                        <option value="1.25">1.25x</option>
                    </select>
                    <span class="volume-icon">🔊</span>
                </div>
            </div>
        </div>

        <!-- Question navigator -->
        <div class="question-nav">
            <div class="nav-buttons" id="navButtons"></div>
        </div>

        <!-- Main area -->
        <div class="main-area" id="mainArea">

            <div class="transcript-panel" id="transcriptPanel">

                <div class="transcript-content font-large" id="transcriptContent"></div>
            </div>
            <div class="resizer" id="resizer"></div>

            <!-- Questions panel -->
            <div class="questions-panel" id="questionsPanel">
                <div class="panel-header">
                    <span>QUESTIONS 1–5</span>
                    <span class="answer-badge" id="answeredCount">0/5 answered</span>
                </div>

                    </div>
                </div>
            </div>
        </div>

        <!-- Bottom bar -->
        <div class="bottom-bar">
            <button class="btn btn-primary" id="submitBtn">Nộp bài</button>
            <button class="btn btn-success" id="explainBtn" disabled>Xem giải thích</button>
            <button class="btn btn-danger" id="resetBtn">Reset</button>
            <div class="progress" id="progressDisplay">Đã làm: 0/5</div>
        </div>

        <!-- Explanation panel -->
        <div class="explanation-panel" id="explanationPanel">
            <div class="resize-handle" id="explanationResizer"></div>
            <div class="explanation-header">
                <span id="explanationTitle">Giải thích</span>

        <div onclick="applyHighlight('green')">Highlight xanh lá</div>
        <div onclick="applyHighlight('pink')">Highlight hồng</div>
        <div onclick="removeHighlight()">Xóa highlight</div>
    </div>

    <script src="core-listening-ket.js"></script>
    <script>
        const ketTest2Part1Data = {
            title: "KET 2 · Test 2 · Listening Part 1",
            type: "multiple-choice",
            part: 1,
            book: 2,
            test: 2,

            answerKey: { q1: 'C', q2: 'C', q3: 'B', q4: 'B', q5: 'A' },
            displayAnswers: { q1: 'C', q2: 'C', q3: 'B', q4: 'B', q5: 'A' },

            detailedExplanations: {
                q1: `<strong>Đáp án: C – Private Car (xe riêng)</strong><br>
                      Người phụ nữ nói: <em>"Richard! What are you doing here? I was planning to pick you up from the airport at 3 o'clock!"</em><br>

                      <strong>✗ B (Taxi) sai:</strong> Người phụ nữ nói taxi đắt nhưng Richard không đi taxi.<br>
                      <strong>✓ C (Private Car) là đúng – đồng nghiệp Andy chở về ("gave me a lift").</strong>`,

                q2: `<strong>Đáp án: C – River (cầu/sông)</strong><br>
                      Người đàn ông hỏi: <em>"Do you like your new flat, Amanda?"</em><br>

                      <strong>✗ A (Grocery shop/store) sai:</strong> Cửa hàng cách 10 phút đi bộ, không phải ngay bên cạnh.<br>
                      <strong>✗ B (Train station) sai:</strong> Đây là nơi ở cũ của cô ấy ("My old one was next to a railway station").<br>
                      <strong>✓ C (River) là đúng – căn hộ mới bên cạnh sông ("beside the river").</strong>`,

                q3: `<strong>Đáp án: B – Police officer (cảnh sát)</strong><br>

                q4: `<strong>Đáp án: B – T-shirt with stars (áo phông có ngôi sao)</strong><br>
                      Người con trai gợi ý: <em>"Why don't you get your little brother this T-shirt, Daisy? I like the stars on it."</em><br>

                      <strong>✗ A (T-shirt with drums) sai:</strong> Daisy thích nhưng không chọn.<br>
                      <strong>✗ C (T-shirt with a lion) sai:</strong> Daisy nói là "unusual" nhưng cuối cùng chọn áo ngôi sao.<br>
                      <strong>✓ B (T-shirt with stars) là đúng – đây là áo người con trai gợi ý ("the one you found").</strong>`,

                q5: `<strong>Đáp án: A – In a drawer (trong ngăn kéo)</strong><br>
                      Người đàn ông hỏi: <em>"Lisa, I can't find my car keys. Have you seen them?"</em><br>

                      <strong>✗ C (On a table) sai:</strong> Anh ấy để trên bàn nhưng bây giờ không thấy.<br>
                      <strong>✓ A (In a drawer) là đúng – chìa khóa trong ngăn kéo bếp ("In this drawer in the kitchen").</strong>`

            transcript: `
            <p><strong>PART 1</strong></p>

            <strong>Woman:</strong> Yes, it takes ten minutes to walk to the nearest shop, but I don't mind that.<br>
            <strong>Man:</strong> Great!<br>
            <em>Now listen again. [repeat]</em></p>

            <p><strong>Question 3</strong><br>
            <strong>Woman:</strong> You look tired, Paul. Has work been busy?<br>
            <strong>Man:</strong> <span class="highlightable" data-q="3">Yes, very. Several cars were stolen in this area this week, so we've had a lot of extra work to do.</span> Fortunately, we found them. A garage is checking them, but they seem OK.<br>
            <strong>Woman:</strong> So now can you have a rest?<br>
            <strong>Man:</strong> Yes, I'm going to spend all weekend at home playing the piano.<br>
            <em>Now listen again. [repeat]</em></p>

            <p><strong>Question 4</strong><br>
            <strong>Boy:</strong> Why don't you get your little brother this T-shirt, Daisy? I like the stars on it.<br>
            <strong>Girl:</strong> Yes, but that one with a lion's head is very unusual. And I love this one too – with a drum on it.<br>
            <strong>Boy:</strong> So, which one would he prefer, do you think?<br>
            <strong>Girl:</strong> <span class="highlightable" data-q="4">Probably the one you found. I'll get that one.</span><br>
            <em>Now listen again. [repeat]</em></p>

            <p><strong>Question 5</strong><br>
            <strong>Man:</strong> Lisa, I can't find my car keys. Have you seen them?<br>
            <strong>Woman:</strong> Have you looked on the bookcase? You sometimes leave them on top of it.<br>
            <strong>Man:</strong> Yes, but they aren't there. I left them on the kitchen table, but I can't see them now.<br>

            <em>Now listen again. [repeat]</em></p>
