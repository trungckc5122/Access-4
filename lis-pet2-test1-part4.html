<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PET 2 - Test 1 - Part 4</title>
    <link rel="stylesheet" href="listening-pet-common.css" id="styleLink">
</head>
<body>
<div class="test-wrapper" id="testWrapper">
    <!-- Header -->
    <div class="ielts-header">
        <div class="brand">
            <div class="ielts-logo">PET</div>
            <div class="candidate">B1 Preliminary 2 · Test 1 · Part 4</div>
            <div class="audio-controls">
                <audio id="listeningAudio" controls>
                    <source src="B1 Preliminary 2 - Test 1 Part 4.mp3" type="audio/mpeg">
                    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg">
                </audio>
                <select class="speed-select" id="speedSelect">
                    <option value="0.7">0.7x</option>
                    <option value="0.9">0.9x</option>
                    <option value="1.0" selected>1x</option>
                    <option value="1.1">1.1x</option>
                    <option value="1.25">1.25x</option>
                </select>
                <span class="volume-icon">🔊</span>
            </div>
        </div>
        <div class="font-controls">
            <button class="font-btn" id="fontSmall">A-</button>
            <button class="font-btn" id="fontMedium">A</button>
            <button class="font-btn active" id="fontLarge">A+</button>
        </div>
        <div class="mode-toggle" id="modeToggleContainer">
            <span class="mode-label">Hiện đại</span>
            <label class="mode-switch" title="Chuyển đổi chế độ Cổ điển/Hiện đại">
                <input type="checkbox" id="modeToggle">
                <span class="mode-slider"></span>
            </label>
            <span class="mode-label">Cổ điển</span>
        </div>
        <button class="theme-toggle-btn" id="themeToggle" title="Chuyển đổi Dark/Light mode">
            <span class="icon-moon">🌙</span>
            <span class="icon-sun">☀️</span>
        </button>
    </div>

    <!-- Question navigator (20-25) -->
    <div class="question-nav">
        <span style="font-weight:600; color:#1e3a5f;">Câu 20-25:</span>
        <div class="nav-buttons" id="navButtons"></div>
    </div>

    <!-- Main area -->
    <div class="main-area" id="mainArea">
        <!-- Transcript panel (ẩn ban đầu) -->
        <div class="transcript-panel" id="transcriptPanel">
            <div class="panel-header">
                <span>TRANSCRIPT</span>
            </div>
            <div class="transcript-content font-large" id="transcriptContent"></div>
        </div>
        <div class="resizer" id="resizer"></div>

        <!-- Questions panel -->
        <div class="questions-panel" id="questionsPanel">
            <div class="panel-header">
                <span>QUESTIONS 20-25</span>
                <span class="answer-badge" id="answeredCount">0/6 answered</span>
            </div>
            <div class="questions-list font-large centered" id="questionsContent">
                <div>
                    <h3>PART 4 Questions 20-25</h3>
                    <p><em>Choose the correct answer (A, B or C).</em></p>

                    <div class="notes-box" id="questionsContainer">
                        <!-- Các câu hỏi sẽ được tạo bằng JavaScript -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bottom bar -->
    <div class="bottom-bar">
        <button class="btn btn-primary" id="submitBtn">Nộp bài</button>
        <button class="btn btn-success" id="explainBtn" disabled>Xem giải thích</button>
        <button class="btn btn-danger" id="resetBtn">Reset tất cả</button>
        <div class="progress" id="progressDisplay">Đã làm: 0/6</div>
    </div>

    <!-- Explanation panel -->
    <div class="explanation-panel" id="explanationPanel">
        <div class="resize-handle" id="explanationResizer"></div>
        <div class="explanation-header">
            <span id="explanationTitle">Giải thích</span>
            <span class="close-btn" id="closeExplanation">✕ Đóng</span>
        </div>
        <div class="explanation-content" id="explanationText"></div>
    </div>
</div>

<!-- Context Menu for Highlighting -->
<div class="context-menu" id="contextMenu">
    <div onclick="applyHighlight('yellow')">Highlight vàng</div>
    <div onclick="applyHighlight('green')">Highlight xanh lá</div>
    <div onclick="applyHighlight('pink')">Highlight hồng</div>
    <div onclick="removeHighlight()">Xóa highlight</div>
</div>

<script>
    (function() {
        // ---------- ANSWER KEY ----------
        const answerKey = {
            q20: 'A',
            q21: 'A',
            q22: 'B',
            q23: 'C',
            q24: 'C',
            q25: 'A'
        };

        const displayAnswers = { ...answerKey };

        // ---------- GIẢI THÍCH CHI TIẾT ----------
        const detailedExplanations = {
            q20: `<strong>Đáp án: A – receiving a camera as a gift</strong><br>
                  James giải thích niềm đam mê bắt đầu khi: <em>"And one day <span class='keyword-highlight'>my uncle bought me a camera, and from then on I started taking pictures.</span>"</em><br><br>
                  <strong>✗ B (seeing his mother taking photographs) không đúng:</strong> Mẹ anh là một họa sĩ (painter), không phải nhiếp ảnh gia.<br>
                  <strong>✗ C (attending a photography exhibition) không đúng:</strong> Anh đi xem triển lãm nghệ thuật nói chung, không phải triển lãm nhiếp ảnh.`,
            q21: `<strong>Đáp án: A – He had taken photos in it before.</strong><br>
                  James nói về công viên: <em>"You'd be amazed how much wildlife there is, and <span class='keyword-highlight'>I've managed to get some fantastic pictures there over the years.</span>"</em><br><br>
                  <strong>✗ B (Someone he knew recommended it to him) không đúng:</strong> Không có thông tin ai giới thiệu.<br>
                  <strong>✗ C (It's always been well known for its natural beauty) không đúng:</strong> Anh nói đó <em>"không phải là nơi hấp dẫn nhất"</em>.`,
            q22: `<strong>Đáp án: B – pleased to meet a famous photographer.</strong><br>
                  Phần hay nhất sau khi thắng giải: <em>"<span class='keyword-highlight'>The best bit was being introduced to a well-known guy who takes pictures for an international magazine</span> – I got lots of tips"</em>.<br><br>
                  <strong>✗ A (keen to tell his parents about his achievement) không đúng:</strong> Bố mẹ đã nhận được cuộc gọi thông báo trước.<br>
                  <strong>✗ C (surprised because he hadn't won in previous competitions) không đúng:</strong> Anh ngạc nhiên vì <em>"chưa bao giờ tham gia cuộc thi nào trước đó"</em>.`,
            q23: `<strong>Đáp án: C – It teaches people something new.</strong><br>
                  James nói: <em>"Photos are more than just pretty pictures. They should be worth looking at, and <span class='keyword-highlight'>help you learn things about life.</span>"</em><br><br>
                  <strong>✗ A (It needs plenty of planning) không đúng:</strong> Anh nói "không bao giờ biết mình sẽ thấy gì".<br>
                  <strong>✗ B (It must be beautiful to look at) không đúng:</strong> Anh khẳng định ảnh <em>"hơn cả những bức hình đẹp"</em>.`,
            q24: `<strong>Đáp án: C – it's a great social activity.</strong><br>
                  James nhấn mạnh: <em>"...<span class='keyword-highlight'>there are lots of clubs, and it's really fun doing it with other people.</span>"</em><br><br>
                  <strong>✗ A (it involves travelling to interesting places) không đúng:</strong> Anh nói có thể chụp ảnh tuyệt vời <em>"gần nhà"</em>.<br>
                  <strong>✗ B (it can become a successful career) không đúng:</strong> Anh đang giải thích tại sao đó là sở thích tốt, không phải nghề nghiệp.`,
            q25: `<strong>Đáp án: A – Spend a lot of time taking pictures.</strong><br>
                  Lời khuyên cốt lõi: <em>"...<span class='keyword-highlight'>nothing's better than getting out there and getting experience.</span>"</em><br><br>
                  <strong>✗ B (Do a course to get the right skills) không đúng:</strong> James nói anh <em>"không học kỹ năng thông qua khóa học"</em>.<br>
                  <strong>✗ C (Get the best equipment possible) không đúng:</strong> Anh nói trang thiết bị tối tân <em>"thực sự không cần thiết"</em>.`
        };

        // ---------- TRANSCRIPT ----------
        const transcriptHTML = `
            <p><strong>Woman:</strong> Today, I'm joined by 20-year-old James Thomson, who's won a national photography competition with his spectacular photograph of a fish jumping out of the water. James, how did you first become interested in photography?</p>
            <p><strong>Man:</strong> Well, I grew up enjoying the countryside and wildlife. My mother's a painter, and often took me to art exhibitions so I think a love of being creative comes from her. <span class="highlightable" data-q="20">And one day my uncle bought me a camera, and from then on I started taking pictures.</span> My mum was really pleased.</p>
            <p><strong>Woman:</strong> And where did you take your prize-winning photo?</p>
            <p><strong>Man:</strong> Actually, in a park in my city, where my friends and I used to play. It's not the most attractive place, even though it's really improved a lot recently and the lake where I took the picture was made bigger. You'd be amazed how much wildlife there is, and <span class="highlightable" data-q="21">I've managed to get some fantastic pictures there over the years.</span> Everyone seemed to like them.</p>
            <p><strong>Woman:</strong> How did you feel about winning the competition?</p>
            <p><strong>Man:</strong> Honestly, I was shocked – I'd never entered one before. My parents were really excited because they got the phone call saying I'd won. <span class="highlightable" data-q="22">The best bit was being introduced to a well-known guy who takes pictures for an international magazine</span> – I got lots of tips, and I've gone on to do more competitions since.</p>
            <p><strong>Woman:</strong> Great! So, what makes a good photo, in your opinion?</p>
            <p><strong>Man:</strong> Well, I hope my picture shows that wildlife is still around even in the middle of a city. And that's what I like. <span class="highlightable" data-q="23">Photos are more than just pretty pictures. They should be worth looking at, and help you learn things about life.</span> So I'm always ready because you never know what you'll see!</p>
            <p><strong>Woman:</strong> True! Why's photography such a popular hobby?</p>
            <p><strong>Man:</strong> Well, many people have this idea of a photographer alone out on a mountain somewhere, but actually, <span class="highlightable" data-q="24">there are lots of clubs, and it's really fun doing it with other people.</span> It's easy to do anywhere – even though experts earn a lot taking pictures all over the world, ordinary people can also get wonderful pictures closer to home.</p>
            <p><strong>Woman:</strong> Indeed! So James, finally – what advice do you have for young photographers?</p>
            <p><strong>Man:</strong> Find out what works and what doesn't. I didn't learn my skills by taking a course – <span class="highlightable" data-q="25">nothing's better than getting out there and getting experience.</span> Of course, there's lots of fantastic equipment available but it's really not necessary and most phones take great pictures.</p>
            <p><strong>Woman:</strong> James – many thanks ...</p>
            <p><em>Now listen again.</em></p>
            <p style="color:#666;">That is the end of Part Four.<br>That is the end of the test.</p>
        `;

        // ---------- Dữ liệu câu hỏi ----------
        const questionsData = [
            { num: 20, text: "What made James become interested in photography?", options: [
                "receiving a camera as a gift",
                "seeing his mother taking photographs",
                "attending a photography exhibition"
            ]},
            { num: 21, text: "What does James say about the park where he took his prize-winning photo?", options: [
                "He had taken photos in it before.",
                "Someone he knew recommended it to him.",
                "It's always been well known for its natural beauty."
            ]},
            { num: 22, text: "After winning the competition, James felt", options: [
                "keen to tell his parents about his achievement.",
                "pleased to meet a famous photographer.",
                "surprised because he hadn't won in previous competitions."
            ]},
            { num: 23, text: "In James' opinion, what is most important for a good photograph?", options: [
                "It needs plenty of planning.",
                "It must be beautiful to look at.",
                "It teaches people something new."
            ]},
            { num: 24, text: "James thinks that photography is a good hobby because", options: [
                "it involves travelling to interesting places.",
                "it can become a successful career.",
                "it's a great social activity."
            ]},
            { num: 25, text: "What advice does James have for other photographers?", options: [
                "Spend a lot of time taking pictures.",
                "Do a course to get the right skills.",
                "Get the best equipment possible."
            ]}
        ];

        // ---------- STATE ----------
        let examSubmitted = false;
        let explanationMode = false;
        const audio = document.getElementById('listeningAudio');
        const speedSelect = document.getElementById('speedSelect');

        speedSelect.addEventListener('change', function() {
            audio.playbackRate = parseFloat(this.value);
        });

        function getUserAnswer(q) {
            const radios = document.getElementsByName(`q${q}`);
            for (let radio of radios) {
                if (radio.checked) return radio.value;
            }
            return null;
        }

        function isAnswerCorrect(q, userAnswer) {
            return userAnswer === answerKey[`q${q}`];
        }

        function updateAnswerCount() {
            let answered = 0;
            for (let i = 20; i <= 25; i++) if (getUserAnswer(i)) answered++;
            document.getElementById('answeredCount').textContent = `${answered}/6 answered`;
            document.getElementById('progressDisplay').textContent = `Đã làm: ${answered}/6`;
            for (let i = 20; i <= 25; i++) {
                const btn = document.querySelector(`.nav-btn[data-question="${i}"]`);
                if (btn) {
                    btn.classList.remove('answered', 'unanswered');
                    btn.classList.add(getUserAnswer(i) ? 'answered' : 'unanswered');
                }
            }
        }

        function createNavButtons() {
            const nav = document.getElementById('navButtons');
            nav.innerHTML = '';
            for (let i = 20; i <= 25; i++) {
                const btn = document.createElement('button');
                btn.className = 'nav-btn unanswered';
                btn.textContent = i;
                btn.dataset.question = i;
                btn.addEventListener('click', function() {
                    const q = this.dataset.question;
                    document.getElementById(`question-${q}`)?.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                });
                nav.appendChild(btn);
            }
        }

        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            questionsData.forEach(q => {
                const div = document.createElement('div');
                div.className = 'question-item';
                div.id = `question-${q.num}`;
                div.innerHTML = `
                    <div class="question-text">${q.num}. ${q.text}</div>
                    <div class="options">
                        ${q.options.map((opt, index) => `
                            <div class="option">
                                <input type="radio" name="q${q.num}" value="${String.fromCharCode(65 + index)}" id="q${q.num}${String.fromCharCode(65 + index)}">
                                <label for="q${q.num}${String.fromCharCode(65 + index)}">${String.fromCharCode(65 + index)}. ${opt}</label>
                            </div>
                        `).join('')}
                    </div>
                    <span class="eye-icon" data-question="${q.num}">👁️</span>
                `;
                container.appendChild(div);
            });
        }

        function markAnswers() {
            for (let i = 20; i <= 25; i++) {
                const questionDiv = document.getElementById(`question-${i}`);
                if (!questionDiv) continue;
                const user = getUserAnswer(i);
                const correct = isAnswerCorrect(i, user);
                questionDiv.classList.remove('correct', 'incorrect');
                const oldBadge = questionDiv.querySelector('.correct-answer-badge');
                if (oldBadge) oldBadge.remove();
                if (correct) {
                    questionDiv.classList.add('correct');
                } else {
                    questionDiv.classList.add('incorrect');
                    const badge = document.createElement('span');
                    badge.className = 'correct-answer-badge';
                    badge.textContent = `Đáp án đúng: ${displayAnswers[`q${i}`]}`;
                    questionDiv.appendChild(badge);
                }
            }
        }

        function showExplanation(questionNum) {
            if (!explanationMode && !examSubmitted) return;

            document.querySelectorAll('.transcript-highlight').forEach(el => el.classList.remove('transcript-highlight'));
            document.querySelectorAll('.keyword-highlight').forEach(el => el.classList.remove('keyword-highlight'));

            const highlightSpans = document.querySelectorAll(`.highlightable[data-q="${questionNum}"]`);
            highlightSpans.forEach(span => {
                const parentP = span.closest('p');
                if (parentP) parentP.classList.add('transcript-highlight');
                span.classList.add('keyword-highlight');
                span.scrollIntoView({ behavior: 'smooth', block: 'center' });
                span.classList.add('scroll-highlight');
                setTimeout(() => span.classList.remove('scroll-highlight'), 1000);
            });

            document.getElementById('explanationPanel').classList.add('show');
            document.getElementById('explanationTitle').textContent = `Giải thích câu ${questionNum}`;
            let html = detailedExplanations[`q${questionNum}`] || `<strong>Đáp án: ${displayAnswers[`q${questionNum}`]}</strong><br>`;
            if (examSubmitted) {
                const user = getUserAnswer(questionNum) || '(chưa chọn)';
                const isCorrect = isAnswerCorrect(questionNum, user);
                html += `<div style="margin-top:10px;padding:10px; background:${isCorrect ? '#e8f5e8' : '#ffebee'}; border-radius:5px;">`;
                html += `<strong>Câu trả lời của bạn:</strong> ${user}<br>`;
                if (!isCorrect) html += `<strong>Đáp án đúng:</strong> ${displayAnswers[`q${questionNum}`]}`;
                else html += `<strong>✅ Đúng!</strong>`;
                html += `</div>`;
            }
            document.getElementById('explanationText').innerHTML = html;
        }

        function resetAll() {
            examSubmitted = false;
            explanationMode = false;
            for (let i = 20; i <= 25; i++) {
                const radios = document.getElementsByName(`q${i}`);
                radios.forEach(r => {
                    r.checked = false;
                    r.disabled = false;
                });
                const questionDiv = document.getElementById(`question-${i}`);
                if (questionDiv) {
                    questionDiv.classList.remove('correct', 'incorrect');
                    const badge = questionDiv.querySelector('.correct-answer-badge');
                    if (badge) badge.remove();
                }
            }
            const mainArea = document.getElementById('mainArea');
            mainArea.classList.remove('show-transcript');
            document.getElementById('transcriptContent').innerHTML = '';
            document.querySelectorAll('.eye-icon').forEach(icon => icon.style.display = 'none');
            document.querySelectorAll('.transcript-highlight').forEach(el => el.classList.remove('transcript-highlight'));
            document.querySelectorAll('.keyword-highlight').forEach(el => el.classList.remove('keyword-highlight'));
            document.getElementById('submitBtn').disabled = false;
            document.getElementById('submitBtn').textContent = 'Nộp bài';
            document.getElementById('explainBtn').disabled = true;
            document.getElementById('explainBtn').textContent = 'Xem giải thích';
            document.getElementById('explanationPanel').classList.remove('show');
            updateAnswerCount();
        }

        document.querySelectorAll('input[type="radio"]').forEach(radio => {
            radio.addEventListener('change', updateAnswerCount);
        });

        document.getElementById('submitBtn').addEventListener('click', function() {
            if (examSubmitted) return;
            let unanswered = [];
            for (let i = 20; i <= 25; i++) if (!getUserAnswer(i)) unanswered.push(i);
            if (unanswered.length > 0 && !confirm(`Bạn còn ${unanswered.length} câu chưa chọn. Nộp bài?`)) return;

            examSubmitted = true;
            const mainArea = document.getElementById('mainArea');
            mainArea.classList.add('show-transcript');
            document.getElementById('transcriptContent').innerHTML = transcriptHTML;
            markAnswers();
            document.getElementById('submitBtn').disabled = true;
            document.getElementById('submitBtn').textContent = 'Đã nộp bài';
            document.getElementById('explainBtn').disabled = false;

            let correctCount = 0;
            for (let i = 20; i <= 25; i++) {
                if (isAnswerCorrect(i, getUserAnswer(i))) correctCount++;
            }
            document.getElementById('explanationPanel').classList.add('show');
            document.getElementById('explanationTitle').textContent = 'KẾT QUẢ';
            document.getElementById('explanationText').innerHTML = `
                <h4>Bạn đã nộp bài</h4>
                <p><strong>Đúng:</strong> ${correctCount}/6</p>
                <p>Nhấn vào nút <strong>Xem giải thích</strong> để xem hiệu ứng và đáp án đúng.</p>
            `;
            saveToDashboard();
            document.querySelectorAll('input[type="radio"]').forEach(el => el.disabled = true);
        });

        function saveToDashboard() {
            if (!examSubmitted) return;
            const details = [];
            let correct = 0;
            for (let i = 20; i <= 25; i++) {
                const user = getUserAnswer(i) || '(trống)';
                const isOk = isAnswerCorrect(i, getUserAnswer(i));
                if (isOk) correct++;
                details.push({ question: i, user: user, correct: displayAnswers[`q${i}`], isCorrect: isOk });
            }
            const partData = { partId: 4, name: 'Part 4', totalQuestions: 6, correctCount: correct, details };
            localStorage.setItem('pet_listening_book2_test1_part4', JSON.stringify(partData));
            console.log('✅ Đã lưu pet_listening_book2_test1_part4');
        }

        document.getElementById('explainBtn').addEventListener('click', function() {
            if (!examSubmitted) return;
            explanationMode = true;
            document.querySelectorAll('.eye-icon, .correct-answer-badge').forEach(el => el.style.display = 'inline-block');
            this.disabled = true;
            this.textContent = 'Đang xem giải thích';
            document.getElementById('explanationPanel').classList.remove('show');
        });

        document.getElementById('resetBtn').addEventListener('click', function() {
            if (confirm('Reset tất cả câu trả lời?')) resetAll();
        });

        document.getElementById('closeExplanation').addEventListener('click', function() {
            document.getElementById('explanationPanel').classList.remove('show');
            document.querySelectorAll('.transcript-highlight').forEach(el => el.classList.remove('transcript-highlight'));
            document.querySelectorAll('.keyword-highlight').forEach(el => el.classList.remove('keyword-highlight'));
        });

        document.addEventListener('click', function(e) {
            if (e.target.classList.contains('eye-icon')) {
                const q = e.target.dataset.question;
                showExplanation(q);
            }
        });

        function setFontSize(size) {
            document.querySelectorAll('.font-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`font${size.charAt(0).toUpperCase()+size.slice(1)}`).classList.add('active');
            document.querySelectorAll('.transcript-content, .questions-list').forEach(el => {
                el.className = `transcript-content font-${size}`;
                if (el.classList.contains('questions-list')) {
                    el.classList.add('centered');
                }
            });
        }
        document.getElementById('fontSmall').addEventListener('click', () => setFontSize('small'));
        document.getElementById('fontMedium').addEventListener('click', () => setFontSize('medium'));
        document.getElementById('fontLarge').addEventListener('click', () => setFontSize('large'));

        const transcriptPanel = document.getElementById('transcriptPanel');
        const questionsPanel = document.getElementById('questionsPanel');
        const resizer = document.getElementById('resizer');
        let isResizing = false;
        resizer.addEventListener('mousedown', () => { isResizing = true; document.body.style.cursor = 'col-resize'; });
        document.addEventListener('mousemove', (e) => {
            if (!isResizing) return;
            const mainArea = document.getElementById('mainArea');
            const rect = mainArea.getBoundingClientRect();
            let leftWidth = e.clientX - rect.left - 4;
            if (leftWidth < 250) leftWidth = 250;
            if (leftWidth > rect.width - 250) leftWidth = rect.width - 250;
            transcriptPanel.style.width = leftWidth + 'px';
            questionsPanel.style.width = (rect.width - leftWidth - 8) + 'px';
        });
        document.addEventListener('mouseup', () => { isResizing = false; document.body.style.cursor = 'default'; });

        createNavButtons();
        renderQuestions();
        updateAnswerCount();
        document.querySelectorAll('.eye-icon').forEach(icon => icon.style.display = 'none');
        setFontSize('large');

        // ==================== MODE TOGGLE (Classic/Modern) ====================
        const modeToggle = document.getElementById('modeToggle');
        const styleLink = document.getElementById('styleLink');
        const testWrapper = document.getElementById('testWrapper');
        const html = document.documentElement;
        const savedMode = localStorage.getItem('pet-mode');

        function setMode(isClassic) {
            if (isClassic) {
                styleLink.href = 'listening-pet-common1.css';
                testWrapper.classList.add('classic-mode');
                html.removeAttribute('data-theme');
                localStorage.removeItem('pet-theme');
            } else {
                styleLink.href = 'listening-pet-common.css';
                testWrapper.classList.remove('classic-mode');
            }
            localStorage.setItem('pet-mode', isClassic ? 'classic' : 'modern');
        }

        if (savedMode === 'classic') {
            modeToggle.checked = true;
            setMode(true);
        } else {
            modeToggle.checked = false;
            setMode(false);
        }

        modeToggle.addEventListener('change', () => {
            setMode(modeToggle.checked);
        });

        // ==================== THEME TOGGLE ====================
        const themeToggle = document.getElementById('themeToggle');
        const savedTheme = localStorage.getItem('pet-theme');
        if (savedTheme === 'dark' && !testWrapper.classList.contains('classic-mode')) {
            html.setAttribute('data-theme', 'dark');
        }
        themeToggle.addEventListener('click', () => {
            if (testWrapper.classList.contains('classic-mode')) {
                return;
            }
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('pet-theme', newTheme);
        });
    })();

    // ========== CHỨC NĂNG HIGHLIGHT THỦ CÔNG ==========
    let selectedRange = null;
    const contextMenu = document.getElementById('contextMenu');

    document.getElementById('transcriptContent')?.addEventListener('contextmenu', handleRightClick);
    document.getElementById('questionsContent')?.addEventListener('contextmenu', handleRightClick);

    function handleRightClick(e) {
        e.preventDefault();
        const selection = window.getSelection();
        if (selection.toString().trim()) {
            selectedRange = selection.getRangeAt(0);
            contextMenu.style.left = e.pageX + 'px';
            contextMenu.style.top = e.pageY + 'px';
            contextMenu.style.display = 'block';
        }
    }

    document.addEventListener('click', () => {
        contextMenu.style.display = 'none';
        selectedRange = null;
    });

    window.applyHighlight = function(color) {
        if (!selectedRange) return;
        try {
            const span = document.createElement('span');
            span.className = `highlight-${color}`;
            span.appendChild(selectedRange.extractContents());
            selectedRange.insertNode(span);
        } catch (e) {
            console.warn('Không thể highlight đoạn này');
        }
        contextMenu.style.display = 'none';
        selectedRange = null;
    };

    window.removeHighlight = function() {
        if (!selectedRange) return;
        try {
            const iterator = document.createNodeIterator(
                selectedRange.commonAncestorContainer,
                NodeFilter.SHOW_ELEMENT,
                {
                    acceptNode: function(node) {
                        if (node.classList && (node.classList.contains('highlight-yellow') || node.classList.contains('highlight-green') || node.classList.contains('highlight-pink'))) {
                            if (selectedRange.intersectsNode(node)) {
                                return NodeFilter.FILTER_ACCEPT;
                            }
                        }
                        return NodeFilter.FILTER_REJECT;
                    }
                }
            );
            let node;
            while (node = iterator.nextNode()) {
                node.replaceWith(...node.childNodes);
            }
        } catch (e) {
            console.warn('Không thể xoá highlight');
        }
        contextMenu.style.display = 'none';
        selectedRange = null;
    };

    // Resizable explanation panel logic
    (function() {
        const expPanel = document.getElementById('explanationPanel');
        const expResizer = document.getElementById('explanationResizer');
        let isResizingExp = false;
        let startYExp, startHeightExp;

        if (expResizer && expPanel) {
            expResizer.addEventListener('mousedown', (e) => {
                isResizingExp = true;
                startYExp = e.clientY;
                startHeightExp = expPanel.offsetHeight;
                document.body.style.cursor = 'ns-resize';
                document.body.style.userSelect = 'none';
            });

            document.addEventListener('mousemove', (e) => {
                if (!isResizingExp) return;
                const dy = startYExp - e.clientY;
                const newHeight = startHeightExp + dy;
                if (newHeight > 100 && newHeight < window.innerHeight * 0.8) {
                    expPanel.style.maxHeight = newHeight + 'px';
                    expPanel.style.height = newHeight + 'px';
                }
            });

            document.addEventListener('mouseup', () => {
                isResizingExp = false;
                document.body.style.cursor = 'default';
                document.body.style.userSelect = 'auto';
            });
        }
    })();
</script>
</body>
</html>
