<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="listening-pet-common.css" id="styleLink">
</head>
<body>
<div class="test-wrapper" id="testWrapper">
    <!-- Header -->
    <div class="ielts-header">
        <div class="brand">
            <div class="ielts-logo">PET</div>
            <div class="candidate">B1 Preliminary 1 · Test 2 · Part 2</div>
            <div class="audio-controls">
                <audio id="listeningAudio" controls>

                </audio>
                <select class="speed-select" id="speedSelect">

                    <option value="1.25">1.25x</option>
                </select>
                <span class="volume-icon">🔊</span>
            </div>
        </div>
        <div class="font-controls">
            <button class="font-btn" id="fontSmall">A-</button>
            <button class="font-btn" id="fontMedium">A</button>
            <button class="font-btn active" id="fontLarge">A+</button>
        </div>
        <div class="mode-toggle" id="modeToggleContainer">
            <span class="mode-label">Hiện đại</span>
            <label class="mode-switch" title="Chuyển đổi chế độ Cổ điển/Hiện đại">

                <span class="mode-slider"></span>
            </label>
            <span class="mode-label">Cổ điển</span>
        </div>
        <button class="theme-toggle-btn" id="themeToggle" title="Chuyển đổi Dark/Light mode">

            <span class="icon-sun">☀️</span>
        </button>
    </div>

    <!-- Question navigator (8-13) -->
    <div class="question-nav">
        <span style="font-weight:600; color:#1e3a5f;">Câu 8-13:</span>
        <div class="nav-buttons" id="navButtons"></div>
    </div>

    <!-- Main area -->
    <div class="main-area" id="mainArea">
        <!-- Transcript panel (ẩn ban đầu) -->
        <div class="transcript-panel" id="transcriptPanel">
            <div class="panel-header">
                <span>TRANSCRIPT</span>
            </div>
            <div class="transcript-content font-large" id="transcriptContent"></div>
        </div>
        <div class="resizer" id="resizer"></div>

        <!-- Questions panel -->
        <div class="questions-panel" id="questionsPanel">
            <div class="panel-header">
                <span>QUESTIONS 8-13</span>
                <span class="answer-badge" id="answeredCount">0/6 answered</span>
            </div>
            <div class="questions-list font-large centered" id="questionsContent">
                <div>
                    <h3>PART 2 Questions 8-13</h3>
                    <p><em>Choose the correct answer (A, B or C).</em></p>
                    <div class="notes-box" id="questionsContainer"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bottom bar -->
    <div class="bottom-bar">
        <button class="btn btn-primary" id="submitBtn">Nộp bài</button>
        <button class="btn btn-success" id="explainBtn" disabled>Xem giải thích</button>
        <button class="btn btn-danger" id="resetBtn">Reset tất cả</button>
        <div class="progress" id="progressDisplay">Đã làm: 0/6</div>
    </div>

    <!-- Explanation panel -->
    <div class="explanation-panel" id="explanationPanel">
        <div class="resize-handle" id="explanationResizer"></div>
        <div class="explanation-header">
            <span id="explanationTitle">Giải thích</span>
            <span class="close-btn" id="closeExplanation">✕ Đóng</span>
        </div>
        <div class="explanation-content" id="explanationText"></div>
    </div>
</div>

<!-- Context menu for manual highlighting -->
<div class="context-menu" id="contextMenu">
    <div onclick="applyHighlight('yellow')">Highlight vàng</div>
    <div onclick="applyHighlight('green')">Highlight xanh lá</div>
    <div onclick="applyHighlight('pink')">Highlight hồng</div>
    <div onclick="removeHighlight()">Xóa highlight</div>
</div>

<!-- Core Listening Engine -->
<script src="core-listening.js"></script>

<script>
    // Test Data for PET 1 Test 2 Part 2
    const pet1Test2Part2Data = {
        title: "B1 Preliminary 1 · Test 2 · Part 2",
        type: "multiple-choice",
        part: 2,
        book: 1,
        test: 2,

        // Answer Key
        answerKey: {
            q8: 'B',
            q9: 'A',
            q10: 'B',
            q11: 'C',
            q12: 'B',
            q13: 'A'
        },

        // Display Answers
        displayAnswers: {
            q8: 'B',
            q9: 'A',
            q10: 'B',
            q11: 'C',
            q12: 'B',
            q13: 'A'
        },

        // Detailed Explanations
        detailedExplanations: {
            q8: `<strong>Đáp án: B</strong><br>
                  Cậu bé nói: <em>"I wanted to have all my mates from college and my football team. But it wouldn't be a good idea to have so many people riding together, so I'll have to choose between them, which is a shame."</em> → cậu ấy thất vọng vì không thể mời tất cả bạn bè.<br><br>
                  <strong>✗ A (annoyed that some friends don't want to come)</strong> - Không có thông tin bạn bè từ chối.<br>
                  <strong>✓ B (disappointed that he can't invite more friends)</strong> - Chính xác, "which is a shame" thể hiện sự thất vọng.<br>
                  <strong>✗ C (worried that it might be boring)</strong> - Cậu ấy nói "I don't think that matters" về việc lặp lại hoạt động cũ, không lo lắng về sự nhàm chán.`,

            q9: `<strong>Đáp án: A</strong><br>
                  Cả hai đều đồng ý rằng số lượng khán giả ít hơn bình thường.<br>
                  Người phụ nữ: <em>"there weren't nearly as many people watching as there normally are."</em><br>
                  Người đàn ông: <em>"The cold weather might be the reason for the low numbers."</em><br><br>
                  <strong>✓ A (the crowd was smaller than usual)</strong> - Đúng, cả hai cùng xác nhận.<br>
                  <strong>✗ B (the match was quite boring)</strong> - Chỉ người đàn ông cho rằng trận đấu "pretty dull", người phụ nữ phản đối.<br>
                  <strong>✗ C (the referee made some bad decisions)</strong> - Người phụ nữ cho rằng trọng tài làm tốt: "I didn't think he did too badly actually."`,

            q10: `<strong>Đáp án: B</strong><br>
                  Người đàn ông kể rằng bạn bè cười nhạo khi anh ấy sợ hãi trên dốc trượt tuyết: <em>"which made me feel pretty silly."</em><br><br>
                  <strong>✗ A (upset that he was injured)</strong> - Anh ấy suýt bị thương ("I nearly hurt myself") nhưng không thực sự bị thương.<br>
                  <strong>✓ B (embarrassed by his skiing ability)</strong> - "feel pretty silly" chính là xấu hổ, ngượng ngùng.<br>
                  <strong>✗ C (angry that his friends put photos online)</strong> - Anh ấy không tức giận về ảnh; ảnh được chụp lúc đầu kỳ nghỉ khi anh ấy còn vui vẻ.`,

            q11: `<strong>Đáp án: C</strong><br>
                  Người phụ nữ thích đọc đánh giá từ người dùng thực tế trên mạng: <em>"I'd always rather see what car owners say than trust adverts or stuff on TV."</em> Cô ấy xem chương trình TV chỉ để biết nơi tìm thông tin trực tuyến.<br><br>
                  <strong>✗ A (advertisements)</strong> - Cô ấy không tin quảng cáo.<br>
                  <strong>✗ B (TV programmes)</strong> - Chương trình TV chỉ giúp cô tìm nguồn đánh giá trực tuyến, không phải nguồn thông tin chính.<br>
                  <strong>✓ C (internet reviews)</strong> - Chính xác: "what car owners say" trên mạng.`,

            q12: `<strong>Đáp án: B</strong><br>
                  Người phụ nữ phụ trách tổ chức cuộc thi và cho biết: <em>"being in charge of the whole thing, I've more than enough to do. I can tell you, I'm spending ages sorting things out"</em> → mất rất nhiều thời gian để tổ chức.<br><br>
                  <strong>✗ A (Judging it is the easiest part)</strong> - Cô ấy nói rất mừng vì mình không phải là giám khảo: "I'm glad picking the winner's not my job".<br>
                  <strong>✓ B (It is taking a long time to organise it)</strong> - Đúng, "spending ages sorting things out".<br>
                  <strong>✗ C (She would love to perform in it)</strong> - Cô ấy thích xem và bình luận hơn, không muốn biểu diễn.`,

            q13: `<strong>Đáp án: A</strong><br>
                  Người phụ nữ ngạc nhiên vì sức khỏe được cải thiện sau khi chuyển đến thành phố: <em>"which means I'm actually fitter than when I lived in the countryside. I hadn't expected that."</em><br><br>

                  <strong>✗ B (glad that she has met friendly people)</strong> - Cô ấy chưa kết bạn nhiều: "once I've got to know more people".<br>
                  <strong>✗ C (satisfied with her local area)</strong> - Cô ấy chưa chắc chắn: "I do sometimes wonder whether this is the right area for me".`

        // Transcript with highlightable spans
        transcript: `
            <p><strong>Question 8</strong><br>
            <strong>Woman:</strong> What are you doing for your birthday?<br>
            <strong>Boy:</strong> I'm having a group bike ride and then a picnic in the park. I know it's the same as what we did last year but I don't think that matters. <span class="highlightable" data-q="8">I wanted to have all my mates from college and my football team. But it wouldn't be a good idea to have so many people riding together, so I'll have to choose between them, which is a shame.</span><br>
            <strong>Woman:</strong> I'm sure it'll be fun whoever comes.<br>
            <strong>Boy:</strong> You're right. I hate having to make decisions like this. Anyway, you'll come, won't you?<br>
            <strong>Woman:</strong> Of course!<br>
            <em>Now listen again.</em></p>

            <p><strong>Question 9</strong><br>
            <strong>Man:</strong> Did you enjoy the match last night? I have to say I thought it was pretty dull.<br>
            <strong>Woman:</strong> Oh I don't know - most people seemed to be enjoying it. Me included. <span class="highlightable" data-q="9">Although there weren't nearly as many people watching as there normally are.</span><br>
            <strong>Man:</strong> <span class="highlightable" data-q="9">The cold weather might be the reason for the low numbers.</span> And the people who were there weren't too happy with some of the things the referee did.<br>
            <strong>Woman:</strong> He had some difficult situations to deal with. I didn't think he did too badly actually.<br>
            <strong>Man:</strong> Anyway, at least our team won. That's what matters!<br>
            <em>Now listen again.</em></p>

            <p><strong>Question 10</strong><br>
            <strong>Man:</strong> I'm never going skiing again!<br>
            <strong>Woman:</strong> Why? You looked like you were having a good time in the photos I saw on the internet.<br>
            <strong>Man:</strong> They were taken at the start of the holiday. I was so excited then.<br>
            <strong>Woman:</strong> So, what happened?<br>
            <strong>Man:</strong> Everything was fine until someone suggested trying one of the more advanced routes. I've never been so scared in all my life. It was too difficult for me and I had to give up half-way - I nearly hurt myself hitting a tree! The others all found this very funny, <span class="highlightable" data-q="10">which made me feel pretty silly.</span><br>
            <strong>Woman:</strong> Oh dear.<br>
            <em>Now listen again.</em></p>

            <p><strong>Question 11</strong><br>
            <strong>Man:</strong> I hear you just bought a new car. How did you decide which one to get?<br>
            <strong>Woman:</strong> Well, I often watch that TV show about cars … you know the one with Ben Clark where they give all sorts of information about different models. <span class="highlightable" data-q="11">They mentioned some useful places to look online where people who've bought new cars give their opinions. I'd always rather see what car owners say than trust adverts or stuff on TV.</span> Anyway, they were all pretty positive about the model I was hoping to get so I went for it in the end!<br>
            <em>Now listen again.</em></p>

            <p><strong>Question 12</strong><br>
            <strong>Man:</strong> How are things going with preparations for the singing competition?<br>
            <strong>Woman:</strong> Well, there are some strong singers this year, so I'm glad picking the winner's not my job. I mean, how do you go about choosing?<br>
            <strong>Man:</strong> Have you ever thought about entering a singing competition yourself?<br>
            <strong>Woman:</strong> I think it's more fun watching and making comments about everyone else! And anyway, <span class="highlightable" data-q="12">being in charge of the whole thing, I've more than enough to do. I can tell you, I'm spending ages sorting things out, including most evenings. But I love it.</span><br>
            <strong>Man:</strong> I'm sure it'll be great.<br>
            <em>Now listen again.</em></p>

            <p><strong>Question 13</strong><br>
            <strong>Man:</strong> Are you happy about your move to the city?<br>
            <strong>Woman:</strong> Well, my neighbours are very quiet but there's a lot of street noise from all the shops and restaurants. I suppose everything's nearby, so now I can walk everywhere, <span class="highlightable" data-q="13">which means I'm actually fitter than when I lived in the countryside. I hadn't expected that.</span> I do sometimes wonder whether this is the right area for me, but once I've got to know more people, I'll be able to decide if it's the sort of place I'm going to be happy in. Why don't you come round soon?<br>
            <strong>Man:</strong> I'd love to.<br>
            <em>Now listen again.</em><br>
            That is the end of Part Two.</p>
