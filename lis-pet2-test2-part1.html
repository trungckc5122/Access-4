<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PET 2 - Test 2 - Part 1</title>
    <link rel="stylesheet" href="listening-pet-common.css" id="styleLink">
</head>
<body>
    <div class="test-wrapper" id="testWrapper">
        <!-- Header -->
        <div class="ielts-header">
            <div class="brand">
                <div class="ielts-logo">PET</div>
                <div class="candidate">B1 Preliminary 2 · Test 2 · Part 1</div>
                <div class="audio-controls">
                    <audio id="listeningAudio" controls>
                        <source src="audio/B1 Preliminary 2 - Test 2 Part 1.mp3" type="audio/mpeg">
                        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg">
                    </audio>
                    <select class="speed-select" id="speedSelect">
                        <option value="0.7">0.7x</option>
                        <option value="0.9">0.9x</option>
                        <option value="1.0" selected>1x</option>
                        <option value="1.1">1.1x</option>
                        <option value="1.25">1.25x</option>
                    </select>
                    <span class="volume-icon">🔊</span>
                </div>
            </div>
            <div class="font-controls">
                <button class="font-btn" id="fontSmall">A-</button>
                <button class="font-btn" id="fontMedium">A</button>
                <button class="font-btn active" id="fontLarge">A+</button>
            </div>
            <button class="theme-toggle-btn" id="themeToggle" title="Chuyển đổi Dark/Light mode">
                <span class="icon-moon">🌙</span>
                <span class="icon-sun">☀️</span>
            </button>
        </div>

        <!-- Question navigator (1-7) -->
        <div class="question-nav">
            <span style="font-weight:600; color:#1e3a5f;">Câu 1-7:</span>
            <div class="nav-buttons" id="navButtons"></div>
        </div>

        <!-- Main area -->
        <div class="main-area" id="mainArea">
            <!-- Transcript panel (ẩn ban đầu) -->
            <div class="transcript-panel" id="transcriptPanel">
                <div class="panel-header">
                    <span>TRANSCRIPT</span>
                </div>
                <div class="transcript-content font-large" id="transcriptContent"></div>
            </div>
            <div class="resizer" id="resizer"></div>

            <!-- Questions panel -->
            <div class="questions-panel" id="questionsPanel">
                <div class="panel-header">
                    <span>QUESTIONS 1-7</span>
                    <span class="answer-badge" id="answeredCount">0/7 answered</span>
                </div>
                <div class="questions-list font-large centered" id="questionsContent">
                    <div>
                        <h3>PART 1 Questions 1-7</h3>
                        <p><em>Choose the correct answer (A, B or C).</em></p>
                        <div class="notes-box" id="questionsContainer"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Bottom bar -->
        <div class="bottom-bar">
            <button class="btn btn-primary" id="submitBtn">Nộp bài</button>
            <button class="btn btn-success" id="explainBtn" disabled>Xem giải thích</button>
            <button class="btn btn-danger" id="resetBtn">Reset tất cả</button>
            <div class="progress" id="progressDisplay">Đã làm: 0/7</div>
        </div>

        <!-- Explanation panel -->
        <div class="explanation-panel" id="explanationPanel">
            <div class="resize-handle" id="explanationResizer"></div>
            <div class="explanation-header">
                <span id="explanationTitle">Giải thích</span>
                <span class="close-btn" id="closeExplanation">✕ Đóng</span>
            </div>
            <div class="explanation-content" id="explanationText"></div>
        </div>
    </div>

    <!-- Context menu for manual highlighting -->
    <div class="context-menu" id="contextMenu">
        <div onclick="applyHighlight('yellow')">Highlight vàng</div>
        <div onclick="applyHighlight('green')">Highlight xanh lá</div>
        <div onclick="applyHighlight('pink')">Highlight hồng</div>
        <div onclick="removeHighlight()">Xóa highlight</div>
    </div>

    <!-- Core Listening Engine -->
    <script src="core-listening.js"></script>
    
    <script>
        // Test Data for PET 2 Test 2 Part 1
        const pet2Test2Part1Data = {
            title: "B1 Preliminary 2 · Test 2 · Part 1",
            type: "multiple-choice",
            part: 1,
            book: 2,
            test: 2,
            
            // Answer Key
            answerKey: {
                q1: 'B',
                q2: 'A',
                q3: 'B',
                q4: 'A',
                q5: 'A',
                q6: 'B',
                q7: 'C'
            },

            // Display Answers
            displayAnswers: {
                q1: 'B',
                q2: 'A',
                q3: 'B',
                q4: 'A',
                q5: 'A',
                q6: 'B',
                q7: 'C'
            },

            // Detailed Explanations
            detailedExplanations: {
                q1: `<strong>Đáp án: B (a tie)</strong><br>
                  Người đàn ông nói: <em>"Mmm, I think it'd look good with most of my shirts. I'll go for that."</em> – Anh ấy quyết định mua chiếc cà vạt.
                  <br><br>
                  <strong>✗ A (a belt) không đúng:</strong> Anh ấy thích chiếc thắt lưng nhưng nó quá đắt.
                  <br>
                  <strong>✗ C (a hat) không đúng:</strong> Anh ấy thích chiếc mũ nhưng màu sắc hơi kỳ lạ.
                  <br>
                  <strong>✓ B (a tie) là món anh ấy quyết định mua.</strong>`,

                q2: `<strong>Đáp án: A (a museum assistant)</strong><br>
                  Người phụ nữ nói: <em>"the town museum's looking for an assistant who's able to do that sort of thing."</em> – Bảo tàng đang tìm trợ lý có thể xử lý tài liệu lịch sử.
                  <br><br>
                  <strong>✗ B (a computer operator) không đúng:</strong> Cô ấy muốn tránh việc làm trên máy tính.
                  <br>
                  <strong>✗ C (a librarian) không đúng:</strong> Cô ấy hiện đang làm việc tại thư viện và muốn chuyển sang bảo tàng.
                  <br>
                  <strong>✓ A (a museum assistant) là công việc cô ấy đã nộp đơn.</strong>`,

                q3: `<strong>Đáp án: B (by train)</strong><br>
                  Người đàn ông nói: <em>"The trains are every half hour – it'll be quicker than having to wait for a taxi."</em> – Anh ấy quyết định đi tàu vì nhanh hơn chờ taxi.
                  <br><br>
                  <strong>✗ A (by bicycle) không đúng:</strong> Anh ấy nói không muốn đi xe đạp trong thời tiết này ("I don't fancy cycling in this weather").
                  <br>
                  <strong>✗ C (by taxi) không đúng:</strong> Anh ấy gọi taxi nhưng không có xe nào có sẵn trong ít nhất 1 giờ.
                  <br>
                  <strong>✓ B (by train) là phương tiện anh ấy chọn.</strong>`,

                q4: `<strong>Đáp án: A (in the bookstore)</strong><br>
                  Người đàn ông nói: <em>"the bookstore. I guess it fell out of my pocket when I took my jacket off"</em> – Anh ấy nghĩ ví rơi ra khỏi túi khi cởi áo khoác ở hiệu sách.
                  <br><br>
                  <strong>✗ B (in the grocery store) không đúng:</strong> Anh ấy chắc chắn có ví ở cửa hàng tạp hóa nhưng không để ở đó.
                  <br>
                  <strong>✗ C (in the elevator) không đúng:</strong> Anh ấy mới nhận ra mất ví khi đi thang máy, không phải để ở đó.
                  <br>
                  <strong>✓ A (in the bookstore) là nơi anh ấy nghĩ đã để ví.</strong>`,

                q5: `<strong>Đáp án: A (steak)</strong><br>
                  Người đàn ông nói: <em>"I thought you wouldn't say 'no' to a lovely steak"</em> – Anh ấy sẽ làm bò bít tết.
                  <br><br>
                  <strong>✗ B (pizza) không đúng:</strong> Anh ấy nói thường đặt pizza vào thứ Năm nhưng hôm nay muốn ăn món khác.
                  <br>
                  <strong>✗ C (fish and salad) không đúng:</strong> Cô gái đã đề xuất ăn cá và salad một ngày trong tuần nhưng anh ấy muốn ăn nhiều hơn.
                  <br>
                  <strong>✓ A (steak) là món anh ấy sẽ làm.</strong>`,

                q6: `<strong>Đáp án: B (the police detective with short curly hair)</strong><br>
                  Người phụ nữ nói: <em>"That female police detective was my favourite."</em> và mô tả: <em>"She had similar hair – curly, but not long."</em> – Nhân viên cảnh sát nữ có tóc ngắn xoăn là nhân vật yêu thích của cô ấy.
                  <br><br>
                  <strong>✗ A (the police detective with long dark curly hair) không đúng:</strong> Cô ấy nói nhân vật đó có tóc xoăn nhưng không dài.
                  <br>
                  <strong>✗ C (the male colleague with glasses) không đúng:</strong> Đây là đồng nghiệp nam, không phải nhân vật yêu thích của cô ấy.
                  <br>
                  <strong>✓ B (the police detective with short curly hair) là nhân vật cô ấy thích nhất.</strong>`,

                q7: `<strong>Đáp án: C (her keys)</strong><br>
                  Cô gái nói: <em>"I've left my keys behind"</em> và просит bố: <em>"would you mind bringing them for me"</em> – Cô ấy để quên chìa khóa và nhờ bố mang đến.
                  <br><br>
                  <strong>✗ A (her glasses) không đúng:</strong> Cô ấy đi lấy kính từ cửa hàng, không nhờ bố mang.
                  <br>
                  <strong>✗ B (some papers) không đúng:</strong> Không được nhắc đến.
                  <br>
                  <strong>✓ C (her keys) là thứ cô ấy nhờ bố mang đến.</strong>`
            },

            // Transcript with highlightable spans
            transcript: `
            <p><strong>Question 1</strong><br>
            <strong>Man:</strong> Can you help me decide what to buy? I'm having problems.<br>
            <strong>Woman:</strong> Sure, so what were you thinking of getting?<br>
            <strong>Man:</strong> Well, I really love this belt – it's such good quality leather.<br>
            <strong>Woman:</strong> But it's so expensive. I thought you said before you wanted to get something in the sale.<br>
            <strong>Man:</strong> I suppose you're right.<br>
            <strong>Woman:</strong> What about this tie? It's very smart.<br>
            <strong>Man:</strong> Mmm, <span class="highlightable" data-q="1">I think it'd look good with most of my shirts. I'll go for that.</span> I love this hat though.<br>
            <strong>Woman:</strong> It's nice – but the colour's a bit strange.<br>
            <strong>Man:</strong> Yeah, maybe you're right.</p>

            <p><strong>Question 2</strong><br>
            <strong>Woman:</strong> I've just sent in an application for another job.<br>
            <strong>Man:</strong> Oh, yes?<br>
            <strong>Woman:</strong> Yeah. I've worked at the library for a while now and I love what I do but so much of the work involves being on a computer, rather than dealing with books. I've done an online training course in handling old, historical documents and <span class="highlightable" data-q="2">the town museum's looking for an assistant who's able to do that sort of thing.</span> I saw the ad on their website, so I thought I'd try for it.<br>
            <strong>Man:</strong> Sounds interesting! Good luck!</p>

            <p><strong>Question 3</strong><br>
            <strong>Man:</strong> Hi, it's Simon. I'm sorry but I'm going to be late for work today. My car's broken down, and I've no idea what's wrong with it. It just wouldn't start this morning... so annoying! I called for a taxi, but there's nothing available for at least an hour. They're all busy because of the heavy rain. Anyway, I don't fancy cycling in this weather so my neighbour's going to give me a lift to the station. The trains are every half hour – <span class="highlightable" data-q="3">it'll be quicker than having to wait for a taxi.</span></p>

            <p><strong>Question 4</strong><br>
            <strong>Woman:</strong> Are you all right?<br>
            <strong>Man:</strong> No, I've just realised as I was coming up in the elevator that I've lost my wallet!<br>
            <strong>Woman:</strong> Oh no.<br>
            <strong>Man:</strong> I obviously had it in the grocery store.<br>
            <strong>Woman:</strong> Yes... because you bought all that stuff. Did you go anywhere after that?<br>
            <strong>Man:</strong> Yeah, <span class="highlightable" data-q="4">the bookstore. I guess it fell out of my pocket when I took my jacket off</span> – it was so warm in there. I seem to remember hearing a noise but I didn't check!<br>
            <strong>Woman:</strong> Oh, well, you'd better go back there right now.</p>

            <p><strong>Question 5</strong><br>
            <strong>Man:</strong> Hi, I'm just phoning to let you know that I'm going to make the dinner this evening. I know we usually have a pizza delivered on Thursdays, but as we had one when we were out the other day, I'd rather have something else. Anyway, <span class="highlightable" data-q="5">I thought you wouldn't say 'no' to a lovely steak</span> – we could eat in the garden. I know you were talking about having fish and salad one day this week, but I feel like something more than that. Let me know what time you'll be home. Bye!</p>

            <p><strong>Question 6</strong><br>
            <strong>Man:</strong> That was a good film! I got a bit confused about who was who – there were so many different characters.<br>
            <strong>Woman:</strong> I agree. <span class="highlightable" data-q="6">That female police detective was my favourite.</span><br>
            <strong>Man:</strong> Which one? There were quite a few. Do you mean the one with long dark curly hair?<br>
            <strong>Woman:</strong> She had similar hair – curly, but not long. She was the one who had a male colleague with short dark hair and glasses. And his hair was straight.<br>
            <strong>Man:</strong> Oh, I know the one you mean now. Yes, she was great.</p>

            <p><strong>Question 7</strong><br>
            <strong>Girl:</strong> Hi Dad. Can you do me a favour? I've got to go and collect my new glasses from the shop in town and go to the library, so I won't be home before you go out. But I've left my keys behind, so I won't be able to get back in. If you're driving past the library, would you mind bringing them for me if I wait outside? You'll find them on the table: do you remember – I was sitting there writing some notes for my essay last night? Thanks. Bye!</p>

            <p><em>Now listen again.</em></p>
            <p style="color:#666;">That is the end of Part One.</p>
            `,

            // Questions Data
            questions: [
                { num: 1, text: "What does the man decide to buy?", options: ["a belt", "a tie", "a hat"] },
                { num: 2, text: "What kind of job has the woman applied for?", options: ["a museum assistant", "a computer operator", "a librarian"] },
                { num: 3, text: "How will the man travel to work today?", options: ["by bicycle", "by train", "by taxi"] },
                { num: 4, text: "Where does the man think he lost his wallet?", options: ["in the bookstore", "in the grocery store", "in the elevator"] },
                { num: 5, text: "What will the man make for dinner tonight?", options: ["steak", "pizza", "fish and salad"] },
                { num: 6, text: "Who was the woman's favourite character in the film?", options: ["the police detective with long dark curly hair", "the police detective with short curly hair", "the male colleague with glasses"] },
                { num: 7, text: "What does the girl want her father to deliver?", options: ["her glasses", "some papers", "her keys"] }
            ]
        };

        // Initialize the listening test when DOM is loaded
        document.addEventListener('DOMContentLoaded', function() {
            window.listeningCore = new ListeningCore();
            window.listeningCore.initializeTest(pet2Test2Part1Data);
            console.log('PET 2 Test 2 Part 1 loaded with core listening engine');
        });
    </script>
</body>
</html>
