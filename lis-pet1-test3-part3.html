<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PET 1 - Test 3 - Part 3</title>
    <link rel="stylesheet" href="listening-pet-common.css" id="styleLink">
</head>
<body>
<div class="test-wrapper" id="testWrapper">
    <div class="ielts-header">
        <div class="brand">
            <div class="ielts-logo">PET</div>
            <div class="candidate"></div>
            <div class="audio-controls">
                <audio id="listeningAudio" controls>
                    <source src="audio/B1 Preliminary 1 - Test 3 Part 3.mp3" type="audio/mpeg">
                    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg">
                </audio>
                <select class="speed-select" id="speedSelect">
                    <option value="0.7">0.7x</option>
                    <option value="0.9">0.9x</option>
                    <option value="1.0" selected>1x</option>
                    <option value="1.1">1.1x</option>
                    <option value="1.25">1.25x</option>
                </select>
                <span class="volume-icon">🔊</span>
            </div>
        </div>

</div>

    <div class="question-nav">
        
        <div class="nav-buttons" id="navButtons"></div>
    </div>

    <div class="main-area" id="mainArea">
        <div class="transcript-panel" id="transcriptPanel">
            <div class="panel-header"><span>TRANSCRIPT</span></div>
            <div class="transcript-content font-large" id="transcriptContent"></div>
        </div>
        <div class="resizer" id="resizer"></div>
        <div class="questions-panel" id="questionsPanel">
            <div class="panel-header">
                <span>QUESTIONS 14-19</span>
                <span class="answer-badge" id="answeredCount">0/6 answered</span>
            </div>
            <div class="questions-list font-large centered" id="questionsContent">
                <div>
                    <h3>PART 3 Questions 14-19</h3>
                    <p><em>Write one or two words or a number or a date or a time.</em></p>
                    <div class="notes-box" id="questionsContainer"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="bottom-bar">
        <button class="btn btn-primary" id="submitBtn">Nộp bài</button>
        <button class="btn btn-success" id="explainBtn" disabled>Xem giải thích</button>
        <button class="btn btn-danger" id="resetBtn">Reset tất cả</button>
        <div class="progress" id="progressDisplay">Đã làm: 0/6</div>
    </div>

    <div class="explanation-panel" id="explanationPanel">
        <div class="resize-handle" id="explanationResizer"></div>
        <div class="explanation-header">
            <span id="explanationTitle">Giải thích</span>
            <span class="close-btn" id="closeExplanation">✕ Đóng</span>
        </div>
        <div class="explanation-content" id="explanationText"></div>
    </div>
</div>

<div class="context-menu" id="contextMenu">
    <div onclick="applyHighlight('yellow')">Highlight vàng</div>
    <div onclick="applyHighlight('green')">Highlight xanh lá</div>
    <div onclick="applyHighlight('pink')">Highlight hồng</div>
    <div onclick="removeHighlight()">Xóa highlight</div>
</div>

<script src="core-listening.js"></script>
<script>
const pet1Test3Part3Data = {
    title: "B1 Preliminary 1 · Test 3 · Part 3",
    type: "fill-blank",
    part: 3,
    book: 1,
    test: 3,

    answerKey: {
        q14: ['8.15', 'quarter past 8', 'quarter past eight', '8:15', 'quarter past eight'],
        q15: ['entrance', 'the entrance', 'hotel entrance'],
        q16: ['palace'],
        q17: ['wakizi'],
        q18: ['diving'],
        q19: ['sun-cream', 'suncream', 'sun cream', 'sunscreen']
    },
    displayAnswers: {
        q14: '8.15 / quarter past eight',
        q15: 'entrance',
        q16: 'palace',
        q17: 'Wakizi',
        q18: 'diving',
        q19: 'sun-cream'
    },

    detailedExplanations: {
        q14: `<strong>Đáp án: 8.15 / quarter past eight (8 giờ 15 phút)</strong><br>
              Hướng dẫn viên nói: <em>"<span class='keyword-highlight'>We're meeting at eight o'clock in the morning as the bus will go at exactly quarter past eight</span>."</em> Xe buýt rời đi lúc 8:15 sáng. Đây là thời gian xuất phát, không phải 8:30 như thường lệ.
              <br><br>
              <strong>✗ 8.30 sai:</strong> Đây là giờ khởi hành thông thường (<em>"<span class='keyword-highlight'>instead of the usual departure time of eight thirty</span>"</em>), nhưng hôm nay khác.
              <br>
              <strong>✓ 8.15 / quarter past eight là đáp án đúng.</strong>`,

        q15: `<strong>Đáp án: entrance (lối vào)</strong><br>
              Hướng dẫn viên yêu cầu: <em>"<span class='keyword-highlight'>To get on the bus, please meet at the entrance to the hotel rather than at the reception desk</span>"</em> - Điểm tập trung là lối vào (entrance) của khách sạn, không phải quầy lễ tân.
              <br><br>
              <strong>✗ Reception sai:</strong> Quầy lễ tân hay đông đúc vào buổi sáng (<em>"<span class='keyword-highlight'>which gets quite crowded in the mornings</span>"</em>) nên họp ở lối vào.
              <br>
              <strong>✓ Entrance là đáp án đúng.</strong>`,

        q16: `<strong>Đáp án: palace (cung điện)</strong><br>
              Hướng dẫn viên mô tả điểm dừng đầu tiên: <em>"<span class='keyword-highlight'>Our first stop will be at a magnificent ruin just outside Gulum. It used to be a palace</span>."</em> Di tích đầu tiên là tàn tích của một cung điện.
              <br><br>
              <strong>Lưu ý:</strong> Từ "palace" trong transcript là đáp án trực tiếp, không cần thay đổi.
              <br>
              <strong>✓ Palace là đáp án đúng.</strong>`,

        q17: `<strong>Đáp án: Wakizi</strong><br>
              Hướng dẫn viên đề cập bữa trưa: <em>"<span class='keyword-highlight'>we'll drive on to the Wakizi Restaurant on the Gulum River for lunch. That's spelt W-A-K-I-Z-I</span>"</em> - Tên nhà hàng là Wakizi, đánh vần W-A-K-I-Z-I.
              <br><br>
              <strong>Lưu ý:</strong> Đây là tên riêng cần viết đúng chính tả.
              <br>
              <strong>✓ Wakizi là đáp án đúng.</strong>`,

        q18: `<strong>Đáp án: diving (lặn biển)</strong><br>
              Hướng dẫn viên giới thiệu hoạt động: <em>"<span class='keyword-highlight'>One option is to go diving. The variety of fish species on this part of the coast is quite amazing</span>."</em> Hoạt động buổi chiều có lặn biển hoặc bóng chuyền bãi biển.
              <br><br>
              <strong>✗ Sailing sai:</strong> <em>"<span class='keyword-highlight'>sailing isn't possible, due to the lack of wind</span>"</em> - không thể đi thuyền buồm vì thiếu gió.
              <br>
              <strong>✓ Diving là đáp án đúng.</strong>`,

        q19: `<strong>Đáp án: sun-cream (kem chống nắng)</strong><br>
              Hướng dẫn viên nhắc nhở: <em>"<span class='keyword-highlight'>please don't forget the sun-cream as the temperatures are very high</span>"</em> - Nhớ mang kem chống nắng vì nhiệt độ cao.
              <br><br>
              <strong>✗ Towels/Beach chairs sai:</strong> Công ty sẽ cung cấp khăn tắm và ghế bãi biển (<em>"<span class='keyword-highlight'>We'll provide towels and beach chairs</span>"</em>), không cần mang.
              <br>
              <strong>✓ Sun-cream là đáp án đúng.</strong>`
    },

    transcript: `
        <p><strong>Man:</strong> Good morning. You've all booked the trip to Gulum tomorrow, and I'd like to explain the arrangements for what will be a great day out. This is one of our most popular trips so you're sure to enjoy it.</p>
        <p>We're meeting at eight o'clock in the morning as <span class="highlightable" data-q="14">the bus will go at exactly quarter past eight.</span> This is instead of the usual departure time of eight thirty. The reason for this is that, after picking you up, we've got to collect a number of passengers from other hotels. To get on the bus, <span class="highlightable" data-q="15">please meet at the entrance to the hotel</span> rather than at the reception desk, which gets quite crowded in the mornings.</p>
        <p>So to the trip itself. <span class="highlightable" data-q="16">Our first stop will be at a magnificent ruin just outside Gulum. It used to be a palace.</span> I'm sure the guide mentioned it during the tour of the ancient theatre, if you went on that yesterday. The atmosphere there's really special, as you'll see for yourselves. Afterwards we'll drive on to <span class="highlightable" data-q="17">the Wakizi Restaurant</span> on the Gulum River for lunch. That's spelt W-A-K-I-Z-I, by the way – do check their menu online – it's fantastic! There'll be plenty of time to take photos while we're there.</p>
        <p>In the afternoon, we'll stop at Gulum beach where there's a choice of activities to do. <span class="highlightable" data-q="18">One option is to go diving.</span> The variety of fish species on this part of the coast is quite amazing. For those people who like volleyball, we're organising a competition on the beach. Unfortunately, at this time of year, sailing isn't possible, due to the lack of wind.</p>
        <p>We'll provide towels and beach chairs, but <span class="highlightable" data-q="19">please don't forget the sun-cream</span> as the temperatures are very high – you'll need it even on a cloudy day! The bus … (fade …)</p>
        <p><em>Now listen again.</em><br><em>That is the end of Part Three.</em></p>
    `,

    template: `
        <p><strong>Day trip to Gulum</strong></p>
        <p>Bus leaves at: <span class="question-number">(14)</span> <span class="blank-line"><input class="fill-input" id="q14"></span> a.m.</p>
        <p>Meet before trip at: hotel <span class="question-number">(15)</span> <span class="blank-line"><input class="fill-input" id="q15"></span></p>
        <p>First stop: ruin of a <span class="question-number">(16)</span> <span class="blank-line"><input class="fill-input" id="q16"></span></p>
        <p>Lunch at: The <span class="question-number">(17)</span> <span class="blank-line"><input class="fill-input" id="q17"></span> Restaurant</p>
        <p>Afternoon activity: <span class="question-number">(18)</span> <span class="blank-line"><input class="fill-input" id="q18"></span> or beach volleyball</p>
        <p>Bring: <span class="question-number">(19)</span> <span class="blank-line"><input class="fill-input" id="q19"></span></p>
    `,

    questions: [
        { num: 14 }, { num: 15 }, { num: 16 }, { num: 17 }, { num: 18 }, { num: 19 }
    ]
};

document.addEventListener('DOMContentLoaded', function() {
    window.listeningCore = new ListeningCore();
    window.listeningCore.initializeTest(pet1Test3Part3Data);
});
</script>
</body>
</html>
