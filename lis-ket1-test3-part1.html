<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KET 1 - Test 3 - Listening Part 1</title>
    <link rel="stylesheet" href="listening-pet-common.css" id="styleLink">
</head>

<body>
    <div class="test-wrapper" id="testWrapper">
        <!-- Header -->
        <div class="ielts-header">
            <div class="brand">
                <div class="ielts-logo">KET</div>
                <div class="candidate"></div>
                <div class="audio-controls">
                    <audio id="listeningAudio" controls>
                        <source src="audio/KET 1 - Test 3 Part 1.mp3" type="audio/mpeg">
                    </audio>
                    <select class="speed-select" id="speedSelect">
                        <option value="0.7">0.7x</option>
                        <option value="0.9">0.9x</option>
                        <option value="1.0" selected>1x</option>
                        <option value="1.1">1.1x</option>
                        <option value="1.25">1.25x</option>
                    </select>
                    <span class="volume-icon">🔊</span>
                </div>
            </div>
        </div>

        <!-- Question navigator -->
        <div class="question-nav">
            <div class="nav-buttons" id="navButtons"></div>
        </div>

        <!-- Main area -->
        <div class="main-area" id="mainArea">
            <!-- Transcript panel -->
            <div class="transcript-panel" id="transcriptPanel">
                <div class="panel-header"><span>TRANSCRIPT</span></div>
                <div class="transcript-content font-large" id="transcriptContent"></div>
            </div>
            <div class="resizer" id="resizer"></div>

            <!-- Questions panel -->
            <div class="questions-panel" id="questionsPanel">
                <div class="panel-header">
                    <span>QUESTIONS 1–5</span>
                    <span class="answer-badge" id="answeredCount">0/5 answered</span>
                </div>
                <div class="questions-list font-large centered" id="questionsContent">
                    <div>
                        <h3>PART 1 &nbsp; Questions 1–5</h3>
                        <p><em>For each question, choose the correct answer.</em></p>
                        <div class="notes-box" id="questionsContainer"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Bottom bar -->
        <div class="bottom-bar">
            <button class="btn btn-primary" id="submitBtn">Nộp bài</button>
            <button class="btn btn-success" id="explainBtn" disabled>Xem giải thích</button>
            <button class="btn btn-danger" id="resetBtn">Reset</button>
            <div class="progress" id="progressDisplay">Đã làm: 0/5</div>
        </div>

        <!-- Explanation panel -->
        <div class="explanation-panel" id="explanationPanel">
            <div class="resize-handle" id="explanationResizer"></div>
            <div class="explanation-header">
                <span id="explanationTitle">Giải thích</span>
                <span class="close-btn" id="closeExplanation">✕ Đóng</span>
            </div>
            <div class="explanation-content" id="explanationText"></div>
        </div>
    </div>

    <!-- Context menu -->
    <div class="context-menu" id="contextMenu">
        <div onclick="applyHighlight('yellow')">Highlight vàng</div>
        <div onclick="applyHighlight('green')">Highlight xanh lá</div>
        <div onclick="applyHighlight('pink')">Highlight hồng</div>
        <div onclick="removeHighlight()">Xóa highlight</div>
    </div>

    <script src="core-listening-ket.js"></script>
    <script>
        const ketTest3Part1Data = {
            title: "KET 1 · Test 3 · Listening Part 1",
            type: "multiple-choice",
            part: 1,
            book: 1,
            test: 3,

            answerKey: { q1: 'A', q2: 'C', q3: 'B', q4: 'B', q5: 'B' },
            displayAnswers: { q1: 'A', q2: 'C', q3: 'B', q4: 'B', q5: 'B' },

            detailedExplanations: {
                q1: `<strong>Đáp án: A – a game of badminton</strong><br>
                      Người đàn ông nói: <em>"I need some exercise. I've been at my desk all week."</em><br>
                      Người phụ nữ đề nghị: <em>"So let's go for a <span class='keyword-highlight'>game of badminton</span>. I know you prefer swimming, but the pool will be too busy."</em><br>
                      Người đàn ông đáp: <em>"I'll get the rackets."</em><br><br>
                      <strong>✗ B (eating at a restaurant) sai:</strong> Đây là đề nghị ban đầu nhưng bị từ chối.<br>
                      <strong>✗ C (swimming in a pool) sai:</strong> Bể bơi sẽ quá đông.<br>
                      <strong>✓ A (a game of badminton) là kế hoạch cuối cùng.</strong>`,

                q2: `<strong>Đáp án: C – a woman walking away from a shop</strong><br>
                      Người đàn ông hỏi: <em>"Oh! Was the shop really crowded, as usual?"</em><br>
                      Người phụ nữ đáp: <em>"Actually, it looked OK, but when I was <span class='keyword-highlight'>outside, I met my friend Sophie. We decided to go for a coffee.</span>"</em><br>
                      → Cô ấy không mua sách vì gặp bạn bên ngoài và đi uống cà phê.<br><br>
                      <strong>✗ A (a bookshop entrance) sai:</strong> Không liên quan.<br>
                      <strong>✗ B (a crowded bookshop interior) sai:</strong> Cửa hàng không đông.<br>
                      <strong>✓ C (a woman walking away from a shop) đúng – cô ấy rời khỏi cửa hàng để đi uống cà phê với bạn.</strong>`,

                q3: `<strong>Đáp án: B – a car garage/mechanics</strong><br>
                      Người phụ nữ nói: <em>"I haven't seen you at the supermarket for a while, Bryan."</em><br>
                      Người đàn ông đáp: <em>"I left last month, actually. I was only working there until I finished my <span class='keyword-highlight'>mechanics course</span>."</em><br>
                      Và: <em>"I'm working at that place next to the Italian restaurant."</em><br><br>
                      <strong>✗ A (a train station) sai:</strong> Không đề cập.<br>
                      <strong>✗ C (a restaurant/cafe) sai:</strong> Nhà hàng Ý là địa điểm bên cạnh, không phải nơi làm việc.<br>
                      <strong>✓ B (a car garage/mechanics) là nơi anh ấy làm việc sau khi hoàn thành khóa học cơ khí.</strong>`,

                q4: `<strong>Đáp án: B – a museum/gallery</strong><br>
                      Người đàn ông nói: <em>"I'm looking for the <span class='keyword-highlight'>museum</span>. On my map it looks quite near to the castle, but we're outside the castle now, and I can't see it."</em><br><br>
                      <strong>✗ A (an outdoor cafe) sai:</strong> Quán café đối diện bảo tàng, không phải điểm đến.<br>
                      <strong>✗ C (a castle) sai:</strong> Họ đang đứng bên ngoài lâu đài, đó không phải nơi anh ấy muốn đến.<br>
                      <strong>✓ B (a museum/gallery) là nơi anh ấy đang tìm.</strong>`,

                q5: `<strong>Đáp án: B – a loaf of bread with fruit</strong><br>
                      Người phụ nữ hỏi: <em>"Mmm... lovely! Are you making a fruit cake?"</em><br>
                      Người đàn ông đáp: <em>"I'm adding the dried fruit to the <span class='keyword-highlight'>bread that I'm baking</span>. We can have it with cheese tonight..."</em><br><br>
                      <strong>✗ A (a fruit cake) sai:</strong> Đây là câu hỏi của người phụ nữ nhưng không đúng.<br>
                      <strong>✗ C (a bowl of fruit salad) sai:</strong> Đây là đề nghị của người phụ nữ cho món tráng miệng.<br>
                      <strong>✓ B (a loaf of bread with fruit) là đáp án đúng – bánh mì có thêm trái cây khô.</strong>`
            },

            transcript: `
            <p><strong>PART 1</strong></p>
            <p><em>For each question, choose the correct answer.</em></p>

            <p><strong>Question 1</strong><br>
            <strong>Man:</strong> My weather app says it might rain tomorrow.<br>
            <strong>Woman:</strong> Oh... we won't be able to go walking. Shall we go out for lunch instead?<br>
            <strong>Man:</strong> I need some exercise. I've been at my desk all week.<br>
            <strong>Woman:</strong> <span class="highlightable" data-q="1">So let's go for a game of badminton. I know you prefer swimming, but the pool will be too busy.</span><br>
            <strong>Man:</strong> I'll get the rackets.</p>

            <p><strong>Question 2</strong><br>
            <strong>Woman:</strong> I didn't get the book that you want today. Sorry!<br>
            <strong>Man:</strong> Oh! Was the shop really crowded, as usual?<br>
            <strong>Woman:</strong> Actually, it looked OK, but when I was <span class="highlightable" data-q="2">outside, I met my friend Sophie. We decided to go for a coffee.</span><br>
            <strong>Man:</strong> And was the shop closed when you finished?<br>
            <strong>Woman:</strong> Well, it was still open, but I'll have more time tomorrow.</p>

            <p><strong>Question 3</strong><br>
            <strong>Woman:</strong> I haven't seen you at the supermarket for a while, Bryan.<br>
            <strong>Man:</strong> <span class="highlightable" data-q="3">I left last month, actually. I was only working there until I finished my mechanics course.</span><br>
            <strong>Woman:</strong> So, you're finally doing what you've always wanted to do.<br>
            <strong>Man:</strong> I am. I'm working at that place next to the Italian restaurant.<br>
            <strong>Woman:</strong> I'll bring my car there next time I have a problem.</p>

            <p><strong>Question 4</strong><br>
            <strong>Woman:</strong> Do you need some help?<br>
            <strong>Man:</strong> <span class="highlightable" data-q="4">Yes! Thank you. I'm looking for the museum. On my map it looks quite near to the castle, but we're outside the castle now, and I can't see it.</span><br>
            <strong>Woman:</strong> Well, it's not far. Walk down this hill, and it's on your right. There's a nice café opposite.<br>
            <strong>Man:</strong> That's great. Thank you again.</p>

            <p><strong>Question 5</strong><br>
            <strong>Woman:</strong> Mmm... lovely! Are you making a fruit cake?<br>
            <strong>Man:</strong> <span class="highlightable" data-q="5">I'm adding the dried fruit to the bread that I'm baking. We can have it with cheese tonight, and use the rest for toast tomorrow morning.</span> If you want cake, there's a slice left in the fridge.<br>
            <strong>Woman:</strong> That's OK. I'll wait for supper. Shall I make a fruit salad for dessert?<br>
            <strong>Man:</strong> Yes, please.</p>

            <p><em>That is the end of Part One.</em></p>
            `,

            questions: [
                { num: 1, text: "Where will they go if it rains tomorrow?", options: ["a game of badminton", "eating at a restaurant", "swimming in a pool"] },
                { num: 2, text: "Why didn't the woman buy the book?", options: ["a bookshop entrance", "a crowded bookshop interior", "a woman walking away from a shop"] },
                { num: 3, text: "Where does the man work now?", options: ["a train station", "a car garage/mechanics", "a restaurant/cafe"] },
                { num: 4, text: "Where does the man want to go?", options: ["an outdoor cafe", "a museum/gallery", "a castle"] },
                { num: 5, text: "What's the man making?", options: ["a fruit cake", "a loaf of bread with fruit", "a bowl of fruit salad"] }
            ]
        };

        document.addEventListener('DOMContentLoaded', function () {
            window.listeningCore = new ListeningCore();
            window.listeningCore.initializeTest(ketTest3Part1Data);
            console.log('KET 1 Test 3 Listening Part 1 loaded');
        });
    </script>
</body>

</html>
