    <script src="core-listening-ket.js"></script>
    <script>
        const ketTest4Part4Data = {
            title: "KET 3 · Test 4 · Listening Part 4",
            type: "multiple-choice",
            part: 4,
            book: 3,
            test: 4,

            answerKey: { q16: 'A', q17: 'C', q18: 'A', q19: 'A', q20: 'C' },
            displayAnswers: { q16: 'A', q17: 'C', q18: 'A', q19: 'A', q20: 'C' },

            detailedExplanations: {
                q16: `<strong>Đáp án: A – a tour guide (hướng dẫn viên du lịch)</strong><br>
                      <strong>Boy:</strong> <em>"What did you think of today's speaker?"</em><br>
                      <strong>Girl:</strong> <em>"Fascinating. He has so many opportunities to travel. I'd love that."</em><br>
                      <strong>Boy:</strong> <em>"There are lots of jobs where people can travel. Photographer, for example."</em><br>
                      <strong>Girl:</strong> <em>"But <span class='keyword-highlight'>he meets so many different people and shows them round really interesting places</span>."</em><br>
                      <strong>Boy:</strong> <em>"He had great stories, not like the last speaker, that guy who played the violin – really boring."</em><br>
                      (shows them round = tour guide – hướng dẫn viên)<br><br>
                      <strong>✗ B (a musician) sai:</strong> Người kể chuyện nhạc sĩ ("that guy who played the violin") trước đó chán ("really boring"), không phải người nói hôm nay.<br>
                      <strong>✗ C (a photographer) sai:</strong> Cậu bé đoán photographer nhưng cô gái nói anh ấy dẫn khách tham quan ("shows them round").<br>
                      <strong>✓ A (a tour guide) là đúng – anh ấy gặp nhiều người và dẫn họ tham quan các địa điểm thú vị ("shows them round really interesting places").</strong>`,

                q17: `<strong>Đáp án: C – an exciting journey (một chuyến đi thú vị)</strong><br>
                      <strong>Boy:</strong> <em>"I love the picture of the lion on the cover of your book."</em><br>
                      <strong>Girl:</strong> <em>"It's great! <span class='keyword-highlight'>The story's about a teenage girl who travelled across Africa on a motorbike</span>. She saw lots of amazing animals."</em><br>
                      <strong>Boy:</strong> <em>"I wouldn't be brave enough to do that."</em><br>
                      <strong>Girl:</strong> <em>"She says she's written several songs about her trip. Perhaps she'll be a well-known singer one day?"</em><br>
                      (travelled across Africa on a motorbike = exciting journey)<br><br>
                      <strong>✗ A (an unusual animal) sai:</strong> Sư tử trên bìa nhưng câu chuyện về cô gái đi du lịch, không phải về động vật.<br>
                      <strong>✗ B (a famous musician) sai:</strong> Cô gái trong truyện viết bài hát nhưng không phải câu chuyện về nhạc sĩ nổi tiếng.<br>
                      <strong>✓ C (an exciting journey) là đúng – câu chuyện về chuyến đi qua Châu Phi trên xe máy ("travelled across Africa on a motorbike").</strong>`,

                q18: `<strong>Đáp án: A – tidy the classroom (dọn dẹp lớp học)</strong><br>
                      <strong>Teacher:</strong> <em>"OK everyone, it's time to stop what you're doing. Frank, could you collect the books and put them on the shelf near the coats. And Milo, those pens should be on my desk. Everyone else, <span class='keyword-highlight'>if you notice any bits of paper on the floor, put them in the bin</span>. Then sit down and start your essays. And no copying!"</em><br><br>
                      <strong>✗ B (copy something into their books) sai:</strong> Cô nói rõ "no copying!" (không được chép).<br>
                      <strong>✗ C (get ready to go home) sai:</strong> Cô bảo ngồi xuống và bắt đầu viết bài luận ("sit down and start your essays"), không phải chuẩn bị về nhà.<br>
                      <strong>✓ A (tidy the classroom) là đúng – cô yêu cầu nhặt giấy rác trên sàn ("bits of paper on the floor, put them in the bin"), cất sách, cất bút = dọn dẹp lớp học.</strong>`,

                q19: `<strong>Đáp án: A – pleased with the information she got (hài lòng với thông tin cô tìm được)</strong><br>
                      <strong>Boy:</strong> <em>"Have you done that geography project that Mrs Williams gave us for homework?"</em><br>
                      <strong>Girl:</strong> <em>"Yes. <span class='keyword-highlight'>I watched a video online and used some of the points they talked about</span>."</em><br>
                      <strong>Boy:</strong> <em>"Oh, I didn't think of doing that."</em><br>
                      <strong>Girl:</strong> <em>"Yeah, <span class='keyword-highlight'>I found out some things that I'm hoping Mrs Williams will enjoy</span>. I wrote about half a page."</em><br>
                      <strong>Boy:</strong> <em>"That's more than I did!"</em><br><br>
                      <strong>✗ B (worried that she hasn't written enough) sai:</strong> Cô ấy không lo lắng về độ dài – viết nửa trang và nói nhiều hơn cậu bé ("That's more than I did").<br>
                      <strong>✗ C (sure that her teacher will like it) sai:</strong> Cô ấy hy vọng ("hoping") chứ không chắc chắn ("sure") giáo viên sẽ thích.<br>
                      <strong>✓ A (pleased with the information she got) là đúng – cô ấy tìm được thông tin hay từ video ("found out some things") và hài lòng với điều đó.</strong>`,

                q20: `<strong>Đáp án: C – The writer is someone they probably know (Người viết là người họ có thể quen)</strong><br>
                      <strong>Teacher:</strong> <em>"Can I have your attention, everyone? Look at this book. No, <span class='keyword-highlight'>it doesn't belong to any of you</span>. See the name on the cover? <span class='keyword-highlight'>Does it look familiar? Mrs Lam was a teacher here, remember?</span> Well, now she's an author. Isn't that interesting?"</em><br>
                      (Mrs Lam was a teacher here = someone they probably know)<br><br>
                      <strong>✗ A (One of them has lost it) sai:</strong> Sách không thuộc về học sinh nào ("doesn't belong to any of you").<br>
                      <strong>✗ B (They're going to read it together) sai:</strong> Không đề cập đọc cùng nhau – chỉ nói nếu muốn đọc thì hỏi bố mẹ ("If you'd like to read her book, ask your parents").<br>
                      <strong>✓ C (The writer is someone they probably know) là đúng – Mrs Lam từng là giáo viên ở đây ("was a teacher here") nên học sinh có thể biết.</strong>`
            },

            transcript: `
            <p><strong>PART 4</strong></p>
            <p><em>For each question, choose the correct answer.</em></p>

            <p><strong>Question 16</strong><br>
            You will hear two friends talking about a visitor who gave a talk at their school. What is the visitor's job?<br>
            <strong>Boy:</strong> <span class="highlightable" data-q="16">What did you think of today's speaker?</span><br>
            <strong>Girl:</strong> Fascinating. He has so many opportunities to travel. I'd love that.<br>
            <strong>Boy:</strong> There are lots of jobs where people can travel. Photographer, for example.<br>
            <strong>Girl:</strong> But <span class="highlightable" data-q="16">he meets so many different people and shows them round really interesting places</span>.<br>
            <strong>Boy:</strong> He had great stories, not like the last speaker, that guy who played the violin – really boring.</p>

            <p><strong>Question 17</strong><br>
            You will hear two friends talking about a book. What is the girl reading about?<br>
            <strong>Boy:</strong> <span class="highlightable" data-q="17">I love the picture of the lion on the cover of your book.</span><br>
            <strong>Girl:</strong> It's great! <span class="highlightable" data-q="17">The story's about a teenage girl who travelled across Africa on a motorbike</span>. She saw lots of amazing animals.<br>
            <strong>Boy:</strong> I wouldn't be brave enough to do that.<br>
            <strong>Girl:</strong> She says she's written several songs about her trip. Perhaps she'll be a well-known singer one day?</p>

            <p><strong>Question 18</strong><br>
            You will hear a teacher talking to her students. What does she want them to do?<br>
            <strong>Teacher:</strong> OK everyone, it's time to stop what you're doing. Frank, could you collect the books and put them on the shelf near the coats. And Milo, those pens should be on my desk. Everyone else, <span class="highlightable" data-q="18">if you notice any bits of paper on the floor, put them in the bin</span>. Then sit down and start your essays. And no copying!</p>

            <p><strong>Question 19</strong><br>
            You will hear two friends talking about some homework. How does the girl feel about her homework?<br>
            <strong>Boy:</strong> <span class="highlightable" data-q="19">Have you done that geography project that Mrs Williams gave us for homework?</span><br>
            <strong>Girl:</strong> Yes. <span class="highlightable" data-q="19">I watched a video online and used some of the points they talked about</span>.<br>
            <strong>Boy:</strong> Oh, I didn't think of doing that.<br>
            <strong>Girl:</strong> Yeah, <span class="highlightable" data-q="19">I found out some things that I'm hoping Mrs Williams will enjoy</span>. I wrote about half a page.<br>
            <strong>Boy:</strong> That's more than I did!</p>

            <p><strong>Question 20</strong><br>
            You will hear a teacher talking to his class about a book. Why is he talking to his class about the book?<br>
            <strong>Teacher:</strong> Can I have your attention, everyone? Look at this book. No, <span class="highlightable" data-q="20">it doesn't belong to any of you</span>. See the name on the cover? <span class="highlightable" data-q="20">Does it look familiar? Mrs Lam was a teacher here, remember?</span> Well, now she's an author. Isn't that interesting? If you'd like to read her book, ask your parents if you can get it.</p>

            <p><em>That is the end of Part Four.</em></p>
            `,

            questions: [
                { num: 16, text: "You will hear two friends talking about a visitor who gave a talk at their school. What is the visitor's job?", options: ["a tour guide", "a musician", "a photographer"] },
                { num: 17, text: "You will hear two friends talking about a book. What is the girl reading about?", options: ["an unusual animal", "a famous musician", "an exciting journey"] },
                { num: 18, text: "You will hear a teacher talking to her students. What does she want them to do?", options: ["tidy the classroom", "copy something into their books", "get ready to go home"] },
                { num: 19, text: "You will hear two friends talking about some homework. How does the girl feel about her homework?", options: ["pleased with the information she got", "worried that she hasn't written enough", "sure that her teacher will like it"] },
                { num: 20, text: "You will hear a teacher talking to his class about a book. Why is he talking to his class about the book?", options: ["One of them has lost it.", "They're going to read it together.", "The writer is someone they probably know."] }
            ]
        };

        document.addEventListener('DOMContentLoaded', function () {
            window.listeningCore = new ListeningCore();
            window.listeningCore.initializeTest(ketTest4Part4Data);
            console.log('KET 3 Test 4 Listening Part 4 loaded');
        });
