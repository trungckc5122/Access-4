<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PET 1 - Test 4 - Part 3</title>
    <link rel="stylesheet" href="listening-pet-common.css" id="styleLink">
</head>
<body>
<div class="test-wrapper" id="testWrapper">
    <div class="ielts-header">
        <div class="brand">
            <div class="ielts-logo">PET</div>
            <div class="candidate">B1 Preliminary 1 · Test 4 · Part 3</div>
            <div class="audio-controls">
                <audio id="listeningAudio" controls>
                    <source src="audio/B1 Preliminary 1 - Test 4 Part 3.mp3" type="audio/mpeg">
                    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg">
                </audio>
                <select class="speed-select" id="speedSelect">
                    <option value="0.7">0.7x</option>
                    <option value="0.9">0.9x</option>
                    <option value="1.0" selected>1x</option>
                    <option value="1.1">1.1x</option>
                    <option value="1.25">1.25x</option>
                </select>
                <span class="volume-icon">🔊</span>
            </div>
        </div>
        <div class="font-controls">
            <button class="font-btn" id="fontSmall">A-</button>
            <button class="font-btn" id="fontMedium">A</button>
            <button class="font-btn active" id="fontLarge">A+</button>
        </div>
        <button class="theme-toggle-btn" id="themeToggle"><span class="icon-moon">🌙</span><span class="icon-sun">☀️</span></button>
    </div>

    <div class="question-nav">
        <span style="font-weight:600; color:#1e3a5f;">Câu 14-19:</span>
        <div class="nav-buttons" id="navButtons"></div>
    </div>

    <div class="main-area" id="mainArea">
        <div class="transcript-panel" id="transcriptPanel">
            <div class="panel-header"><span>TRANSCRIPT</span></div>
            <div class="transcript-content font-large" id="transcriptContent"></div>
        </div>
        <div class="resizer" id="resizer"></div>
        <div class="questions-panel" id="questionsPanel">
            <div class="panel-header">
                <span>QUESTIONS 14-19</span>
                <span class="answer-badge" id="answeredCount">0/6 answered</span>
            </div>
            <div class="questions-list font-large centered" id="questionsContent">
                <div>
                    <h3>PART 3 Questions 14-19</h3>
                    <p><em>Write one or two words or a number or a date or a time.</em></p>
                    <div class="notes-box" id="questionsContainer"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="bottom-bar">
        <button class="btn btn-primary" id="submitBtn">Nộp bài</button>
        <button class="btn btn-success" id="explainBtn" disabled>Xem giải thích</button>
        <button class="btn btn-danger" id="resetBtn">Reset tất cả</button>
        <div class="progress" id="progressDisplay">Đã làm: 0/6</div>
    </div>

    <div class="explanation-panel" id="explanationPanel">
        <div class="resize-handle" id="explanationResizer"></div>
        <div class="explanation-header">
            <span id="explanationTitle">Giải thích</span>
            <span class="close-btn" id="closeExplanation">✕ Đóng</span>
        </div>
        <div class="explanation-content" id="explanationText"></div>
    </div>
</div>

<div class="context-menu" id="contextMenu">
    <div onclick="applyHighlight('yellow')">Highlight vàng</div>
    <div onclick="applyHighlight('green')">Highlight xanh lá</div>
    <div onclick="applyHighlight('pink')">Highlight hồng</div>
    <div onclick="removeHighlight()">Xóa highlight</div>
</div>

<script src="core-listening.js"></script>
<script>
const pet1Test4Part3Data = {
    title: "B1 Preliminary 1 · Test 4 · Part 3",
    type: "fill-blank",
    part: 3,
    book: 1,
    test: 4,

    answerKey: {
        q14: ['5', 'five'],
        q15: ['bikes', 'bicycles'],
        q16: ['lake'],
        q17: ['butterflies'],
        q18: ['castle'],
        q19: ['bus', 'bus service']
    },
    displayAnswers: {
        q14: '5 / five',
        q15: 'bikes / bicycles',
        q16: 'lake',
        q17: 'butterflies',
        q18: 'castle',
        q19: 'bus / bus service'
    },

    detailedExplanations: {
        q14: `<strong>Đáp án: 5 / five</strong><br>
              Hướng dẫn viên giải thích có hai lộ trình khả thi: một lộ trình mất 4 giờ và lộ trình kia mất 5 giờ. Anh ấy nói: <em>"We'll be taking the longer one"</em> (Chúng ta sẽ đi lộ trình dài hơn) vì nó có ít đồi hơn. Do đó, buổi đi bộ sẽ mất 5 giờ.`,
        q15: `<strong>Đáp án: bikes / bicycles</strong><br>
              Mặc dù các con đường đều tốt và thời tiết khô ráo giúp việc leo các bậc thang an toàn hơn, hướng dẫn viên vẫn cảnh báo: <em>"Please look out for bikes, though"</em> (Tuy nhiên, hãy chú ý đến xe đạp). Ô tô không phải là vấn đề vì tuyến đường tránh các đường công cộng.`,
        q16: `<strong>Đáp án: lake</strong><br>
              Hướng dẫn viên thông báo quán cà phê tại trung tâm khách tham quan đang đóng cửa để sửa chữa. Vì vậy, mọi người nên mang theo bữa trưa và họ sẽ ăn tại: <em>"a great place to eat by the lake"</em> (một nơi tuyệt vời để ăn bên hồ).`,
        q17: `<strong>Đáp án: butterflies</strong><br>
              Hướng dẫn viên đề cập rằng khu rừng nổi tiếng với loài ếch, nhưng chúng thường ẩn nấp vào ban ngày. Thay vào đó, anh ấy cho biết: <em>"there are lots of butterflies at this time of year"</em> (có rất nhiều bướm vào thời điểm này trong năm).`,
        q18: `<strong>Đáp án: castle</strong><br>
              Ở cuối buổi đi bộ không có cửa hàng lưu niệm, nhưng có một địa điểm thú vị khác: <em>"There is a castle, though"</em> (Tuy nhiên, có một lâu đài). Anh ấy mô tả nó không quá lớn nhưng thú vị và là nơi nghỉ ngơi tốt.`,
        q19: `<strong>Đáp án: bus / bus service</strong><br>
              Hướng dẫn viên giải thích rằng ga tàu hỏa đã không còn hoạt động từ lâu và taxi sẽ không đến tận đây. Vì vậy, lựa chọn duy nhất là: <em>"There's a bus service"</em> (Có một dịch vụ xe buýt), mặc dù có thể phải chờ một lúc.`
    },

    transcript: `
        <p><strong>Man:</strong> Welcome, everyone. I'm Mike, your guide on today's walk in the beautiful countryside here.</p>
        <p>I'm sure you'll want to know how long the walk will take. Well, there are two possible routes, one of which takes four hours, and the other five. <span class="highlightable" data-q="14">We'll be taking the longer one</span>, as it has fewer hills. We'll be at our destination by around two.</p>
        <p>Right, things to be careful of. It's a fairly easy route, and there are good paths. There are some steps to climb in some parts, but in this dry weather you won't slip. <span class="highlightable" data-q="15">Please look out for bikes, though.</span> Cars aren't a problem, as our route avoids public roads.</p>
        <p>I hope you've all remembered to bring lunch with you, as the café at the visitor centre we'll pass is closed for repairs. Instead, I've picked <span class="highlightable" data-q="16">a great place to eat by the lake.</span> We'll also have a shorter break at the waterfall, so you can take photos.</p>
        <p>For people who are interested in wildlife, there's plenty to see. You'll be pleased to know that <span class="highlightable" data-q="17">there are lots of butterflies at this time of year.</span> The forest is famous for its frogs, but they stay hidden away during the daytime unfortunately.</p>
        <p>At the end of our walk, I'm afraid you won't find a shop selling souvenirs, or anything like that. <span class="highlightable" data-q="18">There is a castle, though.</span> It's not very big, but it is interesting, and a nice place to rest after a long walk!</p>
        <p>Finally you'll want to get back to where we started! There used to be a railway station in the area, but it's been many years since a train went through there. <span class="highlightable" data-q="19">There's a bus service</span>, although you may have to wait a while. A taxi driver will never come this far out of town, so that's really the only option.</p>
        <p>Right, let's go!</p>
        <p><em>Now listen again.</em><br><em>That is the end of Part Three.</em></p>
    `,

    template: `
        <p>The walk will take <span class="question-number">(14)</span> <span class="blank-line"><input class="fill-input" id="q14"></span> hours.</p>
        <p>Walkers should be careful of <span class="question-number">(15)</span> <span class="blank-line"><input class="fill-input" id="q15"></span> along the route.</p>
        <p>Walkers will have lunch near the <span class="question-number">(16)</span> <span class="blank-line"><input class="fill-input" id="q16"></span> .</p>
        <p>Walkers are likely to see wildlife including <span class="question-number">(17)</span> <span class="blank-line"><input class="fill-input" id="q17"></span> .</p>
        <p>At the end of the walk, people can visit a <span class="question-number">(18)</span> <span class="blank-line"><input class="fill-input" id="q18"></span> .</p>
        <p>It's possible to take a <span class="question-number">(19)</span> <span class="blank-line"><input class="fill-input" id="q19"></span> back to the place where the walk started.</p>
    `,

    questions: [
        { num: 14 }, { num: 15 }, { num: 16 }, { num: 17 }, { num: 18 }, { num: 19 }
    ]
};

document.addEventListener('DOMContentLoaded', function() {
    window.listeningCore = new ListeningCore();
    window.listeningCore.initializeTest(pet1Test4Part3Data);
});
</script>
</body>
</html>
