<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PET 1 - Test 4 - Part 2</title>
    <link rel="stylesheet" href="listening-pet-common.css" id="styleLink">
</head>
<body>
    <div class="test-wrapper" id="testWrapper">
        <!-- Header -->
        <div class="ielts-header">
            <div class="brand">
                <div class="ielts-logo">PET</div>
                <div class="candidate">B1 Preliminary 1 · Test 4 · Part 2</div>
                <div class="audio-controls">
                    <audio id="listeningAudio" controls>
                        <source src="audio/B1 Preliminary 1 - Test 4 Part 2.mp3" type="audio/mpeg">
                        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg">
                    </audio>
                    <select class="speed-select" id="speedSelect">
                        <option value="0.7">0.7x</option>
                        <option value="0.9">0.9x</option>
                        <option value="1.0" selected>1x</option>
                        <option value="1.1">1.1x</option>
                        <option value="1.25">1.25x</option>
                    </select>
                    <span class="volume-icon">🔊</span>
                </div>
            </div>
            <div class="font-controls">
                <button class="font-btn" id="fontSmall">A-</button>
                <button class="font-btn" id="fontMedium">A</button>
                <button class="font-btn active" id="fontLarge">A+</button>
            </div>
            <div class="mode-toggle" id="modeToggleContainer">
                <span class="mode-label">Hiện đại</span>
                <label class="mode-switch" title="Chuyển đổi chế độ Cổ điển/Hiện đại">
                    <input type="checkbox" id="modeToggle">
                    <span class="mode-slider"></span>
                </label>
                <span class="mode-label">Cổ điển</span>
            </div>
            <button class="theme-toggle-btn" id="themeToggle" title="Chuyển đổi Dark/Light mode">
                <span class="icon-moon">🌙</span>
                <span class="icon-sun">☀️</span>
            </button>
        </div>

        <!-- Question navigator (8-13) -->
        <div class="question-nav">
            <span style="font-weight:600; color:#1e3a5f;">Câu 8-13:</span>
            <div class="nav-buttons" id="navButtons"></div>
        </div>

        <!-- Main area -->
        <div class="main-area" id="mainArea">
            <!-- Transcript panel (ẩn ban đầu) -->
            <div class="transcript-panel" id="transcriptPanel">
                <div class="panel-header">
                    <span>TRANSCRIPT</span>
                </div>
                <div class="transcript-content font-large" id="transcriptContent"></div>
            </div>
            <div class="resizer" id="resizer"></div>

            <!-- Questions panel -->
            <div class="questions-panel" id="questionsPanel">
                <div class="panel-header">
                    <span>QUESTIONS 8-13</span>
                    <span class="answer-badge" id="answeredCount">0/6 answered</span>
                </div>
                <div class="questions-list font-large centered" id="questionsContent">
                    <div>
                        <h3>PART 2 Questions 8-13</h3>
                        <p><em>Choose the correct answer (A, B or C).</em></p>
                        <div class="notes-box" id="questionsContainer"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Bottom bar -->
        <div class="bottom-bar">
            <button class="btn btn-primary" id="submitBtn">Nộp bài</button>
            <button class="btn btn-success" id="explainBtn" disabled>Xem giải thích</button>
            <button class="btn btn-danger" id="resetBtn">Reset tất cả</button>
            <div class="progress" id="progressDisplay">Đã làm: 0/6</div>
        </div>

        <!-- Explanation panel -->
        <div class="explanation-panel" id="explanationPanel">
            <div class="resize-handle" id="explanationResizer"></div>
            <div class="explanation-header">
                <span id="explanationTitle">Giải thích</span>
                <span class="close-btn" id="closeExplanation">✕ Đóng</span>
            </div>
            <div class="explanation-content" id="explanationText"></div>
        </div>
    </div>

    <!-- Context menu for manual highlighting -->
    <div class="context-menu" id="contextMenu">
        <div onclick="applyHighlight('yellow')">Highlight vàng</div>
        <div onclick="applyHighlight('green')">Highlight xanh lá</div>
        <div onclick="applyHighlight('pink')">Highlight hồng</div>
        <div onclick="removeHighlight()">Xóa highlight</div>
    </div>

    <!-- Core Listening Engine -->
    <script src="core-listening.js"></script>
    
    <script>
        // Test Data for PET 1 Test 4 Part 2
        const pet1Test4Part2Data = {
            title: "B1 Preliminary 1 · Test 4 · Part 2",
            type: "multiple-choice",
            part: 2,
            book: 1,
            test: 4,

            answerKey: { q8: 'A', q9: 'C', q10: 'A', q11: 'C', q12: 'A', q13: 'A' },
            displayAnswers: { q8: 'A', q9: 'C', q10: 'A', q11: 'C', q12: 'A', q13: 'A' },

            detailedExplanations: {
                q8: `<strong>Đáp án: A</strong><br>
              Người phụ nữ nhận xét về chiếc lò vi sóng: <em>"it weighs so much, can you imagine us trying to take it on the bus?"</em> (nó nặng quá, anh có tưởng tượng nổi chúng ta mang nó lên xe buýt không?). Do đó, họ quyết định đặt mua trực tuyến để được giao hàng tận nhà.
              <br><br>
              <strong>✗ Phương án B sai:</strong> Thông tin về việc hàng không có sẵn tại cửa hàng không được đề cập.
              <br>
              <strong>✗ Phương án C sai:</strong> Dù họ nhắc đến việc đi xe buýt, nhưng lí do chính là vì món đồ quá nặng để tự mang về, chứ không phải do việc đi đến cửa hàng khó khăn.
              <br>
              <strong>✓ A chính xác: Món quà quá nặng để tự mang về.</strong>`,

                q9: `<strong>Đáp án: C</strong><br>
              Người đàn ông gợi ý cô gái nên thay đổi phương tiện di chuyển để tiết kiệm thời gian: <em>"Wouldn't it be better if you flew? It would save so much time."</em> (Chẳng phải sẽ tốt hơn nếu cô bay sao? Nó sẽ tiết kiệm được rất nhiều thời gian).
              <br><br>
              <strong>✗ Phương án A sai:</strong> Cô ấy đã chọn đi Ireland, người đàn ông không hề gợi ý một địa điểm mới.
              <br>
              <strong>✗ Phương án B sai:</strong> Cô ấy đã quyết định đi hai tuần ("a fortnight"), người đàn ông không khuyên cô đi lâu hơn.
              <br>
              <strong>✓ C chính xác: Thay đổi loại phương tiện di chuyển.</strong>`,

                q10: `<strong>Đáp án: A</strong><br>
              Người đàn ông giải thích lý do không thể tham gia: <em>"my doctor told me to take things easy this week"</em> (bác sĩ bảo tôi tuần này nên vận động nhẹ nhàng/nghỉ ngơi). Điều này là để chuẩn bị cho ca phẫu thuật chân vào thứ Sáu.
              <br><br>
              <strong>✗ Phương án B sai:</strong> Anh ấy nói mình từng bị cảm nhưng giờ đã khỏi rồi ("it's over now").
              <br>
              <strong>✗ Phương án C sai:</strong> Ca phẫu thuật sẽ diễn ra vào thứ Sáu tới ("Friday"), chứ không phải anh ấy vừa mới phẫu thuật xong.
              <br>
              <strong>✓ A chính xác: Bác sĩ khuyên anh ấy nên nghỉ ngơi.</strong>`,

                q11: `<strong>Đáp án: C</strong><br>
              Khi được hỏi về diễn xuất, người phụ nữ nói: <em>"I expected them to be a lot better. Rather disappointing."</em> (Tôi đã mong đợi họ diễn tốt hơn nhiều. Khá là thất vọng).
              <br><br>
              <strong>✗ Phương án A sai:</strong> Cô ấy nhận xét hiệp hai còn kém thú vị hơn ("less interesting"), nên không phải là phim hay hơn sau giờ nghỉ.
              <br>
              <strong>✗ Phương án B sai:</strong> Cô ấy thực tế đã khen trang phục rất tuyệt vời ("The costumes were brilliant"), chứ không phải thấy chúng kỳ lạ.
              <br>
              <strong>✓ C chính xác: Diễn xuất gây thất vọng.</strong>`,

                q12: `<strong>Đáp án: A</strong><br>
              Người phụ nữ nhận xét: <em>"the music is definitely popular with a much wider range of people – all ages."</em> (âm nhạc chắc chắn phổ biến với nhiều đối tượng người nghe hơn – mọi lứa tuổi).
              <br><br>
              <strong>✗ Phương án B sai:</strong> Thông tin về việc nhạc giúp thư giãn không được nhắc đến.
              <br>
              <strong>✗ Phương án C sai:</strong> Cô ấy không đưa ra nhận xét so sánh trực tiếp rằng nhạc hay hơn phim.
              <br>
              <strong>✓ A chính xác: Nhạc phim phù hợp với mọi lứa tuổi.</strong>`,

                q13: `<strong>Đáp án: A</strong><br>
              Cả hai đều đồng ý rằng việc cập nhật tin tức mỗi sáng là rất quan trọng. Người phụ nữ nói cô kiểm tra tin tức mỗi sáng và anh ấy đáp lại: <em>"So do I"</em> (Tôi cũng vậy). Cô ấy nhấn mạnh: <em>"it's essential to know what's happening in the world"</em> (biết những gì đang xảy ra trên thế giới là điều thiết yếu).
              <br><br>
              <strong>✗ Phương án B sai:</strong> Người phụ nữ đọc tin online, nhưng người đàn ông cho biết mình thích đọc báo giấy hơn ("I prefer reading a newspaper").
              <br>
              <strong>✗ Phương án C sai:</strong> Người đàn ông thích đọc tin về người nổi tiếng, nhưng người phụ nữ lại không hề quan tâm.
              <br>
              <strong>✓ A chính xác: Đọc tin tức là một phần thiết yếu trong ngày.</strong>`
            },

            transcript: `
                <p><strong>Test Four, Part 2</strong></p>
                <p><strong>Question 8</strong><br>
                <strong>Woman:</strong> Have you decided what to get for our cousin's birthday?<br>
                <strong>Man:</strong> I thought a microwave oven would be great. I saw one in the department store.<br>
                <strong>Woman:</strong> I've seen the same model online for a similar price. But <span class="highlightable" data-q="8">it weighs so much, can you imagine us trying to take it on the bus?</span> Let's order it online and have it delivered.<br>
                <strong>Man:</strong> Good idea.</p>

                <p><strong>Question 9</strong><br>
                <strong>Woman:</strong> I'm going to Ireland for a fortnight, not just a week. I love the ferry crossing.<br>
                <strong>Man:</strong> You've been there before, haven't you? <span class="highlightable" data-q="9">Wouldn't it be better if you flew?</span> It would save so much time.<br>
                <strong>Woman:</strong> But I enjoy the sea journey.<br>
                <strong>Man:</strong> Just a suggestion.</p>

                <p><strong>Question 10</strong><br>
                <strong>Friend:</strong> Are you coming to the fitness training session today?<br>
                <strong>Man:</strong> I can't. I had a cold but it's over now. I have an operation on my foot on Friday, and <span class="highlightable" data-q="10">my doctor told me to take things easy</span> this week.<br>
                <strong>Friend:</strong> Oh, rest up then.</p>

                <p><strong>Question 11</strong><br>
                <strong>Man:</strong> What did you think of the play?<br>
                <strong>Woman:</strong> The first half was great, but the second half was less interesting. The costumes were brilliant though.<br>
                <strong>Man:</strong> And the acting?<br>
                <strong>Woman:</strong> <span class="highlightable" data-q="11">I expected them to be a lot better.</span> Rather disappointing.<br>
                <strong>Man:</strong> Yes, I agree.</p>

                <p><strong>Question 12</strong><br>
                <strong>Man:</strong> Are you listening to the soundtrack from that new film?<br>
                <strong>Woman:</strong> Yes, I love it. The film is aimed at kids, but <span class="highlightable" data-q="12">the music is definitely popular with a much wider range of people</span> – all ages.<br>
                <strong>Man:</strong> Maybe we can watch the film together sometime.<br>
                <strong>Woman:</strong> Sure.</p>

                <p><strong>Question 13</strong><br>
                <strong>Woman:</strong> I make sure I check the news every morning. I look online.<br>
                <strong>Man:</strong> <span class="highlightable" data-q="13">So do I</span>, but I prefer reading a newspaper. I must admit I enjoy reading about celebrities' lives.<br>
                <strong>Woman:</strong> I'm not interested in that stuff, but <span class="highlightable" data-q="13">it's essential to know what's happening in the world.</span><br>
                <strong>Man:</strong> Absolutely.</p>
                <p><em>Now listen again.</em></p>
                <p style="color:#666;">That is the end of Part Two.</p>
            `,

            questions: [
                { num: 8, text: "Why do they decide to buy the gift online?", options: ["It's heavy to carry home from the shop.", "It's not available in the shop.", "It's difficult to get to the shop."] },
                { num: 9, text: "The man thinks that the woman should", options: ["go somewhere new for her holiday.", "spend more time away.", "take a different type of transport."] },
                { num: 10, text: "The man cannot attend today's session because", options: ["his doctor has advised him to rest.", "he has not recovered from a cold yet.", "he has just had an operation."] },
                { num: 11, text: "What does the woman say about the play?", options: ["It improved after the interval.", "The costumes were strange.", "The acting was disappointing."] },
                { num: 12, text: "What does the woman say about the soundtrack?", options: ["It's enjoyable for all ages.", "It's relaxing to listen to.", "It's better than the film."] },
                { num: 13, text: "They agree that ______.", options: ["reading the news is an essential part of the day.", "it's best to read the news online.", "there's too much news about famous people."] }
            ]
        };

        // Initialize the listening test when DOM is loaded
        document.addEventListener('DOMContentLoaded', function() {
            window.listeningCore = new ListeningCore();
            window.listeningCore.initializeTest(pet1Test4Part2Data);
            console.log('PET 1 Test 4 Part 2 loaded with core listening engine');
        });
    </script>
</body>
