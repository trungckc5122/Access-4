<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PET 1 - Test 4 - Part 2 (Listening)</title>
    <link rel="stylesheet" href="listening-pet-common.css">
</head>
<body>
<div class="test-wrapper">
    <div class="ielts-header">
        <div class="brand">
            <div class="ielts-logo">PET</div>
            <div class="candidate">B1 Preliminary 1 · Test 4 · Part 2 (Listening)</div>
            <div class="audio-controls">
                <audio id="listeningAudio" controls>
                    <source src="B1 Preliminary 1 - Test 4 Part 2.mp3" type="audio/mpeg">
                </audio>
                <select class="speed-select" id="speedSelect">
                    <option value="0.7">0.7x</option>
                    <option value="0.9">0.9x</option>
                    <option value="1.0" selected>1x</option>
                    <option value="1.1">1.1x</option>
                    <option value="1.25">1.25x</option>
                </select>
                <span class="volume-icon">🔊</span>
            </div>
        </div>
        <div class="font-controls">
            <button class="font-btn" id="fontSmall">A-</button>
            <button class="font-btn" id="fontMedium">A</button>
            <button class="font-btn active" id="fontLarge">A+</button>
        </div>
        <button class="theme-toggle-btn" id="themeToggle" title="Chuyển đổi Dark/Light mode">
            <span class="icon-moon">🌙</span>
            <span class="icon-sun">☀️</span>
        </button>
    </div>

    <div class="question-nav">
        <span style="font-weight:600; color:#1e3a5f;">Questions 8-13:</span>
        <div class="nav-buttons" id="navButtons"></div>
    </div>

    <div class="main-area" id="mainArea">
        <div class="transcript-panel" id="transcriptPanel">
            <div class="panel-header"><span>TRANSCRIPT (TEST 4, PART 2)</span></div>
            <div class="transcript-content font-large" id="transcriptContent"></div>
        </div>
        <div class="resizer" id="resizer"></div>

        <div class="questions-panel" id="questionsPanel">
            <div class="panel-header">
                <span>QUESTIONS 8-13</span>
                <span class="answer-badge" id="answeredCount">0/6 answered</span>
            </div>
            <div class="questions-list font-large centered" id="questionsContent">
                <div>
                    <h3>PART 2 Questions 8-13</h3>
                    <p><em>Choose the correct answer (A, B or C).</em></p>
                    <div class="notes-box" id="questionsContainer"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="bottom-bar">
        <button class="btn btn-primary" id="submitBtn">Nộp bài</button>
        <button class="btn btn-success" id="explainBtn" disabled>Xem giải thích</button>
        <button class="btn btn-danger" id="resetBtn">Reset tất cả</button>
        <div class="progress" id="progressDisplay">Đã làm: 0/6</div>
    </div>

    <div class="explanation-panel" id="explanationPanel">
        <div class="resize-handle" id="explanationResizer"></div>
        <div class="explanation-header">
            <span id="explanationTitle">Giải thích</span>
            <span class="close-btn" id="closeExplanation">✕ Đóng</span>
        </div>
        <div class="explanation-content" id="explanationText"></div>
    </div>
</div>

<div class="context-menu" id="contextMenu">
    <div onclick="applyHighlight('yellow')">Highlight vàng</div>
    <div onclick="applyHighlight('green')">Highlight xanh lá</div>
    <div onclick="applyHighlight('pink')">Highlight hồng</div>
    <div onclick="removeHighlight()">Xóa highlight</div>
</div>

<script>
    (function() {
        // ---------- ANSWER KEY (Test 4 Part 2) based on provided explanations ----------
        const answerKey = {
            q8: 'A',   // heavy to carry home
            q9: 'C',   // different transport (fly)
            q10: 'A',  // doctor advised to rest
            q11: 'C',  // acting disappointing
            q12: 'A',  // enjoyable for all ages
            q13: 'A'   // essential part of day
        };
        const displayAnswers = { ...answerKey };

        // ---------- DETAILED EXPLANATIONS (based on Test 3 style) ----------
        const detailedExplanations = {
            q8: `<strong>Đáp án: A</strong><br>
                  Người phụ nữ nhận xét về chiếc lò vi sóng: <em>"it weighs so much, can you imagine us trying to take it on the bus?"</em> (nó nặng quá, anh có tưởng tượng nổi chúng ta mang nó lên xe buýt không?). Do đó, họ quyết định đặt mua trực tuyến để được giao hàng tận nhà.
                  <br><br>
                  <strong>✗ Phương án B sai:</strong> Thông tin về việc hàng không có sẵn tại cửa hàng không được đề cập.
                  <br>
                  <strong>✗ Phương án C sai:</strong> Dù họ nhắc đến việc đi xe buýt, nhưng lí do chính là vì món đồ quá nặng để tự mang về, chứ không phải do việc đi đến cửa hàng khó khăn.
                  <br>
                  <strong>✓ A chính xác: Món quà quá nặng để tự mang về.</strong>`,
            q9: `<strong>Đáp án: C</strong><br>
                  Người đàn ông gợi ý cô gái nên thay đổi phương tiện di chuyển để tiết kiệm thời gian: <em>"Wouldn't it be better if you flew? It would save so much time."</em> (Chẳng phải sẽ tốt hơn nếu cô bay sao? Nó sẽ tiết kiệm được rất nhiều thời gian).
                  <br><br>
                  <strong>✗ Phương án A sai:</strong> Cô ấy đã chọn đi Ireland, người đàn ông không hề gợi ý một địa điểm mới.
                  <br>
                  <strong>✗ Phương án B sai:</strong> Cô ấy đã quyết định đi hai tuần ("a fortnight"), người đàn ông không khuyên cô đi lâu hơn.
                  <br>
                  <strong>✓ C chính xác: Thay đổi loại phương tiện di chuyển.</strong>`,
            q10: `<strong>Đáp án: A</strong><br>
                  Người đàn ông giải thích lý do không thể tham gia: <em>"my doctor told me to take things easy this week"</em> (bác sĩ bảo tôi tuần này nên vận động nhẹ nhàng/nghỉ ngơi). Điều này là để chuẩn bị cho ca phẫu thuật chân vào thứ Sáu.
                  <br><br>
                  <strong>✗ Phương án B sai:</strong> Anh ấy nói mình từng bị cảm nhưng giờ đã khỏi rồi ("it's over now").
                  <br>
                  <strong>✗ Phương án C sai:</strong> Ca phẫu thuật sẽ diễn ra vào thứ Sáu tới ("Friday"), chứ không phải anh ấy vừa mới phẫu thuật xong.
                  <br>
                  <strong>✓ A chính xác: Bác sĩ khuyên anh ấy nên nghỉ ngơi.</strong>`,
            q11: `<strong>Đáp án: C</strong><br>
                  Khi được hỏi về diễn xuất, người phụ nữ nói: <em>"I expected them to be a lot better. Rather disappointing."</em> (Tôi đã mong đợi họ diễn tốt hơn nhiều. Khá là thất vọng).
                  <br><br>
                  <strong>✗ Phương án A sai:</strong> Cô ấy nhận xét hiệp hai còn kém thú vị hơn ("less interesting"), nên không phải là phim hay hơn sau giờ nghỉ.
                  <br>
                  <strong>✗ Phương án B sai:</strong> Cô ấy thực tế đã khen trang phục rất tuyệt vời ("The costumes were brilliant"), chứ không phải thấy chúng kỳ lạ.
                  <br>
                  <strong>✓ C chính xác: Diễn xuất gây thất vọng.</strong>`,
            q12: `<strong>Đáp án: A</strong><br>
                  Người phụ nữ nhận xét: <em>"the music is definitely popular with a much wider range of people – all ages."</em> (âm nhạc chắc chắn phổ biến với nhiều đối tượng người nghe hơn – mọi lứa tuổi).
                  <br><br>
                  <strong>✗ Phương án B sai:</strong> Thông tin về việc nhạc giúp thư giãn không được nhắc đến.
                  <br>
                  <strong>✗ Phương án C sai:</strong> Cô ấy không đưa ra nhận xét so sánh trực tiếp rằng nhạc hay hơn phim.
                  <br>
                  <strong>✓ A chính xác: Nhạc phim phù hợp với mọi lứa tuổi.</strong>`,
            q13: `<strong>Đáp án: A</strong><br>
                  Cả hai đều đồng ý rằng việc cập nhật tin tức mỗi sáng là rất quan trọng. Người phụ nữ nói cô kiểm tra tin tức mỗi sáng và anh ấy đáp lại: <em>"So do I"</em> (Tôi cũng vậy). Cô ấy nhấn mạnh: <em>"it's essential to know what's happening in the world"</em> (biết những gì đang xảy ra trên thế giới là điều thiết yếu).
                  <br><br>
                  <strong>✗ Phương án B sai:</strong> Người phụ nữ đọc tin online, nhưng người đàn ông cho biết mình thích đọc báo giấy hơn ("I prefer reading a newspaper").
                  <br>
                  <strong>✗ Phương án C sai:</strong> Người đàn ông thích đọc tin về người nổi tiếng, nhưng người phụ nữ lại không hề quan tâm.
                  <br>
                  <strong>✓ A chính xác: Đọc tin tức là một phần thiết yếu trong ngày.</strong>`
        };

        // ---------- TRANSCRIPT (simulated based on answer key) ----------
        const transcriptHTML = `
            <p><strong>Test Four, Part 2</strong></p>
            <p><strong>Question 8</strong><br>
            <strong>Woman:</strong> Have you decided what to get for our cousin's birthday?<br>
            <strong>Man:</strong> I thought a microwave oven would be great. I saw one in the department store.<br>
            <strong>Woman:</strong> I've seen the same model online for a similar price. But <span class="highlightable" data-q="8">it weighs so much, can you imagine us trying to take it on the bus?</span> Let's order it online and have it delivered.<br>
            <strong>Man:</strong> Good idea.</p>

            <p><strong>Question 9</strong><br>
            <strong>Woman:</strong> I'm going to Ireland for a fortnight, not just a week. I love the ferry crossing.<br>
            <strong>Man:</strong> You've been there before, haven't you? <span class="highlightable" data-q="9">Wouldn't it be better if you flew?</span> It would save so much time.<br>
            <strong>Woman:</strong> But I enjoy the sea journey.<br>
            <strong>Man:</strong> Just a suggestion.</p>

            <p><strong>Question 10</strong><br>
            <strong>Friend:</strong> Are you coming to the fitness training session today?<br>
            <strong>Man:</strong> I can't. I had a cold but it's over now. I have an operation on my foot on Friday, and <span class="highlightable" data-q="10">my doctor told me to take things easy</span> this week.<br>
            <strong>Friend:</strong> Oh, rest up then.</p>

            <p><strong>Question 11</strong><br>
            <strong>Man:</strong> What did you think of the play?<br>
            <strong>Woman:</strong> The first half was great, but the second half was less interesting. The costumes were brilliant though.<br>
            <strong>Man:</strong> And the acting?<br>
            <strong>Woman:</strong> <span class="highlightable" data-q="11">I expected them to be a lot better.</span> Rather disappointing.<br>
            <strong>Man:</strong> Yes, I agree.</p>

            <p><strong>Question 12</strong><br>
            <strong>Man:</strong> Are you listening to the soundtrack from that new film?<br>
            <strong>Woman:</strong> Yes, I love it. The film is aimed at kids, but <span class="highlightable" data-q="12">the music is definitely popular with a much wider range of people</span> – all ages.<br>
            <strong>Man:</strong> Maybe we can watch the film together sometime.<br>
            <strong>Woman:</strong> Sure.</p>

            <p><strong>Question 13</strong><br>
            <strong>Woman:</strong> I make sure I check the news every morning. I look online.<br>
            <strong>Man:</strong> <span class="highlightable" data-q="13">So do I</span>, but I prefer reading a newspaper. I must admit I enjoy reading about celebrities' lives.<br>
            <strong>Woman:</strong> I'm not interested in that stuff, but <span class="highlightable" data-q="13">it's essential to know what's happening in the world.</span><br>
            <strong>Man:</strong> Absolutely.</p>
            <p><em>Now listen again.</em></p>
            <p style="color:#666;">That is the end of Part Two.</p>
        `;

        // ---------- QUESTIONS DATA (exact options from images) ----------
        const questionsData = [
            { num: 8, text: "Why do they decide to buy the gift online?", options: ["It’s heavy to carry home from the shop.", "It’s not available in the shop.", "It’s difficult to get to the shop."] },
            { num: 9, text: "The man thinks that the woman should", options: ["go somewhere new for her holiday.", "spend more time away.", "take a different type of transport."] },
            { num: 10, text: "The man cannot attend today’s session because", options: ["his doctor has advised him to rest.", "he has not recovered from a cold yet.", "he has just had an operation."] },
            { num: 11, text: "What does the woman say about the play?", options: ["It improved after the interval.", "The costumes were strange.", "The acting was disappointing."] },
            { num: 12, text: "What does the woman say about the soundtrack?", options: ["It's enjoyable for all ages.", "It's relaxing to listen to.", "It's better than the film."] },
            { num: 13, text: "They agree that ______.", options: ["reading the news is an essential part of the day.", "it's best to read the news online.", "there's too much news about famous people."] }
        ];

        // ---------- GLOBAL STATE ----------
        let examSubmitted = false;
        let explanationMode = false;
        const audio = document.getElementById('listeningAudio');
        const speedSelect = document.getElementById('speedSelect');
        speedSelect.addEventListener('change', () => { if(audio) audio.playbackRate = parseFloat(speedSelect.value); });

        function getUserAnswer(q) {
            const radios = document.getElementsByName(`q${q}`);
            for(let r of radios) if(r.checked) return r.value;
            return null;
        }
        function isAnswerCorrect(q, user) { return user === answerKey[`q${q}`]; }
        function updateAnswerCount() {
            let answered = 0;
            for(let i=8;i<=13;i++) if(getUserAnswer(i)) answered++;
            document.getElementById('answeredCount').textContent = `${answered}/6 answered`;
            document.getElementById('progressDisplay').textContent = `Đã làm: ${answered}/6`;
            for(let i=8;i<=13;i++) {
                const btn = document.querySelector(`.nav-btn[data-question="${i}"]`);
                if(btn) {
                    btn.classList.remove('answered','unanswered');
                    btn.classList.add(getUserAnswer(i) ? 'answered' : 'unanswered');
                }
            }
        }
        function createNavButtons() {
            const nav = document.getElementById('navButtons');
            nav.innerHTML = '';
            for(let i=8;i<=13;i++) {
                const btn = document.createElement('button');
                btn.className = 'nav-btn unanswered';
                btn.textContent = i;
                btn.dataset.question = i;
                btn.addEventListener('click', () => {
                    document.getElementById(`question-${i}`)?.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                });
                nav.appendChild(btn);
            }
        }
        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            questionsData.forEach(q => {
                const div = document.createElement('div');
                div.className = 'question-item';
                div.id = `question-${q.num}`;
                div.innerHTML = `
                    <div class="question-text">${q.num}. ${q.text}</div>
                    <div class="options">
                        ${q.options.map((opt, idx) => `
                            <div class="option">
                                <input type="radio" name="q${q.num}" value="${String.fromCharCode(65+idx)}" id="q${q.num}${String.fromCharCode(65+idx)}">
                                <label for="q${q.num}${String.fromCharCode(65+idx)}">${String.fromCharCode(65+idx)}. ${opt}</label>
                            </div>
                        `).join('')}
                    </div>
                    <span class="eye-icon" data-question="${q.num}">👁️</span>
                `;
                container.appendChild(div);
            });
            document.querySelectorAll('input[type="radio"]').forEach(radio => radio.addEventListener('change', updateAnswerCount));
        }
        function markAnswers() {
            for(let i=8;i<=13;i++) {
                const qDiv = document.getElementById(`question-${i}`);
                if(!qDiv) continue;
                const user = getUserAnswer(i);
                const correct = isAnswerCorrect(i, user);
                qDiv.classList.remove('correct','incorrect');
                const oldBadge = qDiv.querySelector('.correct-answer-badge');
                if(oldBadge) oldBadge.remove();
                if(correct) qDiv.classList.add('correct');
                else {
                    qDiv.classList.add('incorrect');
                    const badge = document.createElement('span');
                    badge.className = 'correct-answer-badge';
                    badge.textContent = `Đáp án đúng: ${displayAnswers[`q${i}`]}`;
                    qDiv.appendChild(badge);
                }
            }
        }
        function showExplanation(questionNum) {
            if(!explanationMode && !examSubmitted) return;
            document.querySelectorAll('.transcript-highlight').forEach(el => el.classList.remove('transcript-highlight'));
            document.querySelectorAll('.keyword-highlight').forEach(el => el.classList.remove('keyword-highlight'));
            const spans = document.querySelectorAll(`.highlightable[data-q="${questionNum}"]`);
            spans.forEach(span => {
                const parentP = span.closest('p');
                if(parentP) parentP.classList.add('transcript-highlight');
                span.classList.add('keyword-highlight');
                span.scrollIntoView({ behavior: 'smooth', block: 'center' });
                span.classList.add('scroll-highlight');
                setTimeout(() => span.classList.remove('scroll-highlight'), 1000);
            });
            document.getElementById('explanationPanel').classList.add('show');
            document.getElementById('explanationTitle').textContent = `Giải thích câu ${questionNum}`;
            let html = detailedExplanations[`q${questionNum}`] || `<strong>Đáp án: ${displayAnswers[`q${questionNum}`]}</strong><br>`;
            if(examSubmitted) {
                const user = getUserAnswer(questionNum) || '(chưa chọn)';
                const isCor = isAnswerCorrect(questionNum, user);
                html += `<div style="margin-top:10px;padding:10px;background:${isCor?'#e8f5e8':'#ffebee'};border-radius:5px;">
                          <strong>Câu trả lời của bạn:</strong> ${user}<br>${!isCor ? `<strong>Đáp án đúng:</strong> ${displayAnswers[`q${questionNum}`]}` : '✅ Đúng!'}
                          </div>`;
            }
            document.getElementById('explanationText').innerHTML = html;
        }
        function resetAll() {
            examSubmitted = false; explanationMode = false;
            for(let i=8;i<=13;i++) {
                document.getElementsByName(`q${i}`).forEach(r => { r.checked = false; r.disabled = false; });
                const qDiv = document.getElementById(`question-${i}`);
                if(qDiv) { qDiv.classList.remove('correct','incorrect'); const b = qDiv.querySelector('.correct-answer-badge'); if(b) b.remove(); }
            }
            document.getElementById('mainArea').classList.remove('show-transcript');
            document.getElementById('transcriptContent').innerHTML = '';
            document.querySelectorAll('.eye-icon').forEach(icon => icon.style.display = 'none');
            document.querySelectorAll('.transcript-highlight, .keyword-highlight').forEach(el => el.classList.remove('transcript-highlight','keyword-highlight'));
            document.getElementById('submitBtn').disabled = false;
            document.getElementById('submitBtn').textContent = 'Nộp bài';
            document.getElementById('explainBtn').disabled = true;
            document.getElementById('explainBtn').textContent = 'Xem giải thích';
            document.getElementById('explanationPanel').classList.remove('show');
            updateAnswerCount();
        }

        // Save to localStorage
        function saveToDashboard() {
            if(!examSubmitted) return;
            let correctCount = 0;
            const details = [];
            for(let i=8;i<=13;i++) {
                const user = getUserAnswer(i);
                const isCor = user === answerKey[`q${i}`];
                if(isCor) correctCount++;
                details.push({ question: i, user: user || '(trống)', correct: displayAnswers[`q${i}`], isCorrect: isCor });
            }
            const partData = { partId: 2, name: "Part 2", totalQuestions: 6, correctCount, details };
            localStorage.setItem(`pet_listening_book1_test4_part2`, JSON.stringify(partData));
        }

        // Event listeners
        document.getElementById('submitBtn').addEventListener('click', () => {
            if(examSubmitted) return;
            let unanswered = [];
            for(let i=8;i<=13;i++) if(!getUserAnswer(i)) unanswered.push(i);
            if(unanswered.length && !confirm(`Bạn còn ${unanswered.length} câu chưa chọn. Nộp bài?`)) return;
            examSubmitted = true;
            document.getElementById('mainArea').classList.add('show-transcript');
            document.getElementById('transcriptContent').innerHTML = transcriptHTML;
            markAnswers();
            document.getElementById('submitBtn').disabled = true;
            document.getElementById('submitBtn').textContent = 'Đã nộp bài';
            document.getElementById('explainBtn').disabled = false;
            let correctCount = 0;
            for(let i=8;i<=13;i++) if(isAnswerCorrect(i, getUserAnswer(i))) correctCount++;
            document.getElementById('explanationPanel').classList.add('show');
            document.getElementById('explanationTitle').textContent = 'KẾT QUẢ';
            document.getElementById('explanationText').innerHTML = `<h4>Bạn đã nộp bài</h4><p><strong>Đúng:</strong> ${correctCount}/6</p><p>Nhấn "Xem giải thích" để xem chi tiết.</p>`;
            document.querySelectorAll('input[type="radio"]').forEach(el => el.disabled = true);
            saveToDashboard();
        });
        document.getElementById('explainBtn').addEventListener('click', () => {
            if(!examSubmitted) return;
            explanationMode = true;
            document.querySelectorAll('.eye-icon, .correct-answer-badge').forEach(el => el.style.display = 'inline-block');
            document.getElementById('explainBtn').disabled = true;
            document.getElementById('explainBtn').textContent = 'Đang xem giải thích';
        });
        document.getElementById('resetBtn').addEventListener('click', () => { if(confirm('Reset tất cả câu trả lời?')) resetAll(); });
        document.getElementById('closeExplanation').addEventListener('click', () => {
            document.getElementById('explanationPanel').classList.remove('show');
            document.querySelectorAll('.transcript-highlight, .keyword-highlight').forEach(el => el.classList.remove('transcript-highlight','keyword-highlight'));
        });
        document.addEventListener('click', (e) => { if(e.target.classList.contains('eye-icon')) showExplanation(e.target.dataset.question); });

        // Font resize
        function setFontSize(size) {
            ['small','medium','large'].forEach(s => document.getElementById(`font${s.charAt(0).toUpperCase()+s.slice(1)}`).classList.remove('active'));
            document.getElementById(`font${size.charAt(0).toUpperCase()+size.slice(1)}`).classList.add('active');
            document.querySelectorAll('.transcript-content, .questions-list').forEach(el => {
                el.className = `transcript-content font-${size}`;
                if(el.classList.contains('questions-list')) el.classList.add('centered');
            });
        }
        document.getElementById('fontSmall').addEventListener('click', () => setFontSize('small'));
        document.getElementById('fontMedium').addEventListener('click', () => setFontSize('medium'));
        document.getElementById('fontLarge').addEventListener('click', () => setFontSize('large'));

        // Resizer
        const transcriptPanel = document.getElementById('transcriptPanel'), questionsPanel = document.getElementById('questionsPanel'), resizer = document.getElementById('resizer');
        let isResizing = false;
        resizer.addEventListener('mousedown', (e) => { isResizing = true; document.body.style.cursor = 'col-resize'; e.preventDefault(); });
        document.addEventListener('mousemove', (e) => {
            if(!isResizing) return;
            const rect = document.getElementById('mainArea').getBoundingClientRect();
            let leftWidth = e.clientX - rect.left - 4;
            if(leftWidth < 250) leftWidth = 250;
            if(leftWidth > rect.width - 250) leftWidth = rect.width - 250;
            transcriptPanel.style.width = leftWidth + 'px';
            questionsPanel.style.width = (rect.width - leftWidth - 8) + 'px';
        });
        document.addEventListener('mouseup', () => { isResizing = false; document.body.style.cursor = 'default'; });

        // Context menu manual highlight
        let selectedRange = null;
        const contextMenu = document.getElementById('contextMenu');
        window.removeHighlight = function() {
            if(selectedRange) {
                const highlights = document.querySelectorAll('.highlight-yellow, .highlight-green, .highlight-pink');
                highlights.forEach(h => { if(selectedRange.intersectsNode(h)) h.replaceWith(...h.childNodes); });
            }
            contextMenu.style.display = 'none'; selectedRange = null;
        };
        window.applyHighlight = function(color) {
            if(selectedRange) {
                const span = document.createElement('span');
                span.className = `highlight-${color}`;
                span.appendChild(selectedRange.extractContents());
                selectedRange.insertNode(span);
            }
            contextMenu.style.display = 'none'; selectedRange = null;
        };
        const transcriptDiv = document.getElementById('transcriptContent');
        if(transcriptDiv) {
            transcriptDiv.addEventListener('contextmenu', (e) => {
                const sel = window.getSelection();
                if(sel.toString().trim()) { e.preventDefault(); selectedRange = sel.getRangeAt(0); contextMenu.style.left = e.pageX+'px'; contextMenu.style.top = e.pageY+'px'; contextMenu.style.display = 'block'; }
            });
        }
        document.addEventListener('click', (e) => { if(!e.target.closest('.context-menu')) contextMenu.style.display = 'none'; });

        // Initialize
        createNavButtons();
        renderQuestions();
        updateAnswerCount();
        document.querySelectorAll('.eye-icon').forEach(icon => icon.style.display = 'none');
        setFontSize('large');

        // ==================== THEME TOGGLE ====================
        const themeToggle = document.getElementById('themeToggle');
        const html = document.documentElement;
        const savedTheme = localStorage.getItem('pet-theme');
        if (savedTheme === 'dark') {
            html.setAttribute('data-theme', 'dark');
        }
        themeToggle.addEventListener('click', () => {
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('pet-theme', newTheme);
        });

            // Resizable explanation panel logic
            const expPanel = document.getElementById('explanationPanel');
            const expResizer = document.getElementById('explanationResizer');
            let isResizingExp = false;
            let startYExp, startHeightExp;

            if (expResizer && expPanel) {
                expResizer.addEventListener('mousedown', (e) => {
                    isResizingExp = true;
                    startYExp = e.clientY;
                    startHeightExp = expPanel.offsetHeight;
                    document.body.style.cursor = 'ns-resize';
                    document.body.style.userSelect = 'none';
                });

                document.addEventListener('mousemove', (e) => {
                    if (!isResizingExp) return;
                    const dy = startYExp - e.clientY;
                    const newHeight = startHeightExp + dy;
                    if (newHeight > 100 && newHeight < window.innerHeight * 0.8) {
                        expPanel.style.maxHeight = newHeight + 'px';
                        expPanel.style.height = newHeight + 'px';
                    }
                });

                document.addEventListener('mouseup', () => {
                    isResizingExp = false;
                    document.body.style.cursor = 'default';
                    document.body.style.userSelect = 'auto';
                });
            }
        })();
</script>
</body>
</html>
