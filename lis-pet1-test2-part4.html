<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PET 1 - Test 2 - Part 4</title>
    <link rel="stylesheet" href="listening-pet-common.css" id="styleLink">
</head>
<body>
<div class="test-wrapper" id="testWrapper">
    <!-- Header -->
    <div class="ielts-header">
        <div class="brand">
            <div class="ielts-logo">PET</div>
            <div class="candidate">B1 Preliminary 1 · Test 2 · Part 4</div>
            <div class="audio-controls">
                <audio id="listeningAudio" controls>
                    <source src="audio/B1 Preliminary 1 - Test 2 Part 4.mp3" type="audio/mpeg">
                    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg">
                </audio>
                <select class="speed-select" id="speedSelect">
                    <option value="0.7">0.7x</option>
                    <option value="0.9">0.9x</option>
                    <option value="1.0" selected>1x</option>
                    <option value="1.1">1.1x</option>
                    <option value="1.25">1.25x</option>
                </select>
                <span class="volume-icon">🔊</span>
            </div>
        </div>
        <div class="font-controls">
            <button class="font-btn" id="fontSmall">A-</button>
            <button class="font-btn" id="fontMedium">A</button>
            <button class="font-btn active" id="fontLarge">A+</button>
        </div>
        <button class="theme-toggle-btn" id="themeToggle" title="Chuyển đổi Dark/Light mode">
            <span class="icon-moon">🌙</span>
            <span class="icon-sun">☀️</span>
        </button>
    </div>

    <!-- Question navigator (20-25) -->
    <div class="question-nav">
        <span style="font-weight:600; color:#1e3a5f;">Câu 20-25:</span>
        <div class="nav-buttons" id="navButtons"></div>
    </div>

    <!-- Main area -->
    <div class="main-area" id="mainArea">
        <!-- Transcript panel (ẩn ban đầu) -->
        <div class="transcript-panel" id="transcriptPanel">
            <div class="panel-header">
                <span>TRANSCRIPT</span>
            </div>
            <div class="transcript-content font-large" id="transcriptContent"></div>
        </div>
        <div class="resizer" id="resizer"></div>

        <!-- Questions panel -->
        <div class="questions-panel" id="questionsPanel">
            <div class="panel-header">
                <span>QUESTIONS 20-25</span>
                <span class="answer-badge" id="answeredCount">0/6 answered</span>
            </div>
            <div class="questions-list font-large centered" id="questionsContent">
                <div>
                    <h3>PART 4 Questions 20-25</h3>
                    <p><em>Choose the correct answer (A, B or C).</em></p>
                    <div class="notes-box" id="questionsContainer"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bottom bar -->
    <div class="bottom-bar">
        <button class="btn btn-primary" id="submitBtn">Nộp bài</button>
        <button class="btn btn-success" id="explainBtn" disabled>Xem giải thích</button>
        <button class="btn btn-danger" id="resetBtn">Reset tất cả</button>
        <div class="progress" id="progressDisplay">Đã làm: 0/6</div>
    </div>

    <!-- Explanation panel -->
    <div class="explanation-panel" id="explanationPanel">
        <div class="resize-handle" id="explanationResizer"></div>
        <div class="explanation-header">
            <span id="explanationTitle">Giải thích</span>
            <span class="close-btn" id="closeExplanation">✕ Đóng</span>
        </div>
        <div class="explanation-content" id="explanationText"></div>
    </div>
</div>

<!-- Context menu for manual highlighting -->
<div class="context-menu" id="contextMenu">
    <div onclick="applyHighlight('yellow')">Highlight vàng</div>
    <div onclick="applyHighlight('green')">Highlight xanh lá</div>
    <div onclick="applyHighlight('pink')">Highlight hồng</div>
    <div onclick="removeHighlight()">Xóa highlight</div>
</div>

<!-- Core Listening Engine -->
<script src="core-listening.js"></script>

<script>
    // Test Data for PET 1 Test 2 Part 4
    const pet1Test2Part4Data = {
        title: "B1 Preliminary 1 · Test 2 · Part 4",
        type: "multiple-choice",
        part: 4,
        book: 1,
        test: 2,

        // Answer Key
        answerKey: {
            q20: 'B',
            q21: 'C',
            q22: 'A',
            q23: 'C',
            q24: 'A',
            q25: 'B'
        },

        // Display Answers
        displayAnswers: {
            q20: 'B',
            q21: 'C',
            q22: 'A',
            q23: 'C',
            q24: 'A',
            q25: 'B'
        },

        // Detailed Explanations
        detailedExplanations: {
            q20: `<strong>Đáp án: B – She wanted to become as good as her brother</strong><br>
                  Rosie nói: <em>"<span class='keyword-highlight'>Joel was better at swimming than anyone we knew, and I practised as often as possible so I could swim as fast as him</span>."</em> Cô tập luyện nhiều vì muốn bơi nhanh như anh trai.
                  <br><br>
                  <strong>✗ A (Her father thought it was an important skill) sai:</strong> Bố chỉ muốn hai anh em có hoạt động thay vì xem màn hình (<em>"<span class='keyword-highlight'>didn't want us to look at a screen</span>"</em>), không phải vì đó là kỹ năng quan trọng.
                  <br>
                  <strong>✗ C (She could attend classes for free at the local pool) sai:</strong> Không có thông tin về việc học miễn phí.
                  <br>
                  <strong>✓ B (She wanted to become as good as her brother) là đáp án đúng.</strong>`,

            q21: `<strong>Đáp án: C – She was sometimes unable to go to school</strong><br>
                  Rosie giải thích: <em>"<span class='keyword-highlight'>With all the training and competitions, I couldn't attend school sometimes, which I was unhappy about</span>."</em> Cô không thích việc bỏ lỡ một số buổi học.
                  <br><br>
                  <strong>✗ A (She saw her friends less often than she wanted to) sai:</strong> Cô bận rộn nhưng vẫn gặp bạn khi có thời gian (<em>"<span class='keyword-highlight'>I still met up with them when I had time</span>"</em>).
                  <br>
                  <strong>✗ B (She found the journey to the pool boring) sai:</strong> Chuyến đi dài nhưng cô nói mẹ chở và hai mẹ con nói chuyện vui vẻ (<em>"<span class='keyword-highlight'>we enjoyed chatting on the journey</span>"</em>).
                  <br>
                  <strong>✓ C (She was sometimes unable to go to school) là đáp án đúng.</strong>`,

            q22: `<strong>Đáp án: A – how much public interest there was in her success</strong><br>
                  Khi thắng giải, Rosie nói: <em>"<span class='keyword-highlight'>I couldn't believe people wanted to read and watch interviews with me!</span>"</em> Cô ngạc nhiên vì công chúng quan tâm đến mình.
                  <br><br>
                  <strong>✗ B (how well she performed in the race) sai:</strong> Cô không ngạc nhiên về thành tích vì đã tập luyện chăm chỉ và dự kiến làm tốt (<em>"<span class='keyword-highlight'>I expected to do well</span>"</em>).
                  <br>
                  <strong>✗ C (meeting other famous sports stars) sai:</strong> Cô nhắc tới các ngôi sao thể thao khác như sự so sánh (<em>"<span class='keyword-highlight'>usually famous footballers or tennis stars people love watching</span>"</em>), không phải vì được gặp họ.
                  <br>
                  <strong>✓ A (how much public interest there was in her success) là đáp án đúng.</strong>`,

            q23: `<strong>Đáp án: C – help with accommodation costs</strong><br>
                  Rosie chia sẻ: <em>"<span class='keyword-highlight'>It'd be great if they also gave me financial support for hotels, as my parents have to spend a lot on that kind of thing</span>."</em> Cô cần hỗ trợ chi phí lưu trú (khách sạn) khi ở nước ngoài.
                  <br><br>
                  <strong>✗ A (more free time to travel abroad) sai:</strong> Không liên quan đến vấn đề tài chính.
                  <br>
                  <strong>✗ B (free sports equipment and clothes) sai:</strong> Công ty đã đưa đồ thể thao (<em>"<span class='keyword-highlight'>their swimsuits, bags and other stuff</span>"</em>) và trả tiền vé máy bay.
                  <br>
                  <strong>✓ C (help with accommodation costs) là đáp án đúng - hỗ trợ chi phí khách sạn.</strong>`,

            q24: `<strong>Đáp án: A – Her swimming style</strong><br>
                  Với huấn luyện viên mới: <em>"<span class='keyword-highlight'>thanks to her suggestions about the way I move my arms through the water, I've already seen improvements in my speed</span>."</em> Cô đã thay đổi cách di chuyển tay qua dòng nước - tức là kiểu bơi (swimming style).
                  <br><br>
                  <strong>✗ B (Her daily diet) sai:</strong> Huấn luyện viên kiểm tra chế độ ăn nhưng hài lòng và không thay đổi (<em>"<span class='keyword-highlight'>luckily she was satisfied with that</span>"</em>).
                  <br>
                  <strong>✗ C (Her fitness training) sai:</strong> Thói quen tập fitness không đổi (<em>"<span class='keyword-highlight'>I'm doing the same regular fitness training</span>"</em>).
                  <br>
                  <strong>✓ A (Her swimming style) là đáp án đúng.</strong>`,

            q25: `<strong>Đáp án: B – She will train with swimmers she doesn't know</strong><br>
                  Kế hoạch ở Tây Ban Nha: <em>"<span class='keyword-highlight'>I'll work with lots of swimmers I haven't met before</span>."</em> Cô sẽ tập luyện với những người mới - khác với những người cô đã biết.
                  <br><br>
                  <strong>✗ A (She will not have to compete in any races) sai:</strong> Đúng là cô không tham gia giải đua (<em>"<span class='keyword-highlight'>I won't do any races</span>"</em>), nhưng đây không phải là điều khác biệt so với bình thường - câu hỏi hỏi về điều khác biệt khi ở Tây Ban Nha.
                  <br>
                  <strong>✗ C (She will have some time to relax on holiday) sai:</strong> Cô khẳng định không phải kỳ nghỉ thư giãn, mà là làm việc vất vả (<em>"<span class='keyword-highlight'>it'll still be hard work</span>"</em>).
                  <br>
                  <strong>✓ B (She will train with swimmers she doesn't know) là đáp án đúng.</strong>`
        },

        // Transcript with highlightable spans
        transcript: `
            <p><strong>Man:</strong> This week, I'm joined by swimmer Rosie Banks, who swims in international competitions. Rosie, welcome. So, did you swim a lot when you were very young?</p>
            <p><strong>Girl:</strong> Yes, before I even started school, my dad used to take my brother Joel and me to the pool in town. He just wanted us to do something in our free time that wasn't looking at a screen. <span class="highlightable" data-q="20">Joel was better at swimming than anyone we knew, and I practised as often as possible so I could swim as fast as him.</span></p>
            <p><strong>Man:</strong> And then you joined a swimming club and started training seriously?</p>
            <p><strong>Girl:</strong> Yes, I was invited to join the club when I was 12. It took an hour to get to their pool. Mum drove me. We had to leave for training early each morning, but we enjoyed chatting on the journey. <span class="highlightable" data-q="21">With all the training and competitions, I couldn't attend school sometimes, which I was unhappy about.</span> I was always much busier than my friends, but I still met up with them when I had time.</p>
            <p><strong>Man:</strong> And now you've had success at the Swim Stars International competition. Tell us about that.</p>
            <p><strong>Girl:</strong> Well, I'd trained hard, and I expected to do well, although winning was still brilliant! Swimming isn't shown much on TV - it's usually famous footballers or tennis stars people love watching - so <span class="highlightable" data-q="22">I couldn't believe people wanted to read and watch interviews with me!</span></p>
            <p><strong>Man:</strong> So, I imagine it's expensive taking part in international competitions. Do you get help with the costs?</p>
            <p><strong>Girl:</strong> Yes. Fortunately, a sportswear company pays for plane tickets, as long as I use their swimsuits, bags and other stuff showing their brand. <span class="highlightable" data-q="23">It'd be great if they also gave me financial support for hotels, as my parents have to spend a lot on that kind of thing.</span></p>
            <p><strong>Man:</strong> So, you've got a new swimming coach now. What changes has she made?</p>
            <p><strong>Girl:</strong> Well, I'm doing the same regular fitness training. But, <span class="highlightable" data-q="24">thanks to her suggestions about the way I move my arms through the water, I've already seen improvements in my speed.</span> She's also looked at the food I eat - luckily she was satisfied with that. I'm very strict with my diet.</p>
            <p><strong>Man:</strong> And you're going to Spain soon I hear.</p>
            <p><strong>Girl:</strong> Well, I've got a short break first, and then I'm going on a special training course there for the whole summer. <span class="highlightable" data-q="25">I'll work with lots of swimmers I haven't met before.</span> I'm really looking forward to that. I won't do any races but it'll still be hard work.</p>
            <p><strong>Man:</strong> Thanks Rosie….</p>
            <p><em>Now listen again.</em></p>
            <p style="color:#666;">That is the end of Part Four.</p>
        `,

        // Questions Data
        questions: [
            { num: 20, text: "Rosie swam a lot when she was very young because", options: [
                "her father thought it was an important skill.",
                "she wanted to be like her brother.",
                "there were free classes at her local pool."
            ]},
            { num: 21, text: "What did Rosie dislike about doing serious swimming training?", options: [
                "being away from her friends.",
                "the long journey from home.",
                "missing some school lessons."
            ]},
            { num: 22, text: "When Rosie won the Swim Stars International competition she was", options: [

            { num: 23, text: "Rosie says she needs more help with the cost of", options: [

                "the kit she needs.",
                "her accommodation while she's abroad."
            ]},
            { num: 24, text: "What has Rosie changed since she got a new coach?", options: [
                "her swimming style.",
                "what she eats.",
                "her fitness routine."
            ]},
            { num: 25, text: "What is Rosie planning to do in Spain?", options: [
                "take part in some races.",
                "train with different people.",
                "have some time to relax."
            ]}

    // Initialize the listening test when DOM is loaded
    document.addEventListener('DOMContentLoaded', function() {
        window.listeningCore = new ListeningCore();
        window.listeningCore.initializeTest(pet1Test2Part4Data);
        console.log('PET 1 Test 2 Part 4 loaded with core listening engine');
