<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KET 2 - Test 1 - Listening Part 3</title>
    <link rel="stylesheet" href="listening-pet-common.css" id="styleLink">
</head>

<body>
    <div class="test-wrapper" id="testWrapper">
        <!-- Header -->
        <div class="ielts-header">
            <div class="brand">
                <div class="ielts-logo">KET</div>
                <div class="candidate"></div>
                <div class="audio-controls">
                    <audio id="listeningAudio" controls>
                        <source src="audio/KET 2 - Test 1 Part 3.mp3" type="audio/mpeg">
                    </audio>
                    <select class="speed-select" id="speedSelect">
                        <option value="0.7">0.7x</option>
                        <option value="0.9">0.9x</option>
                        <option value="1.0" selected>1x</option>
                        <option value="1.1">1.1x</option>
                        <option value="1.25">1.25x</option>
                    </select>
                    <span class="volume-icon">🔊</span>
                </div>
            </div>
        </div>

        <!-- Question navigator -->
        <div class="question-nav">
            <div class="nav-buttons" id="navButtons"></div>
        </div>

        <!-- Main area -->
        <div class="main-area" id="mainArea">
            <!-- Transcript panel -->
            <div class="transcript-panel" id="transcriptPanel">
                <div class="panel-header"><span>TRANSCRIPT</span></div>
                <div class="transcript-content font-large" id="transcriptContent"></div>
            </div>
            <div class="resizer" id="resizer"></div>

            <!-- Questions panel -->
            <div class="questions-panel" id="questionsPanel">
                <div class="panel-header">
                    <span>QUESTIONS 11–15</span>
                    <span class="answer-badge" id="answeredCount">0/5 answered</span>
                </div>
                <div class="questions-list font-large centered" id="questionsContent">
                    <div>
                        <h3>PART 3 &nbsp; Questions 11–15</h3>
                        <p><em>For each question, choose the correct answer.</em></p>
                        <p style="margin-bottom:8px;">You will hear Sue talking to her friend Peter about a restaurant she went to.</p>
                        <div class="notes-box" id="questionsContainer"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Bottom bar -->
        <div class="bottom-bar">
            <button class="btn btn-primary" id="submitBtn">Nộp bài</button>
            <button class="btn btn-success" id="explainBtn" disabled>Xem giải thích</button>
            <button class="btn btn-danger" id="resetBtn">Reset</button>
            <div class="progress" id="progressDisplay">Đã làm: 0/5</div>
        </div>

        <!-- Explanation panel -->
        <div class="explanation-panel" id="explanationPanel">
            <div class="resize-handle" id="explanationResizer"></div>
            <div class="explanation-header">
                <span id="explanationTitle">Giải thích</span>
                <span class="close-btn" id="closeExplanation">✕ Đóng</span>
            </div>
            <div class="explanation-content" id="explanationText"></div>
        </div>
    </div>

    <!-- Context menu -->
    <div class="context-menu" id="contextMenu">
        <div onclick="applyHighlight('yellow')">Highlight vàng</div>
        <div onclick="applyHighlight('green')">Highlight xanh lá</div>
        <div onclick="applyHighlight('pink')">Highlight hồng</div>
        <div onclick="removeHighlight()">Xóa highlight</div>
    </div>

    <script src="core-listening-ket.js"></script>
    <script>
        const ketTest1Part3Data = {
            title: "KET 2 · Test 1 · Listening Part 3",
            type: "multiple-choice",
            part: 3,
            book: 2,
            test: 1,

            answerKey: { q11: 'A', q12: 'C', q13: 'B', q14: 'A', q15: 'C' },
            displayAnswers: { q11: 'A', q12: 'C', q13: 'B', q14: 'A', q15: 'C' },

            detailedExplanations: {
                q11: `<strong>Đáp án: A – He had to do some work (anh ấy phải làm việc)</strong><br>
                      Sue nói: <em>"It's a pity you couldn't come to the restaurant with us last night, Peter."</em><br>
                      Peter đáp: <em>"Yeah, I wanted to come, Sue, but I wasn't well last week, and <span class='keyword-highlight'>I forgot I needed to finish some work</span>."</em><br><br>
                      <strong>✗ B (He was too ill) sai:</strong> Peter nói anh đã không khỏe tuần trước ("wasn't well last week") nhưng lý do không đi là phải làm việc.<br>
                      <strong>✗ C (He forgot to go) sai:</strong> Không phải quên đi, mà là quên cần làm việc.<br>
                      <strong>✓ A (He had to do some work) là đúng – Peter cần hoàn thành công việc.</strong>`,

                q12: `<strong>Đáp án: C – five years (năm năm)</strong><br>
                      Sue nói: <em>"The last time I went there was two years ago. The waiter said <span class='keyword-highlight'>it's been open for five years already</span>, and it's so popular that they had to open a new room a year ago."</em><br><br>
                      <strong>✗ A (one year) sai:</strong> Đây là thời gian họ mở thêm phòng mới ("open a new room a year ago").<br>
                      <strong>✗ B (two years) sai:</strong> Đây là lần cuối Sue đến nhà hàng.<br>
                      <strong>✓ C (five years) là đúng – nhà hàng đã mở được 5 năm.</strong>`,

                q13: `<strong>Đáp án: B – pizza</strong><br>
                      Peter hỏi: <em>"Oh! What did you eat?"</em><br>
                      Sue đáp: <em>"The restaurant's famous for pasta, but <span class='keyword-highlight'>we all chose pizza</span>, which was delicious. Maybe I'll get the steak next time – it looked good!"</em><br><br>
                      <strong>✗ A (steak) sai:</strong> Sue nói cô sẽ chọn steak lần sau, không phải lần này.<br>
                      <strong>✗ C (pasta) sai:</strong> Nhà hàng nổi tiếng về pasta nhưng họ chọn pizza.<br>
                      <strong>✓ B (pizza) là đúng – họ đều chọn pizza ("we all chose pizza").</strong>`,

                q14: `<strong>Đáp án: A – American (người Mỹ)</strong><br>
                      Peter hỏi: <em>"Isn't the chef from Italy?"</em><br>
                      Sue đáp: <em>"<span class='keyword-highlight'>Actually, he's from the USA.</span> And our waiter was Spanish, so it's a very international place!"</em><br><br>
                      <strong>✗ B (Spanish) sai:</strong> Đây là quốc tịch của bồi bàn (waiter), không phải đầu bếp.<br>
                      <strong>✗ C (Italian) sai:</strong> Peter đoán là Italy nhưng Sue phủ nhận.<br>
                      <strong>✓ A (American) là đúng – đầu bếp đến từ USA.</strong>`,

                q15: `<strong>Đáp án: C – He'd like Sue's advice about the dishes (anh ấy muốn lời khuyên về món ăn)</strong><br>
                      Peter nói: <em>"I have to go there! Come with me – <span class='keyword-highlight'>I need you to tell me the best things on the menu</span>."</em><br>
                      Về ngày: <em>"I've only got Wednesday night free next week, but I suppose it's quiet then, so I won't have to book a table."</em> → Anh ấy chỉ có thứ Tư rảnh, không phải ngày nào cũng được.<br><br>
                      <strong>✗ A (It doesn't matter which day he goes) sai:</strong> Peter nói anh chỉ rảnh thứ Tư tuần sau ("only got Wednesday night free").<br>
                      <strong>✗ B (He's afraid the restaurant will be too crowded) sai:</strong> Peter nghĩ sẽ yên tĩnh ("it's quiet then") và không cần đặt bàn.<br>
                      <strong>✓ C (He'd like Sue's advice about the dishes) là đúng – Peter muốn Sue chỉ món ngon trên thực đơn.</strong>`
            },

            transcript: `
            <p><strong>PART 3</strong></p>
            <p><em>For each question, choose the correct answer.</em></p>
            <p>You will hear Sue talking to her friend Peter about a restaurant she went to.</p>

            <p><strong>Sue:</strong> It's a pity you couldn't come to the restaurant with us last night, Peter.<br>
            <strong>Peter:</strong> <span class="highlightable" data-q="11">Yeah, I wanted to come, Sue, but I wasn't well last week, and I forgot I needed to finish some work.</span> How was the restaurant?<br>
            <strong>Sue:</strong> Great! I'd like to go there more often. The last time I went there was two years ago. <span class="highlightable" data-q="12">The waiter said it's been open for five years already, and it's so popular that they had to open a new room a year ago.</span><br>
            <strong>Peter:</strong> <span class="highlightable" data-q="13">Oh! What did you eat?</span><br>
            <strong>Sue:</strong> <span class="highlightable" data-q="13">The restaurant's famous for pasta, but we all chose pizza, which was delicious.</span> Maybe I'll get the steak next time – it looked good!<br>
            <strong>Peter:</strong> <span class="highlightable" data-q="14">Isn't the chef from Italy?</span><br>
            <strong>Sue:</strong> <span class="highlightable" data-q="14">Actually, he's from the USA.</span> And our waiter was Spanish, so it's a very international place!<br>
            <strong>Peter:</strong> <span class="highlightable" data-q="15">I have to go there! Come with me – I need you to tell me the best things on the menu.</span> I've only got Wednesday night free next week, but I suppose it's quiet then, so I won't have to book a table.</p>

            <p><em>That is the end of Part Three.</em></p>
            `,

            questions: [
                { num: 11, text: "Why didn't Peter go to the restaurant with Sue?", options: ["He had to do some work.", "He was too ill.", "He forgot to go."] },
                { num: 12, text: "How long has the restaurant been open?", options: ["one year", "two years", "five years"] },
                { num: 13, text: "What did Sue and her friends eat at the restaurant?", options: ["steak", "pizza", "pasta"] },
                { num: 14, text: "What nationality is the chef at the restaurant?", options: ["American", "Spanish", "Italian"] },
                { num: 15, text: "What does Peter say about his plans to go to the restaurant?", options: ["It doesn't matter which day he goes.", "He's afraid the restaurant will be too crowded.", "He'd like Sue's advice about the dishes."] }
            ]
        };

        document.addEventListener('DOMContentLoaded', function () {
            window.listeningCore = new ListeningCore();
            window.listeningCore.initializeTest(ketTest1Part3Data);
            console.log('KET 2 Test 1 Listening Part 3 loaded');
        });
    </script>
</body>

</html>
