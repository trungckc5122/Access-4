    <script>
        // Test Data for PET 1 Test 4 Part 1
        const pet1Test4Part1Data = {
            title: "B1 Preliminary 1 · Test 4 · Part 1",
            type: "multiple-choice",
            part: 1,
            book: 1,
            test: 4,

            answerKey: { q1: 'B', q2: 'A', q3: 'A', q4: 'C', q5: 'C', q6: 'A', q7: 'B' },
            displayAnswers: { q1: 'B', q2: 'A', q3: 'A', q4: 'C', q5: 'C', q6: 'A', q7: 'B' },

            detailedExplanations: {
                q1: `<strong>Đáp án: B</strong><br>
              Người đàn ông hỏi cách tốt nhất để đến trung tâm thành phố. Người phụ nữ gợi ý taxi nếu có nhiều hành lý, nhưng anh ấy chỉ mang túi nhẹ ("I've just got a light bag"). Cô ấy giải thích xe buýt đi đường vòng rất dài, còn tàu điện ngầm ("underground") thì chỉ cần đi bộ một quãng ngắn, tàu chạy 10 phút một chuyến và nhanh hơn taxi. Anh ấy chốt: <em>"That sounds perfect. I'll do that."</em>
              <br><br>
              <strong>✗ A (Taxi) không đúng:</strong> Người phụ nữ nói taxi chỉ dễ nhất nếu có nhiều hành lý ("especially if you've got a lot of luggage"), nhưng anh ấy không chọn vì hành lý nhẹ.
              <br>
              <strong>✗ C (Bus) không đúng:</strong> Tuyến xe buýt đi đường vòng quá dài ("it takes quite a long route"), không phải lựa chọn tối ưu.
              <br>
              <strong>✓ B (Underground) là phương tiện anh ấy quyết định đi.</strong>`,

                q2: `<strong>Đáp án: A</strong><br>
              Cô gái nhận xét ký túc xá ("hostel") ổn nhưng không tuyệt vời. Khi người bạn nhắc đến vấn đề chuột ("mice"), cô ấy khẳng định họ đã xử lý xong chuyện đó. Vấn đề thực sự là giường không có màn ("mosquito nets") nên cô bị muỗi đốt hàng đêm: <em>"The thing was, our beds didn't have mosquito nets, so we got bitten almost every night."</em>
              <br><br>
              <strong>✗ B (Mice) không đúng:</strong> Cô ấy xác nhận họ đã giải quyết được vấn đề chuột ("they've obviously done something about that").
              <br>
              <strong>✗ C (Monkeys on the roof) không đúng:</strong> Mặc dù có tiếng khỉ trên mái vào buổi sáng, cô ấy nói: "I didn't mind that at all though" (không hề bận tâm).
              <br>
              <strong>✓ A (Mosquito bites) là điều cô ấy cảm thấy khó chịu nhất.</strong>`,

                q3: `<strong>Đáp án: A</strong><br>
              Người đàn ông muốn gọi cá hồi ("salmon"). Sau khi nghe người phụ nữ chê là "boring" (nhàm chán) và gợi ý món pizza (món mà em gái anh ấy từng khen ngon), anh vẫn giữ ý định. Cuối cùng, khi được gợi ý món cà ri ("curry"), anh từ chối vì quá cay và chốt lại: <em>"I'll have what I always have!"</em> (Tôi sẽ ăn món tôi vẫn hay ăn).
              <br><br>
              <strong>✗ B (Curry) không đúng:</strong> Anh ấy nói "I've heard it's very spicy" (nghe nói nó rất cay) nên không chọn.
              <br>
              <strong>✗ C (Pizza) không đúng:</strong> Đây là món người phụ nữ gọi và em gái người đàn ông từng ăn, nhưng anh ấy không chọn cho mình.
              <br>
              <strong>✓ A (Salmon) là lựa chọn quen thuộc của người đàn ông.</strong>`,

                q4: `<strong>Đáp án: C</strong><br>
              Người phụ nữ đang tìm môn thể thao mới. Cô từng cân nhắc chơi gôn ("golf") nhưng chi phí quá đắt so với khả năng. Mặc dù thừa nhận mình không giỏi các môn dùng vợt, cô vẫn muốn thử cầu lông: <em>"I wouldn't mind giving badminton a go."</em>
              <br><br>
              <strong>✗ A (Tennis) không đúng:</strong> Cô ấy cho rằng tennis đòi hỏi thể lực quá mạnh ("You need to be so strong to play tennis").
              <br>
              <strong>✗ B (Golf) không đúng:</strong> Bị loại bỏ vì chi phí quá cao ("way more than I can afford").
              <br>
              <strong>✓ C (Badminton) là môn thể thao cô ấy quyết định thử.</strong>`,

                q5: `<strong>Đáp án: C</strong><br>
              Người đàn ông đang đọc một cuốn tiểu thuyết mới. Anh ấy giải thích rằng tác giả này thường viết về trải nghiệm lái máy bay, nhưng cuốn hiện tại lại nói về biển: <em>"This one's set at sea – a guy who crosses the Pacific Ocean on his own..."</em> (Cuốn này bối cảnh ở biển – một người một mình vượt Thái Bình Dương).
              <br><br>
              <strong>✗ A (A book about an astronaut) không đúng:</strong> Đây là nội dung cuốn sách mới mà tác giả đang viết ("he's working on a new one at the moment"), chứ không phải cuốn người đàn ông đang đọc.
              <br>
              <strong>✗ B (A book about flying planes) không đúng:</strong> Đây là chủ đề quen thuộc của các cuốn sách trước đó của tác giả ("A lot of his books are based on his experiences flying planes").
              <br>
              <strong>✓ C (A book about a sea journey) là chủ đề của cuốn sách hiện tại.</strong>`,

                q6: `<strong>Đáp án: A</strong><br>
              Matt thảo luận về kế hoạch đi chơi. Sue đã đề cập đến việc đi dạo bãi biển, nhưng Matt lo ngại vì dự báo có bão ("there might be a storm coming"). Sau khi loại trừ rạp chiếu phim vì không có phim hay, anh ấy gợi ý: <em>"There's a new art exhibition on at the museum – definitely worth seeing."</em>
              <br><br>
              <strong>✗ B (Cinema) không đúng:</strong> Matt đã xem lịch chiếu nhưng thấy "There's nothing very exciting this weekend" (không có gì thú vị cuối tuần này).
              <br>
              <strong>✗ C (Beach) không đúng:</strong> Sue muốn đi nhưng bão sắp đến khiến lựa chọn này không khả thi.
              <br>
              <strong>✓ A (Art exhibition at the museum) là lời gợi ý cuối cùng của Matt.</strong>`,

                q7: `<strong>Đáp án: B</strong><br>
              Quảng cáo thông báo ưu đãi đặc biệt cho chiếc điện thoại thông minh mới nhất: <em>"For an amazing £599, the most up-to-date smartphone is now available."</em> (Chỉ với mức giá kinh ngạc £599, chiếc điện thoại mới nhất hiện đã sẵn hàng). Họ cũng nhắc nhở mức giá này chỉ kéo dài vài ngày.
              <br><br>
              <strong>✗ A (£499) không đúng:</strong> Đây là giá của phiên bản năm ngoái ("last year's model").
              <br>
              <strong>✗ C (£699) không đúng:</strong> Đây là mức giá thông thường ("usual price") sẽ quay trở lại vào thứ Hai tới.
              <br>
              <strong>✓ B (£599) là mức giá ưu đãi áp dụng "hôm nay".</strong>`
            },

            transcript: `
                <p><strong>Test Four, Part 1</strong></p>
                <p><strong>Question 1</strong><br>
                <strong>Man:</strong> Excuse me, what's the best way to get to the city centre?<br>
                <strong>Woman:</strong> Well, it's probably easiest to take a taxi, especially if you've got a lot of luggage.<br>
                <strong>Man:</strong> I've just got a light bag. Is there a bus that goes there?<br>
                <strong>Woman:</strong> Yes there is, but it takes quite a long route. What about the underground? It's a short walk from here and the trains go every 10 minutes. It'd be faster than a taxi.<br>
                <strong>Man:</strong> <span class="highlightable" data-q="1">That sounds perfect. I'll do that.</span> Thanks so much for your help.</p>

                <p><strong>Question 2</strong><br>
                <strong>Man:</strong> How was your holiday?<br>
                <strong>Girl:</strong> Good. The hostel was ok but not great!<br>
                <strong>Man:</strong> Oh, I've heard about problems with mice in some of the hostels.<br>
                <strong>Girl:</strong> Really? Well, they've obviously done something about that. <span class="highlightable" data-q="2">The thing was, our beds didn't have mosquito nets, so we got bitten almost every night.</span> Even after putting on insect cream.<br>
                <strong>Man:</strong> Right.<br>
                <strong>Girl:</strong> And then every morning we heard monkeys running across the roof, I didn't mind that at all though.</p>

                <p><strong>Question 3</strong><br>
                <strong>Woman:</strong> What are you going to order, then?<br>
                <strong>Man:</strong> Let me see. I think I'd like the salmon.<br>
                <strong>Woman:</strong> You're so boring! You never try anything different. I'm having pizza – they make them really thin and tasty here.<br>
                <strong>Man:</strong> Yes, my sister had one last time we ate here – she said it was great!<br>
                <strong>Woman:</strong> How about the curry? That's excellent, I believe.<br>
                <strong>Man:</strong> Mmm. Nice idea, but I've heard it's very spicy. <span class="highlightable" data-q="3">I've made up my mind. I'll have what I always have!</span><br>
                <strong>Woman:</strong> (laughs) Of course!</p>

                <p><strong>Question 4</strong><br>
                <strong>Woman:</strong> I've decided to take up a new sport. There are lots of classes starting at the sports centre near the golf course.<br>
                <strong>Man:</strong> What sport are you thinking of doing?<br>
                <strong>Woman:</strong> Well, I did consider golf. When I looked at the cost though, I realised it's way more than I can afford. Anyway, I'm not that good at racket sports but <span class="highlightable" data-q="4">I wouldn't mind giving badminton a go.</span> You need to be so strong to play tennis.<br>
                <strong>Man:</strong> I might do a new sports class too.<br>
                <strong>Woman:</strong> Hey! Come along with me.</p>

                <p><strong>Question 5</strong><br>
                <strong>Woman:</strong> What's the book you're reading about?<br>
                <strong>Man:</strong> It's a novel by one of my favourite writers. A lot of his books are based on his experiences flying planes around the world. <span class="highlightable" data-q="5">This one's set at sea – a guy who crosses the Pacific Ocean on his own and all the challenges he has to deal with.</span> I've heard he's working on a new one at the moment about an astronaut, who goes to the moon and can't get back. It sounds interesting. Anyway, this one's really exciting.<br>
                <strong>Woman:</strong> Sounds cool.</p>

                <p><strong>Question 6</strong><br>
                <strong>Man:</strong> Hi Sue. It's Matt. Thanks for your message. I think it's a great idea to go out for the day at the weekend. You mentioned going for a walk on the beach. I've just looked at the weather forecast though and there might be a storm coming. <span class="highlightable" data-q="6">There's a new art exhibition on at the museum – definitely worth seeing, or so I've heard.</span> I wondered about going to the cinema, and had a look at what's on. There's nothing very exciting this weekend. Anyway, let me know what you think. Bye!</p>

                <p><strong>Question 7</strong><br>
                <strong>Announcer:</strong> At ABC's phone store, we've got some fantastic offers this week. <span class="highlightable" data-q="7">For an amazing £599, the most up-to-date smartphone is now available.</span> It's got a great camera and the biggest memory ever. But hurry, this offer is only on for a few days. If you wait till Monday, it'll be back to its usual price of £699. If either of these prices is more than you can afford, there's always last year's model which is just £499. But don't delay, when they're gone, they're gone. Come early to avoid disappointment.</p>
                <p><em>Now listen again.</em></p>
                <p style="color:#666;">That is the end of Part One.</p>
            `,

            questions: [
                { num: 1, text: "How will the man travel to the city centre?", options: ["Taxi", "Underground", "Bus"] },
                { num: 2, text: "What did the girl dislike at the hostel she stayed in?", options: ["Mosquito bites", "Mice", "Monkeys on the roof"] },
                { num: 3, text: "What is the man going to order for lunch?", options: ["Salmon", "Curry", "Pizza"] },
                { num: 4, text: "What sport would the woman like to try?", options: ["Tennis", "Golf", "Badminton"] },
                { num: 5, text: "Which book is the man reading?", options: ["A book about an astronaut", "A book about flying planes", "A book about a sea journey"] },
                { num: 6, text: "Where does the man suggest going at the weekend?", options: ["Art exhibition at the museum", "Cinema", "Beach"] },
                { num: 7, text: "How much is the latest smartphone in the store today?", options: ["£499", "£599", "£699"] }
            ]
        };

        // Initialize the listening test when DOM is loaded
        document.addEventListener('DOMContentLoaded', function() {
            window.listeningCore = new ListeningCore();
            window.listeningCore.initializeTest(pet1Test4Part1Data);
            console.log('PET 1 Test 4 Part 1 loaded with core listening engine');
        });
