<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PET 2 - Test 1 - Part 1</title>
    <link rel="stylesheet" href="listening-pet-common.css" id="styleLink">
</head>
<body>
    <div class="test-wrapper" id="testWrapper">
        <!-- Header -->
        <div class="ielts-header">
            <div class="brand">
                <div class="ielts-logo">PET</div>
                <div class="candidate">B1 Preliminary 2 · Test 1 · Part 1</div>
                <div class="audio-controls">
                    <audio id="listeningAudio" controls>
                        <source src="audio/B1 Preliminary 2 - Test 1 Part 1.mp3" type="audio/mpeg">
                        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg">
                    </audio>
                    <select class="speed-select" id="speedSelect">
                        <option value="0.7">0.7x</option>
                        <option value="0.9">0.9x</option>
                        <option value="1.0" selected>1x</option>
                        <option value="1.1">1.1x</option>
                        <option value="1.25">1.25x</option>
                    </select>
                    <span class="volume-icon">🔊</span>
                </div>
            </div>
            <div class="font-controls">
                <button class="font-btn" id="fontSmall">A-</button>
                <button class="font-btn" id="fontMedium">A</button>
                <button class="font-btn active" id="fontLarge">A+</button>
            </div>
            <button class="theme-toggle-btn" id="themeToggle" title="Chuyển đổi Dark/Light mode">
                <span class="icon-moon">🌙</span>
                <span class="icon-sun">☀️</span>
            </button>
        </div>

        <!-- Question navigator (1-7) -->
        <div class="question-nav">
            <span style="font-weight:600; color:#1e3a5f;">Câu 1-7:</span>
            <div class="nav-buttons" id="navButtons"></div>
        </div>

        <!-- Main area -->
        <div class="main-area" id="mainArea">
            <!-- Transcript panel (ẩn ban đầu) -->
            <div class="transcript-panel" id="transcriptPanel">
                <div class="panel-header">
                    <span>TRANSCRIPT</span>
                </div>
                <div class="transcript-content font-large" id="transcriptContent"></div>
            </div>
            <div class="resizer" id="resizer"></div>

            <!-- Questions panel -->
            <div class="questions-panel" id="questionsPanel">
                <div class="panel-header">
                    <span>QUESTIONS 1-7</span>
                    <span class="answer-badge" id="answeredCount">0/7 answered</span>
                </div>
                <div class="questions-list font-large centered" id="questionsContent">
                    <div>
                        <h3>PART 1 Questions 1-7</h3>
                        <p><em>Choose the correct answer (A, B or C).</em></p>
                        <div class="notes-box" id="questionsContainer"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Bottom bar -->
        <div class="bottom-bar">
            <button class="btn btn-primary" id="submitBtn">Nộp bài</button>
            <button class="btn btn-success" id="explainBtn" disabled>Xem giải thích</button>
            <button class="btn btn-danger" id="resetBtn">Reset tất cả</button>
            <div class="progress" id="progressDisplay">Đã làm: 0/7</div>
        </div>

        <!-- Explanation panel -->
        <div class="explanation-panel" id="explanationPanel">
            <div class="resize-handle" id="explanationResizer"></div>
            <div class="explanation-header">
                <span id="explanationTitle">Giải thích</span>
                <span class="close-btn" id="closeExplanation">✕ Đóng</span>
            </div>
            <div class="explanation-content" id="explanationText"></div>
        </div>
    </div>

    <!-- Context menu for manual highlighting -->
    <div class="context-menu" id="contextMenu">
        <div onclick="applyHighlight('yellow')">Highlight vàng</div>
        <div onclick="applyHighlight('green')">Highlight xanh lá</div>
        <div onclick="applyHighlight('pink')">Highlight hồng</div>
        <div onclick="removeHighlight()">Xóa highlight</div>
    </div>

    <!-- Core Listening Engine -->
    <script src="core-listening.js"></script>
    
    <script>
        // Test Data for PET 2 Test 1 Part 1
        const pet2Test1Part1Data = {
            title: "B1 Preliminary 2 · Test 1 · Part 1",
            type: "multiple-choice",
            part: 1,
            book: 2,
            test: 1,
            
            // Answer Key
            answerKey: {
                q1: 'C',
                q2: 'C',
                q3: 'A',
                q4: 'B',
                q5: 'B',
                q6: 'A',
                q7: 'C'
            },

            // Display Answers
            displayAnswers: {
                q1: 'C',
                q2: 'C',
                q3: 'A',
                q4: 'B',
                q5: 'B',
                q6: 'A',
                q7: 'C'
            },

            // Detailed Explanations
            detailedExplanations: {
                q1: `<strong>Đáp án: C (Guidebook)</strong><br>
                      Người phụ nữ nhận ra mình đã quên: <em>"It's that <span class='keyword-highlight'>guidebook</span> I bought last week."</em> (Đó là cuốn sách hướng dẫn tôi mua tuần trước). Người đàn ông nhận xét là cô ấy có lẽ đã để quên nó trên bàn bếp.
                      <br><br>
                      <strong>✗ A (Passport) không đúng:</strong> Người phụ nữ xác nhận hộ chiếu vẫn ở trong ba lô ("Mine's in my backpack").
                      <br>
                      <strong>✗ B (Phone) không đúng:</strong> Điện thoại cũng đang ở trong ba lô cùng với hộ chiếu ("with my books and phone").
                      <br>
                      <strong>✓ C (Guidebook) là món đồ mà người phụ nữ đã để quên.</strong>`,

                q2: `<strong>Đáp án: C</strong><br>
                      Cậu bé mô tả chiếc áo: <em>"<span class='keyword-highlight'>The top part has black and white stripes, and there are stars on the white parts. The bottom half... has black circles on a white background.</span>"</em>
                      <br><br>
                      <strong>✗ A không đúng:</strong> Bố trí ngôi sao và sọc không khớp với mô tả.
                      <br>
                      <strong>✗ B không đúng:</strong> Phần dưới có chấm bi nhưng phần trên không đúng mô tả về ngôi sao trên sọc trắng.
                      <br>
                      <strong>✓ C khớp hoàn toàn:</strong> Phần trên có <span class='keyword-highlight'>sọc trắng đen với ngôi sao trên nền trắng</span>, phần dưới có <span class='keyword-highlight'>hình tròn đen trên nền trắng</span>.`,

                q3: `<strong>Đáp án: A (Smartphone)</strong><br>
                      Người phụ nữ giải thích: <em>"I had to <span class='keyword-highlight'>call the theatre</span> as their website wasn't working when I tried on my laptop"</em>. Cô ấy đã gọi điện thoại để đặt vé sau khi trang web trên laptop không hoạt động.
                      <br><br>
                      <strong>✗ B (Laptop) không đúng:</strong> Trang web không hoạt động khi cô thử dùng laptop ("website wasn't working when I tried on my laptop").
                      <br>
                      <strong>✗ C (Box office) không đúng:</strong> Cô ấy đã từ bỏ việc xếp hàng ở rạp ("gave up and went home") và về nhà để gọi điện.
                      <br>
                      <strong>✓ A (Smartphone/Phone) là cách cô ấy thực hiện việc đặt vé thành công.</strong>`,

                q4: `<strong>Đáp án: B (Strong winds)</strong><br>
                      Thông báo cho biết: <em>"the <span class='keyword-highlight'>strong winds</span> we're experiencing at the moment mean trains are moving along the railway line at reduced speeds"</em>. Gió mạnh khiến tàu phải chạy chậm lại.
                      <br><br>
                      <strong>✗ A (Snow) không đúng:</strong> Tuyết được dự báo có thể rơi ở vùng cao nhưng "unlikely to affect services to Histon" (không ảnh hưởng đến Histon).
                      <br>
                      <strong>✗ C (Heavy rain) không đúng:</strong> Mưa lớn đêm qua đã tạnh ("Last night's heavy rain has cleared").
                      <br>
                      <strong>✓ B (Strong winds) là nguyên nhân trực tiếp gây ra sự chậm trễ.</strong>`,

                q5: `<strong>Đáp án: B (Open spaces)</strong><br>
                      Hướng dẫn viên chỉ ra: <em>"our best chance is in the <span class='keyword-highlight'>open spaces</span> where they hunt"</em>. Các không gian mở là nơi săn mồi của hổ.
                      <br><br>
                      <strong>✗ A (Forest) không đúng:</strong> Việc thấy chúng trong rừng là "much more of a challenge" - bộ sọc giúp chúng ẩn nấp tốt.
                      <br>
                      <strong>✗ C (River/Lake) không đúng:</strong> Hổ thường đến uống nước ở hồ khi nhiệt độ tăng, nhưng "It's too early in the season for this yet" (còn quá sớm trong mùa).
                      <br>
                      <strong>✓ B (Open spaces) là nơi có khả năng cao nhất để thấy hổ lúc này.</strong>`,

                q6: `<strong>Đáp án: A (Detective film)</strong><br>
                      Cô gái gợi ý phim của Jack Leon về thám tử. Sau khi thảo luận các lựa chọn khác, cô chốt lại: <em>"I <span class='keyword-highlight'>prefer my first suggestion</span>"</em>. Người đàn ông đồng ý: "OK. Let's do that then."
                      <br><br>
                      <strong>✗ B (Sci-fi) không đúng:</strong> Cô gái nói "I'm not really keen on science-fiction" và người đàn ông biết điều đó.
                      <br>
                      <strong>✗ C (Drama) không đúng:</strong> Cô gái thấy kịch thế kỷ 19 "a bit serious" (hơi nghiêm túc quá).
                      <br>
                      <strong>✓ A (Detective film) là sự lựa chọn cuối cùng của họ.</strong>`,

                q7: `<strong>Đáp án: C (On foot)</strong><br>
                      Người đàn ông giải thích: <em>"It took me <span class='keyword-highlight'>forty minutes on foot</span>"</em>. Anh đã mất 40 phút đi bộ nên bị ướt do trời mưa.
                      <br><br>
                      <strong>✗ A (Bus) không đúng:</strong> Xe buýt "aren't very reliable from where I live" - không đáng tin cậy ở nơi anh sống.
                      <br>
                      <strong>✗ B (Bicycle) không đúng:</strong> Anh muốn đi xe đạp nhưng "need to get my bike brakes fixed" (phanh đang bị hỏng).
                      <br>
                      <strong>✓ C (On foot) là cách anh đã đi đến nơi làm việc sáng nay.</strong>`
            },

            // AI HIGHLIGHT RULE: Always highlight the FULL CONTEXT including the answer.
            // Do NOT highlight only the answer word/phrase. Include complete sentences.
            // Transcript with highlightable spans
            transcript: `
            <p><strong>Test One. There are four parts to the test. You will hear each part twice. We will now stop for a moment.</strong></p>
            <p><strong>Please ask any questions now because you must not speak during the test.</strong></p>
            <p><strong>PART 1</strong></p>
            <p><strong>Now look at the instructions for Part One.</strong></p>
            <p><strong>For each question, choose the correct answer. Look at question one.</strong></p>

            <p><strong>Question 1</strong><br>
            <strong>Man:</strong> Our queue for the check-in's over there. Have you got your passport ready?<br>
            <strong>Woman:</strong> Mine's in my backpack, with my books and phone.... Oh no! I don't believe it.<br>
            <strong>Man:</strong> What! You haven't left your passport at home, have you?<br>
            <strong>Woman:</strong> I know I forgot it once, but I'm more careful now. <span class="highlightable" data-q="1">It's that guidebook I bought last week. The one I told you about? I thought I'd put it in my backpack with my phone and stuff, but I guess I didn't.</span><br>
            <strong>Man:</strong> Perhaps you left it on the kitchen table.</p>
            <p><em>Now listen again. [repeat]</em></p>

            <p><strong>Question 2</strong><br>
            <strong>Boy:</strong> Mum, when you're in town, can you get me that T-shirt I told you about? It's in the sale at the T-shirt shop on the ground floor of the shopping centre. It's black and white and divided into two parts. <span class="highlightable" data-q="2">The top part has black and white stripes, and there are stars on the white parts. The bottom half of the T-shirt has black circles on a white background.</span> They've got lots of similar designs in the store, so please check you've got the one I want. Thanks Mum!</p>
            <p><em>Now listen again. [repeat]</em></p>

            <p><strong>Question 3</strong><br>
            <strong>Man:</strong> Did you get tickets for the show?<br>
            <strong>Woman:</strong> Yes, finally! It's really popular so there were long queues of people waiting to buy tickets outside the theatre.<br>
            <strong>Man:</strong> So how long did you have to wait to get them?<br>
            <strong>Woman:</strong> Well, I stood there for a while and then gave up and went home. <span class="highlightable" data-q="3">I had to call the theatre as their website wasn't working when I tried on my laptop</span> - too many people trying to use it, I suppose. Luckily, I managed to get tickets anyway, and quite good seats.</p>
            <p><em>Now listen again. [repeat]</em></p>

            <p><strong>Question 4</strong><br>
            <strong>Woman:</strong> There will be a delay to the eighteen-forty service to Histon due to bad weather in the surrounding area. Last night's heavy rain has cleared, but <span class="highlightable" data-q="4">the strong winds we're experiencing at the moment mean trains are moving along the railway line at reduced speeds.</span> Expect the service to be approximately one hour late. The forecast is calmer for the rest of the evening, though there is a possibility of snow on higher ground. Fortunately, this is unlikely to affect services to Histon.</p>
            <p><em>Now listen again. [repeat]</em></p>

            <p><strong>Question 5</strong><br>
            <strong>Man:</strong> Welcome to today's tiger tour. This is one of the best places to see wild tigers, so hopefully we'll manage to see some. A good time of year to see them is when temperatures start to rise, because they spend more time drinking at water holes such as lakes. It's too early in the season for this yet, so <span class="highlightable" data-q="5">our best chance is in the open spaces where they hunt.</span> It's much more of a challenge to see them in the forest - their stripes help them hide among the trees.</p>
            <p><em>Now listen again. [repeat]</em></p>

            <p><strong>Question 6</strong><br>
            <strong>Woman:</strong> Let's go and see Jack Leon's new movie.<br>
            <strong>Man:</strong> Is that the one about the detective solving a murder?<br>
            <strong>Woman:</strong> Yes, it's really good. Or we could see the science-fiction movie that's just come out, but I'm not really keen on science-fiction.<br>
            <strong>Man:</strong> What about the nineteenth-century drama? That's had some excellent reviews.<br>
            <strong>Woman:</strong> I think that's a bit serious. <span class="highlightable" data-q="6">I prefer my first suggestion.</span><br>
            <strong>Man:</strong> Okay then, let's go to the seven o'clock show of the detective movie.</p>
            <p><em>Now listen again. [repeat]</em></p>

            <p><strong>Question 7</strong><br>
            <strong>Woman:</strong> It's raining quite hard. You're very wet. Did you cycle?<br>
            <strong>Man:</strong> I wanted to, but I need to get my bike brakes fixed.<br>
            <strong>Woman:</strong> Couldn't you come by bus?<br>
            <strong>Man:</strong> Buses aren't very reliable from where I live. <span class="highlightable" data-q="7">It took me forty minutes on foot.</span> I hope to be back on my bike soon.<br>
            <strong>Woman:</strong> The forecast says it's going to rain all day.</p>
            <p><em>Now listen again. [repeat]</em></p>
            `,

            // Questions Data
            questions: [
                { num: 1, text: "What has the woman left behind?", options: ["Passport", "Phone", "Guidebook"] },
                { num: 2, text: "Which T-shirt does the boy want?", options: ["Stars on top, stripes on bottom", "Stripes on top, dots on bottom", "Stripes with stars on white background, circles on bottom"] },
                { num: 3, text: "How did the woman book tickets for the show?", options: ["Smartphone/Phone call", "Laptop/Website", "Box office/In person"] },
                { num: 4, text: "Why is the train to Histon delayed?", options: ["Snow", "Strong winds", "Heavy rain"] },
                { num: 5, text: "Where are the tourists most likely to see a tiger?", options: ["In the forest", "In the open spaces", "By the river/lake"] },
                { num: 6, text: "Which film will they go and see?", options: ["Detective film", "Science-fiction film", "Nineteenth-century drama"] },
                { num: 7, text: "How did the man travel to work?", options: ["By bus", "By bicycle", "On foot"] }
            ]
        };

        // Initialize the listening test when DOM is loaded
        document.addEventListener('DOMContentLoaded', function() {
            window.listeningCore = new ListeningCore();
            window.listeningCore.initializeTest(pet2Test1Part1Data);
            console.log('PET 2 Test 1 Part 1 loaded with core listening engine');
        });
    </script>
</body>
</html>
