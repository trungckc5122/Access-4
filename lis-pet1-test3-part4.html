<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PET 1 - Test 3 - Part 4</title>
    <link rel="stylesheet" href="listening-pet-common.css" id="styleLink">
</head>
<body>
<div class="test-wrapper" id="testWrapper">
    <!-- Header -->
    <div class="ielts-header">
        <div class="brand">
            <div class="ielts-logo">PET</div>
            <div class="candidate">B1 Preliminary 1 · Test 3 · Part 4</div>
            <div class="audio-controls">
                <audio id="listeningAudio" controls>

                    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg">
                </audio>
                <select class="speed-select" id="speedSelect">
                    <option value="0.7">0.7x</option>
                    <option value="0.9">0.9x</option>
                    <option value="1.0" selected>1x</option>
                    <option value="1.1">1.1x</option>
                    <option value="1.25">1.25x</option>
                </select>
                <span class="volume-icon">🔊</span>
            </div>
        </div>
        <div class="font-controls">
            <button class="font-btn" id="fontSmall">A-</button>
            <button class="font-btn" id="fontMedium">A</button>
            <button class="font-btn active" id="fontLarge">A+</button>
        </div>
        <button class="theme-toggle-btn" id="themeToggle" title="Chuyển đổi Dark/Light mode">
            <span class="icon-moon">🌙</span>
            <span class="icon-sun">☀️</span>
        </button>
    </div>

    <!-- Question navigator (20-25) -->
    <div class="question-nav">
        <span style="font-weight:600; color:#1e3a5f;">Câu 20-25:</span>
        <div class="nav-buttons" id="navButtons"></div>
    </div>

    <!-- Main area -->
    <div class="main-area" id="mainArea">
        <!-- Transcript panel (ẩn ban đầu) -->
        <div class="transcript-panel" id="transcriptPanel">
            <div class="panel-header">
                <span>TRANSCRIPT</span>
            </div>
            <div class="transcript-content font-large" id="transcriptContent"></div>
        </div>
        <div class="resizer" id="resizer"></div>

        <!-- Questions panel -->
        <div class="questions-panel" id="questionsPanel">
            <div class="panel-header">
                <span>QUESTIONS 20-25</span>
                <span class="answer-badge" id="answeredCount">0/6 answered</span>
            </div>
            <div class="questions-list font-large centered" id="questionsContent">
                <div>
                    <h3>PART 4 Questions 20-25</h3>
                    <p><em>Choose the correct answer (A, B or C).</em></p>
                    <div class="notes-box" id="questionsContainer"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bottom bar -->
    <div class="bottom-bar">
        <button class="btn btn-primary" id="submitBtn">Nộp bài</button>
        <button class="btn btn-success" id="explainBtn" disabled>Xem giải thích</button>
        <button class="btn btn-danger" id="resetBtn">Reset tất cả</button>
        <div class="progress" id="progressDisplay">Đã làm: 0/6</div>
    </div>

    <!-- Explanation panel -->
    <div class="explanation-panel" id="explanationPanel">
        <div class="resize-handle" id="explanationResizer"></div>
        <div class="explanation-header">
            <span id="explanationTitle">Giải thích</span>
            <span class="close-btn" id="closeExplanation">✕ Đóng</span>
        </div>
        <div class="explanation-content" id="explanationText"></div>
    </div>
</div>

<!-- Context menu for manual highlighting -->
<div class="context-menu" id="contextMenu">
    <div onclick="applyHighlight('yellow')">Highlight vàng</div>
    <div onclick="applyHighlight('green')">Highlight xanh lá</div>
    <div onclick="applyHighlight('pink')">Highlight hồng</div>
    <div onclick="removeHighlight()">Xóa highlight</div>
</div>

<!-- Core Listening Engine -->
<script src="core-listening.js"></script>

<script>
    // Test Data for PET 1 Test 3 Part 4
    const pet1Test3Part4Data = {
        title: "B1 Preliminary 1 · Test 3 · Part 4",
        type: "multiple-choice",
        part: 4,
        book: 1,
        test: 3,

        answerKey: { q20: 'A', q21: 'B', q22: 'A', q23: 'B', q24: 'C', q25: 'C' },
        displayAnswers: { q20: 'A', q21: 'B', q22: 'A', q23: 'B', q24: 'C', q25: 'C' },

        detailedExplanations: {
            q20: `<strong>Đáp án: A – He worked for someone who looked after trees (anh làm việc cho người chăm sóc cây)</strong><br>
                  James nói: <em>"<span class='keyword-highlight'>Mom had a friend who was an arborist – someone who takes care of trees – and he offered me a job one summer</span>."</em> Chính việc được người bạn của mẹ (chuyên gia chăm sóc cây) cho làm việc mùa hè đã khơi dậy niềm đam mê với cây.
                  <br><br>
                  <strong>✗ B (He enjoyed playing in trees when he was a child) sai:</strong> Anh chơi trong vườn khi còn bé nhưng <em>"<span class='keyword-highlight'>I wasn't allowed to go up the trees</span>"</em> - không được phép leo cây.
                  <br>
                  <strong>✗ C (He learnt about trees from his mother) sai:</strong> Mẹ anh làm thiết kế vườn (<em>"<span class='keyword-highlight'>garden designer</span>"</em>) chứ không trực tiếp dạy anh về cây.
                  <br>
                  <strong>✓ A (He worked for someone who looked after trees) là đáp án đúng.</strong>`,

            q21: `<strong>Đáp án: B – the wide range of people in the class (sự đa dạng người trong lớp)</strong><br>
                  James kể: <em>"<span class='keyword-highlight'>I was expecting everyone in the class to be young and fit... In fact there were middle-aged climbers, children – even old people!</span>"</em> Điều bất ngờ là sự đa dạng về độ tuổi của học viên.
                  <br><br>
                  <strong>✗ A (the time it took to learn) sai:</strong> Anh không ngạc nhiên về thời gian (<em>"<span class='keyword-highlight'>We stayed in the trees for hours because it was so much fun!</span>"</em>).
                  <br>
                  <strong>✗ C (the amount of equipment needed) sai:</strong> Anh biết rõ là cần có dụng cụ đặc biệt, nên không bất ngờ (<em>"<span class='keyword-highlight'>There was obviously special equipment to make climbing safe</span>"</em>).
                  <br>
                  <strong>✓ B (the wide range of people in the class) là đáp án đúng.</strong>`,

            q22: `<strong>Đáp án: A – helping people who need the skill for their work (giúp người cần kỹ năng cho công việc)</strong><br>
                  James nói: <em>"<span class='keyword-highlight'>Particularly teaching those whose jobs involve having to go up trees, like scientists, for example</span>."</em> Anh đặc biệt thích dạy những người cần kỹ năng leo cây cho công việc.
                  <br><br>
                  <strong>✗ B (giving people an interesting new experience) sai:</strong> Mặc dù dạy niềm vui thời ấu thơ cũng tốt, nhưng anh nhấn mạnh đặc biệt (particularly) việc dạy những người cần kỹ năng vì công việc.
                  <br>
                  <strong>✗ C (showing people how to climb in different kinds of weather) sai:</strong> Anh thực tế không thích làm việc dưới trời mưa hay khi quá nóng (<em>"<span class='keyword-highlight'>although not so much in the rain or when it's very hot</span>"</em>).
                  <br>
                  <strong>✓ A (helping people who need the skill for their work) là đáp án đúng.</strong>`,

            q23: `<strong>Đáp án: B – there isn't much work in his own area in winter (không có nhiều việc ở vùng anh vào mùa đông)</strong><br>
                  James giải thích: <em>"<span class='keyword-highlight'>I live and work in the north-west of this country, and no-one wants to climb trees there in the winter. So I move around</span>."</em> Vào mùa đông không có khách ở vùng anh ở, nên anh phải di chuyển.
                  <br><br>
                  <strong>✗ A (interest in tree climbing is increasing there) sai:</strong> Không phải vì mức độ phổ biến leo cây tăng ở Mỹ mà anh phải di chuyển - anh di chuyển vì thiếu việc ở nhà.
                  <br>
                  <strong>✗ C (he'd like to visit as many parts of the country as possible) sai:</strong> Anh di chuyển vì nhu cầu công việc (tránh mùa đông), chứ không phải chỉ vì muốn du lịch tham quan.
                  <br>
                  <strong>✓ B (there isn't much work in his own area in winter) là đáp án đúng.</strong>`,

            q24: `<strong>Đáp án: C – He can look at the stars (anh có thể ngắm sao)</strong><br>
                  James nói: <em>"<span class='keyword-highlight'>It's such a great place to get views of the night sky</span>."</em> Lý do anh thích ngủ trên cây là để ngắm bầu trời đêm (nhìn ngắm các vì sao).
                  <br><br>
                  <strong>✗ A (He wakes up to the sound of birds) sai:</strong> Anh thức dậy vì tiếng chim nhưng điều đó rất ồn (<em>"<span class='keyword-highlight'>a tiny bird sounds very loud</span>"</em>), không phải là điểm anh thích.
                  <br>
                  <strong>✗ B (He thinks it's comfortable) sai:</strong> Mặc dù anh nói <em>"<span class='keyword-highlight'>it's not that bad really</span>"</em>, nhưng đây không phải là điều làm anh thích việc ngủ trên cây.
                  <br>
                  <strong>✓ C (He can look at the stars) là đáp án đúng.</strong>`,

            q25: `<strong>Đáp án: C – he has to protect the trees (anh phải bảo vệ cây)</strong><br>
                  James giải thích: <em>"<span class='keyword-highlight'>The climbing's more challenging... because you have to move more slowly. It's an important environment, so you need to be careful not to damage it</span>."</em> Phải di chuyển chậm để bảo vệ môi trường rừng nhiệt đới, không làm hại cây.
                  <br><br>
                  <strong>✗ A (he wants to study the insects) sai:</strong> Côn trùng sống trong cây nhưng anh cảnh báo không nên di chuyển nhanh để tránh hút côn trùng và bị cắn (<em>"<span class='keyword-highlight'>If you go fast you attract them</span>"</em>), không phải để nghiên cứu chúng.
                  <br>
                  <strong>✗ B (he finds the trees difficult to climb) sai:</strong> Anh khẳng định <em>"<span class='keyword-highlight'>not because the trees are harder to climb</span>"</em> - không phải vì cây khó leo hơn.
                  <br>
                  <strong>✓ C (he has to protect the trees) là đáp án đúng.</strong>`
        },

        transcript: `
            <p><em>Now look at Part Four. For each question, choose the correct answer. Look at questions 20 to 25 now. You have 45 seconds.</em></p>
            <p><em>You will hear an interview with a man called James Sweeney who works as a tree-climbing instructor.</em></p>
            <hr style="margin:10px 0; border-color:#d2cbbc;">
            <p><strong>Woman:</strong> I'm talking to James Sweeney, who's a tree-climbing instructor. He teaches people who want to learn for different reasons. How did you get interested in trees, James?</p>
            <p><strong>Man:</strong> I grew up around trees, because my mother was a garden designer. I often spent time in the gardens she worked on, although I wasn't allowed to go up the trees. What really got me into it was that <span class="highlightable" data-q="20">Mom had a friend who was an arborist – someone who takes care of trees – and he offered me a job one summer.</span></p>
            <p><strong>Woman:</strong> And then you went on a course to learn to climb trees. How was that?</p>
            <p><strong>Man:</strong> Well <span class="highlightable" data-q="21">I was expecting everyone in the class to be young and fit, because I thought you needed to be strong to climb trees. In fact there were middle-aged climbers, children – even old people!</span> There was obviously special equipment to make climbing safe. We stayed in the trees for hours because it was so much fun!</p>
            <p><strong>Woman:</strong> And then you became a teacher of tree-climbing yourself… What do you enjoy most about it?</p>
            <p><strong>Man:</strong> It's great to be in the open, although not so much in the rain or when it's very hot. And I like working with people. <span class="highlightable" data-q="22">Particularly teaching those whose jobs involve having to go up trees, like scientists, for example.</span> There aren't so many of them – most people come because of happy memories of a childhood tree-climbing experience.</p>
            <p><strong>Woman:</strong> You often travel around the USA, too. Why?</p>
            <p><strong>Man:</strong> I live and work in the north-west of this country, and <span class="highlightable" data-q="23">no-one wants to climb trees there in the winter. So I move around.</span> I've climbed trees in every US state except Alaska! And in other countries – there's actually more interest in the subject abroad than from here though.</p>
            <p><strong>Woman:</strong> And you like sleeping in trees, I understand. Why's that?</p>
            <p><strong>Man:</strong> <span class="highlightable" data-q="24">It's such a great place to get views of the night sky.</span> People say it must be uncomfortable, but you get used to it – it's not that bad really. You can't wake up late in the trees though – even a tiny bird sounds very loud when it's only a few inches from your head!</p>
            <p><strong>Woman:</strong> You've climbed trees in rainforests too. How is that different?</p>
            <p><strong>Man:</strong> The climbing's more challenging – not because the trees are harder to climb, but because you have to move more slowly. <span class="highlightable" data-q="25">It's an important environment, so you need to be careful not to damage it.</span> There are insects living in the trees too. If you go fast you attract them, and you're more likely to get bitten.</p>
            <p><strong>Woman:</strong> Thanks, James… (fade)</p>
            <p><em>Now listen again.</em></p>
            <p><em>[repeat]</em></p>
            <p style="color:#666;">That is the end of Part Four.<br>You now have six minutes to write your answers on the answer sheet.<br>You have one more minute.<br>That is the end of the test.</p>
        `,

        questions: [
            { num: 20, text: "How did James become interested in trees?", options: ["He worked for someone who looked after trees.", "He enjoyed playing in trees when he was a child.", "He learnt about trees from his mother."] },
            { num: 21, text: "What surprised James when he first learnt to climb trees?", options: ["the time it took to become good at it", "the wide range of people in the class", "the amount of equipment needed"] },
            { num: 22, text: "What does James enjoy most about his teaching work?", options: ["helping people who need the skill for their work", "giving people an interesting new experience", "showing people how to climb in different kinds of weather"] },
            { num: 23, text: "James travels around the USA a lot because", options: ["interest in tree climbing is increasing there.", "there isn't much work in his own area in winter.", "he'd like to visit as many parts of the country as possible."] },
            { num: 24, text: "What does James like about sleeping in trees?", options: ["He wakes up to the sound of birds.", "He thinks it's comfortable.", "He can look at the stars."] },
            { num: 25, text: "When James climbs in the rainforests, he moves more slowly because", options: ["he wants to study the insects.", "he finds the trees difficult to climb.", "he has to protect the trees."] }
        ]
    };

    // Initialize the listening test when DOM is loaded
    document.addEventListener('DOMContentLoaded', function() {
        window.listeningCore = new ListeningCore();
        window.listeningCore.initializeTest(pet1Test3Part4Data);
        console.log('PET 1 Test 3 Part 4 loaded with core listening engine');
    });
</script>
