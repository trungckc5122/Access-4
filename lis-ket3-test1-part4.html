<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KET 3 - Test 1 - Listening Part 4</title>
    <link rel="stylesheet" href="listening-pet-common.css" id="styleLink">
</head>

<body>
    <div class="test-wrapper" id="testWrapper">
        <!-- Header -->
        <div class="ielts-header">
            <div class="brand">
                <div class="ielts-logo">KET</div>
                <div class="candidate"></div>
                <div class="audio-controls">
                    <audio id="listeningAudio" controls>
                        <source src="audio/KET 3 - Test 1 Part 4.mp3" type="audio/mpeg">
                    </audio>
                    <select class="speed-select" id="speedSelect">
                        <option value="0.7">0.7x</option>
                        <option value="0.9">0.9x</option>
                        <option value="1.0" selected>1x</option>
                        <option value="1.1">1.1x</option>
                        <option value="1.25">1.25x</option>
                    </select>
                    <span class="volume-icon">🔊</span>
                </div>
            </div>
        </div>

        <!-- Question navigator -->
        <div class="question-nav">
            <div class="nav-buttons" id="navButtons"></div>
        </div>

        <!-- Main area -->
        <div class="main-area" id="mainArea">
            <!-- Transcript panel -->
            <div class="transcript-panel" id="transcriptPanel">
                <div class="panel-header"><span>TRANSCRIPT</span></div>
                <div class="transcript-content font-large" id="transcriptContent"></div>
            </div>
            <div class="resizer" id="resizer"></div>

            <!-- Questions panel -->
            <div class="questions-panel" id="questionsPanel">
                <div class="panel-header">
                    <span>QUESTIONS 16–20</span>
                    <span class="answer-badge" id="answeredCount">0/5 answered</span>
                </div>
                <div class="questions-list font-large centered" id="questionsContent">
                    <div>
                        <h3>PART 4 &nbsp; Questions 16–20</h3>
                        <p><em>For each question, choose the correct answer.</em></p>
                        <div class="notes-box" id="questionsContainer"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Bottom bar -->
        <div class="bottom-bar">
            <button class="btn btn-primary" id="submitBtn">Nộp bài</button>
            <button class="btn btn-success" id="explainBtn" disabled>Xem giải thích</button>
            <button class="btn btn-danger" id="resetBtn">Reset</button>
            <div class="progress" id="progressDisplay">Đã làm: 0/5</div>
        </div>

        <!-- Explanation panel -->
        <div class="explanation-panel" id="explanationPanel">
            <div class="resize-handle" id="explanationResizer"></div>
            <div class="explanation-header">
                <span id="explanationTitle">Giải thích</span>
                <span class="close-btn" id="closeExplanation">✕ Đóng</span>
            </div>
            <div class="explanation-content" id="explanationText"></div>
        </div>
    </div>

    <!-- Context menu -->
    <div class="context-menu" id="contextMenu">
        <div onclick="applyHighlight('yellow')">Highlight vàng</div>
        <div onclick="applyHighlight('green')">Highlight xanh lá</div>
        <div onclick="applyHighlight('pink')">Highlight hồng</div>
        <div onclick="removeHighlight()">Xóa highlight</div>
    </div>

    <script src="core-listening-ket.js"></script>
    <script>
        const ketTest1Part4Data = {
            title: "KET 3 · Test 1 · Listening Part 4",
            type: "multiple-choice",
            part: 4,
            book: 3,
            test: 1,

            answerKey: { q16: 'B', q17: 'A', q18: 'C', q19: 'C', q20: 'C' },
            displayAnswers: { q16: 'B', q17: 'A', q18: 'C', q19: 'C', q20: 'C' },

            detailedExplanations: {
                q16: `<strong>Đáp án: B – He won it in a sports event (Anh ấy thắng trong một sự kiện thể thao)</strong><br>
                      Con gái nói: <em>"Oh, I've read that book. It's really good."</em><br>
                      Con trai đáp: <em>"It's strange – I was looking at it in a bookshop a few days ago, but didn't have enough money to get it. So I was really pleased when it was given to me as a prize yesterday. <span class='keyword-highlight'>I was first in the running race!</span>"</em><br><br>
                      <strong>✗ A (He borrowed it from a family member) sai:</strong> Anh ấy sẽ cho mượn em họ (cousin) SAU KHI đọc xong, không phải mượn từ người thân.<br>
                      <strong>✗ C (He bought it in a shop) sai:</strong> Không đủ tiền mua ("didn't have enough money to get it").<br>
                      <strong>✓ B (He won it in a sports event) là đúng – Anh ấy giải nhất chạy đua ("first in the running race").</strong>`,

                q17: `<strong>Đáp án: A – a guitar lesson (một tiết học guitar)</strong><br>
                      Bố hỏi: <em>"How was your first lesson?"</em><br>
                      Con gái đáp: <em>"It was OK, Dad, but the teacher spent ages talking about our hands, and where we have to put them."</em><br>
                      Về cách cầm nhạc cụ: <em>"Well, <span class='keyword-highlight'>the way you hold an instrument</span> is important, isn't it? Yeah. And you can make lots of different sounds, depending on where you put your fingers."</em><br>
                      Về khó khăn: <em>"But playing is difficult. My fingers really hurt afterwards!"</em><br><br>
                      <strong>✗ B (a tennis lesson) sai:</strong> Không liên quan đến tennis.<br>
                      <strong>✗ C (a dance lesson) sai:</strong> Nhảy múa không cần dùng tay và ngón tay theo cách này.<br>
                      <strong>✓ A (a guitar lesson) là đúng – Nhạc cụ ("instrument"), cách cầm tay và đặt ngón tay.</strong>`,

                q18: `<strong>Đáp án: C – in a tent (trong lều)</strong><br>
                      Con trai nói: <em>"I'm really looking forward to my holiday. We're going to France again."</em><br>
                      Con gái hỏi: <em>"Your grandmother has a house there, hasn't she?"</em><br>
                      Con trai đáp: <em>"Yeah, but there are so many of us visiting her this summer that <span class='keyword-highlight'>I'll have to camp in her garden</span>."</em><br><br>
                      <strong>✗ A (in a house) sai:</strong> Nhà của bà nhưng nhiều người nên không ở được.<br>
                      <strong>✗ B (in a hotel) sai:</strong> Con gái gợi ý bà nên mở khách sạn nhưng đó chỉ là nói đùa.<br>
                      <strong>✓ C (in a tent) là đúng – Anh ấy sẽ cắm trại trong vườn ("camp in her garden").</strong>`,

                q19: `<strong>Đáp án: C – check an exercise in pairs (kiểm tra bài tập theo cặp)</strong><br>
                      Giáo viên nói: <em>"OK, you've now each prepared answers to the maths questions. <span class='keyword-highlight'>I'd like you to work with a partner and compare what you wrote</span>. If you haven't got the same answers, look at your work carefully together and decide who's right."</em><br><br>
                      <strong>✗ A (start some maths problems) sai:</strong> Họ ĐÃ chuẩn bị câu trả lời rồi ("you've now each prepared answers").<br>
                      <strong>✗ B (talk about their new textbook) sai:</strong> Không đề cập đến sách giáo khoa mới.<br>
                      <strong>✓ C (check an exercise in pairs) là đúng – Làm việc với bạn ("work with a partner") và so sánh câu trả lời.</strong>`,

                q20: `<strong>Đáp án: C – go for a walk (đi dạo)</strong><br>
                      Con trai mời: <em>"My cousin's visiting my family this weekend. <span class='keyword-highlight'>We're going to have a walk in the forest</span> with my mum. Would you like to join us for that on Saturday?"</em><br>
                      Con gái đồng ý: <em>"Brilliant, I'll cycle over to yours after breakfast on Saturday."</em><br>
                      Về nấm: <em>"The forest is lovely in autumn and it's the perfect time for collecting mushrooms."</em> → Đây là hoạt động phụ trong khi đi dạo.<br><br>
                      <strong>✗ A (have a cycle ride) sai:</strong> Con gái sẽ đạp xe ĐẾN nhà bạn (cycle over to yours), không phải hoạt động chính.<br>
                      <strong>✗ B (cook some special food) sai:</strong> Con trai mời ăn tối SAU khi đi dạo ("Then stay and have dinner with us").<br>
                      <strong>✓ C (go for a walk) là đúng – Đi dạo trong rừng ("have a walk in the forest").</strong>`
            },

            transcript: `
            <p><strong>PART 4</strong></p>
            <p><em>For each question, choose the correct answer.</em></p>

            <p><strong>Question 16</strong><br>
            You will hear two friends talking about a book. How did the boy get the book?<br>
            <strong>Girl:</strong> Oh, I've read that book. It's really good.<br>
            <strong>Boy:</strong> It's strange – I was looking at it in a bookshop a few days ago, but didn't have enough money to get it. So I was really pleased when it was given to me as a prize yesterday. <span class="highlightable" data-q="16">I was first in the running race!</span><br>
            <strong>Girl:</strong> Fantastic!<br>
            <strong>Boy:</strong> I'll lend it to my cousin after I've read it.</p>

            <p><strong>Question 17</strong><br>
            You will hear a girl talking to her father about a lesson. What type of lesson did she have?<br>
            <strong>Dad:</strong> <span class="highlightable" data-q="17">How was your first lesson?</span><br>
            <strong>Girl:</strong> <span class="highlightable" data-q="17">It was OK, Dad, but the teacher spent ages talking about our hands, and where we have to put them.</span><br>
            <strong>Dad:</strong> <span class="highlightable" data-q="17">Well, the way you hold an instrument is important, isn't it?</span><br>
            <strong>Girl:</strong> Yeah. And you can make lots of different sounds, depending on where you put your fingers.<br>
            <strong>Dad:</strong> But playing is difficult.<br>
            <strong>Girl:</strong> My fingers really hurt afterwards!</p>

            <p><strong>Question 18</strong><br>
            You will hear a boy telling his friend about his next holiday. Where will the boy stay on holiday?<br>
            <strong>Boy:</strong> I'm really looking forward to my holiday. We're going to France again.<br>
            <strong>Girl:</strong> <span class="highlightable" data-q="18">Your grandmother has a house there, hasn't she?</span><br>
            <strong>Boy:</strong> <span class="highlightable" data-q="18">Yeah, but there are so many of us visiting her this summer that I'll have to camp in her garden.</span><br>
            <strong>Girl:</strong> Well, it's fun to sleep outside. If her house is so popular, she should turn it into a hotel!<br>
            <strong>Boy:</strong> That's what she says!</p>

            <p><strong>Question 19</strong><br>
            You will hear a teacher talking to his class. What does he want his class to do now?<br>
            <strong>Teacher:</strong> OK, you've now each prepared answers to the maths questions. <span class="highlightable" data-q="19">I'd like you to work with a partner and compare what you wrote.</span> If you haven't got the same answers, look at your work carefully together and decide who's right. Then we'll discuss things as a class before starting the next section in your book – that's all about shapes.</p>

            <p><strong>Question 20</strong><br>
            You will hear two friends talking about their plans for Saturday. What are they going to do together on Saturday?<br>
            <strong>Boy:</strong> <span class="highlightable" data-q="20">My cousin's visiting my family this weekend. We're going to have a walk in the forest with my mum. Would you like to join us for that on Saturday?</span><br>
            <strong>Girl:</strong> <span class="highlightable" data-q="20">Brilliant, I'll cycle over to yours after breakfast on Saturday.</span> The forest is lovely in autumn and it's the perfect time for collecting mushrooms.<br>
            <strong>Boy:</strong> Then stay and have dinner with us.<br>
            <strong>Girl:</strong> Thanks.</p>

            <p><em>That is the end of Part Four.</em></p>
            `,

            questions: [
                { num: 16, text: "You will hear two friends talking about a book. How did the boy get the book?", options: ["He borrowed it from a family member.", "He won it in a sports event.", "He bought it in a shop."] },
                { num: 17, text: "You will hear a girl talking to her father about a lesson. What type of lesson did she have?", options: ["a guitar lesson", "a tennis lesson", "a dance lesson"] },
                { num: 18, text: "You will hear a boy telling his friend about his next holiday. Where will the boy stay on holiday?", options: ["in a house", "in a hotel", "in a tent"] },
                { num: 19, text: "You will hear a teacher talking to his class. What does he want his class to do now?", options: ["start some maths problems", "talk about their new textbook", "check an exercise in pairs"] },
                { num: 20, text: "You will hear two friends talking about their plans for Saturday. What are they going to do together on Saturday?", options: ["have a cycle ride", "cook some special food", "go for a walk"] }
            ]
        };
