<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>PET 2 - Test 1 - Reading Part 6</title>
    <link rel="stylesheet" href="reading-pet-common.css" id="styleLink">
</head>
<body>
<div class="test-wrapper" id="testWrapper">
    <div class="ielts-header">
        <div class="brand"><div class="ielts-logo">PET</div><div class="candidate"></div></div>
    </div>

    <div class="question-nav">
        <div class="nav-buttons" id="navButtons"></div>
        <span id="answeredCount" style="font-size:13px; color:#555; margin-left:10px;">0/6 answered</span>
    </div>

    <div class="main-area split-layout" id="mainArea"></div>

    <div class="bottom-bar">
        <button class="btn btn-primary" id="submitBtn">Nộp bài</button>
        <button class="btn btn-success" id="explainBtn" disabled>Xem giải thích</button>
        <button class="btn btn-danger" id="resetBtn">Reset</button>
        <div class="progress" id="progressDisplay">Đã làm: 0/6</div>
    </div>

    <div class="context-menu" id="contextMenu">
        <div onclick="applyHighlight('yellow')">Highlight vàng</div>
        <div onclick="applyHighlight('green')">Highlight xanh lá</div>
        <div onclick="applyHighlight('pink')">Highlight hồng</div>
        <div onclick="removeHighlight()">Xóa highlight</div>
    </div>
</div>

<script src="core-reading.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const testData = {
            type: 'split-layout',
            part: 6,
            answerKey: { q27: "such", q28: "any", q29: "time", q30: "from", q31: "as", q32: "one" },
            displayAnswers: { q27: "such", q28: "any", q29: "time", q30: "from", q31: "as", q32: "one" },
            detailedExplanations: {
                27: `<div><strong>Cấu trúc cố định:</strong> <em>"such + a/an + tính từ + danh từ"</em>.<br>
                Câu đầy đủ: <em>"We had such a fantastic time at the water park..."</em><br>
                Dịch: Chúng tôi đã có một khoảng thời gian tuyệt vời ở công viên nước.<br>
                <strong>Lưu ý:</strong> "Such" dùng để nhấn mạnh danh từ "a fantastic time".</div>`,
                28: `<div><strong>"Any"</strong> trong câu phủ định: không ai khác ngoài chúng tôi.<br>
                Cấu trúc: <em>"there weren't any other people there"</em> = không có ai khác ở đó.<br>
                "Any" đi với danh từ số nhiều (people) trong câu phủ định.<br>
                Dịch: Chúng tôi đến đó rất sớm nên không có ai khác ở đó.</div>`,
                29: `<div>Thành ngữ <strong>"by the time"</strong> = vào lúc/khi mà.<br>
                Dùng để chỉ thời điểm xảy ra một sự kiện.<br>
                Câu: <em>"By the time we left, there was a long queue of people waiting outside."</em><br>
                Dịch: Vào lúc chúng tôi rời đi, đã có một hàng dài người đang đợi bên ngoài.</div>`,
                30: `<div>Cụm động từ <strong>"be different from"</strong> = khác với.<br>
                Đây là giới từ cố định sau tính từ "different".<br>
                Câu: <em>"The water slides were really big and quite different from the ones at the park near my house."</em><br>
                Dịch: Các đường trượt nước thực sự lớn và khá khác biệt so với những cái ở công viên gần nhà tôi.</div>`,
                31: `<div>Cấu trúc <strong>"as + adjective + as"</strong> = cũng... như.<br>
                Dùng để so sánh bằng.<br>
                Câu: <em>"they weren't as scary as I'd expected them to be."</em><br>
                Dịch: Chúng không đáng sợ như tôi đã mong đợi.</div>`,
                32: `<div>Đại từ <strong>"one"</strong> dùng để thay thế cho danh từ đã nhắc đến trước đó.<br>
                Ở đây "one" thay thế cho "water park" để tránh lặp lại.<br>
                Câu: <em>"I'd definitely recommend this one – I'm sure you'll enjoy it!"</em><br>
                Dịch: Tôi chắc chắn sẽ giới thiệu cái này – tôi chắc bạn sẽ thích nó!</div>`
            },
            template: `
                <div class="reading-card" id="passageCard">
                    <div class="review-title">Water park visit</div>
                    <p><strong>Hi Mei,</strong></p>
                    <p>How are you? Hope you had a good weekend! I went to the new water park in town yesterday with our friends Lara and Finn. We had
                        <span class="input-wrapper">
                            <input type="text" id="q27" class="gap-input" data-q="27" autocomplete="off">
                            <span class="eye-icon" data-question="27">👁️</span>
                        </span>
                        a fantastic time!
                    </p>
                    <p>
                        We got there so early that there weren't
                        <span class="input-wrapper">
                            <input type="text" id="q28" class="gap-input" data-q="28" autocomplete="off">
                            <span class="eye-icon" data-question="28">👁️</span>
                        </span>
                        other people there – which was great! By the
                        <span class="input-wrapper">
                            <input type="text" id="q29" class="gap-input" data-q="29" autocomplete="off">
                            <span class="eye-icon" data-question="29">👁️</span>
                        </span>
                        we left, there was a long queue of people waiting outside.
                    </p>
                    <p>
                        The water slides were really big and quite different
                        <span class="input-wrapper">
                            <input type="text" id="q30" class="gap-input" data-q="30" autocomplete="off">
                            <span class="eye-icon" data-question="30">👁️</span>
                        </span>
                        the ones at the park near my house. But they weren't
                        <span class="input-wrapper">
                            <input type="text" id="q31" class="gap-input" data-q="31" autocomplete="off">
                            <span class="eye-icon" data-question="31">👁️</span>
                        </span>
                        scary as I'd expected them to be.
                    </p>
                    <p>
                        Anyway, that's all from me. I'd definitely recommend this
                        <span class="input-wrapper">
                            <input type="text" id="q32" class="gap-input" data-q="32" autocomplete="off">
                            <span class="eye-icon" data-question="32">👁️</span>
                        </span>
                        – I'm sure you'll enjoy it! Let me know if you'd like to go next weekend.
                    </p>
                    <p><strong>All the best,<br>Emily</strong></p>
                </div>
            `,
            questions: [
                { num: 27 }, { num: 28 }, { num: 29 }, { num: 30 }, { num: 31 }, { num: 32 }
            ]
        };

        window.readingCore = new ReadingCore();
        window.readingCore.initializeTest(testData);
    });
</script>
</body>
</html>
