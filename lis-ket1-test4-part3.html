<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KET 1 - Test 4 - Listening Part 3</title>
    <link rel="stylesheet" href="listening-pet-common.css" id="styleLink">
</head>

<body>
    <div class="test-wrapper" id="testWrapper">
        <!-- Header -->
        <div class="ielts-header">
            <div class="brand">
                <div class="ielts-logo">KET</div>
                <div class="candidate"></div>
                <div class="audio-controls">
                    <audio id="listeningAudio" controls>
                        <source src="audio/KET 1 - Test 4 Part 3.mp3" type="audio/mpeg">
                    </audio>
                    <select class="speed-select" id="speedSelect">
                        <option value="0.7">0.7x</option>
                        <option value="0.9">0.9x</option>
                        <option value="1.0" selected>1x</option>
                        <option value="1.1">1.1x</option>
                        <option value="1.25">1.25x</option>
                    </select>
                    <span class="volume-icon">🔊</span>
                </div>
            </div>
        </div>

        <!-- Question navigator -->
        <div class="question-nav">
            <div class="nav-buttons" id="navButtons"></div>
        </div>

        <!-- Main area -->
        <div class="main-area" id="mainArea">
            <!-- Transcript panel -->
            <div class="transcript-panel" id="transcriptPanel">
                <div class="panel-header"><span>TRANSCRIPT</span></div>
                <div class="transcript-content font-large" id="transcriptContent"></div>
            </div>
            <div class="resizer" id="resizer"></div>

            <!-- Questions panel -->
            <div class="questions-panel" id="questionsPanel">
                <div class="panel-header">
                    <span>QUESTIONS 11–15</span>
                    <span class="answer-badge" id="answeredCount">0/5 answered</span>
                </div>
                <div class="questions-list font-large centered" id="questionsContent">
                    <div>
                        <h3>PART 3 &nbsp; Questions 11–15</h3>
                        <p><em>For each question, choose the correct answer.</em></p>
                        <p style="margin-bottom:8px;">You will hear a man, Ben, and a woman, Emma, talking about Ben's new flat.</p>
                        <div class="notes-box" id="questionsContainer"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Bottom bar -->
        <div class="bottom-bar">
            <button class="btn btn-primary" id="submitBtn">Nộp bài</button>
            <button class="btn btn-success" id="explainBtn" disabled>Xem giải thích</button>
            <button class="btn btn-danger" id="resetBtn">Reset</button>
            <div class="progress" id="progressDisplay">Đã làm: 0/5</div>
        </div>

        <!-- Explanation panel -->
        <div class="explanation-panel" id="explanationPanel">
            <div class="resize-handle" id="explanationResizer"></div>
            <div class="explanation-header">
                <span id="explanationTitle">Giải thích</span>
                <span class="close-btn" id="closeExplanation">✕ Đóng</span>
            </div>
            <div class="explanation-content" id="explanationText"></div>
        </div>
    </div>

    <!-- Context menu -->
    <div class="context-menu" id="contextMenu">
        <div onclick="applyHighlight('yellow')">Highlight vàng</div>
        <div onclick="applyHighlight('green')">Highlight xanh lá</div>
        <div onclick="applyHighlight('pink')">Highlight hồng</div>
        <div onclick="removeHighlight()">Xóa highlight</div>
    </div>

    <script src="core-listening-ket.js"></script>
    <script>
        const ketTest4Part3Data = {
            title: "KET 1 · Test 4 · Listening Part 3",
            type: "multiple-choice",
            part: 3,
            book: 1,
            test: 4,

            answerKey: { q11: 'B', q12: 'A', q13: 'B', q14: 'A', q15: 'B' },
            displayAnswers: { q11: 'B', q12: 'A', q13: 'B', q14: 'A', q15: 'B' },

            detailedExplanations: {
                q11: `<strong>Đáp án: B – two weeks ago (hai tuần trước)</strong><br>
                      Emma hỏi: <em>"You went to live in your new flat two months ago, didn't you?"</em><br>
                      Ben đáp: <em>"Actually, <span class='keyword-highlight'>I've only been there for two weeks</span>, and finished painting it two days ago."</em><br><br>
                      <strong>✗ A (two days ago) sai:</strong> Đây là thời điểm anh ấy sơn xong.<br>
                      <strong>✗ C (two months ago) sai:</strong> Emma đoán nhầm.<br>
                      <strong>✓ B (two weeks ago) là đúng – Ben chuyển đến hai tuần trước.</strong>`,

                q12: `<strong>Đáp án: A – It is nearer to his job (gần công việc hơn)</strong><br>
                      Ben nói: <em>"it isn't bigger and it isn't on the top floor, so the views aren't as good. But <span class='keyword-highlight'>I love that it only takes five minutes to walk to work</span>."</em><br><br>
                      <strong>✗ B (It has better views) sai:</strong> View không đẹp bằng căn hộ cũ.<br>
                      <strong>✗ C (It is larger) sai:</strong> Căn hộ không lớn hơn.<br>
                      <strong>✓ A (It is nearer to his job) là đúng – chỉ 5 phút đi bộ đến chỗ làm.</strong>`,

                q13: `<strong>Đáp án: B – the living room (phòng khách)</strong><br>
                      Ben nói: <em>"There's a great shower. And lots of wardrobes in my bedroom, which I like. But <span class='keyword-highlight'>my favourite room's where I read, watch TV or talk to friends</span>."</em> → Phòng khách (living room).<br><br>
                      <strong>✗ A (the bathroom) sai:</strong> Phòng tắm có vòi sen tốt nhưng không phải phòng yêu thích nhất.<br>
                      <strong>✗ C (the bedroom) sai:</strong> Phòng ngủ có nhiều tủ quần áo nhưng không phải phòng yêu thích nhất.<br>
                      <strong>✓ B (the living room) là đúng – nơi đọc sách, xem TV, trò chuyện.</strong>`,

                q14: `<strong>Đáp án: A – shelves (kệ sách)</strong><br>
                      Emma hỏi: <em>"Did you find somewhere to put those <span class='keyword-highlight'>shelves</span> I gave you? They'll look good with the curtains from your mum!"</em><br>
                      Về carpets: <em>"It's lucky the people who lived there before left their carpets."</em> → Của người cũ để lại, không phải Emma tặng.<br>
                      Về curtains: <em>"the curtains from your mum"</em> → Của mẹ Ben, không phải Emma.<br><br>
                      <strong>✗ B (carpets) sai:</strong> Của người ở trước để lại.<br>
                      <strong>✗ C (curtains) sai:</strong> Của mẹ Ben.<br>
                      <strong>✓ A (shelves) là đúng – Emma đã tặng kệ sách.</strong>`,

                q15: `<strong>Đáp án: B – a journalist (nhà báo)</strong><br>
                      Emma nói: <em>"I know someone who lives in the same building. <span class='keyword-highlight'>He writes articles for newspapers</span>."</em> (writes articles = journalist – nhà báo).<br>
                      Ben đáp: <em>"Oh, yes. He lives next door."</em><br>
                      Về police officer: <em>"There's a policeman above me."</em> → Ở trên, không phải bên cạnh.<br>
                      Về mechanic: <em>"I've also met someone from another building who repairs cars."</em> → Ở tòa nhà khác.<br><br>
                      <strong>✗ A (a mechanic) sai:</strong> Ở tòa nhà khác.<br>
                      <strong>✗ C (a police officer) sai:</strong> Ở trên Ben.<br>
                      <strong>✓ B (a journalist) là đúng – người viết báo sống bên cạnh.</strong>`
            },

            transcript: `
            <p><strong>PART 3</strong></p>
            <p><em>For each question, choose the correct answer.</em></p>
            <p>You will hear a man, Ben, and a woman, Emma, talking about Ben's new flat.</p>

            <p><strong>Emma:</strong> Hi, Ben. You went to live in your new flat two months ago, didn't you?<br>
            <strong>Ben:</strong> <span class="highlightable" data-q="11">Actually, I've only been there for two weeks, and finished painting it two days ago.</span><br>
            <strong>Emma:</strong> Is it very different from your old place?<br>
            <strong>Ben:</strong> <span class="highlightable" data-q="12">Well, it isn't bigger and it isn't on the top floor, so the views aren't as good. But I love that it only takes five minutes to walk to work.</span><br>
            <strong>Emma:</strong> Fantastic. And the rooms?<br>
            <strong>Ben:</strong> <span class="highlightable" data-q="13">There's a great shower. And lots of wardrobes in my bedroom, which I like. But my favourite room's where I read, watch TV or talk to friends.</span><br>
            <strong>Emma:</strong> Have you got everything you need for your new flat?<br>
            <strong>Ben:</strong> I think so!<br>
            <strong>Emma:</strong> <span class="highlightable" data-q="14">It's lucky the people who lived there before left their carpets. Did you find somewhere to put those shelves I gave you? They'll look good with the curtains from your mum!</span><br>
            <strong>Ben:</strong> They will, thanks!<br>
            <strong>Emma:</strong> <span class="highlightable" data-q="15">I know someone who lives in the same building. He writes articles for newspapers.</span><br>
            <strong>Ben:</strong> Oh, yes. He lives next door. There's a policeman above me. And I've also met someone from another building who repairs cars.</p>

            <p><em>That is the end of Part Three.</em></p>
            `,

            questions: [
                { num: 11, text: "When did Ben go to live in his new flat?", options: ["two days ago", "two weeks ago", "two months ago"] },
                { num: 12, text: "How is Ben's new flat different from his old one?", options: ["It is nearer to his job.", "It has better views.", "It is larger."] },
                { num: 13, text: "Which room in the new flat does Ben like best?", options: ["the bathroom", "the living room", "the bedroom"] },
                { num: 14, text: "What has Emma given Ben for his new flat?", options: ["shelves", "carpets", "curtains"] },
                { num: 15, text: "Who lives in the flat next to Ben's?", options: ["a mechanic", "a journalist", "a police officer"] }
            ]
        };

        document.addEventListener('DOMContentLoaded', function () {
            window.listeningCore = new ListeningCore();
            window.listeningCore.initializeTest(ketTest4Part3Data);
            console.log('KET 1 Test 4 Listening Part 3 loaded');
        });
    </script>
</body>

</html>
