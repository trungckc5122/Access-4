<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KET 3 - Test 2 - Listening Part 3</title>
    <link rel="stylesheet" href="listening-pet-common.css" id="styleLink">
</head>

<body>
    <div class="test-wrapper" id="testWrapper">
        <!-- Header -->
        <div class="ielts-header">
            <div class="brand">
                <div class="ielts-logo">KET</div>
                <div class="candidate"></div>
                <div class="audio-controls">
                    <audio id="listeningAudio" controls>
                        <source src="audio/KET 3 - Test 2 Part 3.mp3" type="audio/mpeg">
                    </audio>
                    <select class="speed-select" id="speedSelect">
                        <option value="0.7">0.7x</option>
                        <option value="0.9">0.9x</option>
                        <option value="1.0" selected>1x</option>
                        <option value="1.1">1.1x</option>
                        <option value="1.25">1.25x</option>
                    </select>
                    <span class="volume-icon">🔊</span>
                </div>
            </div>
        </div>

        <!-- Question navigator -->
        <div class="question-nav">
            <div class="nav-buttons" id="navButtons"></div>
        </div>

        <!-- Main area -->
        <div class="main-area" id="mainArea">
            <!-- Transcript panel -->
            <div class="transcript-panel" id="transcriptPanel">
                <div class="panel-header"><span>TRANSCRIPT</span></div>
                <div class="transcript-content font-large" id="transcriptContent"></div>
            </div>
            <div class="resizer" id="resizer"></div>

            <!-- Questions panel -->
            <div class="questions-panel" id="questionsPanel">
                <div class="panel-header">
                    <span>QUESTIONS 11–15</span>
                    <span class="answer-badge" id="answeredCount">0/5 answered</span>
                </div>
                <div class="questions-list font-large centered" id="questionsContent">
                    <div>
                        <h3>PART 3 &nbsp; Questions 11–15</h3>
                        <p><em>For each question, choose the correct answer.</em></p>
                        <p style="margin-bottom:8px;">You will hear two friends, Emma and Jamie, planning a trip to a market.</p>
                        <div class="notes-box" id="questionsContainer"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Bottom bar -->
        <div class="bottom-bar">
            <button class="btn btn-primary" id="submitBtn">Nộp bài</button>
            <button class="btn btn-success" id="explainBtn" disabled>Xem giải thích</button>
            <button class="btn btn-danger" id="resetBtn">Reset</button>
            <div class="progress" id="progressDisplay">Đã làm: 0/5</div>
        </div>

        <!-- Explanation panel -->
        <div class="explanation-panel" id="explanationPanel">
            <div class="resize-handle" id="explanationResizer"></div>
            <div class="explanation-header">
                <span id="explanationTitle">Giải thích</span>
                <span class="close-btn" id="closeExplanation">✕ Đóng</span>
            </div>
            <div class="explanation-content" id="explanationText"></div>
        </div>
    </div>

    <!-- Context menu -->
    <div class="context-menu" id="contextMenu">
        <div onclick="applyHighlight('yellow')">Highlight vàng</div>
        <div onclick="applyHighlight('green')">Highlight xanh lá</div>
        <div onclick="applyHighlight('pink')">Highlight hồng</div>
        <div onclick="removeHighlight()">Xóa highlight</div>
    </div>

    <script src="core-listening-ket.js"></script>
    <script>
        const ketTest2Part3Data = {
            title: "KET 3 · Test 2 · Listening Part 3",
            type: "multiple-choice",
            part: 3,
            book: 3,
            test: 2,

            answerKey: { q11: 'B', q12: 'C', q13: 'A', q14: 'C', q15: 'B' },
            displayAnswers: { q11: 'B', q12: 'C', q13: 'A', q14: 'C', q15: 'B' },

            detailedExplanations: {
                q11: `<strong>Đáp án: B – Emma's neighbour (hàng xóm của Emma)</strong><br>
                      Jamie hỏi: <em>"Is your mum driving us to the market on Saturday, Emma?"</em><br>
                      Emma đáp: <em>"She's visiting my cousin. But <span class='keyword-highlight'>we can go with Annie, who lives next door</span>. She's really nice."</em><br><br>
                      <strong>✗ A (Emma's mum) sai:</strong> Mẹ Emma đi thăm em họ ("visiting my cousin").<br>
                      <strong>✗ C (Emma's cousin) sai:</strong> Em họ đang được mẹ thăm, không phải người chở họ.<br>
                      <strong>✓ B (Emma's neighbour) là đúng – Annie ở cạnh nhà ("lives next door").</strong>`,

                q12: `<strong>Đáp án: C – 10.45</strong><br>
                      Jamie hỏi: <em>"What time are we going?"</em><br>
                      Emma nói: <em>"We'll come to your house at <span class='keyword-highlight'>quarter to eleven</span>, Jamie."</em><br>
                      Jamie phàn nàn: <em>"That's quite late."</em><br>
                      Emma giải thích: <em>"Well, I've got my piano lesson until quarter past ten. I won't be ready to leave home before half past ten."</em><br><br>
                      <strong>✗ A (10.15) sai:</strong> Đây là khi Emma học piano xong ("quarter past ten").<br>
                      <strong>✗ B (10.30) sai:</strong> Đây là giờ Emma rời nhà ("half past ten"), không phải giờ đón Jamie.<br>
                      <strong>✓ C (10.45) là đúng – Quarter to eleven = 10:45.</strong>`,

                q13: `<strong>Đáp án: A – jewellery (trang sức)</strong><br>
                      Jamie hỏi: <em>"Do you want to get a dress for the school dance at the market?"</em><br>
                      Emma đáp: <em>"I'm borrowing my friend Katie's actually, but <span class='keyword-highlight'>I need to find a necklace and earrings to wear with it</span>."</em><br><br>
                      <strong>✗ B (clothes) sai:</strong> Emma mượn váy của bạn, không mua quần áo.<br>
                      <strong>✗ C (toys) sai:</strong> Jamie muốn mua đồ chơi cho em trai, không phải Emma.<br>
                      <strong>✓ A (jewellery) là đúng – Emma cần vòng cổ và bông tai (necklace and earrings).</strong>`,

                q14: `<strong>Đáp án: C – They're unusual (Chúng đặc biệt/hiếm có)</strong><br>
                      Emma nói: <em>"The market's great for old computer games too."</em><br>
                      Jamie đáp: <em>"Yeah! <span class='keyword-highlight'>They're ones you can't get in other places</span>. You can get new ones anywhere."</em><br>
                      Emma hỏi: <em>"Are they expensive?"</em><br>
                      Jamie đáp: <em>"A little."</em><br><br>
                      <strong>✗ A (They're cheap) sai:</strong> Jamie nói "A little" đắt, không phải rẻ.<br>
                      <strong>✗ B (They're new) sai:</strong> Là game cũ ("old computer games"), không phải mới.<br>
                      <strong>✓ C (They're unusual) là đúng – Không thể tìm thấy ở nơi khác ("can't get in other places").</strong>`,

                q15: `<strong>Đáp án: B – serves great food (phục vụ đồ ăn tuyệt vời)</strong><br>
                      Emma đề xuất: <em>"We can have lunch at the Moon Café later."</em><br>
                      Jamie phàn nàn: <em>"They play very loud music."</em><br>
                      Emma đáp: <em>"Not really, Jamie! <span class='keyword-highlight'>And the burgers are fantastic</span>."</em><br>
                      Jamie đồng ý: <em>"That's true! But it's a shame the waiters never have time to chat."</em><br>
                      Emma nói: <em>"They're always smiling!"</em><br><br>
                      <strong>✗ A (has friendly staff) sai:</strong> Jamie phàn nàn nhân viên không có thời gian trò chuyện.<br>
                      <strong>✗ C (is very noisy) sai:</strong> Emma phủ nhận nhạc ồn ("Not really").<br>
                      <strong>✓ B (serves great food) là đúng – Emma nói "burgers are fantastic".</strong>`
            },

            transcript: `
            <p><strong>PART 3</strong></p>
            <p><em>For each question, choose the correct answer.</em></p>
            <p>You will hear two friends, Emma and Jamie, planning a trip to a market.</p>

            <p><strong>Jamie:</strong> <span class="highlightable" data-q="11">Is your mum driving us to the market on Saturday, Emma?</span><br>
            <strong>Emma:</strong> <span class="highlightable" data-q="11">She's visiting my cousin. But we can go with Annie, who lives next door.</span> She's really nice.<br>
            <strong>Jamie:</strong> <span class="highlightable" data-q="12">Great! What time are we going?</span><br>
            <strong>Emma:</strong> <span class="highlightable" data-q="12">We'll come to your house at quarter to eleven, Jamie.</span><br>
            <strong>Jamie:</strong> That's quite late.<br>
            <strong>Emma:</strong> Well, I've got my piano lesson until quarter past ten. I won't be ready to leave home before half past ten.<br>
            <strong>Jamie:</strong> <span class="highlightable" data-q="13">OK. Do you want to get a dress for the school dance at the market?</span><br>
            <strong>Emma:</strong> <span class="highlightable" data-q="13">I'm borrowing my friend Katie's actually, but I need to find a necklace and earrings to wear with it.</span><br>
            <strong>Jamie:</strong> I want to buy a toy for my brother's birthday.<br>
            <strong>Emma:</strong> The market's great for old computer games too.<br>
            <strong>Jamie:</strong> Yeah! <span class="highlightable" data-q="14">They're ones you can't get in other places</span>. You can get new ones anywhere.<br>
            <strong>Emma:</strong> Are they expensive?<br>
            <strong>Jamie:</strong> A little.<br>
            <strong>Emma:</strong> We can have lunch at the Moon Café later.<br>
            <strong>Jamie:</strong> <span class="highlightable" data-q="15">They play very loud music.</span><br>
            <strong>Emma:</strong> <span class="highlightable" data-q="15">Not really, Jamie! And the burgers are fantastic.</span><br>
            <strong>Jamie:</strong> That's true! But it's a shame the waiters never have time to chat.<br>
            <strong>Emma:</strong> They're always smiling!</p>

            <p><em>That is the end of Part Three.</em></p>
            `,

            questions: [
                { num: 11, text: "Who can take Emma and Jamie to the market?", options: ["Emma's mum", "Emma's neighbour", "Emma's cousin"] },
                { num: 12, text: "When will they pick Jamie up?", options: ["10.15", "10.30", "10.45"] },
                { num: 13, text: "What does Emma want to buy?", options: ["jewellery", "clothes", "toys"] },
                { num: 14, text: "Why does Jamie like the computer games on the market?", options: ["They're cheap.", "They're new.", "They're unusual."] },
                { num: 15, text: "Emma and Jamie agree that the Moon Café", options: ["has friendly staff.", "serves great food.", "is very noisy."] }
            ]
        };

        document.addEventListener('DOMContentLoaded', function () {
            window.listeningCore = new ListeningCore();
            window.listeningCore.initializeTest(ketTest2Part3Data);
            console.log('KET 3 Test 2 Listening Part 3 loaded');
        });
    </script>
