<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>PET 3 - Test 3 - Reading Part 6</title>
    <link rel="stylesheet" href="reading-pet-common.css" id="styleLink">
</head>
<body>
<div class="test-wrapper" id="testWrapper">
    <div class="ielts-header">
        <div class="brand"><div class="ielts-logo">PET</div><div class="candidate"></div></div>
    </div>

    <div class="question-nav">
        
        <div class="nav-buttons" id="navButtons"></div>
        <span id="answeredCount" style="font-size:13px; color:#555; margin-left:10px;">0/6 answered</span>
    </div>

    <!-- Main area -->
    <div class="main-area split-layout" id="mainArea"></div>

    <div class="bottom-bar">
        <button class="btn btn-primary" id="submitBtn">Nộp bài</button>
        <button class="btn btn-success" id="explainBtn" disabled>Xem giải thích</button>
        <button class="btn btn-danger" id="resetBtn">Reset</button>
        <div class="progress" id="progressDisplay">Đã làm: 0/6</div>
    </div>

    <div class="context-menu" id="contextMenu">
        <div onclick="applyHighlight('yellow')">Highlight vàng</div>
        <div onclick="applyHighlight('green')">Highlight xanh lá</div>
        <div onclick="applyHighlight('pink')">Highlight hồng</div>
        <div onclick="removeHighlight()">Xóa highlight</div>
    </div>
</div>

<script src="core-reading.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const testData = {
            type: 'split-layout',
            part: 6,
            answerKey: { q27: "at", q28: "than", q29: "is", q30: "of", q31: "if/when", q32: "sure" },
            displayAnswers: { q27: "at", q28: "than", q29: "is", q30: "of", q31: "if / when", q32: "sure" },
            detailedExplanations: {
                27: `<div><strong>Giới từ:</strong> <em>"at least"</em> (ít nhất).<br>
                Câu: <em>"We go cycling at least four times a week"</em>.<br>
                Dịch: Chúng tôi đi xe đạp ít nhất bốn lần một tuần.</div>`,
                28: `<div><strong>Từ so sánh:</strong> <em>"than"</em> (hơn).<br>
                Câu: <em>"The whole route is less than 15 kilometres long"</em>.<br>
                Dịch: Toàn bộ tuyến đường dài chưa đến 15 km.</div>`,
                29: `<div><strong>Động từ "to be":</strong> <em>"is"</em>.<br>
                Câu: <em>"this is where you might see wild animals"</em>.<br>
                Dịch: đây là nơi bạn có thể thấy động vật hoang dã.</div>`,
                30: `<div><strong>Giới từ:</strong> <em>"of"</em>. Cụm từ "one of them" (một trong số chúng).<br>
                Câu: <em>"from one of them you can see some rare birds"</em>.<br>
                Dịch: từ một trong số chúng bạn có thể thấy một số loài chim quý hiếm.</div>`,
                31: `<div><strong>Liên từ:</strong> <em>"if"</em> (nếu) hoặc <em>"when"</em> (khi).<br>
                Câu: <em>"which can be frightening if you don't have lights"</em>.<br>
                Dịch: điều đó có thể đáng sợ nếu bạn không có đèn.</div>`,
                32: `<div><strong>Cụm từ:</strong> <em>"make sure"</em> (đảm bảo).<br>
                Câu: <em>"I always make sure I remember to bring them"</em>.<br>
                Dịch: Tôi luôn đảm bảo mình nhớ mang chúng theo.</div>`
            },
            template: `
                <div class="reading-card" id="passageCard">
                    <div class="review-title">A great place to cycle</div>
                    <p><em>by Anna Benzie</em></p>
                    <p>My older brother and I love cycling. We go cycling
                        <span class="input-wrapper">
                            <input type="text" id="q27" class="gap-input" data-q="27" autocomplete="off">
                            <span class="eye-icon" data-question="27">👁️</span>
                        </span>
                        least four times a week and often follow an amazing path which used to be a railway line. The line closed 20 years ago. The whole route is less
                        <span class="input-wrapper">
                            <input type="text" id="q28" class="gap-input" data-q="28" autocomplete="off">
                            <span class="eye-icon" data-question="28">👁️</span>
                        </span>
                        15 kilometres long but it goes through lots of different types of landscape.
                    </p>
                    <p>For the first 5 kilometres, you cycle through a forest and this
                        <span class="input-wrapper">
                            <input type="text" id="q29" class="gap-input" data-q="29" autocomplete="off">
                            <span class="eye-icon" data-question="29">👁️</span>
                        </span>
                        where you might see wild animals, like rabbits. Further along, on a clear day you can see some amazing hills in the distance. You cross over several bridges, and from one
                        <span class="input-wrapper">
                            <input type="text" id="q30" class="gap-input" data-q="30" autocomplete="off">
                            <span class="eye-icon" data-question="30">👁️</span>
                        </span>
                        them you can see some rare birds on the side of a cliff. Near the end of this path you go through a long, dark tunnel, which can be frightening
                        <span class="input-wrapper">
                            <input type="text" id="q31" class="gap-input" data-q="31" autocomplete="off">
                            <span class="eye-icon" data-question="31">👁️</span>
                        </span>
                        you don't have lights on your bike. So, I always make
                        <span class="input-wrapper">
                            <input type="text" id="q32" class="gap-input" data-q="32" autocomplete="off">
                            <span class="eye-icon" data-question="32">👁️</span>
                        </span>
                        I remember to bring them.
                    </p>
                </div>
            `,
            questions: [
                { num: 27 }, { num: 28 }, { num: 29 }, { num: 30 }, { num: 31 }, { num: 32 }
            ]
        };

        window.readingCore = new ReadingCore();
        window.readingCore.initializeTest(testData);
    });
</script>
</body>
</html>
