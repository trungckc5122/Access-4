<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PET 1 - Test 1 - Part 2</title>
    <link rel="stylesheet" href="../listening-pet-common.css">
</head>

<body>
    <div class="test-wrapper" id="testWrapper">
        <!-- Header -->
        <div class="ielts-header">
            <div class="brand">
                <div class="ielts-logo">PET</div>
                <div class="candidate">B1 Preliminary 1 · Test 1 · Part 2</div>
                <div class="audio-controls">
                    <audio id="listeningAudio" controls>
                        <source src="B1 Preliminary 1 - Test 1 Part 2.mp3" type="audio/mpeg">
                        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg">
                        <!-- fallback -->
                    </audio>
                    <select class="speed-select" id="speedSelect">
                        <option value="0.7">0.7x</option>
                        <option value="0.9">0.9x</option>
                        <option value="1.0" selected>1x</option>
                        <option value="1.1">1.1x</option>
                        <option value="1.25">1.25x</option>
                    </select>
                    <span class="volume-icon">🔊</span>
                </div>
            </div>
            <div class="font-controls">
                <button class="font-btn" id="fontSmall">A-</button>
                <button class="font-btn" id="fontMedium">A</button>
                <button class="font-btn active" id="fontLarge">A+</button>
            </div>
        </div>

        <!-- Question navigator (8-13) -->
        <div class="question-nav">
            <span style="font-weight:600; color:#1e3a5f;">Câu 8-13:</span>
            <div class="nav-buttons" id="navButtons"></div>
        </div>

        <!-- Main area -->
        <div class="main-area" id="mainArea">
            <!-- Transcript panel (ẩn ban đầu) -->
            <div class="transcript-panel" id="transcriptPanel">
                <div class="panel-header">
                    <span>TRANSCRIPT</span>
                </div>
                <div class="transcript-content font-large" id="transcriptContent"></div>
            </div>
            <div class="resizer" id="resizer"></div>

            <!-- Questions panel -->
            <div class="questions-panel" id="questionsPanel">
                <div class="panel-header">
                    <span>QUESTIONS 8-13</span>
                    <span class="answer-badge" id="answeredCount">0/6 answered</span>
                </div>
                <div class="questions-list font-large centered" id="questionsContent">
                    <div>
                        <h3>PART 2 Questions 8-13</h3>
                        <p><em>Choose the correct answer (A, B or C).</em></p>

                        <div class="notes-box" id="questionsContainer">
                            <!-- Các câu hỏi sẽ được tạo bằng JavaScript để dễ quản lý -->
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Bottom bar -->
        <div class="bottom-bar">
            <button class="btn btn-primary" id="submitBtn">Nộp bài</button>
            <button class="btn btn-success" id="explainBtn" disabled>Xem giải thích</button>
            <button class="btn btn-danger" id="resetBtn">Reset tất cả</button>
            <div class="progress" id="progressDisplay">Đã làm: 0/6</div>
        </div>

        <!-- Explanation panel -->
        <div class="explanation-panel" id="explanationPanel">
            <div class="resize-handle" id="explanationResizer"></div>
            <div class="explanation-header">
                <span id="explanationTitle">Giải thích</span>
                <span class="close-btn" id="closeExplanation">✕ Đóng</span>
            </div>
            <div class="explanation-content" id="explanationText"></div>
        </div>
    </div>

    <script>
        (function () {
            // ---------- ANSWER KEY (chữ cái) ----------
            const answerKey = {
                q8: 'C',
                q9: 'A',
                q10: 'C',
                q11: 'A',
                q12: 'B',
                q13: 'C'
            };

            // ---------- Đáp án hiển thị (dạng chữ cái) ----------
            const displayAnswers = {
                q8: 'C',
                q9: 'A',
                q10: 'C',
                q11: 'A',
                q12: 'B',
                q13: 'C'
            };

            // ---------- GIẢI THÍCH CHI TIẾT (giống phong cách Test 2) ----------
            const detailedExplanations = {
                q8: `<strong>Đáp án: C (get advice from an expert.)</strong><br>
                  Người phụ nữ đề nghị: <em>"What about talking to my brother who’s a professional cyclist? He’d give you some useful ideas..."</em> - anh trai cô ấy là một chuyên gia xe đạp.
                  <br><br>
                  <strong>✗ A (try looking online.) không đúng:</strong> Người đàn ông định lên mạng tìm hiểu nhưng người phụ nữ can ngăn vì cho rằng có quá nhiều thông tin ("If you look on the internet, sometimes there’s too much information.").
                  <br>
                  <strong>✗ B (go to a different shop.) không đúng:</strong> Không có chi tiết nào khuyên anh ấy đi cửa hàng khác.
                  <br>
                  <strong>✓ C (get advice from an expert.) là điều cô ấy khuyên.</strong>`,

                q9: `<strong>Đáp án: A (The teacher speaks too fast.)</strong><br>
                  Người đàn ông phàn nàn: <em>"The main issue I have to deal with is our teacher – if she spoke more slowly, I’d understand a lot more."</em> - nếu giáo viên nói chậm lại thì anh ấy đã hiểu hơn, tức là cô ấy nói quá nhanh.
                  <br><br>
                  <strong>✗ B (The lessons are too long.) không đúng:</strong> Bài học khá ngắn ("Our classes are only an hour long though, so just when I’m getting into the lesson, it’s over!").
                  <br>
                  <strong>✗ C (The grammar is too difficult.) không đúng:</strong> Lúc đầu anh ấy nghĩ ngữ pháp sẽ khó, nhưng thực tế thì không tệ ("I thought the grammar would be really hard, but actually it isn’t too bad.").
                  <br>
                  <strong>✓ A (The teacher speaks too fast.) là vấn đề anh ấy gặp phải.</strong>`,

                q10: `<strong>Đáp án: C (having a chance to relax)</strong><br>
                  Người phụ nữ nói về việc ngồi trên sofa xem TV cả buổi chiều: <em>"which was something I really needed to do"</em> - đó là điều cô ấy thực sự cần làm để thư giãn.
                  <br><br>
                  <strong>✗ A (visiting a new place in the city) không đúng:</strong> Khu chợ ngoài trời mới khiến họ rất ướt do mưa và cô ấy rất vui khi rời khỏi đó ("It never stopped raining though and we all got very wet. I was happy to leave.").
                  <br>
                  <strong>✗ B (seeing her children enjoying themselves) không đúng:</strong> Các con cô ấy ho suốt cả ngày sau đó và cãi nhau xem sẽ xem TV gì ("coughing the whole time", "arguments about what to watch").
                  <br>
                  <strong>✓ C (having a chance to relax) là điều cô ấy thích.</strong>`,

                q11: `<strong>Đáp án: A (the food was fresher.)</strong><br>
                  Người phụ nữ phàn nàn đồ ăn như đóng hộp hoặc đông lạnh đem hâm nóng (<em>"everything seemed to either be out of a tin or frozen stuff heated up in a microwave"</em>), và người đàn ông đồng ý (<em>"Such a shame, but you’re absolutely right"</em>).
                  <br><br>
                  <strong>✗ B (the service was faster.) không đúng:</strong> Họ không đồng ý với nhau về dịch vụ. Người đàn ông phàn nàn dịch vụ chậm, nhưng người phụ nữ thấy đủ nhanh.
                  <br>
                  <strong>✗ C (the prices were cheaper.) không đúng:</strong> Cả hai đều cho rằng giá cả hợp lý ("pretty good value", "don’t charge too much").
                  <br>
                  <strong>✓ A (the food was fresher.) là điều cả hai thấy nhà hàng cần cải thiện.</strong>`,

                q12: `<strong>Đáp án: B (He has started wearing glasses.)</strong><br>
                  Người đàn ông nói về cặp kính của mình: <em>"I see you have to wear glasses now as well. I’m still not really used to mine."</em> - anh ấy đã bắt đầu đeo kính và vẫn chưa quen.
                  <br><br>
                  <strong>✗ A (He has grown a beard.) không đúng:</strong> Anh ấy đã cạo râu ("now you’ve shaved your beard").
                  <br>
                  <strong>✗ C (He has changed his style of clothes.) không đúng:</strong> Anh ấy vẫn mặc chiếc áo khoác cũ ("You know it’s always been my favourite... I thought you’d have a new one after all these years!").
                  <br>
                  <strong>✓ B (He has started wearing glasses.) là sự thay đổi của anh ấy.</strong>`,

                q13: `<strong>Đáp án: C (surprised that it is still going to take place)</strong><br>
                  Người phụ nữ bất ngờ vì cuộc họp vẫn diễn ra dù John nghỉ ốm: <em>"I can’t believe that. Without John?"</em>
                  <br><br>
                  <strong>✗ A (annoyed that she will have to attend it) không đúng:</strong> Dù bất ngờ, cô ấy không tức giận vì phải tham gia, mà cho biết mình đã sẵn sàng ("Oh well, I’m ready for it").
                  <br>
                  <strong>✗ B (worried that her presentation will be unpopular) không đúng:</strong> Cô ấy tự tin rằng mọi người sẽ thích phần thuyết trình của mình ("I think everyone’ll like it").
                  <br>
                  <strong>✓ C (surprised that it is still going to take place) là cảm giác của cô ấy lúc đó.</strong>`
            };

            // ---------- TRANSCRIPT với các span highlight ----------
            const transcriptHTML = `
            <p><strong>Question 8</strong><br>
            <strong>Woman:</strong> So have you bought a bicycle yet?<br>
            <strong>Man:</strong> I nearly bought one last week – but in the end I didn’t really think the salesman I spoke to knew enough.<br>
            <strong>Woman:</strong> In our local bike shop? They’re usually very helpful in there.<br>
            <strong>Man:</strong> Yes. I think he was new. Anyway, maybe I need to do some more research online.<br>
            <strong>Woman:</strong> If you look on the internet, sometimes there’s too much information. <span class="highlightable" data-q="8">What about talking to my brother who’s a professional cyclist? He’d give you some useful ideas without trying to persuade you to buy a particular product like they do in shops.</span><br>
            <strong>Man:</strong> I could do.</p>

            <p><strong>Question 9</strong><br>
            <strong>Woman:</strong> How are you getting on with your Welsh language course?<br>
            <strong>Man:</strong> Not too bad actually. From what other people had told me, I thought the grammar would be really hard, but actually it isn’t too bad. <span class="highlightable" data-q="9">The main issue I have to deal with is our teacher – if she spoke more slowly, I’d understand a lot more. I miss so much.</span> Oh well, I’m sure I’ll get used to her. Our classes are only an hour long though, so just when I’m getting into the lesson, it’s over! Anyway, it’s a beautiful language and I’m glad I’ve taken it up.</p>

            <p><strong>Question 10</strong><br>
            <strong>Man:</strong> Morning! So how was your weekend?<br>
            <strong>Woman:</strong> We went to the city for the day, to the new outdoor street market everyone’s talking about. It never stopped raining though and we all got very wet. I was happy to leave. Both the kids spent the next day coughing the whole time. That meant we just sat on the sofa watching TV all afternoon, <span class="highlightable" data-q="10">which was something I really needed to do</span>, despite all the arguments about what to watch. We did eventually manage to find a couple of films that everyone would be satisfied with.</p>

            <p><strong>Question 11</strong><br>
            <strong>Man:</strong> Have you been to the new restaurant on the High Street?<br>
            <strong>Woman:</strong> Yes, I guess it wasn’t too bad.<br>
            <strong>Man:</strong> I thought the food was pretty good value at least.<br>
            <strong>Woman:</strong> It’s true they don’t charge too much.<br>
            <strong>Man:</strong> The service was slow though when I went. The waiter had to apologise.<br>
            <strong>Woman:</strong> I don’t mind waiting when the food’s all freshly cooked. But it was quick enough when I went. <span class="highlightable" data-q="11">That was just it – everything seemed to either be out of a tin or frozen stuff heated up in a microwave.</span><br>
            <strong>Man:</strong> <span class="highlightable" data-q="11">Such a shame, but you’re absolutely right</span> – even if it isn’t an expensive place to eat.</p>

            <p><strong>Question 12</strong><br>
            <strong>Woman:</strong> Oh hi, John, it is you! I thought so – I’d recognise that jacket anywhere.<br>
            <strong>Man:</strong> You know it’s always been my favourite.<br>
            <strong>Woman:</strong> Yes, but I thought you’d have a new one after all these years!<br>
            <strong>Man:</strong> Why bother, if it still fits as well as ever? After all, fashion has never interested me that much. <span class="highlightable" data-q="12">I see you have to wear glasses now as well. I’m still not really used to mine.</span><br>
            <strong>Woman:</strong> But they look good on you, particularly now you’ve shaved your beard.<br>
            <strong>Man:</strong> Thanks. Anyway, what have you been doing since I last saw you? You look well.</p>

            <p><strong>Question 13</strong><br>
            <strong>Man:</strong> Where’s this afternoon’s meeting?<br>
            <strong>Woman:</strong> Well it was supposed to be upstairs, but surely we’re not going to have it now that John’s off sick?<br>
            <strong>Man:</strong> Oh? I’ve heard we’re going to carry on as planned.<br>
            <strong>Woman:</strong> <span class="highlightable" data-q="13">I can’t believe that. Without John?</span> Oh well, I’m ready for it … I’m doing my presentation and I think everyone’ll like it.<br>
            <strong>Man:</strong> I’m sure you’ll be great! Did it take long to prepare?<br>
            <strong>Woman:</strong> To be honest, I spent ages on it. That was fine, but my laptop kept shutting down while I was preparing it. That made me really mad!<br>
            <strong>Man:</strong> Oh dear!</p>

            <p><em>Now listen again.</em></p>
            <p style="color:#666;">That is the end of Part Two.</p>
        `;

            // ---------- Dữ liệu câu hỏi ----------
            const questionsData = [
                { num: 8, text: "You will hear two people talking about buying a bicycle. The woman suggests that the man should", options: ["try looking online.", "go to a different shop.", "get advice from an expert."] },
                { num: 9, text: "You will hear a man telling his friend about his Welsh language course. What does the man say about it?", options: ["The teacher speaks too fast.", "The lessons are too long.", "The grammar is too difficult."] },
                { num: 10, text: "You will hear a woman telling her colleague about her weekend. What did the woman like about it?", options: ["visiting a new place in the city", "seeing her children enjoying themselves", "having a chance to relax"] },
                { num: 11, text: "You will hear two friends talking about a new restaurant. They both think the restaurant would be better if", options: ["the food was fresher.", "the service was faster.", "the prices were cheaper."] },
                { num: 12, text: "You will hear two old friends talking at a party. How is the man’s appearance different from before?", options: ["He has grown a beard.", "He has started wearing glasses.", "He has changed his style of clothes."] },
                { num: 13, text: "You will hear two colleagues talking about a meeting. How does the woman feel about it?", options: ["annoyed that she will have to attend it", "worried that her presentation will be unpopular", "surprised that it is still going to take place"] }
            ];

            // ---------- STATE ----------
            let examSubmitted = false;
            let explanationMode = false;
            const audio = document.getElementById('listeningAudio');
            const speedSelect = document.getElementById('speedSelect');

            speedSelect.addEventListener('change', function () {
                audio.playbackRate = parseFloat(this.value);
            });

            // Helper: lấy câu trả lời của người dùng (chữ cái A, B, C hoặc null)
            function getUserAnswer(q) {
                const radios = document.getElementsByName(`q${q}`);
                for (let radio of radios) {
                    if (radio.checked) return radio.value;
                }
                return null;
            }

            // Kiểm tra một câu có đúng không
            function isAnswerCorrect(q, userAnswer) {
                return userAnswer === answerKey[`q${q}`];
            }

            // Cập nhật số câu đã làm và màu nav
            function updateAnswerCount() {
                let answered = 0;
                for (let i = 8; i <= 13; i++) if (getUserAnswer(i)) answered++;
                document.getElementById('answeredCount').textContent = `${answered}/6 answered`;
                document.getElementById('progressDisplay').textContent = `Đã làm: ${answered}/6`;
                for (let i = 8; i <= 13; i++) {
                    const btn = document.querySelector(`.nav-btn[data-question="${i}"]`);
                    if (btn) {
                        btn.classList.remove('answered', 'unanswered');
                        btn.classList.add(getUserAnswer(i) ? 'answered' : 'unanswered');
                    }
                }
            }

            // Tạo nút điều hướng từ 8 đến 13
            function createNavButtons() {
                const nav = document.getElementById('navButtons');
                nav.innerHTML = '';
                for (let i = 8; i <= 13; i++) {
                    const btn = document.createElement('button');
                    btn.className = 'nav-btn unanswered';
                    btn.textContent = i;
                    btn.dataset.question = i;
                    btn.addEventListener('click', function () {
                        const q = this.dataset.question;
                        document.getElementById(`question-${q}`)?.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                        this.classList.add('active');
                    });
                    nav.appendChild(btn);
                }
            }

            // Tạo HTML cho các câu hỏi
            function renderQuestions() {
                const container = document.getElementById('questionsContainer');
                container.innerHTML = '';
                questionsData.forEach(q => {
                    const div = document.createElement('div');
                    div.className = 'question-item';
                    div.id = `question-${q.num}`;
                    div.innerHTML = `
                    <div class="question-text">${q.num}. ${q.text}</div>
                    <div class="options">
                        ${q.options.map((opt, index) => `
                            <div class="option">
                                <input type="radio" name="q${q.num}" value="${String.fromCharCode(65 + index)}" id="q${q.num}${String.fromCharCode(65 + index)}">
                                <label for="q${q.num}${String.fromCharCode(65 + index)}">${String.fromCharCode(65 + index)}. ${opt}</label>
                            </div>
                        `).join('')}
                    </div>
                    <span class="eye-icon" data-question="${q.num}">👁️</span>
                `;
                    container.appendChild(div);
                });
            }

            // Đánh dấu đúng/sai và hiển thị badge
            function markAnswers() {
                for (let i = 8; i <= 13; i++) {
                    const questionDiv = document.getElementById(`question-${i}`);
                    if (!questionDiv) continue;
                    const user = getUserAnswer(i);
                    const correct = isAnswerCorrect(i, user);
                    questionDiv.classList.remove('correct', 'incorrect');
                    const oldBadge = questionDiv.querySelector('.correct-answer-badge');
                    if (oldBadge) oldBadge.remove();
                    if (correct) {
                        questionDiv.classList.add('correct');
                    } else {
                        questionDiv.classList.add('incorrect');
                        // Hiển thị badge đáp án đúng
                        const badge = document.createElement('span');
                        badge.className = 'correct-answer-badge';
                        badge.textContent = `Đáp án đúng: ${displayAnswers[`q${i}`]}`;
                        questionDiv.appendChild(badge);
                    }
                }
            }

            // Hiển thị giải thích cho câu hỏi
            function showExplanation(questionNum) {
                if (!explanationMode && !examSubmitted) return;

                document.querySelectorAll('.transcript-highlight').forEach(el => el.classList.remove('transcript-highlight'));
                document.querySelectorAll('.keyword-highlight').forEach(el => el.classList.remove('keyword-highlight'));

                const highlightSpans = document.querySelectorAll(`.highlightable[data-q="${questionNum}"]`);
                highlightSpans.forEach(span => {
                    const parentP = span.closest('p');
                    if (parentP) parentP.classList.add('transcript-highlight');
                    span.classList.add('keyword-highlight');
                    span.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    span.classList.add('scroll-highlight');
                    setTimeout(() => span.classList.remove('scroll-highlight'), 1000);
                });

                document.getElementById('explanationPanel').classList.add('show');
                document.getElementById('explanationTitle').textContent = `Giải thích câu ${questionNum}`;
                let html = detailedExplanations[`q${questionNum}`] || `<strong>Đáp án: ${displayAnswers[`q${questionNum}`]}</strong><br>`;
                if (examSubmitted) {
                    const user = getUserAnswer(questionNum) || '(chưa chọn)';
                    const isCorrect = isAnswerCorrect(questionNum, user);
                    html += `<div style="margin-top:10px;padding:10px; background:${isCorrect ? '#e8f5e8' : '#ffebee'}; border-radius:5px;">`;
                    html += `<strong>Câu trả lời của bạn:</strong> ${user}<br>`;
                    if (!isCorrect) html += `<strong>Đáp án đúng:</strong> ${displayAnswers[`q${questionNum}`]}`;
                    else html += `<strong>✅ Đúng!</strong>`;
                    html += `</div>`;
                }
                document.getElementById('explanationText').innerHTML = html;
            }

            // Reset tất cả
            function resetAll() {
                examSubmitted = false;
                explanationMode = false;
                for (let i = 8; i <= 13; i++) {
                    const radios = document.getElementsByName(`q${i}`);
                    radios.forEach(r => {
                        r.checked = false;
                        r.disabled = false;
                    });
                    const questionDiv = document.getElementById(`question-${i}`);
                    if (questionDiv) {
                        questionDiv.classList.remove('correct', 'incorrect');
                        const badge = questionDiv.querySelector('.correct-answer-badge');
                        if (badge) badge.remove();
                    }
                }
                const mainArea = document.getElementById('mainArea');
                mainArea.classList.remove('show-transcript');
                document.getElementById('transcriptContent').innerHTML = '';
                document.querySelectorAll('.eye-icon').forEach(icon => icon.style.display = 'none');
                document.querySelectorAll('.transcript-highlight').forEach(el => el.classList.remove('transcript-highlight'));
                document.querySelectorAll('.keyword-highlight').forEach(el => el.classList.remove('keyword-highlight'));
                document.getElementById('submitBtn').disabled = false;
                document.getElementById('submitBtn').textContent = 'Nộp bài';
                document.getElementById('explainBtn').disabled = true;
                document.getElementById('explainBtn').textContent = 'Xem giải thích';
                document.getElementById('explanationPanel').classList.remove('show');
                updateAnswerCount();
            }

            // ========== CHỨC NĂNG LƯU VÀO DASHBOARD (LOCALSTORAGE) ==========
            function getPetInfo() {
                const candidateText = document.querySelector('.candidate')?.textContent || '';
                let book = 1, test = 1, part = 2;
                const bookMatch = candidateText.match(/Preliminary\s+(\d+)/i);
                if (bookMatch) book = parseInt(bookMatch[1]);
                const testMatch = candidateText.match(/Test\s+(\d+)/i);
                if (testMatch) test = parseInt(testMatch[1]);
                const partMatch = candidateText.match(/Part\s+(\d+)/i);
                if (partMatch) part = parseInt(partMatch[1]);
                return { book, test, part };
            }

            function saveToDashboard() {
                if (!examSubmitted) return;

                const { book, test, part } = getPetInfo();
                const skill = 'listening'; // Part 2 always listening (PET Listening)

                const details = [];
                let correctCount = 0;

                // Xác định số câu hỏi từ answerKey (8-13)
                const keys = Object.keys(answerKey);
                const numbers = keys.map(k => parseInt(k.slice(1))).filter(n => !isNaN(n));
                const minQ = Math.min(...numbers);
                const maxQ = Math.max(...numbers);

                for (let i = minQ; i <= maxQ; i++) {
                    const user = getUserAnswer(i);
                    const correct = answerKey[`q${i}`];
                    const isCorrect = user === correct;
                    if (isCorrect) correctCount++;
                    details.push({
                        question: i,
                        user: user || '(trống)',
                        correct: displayAnswers[`q${i}`] || correct,
                        isCorrect: isCorrect
                    });
                }

                const partData = {
                    partId: part,
                    name: `Part ${part}`,
                    totalQuestions: details.length,
                    correctCount: correctCount,
                    details: details
                };

                const key = `pet_${skill}_book${book}_test${test}_part${part}`;
                localStorage.setItem(key, JSON.stringify(partData));
                console.log(`✅ Đã lưu kết quả ${skill} với key: ${key}`);
            }

            // ---------- EVENT LISTENERS ----------
            // Gắn sự kiện change cho radio để cập nhật số lượng đã làm
            document.addEventListener('change', function (e) {
                if (e.target && e.target.matches('input[type="radio"]')) {
                    updateAnswerCount();
                }
            });

            // Xử lý nộp bài và lưu kết quả
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.addEventListener('click', function () {
                if (examSubmitted) return;
                let unanswered = [];
                for (let i = 8; i <= 13; i++) if (!getUserAnswer(i)) unanswered.push(i);
                if (unanswered.length > 0 && !confirm(`Bạn còn ${unanswered.length} câu chưa chọn. Nộp bài?`)) return;

                examSubmitted = true;
                const mainArea = document.getElementById('mainArea');
                mainArea.classList.add('show-transcript');
                document.getElementById('transcriptContent').innerHTML = transcriptHTML;
                markAnswers();
                submitBtn.disabled = true;
                submitBtn.textContent = 'Đã nộp bài';
                document.getElementById('explainBtn').disabled = false;

                let correctCount = 0;
                for (let i = 8; i <= 13; i++) {
                    if (isAnswerCorrect(i, getUserAnswer(i))) correctCount++;
                }
                document.getElementById('explanationPanel').classList.add('show');
                document.getElementById('explanationTitle').textContent = 'KẾT QUẢ';
                document.getElementById('explanationText').innerHTML = `<h4>Bạn đã nộp bài</h4><p><strong>Đúng:</strong> ${correctCount}/6</p><p>Nhấn vào nút <strong>Xem giải thích</strong> để xem hiệu ứng và đáp án đúng.</p>`;

                // Lưu kết quả vào localStorage
                saveToDashboard();
                document.querySelectorAll('input[type="radio"]').forEach(el => el.disabled = true);
            });

            document.getElementById('explainBtn').addEventListener('click', function () {
                if (!examSubmitted) return;
                explanationMode = true;
                document.querySelectorAll('.eye-icon, .correct-answer-badge').forEach(el => el.style.display = 'inline-block');
                this.disabled = true;
                this.textContent = 'Đang xem giải thích';
                document.getElementById('explanationPanel').classList.remove('show');
            });

            document.getElementById('resetBtn').addEventListener('click', function () {
                if (confirm('Reset tất cả câu trả lời?')) resetAll();
            });

            document.getElementById('closeExplanation').addEventListener('click', function () {
                document.getElementById('explanationPanel').classList.remove('show');
                document.querySelectorAll('.transcript-highlight').forEach(el => el.classList.remove('transcript-highlight'));
                document.querySelectorAll('.keyword-highlight').forEach(el => el.classList.remove('keyword-highlight'));
            });

            document.addEventListener('click', function (e) {
                if (e.target.classList.contains('eye-icon')) {
                    const q = e.target.dataset.question;
                    showExplanation(q);
                }
            });

            // Font size
            function setFontSize(size) {
                document.querySelectorAll('.font-btn').forEach(btn => btn.classList.remove('active'));
                document.getElementById(`font${size.charAt(0).toUpperCase() + size.slice(1)}`).classList.add('active');
                document.querySelectorAll('.transcript-content, .questions-list').forEach(el => {
                    el.className = `transcript-content font-${size}`;
                    if (el.classList.contains('questions-list')) {
                        el.classList.add('centered');
                    }
                });
            }
            document.getElementById('fontSmall').addEventListener('click', () => setFontSize('small'));
            document.getElementById('fontMedium').addEventListener('click', () => setFontSize('medium'));
            document.getElementById('fontLarge').addEventListener('click', () => setFontSize('large'));

            // Resizer
            const transcriptPanel = document.getElementById('transcriptPanel');
            const questionsPanel = document.getElementById('questionsPanel');
            const resizer = document.getElementById('resizer');
            let isResizing = false;
            resizer.addEventListener('mousedown', () => { isResizing = true; document.body.style.cursor = 'col-resize'; });
            document.addEventListener('mousemove', (e) => {
                if (!isResizing) return;
                const mainArea = document.getElementById('mainArea');
                const rect = mainArea.getBoundingClientRect();
                let leftWidth = e.clientX - rect.left - 4;
                if (leftWidth < 250) leftWidth = 250;
                if (leftWidth > rect.width - 250) leftWidth = rect.width - 250;
                transcriptPanel.style.width = leftWidth + 'px';
                questionsPanel.style.width = (rect.width - leftWidth - 8) + 'px';
            });
            document.addEventListener('mouseup', () => { isResizing = false; document.body.style.cursor = 'default'; });

            // Khởi tạo
            createNavButtons();
            renderQuestions();
            updateAnswerCount();
            document.querySelectorAll('.eye-icon').forEach(icon => icon.style.display = 'none');
            setFontSize('large');

            // Resizable explanation panel logic
            const expPanel = document.getElementById('explanationPanel');
            const expResizer = document.getElementById('explanationResizer');
            let isResizingExp = false;
            let startYExp, startHeightExp;

            if (expResizer && expPanel) {
                expResizer.addEventListener('mousedown', (e) => {
                    isResizingExp = true;
                    startYExp = e.clientY;
                    startHeightExp = expPanel.offsetHeight;
                    document.body.style.cursor = 'ns-resize';
                    document.body.style.userSelect = 'none';
                });

                document.addEventListener('mousemove', (e) => {
                    if (!isResizingExp) return;
                    const dy = startYExp - e.clientY;
                    const newHeight = startHeightExp + dy;
                    if (newHeight > 100 && newHeight < window.innerHeight * 0.8) {
                        expPanel.style.maxHeight = newHeight + 'px';
                        expPanel.style.height = newHeight + 'px';
                    }
                });

                document.addEventListener('mouseup', () => {
                    isResizingExp = false;
                    document.body.style.cursor = 'default';
                    document.body.style.userSelect = 'auto';
                });
            }
        })();
    </script>
</body>

</html>
