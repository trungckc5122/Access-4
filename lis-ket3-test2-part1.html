<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KET 3 - Test 2 - Listening Part 1</title>
    <link rel="stylesheet" href="listening-pet-common.css" id="styleLink">
</head>

<body>
    <div class="test-wrapper" id="testWrapper">
        <!-- Header -->
        <div class="ielts-header">
            <div class="brand">
                <div class="ielts-logo">KET</div>
                <div class="candidate"></div>
                <div class="audio-controls">
                    <audio id="listeningAudio" controls>
                        <source src="audio/KET 3 - Test 2 Part 1.mp3" type="audio/mpeg">
                    </audio>
                    <select class="speed-select" id="speedSelect">
                        <option value="0.7">0.7x</option>
                        <option value="0.9">0.9x</option>
                        <option value="1.0" selected>1x</option>
                        <option value="1.1">1.1x</option>
                        <option value="1.25">1.25x</option>
                    </select>
                    <span class="volume-icon">🔊</span>
                </div>
            </div>
        </div>

        <!-- Question navigator -->
        <div class="question-nav">
            <div class="nav-buttons" id="navButtons"></div>
        </div>

        <!-- Main area -->
        <div class="main-area" id="mainArea">
            <!-- Transcript panel -->
            <div class="transcript-panel" id="transcriptPanel">
                <div class="panel-header"><span>TRANSCRIPT</span></div>
                <div class="transcript-content font-large" id="transcriptContent"></div>
            </div>
            <div class="resizer" id="resizer"></div>

            <!-- Questions panel -->
            <div class="questions-panel" id="questionsPanel">
                <div class="panel-header">
                    <span>QUESTIONS 1–5</span>
                    <span class="answer-badge" id="answeredCount">0/5 answered</span>
                </div>
                <div class="questions-list font-large centered" id="questionsContent">
                    <div>
                        <h3>PART 1 &nbsp; Questions 1–5</h3>
                        <p><em>For each question, choose the correct answer.</em></p>
                        <div class="notes-box" id="questionsContainer"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Bottom bar -->
        <div class="bottom-bar">
            <button class="btn btn-primary" id="submitBtn">Nộp bài</button>
            <button class="btn btn-success" id="explainBtn" disabled>Xem giải thích</button>
            <button class="btn btn-danger" id="resetBtn">Reset</button>
            <div class="progress" id="progressDisplay">Đã làm: 0/5</div>
        </div>

        <!-- Explanation panel -->
        <div class="explanation-panel" id="explanationPanel">
            <div class="resize-handle" id="explanationResizer"></div>
            <div class="explanation-header">
                <span id="explanationTitle">Giải thích</span>
                <span class="close-btn" id="closeExplanation">✕ Đóng</span>
            </div>
            <div class="explanation-content" id="explanationText"></div>
        </div>
    </div>

    <!-- Context menu -->
    <div class="context-menu" id="contextMenu">
        <div onclick="applyHighlight('yellow')">Highlight vàng</div>
        <div onclick="applyHighlight('green')">Highlight xanh lá</div>
        <div onclick="applyHighlight('pink')">Highlight hồng</div>
        <div onclick="removeHighlight()">Xóa highlight</div>
    </div>

    <script src="core-listening-ket.js"></script>
    <script>
        const ketTest2Part1Data = {
            title: "KET 3 · Test 2 · Listening Part 1",
            type: "multiple-choice",
            part: 1,
            book: 3,
            test: 2,

            answerKey: { q1: 'A', q2: 'A', q3: 'C', q4: 'C', q5: 'B' },
            displayAnswers: { q1: 'A', q2: 'A', q3: 'C', q4: 'C', q5: 'B' },

            detailedExplanations: {
                q1: `<strong>Đáp án: A – £47.99</strong><br>
                      Con trai nói: <em>"Those trainers are really cool, and they look expensive. I love them!"</em><br>
                      Con gái đáp: <em>"Thanks, I got them in the sale. They were seventy-five pounds fifty but I got them for only <span class='keyword-highlight'>forty-seven ninety-nine</span>. I was lucky."</em><br>
                      Con trai nói thêm về anh trai: <em>"My brother's got some a bit like those, but they cost over fifty pounds, fifty-one seventy-five I think."</em><br><br>
                      <strong>✗ B (£51.75) sai:</strong> Đây là giá giày của anh trai cậu ấy.<br>
                      <strong>✗ C (£75.50) sai:</strong> Đây là giá gốc trước khi giảm.<br>
                      <strong>✓ A (£47.99) là đúng – Giá sau khi giảm "forty-seven ninety-nine".</strong>`,

                q2: `<strong>Đáp án: A – Flowers</strong><br>
                      Con gái nói: <em>"Your photos are great, especially this one of the beach."</em><br>
                      Con trai nói: <em>"Thanks, I took them when I stayed with my grandmother last week. That picture of the castle's my favourite."</em><br>
                      Con gái nói về hoa: <em>"Those flowers are beautiful."</em><br>
                      Con trai đáp: <em>"<span class='keyword-highlight'>My grandmother loves them. I'll print that photo for her.</span> She wants to put it on her wall."</em><br><br>
                      <strong>✗ B (The sea) sai:</strong> Con gái thích ảnh biển nhưng đó không phải ảnh con trai chọn tặng bà.<br>
                      <strong>✗ C (A castle) sai:</strong> Đây là ảnh con trai thích nhất nhưng không phải để tặng bà.<br>
                      <strong>✓ A (Flowers) là đúng – Bà thích hoa và con trai sẽ in ảnh hoa tặng bà.</strong>`,

                q3: `<strong>Đáp án: C – Go for a bike ride</strong><br>
                      Con gái hỏi: <em>"What do we need to get now in the shopping centre?"</em><br>
                      Con trai nói về board game: <em>"I want to get that new board game. Will you play it with me later?"</em><br>
                      Con gái đáp: <em>"Of course. But hurry, we need to be back home for lunch. <span class='keyword-highlight'>And Mum wants us to go on a bike ride after that.</span>"</em><br>
                      Con trai đồng ý: <em>"OK, we'll play the game after the bike ride."</em><br><br>
                      <strong>✗ A (Play a board game) sai:</strong> Chơi SAU khi đi xe đạp ("after the bike ride").<br>
                      <strong>✗ B (Go to the shopping centre) sai:</strong> Họ đang ở shopping centre rồi.<br>
                      <strong>✓ C (Go for a bike ride) là đúng – Sau bữa trưa sẽ đi xe đạp.</strong>`,

                q4: `<strong>Đáp án: C – Tomato and onion</strong><br>
                      Con gái nói: <em>"Mum and Dad loved the pizza I made for us all yesterday!"</em><br>
                      Con trai hỏi: <em>"Did it have lots of mushrooms and onion on it? That's the kind I like."</em><br>
                      Con gái đáp: <em>"<span class='keyword-highlight'>We didn't have any mushrooms left, so I used tomatoes with the onion instead.</span>"</em><br><br>
                      <strong>✗ A (Onion and mushroom) sai:</strong> Hết nấm rồi.<br>
                      <strong>✗ B (Tomato and mushroom) sai:</strong> Cũng hết nấm.<br>
                      <strong>✓ C (Tomato and onion) là đúng – Dùng cà chua với hành thay vì nấm.</strong>`,

                q5: `<strong>Đáp án: B – Girl with dark hair and glasses</strong><br>
                      Con gái nói: <em>"I think I saw your sister this morning, at the dentist's. I love her long blonde hair."</em><br>
                      Con trai đáp: <em>"Well, <span class='keyword-highlight'>she's got long hair but it's dark</span>. So, it wasn't my sister you saw."</em><br>
                      Con gái nói tiếp: <em>"Oh, OK. I thought it was strange that the girl in the dentist wasn't wearing glasses like your sister does."</em><br>
                      Con trai xác nhận: <em>"Yeah, <span class='keyword-highlight'>my sister can't see well without them</span>!"</em><br><br>
                      <strong>✗ A (Girl with blonde hair and glasses) sai:</strong> Tóc chị ấy là màu đen (dark), không phải vàng.<br>
                      <strong>✗ C (Girl with dark hair and no glasses) sai:</strong> Chị ấy có đeo kính.<br>
                      <strong>✓ B (Girl with dark hair and glasses) là đúng – Tóc đen và đeo kính.</strong>`
            },

            transcript: `
            <p><strong>PART 1</strong></p>
            <p><em>For each question, choose the correct answer.</em></p>

            <p><strong>Question 1</strong><br>
            <strong>Boy:</strong> Those trainers are really cool, and they look expensive. I love them!<br>
            <strong>Girl:</strong> <span class="highlightable" data-q="1">Thanks, I got them in the sale. They were seventy-five pounds fifty but I got them for only forty-seven ninety-nine.</span> I was lucky.<br>
            <strong>Boy:</strong> You were. My brother's got some a bit like those, but they cost over fifty pounds, fifty-one seventy-five I think. Yours look much better.<br>
            <strong>Girl:</strong> Thanks, I'm glad you like them.</p>

            <p><strong>Question 2</strong><br>
            <strong>Girl:</strong> Your photos are great, especially this one of the beach.<br>
            <strong>Boy:</strong> Thanks, I took them when I stayed with my grandmother last week. That picture of the castle's my favourite. I'm keeping all of them on my phone so I can show people.<br>
            <strong>Girl:</strong> Those flowers are beautiful.<br>
            <strong>Boy:</strong> <span class="highlightable" data-q="2">My grandmother loves them. I'll print that photo for her.</span> She wants to put it on her wall.</p>

            <p><strong>Question 3</strong><br>
            <strong>Girl:</strong> What do we need to get now in the shopping centre?<br>
            <strong>Boy:</strong> I want to get that new board game. Will you play it with me later?<br>
            <strong>Girl:</strong> Of course. But hurry, we need to be back home for lunch. <span class="highlightable" data-q="3">And Mum wants us to go on a bike ride after that.</span><br>
            <strong>Boy:</strong> OK, we'll play the game after the bike ride.</p>

            <p><strong>Question 4</strong><br>
            <strong>Girl:</strong> Mum and Dad loved the pizza I made for us all yesterday!<br>
            <strong>Boy:</strong> Did it have lots of mushrooms and onion on it? That's the kind I like.<br>
            <strong>Girl:</strong> <span class="highlightable" data-q="4">We didn't have any mushrooms left, so I used tomatoes with the onion instead.</span><br>
            <strong>Boy:</strong> Good idea. My mum puts tomatoes with mushrooms. She doesn't really like onions, but I do.</p>

            <p><strong>Question 5</strong><br>
            <strong>Girl:</strong> I think I saw your sister this morning, at the dentist's. I love her long blonde hair.<br>
            <strong>Boy:</strong> <span class="highlightable" data-q="5">Well, she's got long hair but it's dark.</span> So, it wasn't my sister you saw.<br>
            <strong>Girl:</strong> Oh, OK. I thought it was strange that the girl in the dentist wasn't wearing glasses like your sister does.<br>
            <strong>Boy:</strong> Yeah, my sister can't see well without them!</p>

            <p><em>That is the end of Part One.</em></p>
            `,

            questions: [
                { num: 1, text: "How much did the girl pay for her trainers?", options: ["£47.99", "£51.75", "£75.50"] },
                { num: 2, text: "Which picture does the boy choose for his grandmother?", options: ["Flowers", "The sea", "A castle"] },
                { num: 3, text: "What are they going to do first this afternoon?", options: ["Play a board game", "Go to the shopping centre", "Go for a bike ride"] },
                { num: 4, text: "What did the girl put on the pizza yesterday?", options: ["Onion and mushroom", "Tomato and mushroom", "Tomato and onion"] },
                { num: 5, text: "Which girl is the boy's sister?", options: ["Girl with blonde hair and glasses", "Girl with dark hair and glasses", "Girl with dark hair and no glasses"] }
            ]
        };

        document.addEventListener('DOMContentLoaded', function () {
            window.listeningCore = new ListeningCore();
            window.listeningCore.initializeTest(ketTest2Part1Data);
            console.log('KET 3 Test 2 Listening Part 1 loaded');
        });
    </script>
</body>

</html>
