<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KET 2 - Test 3 - Listening Part 3</title>
    <link rel="stylesheet" href="listening-pet-common.css" id="styleLink">
</head>

<body>
    <div class="test-wrapper" id="testWrapper">
        <!-- Header -->
        <div class="ielts-header">
            <div class="brand">
                <div class="ielts-logo">KET</div>
                <div class="candidate"></div>
                <div class="audio-controls">
                    <audio id="listeningAudio" controls>
                        <source src="audio/KET 2 - Test 3 Part 3.mp3" type="audio/mpeg">
                    </audio>
                    <select class="speed-select" id="speedSelect">
                        <option value="0.7">0.7x</option>
                        <option value="0.9">0.9x</option>
                        <option value="1.0" selected>1x</option>
                        <option value="1.1">1.1x</option>
                        <option value="1.25">1.25x</option>
                    </select>
                    <span class="volume-icon">🔊</span>
                </div>
            </div>
        </div>

        <!-- Question navigator -->
        <div class="question-nav">
            <div class="nav-buttons" id="navButtons"></div>
        </div>

        <!-- Main area -->
        <div class="main-area" id="mainArea">
            <!-- Transcript panel -->
            <div class="transcript-panel" id="transcriptPanel">
                <div class="panel-header"><span>TRANSCRIPT</span></div>
                <div class="transcript-content font-large" id="transcriptContent"></div>
            </div>
            <div class="resizer" id="resizer"></div>

            <!-- Questions panel -->
            <div class="questions-panel" id="questionsPanel">
                <div class="panel-header">
                    <span>QUESTIONS 11–15</span>
                    <span class="answer-badge" id="answeredCount">0/5 answered</span>
                </div>
                <div class="questions-list font-large centered" id="questionsContent">
                    <div>
                        <h3>PART 3 &nbsp; Questions 11–15</h3>
                        <p><em>For each question, choose the correct answer.</em></p>
                        <p style="margin-bottom:8px;">You will hear Andy talking to his friend Sara about a walk.</p>
                        <div class="notes-box" id="questionsContainer"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Bottom bar -->
        <div class="bottom-bar">
            <button class="btn btn-primary" id="submitBtn">Nộp bài</button>
            <button class="btn btn-success" id="explainBtn" disabled>Xem giải thích</button>
            <button class="btn btn-danger" id="resetBtn">Reset</button>
            <div class="progress" id="progressDisplay">Đã làm: 0/5</div>
        </div>

        <!-- Explanation panel -->
        <div class="explanation-panel" id="explanationPanel">
            <div class="resize-handle" id="explanationResizer"></div>
            <div class="explanation-header">
                <span id="explanationTitle">Giải thích</span>
                <span class="close-btn" id="closeExplanation">✕ Đóng</span>
            </div>
            <div class="explanation-content" id="explanationText"></div>
        </div>
    </div>

    <!-- Context menu -->
    <div class="context-menu" id="contextMenu">
        <div onclick="applyHighlight('yellow')">Highlight vàng</div>
        <div onclick="applyHighlight('green')">Highlight xanh lá</div>
        <div onclick="applyHighlight('pink')">Highlight hồng</div>
        <div onclick="removeHighlight()">Xóa highlight</div>
    </div>

    <script src="core-listening-ket.js"></script>
    <script>
        const ketTest3Part3Data = {
            title: "KET 2 · Test 3 · Listening Part 3",
            type: "multiple-choice",
            part: 3,
            book: 2,
            test: 3,

            answerKey: { q11: 'B', q12: 'A', q13: 'C', q14: 'B', q15: 'C' },
            displayAnswers: { q11: 'B', q12: 'A', q13: 'C', q14: 'B', q15: 'C' },

            detailedExplanations: {
                q11: `<strong>Đáp án: B – at a playground (tại khu vui chơi trẻ em)</strong><br>
                      Sara đề xuất: <em>"Shall we meet at the car park, Andy?"</em><br>
                      Andy đáp: <em>"I'm coming by bus, but I can walk there from the bus stop."</em><br>
                      Sara đề xuất: <em>"Well, <span class='keyword-highlight'>how about the playground</span>? That's halfway between."</em><br>
                      Andy đồng ý: <em>"Sure, thanks."</em><br><br>
                      <strong>✗ A (at a car park) sai:</strong> Đây là đề xuất ban đầu của Sara nhưng Andy đi bằng xe buýt.<br>
                      <strong>✗ C (at a bus stop) sai:</strong> Andy có thể đi bộ từ bến xe buýt nhưng không hẹn gặp ở đó.<br>
                      <strong>✓ B (at a playground) là đúng – nằm giữa đường, cả hai đều đồng ý.</strong>`,

                q12: `<strong>Đáp án: A – sunny (nắng)</strong><br>
                      Sara nói: <em>"I think the weather will be OK – no more rain, but quite windy."</em><br>
                      Andy đáp: <em>"<span class='keyword-highlight'>I've heard it'll be very sunny.</span> And it isn't going to be windy after today."</em><br><br>
                      <strong>✗ B (windy) sai:</strong> Sara nghĩ sẽ có gió nhưng Andy nói hôm đi bộ sẽ không có gió.<br>
                      <strong>✗ C (rainy) sai:</strong> Cả hai đều đồng ý không còn mưa ("no more rain").<br>
                      <strong>✓ A (sunny) là đúng – Andy nghe dự báo sẽ rất nắng.</strong>`,

                q13: `<strong>Đáp án: C – a drink (đồ uống)</strong><br>
                      Andy nói: <em>"Sure, I'll bring that."</em> (bản đồ)<br>
                      Sara nói: <em>"And <span class='keyword-highlight'>I can get some juice for us</span> – not too much, because I don't want to carry a backpack."</em><br><br>
                      <strong>✗ A (a map) sai:</strong> Andy sẽ mang bản đồ, không phải Sara.<br>
                      <strong>✗ B (a backpack) sai:</strong> Sara nói cô không muốn mang balo.<br>
                      <strong>✓ C (a drink) là đúng – Sara sẽ mang nước ép (juice) cho cả hai.</strong>`,

                q14: `<strong>Đáp án: B – Its food is good (đồ ăn ngon)</strong><br>
                      Andy đề xuất: <em>"And shall we have lunch at the Bridge Café?"</em><br>
                      Andy nói thêm: <em>"You have to walk a bit from the path to get to it, but <span class='keyword-highlight'>the dishes are great</span>. But it's quite expensive."</em><br>
                      (dishes are great = đồ ăn ngon)<br><br>
                      <strong>✗ A (The prices are low) sai:</strong> Andy nói quán khá đắt ("quite expensive").<br>
                      <strong>✗ C (It's easy to get to) sai:</strong> Phải đi bộ khá xa từ đường chính ("walk a bit from the path").<br>
                      <strong>✓ B (Its food is good) là đúng – món ăn rất ngon ("dishes are great").</strong>`,

                q15: `<strong>Đáp án: C – happy to spend time with her friend (vui vì dành thời gian với bạn)</strong><br>
                      Sara nói: <em>"I'm sure it'll be an amazing day. Not for the exercise, because it's very flat, without any exciting views. But <span class='keyword-highlight'>it's great you can come</span> – we haven't talked much in the last few weeks."</em><br><br>
                      <strong>✗ A (pleased to get lots of exercise) sai:</strong> Sara nói không phải vì tập thể dục ("Not for the exercise").<br>
                      <strong>✗ B (interested to see the lovely views) sai:</strong> Sara nói không có cảnh đẹp ("without any exciting views").<br>
                      <strong>✓ C (happy to spend time with her friend) là đúng – Sara vui vì Andy có thể đi cùng và họ đã không nói chuyện nhiều trong vài tuần qua.</strong>`
            },

            transcript: `
            <p><strong>PART 3</strong></p>
            <p><em>For each question, choose the correct answer.</em></p>
            <p>You will hear Andy talking to his friend Sara about a walk.</p>

            <p><strong>Man:</strong> Are you ready for our walk on Wednesday, Sara? We're starting at 9?<br>
            <strong>Woman:</strong> Yeah. <span class="highlightable" data-q="11">Shall we meet at the car park, Andy?</span><br>
            <strong>Man:</strong> I'm coming by bus, but I can walk there from the bus stop.<br>
            <strong>Woman:</strong> Well, <span class="highlightable" data-q="11">how about the playground</span>? That's halfway between.<br>
            <strong>Man:</strong> Sure, thanks.<br>
            <strong>Woman:</strong> I think the weather will be OK – no more rain, but quite windy.<br>
            <strong>Man:</strong> <span class="highlightable" data-q="12">I've heard it'll be very sunny.</span> And it isn't going to be windy after today.<br>
            <strong>Woman:</strong> Right. You've got a good map of the area, haven't you?<br>
            <strong>Man:</strong> Sure, I'll bring that.<br>
            <strong>Woman:</strong> And <span class="highlightable" data-q="13">I can get some juice for us</span> – not too much, because I don't want to carry a backpack.<br>
            <strong>Man:</strong> Fine. And shall we have lunch at the Bridge Café? You have to walk a bit from the path to get to it, but <span class="highlightable" data-q="14">the dishes are great</span>. But it's quite expensive.<br>
            <strong>Woman:</strong> OK. <span class="highlightable" data-q="15">I'm sure it'll be an amazing day. Not for the exercise, because it's very flat, without any exciting views. But it's great you can come</span> – we haven't talked much in the last few weeks.<br>
            <strong>Man:</strong> You're right. And I'd like to take some photos of the countryside.</p>

            <p><em>That is the end of Part Three.</em></p>
            `,

            questions: [
                { num: 11, text: "Where do they agree to meet?", options: ["at a car park", "at a playground", "at a bus stop"] },
                { num: 12, text: "What does Andy say the weather will be like for the walk?", options: ["sunny", "windy", "rainy"] },
                { num: 13, text: "What will Sara bring?", options: ["a map", "a backpack", "a drink"] },
                { num: 14, text: "What does Andy think about the Bridge Café?", options: ["The prices are low.", "Its food is good.", "It's easy to get to."] },
                { num: 15, text: "How does Sara feel about going on the walk?", options: ["pleased to get lots of exercise", "interested to see the lovely views", "happy to spend time with her friend"] }
            ]
        };

        document.addEventListener('DOMContentLoaded', function () {
            window.listeningCore = new ListeningCore();
            window.listeningCore.initializeTest(ketTest3Part3Data);
            console.log('KET 2 Test 3 Listening Part 3 loaded');
        });
    </script>
</body>

</html>
