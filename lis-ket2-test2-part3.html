<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KET 2 - Test 1 - Listening Part 3</title>
    <link rel="stylesheet" href="listening-pet-common.css" id="styleLink">
</head>

<body>
    <div class="test-wrapper" id="testWrapper">
        <!-- Header -->
        <div class="ielts-header">
            <div class="brand">
                <div class="ielts-logo">KET</div>
                <div class="candidate"></div>
                <div class="audio-controls">
                    <audio id="listeningAudio" controls>
                        <source src="audio/KET 2 - Test 1 Part 3.mp3" type="audio/mpeg">
                    </audio>
                    <select class="speed-select" id="speedSelect">
                        <option value="0.7">0.7x</option>
                        <option value="0.9">0.9x</option>
                        <option value="1.0" selected>1x</option>
                        <option value="1.1">1.1x</option>
                        <option value="1.25">1.25x</option>
                    </select>
                    <span class="volume-icon">🔊</span>
                </div>
            </div>
        </div>

        <!-- Question navigator -->
        <div class="question-nav">
            <div class="nav-buttons" id="navButtons"></div>
        </div>

        <!-- Main area -->
        <div class="main-area" id="mainArea">
            <!-- Transcript panel -->
            <div class="transcript-panel" id="transcriptPanel">
                <div class="panel-header"><span>TRANSCRIPT</span></div>
                <div class="transcript-content font-large" id="transcriptContent"></div>
            </div>
            <div class="resizer" id="resizer"></div>

            <!-- Questions panel -->
            <div class="questions-panel" id="questionsPanel">
                <div class="panel-header">
                    <span>QUESTIONS 11–15</span>
                    <span class="answer-badge" id="answeredCount">0/5 answered</span>
                </div>
                <div class="questions-list font-large centered" id="questionsContent">
                    <div>
                        <h3>PART 3 &nbsp; Questions 11–15</h3>
                        <p><em>For each question, choose the correct answer.</em></p>
                        <p style="margin-bottom:8px;">You will hear Sue talking to her friend Peter about a restaurant she went to.</p>
                        <div class="notes-box" id="questionsContainer"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Bottom bar -->
        <div class="bottom-bar">
            <button class="btn btn-primary" id="submitBtn">Nộp bài</button>
            <button class="btn btn-success" id="explainBtn" disabled>Xem giải thích</button>
            <button class="btn btn-danger" id="resetBtn">Reset</button>
            <div class="progress" id="progressDisplay">Đã làm: 0/5</div>
        </div>

        <!-- Explanation panel -->
        <div class="explanation-panel" id="explanationPanel">
            <div class="resize-handle" id="explanationResizer"></div>
            <div class="explanation-header">
                <span id="explanationTitle">Giải thích</span>
                <span class="close-btn" id="closeExplanation">✕ Đóng</span>
            </div>
            <div class="explanation-content" id="explanationText"></div>
        </div>
    </div>

    <!-- Context menu -->
    <div class="context-menu" id="contextMenu">
        <div onclick="applyHighlight('yellow')">Highlight vàng</div>
        <div onclick="applyHighlight('green')">Highlight xanh lá</div>
        <div onclick="applyHighlight('pink')">Highlight hồng</div>
        <div onclick="removeHighlight()">Xóa highlight</div>
    </div>

    <script src="core-listening-ket.js"></script>
    <script>
        const ketTest2Part3Data = {
            title: "KET 2 · Test 2 · Listening Part 3",
            type: "multiple-choice",
            part: 3,
            book: 2,
            test: 2,

            answerKey: { q11: 'C', q12: 'A', q13: 'B', q14: 'C', q15: 'A' },
            displayAnswers: { q11: 'C', q12: 'A', q13: 'B', q14: 'C', q15: 'A' },

            detailedExplanations: {
                q11: `<strong>Đáp án: C – tomorrow evening (tối mai)</strong><br>
                      Lily nói: <em>"Hi, Ben. Don't forget it's Mum's birthday next week. Let's buy her present tomorrow. Are you free after breakfast?"</em><br>
                      Ben đáp: <em>"I've got football practice, Lily. And you've got a swimming lesson at three o'clock."</em><br>
                      Lily đề xuất: <em>"The shops are open until nine. <span class='keyword-highlight'>Shall we go about seven o'clock?</span> I can meet you in town."</em><br>
                      Ben đồng ý: <em>"Perfect!"</em><br><br>
                      <strong>✗ A (tomorrow morning) sai:</strong> Ben có luyện tập bóng đá ("I've got football practice").<br>
                      <strong>✗ B (tomorrow afternoon) sai:</strong> Lily có tiết bơi lúc 3 giờ ("swimming lesson at three o'clock").<br>
                      <strong>✓ C (tomorrow evening) là đúng – họ hẹn đi lúc 7 giờ tối ("about seven o'clock").</strong>`,

                q12: `<strong>Đáp án: A – a department store (cửa hàng bách hóa)</strong><br>
                      Lily nói: <em>"Let's get some earrings. There's a good jewellery shop in town."</em><br>
                      Ben đáp: <em>"Hmm. It's expensive… Can we look in <span class='keyword-highlight'>the department store</span>?"</em><br>
                      Lily đồng ý: <em>"OK! There are some nice things there."</em><br>
                      Về chợ: <em>"They sell jewellery on the market too, but they're old things."</em><br><br>
                      <strong>✗ B (the market) sai:</strong> Đồ trang sức ở chợ là đồ cũ ("old things").<br>
                      <strong>✗ C (a jewellery shop) sai:</strong> Ben nói đắt và muốn đi cửa hàng bách hóa thay thế.<br>
                      <strong>✓ A (a department store) là đúng – Ben đề xuất và Lily đồng ý.</strong>`,

                q13: `<strong>Đáp án: B – take her out for a meal (đưa mẹ đi ăn ngoài)</strong><br>
                      Ben hỏi: <em>"Are we going to have a party for Mum? I know! How about taking her out for lunch?"</em><br>
                      Lily đề xuất: <em>"Or have a barbecue in the park?"</em><br>
                      Ben phản đối: <em>"It might rain. <span class='keyword-highlight'>Let's go to a restaurant.</span>"</em><br>
                      Lily đồng ý: <em>"OK."</em><br><br>
                      <strong>✗ A (have a party) sai:</strong> Ben hỏi nhưng không chọn phương án này.<br>
                      <strong>✗ C (go to the park for a barbecue) sai:</strong> Ben lo trời mưa ("It might rain") nên không chọn.<br>
                      <strong>✓ B (take her out for a meal) là đúng – họ quyết định đi nhà hàng ("go to a restaurant").</strong>`,

                q14: `<strong>Đáp án: C – sure their mum will like the idea (chắc chắn mẹ sẽ thích ý này)</strong><br>
                      Ben hỏi: <em>"Shall we invite Mum's best friend?"</em><br>
                      Lily trả lời: <em>"I haven't seen her for a long time, but I think she'll come. <span class='keyword-highlight'>Mum'll be excited!</span>"</em><br><br>
                      <strong>✗ A (excited about seeing her) sai:</strong> Đây là cảm xúc của mẹ (Mum'll be excited), không phải của Lily.<br>
                      <strong>✗ B (worried she will not come) sai:</strong> Lily nghĩ bạn của mẹ sẽ đến ("I think she'll come").<br>
                      <strong>✓ C (sure their mum will like the idea) là đúng – Lily nói mẹ sẽ rất vui ("Mum'll be excited").</strong>`,

                q15: `<strong>Đáp án: A – banana and cream (chuối và kem)</strong><br>
                      Lily hỏi: <em>"Will you make your special drink for Mum?"</em><br>
                      Ben đề cập đồ uống cũ: <em>"The lemon and orange one?"</em><br>
                      Lily hỏi về đồ uống khác: <em>"Oh, the melon and honey drink?"</em><br>
                      Ben nói: <em>"No, <span class='keyword-highlight'>banana and cream</span>."</em><br>
                      Lily khen: <em>"Fantastic!"</em><br><br>
                      <strong>✗ B (lemon and orange) sai:</strong> Đây là đồ uống trước đây ("The lemon and orange one?").<br>
                      <strong>✗ C (melon and honey) sai:</strong> Lily đoán nhưng Ben phủ nhận ("No").<br>
                      <strong>✓ A (banana and cream) là đúng – đây là loại đồ uống Ben sẽ làm.</strong>`
            },

            transcript: `
            <p><strong>PART 3</strong></p>
            <p><em>For each question, choose the correct answer.</em></p>
            <p>You will hear a brother and sister, Ben and Lily, talking about their mother's birthday.</p>

            <p><strong>Lily:</strong> Hi, Ben. Don't forget it's Mum's birthday next week. Let's buy her present tomorrow. Are you free after breakfast?<br>
            <strong>Ben:</strong> I've got football practice, Lily. And you've got a swimming lesson at three o'clock.<br>
            <strong>Lily:</strong> The shops are open until nine. <span class="highlightable" data-q="11">Shall we go about seven o'clock?</span> I can meet you in town.<br>
            <strong>Ben:</strong> Perfect!<br>
            <strong>Lily:</strong> Let's get some earrings. There's a good jewellery shop in town.<br>
            <strong>Ben:</strong> Hmm. It's expensive… Can we look in <span class="highlightable" data-q="12">the department store</span>?<br>
            <strong>Lily:</strong> OK! There are some nice things there. They sell jewellery on the market too, but they're old things.<br>
            <strong>Ben:</strong> Yes… Are we going to have a party for Mum? I know! How about taking her out for lunch?<br>
            <strong>Lily:</strong> Or have a barbecue in the park?<br>
            <strong>Ben:</strong> It might rain. <span class="highlightable" data-q="13">Let's go to a restaurant.</span><br>
            <strong>Lily:</strong> OK.<br>
            <strong>Ben:</strong> Shall we invite Mum's best friend?<br>
            <strong>Lily:</strong> I haven't seen her for a long time, but I think she'll come. <span class="highlightable" data-q="14">Mum'll be excited!</span><br>
            <strong>Ben:</strong> Great!<br>
            <strong>Lily:</strong> Will you make your special drink for Mum?<br>
            <strong>Ben:</strong> The lemon and orange one? Actually, I'm making something better!<br>
            <strong>Lily:</strong> Oh, the melon and honey drink?<br>
            <strong>Ben:</strong> <span class="highlightable" data-q="15">No, banana and cream.</span><br>
            <strong>Lily:</strong> Fantastic!</p>

            <p><em>That is the end of Part Three.</em></p>
            `,

            questions: [
                { num: 11, text: "When will they go shopping for a present?", options: ["tomorrow morning", "tomorrow afternoon", "tomorrow evening"] },
                { num: 12, text: "Where do they decide to go for some earrings?", options: ["a department store", "the market", "a jewellery shop"] },
                { num: 13, text: "Ben thinks that on their mum's birthday they should", options: ["have a party for her.", "take her out for a meal.", "go to the park for a barbecue."] },
                { num: 14, text: "How does Lily feel about inviting their mum's best friend?", options: ["excited about seeing her", "worried she will not come", "sure their mum will like the idea"] },
                { num: 15, text: "What sort of drink will Ben make for their mum's birthday?", options: ["banana and cream", "lemon and orange", "melon and honey"] }
            ]
        };

        document.addEventListener('DOMContentLoaded', function () {
            window.listeningCore = new ListeningCore();
            window.listeningCore.initializeTest(ketTest2Part3Data);
            console.log('KET 2 Test 2 Listening Part 3 loaded');
        });
    </script>
</body>

</html>
