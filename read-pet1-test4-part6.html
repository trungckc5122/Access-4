<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>PET 1 - Test 4 - Reading Part 6</title>
    <link rel="stylesheet" href="reading-pet-common.css" id="styleLink">
</head>
<body>
<div class="test-wrapper" id="testWrapper">
    <div class="ielts-header">
        <div class="brand"><div class="ielts-logo">PET</div><div class="candidate"></div></div>
    </div>

    <div class="question-nav">
        <div class="nav-buttons" id="navButtons"></div>
        <span id="answeredCount" style="font-size:13px; color:#555; margin-left:10px;">0/6 answered</span>
    </div>

    <div class="main-area split-layout" id="mainArea"></div>

    <div class="bottom-bar">
        <button class="btn btn-primary" id="submitBtn">Nộp bài</button>
        <button class="btn btn-success" id="explainBtn" disabled>Xem giải thích</button>
        <button class="btn btn-danger" id="resetBtn">Reset tất cả</button>
        <div class="progress" id="progressDisplay">Đã làm: 0/6</div>
    </div>

    <div class="context-menu" id="contextMenu">
        <div onclick="applyHighlight('yellow')">Highlight vàng</div>
        <div onclick="applyHighlight('green')">Highlight xanh lá</div>
        <div onclick="applyHighlight('pink')">Highlight hồng</div>
        <div onclick="removeHighlight()">Xóa highlight</div>
    </div>
</div>

<script src="core-reading.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const testData = {
            type: 'split-layout',
            part: 6,
            answerKey: { q27: "since", q28: "me", q29: "for", q30: "same", q31: "one", q32: "than" },
            displayAnswers: { q27: "since", q28: "me", q29: "for", q30: "same", q31: "one / some", q32: "than" },
            detailedExplanations: {
                27: `<div><strong>Cấu trúc cố định:</strong> <em>"ever since"</em> (từ khi...).<br>
                Câu đầy đủ: <em>"it's something I've wanted to do ever since I was young"</em>.<br>
                Dịch: Đó là điều tôi đã muốn làm từ khi còn nhỏ.</div>`,
                28: `<div>Đại từ nhân xưng <strong>"me"</strong> (tôi) – dạng tân cách.<br>
                Cấu trúc: <em>"encouraged me to start lessons"</em> = khuyến khích tôi bắt đầu học.<br>
                "Encourage" là động từ cần tân ngữ trực tiếp.<br>
                Dịch: Điều đó đã khuyến khích tôi bắt đầu học.</div>`,
                29: `<div>Giới từ <strong>"for"</strong> = để (chỉ mục đích).<br>
                Cấu trúc: <em>"go to her house twice a week for lessons"</em> = đến nhà cô ấy hai lần một tuần để học.<br>
                "For" chỉ mục đích của việc đến.<br>
                Dịch: Tôi đến nhà cô ấy hai lần một tuần để học.</div>`,
                30: `<div>Tính từ <strong>"same"</strong> (cùng/giống nhau).<br>
                Cấu trúc: <em>"at the same time"</em> = cùng một lúc/đồng thời.<br>
                Dịch: Quyết định phím piano nào cần dùng cùng một lúc!</div>`,
                31: `<div>Lượng từ <strong>"one"</strong> hoặc <strong>"some"</strong>.<br>
                Cấu trúc: <em>"Maybe one/some day"</em> = Có lẽ một ngày nào đó.<br>
                Diễn tả một thời điểm không xác định trong tương lai.<br>
                Dịch: Có lẽ một ngày nào đó, tôi sẽ trở nên giỏi hơn.</div>`,
                32: `<div>Liên từ so sánh <strong>"than"</strong> (hơn).<br>
                Cấu trúc so sánh hơn: <em>"better than you are"</em> = giỏi hơn bạn.<br>
                Dùng "than" sau tính từ so sánh (better).<br>
                Dịch: Tôi sẽ trở nên giỏi hơn bạn trong việc chơi piano!</div>`
            },
            template: `
                <div class="reading-card" id="passageCard">
                    <div class="review-title">From: Harry To: Oliver Subject: Piano lessons</div>
                    <p>Hi Oliver,</p>
                    <p>Guess what? I've finally started piano lessons, like you! As you know, it's something I've wanted to do ever
                        <span class="input-wrapper">
                            <input type="text" id="q27" class="gap-input" data-q="27" autocomplete="off">
                            <span class="eye-icon" data-question="27">👁️</span>
                        </span>
                        I was young. Anyway, a couple of months ago I saw someone playing the piano on TV – he was brilliant. And when I found out he'd only started playing quite recently, that encouraged
                        <span class="input-wrapper">
                            <input type="text" id="q28" class="gap-input" data-q="28" autocomplete="off">
                            <span class="eye-icon" data-question="28">👁️</span>
                        </span>
                        to start lessons.
                    </p>
                    <p>I've got a really good teacher, and I go to her house twice a week
                        <span class="input-wrapper">
                            <input type="text" id="q29" class="gap-input" data-q="29" autocomplete="off">
                            <span class="eye-icon" data-question="29">👁️</span>
                        </span>
                        lessons. She's very patient. Every time I make a mistake, she explains what I did wrong. Also, I couldn't read music when I started. It's been hard to learn to read the notes on the page and decide which piano keys to use at the
                        <span class="input-wrapper">
                            <input type="text" id="q30" class="gap-input" data-q="30" autocomplete="off">
                            <span class="eye-icon" data-question="30">👁️</span>
                        </span>
                        time! But when I finally play something that other people recognise, it really makes me happy. Maybe
                        <span class="input-wrapper">
                            <input type="text" id="q31" class="gap-input" data-q="31" autocomplete="off">
                            <span class="eye-icon" data-question="31">👁️</span>
                        </span>
                        day, I'll become even better
                        <span class="input-wrapper">
                            <input type="text" id="q32" class="gap-input" data-q="32" autocomplete="off">
                            <span class="eye-icon" data-question="32">👁️</span>
                        </span>
                        you are at playing the piano!
                    </p>
                </div>
            `,
            questions: [
                { num: 27 }, { num: 28 }, { num: 29 }, { num: 30 }, { num: 31 }, { num: 32 }
            ]
        };

        window.readingCore = new ReadingCore();
        window.readingCore.initializeTest(testData);
    });
</script>
</body>
</html>
