<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PET 1 - Test 3 - Part 1</title>
    <link rel="stylesheet" href="listening-pet-common.css">
</head>
<body>
<div class="test-wrapper" id="testWrapper">
    <!-- Header -->
    <div class="ielts-header">
        <div class="brand">
            <div class="ielts-logo">PET</div>
            <div class="candidate">B1 Preliminary 1 · Test 3 · Part 1</div>
            <div class="audio-controls">
                <audio id="listeningAudio" controls>
                    <source src="B1_Preliminary_1_Test3_Part1.mp3" type="audio/mpeg">
                    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg">
                </audio>
                <select class="speed-select" id="speedSelect">
                    <option value="0.7">0.7x</option>
                    <option value="0.9">0.9x</option>
                    <option value="1.0" selected>1x</option>
                    <option value="1.1">1.1x</option>
                    <option value="1.25">1.25x</option>
                </select>
                <span class="volume-icon">🔊</span>
            </div>
        </div>
        <div class="font-controls">
            <button class="font-btn" id="fontSmall">A-</button>
            <button class="font-btn" id="fontMedium">A</button>
            <button class="font-btn active" id="fontLarge">A+</button>
        </div>
    </div>

    <div class="question-nav">
        <span style="font-weight:600; color:#1e3a5f;">Câu 1-7:</span>
        <div class="nav-buttons" id="navButtons"></div>
    </div>

    <div class="main-area" id="mainArea">
        <div class="transcript-panel" id="transcriptPanel">
            <div class="panel-header"><span>TRANSCRIPT</span></div>
            <div class="transcript-content font-large" id="transcriptContent"></div>
        </div>
        <div class="resizer" id="resizer"></div>
        <div class="questions-panel" id="questionsPanel">
            <div class="panel-header">
                <span>QUESTIONS 1-7</span>
                <span class="answer-badge" id="answeredCount">0/7 answered</span>
            </div>
            <div class="questions-list font-large centered" id="questionsContent">
                <div>
                    <h3>PART 1 Questions 1-7</h3>
                    <p><em>Choose the correct answer (A, B or C).</em></p>
                    <div class="notes-box" id="questionsContainer"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="bottom-bar">
        <button class="btn btn-primary" id="submitBtn">Nộp bài</button>
        <button class="btn btn-success" id="explainBtn" disabled>Xem giải thích</button>
        <button class="btn btn-danger" id="resetBtn">Reset tất cả</button>
        <div class="progress" id="progressDisplay">Đã làm: 0/7</div>
    </div>

    <div class="explanation-panel" id="explanationPanel">
        <div class="resize-handle" id="explanationResizer"></div>
        <div class="explanation-header">
            <span id="explanationTitle">Giải thích</span>
            <span class="close-btn" id="closeExplanation">✕ Đóng</span>
        </div>
        <div class="explanation-content" id="explanationText"></div>
    </div>
</div>

<div class="context-menu" id="contextMenu">
    <div onclick="applyHighlight('yellow')">Highlight vàng</div>
    <div onclick="applyHighlight('green')">Highlight xanh lá</div>
    <div onclick="applyHighlight('pink')">Highlight hồng</div>
    <div onclick="removeHighlight()">Xóa highlight</div>
</div>

<script>
    (function() {
        // ==================== TEST 3 - PART 1 ANSWER KEY ====================
        const answerKey = { q1: 'B', q2: 'C', q3: 'B', q4: 'B', q5: 'A', q6: 'C', q7: 'A' };
        const displayAnswers = { q1: 'B', q2: 'C', q3: 'B', q4: 'B', q5: 'A', q6: 'C', q7: 'A' };

        // ==================== GIẢI THÍCH CHI TIẾT (giống style Part 2 + Part 4) ====================
        const detailedExplanations = {
            q1: `<strong>Đáp án: B</strong><br>
                  Trong đoạn hội thoại, người đàn ông giải thích lý do đến muộn. Anh ấy nói: <em>"The traffic lights at the junction weren't working properly, so it took ages."</em> Điều này khẳng định đèn giao thông không hoạt động là nguyên nhân chính.
                  <br><br>
                  <strong>✗ A (The bus broke down) không đúng:</strong> Xe của anh ấy bị hỏng tối hôm trước, nhưng sáng hôm sau anh ấy đi xe buýt. Xe buýt không bị hỏng, chỉ bị chậm vì đèn giao thông.
                  <br>
                  <strong>✗ C (The rain made the journey difficult) không đúng:</strong> Người phụ nữ có hỏi "I thought maybe the heavy rain made it difficult" nhưng người đàn ông trả lời: "No, that wasn't it." Anh ấy phủ nhận thời tiết là vấn đề.
                  <br>
                  <strong>✓ B (The traffic lights weren't working) là câu trả lời chính xác.</strong>`,
                  
            q2: `<strong>Đáp án: C</strong><br>
                  Người dẫn chương trình phát thanh đưa tin giao thông: <em>"The main road through town is closed today."</em> Sau đó loại trừ các khả năng khác và khẳng định: <em>"But today the reason is they're filming a movie."</em>
                  <br><br>
                  <strong>✗ A (A cycle race) không đúng:</strong> Cuộc đua xe đạp diễn ra vào cuối tuần ("at the weekend"), không phải hôm nay.
                  <br>
                  <strong>✗ B (A street party) không đúng:</strong> Bữa tiệc đường phố diễn ra vào cuối tuần sau ("next weekend").
                  <br>
                  <strong>✓ C (Making a movie) là lý do chính xác cho việc đóng đường hôm nay.</strong>`,
                  
            q3: `<strong>Đáp án: B</strong><br>
                  Hai người đang bàn về bữa tiệc kỷ niệm 50 năm ngày cưới của ông bà. Người đàn ông đề xuất nhà hàng mới, nhưng người phụ nữ cho rằng xa. Sau đó anh ấy gợi ý: <em>"We could always take them on a river cruise, and eat on board."</em> Người phụ nữ đáp: <em>"That's not a bad idea ... I'll make the arrangements."</em>
                  <br><br>
                  <strong>✗ A (A smart new restaurant) không đúng:</strong> Được đề cập nhưng bị từ chối vì ở xa.
                  <br>
                  <strong>✗ C (A garden party) không đúng:</strong> Được nhắc đến như một hoạt động của năm trước ("like we did last year"), không phải kế hoạch năm nay.
                  <br>
                  <strong>✓ B (A river cruise) là nơi họ quyết định tổ chức.</strong>`,
                  
            q4: `<strong>Đáp án: B</strong><br>
                  Trong nhà hàng, người phụ nữ nói cô ấy đã ăn gà và khoai tây chiên lần trước, nhưng hôm nay định gọi pasta. Cô ấy cũng khen pizza: <em>"I had the pizza last time I came here – it was delicious. I can really recommend it."</em> Người đàn ông đáp: <em>"If it's as good as you say, I'll try it."</em> Anh ấy quyết định gọi pizza.
                  <br><br>
                  <strong>✗ A (Chicken and chips) không đúng:</strong> Đó là món người phụ nữ đã ăn lần trước, không phải món người đàn ông chọn.
                  <br>
                  <strong>✗ C (Pasta) không đúng:</strong> Người phụ nữ đang cân nhắc pasta, nhưng người đàn ông chọn pizza sau khi nghe lời khuyên.
                  <br>
                  <strong>✓ B (Pizza) là món người đàn ông quyết định gọi.</strong>`,
                  
            q5: `<strong>Đáp án: A</strong><br>
                  Trong cửa hàng đồ gỗ, người phụ nữ gợi ý: <em>"If I were you, I'd get this plain one. It's a nice size; not too big, not too small."</em> Người đàn ông đồng ý và nói: <em>"Yes, I'll go for the one you suggested."</em> Anh ấy chọn ghế bọc vải trơn.
                  <br><br>
                  <strong>✗ B (A striped armchair) không đúng:</strong> Người đàn ông thích họa tiết sọc nhưng nói "but I'm looking for one that will match the rest of my furniture" – không phù hợp.
                  <br>
                  <strong>✗ C (An armchair with a cushion) không đúng:</strong> Anh ấy thích chiếc ghế có đệm nhưng nói "it's too large for the space I have available".
                  <br>
                  <strong>✓ A (A plain armchair) là lựa chọn cuối cùng.</strong>`,
                  
            q6: `<strong>Đáp án: C</strong><br>
                  Người phụ nữ nói về các buổi hòa nhạc trong lễ hội âm nhạc: <em>"You know Billy Ryan the folk singer and guitar player? Well, I've got tickets for that."</em> Cô ấy đã mua vé cho nghệ sĩ dân ca.
                  <br><br>
                  <strong>✗ A (A rock band) không đúng:</strong> Cô ấy hỏi "Aren't you going to see the rock band Buzz?" và nói "I saw them recently" – cô ấy đã xem họ trước đây, không phải lần này.
                  <br>
                  <strong>✗ B (A jazz band) không đúng:</strong> Người đàn ông đề xuất jazz band, nhưng cô ấy từ chối: "I'd rather get tickets for something else instead."
                  <br>
                  <strong>✓ C (A folk singer) – Billy Ryan – là buổi hòa nhạc cô ấy đã sắp xếp.</strong>`,
                  
            q7: `<strong>Đáp án: A</strong><br>
                  Hai người đang nấu nước sốt cà chua. Người phụ nữ khuyên: <em>"Why don't you leave the tomatoes whole?"</em> Người đàn ông thoạt đầu muốn cắt lát hoặc dùng đồ hộp, nhưng cuối cùng nói: <em>"OK I'll follow your advice."</em> Anh ấy làm theo lời khuyên – để nguyên quả.
                  <br><br>
                  <strong>✗ B (Tinned tomatoes) không đúng:</strong> Anh ấy có đề cập "I could just open a tin", nhưng người phụ nữ nói "That's cheating!" và anh ấy từ bỏ ý định đó.
                  <br>
                  <strong>✗ C (Sliced tomatoes) không đúng:</strong> "The recipe says to cut them into slices" nhưng anh ấy chọn làm theo lời khuyên thay vì công thức.
                  <br>
                  <strong>✓ A (Whole tomatoes) là đáp án đúng.</strong>`
        };

        // ==================== TRANSCRIPT VỚI HIGHLIGHT ====================
        const transcriptHTML = `
            <p><strong>Question 1</strong><br>
            <strong>Woman:</strong> So why were you late for the meeting?<br>
            <strong>Man:</strong> Sorry about that. My car broke down last night, so I had to take the bus this morning. I thought it would be fine, but there were long delays. <span class="highlightable" data-q="1">The traffic lights at the junction weren't working properly, so it took ages.</span><br>
            <strong>Woman:</strong> Oh, I thought maybe the heavy rain made it difficult.<br>
            <strong>Man:</strong> No, that wasn't it. Just those traffic lights.</p>

            <p><strong>Question 2</strong><br>
            <strong>Radio presenter:</strong> And now traffic news for drivers. The main road through town is closed today. I know there's a cycle race at the weekend, but that's not today. There's a street party next weekend, and the road will be closed then. But <span class="highlightable" data-q="2">today the reason is they're filming a movie.</span> So please avoid the area and use alternative routes.</p>

            <p><strong>Question 3</strong><br>
            <strong>Man:</strong> Is there a plan yet for our grandparents’ wedding anniversary party?<br>
            <strong>Woman:</strong> No, and it’s their 50th anniversary so it has to be special.<br>
            <strong>Man:</strong> I thought about that smart new restaurant in town. It’d be perfect.<br>
            <strong>Woman:</strong> It’s a bit far away, though.<br>
            <strong>Man:</strong> True. <span class="highlightable" data-q="3">We could always take them on a river cruise, and eat on board.</span><br>
            <strong>Woman:</strong> That’s not a bad idea ... I’ll make the arrangements. It’d be better than having a garden party and inviting their friends over like we did last year.<br>
            <strong>Man:</strong> I’ll leave it all to you then.</p>

            <p><strong>Question 4</strong><br>
            <strong>Man:</strong> Shall we have a look at the menu? What did you have last time?<br>
            <strong>Woman:</strong> I had chicken and chips, but I think I’ll have something different today. I was thinking about the pasta. What about you?<br>
            <strong>Woman:</strong> I fancy that too. I had the pizza last time I came here – it was delicious. I can really recommend it.<br>
            <strong>Man:</strong> Oh! <span class="highlightable" data-q="4">If it’s as good as you say, I’ll try it.</span> I think I’d prefer that today actually. Are you ready to order?<br>
            <strong>Woman:</strong> Yes, I know what I want. OK then. Let’s order.</p>

            <p><strong>Question 5</strong><br>
            <strong>Man:</strong> What do you think of this armchair here?<br>
            <strong>Woman:</strong> It looks really comfortable and I like the stripes, but I’m looking for one that will match the rest of my furniture.<br>
            <strong>Woman:</strong> If I were you, I’d get this plain one. It’s a nice size; not too big, not too small.<br>
            <strong>Man:</strong> That’s true. I like the look of the one over there, with the cushion, but it’s too large for the space I have available.<br>
            <strong>Woman:</strong> So have you decided?<br>
            <strong>Man:</strong> Yes, <span class="highlightable" data-q="5">I’ll go for the one you suggested.</span></p>

            <p><strong>Question 6</strong><br>
            <strong>Man:</strong> Are you planning to go to any of the concerts at the music festival next month?<br>
            <strong>Woman:</strong> Yeah, there’s lots of good things on. You know Billy Ryan the folk singer and guitar player? Well, <span class="highlightable" data-q="6">I’ve got tickets for that.</span> Aren’t you going to see the rock band Buzz?<br>
            <strong>Man:</strong> That’s right.<br>
            <strong>Woman:</strong> I saw them recently – they’re pretty good actually! Do you fancy seeing something together?<br>
            <strong>Man:</strong> There’s a jazz band playing on the last day too. We could try that.<br>
            <strong>Woman:</strong> I’d rather get tickets for something else instead. I’ll see what’s available.</p>

            <p><strong>Question 7</strong><br>
            <strong>Man:</strong> I'll start making the tomato sauce now. Can you pass me that knife?<br>
            <strong>Woman:</strong> Why don't you leave the tomatoes whole?<br>
            <strong>Man:</strong> The recipe says to cut them into slices. Suppose these ones are small enough to use as they are though.<br>
            <strong>Woman:</strong> The sauce'll taste nicer like that. Just cook them for a long time.<br>
            <strong>Man:</strong> I could just open a tin, you know. It'd be far easier.<br>
            <strong>Woman:</strong> That's cheating! You said you wanted to do this properly.<br>
            <strong>Man:</strong> <span class="highlightable" data-q="7">OK I'll follow your advice.</span><br>
            <em>Now listen again.</em><br>
            That is the end of Part One.</p>
        `;

        // ==================== DỮ LIỆU CÂU HỎI ====================
        const questionsData = [
            { num: 1, text: "Why was the man late?", options: ["The bus broke down.", "The traffic lights weren't working.", "The rain made the journey difficult."] },
            { num: 2, text: "Why is the main road closed today?", options: ["A cycle race.", "A street party.", "Making a movie."] },
            { num: 3, text: "Where do they decide to have the wedding anniversary party?", options: ["A smart new restaurant.", "A river cruise.", "A garden party."] },
            { num: 4, text: "What does the man decide to order?", options: ["Chicken and chips.", "Pizza.", "Pasta."] },
            { num: 5, text: "Which armchair is the man going to buy?", options: ["A plain armchair.", "A striped armchair.", "An armchair with a cushion."] },
            { num: 6, text: "Which concert has the woman arranged to attend?", options: ["A rock band.", "A jazz band.", "A folk singer."] },
            { num: 7, text: "Which tomatoes will the man use?", options: ["Whole tomatoes.", "Tinned tomatoes.", "Sliced tomatoes."] }
        ];

        // ---------- STATE ----------
        let examSubmitted = false;
        let explanationMode = false;
        const audio = document.getElementById('listeningAudio');
        const speedSelect = document.getElementById('speedSelect');
        speedSelect.addEventListener('change', function() { audio.playbackRate = parseFloat(this.value); });

        function getUserAnswer(q) {
            const radios = document.getElementsByName(`q${q}`);
            for (let radio of radios) if (radio.checked) return radio.value;
            return null;
        }
        function isAnswerCorrect(q, userAnswer) { return userAnswer === answerKey[`q${q}`]; }
        function updateAnswerCount() {
            let answered = 0;
            for (let i = 1; i <= 7; i++) if (getUserAnswer(i)) answered++;
            document.getElementById('answeredCount').textContent = `${answered}/7 answered`;
            document.getElementById('progressDisplay').textContent = `Đã làm: ${answered}/7`;
            for (let i = 1; i <= 7; i++) {
                const btn = document.querySelector(`.nav-btn[data-question="${i}"]`);
                if (btn) {
                    btn.classList.remove('answered', 'unanswered');
                    btn.classList.add(getUserAnswer(i) ? 'answered' : 'unanswered');
                }
            }
        }

        function createNavButtons() {
            const nav = document.getElementById('navButtons');
            nav.innerHTML = '';
            for (let i = 1; i <= 7; i++) {
                const btn = document.createElement('button');
                btn.className = 'nav-btn unanswered';
                btn.textContent = i;
                btn.dataset.question = i;
                btn.addEventListener('click', function() {
                    document.getElementById(`question-${i}`)?.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                });
                nav.appendChild(btn);
            }
        }

        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            questionsData.forEach(q => {
                const div = document.createElement('div');
                div.className = 'question-item';
                div.id = `question-${q.num}`;
                div.innerHTML = `
                    <div class="question-text">${q.num}. ${q.text}</div>
                    <div class="options">
                        ${q.options.map((opt, index) => `
                            <div class="option">
                                <input type="radio" name="q${q.num}" value="${String.fromCharCode(65 + index)}" id="q${q.num}${String.fromCharCode(65 + index)}">
                                <label for="q${q.num}${String.fromCharCode(65 + index)}">${String.fromCharCode(65 + index)}. ${opt}</label>
                            </div>
                        `).join('')}
                    </div>
                    <span class="eye-icon" data-question="${q.num}">👁️</span>
                `;
                container.appendChild(div);
            });
            document.querySelectorAll('input[type="radio"]').forEach(radio => radio.addEventListener('change', updateAnswerCount));
        }

        function markAnswers() {
            for (let i = 1; i <= 7; i++) {
                const questionDiv = document.getElementById(`question-${i}`);
                if (!questionDiv) continue;
                const user = getUserAnswer(i);
                const correct = isAnswerCorrect(i, user);
                questionDiv.classList.remove('correct', 'incorrect');
                const oldBadge = questionDiv.querySelector('.correct-answer-badge');
                if (oldBadge) oldBadge.remove();
                if (correct) questionDiv.classList.add('correct');
                else {
                    questionDiv.classList.add('incorrect');
                    const badge = document.createElement('span');
                    badge.className = 'correct-answer-badge';
                    badge.textContent = `Đáp án đúng: ${displayAnswers[`q${i}`]}`;
                    questionDiv.appendChild(badge);
                }
            }
        }

        function showExplanation(questionNum) {
            if (!explanationMode && !examSubmitted) return;
            document.querySelectorAll('.transcript-highlight').forEach(el => el.classList.remove('transcript-highlight'));
            document.querySelectorAll('.keyword-highlight').forEach(el => el.classList.remove('keyword-highlight'));
            const highlightSpans = document.querySelectorAll(`.highlightable[data-q="${questionNum}"]`);
            highlightSpans.forEach(span => {
                const parentP = span.closest('p');
                if (parentP) parentP.classList.add('transcript-highlight');
                span.classList.add('keyword-highlight');
                span.scrollIntoView({ behavior: 'smooth', block: 'center' });
                span.classList.add('scroll-highlight');
                setTimeout(() => span.classList.remove('scroll-highlight'), 1000);
            });
            document.getElementById('explanationPanel').classList.add('show');
            document.getElementById('explanationTitle').textContent = `Giải thích câu ${questionNum}`;
            let html = detailedExplanations[`q${questionNum}`] || `<strong>Đáp án: ${displayAnswers[`q${questionNum}`]}</strong><br>`;
            if (examSubmitted) {
                const user = getUserAnswer(questionNum) || '(chưa chọn)';
                const isCorrect = isAnswerCorrect(questionNum, user);
                html += `<div style="margin-top:10px;padding:10px; background:${isCorrect ? '#e8f5e8' : '#ffebee'}; border-radius:5px;">`;
                html += `<strong>Câu trả lời của bạn:</strong> ${user}<br>`;
                if (!isCorrect) html += `<strong>Đáp án đúng:</strong> ${displayAnswers[`q${questionNum}`]}`;
                else html += `<strong>✅ Đúng!</strong>`;
                html += `</div>`;
            }
            document.getElementById('explanationText').innerHTML = html;
        }

        function resetAll() {
            examSubmitted = false; explanationMode = false;
            for (let i = 1; i <= 7; i++) {
                document.getElementsByName(`q${i}`).forEach(r => {
                    r.checked = false;
                    r.disabled = false;
                });
                const qDiv = document.getElementById(`question-${i}`);
                if (qDiv) { qDiv.classList.remove('correct', 'incorrect'); const badge = qDiv.querySelector('.correct-answer-badge'); if (badge) badge.remove(); }
            }
            const mainArea = document.getElementById('mainArea');
            mainArea.classList.remove('show-transcript');
            document.getElementById('transcriptContent').innerHTML = '';
            document.querySelectorAll('.eye-icon').forEach(icon => icon.style.display = 'none');
            document.querySelectorAll('.transcript-highlight').forEach(el => el.classList.remove('transcript-highlight'));
            document.querySelectorAll('.keyword-highlight').forEach(el => el.classList.remove('keyword-highlight'));
            document.getElementById('submitBtn').disabled = false; document.getElementById('submitBtn').textContent = 'Nộp bài';
            document.getElementById('explainBtn').disabled = true; document.getElementById('explainBtn').textContent = 'Xem giải thích';
            document.getElementById('explanationPanel').classList.remove('show');
            updateAnswerCount();
        }

        function saveToDashboard() {
            if (!examSubmitted) return;
            let correct = 0; const details = [];
            for (let i = 1; i <= 7; i++) {
                const user = getUserAnswer(i) || '(trống)';
                const isOk = isAnswerCorrect(i, getUserAnswer(i));
                if (isOk) correct++;
                details.push({ question: i, user: user, correct: displayAnswers[`q${i}`], isCorrect: isOk });
            }
            const partData = { partId: 1, name: 'Part 1', totalQuestions: 7, correctCount: correct, details };
            localStorage.setItem('pet_listening_book1_test3_part1', JSON.stringify(partData));
            console.log('✅ Saved pet_listening_book1_test3_part1');
        }

        document.getElementById('submitBtn').addEventListener('click', function() {
            if (examSubmitted) return;
            let unanswered = [];
            for (let i = 1; i <= 7; i++) if (!getUserAnswer(i)) unanswered.push(i);
            if (unanswered.length > 0 && !confirm(`Bạn còn ${unanswered.length} câu chưa chọn. Nộp bài?`)) return;
            examSubmitted = true;
            const mainArea = document.getElementById('mainArea');
            mainArea.classList.add('show-transcript');
            document.getElementById('transcriptContent').innerHTML = transcriptHTML;
            markAnswers();
            document.getElementById('submitBtn').disabled = true; document.getElementById('submitBtn').textContent = 'Đã nộp bài';
            document.getElementById('explainBtn').disabled = false;
            let correctCount = 0;
            for (let i = 1; i <= 7; i++) if (isAnswerCorrect(i, getUserAnswer(i))) correctCount++;
            document.getElementById('explanationPanel').classList.add('show');
            document.getElementById('explanationTitle').textContent = 'KẾT QUẢ';
            document.getElementById('explanationText').innerHTML = `<h4>Bạn đã nộp bài</h4><p><strong>Đúng:</strong> ${correctCount}/7</p><p>Nhấn vào nút <strong>Xem giải thích</strong> để xem hiệu ứng và đáp án đúng.</p>`;
            saveToDashboard();
            document.querySelectorAll('input[type="radio"]').forEach(el => el.disabled = true);
        });

        document.getElementById('explainBtn').addEventListener('click', function() {
            if (!examSubmitted) return;
            explanationMode = true;
            document.querySelectorAll('.eye-icon, .correct-answer-badge').forEach(el => el.style.display = 'inline-block');
            this.disabled = true; this.textContent = 'Đang xem giải thích';
            document.getElementById('explanationPanel').classList.remove('show');
        });

        document.getElementById('resetBtn').addEventListener('click', function() { if (confirm('Reset tất cả câu trả lời?')) resetAll(); });
        document.getElementById('closeExplanation').addEventListener('click', function() {
            document.getElementById('explanationPanel').classList.remove('show');
            document.querySelectorAll('.transcript-highlight').forEach(el => el.classList.remove('transcript-highlight'));
            document.querySelectorAll('.keyword-highlight').forEach(el => el.classList.remove('keyword-highlight'));
        });
        document.addEventListener('click', function(e) { if (e.target.classList.contains('eye-icon')) showExplanation(e.target.dataset.question); });

        function setFontSize(size) {
            document.querySelectorAll('.font-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`font${size.charAt(0).toUpperCase()+size.slice(1)}`).classList.add('active');
            document.querySelectorAll('.transcript-content, .questions-list').forEach(el => {
                el.className = `transcript-content font-${size}`;
                if (el.classList.contains('questions-list')) el.classList.add('centered');
            });
        }
        document.getElementById('fontSmall').addEventListener('click', () => setFontSize('small'));
        document.getElementById('fontMedium').addEventListener('click', () => setFontSize('medium'));
        document.getElementById('fontLarge').addEventListener('click', () => setFontSize('large'));

        // Resizer logic
        const transcriptPanel = document.getElementById('transcriptPanel'), questionsPanel = document.getElementById('questionsPanel'), resizer = document.getElementById('resizer');
        let isResizing = false;
        resizer.addEventListener('mousedown', () => { isResizing = true; document.body.style.cursor = 'col-resize'; });
        document.addEventListener('mousemove', (e) => {
            if (!isResizing) return;
            const mainArea = document.getElementById('mainArea');
            const rect = mainArea.getBoundingClientRect();
            let leftWidth = e.clientX - rect.left - 4;
            if (leftWidth < 250) leftWidth = 250;
            if (leftWidth > rect.width - 250) leftWidth = rect.width - 250;
            transcriptPanel.style.width = leftWidth + 'px';
            questionsPanel.style.width = (rect.width - leftWidth - 8) + 'px';
        });
        document.addEventListener('mouseup', () => { isResizing = false; document.body.style.cursor = 'default'; });

        createNavButtons(); renderQuestions(); updateAnswerCount(); setFontSize('large');
        document.querySelectorAll('.eye-icon').forEach(icon => icon.style.display = 'none');
    })();

    // Context menu highlight thủ công
    (function() {
        let selectedRange = null;
        const contextMenu = document.getElementById('contextMenu');
        const transcriptContent = document.getElementById('transcriptContent');
        const questionsContent = document.getElementById('questionsContent');
        function handleRightClick(e) {
            e.preventDefault();
            const selection = window.getSelection();
            if (selection.toString().trim()) {
                selectedRange = selection.getRangeAt(0);
                contextMenu.style.left = e.pageX + 'px';
                contextMenu.style.top = e.pageY + 'px';
                contextMenu.style.display = 'block';
            }
        }
        if (transcriptContent) transcriptContent.addEventListener('contextmenu', handleRightClick);
        if (questionsContent) questionsContent.addEventListener('contextmenu', handleRightClick);
        document.addEventListener('click', () => { contextMenu.style.display = 'none'; selectedRange = null; });
        window.applyHighlight = function(color) {
            if (!selectedRange) return;
            try {
                const span = document.createElement('span');
                span.className = `highlight-${color}`;
                span.appendChild(selectedRange.extractContents());
                selectedRange.insertNode(span);
            } catch(e) { console.warn('Highlight error'); }
            contextMenu.style.display = 'none'; selectedRange = null;
        };
        window.removeHighlight = function() {
            if (!selectedRange) return;
            try {
                const iterator = document.createNodeIterator(selectedRange.commonAncestorContainer, NodeFilter.SHOW_ELEMENT, { acceptNode: function(node) { if (node.classList && (node.classList.contains('highlight-yellow') || node.classList.contains('highlight-green') || node.classList.contains('highlight-pink'))) return NodeFilter.FILTER_ACCEPT; return NodeFilter.FILTER_REJECT; } });
                let node; while (node = iterator.nextNode()) node.replaceWith(...node.childNodes);
            } catch(e) { console.warn('Remove highlight error'); }
            contextMenu.style.display = 'none'; selectedRange = null;
        };

            // Resizable explanation panel logic
            const expPanel = document.getElementById('explanationPanel');
            const expResizer = document.getElementById('explanationResizer');
            let isResizingExp = false;
            let startYExp, startHeightExp;

            if (expResizer && expPanel) {
                expResizer.addEventListener('mousedown', (e) => {
                    isResizingExp = true;
                    startYExp = e.clientY;
                    startHeightExp = expPanel.offsetHeight;
                    document.body.style.cursor = 'ns-resize';
                    document.body.style.userSelect = 'none';
                });

                document.addEventListener('mousemove', (e) => {
                    if (!isResizingExp) return;
                    const dy = startYExp - e.clientY;
                    const newHeight = startHeightExp + dy;
                    if (newHeight > 100 && newHeight < window.innerHeight * 0.8) {
                        expPanel.style.maxHeight = newHeight + 'px';
                        expPanel.style.height = newHeight + 'px';
                    }
                });

                document.addEventListener('mouseup', () => {
                    isResizingExp = false;
                    document.body.style.cursor = 'default';
                    document.body.style.userSelect = 'auto';
                });
            }
        })();
</script>
</body>
</html>
