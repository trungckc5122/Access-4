        <p><strong>Question 1</strong><br>
        <strong>Woman:</strong> So why were you late for the meeting?<br>

        <strong>Woman:</strong> Yes, I know what I want. OK then. Let's order.</p>

        <p><strong>Question 5</strong><br>

        <strong>Man:</strong> That's true. I like the look of the one over there, with the cushion, but it's too large for the space I have available.<br>
        <strong>Woman:</strong> So have you decided?<br>
        <strong>Man:</strong> Yes, <span class="highlightable" data-q="5">I'll go for the one you suggested.</span></p>

        <strong>Man:</strong> That's right.<br>
        <strong>Woman:</strong> I saw them recently – they're pretty good actually! Do you fancy seeing something together?<br>
        <strong>Man:</strong> There's a jazz band playing on the last day too. We could try that.<br>
        <strong>Woman:</strong> I'd rather get tickets for something else instead. I'll see what's available.</p>
