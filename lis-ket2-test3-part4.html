    <script>
        const ketTest3Part4Data = {
            title: "KET 2 · Test 3 · Listening Part 4",
            type: "multiple-choice",
            part: 4,
            book: 2,
            test: 3,

            answerKey: { q16: 'B', q17: 'A', q18: 'A', q19: 'B', q20: 'C' },
            displayAnswers: { q16: 'B', q17: 'A', q18: 'A', q19: 'B', q20: 'C' },

            detailedExplanations: {
                q16: `<strong>Đáp án: B – Walking's boring (đi bộ thì chán)</strong><br>
                      Người đàn ông nói: <em>"I'm trying to do more exercise. <span class='keyword-highlight'>I walk a lot, but it's not very interesting.</span>"</em><br>
                      Người phụ nữ đáp: <em>"Other activities are definitely more fun! I enjoy cycling."</em><br>
                      Người đàn ông nói: <em>"I get a bit worried on a bike – there aren't many safe places to cycle nearby."</em><br>
                      Người phụ nữ đề xuất: <em>"Well, have you tried running? You can do it anywhere, so it's not difficult."</em><br>
                      Người đàn ông đáp: <em>"I'm probably not fit enough!"</em><br><br>
                      <strong>✗ A (Running's hard) sai:</strong> Người đàn ông nói chạy bộ không khó ("not difficult") nhưng anh chưa đủ sức khỏe.<br>
                      <strong>✗ C (Cycling's dangerous) sai:</strong> Đây là ý kiến của người đàn ông, không phải điều cả hai đồng ý.<br>
                      <strong>✓ B (Walking's boring) là đúng – người đàn ông nói đi bộ "not very interesting" (chán), cả hai đều muốn hoạt động thú vị hơn.</strong>`,

                q17: `<strong>Đáp án: A – an artist (họa sĩ)</strong><br>
                      Người phụ nữ nói: <em>"I really enjoy my job – I've been a journalist for nearly ten years now, and I sell my stories to different newspapers. I mainly write about chefs and cooking. <span class='keyword-highlight'>But I had different plans when I was a teenager and wanted to be a painter.</span> However, I realised most artists don't earn much money, so I decided on something different."</em><br>
                      (painter = artist – họa sĩ)<br><br>
                      <strong>✗ B (a journalist) sai:</strong> Đây là công việc hiện tại của cô ấy, không phải ước mơ thời trẻ.<br>
                      <strong>✗ C (a cook) sai:</strong> Cô ấy viết về đầu bếp nấu ăn (chefs and cooking), không phải muốn làm đầu bếp.<br>
                      <strong>✓ A (an artist) là đúng – cô ấy muốn làm painter (họa sĩ) thời trẻ.</strong>`,

                q18: `<strong>Đáp án: A – to a concert (đi xem hòa nhạc)</strong><br>
                      Người phụ nữ hỏi: <em>"What would you like to do for your birthday?"</em><br>
                      Người đàn ông đáp: <em>"Well, I go to the movies every week, so I'd prefer to do something different. <span class='keyword-highlight'>I love listening to classical music, particularly pianists.</span>"</em><br>
                      Người phụ nữ đáp: <em>"Great! Let's look online for something with piano music."</em><br>
                      Người đàn ông nói thêm: <em>"OK. I'd like to see the new collection at the art museum too, but I can do that on my own."</em> → Triển lãm nghệ thuật không phải kế hoạch chung.<br><br>
                      <strong>✗ B (to an exhibition) sai:</strong> Người đàn ông muốn đi xem triển lãm nhưng tự đi một mình, không phải kế hoạch chung.<br>
                      <strong>✗ C (to a film) sai:</strong> Người đàn ông đi xem phim mỗi tuần nên muốn làm gì đó khác.<br>
                      <strong>✓ A (to a concert) là đúng – họ tìm sự kiện có nhạc piano (classical music, pianists) = concert.</strong>`,

                q19: `<strong>Đáp án: B – The people are nice (mọi người thân thiện)</strong><br>
                      Người phụ nữ nói: <em>"I've just been to an interview for an office job. I really like the place, even though it's quite a long way from my house."</em><br>
                      Người đàn ông hỏi: <em>"How was it?"</em><br>
                      Người phụ nữ đáp: <em>"Well, it's just temporary, so the work mightn't be very interesting, but <span class='keyword-highlight'>I like the staff, so I think it'll be fun.</span>"</em><br>
                      (like the staff = the people are nice – thích đồng nghiệp)<br><br>
                      <strong>✗ A (The work is interesting) sai:</strong> Cô ấy nói công việc có thể không thú vị ("mightn't be very interesting").<br>
                      <strong>✗ C (The office is near her home) sai:</strong> Cô ấy nói văn phòng khá xa nhà ("quite a long way from my house").<br>
                      <strong>✓ B (The people are nice) là đúng – cô ấy thích nhân viên ở đó ("like the staff").</strong>`,

                q20: `<strong>Đáp án: C – She found a new place to live (cô ấy tìm được nơi ở mới)</strong><br>
                      Người phụ nữ gọi điện: <em>"Hi, Jake!"</em><br>
                      Người đàn ông (Jake) nói: <em>"You sound happy. Did you get that great job?"</em><br>
                      Người phụ nữ đáp: <em>"Not sure yet. But while I was coming back from the interview, <span class='keyword-highlight'>I started chatting to a lovely woman. I said I was looking for a flat in the area.</span>"</em><br>
                      Jake hỏi: <em>"And did she know somewhere?"</em><br>
                      Người phụ nữ đáp: <em>"Yeah. <span class='keyword-highlight'>I went to see it, it's perfect, and I'm moving in next week!</span>"</em><br><br>
                      <strong>✗ A (She met an old friend) sai:</strong> Cô ấy trò chuyện với người phụ nữ lạ, không phải bạn cũ.<br>
                      <strong>✗ B (She got an exciting job) sai:</strong> Cô ấy nói "Not sure yet" về công việc, chưa chắc có được.<br>
                      <strong>✓ C (She found a new place to live) là đúng – cô ấy tìm được căn hộ (flat) hoàn hảo và sẽ chuyển đến tuần sau.</strong>`
            },

            transcript: `
            <p><strong>PART 4</strong></p>
            <p><em>For each question, choose the correct answer.</em></p>

            <p><strong>Question 16</strong><br>
            You will hear two friends talking about exercise. What do they agree?<br>
            <strong>Man:</strong> I'm trying to do more exercise. <span class="highlightable" data-q="16">I walk a lot, but it's not very interesting.</span><br>
            <strong>Woman:</strong> Other activities are definitely more fun! I enjoy cycling.<br>
            <strong>Man:</strong> I get a bit worried on a bike – there aren't many safe places to cycle nearby.<br>
            <strong>Woman:</strong> Really? Well, have you tried running? You can do it anywhere, so it's not difficult.<br>
            <strong>Man:</strong> I'm probably not fit enough!</p>

            <p><strong>Question 17</strong><br>
            You will hear a woman talking about jobs. What did she want to be when she was younger?<br>
            <strong>Woman:</strong> I really enjoy my job – I've been a journalist for nearly ten years now, and I sell my stories to different newspapers. I mainly write about chefs and cooking. <span class="highlightable" data-q="17">But I had different plans when I was a teenager and wanted to be a painter.</span> However, I realised most artists don't earn much money, so I decided on something different.</p>

            <p><strong>Question 18</strong><br>
            You will hear two friends talking about going out. Where do they agree to go?<br>
            <strong>Woman:</strong> What would you like to do for your birthday?<br>
            <strong>Man:</strong> Well, I go to the movies every week, so I'd prefer to do something different. <span class="highlightable" data-q="18">I love listening to classical music, particularly pianists.</span><br>
            <strong>Woman:</strong> Great! Let's look online for something with piano music.<br>
            <strong>Man:</strong> OK. I'd like to see the new collection at the art museum too, but I can do that on my own.</p>

            <p><strong>Question 19</strong><br>
            You will hear a woman talking to her friend about finding a new job. Why does the woman want the job?<br>
            <strong>Woman:</strong> I've just been to an interview for an office job. I really like the place, even though it's quite a long way from my house.<br>
            <strong>Man:</strong> How was it?<br>
            <strong>Woman:</strong> Well, it's just temporary, so the work mightn't be very interesting, but <span class="highlightable" data-q="19">I like the staff, so I think it'll be fun.</span> Do you think you'll get the job?<br>
            <strong>Woman:</strong> I hope so!</p>

            <p><strong>Question 20</strong><br>
            You will hear a woman talking to her brother on the phone. Why is the woman happy?<br>
            <strong>Woman:</strong> Hi, Jake!<br>
            <strong>Man:</strong> You sound happy. Did you get that great job?<br>
            <strong>Woman:</strong> Not sure yet. But while I was coming back from the interview, <span class="highlightable" data-q="20">I started chatting to a lovely woman. I said I was looking for a flat in the area.</span><br>
            <strong>Man:</strong> And did she know somewhere?<br>
            <strong>Woman:</strong> Yeah. <span class="highlightable" data-q="20">I went to see it, it's perfect, and I'm moving in next week!</span></p>

            <p><em>That is the end of Part Four.</em></p>
            `,

            questions: [
                { num: 16, text: "You will hear two friends talking about exercise. What do they agree?", options: ["Running's hard.", "Walking's boring.", "Cycling's dangerous."] },
                { num: 17, text: "You will hear a woman talking about jobs. What did she want to be when she was younger?", options: ["an artist", "a journalist", "a cook"] },
                { num: 18, text: "You will hear two friends talking about going out. Where do they agree to go?", options: ["to a concert", "to an exhibition", "to a film"] },
                { num: 19, text: "You will hear a woman talking to her friend about finding a new job. Why does the woman want the job?", options: ["The work is interesting.", "The people are nice.", "The office is near her home."] },
                { num: 20, text: "You will hear a woman talking to her brother on the phone. Why is the woman happy?", options: ["She met an old friend.", "She got an exciting job.", "She found a new place to live."] }
            ]
        };

        document.addEventListener('DOMContentLoaded', function () {
            window.listeningCore = new ListeningCore();
            window.listeningCore.initializeTest(ketTest3Part4Data);
            console.log('KET 2 Test 3 Listening Part 4 loaded');
        });
    </script>
