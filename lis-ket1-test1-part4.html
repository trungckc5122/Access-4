<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KET 1 - Test 1 - Listening Part 4</title>
    <link rel="stylesheet" href="listening-pet-common.css" id="styleLink">
</head>

<body>
    <div class="test-wrapper" id="testWrapper">
        <!-- Header -->
        <div class="ielts-header">
            <div class="brand">
                <div class="ielts-logo">KET</div>
                <div class="candidate"></div>
                <div class="audio-controls">
                    <audio id="listeningAudio" controls>
                        <source src="audio/KET 1 - Test 1 Part 4.mp3" type="audio/mpeg">
                    </audio>
                    <select class="speed-select" id="speedSelect">
                        <option value="0.7">0.7x</option>
                        <option value="0.9">0.9x</option>
                        <option value="1.0" selected>1x</option>
                        <option value="1.1">1.1x</option>
                        <option value="1.25">1.25x</option>
                    </select>
                    <span class="volume-icon">🔊</span>
                </div>
            </div>
        </div>

        <!-- Question navigator -->
        <div class="question-nav">
            <div class="nav-buttons" id="navButtons"></div>
        </div>

        <!-- Main area -->
        <div class="main-area" id="mainArea">
            <!-- Transcript panel -->
            <div class="transcript-panel" id="transcriptPanel">
                <div class="panel-header"><span>TRANSCRIPT</span></div>
                <div class="transcript-content font-large" id="transcriptContent"></div>
            </div>
            <div class="resizer" id="resizer"></div>

            <!-- Questions panel -->
            <div class="questions-panel" id="questionsPanel">
                <div class="panel-header">
                    <span>QUESTIONS 16–20</span>
                    <span class="answer-badge" id="answeredCount">0/5 answered</span>
                </div>
                <div class="questions-list font-large centered" id="questionsContent">
                    <div>
                        <h3>PART 4 &nbsp; Questions 16–20</h3>
                        <p><em>For each question, choose the correct answer.</em></p>
                        <div class="notes-box" id="questionsContainer"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Bottom bar -->
        <div class="bottom-bar">
            <button class="btn btn-primary" id="submitBtn">Nộp bài</button>
            <button class="btn btn-success" id="explainBtn" disabled>Xem giải thích</button>
            <button class="btn btn-danger" id="resetBtn">Reset</button>
            <div class="progress" id="progressDisplay">Đã làm: 0/5</div>
        </div>

        <!-- Explanation panel -->
        <div class="explanation-panel" id="explanationPanel">
            <div class="resize-handle" id="explanationResizer"></div>
            <div class="explanation-header">
                <span id="explanationTitle">Giải thích</span>
                <span class="close-btn" id="closeExplanation">✕ Đóng</span>
            </div>
            <div class="explanation-content" id="explanationText"></div>
        </div>
    </div>

    <!-- Context menu -->
    <div class="context-menu" id="contextMenu">
        <div onclick="applyHighlight('yellow')">Highlight vàng</div>
        <div onclick="applyHighlight('green')">Highlight xanh lá</div>
        <div onclick="applyHighlight('pink')">Highlight hồng</div>
        <div onclick="removeHighlight()">Xóa highlight</div>
    </div>

    <script src="core-listening-ket.js"></script>
    <script>
        const ketTest1Part4Data = {
            title: "KET 1 · Test 1 · Listening Part 4",
            type: "multiple-choice",
            part: 4,
            book: 1,
            test: 1,

            answerKey: { q16: 'A', q17: 'C', q18: 'A', q19: 'B', q20: 'B' },
            displayAnswers: { q16: 'A', q17: 'C', q18: 'A', q19: 'B', q20: 'B' },

            detailedExplanations: {
                q16: `<strong>Đáp án: A – engineer</strong><br>
                      Người phụ nữ nói: <em>"I choose a career where I <span class='keyword-highlight'>design and build planes</span>."</em> → Đây là kỹ sư hàng không.<br><br>
                      <strong>✗ B (mechanic) sai:</strong> Cô ấy từng giúp bố sửa xe khi còn nhỏ nhưng đó không phải nghề nghiệp hiện tại.<br>
                      <strong>✗ C (pilot) sai:</strong> Cô thiết kế và chế tạo máy bay, không phải lái máy bay.<br>
                      <strong>✓ A (engineer) là nghề của cô ấy.</strong>`,

                q17: `<strong>Đáp án: C – It was scary</strong><br>
                      Người phụ nữ nói: <em>"I wanted to watch something different, so I chose a horror film – <span class='keyword-highlight'>I was a bit afraid some of the time!</span>"</em><br><br>
                      <strong>✗ A (It was funny) sai:</strong> Cô thường xem phim hài nhưng lần này chọn phim kinh dị.<br>
                      <strong>✗ B (It was true/based on facts) sai:</strong> Người đàn ông thích phim dựa trên sự thật, nhưng cô nói bộ phim này chắc chắn không phải vậy.<br>
                      <strong>✓ C (It was scary) là điều cô nói về bộ phim.</strong>`,

                q18: `<strong>Đáp án: A – running with the ball</strong><br>
                      Huấn luyện viên nói: <em>"What you need to improve is <span class='keyword-highlight'>moving fast around the field when you've got the ball.</span> That's what we'll practise today."</em><br><br>
                      <strong>✗ B (getting goals) sai:</strong> HLV khen ngợi việc ghi 2 bàn (<em>"Well done for scoring two goals!"</em>) không phải muốn cải thiện điều này.<br>
                      <strong>✗ C (working as a team) sai:</strong> HLV chia thành nhóm nhỏ để luyện tập nhưng mục tiêu chính là di chuyển với bóng.<br>
                      <strong>✓ A (running with the ball) là điều cần cải thiện.</strong>`,

                q19: `<strong>Đáp án: B – The discounts are excellent</strong><br>
                      Julia nói: <em>"I don't care about that because <span class='keyword-highlight'>everything's at least half-price.</span>"</em> → Giảm giá ít nhất 50%.<br><br>
                      <strong>✗ A (It offers the latest fashions) sai:</strong> Người đàn ông nói quần áo ở đây không theo mốt hiện tại (<em>"isn't very popular anymore"</em>).<br>
                      <strong>✗ C (Orders always arrive quickly) sai:</strong> Julia thừa nhận đơn hàng mất thời gian mới đến (<em>"orders can take a while"</em>).<br>
                      <strong>✓ B (The discounts are excellent) là lý do Julia thích mua từ website này.</strong>`,

                q20: `<strong>Đáp án: B – He had other work to do</strong><br>
                      Người đàn ông nói: <em>"one of our most important customers was ill yesterday... so <span class='keyword-highlight'>he wanted to see me today.</span> Unfortunately, that meant missing the meeting."</em> → Anh phải gặp khách hàng.<br><br>
                      <strong>✗ A (He had to go to the dentist) sai:</strong> Cuộc hẹn nha sĩ là vào ngày mai (<em>"That's tomorrow."</em>).<br>
                      <strong>✗ C (He wasn't feeling well) sai:</strong> Khách hàng của anh bị ốm, không phải anh.<br>
                      <strong>✓ B (He had other work to do) – phải gặp khách hàng quan trọng.</strong>`
            },

            transcript: `
            <p><strong>PART 4</strong></p>
            <p><em>For each question, choose the correct answer.</em></p>

            <p><strong>Question 16</strong><br>
            You will hear a woman talking on the radio about her job.<br>
            <strong>Woman:</strong> I guess I've always enjoyed either building or taking things apart – ever since I was a little girl. As a teenager, I loved nothing more than helping my dad fix vehicles or working in his garage. So, it wasn't a big surprise when I <span class="highlightable" data-q="16">chose a career where I design and build planes.</span> I've had an amazing time so far.</p>

            <p><strong>Question 17</strong><br>
            You will hear a woman talking to a friend about a film.<br>
            <strong>Man:</strong> Have you seen any good films recently?<br>
            <strong>Woman:</strong> Yes, last week. I usually watch comedies, but I wanted to watch something different, so <span class="highlightable" data-q="17">I chose a horror film – I was a bit afraid some of the time!</span><br>
            <strong>Man:</strong> It still sounds like a good film, but I prefer ones that are based on facts.<br>
            <strong>Woman:</strong> Well, this one certainly wasn't!</p>

            <p><strong>Question 18</strong><br>
            You will hear a sports coach talking to some footballers.<br>
            <strong>Man:</strong> You did much better in last Saturday's match. Well done for scoring two goals! They were a great team and you almost beat them. <span class="highlightable" data-q="18">What you need to improve is moving fast around the field when you've got the ball.</span> That's what we'll practise today. I'm going to divide you into four small teams and we'll work together to do this.</p>

            <p><strong>Question 19</strong><br>
            You will hear two friends talking about a website.<br>
            <strong>Man:</strong> That's a nice sweater, Julia.<br>
            <strong>Woman:</strong> Thanks, it's from HighFashion.com – I always order from there.<br>
            <strong>Man:</strong> Their men's clothes are all right, if you don't mind wearing stuff that isn't very popular anymore.<br>
            <strong>Woman:</strong> <span class="highlightable" data-q="19">I don't care about that because everything's at least half-price.</span> But orders can take a while before I get them in the mail.<br>
            <strong>Man:</strong> Yeah, other sites are faster that way.</p>

            <p><strong>Question 20</strong><br>
            You will hear two colleagues talking together.<br>
            <strong>Man:</strong> How was the meeting this morning, Charlotte?<br>
            <strong>Woman:</strong> Good. But why weren't you there? Did you have a dentist's appointment or something?<br>
            <strong>Man:</strong> <span class="highlightable" data-q="20">That's tomorrow. But one of our most important customers was ill yesterday – he had a terrible earache – so he wanted to see me today. Unfortunately, that meant missing the meeting.</span><br>
            <strong>Woman:</strong> OK. Well, let me tell you what we discussed.</p>

            <p><em>That is the end of Part Four.</em></p>
            `,

            questions: [
                { num: 16, text: "You will hear a woman talking on the radio about her job. What's her job?", options: ["engineer", "mechanic", "pilot"] },
                { num: 17, text: "You will hear a woman talking to a friend about a film. What does she say about the film?", options: ["It was funny.", "It was true.", "It was scary."] },
                { num: 18, text: "You will hear a sports coach talking to some footballers. What would the coach like them to become better at?", options: ["running with the ball", "getting goals", "working as a team"] },
                { num: 19, text: "You will hear two friends talking about a website. Why does Julia prefer to buy clothes from the website?", options: ["It offers the latest fashions.", "The discounts are excellent.", "Orders always arrive quickly."] },
                { num: 20, text: "You will hear two colleagues talking together. Why was the man not at the meeting this morning?", options: ["He had to go to the dentist.", "He had other work to do.", "He wasn't feeling well."] }
            ]
        };

        document.addEventListener('DOMContentLoaded', function () {
            window.listeningCore = new ListeningCore();
            window.listeningCore.initializeTest(ketTest1Part4Data);
            console.log('KET 1 Test 1 Listening Part 4 loaded');
        });
    </script>
</body>

</html>
