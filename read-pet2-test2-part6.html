<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>PET 2 - Test 2 - Reading Part 6</title>
    <link rel="stylesheet" href="reading-pet-common.css" id="styleLink">
</head>
<body>
<div class="test-wrapper" id="testWrapper">
    <div class="ielts-header">
        <div class="brand"><div class="ielts-logo">PET</div><div class="candidate"></div></div>
    </div>

    <div class="question-nav">
        <div class="nav-buttons" id="navButtons"></div>
        <span id="answeredCount" style="font-size:13px; color:#555; margin-left:10px;">0/6 answered</span>
    </div>

    <div class="main-area split-layout" id="mainArea"></div>

    <div class="bottom-bar">
        <button class="btn btn-primary" id="submitBtn">Nộp bài</button>
        <button class="btn btn-success" id="explainBtn" disabled>Xem giải thích</button>
        <button class="btn btn-danger" id="resetBtn">Reset</button>
        <div class="progress" id="progressDisplay">Đã làm: 0/6</div>
    </div>

    <div class="context-menu" id="contextMenu">
        <div onclick="applyHighlight('yellow')">Highlight vàng</div>
        <div onclick="applyHighlight('green')">Highlight xanh lá</div>
        <div onclick="applyHighlight('pink')">Highlight hồng</div>
        <div onclick="removeHighlight()">Xóa highlight</div>
    </div>
</div>

<script src="core-reading.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const testData = {
            type: 'split-layout',
            part: 6,
            answerKey: { q27: "could", q28: "a", q29: "had", q30: "of", q31: "to", q32: "spite" },
            displayAnswers: { q27: "could", q28: "a", q29: "had", q30: "of", q31: "to", q32: "spite" },
            detailedExplanations: {
                27: `<div>Động từ khuyết thiếu <strong>"could"</strong> = có thể (quá khứ của can).<br>
                Câu đầy đủ: <em>"we could see it in the distance"</em>.<br>
                Dịch: Chúng tôi có thể nhìn thấy thác nước từ xa.<br>
                <strong>Lưu ý:</strong> Dùng "could" vì đang kể lại chuyện quá khứ (decided to visit).</div>`,
                28: `<div>Mạo từ <strong>"a"</strong> = một.<br>
                Cấu trúc: <em>"quite a long way"</em> = một quãng đường khá dài.<br>
                "Quite a + danh từ" là cấu trúc phổ biến trong tiếng Anh.<br>
                Dịch: Đó là một quãng đường khá dài.</div>`,
                29: `<div>Thì <strong>quá khứ hoàn thành</strong>: <em>"had + P2"</em>.<br>
                Câu: <em>"the picnic that we had taken with us"</em>.<br>
                Dùng quá khứ hoàn thành vì hành động "take picnic" xảy ra trước hành động "sat down".<br>
                Dịch: Bữa picnic mà chúng tôi đã mang theo.</div>`,
                30: `<div>Thành ngữ <strong>"drops of rain"</strong> = những giọt mưa.<br>
                "Of" chỉ sở hữu/loại - "drops of rain" = những giọt (của) mưa.<br>
                Câu: <em>"some large drops of rain fell on us"</em><br>
                Dịch: Một số giọt mưa lớn rơi xuống chúng tôi.</div>`,
                31: `<div>Cấu trúc <strong>"begin to + V"</strong> = bắt đầu làm gì.<br>
                "Begin" có thể đi với "to V" hoặc "V-ing".<br>
                Câu: <em>"the rain began to fall heavily"</em><br>
                Dịch: Mưa bắt đầu rơi nặng hạt.</div>`,
                32: `<div>Thành ngữ <strong>"in spite of"</strong> = mặc dù/bất chấp.<br>
                Dùng để diễn tả sự tương phản. "In spite of + N/V-ing".<br>
                Câu: <em>"In spite of our wet clothes, we soon felt better"</em><br>
                Dịch: Mặc dù quần áo ướt, chúng tôi sớm cảm thấy khá hơn.</div>`
            },
            template: `
                <div class="reading-card" id="passageCard">
                    <div class="review-title">A rainy day</div>
                    <p>One summer's day, my family decided to visit a waterfall in the countryside near our town. As we walked across the fields towards the waterfall, we
                        <span class="input-wrapper">
                            <input type="text" id="q27" class="gap-input" data-q="27" autocomplete="off">
                            <span class="eye-icon" data-question="27">👁️</span>
                        </span>
                        see it in the distance. It was quite
                        <span class="input-wrapper">
                            <input type="text" id="q28" class="gap-input" data-q="28" autocomplete="off">
                            <span class="eye-icon" data-question="28">👁️</span>
                        </span>
                        long way, but we got there after about an hour.
                    </p>
                    <p>
                        We sat down near the pool at the bottom of the waterfall to enjoy the picnic that we
                        <span class="input-wrapper">
                            <input type="text" id="q29" class="gap-input" data-q="29" autocomplete="off">
                            <span class="eye-icon" data-question="29">👁️</span>
                        </span>
                        taken with us. Then we noticed some black clouds in the sky, and some large drops
                        <span class="input-wrapper">
                            <input type="text" id="q30" class="gap-input" data-q="30" autocomplete="off">
                            <span class="eye-icon" data-question="30">👁️</span>
                        </span>
                        rain fell on us, so we quickly started to collect our things together.
                    </p>
                    <p>
                        Soon the rain began
                        <span class="input-wrapper">
                            <input type="text" id="q31" class="gap-input" data-q="31" autocomplete="off">
                            <span class="eye-icon" data-question="31">👁️</span>
                        </span>
                        fall heavily. Carrying our bags, we ran as fast as we could, and when we reached the town, we went into the first café we saw.
                    </p>
                    <p>
                        In
                        <span class="input-wrapper">
                            <input type="text" id="q32" class="gap-input" data-q="32" autocomplete="off">
                            <span class="eye-icon" data-question="32">👁️</span>
                        </span>
                        of our wet clothes, we soon felt better after a delicious drink of hot chocolate!
                    </p>
                </div>
            `,
            questions: [
                { num: 27 }, { num: 28 }, { num: 29 }, { num: 30 }, { num: 31 }, { num: 32 }
            ]
        };

        window.readingCore = new ReadingCore();
        window.readingCore.initializeTest(testData);
    });
</script>
</body>
</html>
