<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KET 1 - Test 2 - Listening Part 1</title>
    <link rel="stylesheet" href="listening-pet-common.css" id="styleLink">
</head>

<body>
    <div class="test-wrapper" id="testWrapper">
        <!-- Header -->
        <div class="ielts-header">
            <div class="brand">
                <div class="ielts-logo">KET</div>
                <div class="candidate"></div>
                <div class="audio-controls">
                    <audio id="listeningAudio" controls>
                        <source src="audio/KET 1 - Test 2 Part 1.mp3" type="audio/mpeg">
                    </audio>
                    <select class="speed-select" id="speedSelect">
                        <option value="0.7">0.7x</option>
                        <option value="0.9">0.9x</option>
                        <option value="1.0" selected>1x</option>
                        <option value="1.1">1.1x</option>
                        <option value="1.25">1.25x</option>
                    </select>
                    <span class="volume-icon">🔊</span>
                </div>
            </div>
        </div>

        <!-- Question navigator -->
        <div class="question-nav">
            <div class="nav-buttons" id="navButtons"></div>
        </div>

        <!-- Main area -->
        <div class="main-area" id="mainArea">
            <!-- Transcript panel -->
            <div class="transcript-panel" id="transcriptPanel">
                <div class="panel-header"><span>TRANSCRIPT</span></div>
                <div class="transcript-content font-large" id="transcriptContent"></div>
            </div>
            <div class="resizer" id="resizer"></div>

            <!-- Questions panel -->
            <div class="questions-panel" id="questionsPanel">
                <div class="panel-header">
                    <span>QUESTIONS 1–5</span>
                    <span class="answer-badge" id="answeredCount">0/5 answered</span>
                </div>
                <div class="questions-list font-large centered" id="questionsContent">
                    <div>
                        <h3>PART 1 &nbsp; Questions 1–5</h3>
                        <p><em>For each question, choose the correct answer.</em></p>
                        <div class="notes-box" id="questionsContainer"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Bottom bar -->
        <div class="bottom-bar">
            <button class="btn btn-primary" id="submitBtn">Nộp bài</button>
            <button class="btn btn-success" id="explainBtn" disabled>Xem giải thích</button>
            <button class="btn btn-danger" id="resetBtn">Reset</button>
            <div class="progress" id="progressDisplay">Đã làm: 0/5</div>
        </div>

        <!-- Explanation panel -->
        <div class="explanation-panel" id="explanationPanel">
            <div class="resize-handle" id="explanationResizer"></div>
            <div class="explanation-header">
                <span id="explanationTitle">Giải thích</span>
                <span class="close-btn" id="closeExplanation">✕ Đóng</span>
            </div>
            <div class="explanation-content" id="explanationText"></div>
        </div>
    </div>

    <!-- Context menu -->
    <div class="context-menu" id="contextMenu">
        <div onclick="applyHighlight('yellow')">Highlight vàng</div>
        <div onclick="applyHighlight('green')">Highlight xanh lá</div>
        <div onclick="applyHighlight('pink')">Highlight hồng</div>
        <div onclick="removeHighlight()">Xóa highlight</div>
    </div>

    <script src="core-listening-ket.js"></script>
    <script>
        const ketTest2Part1Data = {
            title: "KET 1 · Test 2 · Listening Part 1",
            type: "multiple-choice",
            part: 1,
            book: 1,
            test: 2,

            answerKey: { q1: 'B', q2: 'A', q3: 'A', q4: 'A', q5: 'C' },
            displayAnswers: { q1: 'B', q2: 'A', q3: 'A', q4: 'A', q5: 'C' },

            detailedExplanations: {
                q1: `<strong>Đáp án: B – a cup next to a sink (một chiếc cốc cạnh bồn rửa)</strong><br>
                      Người phụ nữ hỏi: <em>"I can't find my favourite cup anywhere, Joe. Do you know where it is?"</em><br>
                      Người đàn ông đáp: <em>"Look in the cupboard. That's where it usually is."</em><br>
                      Người phụ nữ nói: <em>"I did. And on the shelf next to the cupboard."</em><br>
                      Người đàn ông xin lỗi: <em>"Oh, sorry, I think I <span class='keyword-highlight'>left it by the sink</span> when I finished the washing-up."</em><br><br>
                      <strong>✗ A (a cup in a cupboard) sai:</strong> Tuy cốc thường ở trong tủ nhưng lần này không ở đó.<br>
                      <strong>✗ C (a cup on a shelf) sai:</strong> Cô ấy đã tìm trên kệ nhưng không thấy.<br>
                      <strong>✓ B (a cup next to a sink) là đáp án đúng – Joe để cốc cạnh bồn rửa sau khi rửa chén.</strong>`,

                q2: `<strong>Đáp án: A – a woman with short blonde hair (một người phụ nữ tóc vàng ngắn)</strong><br>
                      Người đàn ông nói: <em>"My sister's arriving at the station at six. Can you pick her up, Sally?"</em><br>
                      Người phụ nữ hỏi: <em>"Is it your younger sister – the one with long black hair?"</em><br>
                      Người đàn ông đáp: <em>"No, the older one – you haven't met her yet."</em><br>
                      Người phụ nữ hỏi tiếp: <em>"I think you showed me her photo. Does she have short hair?"</em><br>
                      Người đàn ông xác nhận: <em>"That's her – <span class='keyword-highlight'>she's blonde</span>."</em><br><br>
                      <strong>✗ B (a woman with long blonde hair) sai:</strong> Không phải tóc vàng dài.<br>
                      <strong>✗ C (a woman with long black hair) sai:</strong> Đây là em gái nhỏ, không phải chị cả mà Sally sẽ gặp.<br>
                      <strong>✓ A (a woman with short blonde hair) là đúng – chị cả của người đàn ông có tóc vàng ngắn.</strong>`,

                q3: `<strong>Đáp án: A – playing volleyball (chơi bóng chuyền)</strong><br>
                      Người phụ nữ hỏi: <em>"How was your trip?"</em><br>
                      Người đàn ông đáp: <em>"It was brilliant. I really enjoyed swimming – the sea was so warm."</em><br>
                      Và: <em>"And I met some great people who <span class='keyword-highlight'>showed me how to play volleyball</span>. I've not done it before."</em><br>
                      Về surfing: <em>"And it was great to see surfing. I'd love to learn, and I think I'll have lessons next year."</em> → Anh ấy chỉ xem surfing, chưa học.<br><br>
                      <strong>✗ B (swimming) sai:</strong> Anh ấy thích bơi nhưng đã biết bơi rồi, không phải học mới.<br>
                      <strong>✗ C (surfing) sai:</strong> Anh ấy chỉ xem surfing và muốn học năm sau, chưa học bây giờ.<br>
                      <strong>✓ A (playing volleyball) là đúng – đây là môn thể thao anh ấy vừa học được tại bãi biển.</strong>`,

                q4: `<strong>Đáp án: A – outside a bookshop (bên ngoài một hiệu sách)</strong><br>
                      Người đàn ông hỏi: <em>"Do you want to go to the cinema this evening and see that film?"</em><br>
                      Người phụ nữ đáp: <em>"OK. And we could go and eat something first."</em><br>
                      Người đàn ông đề nghị: <em>"All right. Why don't I wait for you <span class='keyword-highlight'>outside the bookshop</span> at about six?"</em><br>
                      Người phụ nữ đáp: <em>"I'll come and find you there when I finish work. Then we can go and look for a restaurant before the film."</em><br><br>
                      <strong>✗ B (at a café) sai:</strong> Họ sẽ đi tìm nhà hàng/quán ăn SAU KHI gặp nhau, không phải gặp ở quán café.<br>
                      <strong>✗ C (at a cinema) sai:</strong> Họ gặp nhau trước khi đi xem phim, không phải ở rạp chiếu phim.<br>
                      <strong>✓ A (outside a bookshop) là đúng – đây là nơi họ thống nhất gặp nhau lúc 6 giờ.</strong>`,

                q5: `<strong>Đáp án: C – a scarf (một chiếc khăn quàng)</strong><br>
                      Người phụ nữ hỏi: <em>"Did you get everything for our ski trip? Did you find some nice new gloves?"</em><br>
                      Người đàn ông đáp: <em>"Not the ones I wanted, but these warm ones were on sale."</em> → Đã mua gloves.<br>
                      Về sunglasses: <em>"<span class='keyword-highlight'>Sunglasses weren't in the sale, but I liked these so much I got them.</span>"</em> → Đã mua sunglasses.<br>
                      Về scarf: <em>"I don't think I need a new one. The one I've already got is fine."</em> → <span class='keyword-highlight'>Không mua scarf</span>.<br><br>
                      <strong>✗ A (sunglasses) sai:</strong> Anh ấy đã mua sunglasses dù không giảm giá.<br>
                      <strong>✗ B (gloves) sai:</strong> Anh ấy đã mua gloves (dù không phải loại muốn mua ban đầu).<br>
                      <strong>✓ C (a scarf) là đúng – anh ấy quyết định không mua vì khăn cũ vẫn tốt.</strong>`
            },

            transcript: `
            <p><strong>PART 1</strong></p>
            <p><em>For each question, choose the correct answer.</em></p>

            <p><strong>Question 1</strong><br>
            <strong>Woman:</strong> I can't find my favourite cup anywhere, Joe. Do you know where it is?<br>
            <strong>Man:</strong> Look in the cupboard. That's where it usually is.<br>
            <strong>Woman:</strong> I did. And on the shelf next to the cupboard.<br>
            <strong>Man:</strong> <span class="highlightable" data-q="1">Oh, sorry, I think I left it by the sink when I finished the washing-up.</span><br>
            <strong>Woman:</strong> Thanks.</p>

            <p><strong>Question 2</strong><br>
            <strong>Man:</strong> My sister's arriving at the station at six. Can you pick her up, Sally?<br>
            <strong>Woman:</strong> Of course. Is it your younger sister – the one with long black hair?<br>
            <strong>Man:</strong> No, the older one – you haven't met her yet.<br>
            <strong>Woman:</strong> I think you showed me her photo. Does she have short hair?<br>
            <strong>Man:</strong> <span class="highlightable" data-q="2">That's her – she's blonde.</span></p>

            <p><strong>Question 3</strong><br>
            <strong>Woman:</strong> How was your trip?<br>
            <strong>Man:</strong> It was brilliant. I really enjoyed swimming – the sea was so warm.<br>
            <strong>Woman:</strong> Lucky you!<br>
            <strong>Man:</strong> <span class="highlightable" data-q="3">And I met some great people who showed me how to play volleyball.</span> I've not done it before. And it was great to see surfing. I'd love to learn, and I think I'll have lessons next year.</p>

            <p><strong>Question 4</strong><br>
            <strong>Man:</strong> Do you want to go to the cinema this evening and see that film?<br>
            <strong>Woman:</strong> OK. And we could go and eat something first.<br>
            <strong>Man:</strong> <span class="highlightable" data-q="4">All right. Why don't I wait for you outside the bookshop at about six?</span><br>
            <strong>Woman:</strong> I'll come and find you there when I finish work. Then we can go and look for a restaurant before the film.</p>

            <p><strong>Question 5</strong><br>
            <strong>Woman:</strong> Did you get everything for our ski trip? Did you find some nice new gloves?<br>
            <strong>Man:</strong> Not the ones I wanted, but these warm ones were on sale. <span class="highlightable" data-q="5">Sunglasses weren't in the sale, but I liked these so much I got them.</span><br>
            <strong>Woman:</strong> Cool. And did you get a scarf?<br>
            <strong>Man:</strong> <span class="highlightable" data-q="5">I don't think I need a new one. The one I've already got is fine.</span></p>

            <p><em>That is the end of Part One.</em></p>
            `,

            questions: [
                { num: 1, text: "Where is the cup now?", options: ["a cup in a cupboard", "a cup next to a sink", "a cup on a shelf"] },
                { num: 2, text: "Who will Sally meet at the station?", options: ["a woman with short blonde hair", "a woman with long blonde hair", "a woman with long black hair"] },
                { num: 3, text: "What did the man learn to do at the beach?", options: ["playing volleyball", "swimming", "surfing"] },
                { num: 4, text: "Where are they going to meet?", options: ["outside a bookshop", "at a café", "at a cinema"] },
                { num: 5, text: "What didn't the man buy?", options: ["sunglasses", "gloves", "a scarf"] }
            ]
        };

        document.addEventListener('DOMContentLoaded', function () {
            window.listeningCore = new ListeningCore();
            window.listeningCore.initializeTest(ketTest2Part1Data);
            console.log('KET 1 Test 2 Listening Part 1 loaded');
        });
    </script>
