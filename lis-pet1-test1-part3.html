<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PET 1 · Test 1 · Part 3</title>
    <link rel="stylesheet" href="listening-pet-common.css" id="styleLink">
</head>
<body>
<div class="test-wrapper" id="testWrapper">
    <!-- Header -->
    <div class="ielts-header">
        <div class="brand">
            <div class="ielts-logo">PET</div>
            <div class="candidate">B1 Preliminary 1 · Test 1 · Part 3</div>
            <div class="audio-controls">
                <audio id="listeningAudio" controls>
                    <source src="audio/B1 Preliminary 1 - Test 1 Part 3.mp3" type="audio/mpeg">
                    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg">
                </audio>
                <select class="speed-select" id="speedSelect">
                    <option value="0.7">0.7x</option>
                    <option value="0.9">0.9x</option>
                    <option value="1.0" selected>1x</option>
                    <option value="1.1">1.1x</option>
                    <option value="1.25">1.25x</option>
                </select>
                <span class="volume-icon">🔊</span>
            </div>
        </div>
        <div class="font-controls">
            <button class="font-btn" id="fontSmall">A-</button>
            <button class="font-btn" id="fontMedium">A</button>
            <button class="font-btn active" id="fontLarge">A+</button>
        </div>
        <button class="theme-toggle-btn" id="themeToggle" title="Chuyển đổi Dark/Light mode">
            <span class="icon-moon">🌙</span>
            <span class="icon-sun">☀️</span>
        </button>
    </div>

    <!-- Question navigator (14-19) -->
    <div class="question-nav">
        <span style="font-weight:600; color:#1e3a5f;">Câu 14-19:</span>
        <div class="nav-buttons" id="navButtons"></div>
    </div>

    <!-- Main area -->
    <div class="main-area" id="mainArea">
        <!-- Transcript panel (ẩn ban đầu) -->
        <div class="transcript-panel" id="transcriptPanel">
            <div class="panel-header">
                <span>TRANSCRIPT</span>
            </div>
            <div class="transcript-content font-large" id="transcriptContent"></div>
        </div>
        <div class="resizer" id="resizer"></div>

        <!-- Questions panel -->
        <div class="questions-panel" id="questionsPanel">
            <div class="panel-header">
                <span>QUESTIONS 14-19</span>
                <span class="answer-badge" id="answeredCount">0/6 answered</span>
            </div>
            <div class="questions-list font-large centered" id="questionsContent">
                <div>
                    <h3>PART 3 Questions 14-19</h3>
                    <p><em>Write one or two words or a number or a date or a time.</em></p>
                    <div class="notes-box" id="questionsContainer"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bottom bar -->
    <div class="bottom-bar">
        <button class="btn btn-primary" id="submitBtn">Nộp bài</button>
        <button class="btn btn-success" id="explainBtn" disabled>Xem giải thích</button>
        <button class="btn btn-danger" id="resetBtn">Reset tất cả</button>
        <div class="progress" id="progressDisplay">Đã làm: 0/6</div>
    </div>

    <!-- Explanation panel -->
    <div class="explanation-panel" id="explanationPanel">
        <div class="resize-handle" id="explanationResizer"></div>
        <div class="explanation-header">
            <span id="explanationTitle">Giải thích</span>
            <span class="close-btn" id="closeExplanation">✕ Đóng</span>
        </div>
        <div class="explanation-content" id="explanationText"></div>
    </div>
</div>

<!-- Context menu for manual highlighting -->
<div class="context-menu" id="contextMenu">
    <div onclick="applyHighlight('yellow')">Highlight vàng</div>
    <div onclick="applyHighlight('green')">Highlight xanh lá</div>
    <div onclick="applyHighlight('pink')">Highlight hồng</div>
    <div onclick="removeHighlight()">Xóa highlight</div>
</div>

<!-- Core Listening Engine -->
<script src="core-listening.js"></script>

<script>
    // Test Data for PET 1 Test 1 Part 3 (Fill-in-the-blank)
    const pet1Test1Part3Data = {
        title: "B1 Preliminary 1 · Test 1 · Part 3",
        type: "fill-blank",
        part: 3,
        book: 1,
        test: 1,

        // Answer Key (supports multiple answers for some questions)
        answerKey: {
            q14: 'brokley',
            q15: ['8.30', '8:30', 'eight thirty', 'half past eight'],
            q16: 'blue',
            q17: 'receptionist',
            q18: 'hall',
            q19: ['3', 'three', '3.00']
        },

        // Display Answers
        displayAnswers: {
            q14: 'BROKLEY',
            q15: '8.30 / half past eight',
            q16: 'BLUE',
            q17: 'RECEPTIONIST',
            q18: 'HALL',
            q19: '3 / THREE'
        },

        // Detailed Explanations
        detailedExplanations: {
            q14: `<strong>Đáp án: BROKLEY</strong><br>
                  Người nói giới thiệu giáo viên dạy nhạc kịch: <em>"Susan Brokley"</em> và đánh vần <em>"B-R-O-K-L-E-Y"</em>.`,
            q15: `<strong>Đáp án: 8.30 / half past eight</strong><br>
                  Người nói cho biết: <em>"It'll begin at half past eight"</em> (Buổi hòa nhạc bắt đầu lúc 8:30).
                  <br><br>
                  <strong>✗ 8 o'clock không đúng:</strong> <em>"theatre doors open at eight o'clock"</em> là thời gian mở cửa, không phải giờ bắt đầu.`,
            q16: `<strong>Đáp án: BLUE</strong><br>
                  Người nói yêu cầu mặc áo phông màu xanh: <em>"we ask that they're blue so everyone looks similar."</em>
                  <br><br>
                  <strong>✗ Black không đúng:</strong> <em>"The traditional colour for concerts is black, of course, but we think that's a bit dark."</em> (Màu đen truyền thống quá tối).`,
            q17: `<strong>Đáp án: RECEPTIONIST</strong><br>
                  Bản đồ tòa nhà có thể lấy từ lễ tân: <em>"There's also a map showing where all the rooms are, which you can get from the receptionist."</em>`,
            q18: `<strong>Đáp án: HALL</strong><br>
                  Người nói khuyên mang đồ ăn trưa ra hội trường: <em>"So, take your sandwiches or whatever to the hall – much nicer, with a view of the garden next door."</em>
                  <br><br>
                  <strong>✗ Kitchen không đúng:</strong> <em>"There's a kitchen for preparing food, but there's nowhere to sit and eat there."</em> (Bếp không có chỗ ngồi).`,
            q19: `<strong>Đáp án: 3 / THREE</strong><br>
                  Giá gửi xe mỗi ngày là £3: <em>"...it's cheaper to pay daily, which is £3"</em>.
                  <br><br>
                  <strong>✗ £20 hoặc £15 không đúng:</strong> £20 là giá vé tháng, £15 là tổng số tiền cho cả tuần.`
        },

        // Transcript with highlightable spans
        transcript: `
            <p><strong>Man:</strong> Hello, everyone. I'm delighted you've chosen to do this one-week singing course. Before we start, I'll give you some important information.</p>
            <p>First of all, your teachers. As you know, we're running classes in two different singing styles and each has its own teacher. The jazz course will be taught by Robert Park – some of you will remember him from last year. <span class="highlightable" data-q="14">And Susan Brokley will teach you to sing songs from famous musicals. Her surname's spelt B-R-O-K-L-E-Y.</span></p>
            <p><span class="highlightable" data-q="15">The course highlight is the concert for family and friends on Friday. It'll begin at half past eight</span>, but if your guests want to get the best seats to watch you, theatre doors open at eight o'clock.</p>
            <p><span class="highlightable" data-q="16">On the night of the concert, we want you to feel relaxed – T-shirts are fine – but we ask that they're blue so everyone looks similar.</span> The traditional colour for concerts is black, of course, but we think that's a bit dark. You'll enjoy performing I'm sure.</p>
            <p>Now for some other information. To find your way around the building, you can always ask your teachers or the security guard, if you need help. <span class="highlightable" data-q="17">There's also a map showing where all the rooms are, which you can get from the receptionist.</span> I'll introduce you in a moment.</p>
            <p>The lunch break will be at 1pm! We don't have a café, I'm afraid. There's a kitchen for preparing food, but there's nowhere to sit and eat there. <span class="highlightable" data-q="18">So, take your sandwiches or whatever to the hall</span> – much nicer, with a view of the garden next door.</p>
            <p><span class="highlightable" data-q="19">If anyone's using the public car park, there's a charge. A monthly pass costs £20. As you're only here for a week, it's cheaper to pay daily, which is £3</span>, so that'll only cost you £15 in total. OK? So, any questions?</p>
            <p><em>(Now listen again.)</em></p>
            <p style="color:#666;">That is the end of Part Three.</p>
        `,

        // Template for fill-in-the-blank questions
        template: `
            <p><strong>Teachers</strong></p>
            <p>Jazz: Robert Park</p>
            <p>Songs from musicals: <span class="question-number">(14)</span> Susan <span class="blank-line"><input class="fill-input" id="q14"> <span class="eye-icon" data-question="14">👁️</span></span></p>

            <p><strong>Concert</strong></p>
            <p>When: Friday, at <span class="question-number">(15)</span> <span class="blank-line"><input class="fill-input" id="q15"> <span class="eye-icon" data-question="15">👁️</span></span> p.m.</p>
            <p>Colour of clothes: <span class="question-number">(16)</span> <span class="blank-line"><input class="fill-input" id="q16"> <span class="eye-icon" data-question="16">👁️</span></span></p>

            <p><strong>Other general information</strong></p>
            <p>Map of building: available from the <span class="question-number">(17)</span> <span class="blank-line"><input class="fill-input" id="q17"> <span class="eye-icon" data-question="17">👁️</span></span></p>
            <p>Lunch: eat in the <span class="question-number">(18)</span> <span class="blank-line"><input class="fill-input" id="q18"> <span class="eye-icon" data-question="18">👁️</span></span></p>
            <p>Car park: costs £ <span class="question-number">(19)</span> <span class="blank-line"><input class="fill-input" id="q19"> <span class="eye-icon" data-question="19">👁️</span></span> per day</p>
        `,

        // Questions array for navigation (required by ListeningCore)
        questions: [
            { num: 14 },
            { num: 15 },
            { num: 16 },
            { num: 17 },
            { num: 18 },
            { num: 19 }
        ]
    };

    // Initialize the listening test when DOM is loaded
    document.addEventListener('DOMContentLoaded', function() {
        window.listeningCore = new ListeningCore();
        window.listeningCore.initializeTest(pet1Test1Part3Data);
        console.log('PET 1 Test 1 Part 3 loaded with core listening engine');
    });
</script>
</body>
</html>
