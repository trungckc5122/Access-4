<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PET 3 - Test 1 - Part 3</title>
    <link rel="stylesheet" href="listening-pet-common.css" id="styleLink">
</head>
<body>
<div class="test-wrapper" id="testWrapper">
    <div class="ielts-header">
        <div class="brand">
            <div class="ielts-logo">PET</div>
            <div class="candidate"></div>
            <div class="audio-controls">
                <audio id="listeningAudio" controls>
                    <source src="audio/B1 Preliminary 3 - Test 1 Part 3.mp3" type="audio/mpeg">
                    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg">
                </audio>
                <select class="speed-select" id="speedSelect">
                    <option value="0.7">0.7x</option>
                    <option value="0.9">0.9x</option>
                    <option value="1.0" selected>1x</option>
                    <option value="1.1">1.1x</option>
                    <option value="1.25">1.25x</option>
                </select>
                <span class="volume-icon">🔊</span>
            </div>
        </div>

</div>

    <div class="question-nav">
        
        <div class="nav-buttons" id="navButtons"></div>
    </div>

    <div class="main-area" id="mainArea">
        <div class="transcript-panel" id="transcriptPanel">
            <div class="panel-header"><span>TRANSCRIPT</span></div>
            <div class="transcript-content font-large" id="transcriptContent"></div>
        </div>
        <div class="resizer" id="resizer"></div>
        <div class="questions-panel" id="questionsPanel">
            <div class="panel-header">
                <span>QUESTIONS 14-19</span>
                <span class="answer-badge" id="answeredCount">0/6 answered</span>
            </div>
            <div class="questions-list font-large" id="questionsContent"><div class="notes-box" id="questionsContainer"></div></div>
        </div>
    </div>

    <div class="bottom-bar">
        <button class="btn btn-primary" id="submitBtn">Nộp bài</button>
        <button class="btn btn-success" id="explainBtn" disabled>Xem giải thích</button>
        <button class="btn btn-danger" id="resetBtn">Reset tất cả</button>
        <div class="progress" id="progressDisplay">Đã làm: 0/6</div>
    </div>

    <div class="explanation-panel" id="explanationPanel">
        <div class="resize-handle" id="explanationResizer"></div>
        <div class="explanation-header">
            <span id="explanationTitle">Giải thích</span>
            <span class="close-btn" id="closeExplanation">✕ Đóng</span>
        </div>
        <div class="explanation-content" id="explanationText"></div>
    </div>
</div>

<div class="context-menu" id="contextMenu">
    <div onclick="applyHighlight('yellow')">Highlight vàng</div>
    <div onclick="applyHighlight('green')">Highlight xanh lá</div>
    <div onclick="applyHighlight('pink')">Highlight hồng</div>
    <div onclick="removeHighlight()">Xóa highlight</div>
</div>

<script src="core-listening.js"></script>
<script>
const pet3Test1Part3Data = {
    title: "B1 Preliminary 3 · Test 1 · Part 3",
    type: "fill-blank",
    part: 3,
    book: 3,
    test: 1,

    answerKey: {
        q14: ['Bridge House'],
        q15: ['7.80', '7.8'],
        q16: ['watch'],
        q17: ['blue'],
        q18: ['shoulder', 'shoulders'],
        q19: ['wesleigh', 'Wesleigh', 'WESLEIGH']
    },
    displayAnswers: {
        q14: 'Bridge House',
        q15: '7.80',
        q16: 'watch',
        q17: 'blue',
        q18: 'shoulder(s)',
        q19: 'wesleigh'
    },

    detailedExplanations: {
        q14: `<strong>Đáp án: Bridge House</strong><br>
              Ben nói: <em>"<span class='keyword-highlight'>My visit was to another climbing centre called Bridge House</span>."</em> Tên trung tâm leo núi là Bridge House.<br><br>
              <strong>Lưu ý:</strong> Đây là tên riêng cần viết đúng chính tả.<br>
              <strong>✓ Bridge House là đáp án đúng.</strong>`,

        q15: `<strong>Đáp án: 7.80</strong><br>
              Ben nói: <em>"<span class='keyword-highlight'>you can book a standard session, lasting a couple of hours, which is what we did. That was seven pounds eighty</span>."</em> Phiên 2 giờ giá £7.80.<br><br>
              <strong>✗ 9.50 sai:</strong> Đây là giá phiên 3 giờ.<br>
              <strong>✗ 20.70 sai:</strong> Đây là giá thành viên 1 tháng.<br>

              <strong>✗ Purple sai:</strong> Màu tím là cấp độ sau màu xanh.<br>

              <strong>✓ Shoulder(s) là đáp án đúng.</strong>`,

              <strong>Lưu ý:</strong> Đánh vần W-E-S-L-E-I-G-H.<br>
              <strong>✓ wesleigh là đáp án đúng.</strong>`
    },

    transcript: `
        <p><em>Now look at Part Three. For each question, write the correct answer in the gap. Write one or two words or a number or a date or a time. Look at questions 14 to 19 now. You have 20 seconds. You will hear a boy called Ben giving a class talk about an indoor climbing centre he went to.</em></p>
        <hr style="margin:10px 0; border-color:#d2cbbc;">
        <p><strong>Ben:</strong> Hi, I'm Ben and I'd like to tell you about a climbing centre. If you're into climbing, I expect you know the Castle Sports Centre in the middle of town. <span class="highlightable" data-q="14">My visit was to another climbing centre called Bridge House.</span> It's by the river and it's really good.</p>
        <p>My dad took me there at the weekend and now we're thinking about becoming members. There are different prices. A month's membership is twenty pounds seventy, or <span class="highlightable" data-q="15">you can book a standard session, lasting a couple of hours, which is what we did. That was seven pounds eighty.</span> For nine pounds fifty you can get a session of three hours.</p>
        <p>All equipment's provided, including special climbing shoes. I wanted to wear my own trainers and they let me, but <span class="highlightable" data-q="16">I had to leave my watch in a locker.</span> They said it's dangerous to have things like that on. Every climber gets given a helmet to wear too.</p>
        <p>The walls have different colours depending on your climbing level. I can't wait to get to the expert one. That's red. <span class="highlightable" data-q="17">I had to go on the blue one</span> because it was my first time. That's the one for people who are new to it, but I soon got onto the purple one. And there's a green one after that. They get more and more difficult.</p>
        <p>It's easy to hurt yourself if you don't follow the instructors. Having strong arms helps. Personally, <span class="highlightable" data-q="18">my shoulders were really sore</span> by the time I got home. I thought I'd have problems with my hands, but they were fine.</p>
        <p>So where is this place? <span class="highlightable" data-q="19">The address is number 50, Wesleigh Road</span>, that's spelt W-E-S-L-E-I-G-H. It's easy to find and it's got a covered area to leave your bike if you want to cycle there.</p>
        <p>Now, any questions?</p>
        <p><em>Now listen again.</em><br><em>That is the end of Part Three.</em></p>
    `,

        <p>The address of the climbing centre is 50 <span class="question-number">(19)</span> <span class="blank-line"><input class="fill-input" id="q19"></span> Road.</p>

    ]
};

    window.listeningCore = new ListeningCore();
    window.listeningCore.initializeTest(pet3Test1Part3Data);
});
</script>
