<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PET 1 - Test 1 - Part 1</title>
    <link rel="stylesheet" href="listening-pet-common.css" id="styleLink">
</head>
<body>
    <div class="test-wrapper" id="testWrapper">
        <!-- Header -->
        <div class="ielts-header">
            <div class="brand">
                <div class="ielts-logo">PET</div>
                <div class="candidate">B1 Preliminary 1 · Test 1 · Part 1</div>
                <div class="audio-controls">
                    <audio id="listeningAudio" controls>
                        <source src="audio/B1 Preliminary 1 - Test 1 Part 1.mp3" type="audio/mpeg">
                        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg">
                    </audio>
                    <select class="speed-select" id="speedSelect">
                        <option value="0.7">0.7x</option>
                        <option value="0.9">0.9x</option>
                        <option value="1.0" selected>1x</option>
                        <option value="1.1">1.1x</option>
                        <option value="1.25">1.25x</option>
                    </select>
                    <span class="volume-icon">🔊</span>
                </div>
            </div>
            <div class="font-controls">
                <button class="font-btn" id="fontSmall">A-</button>
                <button class="font-btn" id="fontMedium">A</button>
                <button class="font-btn active" id="fontLarge">A+</button>
            </div>
            <button class="theme-toggle-btn" id="themeToggle" title="Chuyển đổi Dark/Light mode">
                <span class="icon-moon">🌙</span>
                <span class="icon-sun">☀️</span>
            </button>
        </div>

        <!-- Question navigator (1-7) -->
        <div class="question-nav">
            <span style="font-weight:600; color:#1e3a5f;">Câu 1-7:</span>
            <div class="nav-buttons" id="navButtons"></div>
        </div>

        <!-- Main area -->
        <div class="main-area" id="mainArea">
            <!-- Transcript panel (ẩn ban đầu) -->
            <div class="transcript-panel" id="transcriptPanel">
                <div class="panel-header">
                    <span>TRANSCRIPT</span>
                </div>
                <div class="transcript-content font-large" id="transcriptContent"></div>
            </div>
            <div class="resizer" id="resizer"></div>

            <!-- Questions panel -->
            <div class="questions-panel" id="questionsPanel">
                <div class="panel-header">
                    <span>QUESTIONS 1-7</span>
                    <span class="answer-badge" id="answeredCount">0/7 answered</span>
                </div>
                <div class="questions-list font-large centered" id="questionsContent">
                    <div>
                        <h3>PART 1 Questions 1-7</h3>
                        <p><em>Choose the correct answer (A, B or C).</em></p>
                        <div class="notes-box" id="questionsContainer"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Bottom bar -->
        <div class="bottom-bar">
            <button class="btn btn-primary" id="submitBtn">Nộp bài</button>
            <button class="btn btn-success" id="explainBtn" disabled>Xem giải thích</button>
            <button class="btn btn-danger" id="resetBtn">Reset tất cả</button>
            <div class="progress" id="progressDisplay">Đã làm: 0/7</div>
        </div>

        <!-- Explanation panel -->
        <div class="explanation-panel" id="explanationPanel">
            <div class="resize-handle" id="explanationResizer"></div>
            <div class="explanation-header">
                <span id="explanationTitle">Giải thích</span>
                <span class="close-btn" id="closeExplanation">✕ Đóng</span>
            </div>
            <div class="explanation-content" id="explanationText"></div>
        </div>
    </div>

    <!-- Context menu for manual highlighting -->
    <div class="context-menu" id="contextMenu">
        <div onclick="applyHighlight('yellow')">Highlight vàng</div>
        <div onclick="applyHighlight('green')">Highlight xanh lá</div>
        <div onclick="applyHighlight('pink')">Highlight hồng</div>
        <div onclick="removeHighlight()">Xóa highlight</div>
    </div>

    <!-- Core Listening Engine -->
    <script src="core-listening.js"></script>
    
    <script>
        // Test Data for PET 1 Test 1 Part 1
        const pet1Test1Part1Data = {
            title: "B1 Preliminary 1 · Test 1 · Part 1",
            type: "multiple-choice",
            part: 1,
            book: 1,
            test: 1,
            
            // Answer Key
            answerKey: {
                q1: 'B',
                q2: 'B',
                q3: 'A',
                q4: 'C',
                q5: 'A',
                q6: 'A',
                q7: 'B'
            },

            // Display Answers
            displayAnswers: {
                q1: 'B',
                q2: 'B',
                q3: 'A',
                q4: 'C',
                q5: 'A',
                q6: 'A',
                q7: 'B'
            },

            // Detailed Explanations
            detailedExplanations: {
                q1: `<strong>Đáp án: B (in the waiting room)</strong><br>
                  Người đàn ông nói: <em>"I remember putting my wallet down. I probably left it there"</em> – "there" là phòng chờ (waiting room). 
                  <br><br>
                  <strong>✗ A (on the train) không đúng:</strong> Anh ấy không đề cập đến việc để ví trên tàu, chỉ nói xuống từ chuyến tàu 11.20 và chạy đi bắt chuyến tàu tiếp theo.
                  <br>
                  <strong>✗ C (at the sandwich shop) không đúng:</strong> Anh ấy nói có mua sandwich nên lúc đó vẫn còn ví ("I bought some sandwiches so I had my wallet then").
                  <br>
                  <strong>✓ B (in the waiting room) là nơi anh ấy nghĩ đã để quên.</strong>`,

                q2: `<strong>Đáp án: B (wild flowers in parks and gardens)</strong><br>
                  Người phụ nữ nói về bài nói chuyện ngày mai: <em>"This one'll deal with something closer to home – wild flowers in parks and gardens."</em>
                  <br><br>
                  <strong>✗ A (rainforests) không đúng:</strong> Bài nói về rừng nhiệt đới sẽ diễn ra vào tháng sau ("there's a talk on that next month").
                  <br>
                  <strong>✗ C (rivers and plants) không đúng:</strong> Đây là chủ đề của bài nói chuyện trước đó ("the last one on rivers and the plants around them").
                  <br>
                  <strong>✓ B (wild flowers in parks and gardens) là chủ đề ngày mai.</strong>`,

                q3: `<strong>Đáp án: A (salad)</strong><br>
                  Sau khi biết mọi món đều kèm bánh mì, người phụ nữ quyết định: <em>"In that case, I'll go for my usual choice."</em> mà trước đó người đàn ông nói lựa chọn thường xuyên của cô là salad ("You normally have salad for lunch, don't you?").
                  <br><br>
                  <strong>✗ B (tomato soup) không đúng:</strong> Đây là món người đàn ông chọn ("I'm going to try the soup"). Cô ấy chỉ mới cân nhắc trước đó.
                  <br>
                  <strong>✗ C (cheese and tomato sandwich) không đúng:</strong> Cô ấy có nghĩ đến nhưng cuối cùng đã chọn "usual choice" (salad).
                  <br>
                  <strong>✓ A (salad) là món cô ấy gọi.</strong>`,

                q4: `<strong>Đáp án: C (on the radio)</strong><br>
                  Người phụ nữ nói: <em>"according to what I heard on the radio, it's only on for a couple of days"</em>. Cô ấy biết thông tin từ radio.
                  <br><br>
                  <strong>✗ A (on the gallery's website) không đúng:</strong> Cô ấy xem trang web nhưng không thấy nhắc đến ("I was looking at the gallery's website recently and I didn't see anything about it").
                  <br>
                  <strong>✗ B (from posters) không đúng:</strong> Cô ấy ngạc nhiên vì họ không quảng cáo trên các áp phích quanh thị trấn ("I'm surprised they haven't advertised it more on posters around town either").
                  <br>
                  <strong>✓ C (on the radio) là nguồn thông tin của cô ấy.</strong>`,

                q5: `<strong>Đáp án: A (security guard)</strong><br>
                  Người phụ nữ kể về công việc của anh trai: <em>"they only needed a security guard for the shop. So he was given that job instead."</em>
                  <br><br>
                  <strong>✗ B (shop assistant) không đúng:</strong> Anh trai cô ấy muốn làm công việc này nhưng họ chỉ cần bảo vệ.
                  <br>
                  <strong>✗ C (designer) không đúng:</strong> Từ "designer" được dùng để chỉ quần áo("designer clothes place", "designer clothes") bán trong cửa hàng, không phải công việc của anh ấy.
                  <br>
                  <strong>✓ A (security guard) là công việc anh ấy nhận được.</strong>`,

                q6: `<strong>Đáp án: A (by car)</strong><br>
                  Người phụ nữ quyết định: <em>"It'll be quicker to rush home and get my own car rather than wait for a taxi."</em>
                  <br><br>
                  <strong>✗ B (by taxi) không đúng:</strong> Cô ấy định bắt taxi nhưng hàng đợi quá dài ("I tried to get a cab, but the queue at the station was so long").
                  <br>
                  <strong>✗ C (by train) không đúng:</strong> Chuyến tàu của cô ấy đã bị hủy ("They've cancelled my train").
                  <br>
                  <strong>✓ A (by car) là cách cô ấy đi tới cuộc họp.</strong>`,

                q7: `<strong>Đáp án: B (ice-hockey)</strong><br>
                  Người đàn ông nói về ice-hockey: <em>"It's too fast, though, and I gave it up in the end."</em>
                  <br><br>
                  <strong>✗ A (skiing) không đúng:</strong> Anh ấy nói môn này đáng sợ nhưng thú vị nên vẫn tiếp tục thích ("I just can't get enough of it").
                  <br>
                  <strong>✗ C (snow-boarding) không đúng:</strong> Anh ấy mất thời gian để học và giờ thấy khó để dừng lại, tức là vẫn đang chơi ("now I find it hard to stop!").
                  <br>
                  <strong>✓ B (ice-hockey) là môn anh ấy đã ngừng chơi.</strong>`
            },

            // Transcript with highlightable spans
            transcript: `
            <p><strong>Question 1</strong><br>
            <strong>Man:</strong> Hello, my name's Joe Smith. I'm ringing because I lost my black leather wallet on Monday. I got off the eleven twenty train from Reading and went to the shop at the end of platform two. I bought some sandwiches so I had my wallet then. Afterwards I went to sit in the waiting room. <span class="highlightable" data-q="1">I remember putting my wallet down. I probably left it there</span> because my next train arrived, so I hurried off to get it. If it's handed in, please can you contact me on 07577886.</p>

            <p><strong>Question 2</strong><br>
            <strong>Woman:</strong> Do you fancy coming along to tomorrow's Nature Society talk?<br>
            <strong>Man:</strong> Yeah, the last one on rivers and the plants around them was very good, wasn't it?<br>
            <strong>Woman:</strong> Well, you'll like the next topic too. It's something you're interested in.<br>
            <strong>Man:</strong> Ah - so it's about rainforests then?<br>
            <strong>Woman:</strong> I knew you'd think that - actually there's a talk on that next month. <span class="highlightable" data-q="2">This one'll deal with something closer to home - wild flowers in parks and gardens.</span><br>
            <strong>Man:</strong> Oh, OK. Not as interesting as jungle wildlife but it still sounds worth going to.</p>

            <p><strong>Question 3</strong><br>
            <strong>Woman:</strong> The menu looks good, doesn't it?<br>
            <strong>Man:</strong> Yes. Have you decided what you're going to order? <span class="highlightable" data-q="3">You normally have salad for lunch, don't you?</span><br>
            <strong>Woman:</strong> Yes, I was thinking I might have the tomato soup, or maybe a toasted cheese and tomato sandwich. They both sound nice and I've heard the bread here's really good. They bake it themselves.<br>
            <strong>Man:</strong> Look, it says everything on the lunchtime menu comes with fresh bread.<br>
            <strong>Woman:</strong> In that case, <span class="highlightable" data-q="3">I'll go for my usual choice.</span><br>
            <strong>Man:</strong> OK, well, I'm going to try the soup.</p>

            <p><strong>Question 4</strong><br>
            <strong>Woman:</strong> Hi Jack. Did you know there's an interesting new exhibition on at the local art gallery? I was looking at the gallery's website recently and I didn't see anything about it. I'm surprised they haven't advertised it more on posters around town either. Anyway, <span class="highlightable" data-q="4">according to what I heard on the radio, it's only on for a couple of days</span> and I think it'll be really popular. I can book tickets online, if you're interested. Let me know as soon as you can.</p>

            <p><strong>Question 5</strong><br>
            <strong>Woman:</strong> Did I tell you my brother's working at Scooter - that new designer clothes place in town? You know, the one that sells really original jeans and T-shirts?<br>
            <strong>Man:</strong> I'm quite jealous! I'd like to work there as a shop assistant myself.<br>
            <strong>Woman:</strong> Well, in fact, he wanted to do that, but they only needed a security guard for the shop. So <span class="highlightable" data-q="5">he was given that job instead.</span> He's pleased - and he gets a great discount on all those amazing designer clothes!<br>
            <strong>Man:</strong> Cool!</p>

            <p><strong>Question 6</strong><br>
            <strong>Woman:</strong> Hi Brian. This is Amanda, Amanda Smith. I'm calling to let you know that I might be a little late for our meeting. They've cancelled my train. It's really annoying actually as the train's the fastest way to get into town. I tried to get a cab, but the queue at the station was so long. <span class="highlightable" data-q="6">It'll be quicker to rush home and get my own car rather than wait for a taxi.</span> So I'll see you soon, hopefully.</p>

            <p><strong>Question 7</strong><br>
            <strong>Woman:</strong> You're doing lots of winter sports this year, aren't you?<br>
            <strong>Man:</strong> That's right. Snow-boarding's been a first-time experience for me. It's taken me a while to learn, but now I find it hard to stop!<br>
            <strong>Woman:</strong> What else have you tried?<br>
            <strong>Man:</strong> Ice-hockey too - I've always enjoyed watching it. It's too fast, though, and <span class="highlightable" data-q="7">I gave it up in the end.</span> Skiing's a bit scary but it's so exciting that I just can't get enough of it. It's a shame it's such an expensive sport to do.<br>
            <strong>Woman:</strong> Yes, I know.</p>

            <p><em>Now listen again.</em></p>
            <p style="color:#666;">That is the end of Part One.</p>
            `,

            // Questions Data
            questions: [
                { num: 1, text: "Where does the man think he left his wallet?", options: ["on the train", "in the waiting room", "at the sandwich shop"] },
                { num: 2, text: "What is tomorrow's talk at the Nature Society about?", options: ["rainforests", "wild flowers in parks and gardens", "rivers and plants"] },
                { num: 3, text: "What will the woman order for lunch?", options: ["salad", "tomato soup", "cheese and tomato sandwich"] },
                { num: 4, text: "How did the woman find out about the exhibition?", options: ["on the gallery's website", "from posters", "on the radio"] },
                { num: 5, text: "What is the woman's brother doing?", options: ["security guard", "shop assistant", "designer"] },
                { num: 6, text: "How will the woman travel to her meeting?", options: ["by car", "by taxi", "by train"] },
                { num: 7, text: "Which sport has the man stopped doing?", options: ["skiing", "ice-hockey", "snow-boarding"] }
            ]
        };

        // Initialize the listening test when DOM is loaded
        document.addEventListener('DOMContentLoaded', function() {
            window.listeningCore = new ListeningCore();
            window.listeningCore.initializeTest(pet1Test1Part1Data);
            console.log('PET 1 Test 1 Part 1 loaded with core listening engine');
        });
    </script>
</body>
</html>
