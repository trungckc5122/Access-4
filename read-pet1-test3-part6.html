<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>PET 1 - Test 3 - Reading Part 6</title>
    <style>
        /* ========== FULL WIDTH + SPLIT SCREEN ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }

        body {
            background: #1a1a2a;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .test-wrapper {
            width: 100%;
            max-width: 1600px;
            background: #f5f3ee;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .test-wrapper.reading-mode {
            background: #f8f5e6;
        }
        .test-wrapper.reading-mode .left-col,
        .test-wrapper.reading-mode .right-col {
            background: #fffaf0;
        }

        /* Header */
        .ielts-header {
            background: #1e3a5f;
            color: white;
            padding: 8px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #e6b422;
            flex-wrap: wrap;
        }
        .brand {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        .ielts-logo {
            background: #e6b422;
            color: #1e3a5f;
            font-weight: 800;
            font-size: 24px;
            padding: 4px 18px;
            border-radius: 40px;
        }
        .candidate {
            background: #2d4b77;
            padding: 4px 16px;
            border-radius: 30px;
            font-size: 14px;
        }
        .reading-mode-toggle {
            display: flex;
            align-items: center;
            gap: 5px;
            background: #2d4b77;
            padding: 3px 8px;
            border-radius: 30px;
            cursor: pointer;
        }
        .toggle-switch {
            width: 40px;
            height: 20px;
            background: #0f2a44;
            border-radius: 20px;
            position: relative;
            transition: 0.3s;
            border: 1px solid #e6b422;
        }
        .toggle-switch.active {
            background: #e6b422;
        }
        .toggle-switch::after {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            background: white;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: 0.3s;
        }
        .toggle-switch.active::after {
            left: 22px;
        }
        .toggle-label {
            font-size: 11px;
            font-weight: 500;
        }
        .font-controls {
            display: flex;
            gap: 5px;
            background: #2d4b77;
            padding: 3px;
            border-radius: 30px;
        }
        .font-btn {
            width: 32px; height: 32px;
            border-radius: 50%;
            border: none;
            background: transparent;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        .font-btn:hover { background: #3e5f8a; }
        .font-btn.active { background: #e6b422; color: #1e3a5f; }

        /* Navigation */
        .question-nav {
            background: #d2cbbc;
            padding: 6px 20px;
            border-bottom: 2px solid #b0aa9a;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .nav-buttons { display: flex; gap: 8px; flex-wrap: wrap; }
        .nav-btn {
            width: 36px; height: 36px;
            border-radius: 8px;
            border: 2px solid #1e3a5f;
            background: white;
            color: #1e3a5f;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
        }
        .nav-btn:hover { background: #e6b422; }
        .nav-btn.answered { background: #4CAF50; color: white; border-color: #2e7d32; }
        .nav-btn.unanswered { background: #e0e0e0; color: #757575; border-color: #9e9e9e; }
        .nav-btn.active { border: 3px solid #e6b422; transform: scale(1.02); }

        /* Main layout */
        .main-area {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .split-container {
            display: flex;
            flex: 1;
            gap: 0;
            align-items: flex-start;
        }
        .left-col {
            flex: 1.2;
            padding: 24px 30px;
            overflow-y: auto;
        }
        .right-col {
            flex: 0.8;
            background: #fefcf7;
            border-left: 2px solid #d4c5ad;
            padding: 24px 20px;
            position: sticky;
            top: 20px;
            align-self: flex-start;
            max-height: calc(100vh - 100px);
            overflow-y: auto;
        }
        .right-col.show {
            display: block;
        }
        /* Single column (initial) */
        .single-col {
            padding: 24px 40px;
        }

        /* Reading card */
        .reading-card {
            background: #fefcf7;
            border-left: 5px solid #e6b422;
            padding: 28px 40px;
            border-radius: 14px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }
        .reading-card .review-title {
            font-weight: 800;
            font-size: 1.5rem;
            color: #1e3a5f;
            margin-bottom: 20px;
            text-align: center;
        }
        .reading-card p {
            margin: 16px 0;
            line-height: 1.7;
            font-size: 1.05rem;
        }

        /* Instructions block */
        .part-header {
            background: #eae4d4;
            padding: 12px 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        .part-header h3 {
            color: #1e3a5f;
            font-size: 1.3rem;
            margin-bottom: 6px;
        }
        .part-header p {
            color: #4a3a2a;
            font-style: italic;
            font-size: 0.95rem;
        }

        /* Input fields */
        .gap-input {
            display: inline-block;
            width: auto;
            min-width: 100px;
            background: #fffef5;
            border: 2px solid #d4c5ad;
            border-radius: 24px;
            padding: 5px 14px;
            font-size: 1rem;
            font-weight: 500;
            text-align: center;
            font-family: inherit;
            transition: 0.2s;
            margin: 0 4px;
        }
        .gap-input:focus {
            outline: none;
            border-color: #e6b422;
            background: #fff7e0;
        }
        .gap-input.correct {
            background: #e8f5e8;
            border-color: #4CAF50;
        }
        .gap-input.incorrect {
            background: #ffebee;
            border-color: #f44336;
        }
        .input-wrapper {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            vertical-align: middle;
            position: relative;
        }
        .eye-icon {
            cursor: pointer;
            font-size: 1.2rem;
            opacity: 0.7;
            transition: 0.2s;
            display: none;
            line-height: 1;
        }
        .eye-icon:hover {
            opacity: 1;
            color: #e6b422;
        }

        /* Badge */
        .correct-answer-badge {
            display: none;
            background: #4CAF50;
            color: white;
            padding: 2px 10px;
            border-radius: 16px;
            font-size: 12px;
            font-weight: bold;
            margin-left: 10px;
            white-space: nowrap;
        }

        /* Explanation inside right column */
        .explanation-header {
            font-weight: 700;
            color: #1e3a5f;
            font-size: 1.1rem;
            margin-bottom: 15px;
            border-bottom: 2px solid #e6b422;
            padding-bottom: 8px;
        }
        .explanation-content {
            font-size: 1rem;
            color: #2c3e50;
            line-height: 1.6;
        }
        .answer-feedback {
            margin-top: 15px;
            padding: 10px;
            border-radius: 10px;
        }
        .answer-feedback.correct {
            background: #e8f5e8;
            border-left: 4px solid #4CAF50;
        }
        .answer-feedback.incorrect {
            background: #ffebee;
            border-left: 4px solid #f44336;
        }
        .close-explanation-btn {
            cursor: pointer;
            float: right;
            color: #666;
        }
        .close-explanation-btn:hover {
            color: #1e3a5f;
        }

        /* Bottom bar */
        .bottom-bar {
            background: #d2cbbc;
            padding: 12px 24px;
            display: flex;
            gap: 20px;
            border-top: 1px solid #b0aa9a;
            align-items: center;
            flex-wrap: wrap;
        }
        .btn {
            padding: 8px 28px;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            font-size: 15px;
        }
        .btn-primary { background: #1e3a5f; color: white; }
        .btn-primary:disabled { background: #9aaec2; cursor: not-allowed; }
        .btn-success { background: #4CAF50; color: white; }
        .btn-success:disabled { background: #a5d6a7; }
        .btn-danger { background: #f44336; color: white; }
        .progress { background: white; border-radius: 30px; padding: 5px 18px; font-weight: 600; }

        /* Context menu */
        .context-menu {
            position: fixed;
            background: white;
            border: 1px solid #9a8c7a;
            box-shadow: 2px 2px 12px rgba(0,0,0,0.2);
            padding: 6px 0;
            border-radius: 10px;
            z-index: 1000;
            display: none;
            min-width: 160px;
        }
        .context-menu div {
            padding: 8px 20px;
            cursor: pointer;
            font-size: 14px;
        }
        .context-menu div:hover { background: #1e3a5f; color: white; }

        /* Highlight styles */
        .highlight-yellow { background-color: #f9e79f; border-radius: 4px; padding: 0 2px; }
        .highlight-green { background-color: #a9d6b0; border-radius: 4px; padding: 0 2px; }
        .highlight-pink { background-color: #fbb9c0; border-radius: 4px; padding: 0 2px; }

        /* Font size sizes */
        .font-small .reading-card,
        .font-small .gap-input,
        .font-small .review-title,
        .font-small .explanation-content,
        .font-small .part-header {
            font-size: 13px;
        }
        .font-medium .reading-card,
        .font-medium .gap-input,
        .font-medium .review-title,
        .font-medium .explanation-content,
        .font-medium .part-header {
            font-size: 16px;
        }
        .font-large .reading-card,
        .font-large .gap-input,
        .font-large .review-title,
        .font-large .explanation-content,
        .font-large .part-header {
            font-size: 18px;
        }
    </style>
</head>
<body>
<div class="test-wrapper" id="testWrapper">
    <div class="ielts-header">
        <div class="brand">
            <div class="ielts-logo">PET</div>
            <div class="candidate">B1 Preliminary 1 · Test 3 · Part 6 (Reading)</div>
            <div class="reading-mode-toggle" id="readingModeToggle">
                <div class="toggle-switch" id="toggleSwitch"></div>
                <span class="toggle-label">Đọc sách</span>
            </div>
            <div class="font-controls">
                <button class="font-btn" id="fontSmall">A-</button>
                <button class="font-btn" id="fontMedium">A</button>
                <button class="font-btn active" id="fontLarge">A+</button>
            </div>
        </div>
    </div>

    <div class="question-nav">
        <span style="font-weight:600;">Câu 27 – 32</span>
        <div class="nav-buttons" id="navButtons"></div>
        <span id="answeredCount">0/6 answered</span>
    </div>

    <!-- Main area -->
    <div class="main-area" id="mainArea"></div>

    <div class="bottom-bar">
        <button class="btn btn-primary" id="submitBtn">Nộp bài</button>
        <button class="btn btn-success" id="explainBtn" disabled>Xem giải thích</button>
        <button class="btn btn-danger" id="resetBtn">Reset tất cả</button>
        <div class="progress" id="progressDisplay">Đã làm: 0/6</div>
    </div>

    <div class="context-menu" id="contextMenu">
        <div onclick="applyHighlight('yellow')">Highlight vàng</div>
        <div onclick="applyHighlight('green')">Highlight xanh lá</div>
        <div onclick="applyHighlight('pink')">Highlight hồng</div>
        <div onclick="removeHighlight()">Xóa highlight</div>
    </div>

    <script>
        (function() {
            // ---------- ANSWER KEY (Part 6 - Starting at college) ----------
            const answerKey = { 27: ["so"], 28: ["every", "each"], 29: ["if", "when", "whenever"], 30: ["why"], 31: ["about"], 32: ["There"] };
            const displayAnswers = { 27: "so", 28: "every / each", 29: "if / when / whenever", 30: "why", 31: "about", 32: "There" };

            const detailedExplanations = {
                27: `<div><strong>Cấu trúc:</strong> <em>"so + adjective + that"</em> (quá ... đến mức ...).<br>Dịch: "...tôi đã quá lo lắng (so nervous) đến mức tôi thậm chí còn không dám nhờ ai giúp đỡ."</div>`,
                28: `<div><strong>Lượng từ:</strong> <em>"every"</em> hoặc <em>"each"</em> đi kèm với danh từ đếm được số ít (student) để chỉ từng cá nhân trong một nhóm.<br>Dịch: "Hãy nhớ rằng mọi sinh viên (every/each student) tại trường đều từng là người mới..."</div>`,
                29: `<div><strong>Liên từ:</strong> <em>"if"</em> (nếu), <em>"when"</em> (khi) hoặc <em>"whenever"</em> (bất cứ khi nào). Cả 3 từ đều phù hợp về nghĩa để dẫn dắt một tình huống có thể xảy ra.<br>Dịch: "Vì vậy, nếu (if) bạn không chắc chắn nên đi đâu, hãy cứ hỏi..."</div>`,
                30: `<div><strong>Cấu trúc gợi ý:</strong> <em>"Why not + bare infinitive"</em> (tại sao không nhỉ?). Dùng để đưa ra lời khuyên hoặc gợi ý một cách lịch sự.<br>Dịch: "...tại sao không (why not) dành thời gian nghỉ ngơi cùng các bạn cùng lớp..."</div>`,
                31: `<div><strong>Cấu trúc gợi ý:</strong> <em>"How about + V-ing"</em> (Thế còn việc ... thì sao?). Đây là một cách phổ biến khác để đưa ra gợi ý.<br>Dịch: "Hoặc thế còn (how about) việc tham gia một trong nhiều câu lạc bộ ở trường thì sao?"</div>`,
                32: `<div><strong>Cấu trúc tồn tại:</strong> <em>"There are"</em> dùng để chỉ sự hiện diện của một cái gì đó số nhiều (lots).<br>Dịch: "Có (There) rất nhiều sự lựa chọn dành cho bạn."</div>`
            };

            let examSubmitted = false;
            let explanationMode = false;
            let selectedRange = null;
            let currentSplit = false;

            const mainArea = document.getElementById('mainArea');
            const readingCardContent = `
                <div class="reading-card" id="passageCard">
                    <div class="review-title">Starting at college</div>
                    <p>Hi, my name's Emma. Welcome to the college! I've been studying here for a year now.
                        Starting at college isn't easy, but I'm sure you'll soon feel at home. When I first started
                        studying here last year, I was (27) 
                        <span class="input-wrapper">
                            <input type="text" id="q27" class="gap-input" data-q="27" autocomplete="off">
                            <span class="eye-icon" data-q="27">👁️</span>
                        </span>
                        nervous that I couldn't even ask anyone for help. I got lost five times on my first day!
                    </p>

                    <p>Remember that (28) 
                        <span class="input-wrapper">
                            <input type="text" id="q28" class="gap-input" data-q="28" autocomplete="off">
                            <span class="eye-icon" data-q="28">👁️</span>
                        </span>
                        student at the college has been new at one time, and understands how you feel. So (29) 
                        <span class="input-wrapper">
                            <input type="text" id="q29" class="gap-input" data-q="29" autocomplete="off">
                            <span class="eye-icon" data-q="29">👁️</span>
                        </span>
                        you're not sure where to go, just ask - we're all happy to help!
                    </p>

                    <p>You probably don't know many people here. To make some friends, (30) 
                        <span class="input-wrapper">
                            <input type="text" id="q30" class="gap-input" data-q="30" autocomplete="off">
                            <span class="eye-icon" data-q="30">👁️</span>
                        </span>
                        not spend break times with some of your new classmates in the café? Or how (31) 
                        <span class="input-wrapper">
                            <input type="text" id="q31" class="gap-input" data-q="31" autocomplete="off">
                            <span class="eye-icon" data-q="31">👁️</span>
                        </span>
                        joining one of the many clubs we have at the college? (32) 
                        <span class="input-wrapper">
                            <input type="text" id="q32" class="gap-input" data-q="32" autocomplete="off">
                            <span class="eye-icon" data-q="32">👁️</span>
                        </span>
                        are lots to choose from.
                    </p>

                    <p>Good luck on your new course!</p>
                </div>
            `;

            function renderSingleColumn() {
                mainArea.innerHTML = `
                    <div class="single-col">
                        <div class="part-header">
                            <h3>Questions 27–32</h3>
                            <p>For each question, write the correct answer. Write one word for each gap.</p>
                        </div>
                        ${readingCardContent}
                    </div>
                `;
                attachInputEvents();
            }

            function renderSplitColumn() {
                mainArea.innerHTML = `
                    <div class="split-container">
                        <div class="left-col">
                            <div class="part-header">
                                <h3>Questions 27–32</h3>
                                <p>For each question, write the correct answer. Write one word for each gap.</p>
                            </div>
                            ${readingCardContent}
                        </div>
                        <div class="right-col" id="rightCol">
                            <div class="explanation-header">
                                <span>Giải thích</span>
                                <span class="close-explanation-btn" id="closeRightExplain">✕ Đóng</span>
                            </div>
                            <div class="explanation-content" id="rightExplanationText">
                                Nhấn vào biểu tượng con mắt bên cạnh mỗi câu để xem giải thích.
                            </div>
                        </div>
                    </div>
                `;
                attachInputEvents();
                if (explanationMode) {
                    const rightCol = document.getElementById('rightCol');
                    if (rightCol) rightCol.classList.add('show');
                    for (let i = 27; i <= 32; i++) {
                        addBadgeForQuestion(i);
                    }
                    document.querySelectorAll('.correct-answer-badge').forEach(badge => badge.style.display = 'inline-block');
                }
                document.getElementById('closeRightExplain')?.addEventListener('click', () => {
                    const col = document.getElementById('rightCol');
                    if (col) col.classList.remove('show');
                });
            }

            function attachInputEvents() {
                document.querySelectorAll('.gap-input').forEach(inp => {
                    if (examSubmitted) inp.disabled = true;
                    if (examSubmitted) {
                        const val = inp.value.trim().toLowerCase();
                        const correct = isAnswerCorrect(parseInt(inp.dataset.q), val);
                        inp.classList.add(correct ? 'correct' : 'incorrect');
                    }
                    inp.addEventListener('input', () => updateAnswerCount());
                });
                document.querySelectorAll('.eye-icon').forEach(icon => {
                    if (explanationMode || examSubmitted) icon.style.display = 'inline-block';
                    icon.addEventListener('click', (e) => {
                        const q = parseInt(e.currentTarget.dataset.q);
                        showExplanationInRightColumn(q);
                    });
                });
            }

            function getUserAnswer(qNum) {
                const input = document.getElementById(`q${qNum}`);
                return input ? input.value.trim() : "";
            }

            function isAnswerCorrect(qNum, val) {
                const acceptableAnswers = answerKey[qNum];
                return acceptableAnswers.some(ans => ans.toLowerCase() === val.toLowerCase());
            }

            function updateAnswerCount() {
                let answered = 0;
                for (let i = 27; i <= 32; i++) {
                    if (getUserAnswer(i) !== "") answered++;
                }
                document.getElementById('answeredCount').textContent = `${answered}/6 answered`;
                document.getElementById('progressDisplay').textContent = `Đã làm: ${answered}/6`;
                for (let i = 27; i <= 32; i++) {
                    const btn = document.querySelector(`.nav-btn[data-q="${i}"]`);
                    if (btn) {
                        btn.classList.remove('answered', 'unanswered');
                        btn.classList.add(getUserAnswer(i) !== "" ? 'answered' : 'unanswered');
                    }
                }
            }

            function createNavButtons() {
                const nav = document.getElementById('navButtons');
                nav.innerHTML = '';
                for (let i = 27; i <= 32; i++) {
                    const btn = document.createElement('button');
                    btn.className = 'nav-btn unanswered';
                    btn.textContent = i;
                    btn.dataset.q = i;
                    btn.addEventListener('click', () => {
                        const input = document.getElementById(`q${i}`);
                        if (input) {
                            input.scrollIntoView({ behavior: 'smooth', block: 'center' });
                            input.focus();
                        }
                        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                    });
                    nav.appendChild(btn);
                }
            }

            function addBadgeForQuestion(qNum) {
                const input = document.getElementById(`q${qNum}`);
                if (!input) return;
                const wrapper = input.parentNode;
                let existing = wrapper.querySelector('.correct-answer-badge');
                if (existing) existing.remove();
                const badge = document.createElement('span');
                badge.className = 'correct-answer-badge';
                badge.textContent = displayAnswers[qNum];
                if (explanationMode) badge.style.display = 'inline-block';
                wrapper.appendChild(badge);
            }

            function showExplanationInRightColumn(questionNum) {
                if (!explanationMode && !examSubmitted) return;
                if (!currentSplit) {
                    currentSplit = true;
                    const vals = {};
                    for(let i=27; i<=32; i++) vals[i] = getUserAnswer(i);
                    renderSplitColumn();
                    for(let i=27; i<=32; i++) document.getElementById(`q${i}`).value = vals[i];
                }
                const rightCol = document.getElementById('rightCol');
                if (rightCol) rightCol.classList.add('show');
                const explanationDiv = document.getElementById('rightExplanationText');
                if (!explanationDiv) return;
                let html = detailedExplanations[questionNum] || `<strong>Đáp án: ${displayAnswers[questionNum]}</strong>`;
                if (examSubmitted) {
                    const user = getUserAnswer(questionNum) || "(chưa điền)";
                    const correct = isAnswerCorrect(questionNum, user);
                    html += `<div class="answer-feedback ${correct ? 'correct' : 'incorrect'}">`;
                    html += `<strong>Câu trả lời của bạn:</strong> "${user}" ${user ? (correct ? '✓' : '✗') : ''}<br>`;
                    if (!correct) html += `<strong>Đáp án đúng:</strong> ${displayAnswers[questionNum]}`;
                    else html += `Chính xác!`;
                    html += `</div>`;
                }
                explanationDiv.innerHTML = html;
                if (examSubmitted) addBadgeForQuestion(questionNum);
            }

            function resetAll() {
                examSubmitted = false;
                explanationMode = false;
                currentSplit = false;
                renderSingleColumn();
                document.getElementById('submitBtn').disabled = false;
                document.getElementById('submitBtn').textContent = 'Nộp bài';
                document.getElementById('explainBtn').disabled = true;
                document.getElementById('explainBtn').textContent = 'Xem giải thích';
                updateAnswerCount();
            }

            function saveToDashboard() {
                const book = 1, test = 3, part = 6;
                const skill = 'reading';
                const details = [];
                let correctCount = 0;
                for (let i = 27; i <= 32; i++) {
                    const user = getUserAnswer(i);
                    const correct = answerKey[i];
                    const isCor = isAnswerCorrect(i, user);
                    if (isCor) correctCount++;
                    details.push({ question: i, user: user || '(trống)', correct: displayAnswers[i], isCorrect: isCor });
                }
                const partData = { partId: part, name: `Part ${part}`, totalQuestions: details.length, correctCount, details };
                localStorage.setItem(`pet_${skill}_book${book}_test${test}_part${part}`, JSON.stringify(partData));
            }

            document.getElementById('submitBtn').addEventListener('click', () => {
                if (examSubmitted) return;
                let unanswered = [];
                for (let i = 27; i <= 32; i++) if (!getUserAnswer(i)) unanswered.push(i);
                if (unanswered.length > 0 && !confirm(`Bạn còn ${unanswered.length} câu chưa điền. Vẫn nộp bài?`)) return;

                examSubmitted = true;
                for (let i = 27; i <= 32; i++) {
                    const inp = document.getElementById(`q${i}`);
                    const correct = isAnswerCorrect(i, getUserAnswer(i));
                    inp.classList.add(correct ? 'correct' : 'incorrect');
                    inp.disabled = true;
                }
                document.getElementById('submitBtn').disabled = true;
                document.getElementById('submitBtn').textContent = 'Đã nộp bài';
                document.getElementById('explainBtn').disabled = false;
                saveToDashboard();
            });

            document.getElementById('explainBtn').addEventListener('click', () => {
                explanationMode = true;
                document.querySelectorAll('.eye-icon').forEach(icon => icon.style.display = 'inline-block');
                document.getElementById('explainBtn').disabled = true;
                document.getElementById('explainBtn').textContent = 'Đang xem giải thích';
                if (!currentSplit) {
                    currentSplit = true;
                    const vals = {};
                    for(let i=27; i<=32; i++) vals[i] = getUserAnswer(i);
                    renderSplitColumn();
                    for(let i=27; i<=32; i++) document.getElementById(`q${i}`).value = vals[i];
                }
                document.querySelectorAll('.correct-answer-badge').forEach(badge => badge.style.display = 'inline-block');
            });

            document.getElementById('resetBtn').addEventListener('click', () => {
                if (confirm('Reset tất cả câu trả lời?')) resetAll();
            });

            function setFontSize(size) {
                document.querySelectorAll('.font-btn').forEach(btn => btn.classList.remove('active'));
                document.getElementById(`font${size.charAt(0).toUpperCase()+size.slice(1)}`).classList.add('active');
                const wrapper = document.getElementById('testWrapper');
                wrapper.classList.remove('font-small', 'font-medium', 'font-large');
                wrapper.classList.add(`font-${size}`);
            }
            document.getElementById('fontSmall').addEventListener('click', () => setFontSize('small'));
            document.getElementById('fontMedium').addEventListener('click', () => setFontSize('medium'));
            document.getElementById('fontLarge').addEventListener('click', () => setFontSize('large'));

            document.getElementById('readingModeToggle').addEventListener('click', () => {
                document.getElementById('testWrapper').classList.toggle('reading-mode');
                document.getElementById('toggleSwitch').classList.toggle('active');
            });

            document.addEventListener('contextmenu', (e) => {
                const target = e.target.closest('.reading-card');
                if (target) {
                    const sel = window.getSelection();
                    if (sel.toString().trim()) {
                        e.preventDefault();
                        selectedRange = sel.getRangeAt(0);
                        const menu = document.getElementById('contextMenu');
                        menu.style.display = 'block';
                        menu.style.left = (e.pageX) + 'px';
                        menu.style.top = (e.pageY) + 'px';
                    }
                }
            });
            document.addEventListener('click', () => document.getElementById('contextMenu').style.display = 'none');

            window.applyHighlight = (color) => {
                if (selectedRange) {
                    const span = document.createElement('span');
                    span.className = 'highlight-' + color;
                    selectedRange.surroundContents(span);
                    window.getSelection().removeAllRanges();
                    selectedRange = null;
                }
            };
            window.removeHighlight = () => {
                if (selectedRange) {
                    const parent = selectedRange.commonAncestorContainer.parentElement;
                    if (parent && parent.className.startsWith('highlight-')) {
                        parent.replaceWith(parent.textContent);
                    }
                    window.getSelection().removeAllRanges();
                    selectedRange = null;
                }
            };

            // Init
            createNavButtons();
            renderSingleColumn();
            updateAnswerCount();
        })();
    </script>
</div>
</body>
</html>
