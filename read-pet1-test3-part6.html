<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>PET 1 - Test 3 - Reading Part 6</title>
    <link rel="stylesheet" href="reading-pet-common.css" id="styleLink">
</head>
<body>
<div class="test-wrapper" id="testWrapper">
    <div class="ielts-header">
        <div class="brand">
            <div class="ielts-logo">PET</div>
            <div class="candidate">B1 Preliminary 1 · Test 3 · Part 6 (Reading)</div>
            <div class="font-controls">
                <button class="font-btn" id="fontSmall">A-</button>
                <button class="font-btn" id="fontMedium">A</button>
                <button class="font-btn active" id="fontLarge">A+</button>
            </div>
            <div class="mode-toggle" id="modeToggleContainer">
                <span class="mode-label">Hiện đại</span>
                <label class="mode-switch" title="Chuyển đổi chế độ Cổ điển/Hiện đại">
                    <input type="checkbox" id="modeToggle">
                    <span class="mode-slider"></span>
                </label>
                <span class="mode-label">Cổ điển</span>
            </div>
            <button class="theme-toggle-btn" id="themeToggle" title="Chuyển đổi Dark/Light mode">
                <span class="icon-moon">🌙</span>
                <span class="icon-sun">☀️</span>
            </button>
        </div>
    </div>

    <div class="question-nav">
        <span style="font-weight:600;">Câu 27 – 32</span>
        <div class="nav-buttons" id="navButtons"></div>
        <span id="answeredCount" style="font-size:13px; color:#555; margin-left:10px;">0/6 answered</span>
    </div>

    <!-- Main area -->
    <div class="main-area split-layout" id="mainArea"></div>

    <div class="bottom-bar">
        <button class="btn btn-primary" id="submitBtn">Nộp bài</button>
        <button class="btn btn-success" id="explainBtn" disabled>Xem giải thích</button>
        <button class="btn btn-danger" id="resetBtn">Reset tất cả</button>
        <div class="progress" id="progressDisplay">Đã làm: 0/6</div>
    </div>

    <div class="context-menu" id="contextMenu">
        <div onclick="applyHighlight('yellow')">Highlight vàng</div>
        <div onclick="applyHighlight('green')">Highlight xanh lá</div>
        <div onclick="applyHighlight('pink')">Highlight hồng</div>
        <div onclick="removeHighlight()">Xóa highlight</div>
    </div>
</div>

<script src="core-reading.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const testData = {
            type: 'split-layout',
            part: 6,
            answerKey: { q27: ["so"], q28: ["every", "each"], q29: ["if", "when", "whenever"], q30: ["why"], q31: ["about"], q32: ["There"] },
            displayAnswers: { q27: "so", q28: "every / each", q29: "if / when / whenever", q30: "why", q31: "about", q32: "There" },
            detailedExplanations: {
                27: `<div><strong>Cấu trúc:</strong> <em>"so + adjective + that"</em> (quá ... đến mức ...).<br>
                Dịch: "...tôi đã quá lo lắng (so nervous) đến mức tôi thậm chí còn không dám nhờ ai giúp đỡ."</div>`,
                28: `<div><strong>Lượng từ:</strong> <em>"every"</em> hoặc <em>"each"</em> đi kèm với danh từ đếm được số ít (student) để chỉ từng cá nhân trong một nhóm.<br>
                Dịch: "Hãy nhớ rằng mỗi sinh viên (every/each student) tại trường đều từng là người mới..."</div>`,
                29: `<div><strong>Liên từ:</strong> <em>"if"</em> (nếu), <em>"when"</em> (khi) hoặc <em>"whenever"</em> (bất cứ khi nào). Cả 3 từ đều phù hợp về nghĩa.<br>
                Dịch: "Vì vậy, nếu (if) bạn không chắc chắn nên đi đâu, hãy hỏi..."</div>`,
                30: `<div><strong>Cấu trúc gợi ý:</strong> <em>"Why not + bare infinitive"</em> (tại sao không nhỉ?). Dùng để đưa ra lời khuyên.<br>
                Dịch: "...tại sao không (why not) dành thời gian nghỉ ngơi cùng các bạn cùng lớp..."</div>`,
                31: `<div><strong>Cấu trúc gợi ý:</strong> <em>"How about + V-ing"</em> (Thế còn việc ... thì sao?).<br>
                Dịch: "Hoặc thế còn (how about) việc tham gia một trong nhiều câu lạc bộ tại trường thì sao?"</div>`,
                32: `<div><strong>Cấu trúc tồn tại:</strong> <em>"There are"</em> dùng để chỉ sự hiện diện của một cái gì đó số nhiều.<br>
                Dịch: "Có (There) rất nhiều lựa chọn dành cho bạn."</div>`
            },
            template: `
                <div class="reading-card" id="passageCard">
                    <div class="review-title">Starting at college</div>
                    <p>Hi, my name's Emma. Welcome to the college! I've been studying here for a year now.
                        Starting at college isn't easy, but I'm sure you'll soon feel at home. When I first started
                        studying here last year, I was
                        <span class="input-wrapper">
                            <input type="text" id="q27" class="gap-input" data-q="27" autocomplete="off">
                            <span class="eye-icon" data-question="27">👁️</span>
                        </span>
                        nervous that I couldn't even ask anyone for help. I got lost five times on my first day!
                    </p>
                    <p>Remember that
                        <span class="input-wrapper">
                            <input type="text" id="q28" class="gap-input" data-q="28" autocomplete="off">
                            <span class="eye-icon" data-question="28">👁️</span>
                        </span>
                        student at the college has been new at one time, and understands how you feel. So
                        <span class="input-wrapper">
                            <input type="text" id="q29" class="gap-input" data-q="29" autocomplete="off">
                            <span class="eye-icon" data-question="29">👁️</span>
                        </span>
                        you're not sure where to go, just ask someone. We're all friendly here.
                    </p>
                    <p>There are lots of things to do in your free time.
                        <span class="input-wrapper">
                            <input type="text" id="q30" class="gap-input" data-q="30" autocomplete="off">
                            <span class="eye-icon" data-question="30">👁️</span>
                        </span>
                        not spend some time relaxing with your classmates? Or
                        <span class="input-wrapper">
                            <input type="text" id="q31" class="gap-input" data-q="31" autocomplete="off">
                            <span class="eye-icon" data-question="31">👁️</span>
                        </span>
                        joining one of the many clubs at the school?
                        <span class="input-wrapper">
                            <input type="text" id="q32" class="gap-input" data-q="32" autocomplete="off">
                            <span class="eye-icon" data-question="32">👁️</span>
                        </span>
                        are lots of choices for you.
                    </p>
                </div>
            `,
            questions: [
                { num: 27 }, { num: 28 }, { num: 29 }, { num: 30 }, { num: 31 }, { num: 32 }
            ]
        };

        window.readingCore = new ReadingCore();
        window.readingCore.initializeTest(testData);
    });
</script>
</body>
</html>
