            detailedExplanations: {
                q16: `<strong>Đáp án: B – Jen's taken a photo of him (Jen đã chụp ảnh anh ấy)</strong><br>
                      Jen nói: <em>"I've just seen Mikey – my favourite singer!"</em><br>
                      Người đàn ông hỏi: <em>"Wow, Jen, you've been to his concert?"</em><br>
                      Jen đáp: <em>"The tickets were too expensive for me, unfortunately, so I waited outside the theatre."</em><br>
                      Người đàn ông hỏi: <em>"Did you get a chance to speak to him?"</em><br>
                      Jen đáp: <em>"He waved and <span class='keyword-highlight'>I got a picture</span>, but that's all. I shouted hello, but he didn't hear me. He was in a hurry."</em><br><br>
                      <strong>✗ A (Jen's seen him on stage) sai:</strong> Jen nói vé quá đắt nên cô ấy đợi bên ngoài nhà hát, không xem concert.<br>
                      <strong>✗ C (Jen's had a conversation with him) sai:</strong> Cô ấy hét "hello" nhưng anh ấy không nghe thấy ("he didn't hear me").<br>
                      <strong>✓ B (Jen's taken a photo of him) là đúng – Jen đã chụp được ảnh ("I got a picture").</strong>`,

                q17: `<strong>Đáp án: C – He was tired (anh ấy mệt)</strong><br>
                      Người phụ nữ hỏi: <em>"Hi Alex, how was the tennis competition?"</em><br>
                      Alex đáp: <em>"I didn't play very well – <span class='keyword-highlight'>I went to bed really late the night before.</span>"</em><br>
                      Người phụ nữ nói: <em>"It's horrible playing when you don't have enough energy."</em><br>
                      Về đói/khát: Alex nói <em>"I know it's really important to have plenty to eat and drink before a competition."</em> → Anh đã ăn uống đầy đủ.<br><br>
                      <strong>✗ A (He was thirsty) sai:</strong> Alex biết tầm quan trọng của việc uống đủ nước trước thi đấu.<br>
                      <strong>✗ B (He was hungry) sai:</strong> Đây là ví dụ của người phụ nữ về chính mình ("I didn't eat all day"), không phải Alex.<br>
                      <strong>✓ C (He was tired) là đúng – Alex thức khuya nên không đủ năng lượng ("don't have enough energy").</strong>`,

                q18: `<strong>Đáp án: B – Don't visit the museum today (Đừng đi bảo tàng hôm nay)</strong><br>
                      Người phụ nữ hỏi: <em>"What can you tell me about the National Museum? I'd like to go there this afternoon."</em><br>

                      <strong>✗ A (Don't miss a special exhibition) sai:</strong> Ngược lại, triển lãm đặc biệt MIỄN PHÍ vào ngày mai.<br>
                      <strong>✗ C (Don't buy tickets too late) sai:</strong> Không phải lời khuyên trong bài – khuyên không nên mua vé HÔM NAY.<br>
                      <strong>✓ B (Don't visit the museum today) là đúng – hôm nay phải trả tiền, ngày mai miễn phí.</strong>`,

                q19: `<strong>Đáp án: B – play sport (chơi thể thao)</strong><br>
                      Người đàn ông hỏi: <em>"Did you play basketball this weekend, Katy?"</em><br>

                      Về shopping: <em>"No. I had a great time in town with a friend on Saturday morning. I got myself some great new trainers."</em> → Đã đi mua sắm.<br><br>
                      <strong>✗ A (watch TV) sai:</strong> Cô ấy đã xem trận đấu trên TV.<br>
                      <strong>✗ C (go shopping) sai:</strong> Cô ấy đã đi mua sắm ở thị trấn (mua trainers mới).<br>
                      <strong>✓ B (play sport) là đúng – cô ấy KHÔNG chơi basketball vì bị thương chân.</strong>`,

                q20: `<strong>Đáp án: B – turn the heating on (bật lò sưởi)</strong><br>
                      Người đàn ông nói: <em>"Thanks for helping me move in, the apartment's looking great."</em><br>
                      Về furniture: <em>"I'm glad we decided to put the bookcase in the corner. It didn't look right next to the door."</em> → Đã di chuyển nội thất xong.<br>
                      Về sơn: <em>"I'm not sure about the colour of the walls, but I can change that later."</em> → Có thể sơn sau.<br>
                      Về heating: <em>"<span class='keyword-highlight'>It's really cold in here though, so I've got to do something about that immediately.</span>"</em> → Phải xử lý ngay lập tức.<br><br>
                      <strong>✗ A (paint the flat) sai:</strong> Anh ấy nói có thể sơn sau ("change that later").<br>
                      <strong>✗ C (move some furniture) sai:</strong> Đã di chuyển nội thất xong ("put the bookcase in the corner").<br>
                      <strong>✓ B (turn the heating on) là đúng – anh ấy phải làm ngay vì lạnh ("immediately").</strong>`

            transcript: `
            <p><strong>PART 4</strong></p>
            <p><em>For each question, choose the correct answer.</em></p>

            <p><strong>Question 16</strong><br>
            You will hear a woman, Jen, telling her friend about her favourite singer, Mikey. What's just happened?<br>
            <strong>Woman:</strong> I've just seen Mikey – my favourite singer!<br>
            <strong>Man:</strong> Wow, Jen, you've been to his concert?<br>
            <strong>Woman:</strong> The tickets were too expensive for me, unfortunately, so I waited outside the theatre.<br>
            <strong>Man:</strong> Did you get a chance to speak to him?<br>
            <strong>Woman:</strong> <span class="highlightable" data-q="16">He waved and I got a picture, but that's all.</span> I shouted hello, but he didn't hear me. He was in a hurry.</p>

            <p><strong>Question 17</strong><br>
            You will hear a man, Alex, talking to a friend about a tennis competition. Why didn't Alex do well in the competition?<br>
            <strong>Woman:</strong> Hi Alex, how was the tennis competition?<br>
            <strong>Man:</strong> <span class="highlightable" data-q="17">I didn't play very well – I went to bed really late the night before.</span><br>
            <strong>Woman:</strong> It's horrible playing when you don't have enough energy. I remember once I didn't eat all day and then I played a match.<br>
            <strong>Man:</strong> I know it's really important to have plenty to eat and drink before a competition.</p>

            <p><strong>Question 18</strong><br>
            You will hear two people talking at a tourist information centre. What advice does the man give the woman?<br>
            <strong>Woman:</strong> What can you tell me about the National Museum? I'd like to go there this afternoon.<br>
            <strong>Man:</strong> Well, there's always so much going on at the museum. The exhibitions are all worth visiting. <span class="highlightable" data-q="18">But don't spend money on tickets now.</span><br>
            <strong>Woman:</strong> Why's that?<br>
            <strong>Man:</strong> Tomorrow's the only day in August when you won't have to pay. And that offer even includes the special exhibitions.</p>

            <p><strong>Question 19</strong><br>
            You will hear two friends talking about what they did at the weekend. What didn't the woman do at the weekend?<br>
            <strong>Man:</strong> Did you play basketball this weekend, Katy?<br>
            <strong>Woman:</strong> <span class="highlightable" data-q="19">I couldn't. I'd hurt my leg.</span> But I watched an amazing game on TV on Sunday afternoon.<br>
            <strong>Man:</strong> I saw that too. So, were you at home all weekend?<br>
            <strong>Woman:</strong> No. I had a great time in town with a friend on Saturday morning. I got myself some great new trainers. They're really smart.</p>

            <p><strong>Question 20</strong><br>
            You will hear a man talking to his friend about his new flat. What's he going to do now?<br>
            <strong>Man:</strong> Thanks for helping me move in, the apartment's looking great. I'm glad we decided to put the bookcase in the corner. It didn't look right next to the door. I'm not sure about the colour of the walls, but I can change that later. <span class="highlightable" data-q="20">It's really cold in here though, so I've got to do something about that immediately.</span></p>

            <p><em>That is the end of Part Four.</em></p>
            `,
