    <script src="core-listening-ket.js"></script>
    <script>
        const ketTest2Part4Data = {
            title: "KET 1 · Test 2 · Listening Part 4",
            type: "multiple-choice",
            part: 4,
            book: 1,
            test: 2,

            answerKey: { q16: 'B', q17: 'C', q18: 'B', q19: 'B', q20: 'B' },
            displayAnswers: { q16: 'B', q17: 'C', q18: 'B', q19: 'B', q20: 'B' },

            detailedExplanations: {
                q16: `<strong>Đáp án: B – Jen's taken a photo of him</strong><br>
                      Jen nói: <em>"I've just seen Mikey – my favourite singer!"</em><br>
                      Về việc nói chuyện: <em>"Did you get a chance to speak to him?"</em> Jen đáp: <em>"He waved and <span class='keyword-highlight'>I got a picture</span>, but that's all. I shouted hello, but he didn't hear me."</em><br><br>
                      <strong>✗ A (Jen's seen him on stage) sai:</strong> Jen nói <em>"The tickets were too expensive for me, unfortunately, so I waited outside the theatre."</em> → Không xem concert.<br>
                      <strong>✗ C (Jen's had a conversation with him) sai:</strong> Cô ấy hét "hello" nhưng anh ấy không nghe thấy.<br>
                      <strong>✓ B (Jen's taken a photo of him) là đáp án đúng.</strong>`,

                q17: `<strong>Đáp án: C – He was tired</strong><br>
                      Alex nói: <em>"I didn't play very well – <span class='keyword-highlight'>I went to bed really late the night before.</span>"</em><br>
                      Người phụ nữ nói: <em>"It's horrible playing when you don't have enough energy."</em><br><br>
                      <strong>✗ A (He was thirsty) sai:</strong> Alex nói <em>"I know it's really important to have plenty to eat and drink before a competition."</em> → Anh đã uống đủ nước.<br>
                      <strong>✗ B (He was hungry) sai:</strong> Đây là ví dụ của người phụ nữ về chính mình, không phải Alex.<br>
                      <strong>✓ C (He was tired) là lý do Alex chơi không tốt – thức khuya.</strong>`,

                q18: `<strong>Đáp án: B – Don't visit the museum today</strong><br>
                      Người đàn ông nói: <em>"But don't spend money on tickets now."</em><br>
                      Lý do: <em>"Tomorrow's the only day in August when you won't have to pay."</em><br><br>
                      <strong>✗ A (Don't miss a special exhibition) sai:</strong> Triển lãm đặc biệt miễn phí vào ngày mai.<br>
                      <strong>✗ C (Don't buy tickets too late) sai:</strong> Không phải lời khuyên trong bài.<br>
                      <strong>✓ B (Don't visit the museum today) là lời khuyên – hôm nay mất tiền, ngày mai miễn phí.</strong>`,

                q19: `<strong>Đáp án: B – play sport</strong><br>
                      Người đàn ông hỏi: <em>"Did you play basketball this weekend, Katy?"</em><br>
                      Người phụ nữ đáp: <em>"<span class='keyword-highlight'>I couldn't. I'd hurt my leg.</span>"</em> → Không chơi thể thao.<br>
                      Về TV: <em>"But I watched an amazing game on TV on Sunday afternoon."</em> → Đã xem TV.<br>
                      Về shopping: <em>"I had a great time in town with a friend on Saturday morning. I got myself some great new trainers."</em> → Đã đi mua sắm.<br><br>
                      <strong>✗ A (watch TV) sai:</strong> Cô ấy đã xem TV.<br>
                      <strong>✗ C (go shopping) sai:</strong> Cô ấy đã đi mua sắm.<br>
                      <strong>✓ B (play sport) là thứ cô ấy không làm – không chơi basketball vì chân bị thương.</strong>`,

                q20: `<strong>Đáp án: B – turn the heating on</strong><br>
                      Người đàn ông nói về việc sơn: <em>"I'm not sure about the colour of the walls, but I can change that later."</em> → Không sơn ngay bây giờ.<br>
                      Về furniture: <em>"I'm glad we decided to put the bookcase in the corner."</em> → Đã di chuyển nội thất rồi.<br>
                      Về heating: <em>"<span class='keyword-highlight'>It's really cold in here though, so I've got to do something about that immediately.</span>"</em> → Bật sưởi ngay.<br><br>
                      <strong>✗ A (paint the flat) sai:</strong> Có thể làm sau.<br>
                      <strong>✗ C (move some furniture) sai:</strong> Đã làm xong.<br>
                      <strong>✓ B (turn the heating on) là việc anh ấy sẽ làm ngay bây giờ.</strong>`
            },

            transcript: `
            <p><strong>PART 4</strong></p>
            <p><em>For each question, choose the correct answer.</em></p>

            <p><strong>Question 16</strong><br>
            You will hear a woman, Jen, telling her friend about her favourite singer, Mikey. What's just happened?<br>
            <strong>Woman:</strong> I've just seen Mikey – my favourite singer!<br>
            <strong>Man:</strong> Wow, Jen, you've been to his concert?<br>
            <strong>Woman:</strong> The tickets were too expensive for me, unfortunately, so I waited outside the theatre.<br>
            <strong>Man:</strong> Did you get a chance to speak to him?<br>
            <strong>Woman:</strong> He waved and <span class="highlightable" data-q="16">I got a picture</span>, but that's all. I shouted hello, but he didn't hear me. He was in a hurry.</p>

            <p><strong>Question 17</strong><br>
            You will hear a man, Alex, talking to a friend about a tennis competition. Why didn't Alex do well in the competition?<br>
            <strong>Woman:</strong> Hi Alex, how was the tennis competition?<br>
            <strong>Man:</strong> I didn't play very well – <span class="highlightable" data-q="17">I went to bed really late the night before.</span><br>
            <strong>Woman:</strong> It's horrible playing when you don't have enough energy. I remember once I didn't eat all day and then I played a match.<br>
            <strong>Man:</strong> I know it's really important to have plenty to eat and drink before a competition.</p>

            <p><strong>Question 18</strong><br>
            You will hear two people talking at a tourist information centre. What advice does the man give the woman?<br>
            <strong>Woman:</strong> What can you tell me about the National Museum? I'd like to go there this afternoon.<br>
            <strong>Man:</strong> Well, there's always so much going on at the museum. The exhibitions are all worth visiting. But <span class="highlightable" data-q="18">don't spend money on tickets now.</span><br>
            <strong>Woman:</strong> Why's that?<br>
            <strong>Man:</strong> Tomorrow's the only day in August when you won't have to pay. And that offer even includes the special exhibitions.</p>

            <p><strong>Question 19</strong><br>
            You will hear two friends talking about what they did at the weekend. What didn't the woman do at the weekend?<br>
            <strong>Man:</strong> Did you play basketball this weekend, Katy?<br>
            <strong>Woman:</strong> <span class="highlightable" data-q="19">I couldn't. I'd hurt my leg.</span> But I watched an amazing game on TV on Sunday afternoon.<br>
            <strong>Man:</strong> I saw that too. So, were you at home all weekend?<br>
            <strong>Woman:</strong> No. I had a great time in town with a friend on Saturday morning. I got myself some great new trainers. They're really smart.</p>

            <p><strong>Question 20</strong><br>
            You will hear a man talking to his friend about his new flat. What's he going to do now?<br>
            <strong>Man:</strong> Thanks for helping me move in, the apartment's looking great. I'm glad we decided to put the bookcase in the corner. It didn't look right next to the door. I'm not sure about the colour of the walls, but I can change that later. <span class="highlightable" data-q="20">It's really cold in here though, so I've got to do something about that immediately.</span></p>

            <p><em>That is the end of Part Four.</em></p>
            `,

            questions: [
                { num: 16, text: "You will hear a woman, Jen, telling her friend about her favourite singer, Mikey. What's just happened?", options: ["Jen's seen him on stage.", "Jen's taken a photo of him.", "Jen's had a conversation with him."] },
                { num: 17, text: "You will hear a man, Alex, talking to a friend about a tennis competition. Why didn't Alex do well in the competition?", options: ["He was thirsty.", "He was hungry.", "He was tired."] },
                { num: 18, text: "You will hear two people talking at a tourist information centre. What advice does the man give the woman?", options: ["Don't miss a special exhibition.", "Don't visit the museum today.", "Don't buy tickets too late."] },
                { num: 19, text: "You will hear two friends talking about what they did at the weekend. What didn't the woman do at the weekend?", options: ["watch TV", "play sport", "go shopping"] },
                { num: 20, text: "You will hear a man talking to his friend about his new flat. What's he going to do now?", options: ["paint the flat", "turn the heating on", "move some furniture"] }
            ]
        };
