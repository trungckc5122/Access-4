<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PET 2 - Test 3 - Part 1</title>
    <link rel="stylesheet" href="listening-pet-common.css" id="styleLink">
</head>
<body>
<div class="test-wrapper" id="testWrapper">
    <!-- Header -->
    <div class="ielts-header">
        <div class="brand">
            <div class="ielts-logo">PET</div>
            <div class="candidate"></div>
            <div class="audio-controls">
                <audio id="listeningAudio" controls>
                    <source src="audio/B1 Preliminary 2 - Test 3 Part 1.mp3" type="audio/mpeg">
                    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg">
                </audio>
                <select class="speed-select" id="speedSelect">
                    <option value="0.7">0.7x</option>
                    <option value="0.9">0.9x</option>
                    <option value="1.0" selected>1x</option>
                    <option value="1.1">1.1x</option>
                    <option value="1.25">1.25x</option>
                </select>
                <span class="volume-icon">🔊</span>
            </div>
        </div>

</div>

    <!-- Question navigator -->
    <div class="question-nav">
        
        <div class="nav-buttons" id="navButtons"></div>
    </div>

    <!-- Main area -->
    <div class="main-area" id="mainArea">
        <!-- Transcript panel -->
        <div class="transcript-panel" id="transcriptPanel">
            <div class="panel-header"><span>TRANSCRIPT</span></div>
            <div class="transcript-content font-large" id="transcriptContent"></div>
        </div>
        <div class="resizer" id="resizer"></div>

        <!-- Questions panel -->
        <div class="questions-panel" id="questionsPanel">
            <div class="panel-header">
                <span>QUESTIONS 1-7</span>
                <span class="answer-badge" id="answeredCount">0/7 answered</span>
            </div>
            <div class="questions-list font-large centered" id="questionsContent">
                <div>
                    <h3>PART 1 Questions 1-7</h3>
                    <p><em>Choose the correct answer (A, B or C).</em></p>
                    <div class="notes-box" id="questionsContainer"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bottom bar -->
    <div class="bottom-bar">
        <button class="btn btn-primary" id="submitBtn">Nộp bài</button>
        <button class="btn btn-success" id="explainBtn" disabled>Xem giải thích</button>
        <button class="btn btn-danger" id="resetBtn">Reset tất cả</button>
        <div class="progress" id="progressDisplay">Đã làm: 0/7</div>
    </div>

    <!-- Explanation panel -->
    <div class="explanation-panel" id="explanationPanel">
        <div class="resize-handle" id="explanationResizer"></div>
        <div class="explanation-header">
            <span id="explanationTitle">Giải thích</span>
            <span class="close-btn" id="closeExplanation">✕ Đóng</span>
        </div>
        <div class="explanation-content" id="explanationText"></div>
    </div>
</div>

<div class="context-menu" id="contextMenu">
    <div onclick="applyHighlight('yellow')">Highlight vàng</div>
    <div onclick="applyHighlight('green')">Highlight xanh lá</div>
    <div onclick="applyHighlight('pink')">Highlight hồng</div>
    <div onclick="removeHighlight()">Xóa highlight</div>
</div>

<script src="core-listening.js"></script>
<script>
const pet2Test3Part1Data = {
    title: "B1 Preliminary 2 · Test 3 · Part 1",
    type: "multiple-choice",
    part: 1,
    book: 2,
    test: 3,

    answerKey: { q1: 'C', q2: 'A', q3: 'A', q4: 'C', q5: 'A', q6: 'C', q7: 'B' },
    displayAnswers: { q1: 'C', q2: 'A', q3: 'A', q4: 'C', q5: 'A', q6: 'C', q7: 'B' },

    detailedExplanations: {
        q1: `<strong>Đáp án: C – Bookshop (hiệu sách)</strong><br>
              Người đàn ông nói: <em>"<span class='keyword-highlight'>I did manage to stop at the bookshop and get a novel I wanted</span>."</em> Anh đã dừng lại ở hiệu sách để mua tiểu thuyết.
              <br><br>
              <strong>✗ A (Bank) sai:</strong> Anh định đi ngân hàng nhưng đã đóng cửa (<em>"<span class='keyword-highlight'>it had closed by the time I got there</span>"</em>).
              <br>
              <strong>✗ B (Clothes shop) sai:</strong> Anh muốn đổi áo khoác nhưng hàng đông quá (<em>"<span class='keyword-highlight'>huge queue</span>"</em>) nên chưa làm được.
              <br>
              <strong>✓ C (Bookshop) là đáp án đúng.</strong>`,

        q2: `<strong>Đáp án: A – Plane (máy bay)</strong><br>
              Người phụ nữ nói: <em>"<span class='keyword-highlight'>There was a storm, so all flights were delayed for hours</span>."</em> và <em>"<span class='keyword-highlight'>The journey went pretty quickly after we'd taken off</span>."</em> "Taken off" nghĩa là cất cánh - đi máy bay.
              <br><br>
              <strong>✗ B (Coach) sai:</strong> Không đề cập đến xe khách.
              <br>
              <strong>✗ C (Train) sai:</strong> Tàu cũng bị ảnh hưởng (<em>"<span class='keyword-highlight'>trains were affected too</span>"</em>) nhưng cô không đi tàu.
              <br>
              <strong>✓ A (Plane) là đáp án đúng.</strong>`,

        q3: `<strong>Đáp án: A – Woolly hat (mũ len)</strong><br>
              Người phụ nữ nói: <em>"<span class='keyword-highlight'>But the woolly hat reminded me of the type my grandmother used to knit for me</span>."</em> Cô đã đội mũ len.
              <br><br>
              <strong>✗ B (Baseball cap) sai:</strong> Có nhiều mũ lưỡi trai để chọn nhưng cô không chọn.
              <br>
              <strong>✗ C (Sun hat) sai:</strong> Có mũ rộng vành đi biển nhưng cô không đội.
              <br>
              <strong>✓ A (Woolly hat) là đáp án đúng.</strong>`,

        q4: `<strong>Đáp án: C – Bedside table (tủ đầu giường)</strong><br>
              Người đàn ông nói: <em>"<span class='keyword-highlight'>I think I left it on the bedside table in my room</span>."</em> Anh để bằng lái xe trên tủ đầu giường.
              <br><br>
              <strong>✗ A (Airport lounge) sai:</strong> Anh đang trên đường đến sân bay khi phát hiện mất giấy tờ.
              <br>
              <strong>✗ B (Hotel bar) sai:</strong> Không đề cập đến quầy bar khách sạn.
              <br>
              <strong>✓ C (Bedside table) là đáp án đúng.</strong>`,

        q5: `<strong>Đáp án: A – Cliff path (đường mòn vách đá)</strong><br>
              Người đàn ông nói: <em>"<span class='keyword-highlight'>the walk we're doing is up the cliff path</span>."</em> Họ sẽ đi bộ trên đường mòn vách đá.
              <br><br>
              <strong>✗ B (Beach) sai:</strong> Người phụ nữ tưởng đi bộ dọc bãi biển nhưng đã đổi kế hoạch.
              <br>
              <strong>✗ C (Forest) sai:</strong> Rừng là nơi họ đi bộ trước đó (<em>"<span class='keyword-highlight'>forest walk we did the other day</span>"</em>).
              <br>
              <strong>✓ A (Cliff path) là đáp án đúng.</strong>`,

        q6: `<strong>Đáp án: C – Put air in the tyres (bơm hơi lốp xe)</strong><br>
              Người phụ nữ nói: <em>"<span class='keyword-highlight'>I think it needs more air, so I'll stop and put some in on the way home</span>."</em> Cô sẽ bơm hơi cho lốp xe.
              <br><br>
              <strong>✗ A (Wash it) sai:</strong> Cô nói cô sẽ rửa xe của mình, không phải xe của bạn (<em>"<span class='keyword-highlight'>I think I'll have to clean mine</span>"</em>).
              <br>
              <strong>✗ B (Fill it with petrol) sai:</strong> Xe dùng ít xăng (<em>"<span class='keyword-highlight'>doesn't use as much petrol</span>"</em>) nên không cần đổ xăng.
              <br>
              <strong>✓ C (Put air in the tyres) là đáp án đúng.</strong>`,

        q7: `<strong>Đáp án: B – Chicken (thịt gà)</strong><br>
              Người phụ nữ nói: <em>"<span class='keyword-highlight'>Then I smelt the chicken and decided to go for that</span>."</em> Cô đã chọn ăn thịt gà.
              <br><br>
              <strong>✗ A (Fish) sai:</strong> Cá đã hết (<em>"<span class='keyword-highlight'>they'd run out</span>"</em>).
              <br>
              <strong>✗ C (Omelette) sai:</strong> Cô định ăn trứng ốp-la nhưng đổi ý vì ngửi thấy mùi gà.
              <br>
              <strong>✓ B (Chicken) là đáp án đúng.</strong>`
    },

    transcript: `
        <p><strong>Question 1</strong><br>
        <strong>Woman:</strong> Did you go into town yesterday?<br>
        <strong>Man:</strong> Yes. I wanted to take a jacket back to the shop 'cos it didn't fit. There was a huge queue though, so I decided to go back later and went off to do something at the bank. But it had closed by the time I got there, so I couldn't do that, either! <span class="highlightable" data-q="1">I did manage to stop at the bookshop and get a novel I wanted</span>, on the way back. The queue at the clothes shop was still no better, so I'll try tomorrow.</p>

        <p><strong>Question 2</strong><br>
        <strong>Man:</strong> Hi – how was your trip?<br>
        <strong>Woman:</strong> Lovely, thanks! And getting round the city by bus was so easy; we saw lots of interesting things.<br>
        <strong>Man:</strong> When did you get home?<br>
        <strong>Woman:</strong> Not until 3 a.m.! <span class="highlightable" data-q="2">There was a storm, so all flights were delayed for hours</span>. We just had to sit and wait!<br>
        <strong>Man:</strong> Oh no! And I suppose getting home by train would take ages.<br>
        <strong>Woman:</strong> Actually the journey's not that long and the station wasn't far from our hotel. But the trains were affected too. <span class="highlightable" data-q="2">The journey went pretty quickly after we'd taken off</span>.<br>
        <strong>Man:</strong> That's good.</p>

        <p><strong>Question 3</strong><br>
        <strong>Man:</strong> I love these photos of you in this magazine, especially the ones with you in that hat!<br>
        <strong>Woman:</strong> Thanks! I hadn't planned on wearing one, but the photographer suggested it. He had loads to choose from. Like, sun hats you'd wear to the beach, and baseball caps in different colours. <span class="highlightable" data-q="3">But the woolly hat reminded me of the type my grandmother used to knit for me</span>. So even though it was a sunny day, I thought it looked great, especially since it was a bright colour and went with my dress.</p>

        <p><strong>Question 4</strong><br>
        <strong>Man:</strong> Julia, it's Mark. I'm on my way back to the hotel. I left there to get my flight, but when I got to check-in at the airport, I realised I didn't have my driving licence with me. <span class="highlightable" data-q="4">I think I left it on the bedside table in my room</span>. No-one's answering the phone at the hotel reception, so I've had to go back for it. As soon as I've found it, I'll hurry back to the airport. I just hope I won't miss my flight.</p>

        <p><strong>Question 5</strong><br>
        <strong>Man:</strong> It's nearly time to go. Are you going to change your shoes? Those sandals don't look very suitable for a long walk!<br>
        <strong>Woman:</strong> They'll be fine. After all, we're only walking along the beach.<br>
        <strong>Man:</strong> Oh. Didn't I tell you? Rick changed the arrangements. We're meeting at the car park near the beach, but <span class="highlightable" data-q="5">the walk we're doing is up the cliff path</span>. My walking boots are still wet from the forest walk we did the other day, so I'm going to wear my trainers.<br>
        <strong>Woman:</strong> OK. I'll do the same.</p>

        <p><strong>Question 6</strong><br>
        <strong>Woman:</strong> Michael, it's me. Thanks for letting me use your car while mine's at the garage. It's great – better than mine, and it doesn't use as much petrol, either. I just wanted to let you know that there might be a problem with one of your tyres. <span class="highlightable" data-q="6">I think it needs more air, so I'll stop and put some in on the way home</span>, but I think you should check it again tomorrow. No other problems. Now I've seen how nice yours looks, I think I'll have to clean mine!</p>

        <p><strong>Question 7</strong><br>
        <strong>Man:</strong> Have you been to that restaurant I told you about yet?<br>
        <strong>Woman:</strong> I went on Tuesday.<br>
        <strong>Man:</strong> What did you have?<br>
        <strong>Woman:</strong> Well, I know you recommended the fish, but they'd run out. So I had to choose between the roast chicken or an omelette with salad.<br>
        <strong>Man:</strong> What did you choose?<br>
        <strong>Woman:</strong> I wasn't that hungry, so I was going to have the omelette with salad. <span class="highlightable" data-q="7">Then I smelt the chicken and decided to go for that</span>. I wasn't disappointed! I must go again to try the fish!<br>
        <em>Now listen again.</em><br>
        That is the end of Part One.</p>
    `,

    questions: [
        { num: 1, text: "What did the man do yesterday?", options: ["Bank", "Clothes shop", "Bookshop"] },
        { num: 2, text: "How did the woman travel back from her holiday?", options: ["Plane", "Coach", "Train"] },
        { num: 3, text: "Which hat did the fashion model wear in the photos?", options: ["Woolly hat", "Baseball cap", "Sun hat"] },
        { num: 4, text: "Where did the man leave his driving licence?", options: ["Airport lounge", "Hotel bar", "Bedside table"] },
        { num: 5, text: "Where are they going walking?", options: ["Cliff path", "Beach", "Forest"] },
        { num: 6, text: "What will the woman do to her friend's car?", options: ["Wash it", "Fill it with petrol", "Put air in the tyres"] },
        { num: 7, text: "What did the woman eat at the restaurant?", options: ["Fish", "Chicken", "Omelette"] }
    ]
};

document.addEventListener('DOMContentLoaded', function() {
    window.listeningCore = new ListeningCore();
    window.listeningCore.initializeTest(pet2Test3Part1Data);
});
</script>
</body>
</html>
