                q23: 'C',

            displayAnswers: {
                q20: 'A',
                q21: 'C',
                q22: 'B',

                q24: 'B',
                q25: 'C'

            // Detailed Explanations
            detailedExplanations: {
                q20: `<strong>Đáp án: A – Her parents encouraged her to do it (bố mẹ cô ấy khuyến khích cô làm)</strong><br>
                      Lara nói: <em>"<span class='keyword-highlight'>when I told Mum and Dad, they said I should make a business out of it</span>."</em> Khi cô kể với bố mẹ, họ bảo cô nên biến nó thành kinh doanh.

            transcript: `
            <p><em>Now look at Part Four. For each question, choose the correct answer. Look at questions 20 to 25 now. You have 45 seconds. You will hear an interview with a young woman called Lara Andrews, who has a baking business.</em></p>

            <p><strong>Man:</strong> What were the challenges when you started your business?</p>
            <p><strong>Woman:</strong> I wanted everything to be absolutely perfect and <span class="highlightable" data-q="21">I didn't always know where to look to learn about what ingredients to use, how much of each and so on.</span> The internet was useful though, and luckily I haven't had to handle customers being negative about my products. I thought it'd take ages to get enough customers but fortunately it didn't.</p>
            <p><strong>Man:</strong> Do you prefer baking bread or cakes?</p>
            <p><strong>Woman:</strong> I love baking both! I love simple cakes, but I'll try making anything. <span class="highlightable" data-q="22">Bread's complicated, so I'm always pleased when I get it right. It requires more skill</span> and you have to be patient and do lots of things all in the right order.</p>
            <p><strong>Man:</strong> What can you do to improve your baking business?</p>
            <p><strong>Woman:</strong> Well, I've recently had several ideas for working with and mixing together unusual ingredients, which I'm experimenting with, rather than just familiar favourites. I'm good at using my imagination – <span class="highlightable" data-q="23">I just have to trust myself more that my ideas'll work.</span> I recently put some ads in our local paper, and as a result, I've had several orders come in, which is great.</p>
            <p><strong>Man:</strong> What about future plans, Lara?</p>
            <p><strong>Woman:</strong> <span class="highlightable" data-q="24">One thing I'll definitely do is start a video blog for children and teenagers so they can bake with me as they watch.</span> And a friend of mine suggested that I produce my own cookery book one day. I'm not sure about that though. I've also considered opening a café, but that's very different from what I really enjoy doing, which is baking at home.</p>
            <p><strong>Man:</strong> Finally, do you have any advice for people wanting to start their own baking business?</p>
            <p><strong>Woman:</strong> Well, speaking as someone with experience in this industry, <span class="highlightable" data-q="25">I think it's important to remember that you'd be very lucky if you actually got rich.</span> You don't need professional training, but do practise. Remember the old saying – practice makes perfect!</p>
            <p><strong>Man:</strong> Well, thanks for joining us, Lara.</p>
            <p><strong>Woman:</strong> My pleasure.</p>
            <p><em>Now listen again.</em></p>
            <p style="color:#666;">That is the end of Part Four.<br>You now have six minutes to write your answers on the answer sheet.<br>You have one more minute.<br>That is the end of the test.</p>
            `,
