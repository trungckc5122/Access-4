<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KET 1 - Test 1 - Listening Part 1</title>
    <link rel="stylesheet" href="listening-pet-common.css" id="styleLink">
</head>

<body>
    <div class="test-wrapper" id="testWrapper">
        <!-- Header -->
        <div class="ielts-header">
            <div class="brand">
                <div class="ielts-logo">KET</div>
                <div class="candidate"></div>
                <div class="audio-controls">
                    <audio id="listeningAudio" controls>
                        <source src="audio/KET 1 - Test 1 Part 1.mp3" type="audio/mpeg">
                    </audio>
                    <select class="speed-select" id="speedSelect">
                        <option value="0.7">0.7x</option>
                        <option value="0.9">0.9x</option>
                        <option value="1.0" selected>1x</option>
                        <option value="1.1">1.1x</option>
                        <option value="1.25">1.25x</option>
                    </select>
                    <span class="volume-icon">🔊</span>
                </div>
            </div>
        </div>

        <!-- Question navigator -->
        <div class="question-nav">
            <div class="nav-buttons" id="navButtons"></div>
        </div>

        <!-- Main area -->
        <div class="main-area" id="mainArea">
            <!-- Transcript panel -->
            <div class="transcript-panel" id="transcriptPanel">
                <div class="panel-header"><span>TRANSCRIPT</span></div>
                <div class="transcript-content font-large" id="transcriptContent"></div>
            </div>
            <div class="resizer" id="resizer"></div>

            <!-- Questions panel -->
            <div class="questions-panel" id="questionsPanel">
                <div class="panel-header">
                    <span>QUESTIONS 1–5</span>
                    <span class="answer-badge" id="answeredCount">0/5 answered</span>
                </div>
                <div class="questions-list font-large centered" id="questionsContent">
                    <div>
                        <h3>PART 1 &nbsp; Questions 1–5</h3>
                        <p><em>For each question, choose the correct answer.</em></p>
                        <div class="notes-box" id="questionsContainer"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Bottom bar -->
        <div class="bottom-bar">
            <button class="btn btn-primary" id="submitBtn">Nộp bài</button>
            <button class="btn btn-success" id="explainBtn" disabled>Xem giải thích</button>
            <button class="btn btn-danger" id="resetBtn">Reset</button>
            <div class="progress" id="progressDisplay">Đã làm: 0/5</div>
        </div>

        <!-- Explanation panel -->
        <div class="explanation-panel" id="explanationPanel">
            <div class="resize-handle" id="explanationResizer"></div>
            <div class="explanation-header">
                <span id="explanationTitle">Giải thích</span>
                <span class="close-btn" id="closeExplanation">✕ Đóng</span>
            </div>
            <div class="explanation-content" id="explanationText"></div>
        </div>
    </div>

    <!-- Context menu -->
    <div class="context-menu" id="contextMenu">
        <div onclick="applyHighlight('yellow')">Highlight vàng</div>
        <div onclick="applyHighlight('green')">Highlight xanh lá</div>
        <div onclick="applyHighlight('pink')">Highlight hồng</div>
        <div onclick="removeHighlight()">Xóa highlight</div>
    </div>

    <script src="core-listening-ket.js"></script>
    <script>
        const ketTest1Part1Data = {
            title: "KET 1 · Test 1 · Listening Part 1",
            type: "multiple-choice",
            part: 1,
            book: 1,
            test: 1,

            answerKey: { q1: 'C', q2: 'C', q3: 'B', q4: 'B', q5: 'A' },
            displayAnswers: { q1: 'C', q2: 'C', q3: 'B', q4: 'B', q5: 'A' },

            detailedExplanations: {
                q1: `<strong>Đáp án: C – a bus</strong><br>
                      Người phụ nữ nói: <em>"I couldn't use my car – it's at the garage."</em> → Cô ấy không thể dùng xe hơi.<br>
                      <em>"I was on my way to the station, but got on the <span class='keyword-highlight'>wrong bus</span>. It took me to the university... Then I had to get another <span class='keyword-highlight'>one</span> to get here."</em><br><br>
                      <strong>✗ A (a car) sai:</strong> Xe hơi đang sửa ở gara.<br>
                      <strong>✗ B (a high-speed train) sai:</strong> Cô ấy đang trên đường đến ga nhưng lại lên xe buýt nhầm, không đi tàu.<br>
                      <strong>✓ C (a bus) là phương tiện cô ấy dùng để đến chỗ làm.</strong>`,

                q2: `<strong>Đáp án: C – a bowl of soup</strong><br>
                      Người đàn ông nói: <em>"I want <span class='keyword-highlight'>roast chicken</span> for the main course, but I'll have the <span class='keyword-highlight'>mushroom soup</span> for my first course."</em> → Súp là món ăn đầu tiên.<br><br>
                      <strong>✗ A (roast chicken) sai:</strong> Đây là món chính, không phải món đầu tiên.<br>
                      <strong>✗ B (a salad) sai:</strong> Người phụ nữ chọn salad để bắt đầu, không phải người đàn ông.<br>
                      <strong>✓ C (a bowl of soup) là món anh ấy ăn đầu tiên.</strong>`,

                q3: `<strong>Đáp án: B – a swimming pool with lounge chairs</strong><br>
                      Người phụ nữ nói: <em>"my room was on the other side of the hotel, <span class='keyword-highlight'>opposite the pool</span>."</em><br>
                      Người đàn ông nói: <em>"I'd love to wake up... and see that beach"</em> nhưng người phụ nữ nói phòng cô ấy ở phía đối diện.<br><br>
                      <strong>✗ A (a beach with palm trees) sai:</strong> Người đàn ông nhìn ảnh thấy bãi biển nhưng đó không phải từ phòng của cô ấy.<br>
                      <strong>✗ C (a garden with trees) sai:</strong> Khách sạn có vườn đẹp nhưng đó không phải tầm nhìn từ phòng cô.<br>
                      <strong>✓ B (a swimming pool with lounge chairs) là tầm nhìn từ phòng của cô.</strong>`,

                q4: `<strong>Đáp án: B – a man with a toothache</strong><br>
                      Người phụ nữ hỏi: <em>"Have you got a bad headache?"</em> Người đàn ông đáp: <em>"There's something wrong with my <span class='keyword-highlight'>tooth</span>. It really hurts."</em><br>
                      Khi được đề nghị uống thuốc: <em>"that'll give me a stomach ache"</em>.<br><br>
                      <strong>✗ A (a headache) sai:</strong> Người phụ nữ đoán là đau đầu nhưng thực ra là đau răng.<br>
                      <strong>✗ C (a stomach ache) sai:</strong> Anh ấy lo sợ thuốc sẽ gây đau dạ dày, không phải anh đang đau dạ dày.<br>
                      <strong>✓ B (a toothache) là lý do anh ấy bỏ lỡ buổi hòa nhạc.</strong>`,

                q5: `<strong>Đáp án: A – a dress</strong><br>
                      Người đàn ông khuyên: <em>"What about your favourite <span class='keyword-highlight'>dress</span>?"</em><br>
                      Người phụ nữ ban đầu do dự nhưng cuối cùng đồng ý: <em>"Yes, you're right! I'll take your advice!"</em><br><br>
                      <strong>✗ B (a jumper) sai:</strong> Đây là thứ cô ấy đang mặc thử ban đầu nhưng bị cho là sẽ quá nóng.<br>
                      <strong>✗ C (a T-shirt and jeans) sai:</strong> Đây là điều cô ấy nghĩ mọi người khác sẽ mặc, không phải lựa chọn của cô.<br>
                      <strong>✓ A (a dress) là thứ cô ấy sẽ mặc theo lời khuyên của người đàn ông.</strong>`
            },

            transcript: `
            <p><strong>PART 1</strong></p>
            <p><em>For each question, choose the correct answer.</em></p>

            <p><strong>Question 1</strong><br>
            <strong>Man:</strong> Hi, you're late for work today.<br>
            <strong>Woman:</strong> Yes, I couldn't use my car – it's at the garage.<br>
            <strong>Man:</strong> So, did you get the train?<br>
            <strong>Woman:</strong> Well, I was on my way to the station, but <span class="highlightable" data-q="1">got on the wrong bus. It took me to the university instead. I was looking at my phone and didn't notice. Then I had to get another one to get here.</span></p>

            <p><strong>Question 2</strong><br>
            <strong>Woman:</strong> The menu looks really good. What are you going to have?<br>
            <strong>Man:</strong> Well, I want roast chicken for the main course, but <span class="highlightable" data-q="2">I'll have the mushroom soup for my first course.</span><br>
            <strong>Woman:</strong> I'll have the chicken too, but I'll have salad to start.<br>
            <strong>Man:</strong> I had that last time, but I'm really hungry today. Right, so we're ready to order.</p>

            <p><strong>Question 3</strong><br>
            <strong>Man:</strong> Good holiday?<br>
            <strong>Woman:</strong> Fantastic, thanks. The hotel was by the beach. It had a beautiful garden. Here's a photo.<br>
            <strong>Man:</strong> Amazing view! I'd love to wake up in a hotel room and see that beach.<br>
            <strong>Woman:</strong> Well, <span class="highlightable" data-q="3">my room was on the other side of the hotel, opposite the pool.</span> I walked along the beach every day, and around the garden too.</p>

            <p><strong>Question 4</strong><br>
            <strong>Woman:</strong> Are you ready to leave soon? The concert starts at 7. Oh no, you look really pale. Have you got a bad headache?<br>
            <strong>Man:</strong> <span class="highlightable" data-q="4">There's something wrong with my tooth. It really hurts.</span><br>
            <strong>Woman:</strong> What about taking some medicine for the pain?<br>
            <strong>Man:</strong> No, thanks, that'll give me a stomach ache.<br>
            <strong>Woman:</strong> OK, well, let me try and get a doctor's appointment for you.</p>

            <p><strong>Question 5</strong><br>
            <strong>Woman:</strong> I'm trying to decide what to wear for the party. What do you think of this jumper?<br>
            <strong>Man:</strong> It looks great, but won't you be too warm? <span class="highlightable" data-q="5">What about your favourite dress?</span><br>
            <strong>Woman:</strong> I'm not sure. Everyone else will probably be in jeans and T-shirts.<br>
            <strong>Man:</strong> You don't have to wear what everyone else wears!<br>
            <strong>Woman:</strong> <span class="highlightable" data-q="5">Yes, you're right! I'll take your advice!</span></p>

            <p><em>That is the end of Part One.</em></p>
            `,

            questions: [
                { num: 1, text: "How did the woman travel to work this morning?", options: ["a car", "a high-speed train", "a bus"] },
                { num: 2, text: "What will the man eat first at the restaurant?", options: ["roast chicken", "a salad", "a bowl of soup"] },
                { num: 3, text: "Which was the view from the woman's hotel room?", options: ["a beach with palm trees", "a swimming pool with lounge chairs", "a garden with trees"] },
                { num: 4, text: "Why will the man miss the concert tonight?", options: ["a man with a headache", "a man with a toothache", "a man with a stomach ache"] },
                { num: 5, text: "What will the woman wear for the party?", options: ["a dress", "a jumper", "a T-shirt and jeans"] }
            ]
        };

        document.addEventListener('DOMContentLoaded', function () {
            window.listeningCore = new ListeningCore();
            window.listeningCore.initializeTest(ketTest1Part1Data);
            console.log('KET 1 Test 1 Listening Part 1 loaded');
        });
    </script>
</body>

</html>
