<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>PET 3 - Test 2 - Reading Part 6</title>
    <link rel="stylesheet" href="reading-pet-common.css" id="styleLink">
</head>
<body>
<div class="test-wrapper" id="testWrapper">
    <div class="ielts-header">
        <div class="brand"><div class="ielts-logo">PET</div><div class="candidate"></div></div>
    </div>

    <div class="question-nav">
        
        <div class="nav-buttons" id="navButtons"></div>
        <span id="answeredCount" style="font-size:13px; color:#555; margin-left:10px;">0/6 answered</span>
    </div>

    <!-- Main area -->
    <div class="main-area split-layout" id="mainArea"></div>

    <div class="bottom-bar">
        <button class="btn btn-primary" id="submitBtn">Nộp bài</button>
        <button class="btn btn-success" id="explainBtn" disabled>Xem giải thích</button>
        <button class="btn btn-danger" id="resetBtn">Reset</button>
        <div class="progress" id="progressDisplay">Đã làm: 0/6</div>
    </div>

    <div class="context-menu" id="contextMenu">
        <div onclick="applyHighlight('yellow')">Highlight vàng</div>
        <div onclick="applyHighlight('green')">Highlight xanh lá</div>
        <div onclick="applyHighlight('pink')">Highlight hồng</div>
        <div onclick="removeHighlight()">Xóa highlight</div>
    </div>
</div>

<script src="core-reading.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const testData = {
            type: 'split-layout',
            part: 6,
            answerKey: { q27: "until", q28: "is", q29: "can", q30: "not", q31: "take", q32: "on" },
            displayAnswers: { q27: "until/before/till/'til", q28: "is", q29: "can", q30: "not", q31: "take", q32: "on" },
            detailedExplanations: {
                27: `<div><strong>Liên từ thời gian:</strong> <em>"until"</em> (cho đến khi).<br>
                Câu: <em>"I never thought I had a particularly good voice until the day that one of my teachers heard me singing..."</em><br>
                Dịch: Tôi chưa bao giờ nghĩ mình có giọng hát hay cho đến ngày một giáo viên nghe tôi hát...</div>`,
                28: `<div><strong>Động từ "to be":</strong> <em>"is"</em>.<br>
                Câu: <em>"what I like best is singing songs from other countries"</em><br>
                Dịch: Điều tôi thích nhất là hát những bài hát từ các nước khác.</div>`,
                29: `<div><strong>Động từ khuyết thiếu:</strong> <em>"can"</em> (có thể).<br>
                Câu: <em>"which can sometimes be really challenging"</em><br>
                Dịch: Điều đó đôi khi có thể thực sự đầy thử thách.</div>`,
                30: `<div><strong>Phủ định với "either":</strong> <em>"not"</em>.<br>
                Câu: <em>"I'm not bad at it either!"</em><br>
                Dịch: Tôi cũng không tệ trong việc đó! "Either" ở cuối câu phủ định = cũng không.</div>`,
                31: `<div><strong>Cụm động từ:</strong> <em>"take part in"</em> (tham gia).<br>
                Câu: <em>"we're going to take part in a national singing competition"</em><br>
                Dịch: Chúng tôi sẽ tham gia một cuộc thi hát quốc gia.</div>`,
                32: `<div><strong>Giới từ:</strong> <em>"on"</em> (trên).<br>
                Câu: <em>"It'll be on TV, too"</em><br>
                Dịch: Nó cũng sẽ được chiếu trên TV.</div>`
            },
            template: `
                <div class="reading-card" id="passageCard">
                    <div class="review-title">My school singing club</div>
                    <p>I'm a member of the singing club at our school. I never thought I had a particularly good voice
                        <span class="input-wrapper">
                            <input type="text" id="q27" class="gap-input" data-q="27" autocomplete="off">
                            <span class="eye-icon" data-question="27">👁️</span>
                        </span>
                        the day that one of my teachers heard me singing in the corridor at school. She suggested I should go to the singing club, so I decided to try it.
                    </p>
                    <p>Every week we learn a new song – what I like best
                        <span class="input-wrapper">
                            <input type="text" id="q28" class="gap-input" data-q="28" autocomplete="off">
                            <span class="eye-icon" data-question="28">👁️</span>
                        </span>
                        singing songs from other countries. That means using a different language, which
                        <span class="input-wrapper">
                            <input type="text" id="q29" class="gap-input" data-q="29" autocomplete="off">
                            <span class="eye-icon" data-question="29">👁️</span>
                        </span>
                        sometimes be really challenging. But I like doing it, and I'm
                        <span class="input-wrapper">
                            <input type="text" id="q30" class="gap-input" data-q="30" autocomplete="off">
                            <span class="eye-icon" data-question="30">👁️</span>
                        </span>
                        bad at it either!
                    </p>
                    <p>In a week or so, we're going to
                        <span class="input-wrapper">
                            <input type="text" id="q31" class="gap-input" data-q="31" autocomplete="off">
                            <span class="eye-icon" data-question="31">👁️</span>
                        </span>
                        part in a national singing competition, where we'll perform for a group of five judges. The prize is a trip to London to sing at a famous concert hall in front of hundreds of people. It'll be
                        <span class="input-wrapper">
                            <input type="text" id="q32" class="gap-input" data-q="32" autocomplete="off">
                            <span class="eye-icon" data-question="32">👁️</span>
                        </span>
                        TV, too. I can't wait!
                    </p>
                </div>
            `,
            questions: [
                { num: 27 }, { num: 28 }, { num: 29 }, { num: 30 }, { num: 31 }, { num: 32 }
            ]
        };

        window.readingCore = new ReadingCore();
        window.readingCore.initializeTest(testData);
    });
</script>
</body>
</html>
