<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KET 1 - Test 1 - Listening Part 3</title>
    <link rel="stylesheet" href="listening-pet-common.css" id="styleLink">
</head>

<body>
    <div class="test-wrapper" id="testWrapper">
        <!-- Header -->
        <div class="ielts-header">
            <div class="brand">
                <div class="ielts-logo">KET</div>
                <div class="candidate"></div>
                <div class="audio-controls">
                    <audio id="listeningAudio" controls>
                        <source src="audio/KET 1 - Test 1 Part 3.mp3" type="audio/mpeg">
                    </audio>
                    <select class="speed-select" id="speedSelect">
                        <option value="0.7">0.7x</option>
                        <option value="0.9">0.9x</option>
                        <option value="1.0" selected>1x</option>
                        <option value="1.1">1.1x</option>
                        <option value="1.25">1.25x</option>
                    </select>
                    <span class="volume-icon">🔊</span>
                </div>
            </div>
        </div>

        <!-- Question navigator -->
        <div class="question-nav">
            <div class="nav-buttons" id="navButtons"></div>
        </div>

        <!-- Main area -->
        <div class="main-area" id="mainArea">
            <!-- Transcript panel -->
            <div class="transcript-panel" id="transcriptPanel">
                <div class="panel-header"><span>TRANSCRIPT</span></div>
                <div class="transcript-content font-large" id="transcriptContent"></div>
            </div>
            <div class="resizer" id="resizer"></div>

            <!-- Questions panel -->
            <div class="questions-panel" id="questionsPanel">
                <div class="panel-header">
                    <span>QUESTIONS 11–15</span>
                    <span class="answer-badge" id="answeredCount">0/5 answered</span>
                </div>
                <div class="questions-list font-large centered" id="questionsContent">
                    <div>
                        <h3>PART 3 &nbsp; Questions 11–15</h3>
                        <p><em>For each question, choose the correct answer.</em></p>
                        <p style="margin-bottom:8px;">You will hear two friends, Richard and Barbara, talking about a
                            new supermarket.</p>
                        <div class="notes-box" id="questionsContainer"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Bottom bar -->
        <div class="bottom-bar">
            <button class="btn btn-primary" id="submitBtn">Nộp bài</button>
            <button class="btn btn-success" id="explainBtn" disabled>Xem giải thích</button>
            <button class="btn btn-danger" id="resetBtn">Reset</button>
            <div class="progress" id="progressDisplay">Đã làm: 0/5</div>
        </div>

        <!-- Explanation panel -->
        <div class="explanation-panel" id="explanationPanel">
            <div class="resize-handle" id="explanationResizer"></div>
            <div class="explanation-header">
                <span id="explanationTitle">Giải thích</span>
                <span class="close-btn" id="closeExplanation">✕ Đóng</span>
            </div>
            <div class="explanation-content" id="explanationText"></div>
        </div>
    </div>

    <!-- Context menu -->
    <div class="context-menu" id="contextMenu">
        <div onclick="applyHighlight('yellow')">Highlight vàng</div>
        <div onclick="applyHighlight('green')">Highlight xanh lá</div>
        <div onclick="applyHighlight('pink')">Highlight hồng</div>
        <div onclick="removeHighlight()">Xóa highlight</div>
    </div>

    <script src="core-listening-ket.js"></script>
    <script>
        const ketTest1Part3Data = {
            title: "KET 1 · Test 1 · Listening Part 3",
            type: "multiple-choice",
            part: 3,
            book: 1,
            test: 1,

            answerKey: { q11: 'A', q12: 'B', q13: 'C', q14: 'C', q15: 'B' },
            displayAnswers: { q11: 'A', q12: 'B', q13: 'C', q14: 'C', q15: 'B' },

            detailedExplanations: {
                q11: `<strong>Đáp án: A – its size</strong><br>
                      Richard nói: <em>"I <span class='keyword-highlight'>couldn't believe it's so large</span> when you get inside!"</em><br><br>
                      <strong>✗ B (the time it opens) sai:</strong> Không có đề cập đến giờ mở cửa làm Richard bất ngờ.<br>
                      <strong>✗ C (the number of people there) sai:</strong> Barbara hỏi có nhiều người không, Richard đáp <em>"Not really. But it was early."</em><br>
                      <strong>✓ A (its size) là điều làm Richard bất ngờ.</strong>`,

                q12: `<strong>Đáp án: B – fruit</strong><br>
                      Richard nói: <em>"Every week, there are special offers on one kind of food... <span class='keyword-highlight'>It's fruit at the moment.</span>"</em><br><br>
                      <strong>✗ A (meat) sai:</strong> Richard dùng thịt như một ví dụ (<em>"like meat for example"</em>), nhưng tuần này là trái cây.<br>
                      <strong>✗ C (vegetables) sai:</strong> Barbara đoán tuần sau có thể là rau, nhưng không phải tuần này.<br>
                      <strong>✓ B (fruit) là thức ăn đang được giảm giá tuần này.</strong>`,

                q13: `<strong>Đáp án: C – the music</strong><br>
                      Richard nói: <em>"People don't usually like the songs they hear in supermarkets, but <span class='keyword-highlight'>I loved them there!</span>"</em><br><br>
                      <strong>✗ A (the café) sai:</strong> Một nhân viên giới thiệu quán café nhưng Richard không có thời gian để ghé.<br>
                      <strong>✗ B (the staff) sai:</strong> Không có đề cập rõ ràng về nhân viên là điều anh thích nhất.<br>
                      <strong>✓ C (the music) là điều Richard thích nhất.</strong>`,

                q14: `<strong>Đáp án: C – He couldn't use his credit card</strong><br>
                      Richard nói: <em>"I had to pay by cash, but <span class='keyword-highlight'>I prefer using my credit card.</span>"</em> → Siêu thị không nhận thẻ tín dụng.<br><br>
                      <strong>✗ A (He didn't have any cash) sai:</strong> Anh phải trả bằng tiền mặt, tức là anh có tiền mặt nhưng không thích dùng.<br>
                      <strong>✗ B (He had to wait before he could pay) sai:</strong> Barbara đoán điều này nhưng Richard phủ nhận (<em>"Not really."</em>)<br>
                      <strong>✓ C (He couldn't use his credit card) là vấn đề anh gặp phải.</strong>`,

                q15: `<strong>Đáp án: B – It's quite far from the entrance</strong><br>
                      Barbara nói: <em>"I found it easily. You have to <span class='keyword-highlight'>walk a long way</span> to get to the supermarket."</em> → Bãi đỗ xe xa lối vào supermarket.<br><br>
                      <strong>✗ A (It's only for customers) sai:</strong> Barbara nói <em>"anybody can park all day"</em>, tức cả người không mua hàng cũng đỗ được.<br>
                      <strong>✗ C (It's difficult to find) sai:</strong> Barbara nói <em>"I found it easily"</em>.<br>
                      <strong>✓ B (It's quite far from the entrance) là điều Barbara nói về bãi đỗ xe.</strong>`
            },

            transcript: `
            <p><strong>PART 3</strong></p>
            <p><em>For each question, choose the correct answer.</em></p>
            <p>You will hear two friends, Richard and Barbara, talking about a new supermarket.</p>

            <p><strong>Richard:</strong> Have you been to the new supermarket, Barbara?<br>
            <strong>Barbara:</strong> Yes, Richard, it's great!<br>
            <strong>Richard:</strong> I went this morning. And <span class="highlightable" data-q="11">I couldn't believe it's so large when you get inside!</span><br>
            <strong>Barbara:</strong> Were there many people?<br>
            <strong>Richard:</strong> Not really. But it was early.<br>
            <strong>Barbara:</strong> And you can save money on your shopping.<br>
            <strong>Richard:</strong> Yeah. Every week, there are special offers on one kind of food, like meat for example. <span class="highlightable" data-q="12">It's fruit at the moment.</span><br>
            <strong>Barbara:</strong> And next week it might be... vegetables?<br>
            <strong>Richard:</strong> I suppose.<br>
            <strong>Barbara:</strong> So, what did you like best?<br>
            <strong>Richard:</strong> Well, one of the staff told me about the café, but I didn't have enough time to go. <span class="highlightable" data-q="13">People don't usually like the songs they hear in supermarkets, but I loved them there!</span><br>
            <strong>Barbara:</strong> Me too.<br>
            <strong>Richard:</strong> But I had a problem.<br>
            <strong>Barbara:</strong> You had to wait to pay?<br>
            <strong>Richard:</strong> Not really. <span class="highlightable" data-q="14">I had to pay by cash, but I prefer using my credit card.</span><br>
            <strong>Barbara:</strong> What a shame.<br>
            <strong>Richard:</strong> Did you use the car park?<br>
            <strong>Barbara:</strong> Yes, I found it easily. <span class="highlightable" data-q="15">You have to walk a long way to get to the supermarket,</span> but at least anybody can park all day.</p>

            <p><em>That is the end of Part Three.</em></p>
            `,

            questions: [
                { num: 11, text: "What surprised Richard when he went to the supermarket?", options: ["its size", "the time it opens", "the number of people there"] },
                { num: 12, text: "This week, there are discounts on", options: ["meat.", "fruit.", "vegetables."] },
                { num: 13, text: "What did Richard like most about the supermarket?", options: ["the café", "the staff", "the music"] },
                { num: 14, text: "What problem did Richard have at the supermarket?", options: ["He didn't have any cash.", "He had to wait before he could pay.", "He couldn't use his credit card."] },
                { num: 15, text: "What does Barbara say about the car park?", options: ["It's only for customers.", "It's quite far from the entrance.", "It's difficult to find."] }
            ]
        };

        document.addEventListener('DOMContentLoaded', function () {
            window.listeningCore = new ListeningCore();
            window.listeningCore.initializeTest(ketTest1Part3Data);
            console.log('KET 1 Test 1 Listening Part 3 loaded');
        });
    </script>
</body>

</html>
