<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>PET 1 - Test 1 - Reading Part 6</title>
    <link rel="stylesheet" href="reading-pet-common.css" id="styleLink">
</head>
<body>
<div class="test-wrapper" id="testWrapper">
    <div class="ielts-header">
        <div class="brand">
            <div class="ielts-logo">PET</div>
            <div class="candidate">B1 Preliminary 1 · Test 1 · Part 6 (Reading)</div>
            <div class="font-controls">
                <button class="font-btn" id="fontSmall">A-</button>
                <button class="font-btn" id="fontMedium">A</button>
                <button class="font-btn active" id="fontLarge">A+</button>
            </div>
            <div class="mode-toggle" id="modeToggleContainer">
                <span class="mode-label">Hiện đại</span>
                <label class="mode-switch" title="Chuyển đổi chế độ Cổ điển/Hiện đại">
                    <input type="checkbox" id="modeToggle">
                    <span class="mode-slider"></span>
                </label>
                <span class="mode-label">Cổ điển</span>
            </div>
            <button class="theme-toggle-btn" id="themeToggle" title="Chuyển đổi Dark/Light mode">
                <span class="icon-moon">🌙</span>
                <span class="icon-sun">☀️</span>
            </button>
        </div>
    </div>

    <div class="question-nav">
        <span style="font-weight:600;">Câu 27 – 32</span>
        <div class="nav-buttons" id="navButtons"></div>
        <span id="answeredCount">0/6 answered</span>
    </div>

    <!-- Main area: will be dynamically filled -->
    <div class="main-area split-layout" id="mainArea"></div>

    <div class="bottom-bar">
        <button class="btn btn-primary" id="submitBtn">Nộp bài</button>
        <button class="btn btn-success" id="explainBtn" disabled>Xem giải thích</button>
        <button class="btn btn-danger" id="resetBtn">Reset tất cả</button>
        <div class="progress" id="progressDisplay">Đã làm: 0/6</div>
    </div>

    <div class="context-menu" id="contextMenu">
        <div onclick="applyHighlight('yellow')">Highlight vàng</div>
        <div onclick="applyHighlight('green')">Highlight xanh lá</div>
        <div onclick="applyHighlight('pink')">Highlight hồng</div>
        <div onclick="removeHighlight()">Xóa highlight</div>
    </div>

    <script>
        (function() {
            // ---------- ANSWER KEY ----------
            const answerKey = { 27: "It", 28: "most", 29: "all", 30: "forward", 31: "at", 32: "if" };
            const displayAnswers = { 27: "It", 28: "most", 29: "all", 30: "forward", 31: "at", 32: "if" };

            const detailedExplanations = {
                27: `<div><strong>Cấu trúc cố định:</strong> <em>"It wasn’t until ... that ..."</em> (Mãi cho đến khi... thì...).<br>
                Câu đầy đủ: <em>"It wasn’t until I started to pack a few days ago that I realised how much stuff I had."</em><br>
                Dịch: Mãi cho đến khi tôi bắt đầu đóng gói vài ngày trước thì tôi mới nhận ra mình có bao nhiêu đồ đạc.<br>
                <strong>Lưu ý:</strong> "It" là chủ ngữ giả, đi với "wasn’t until" để nhấn mạnh thời điểm xảy ra hành động.</div>`,
                28: `<div>Sau cụm <strong>"one of the"</strong> luôn cần tính từ ở dạng <strong>so sánh nhất</strong>.<br>
                "stressful" (căng thẳng) → so sánh nhất là "most stressful".<br>
                Câu: <em>"I really think moving house is one of the most stressful things I’ve ever done!"</em><br>
                Dịch: Tôi thực sự nghĩ chuyển nhà là một trong những điều căng thẳng nhất tôi từng làm!</div>`,
                29: `<div>Thành ngữ <strong>"after all"</strong> = suy cho cùng, dù sao thì.<br>
                Dùng để nhấn mạnh một lẽ dĩ nhiên, điều đã biết.<br>
                Câu: <em>"I was sad to leave my old house – after all, I’d lived there my whole life ..."</em><br>
                Dịch: Tôi buồn phải rời ngôi nhà cũ – dù sao thì tôi đã sống ở đó cả đời.</div>`,
                30: `<div>Cụm động từ <strong>"look forward to"</strong> = mong đợi, háo hức.<br>
                Theo sau "to" là danh từ / V-ing. Ở đây: <em>"looking forward to being in this new house"</em><br>
                Dịch: Dù sao thì tôi cũng đang mong chờ được ở trong ngôi nhà mới này.</div>`,
                31: `<div>Cụm từ <strong>"at least"</strong> = ít nhất.<br>
                Dùng để đưa ra một điểm tích cực sau khi nhận xét một điều không quá tốt.<br>
                Câu: <em>"It’s not as big as the old one, but at least it’s got a great garden."</em><br>
                Dịch: Nó không lớn bằng nhà cũ, nhưng ít nhất nó có một khu vườn tuyệt vời.</div>`,
                32: `<div>Câu điều kiện loại 1: <strong>"come along if you are free"</strong> = hãy đến nếu bạn rảnh.<br>
                "if" được dùng để đưa ra một điều kiện thực tế có thể xảy ra.<br>
                Câu: <em>"Why don’t you come along if you are?"</em><br>
                Dịch: Sao bạn không đến nếu bạn rảnh nhỉ?</div>`
            };

            let examSubmitted = false;
            let explanationMode = false;
            let selectedRange = null;
            let currentSplit = false;

            const mainArea = document.getElementById('mainArea');
            const readingCardContent = `
                <div class="reading-card" id="passageCard">
                    <div class="review-title">Moving house</div>
                    <p><strong>Hi Alex,</strong></p>
                    <p>How are you? This week’s been a very busy one for me – I finally moved house!</p>
                    <p>
                        <span class="input-wrapper">
                            <input type="text" id="q27" class="gap-input" data-q="27" autocomplete="off">
                            <span class="eye-icon" data-q="27">👁️</span>
                        </span>
                        wasn’t until I started to pack a few days ago that I realised how much stuff I had.
                    </p>
                    <p>
                        I really think moving house is one of the 
                        <span class="input-wrapper">
                            <input type="text" id="q28" class="gap-input" data-q="28" autocomplete="off">
                            <span class="eye-icon" data-q="28">👁️</span>
                        </span>
                        stressful things I’ve ever done!
                    </p>
                    <p>
                        I was sad to leave my old house – after 
                        <span class="input-wrapper">
                            <input type="text" id="q29" class="gap-input" data-q="29" autocomplete="off">
                            <span class="eye-icon" data-q="29">👁️</span>
                        </span>
                        , I’d lived there my whole life so I have lots of good memories.
                    </p>
                    <p>
                        Anyway, I’m looking 
                        <span class="input-wrapper">
                            <input type="text" id="q30" class="gap-input" data-q="30" autocomplete="off">
                            <span class="eye-icon" data-q="30">👁️</span>
                        </span>
                        to being in this new house.
                    </p>
                    <p>
                        It’s not as big as the old one, but 
                        <span class="input-wrapper">
                            <input type="text" id="q31" class="gap-input" data-q="31" autocomplete="off">
                            <span class="eye-icon" data-q="31">👁️</span>
                        </span>
                        least it’s got a great garden.
                    </p>
                    <p>
                        I’m planning to have a small party on Saturday night. Are you free then? Why don’t you come along 
                        <span class="input-wrapper">
                            <input type="text" id="q32" class="gap-input" data-q="32" autocomplete="off">
                            <span class="eye-icon" data-q="32">👁️</span>
                        </span>
                        you are? I hope you can make it. Let me know.
                    </p>
                    <p><strong>All the best,<br>Sam</strong></p>
                </div>
            `;

            function renderSingleColumn() {
                mainArea.innerHTML = `
                    <div class="single-col">
                        <div class="part-header">
                            <h3>Questions 27–32</h3>
                            <p>For each question, write the correct answer. Write one word for each gap.</p>
                        </div>
                        ${readingCardContent}
                    </div>
                `;
                attachInputEvents();
            }

            function renderSplitColumn() {
                mainArea.innerHTML = `
                    <div class="split-container">
                        <div class="left-col">
                            <div class="part-header">
                                <h3>Questions 27–32</h3>
                                <p>For each question, write the correct answer. Write one word for each gap.</p>
                            </div>
                            ${readingCardContent}
                        </div>
                        <div class="right-col" id="rightCol">
                            <div class="explanation-header">
                                <span>Giải thích</span>
                                <span class="close-explanation-btn" id="closeRightExplain">✕ Đóng</span>
                            </div>
                            <div class="explanation-content" id="rightExplanationText">
                                Nhấn vào biểu tượng con mắt bên cạnh mỗi câu để xem giải thích.
                            </div>
                        </div>
                    </div>
                `;
                attachInputEvents();
                const rightCol = document.getElementById('rightCol');
                if (rightCol && explanationMode) {
                    rightCol.classList.add('show');
                    for (let i = 27; i <= 32; i++) {
                        addBadgeForQuestion(i);
                    }
                    document.querySelectorAll('.correct-answer-badge').forEach(badge => badge.style.display = 'inline-block');
                }
                document.getElementById('closeRightExplain')?.addEventListener('click', () => {
                    const col = document.getElementById('rightCol');
                    if (col) col.classList.remove('show');
                });
            }

            function attachInputEvents() {
                document.querySelectorAll('.gap-input').forEach(inp => {
                    inp.addEventListener('input', () => updateAnswerCount());
                });
                document.querySelectorAll('.eye-icon').forEach(icon => {
                    icon.addEventListener('click', (e) => {
                        const q = parseInt(e.currentTarget.dataset.q);
                        if (!explanationMode && !examSubmitted) return;
                        showExplanationInRightColumn(q);
                    });
                });
            }

            function getUserAnswer(qNum) {
                const input = document.getElementById(`q${qNum}`);
                return input ? input.value.trim() : "";
            }

            function isAnswerCorrect(qNum, val) {
                return val.toLowerCase() === answerKey[qNum].toLowerCase();
            }

            function updateAnswerCount() {
                let answered = 0;
                for (let i = 27; i <= 32; i++) {
                    if (getUserAnswer(i) !== "") answered++;
                }
                document.getElementById('answeredCount').textContent = `${answered}/6 answered`;
                document.getElementById('progressDisplay').textContent = `Đã làm: ${answered}/6`;
                for (let i = 27; i <= 32; i++) {
                    const btn = document.querySelector(`.nav-btn[data-q="${i}"]`);
                    if (btn) {
                        btn.classList.remove('answered', 'unanswered');
                        btn.classList.add(getUserAnswer(i) !== "" ? 'answered' : 'unanswered');
                    }
                }
            }

            function createNavButtons() {
                const nav = document.getElementById('navButtons');
                nav.innerHTML = '';
                for (let i = 27; i <= 32; i++) {
                    const btn = document.createElement('button');
                    btn.className = 'nav-btn unanswered';
                    btn.textContent = i;
                    btn.dataset.q = i;
                    btn.addEventListener('click', () => {
                        const input = document.getElementById(`q${i}`);
                        if (input) {
                            input.scrollIntoView({ behavior: 'smooth', block: 'center' });
                            input.focus();
                        }
                        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                    });
                    nav.appendChild(btn);
                }
                updateAnswerCount();
            }

            function addBadgeForQuestion(qNum) {
                const input = document.getElementById(`q${qNum}`);
                if (!input) return;
                const wrapper = input.parentNode;
                let existing = wrapper.querySelector('.correct-answer-badge');
                if (existing) existing.remove();
                const badge = document.createElement('span');
                badge.className = 'correct-answer-badge';
                badge.textContent = displayAnswers[qNum];
                if (explanationMode) badge.style.display = 'inline-block';
                wrapper.appendChild(badge);
            }

            function removeAllBadges() {
                document.querySelectorAll('.correct-answer-badge').forEach(b => b.remove());
            }

            function showExplanationInRightColumn(questionNum) {
                if (!explanationMode && !examSubmitted) return;
                const rightCol = document.getElementById('rightCol');
                if (rightCol) rightCol.classList.add('show');
                const explanationDiv = document.getElementById('rightExplanationText');
                if (!explanationDiv) return;
                let html = detailedExplanations[questionNum] || `<strong>Đáp án: ${displayAnswers[questionNum]}</strong>`;
                if (examSubmitted) {
                    const user = getUserAnswer(questionNum) || "(chưa điền)";
                    const correct = isAnswerCorrect(questionNum, user);
                    html += `<div class="answer-feedback ${correct ? 'correct' : 'incorrect'}">`;
                    html += `<strong>Câu trả lời của bạn:</strong> "${user}" ${user ? (correct ? '✓' : '✗') : ''}<br>`;
                    if (!correct) html += `<strong>Đáp án đúng:</strong> ${displayAnswers[questionNum]}`;
                    else html += `Chính xác!`;
                    html += `</div>`;
                }
                explanationDiv.innerHTML = html;
                if (examSubmitted) addBadgeForQuestion(questionNum);
            }

            function markAnswers() {
                let correctCount = 0;
                for (let i = 27; i <= 32; i++) {
                    const input = document.getElementById(`q${i}`);
                    const userVal = getUserAnswer(i);
                    const correct = isAnswerCorrect(i, userVal);
                    if (correct) correctCount++;
                    input.classList.remove('correct', 'incorrect');
                    input.classList.add(correct ? 'correct' : 'incorrect');
                }
                return correctCount;
            }

            function resetAll() {
                examSubmitted = false;
                explanationMode = false;
                currentSplit = false;
                for (let i = 27; i <= 32; i++) {
                    const input = document.getElementById(`q${i}`);
                    if (input) {
                        input.value = '';
                        input.disabled = false;
                        input.classList.remove('correct', 'incorrect');
                    }
                }
                removeAllBadges();
                document.querySelectorAll('.eye-icon').forEach(icon => icon.style.display = 'none');
                document.getElementById('submitBtn').disabled = false;
                document.getElementById('submitBtn').textContent = 'Nộp bài';
                document.getElementById('explainBtn').disabled = true;
                document.getElementById('explainBtn').textContent = 'Xem giải thích';
                renderSingleColumn();
                updateAnswerCount();
            }

            function saveToDashboard() {
                if (!examSubmitted) return;
                const skill = 'reading';
                const book = 1, test = 1, part = 6;
                const details = [];
                let correctCount = 0;
                for (let i = 27; i <= 32; i++) {
                    const user = getUserAnswer(i);
                    const correct = answerKey[i];
                    const isCor = user.toLowerCase() === correct.toLowerCase();
                    if (isCor) correctCount++;
                    details.push({ question: i, user: user || '(trống)', correct: correct, isCorrect: isCor });
                }
                const partData = { partId: part, name: `Part ${part}`, totalQuestions: details.length, correctCount, details };
                localStorage.setItem(`pet_${skill}_book${book}_test${test}_part${part}`, JSON.stringify(partData));
            }

            // Event listeners
            document.getElementById('submitBtn').addEventListener('click', () => {
                if (examSubmitted) return;
                let unanswered = [];
                for (let i = 27; i <= 32; i++) if (!getUserAnswer(i)) unanswered.push(i);
                if (unanswered.length > 0 && !confirm(`Bạn còn ${unanswered.length} câu chưa điền. Nộp bài?`)) return;

                examSubmitted = true;
                const correctCount = markAnswers();
                document.getElementById('submitBtn').disabled = true;
                document.getElementById('submitBtn').textContent = 'Đã nộp bài';
                document.getElementById('explainBtn').disabled = false;
                saveToDashboard();
                document.querySelectorAll('.gap-input').forEach(el => el.disabled = true);
                // No alert popup – user must click "Xem giải thích" to see results
            });

            document.getElementById('explainBtn').addEventListener('click', () => {
                if (!examSubmitted) return;
                explanationMode = true;
                if (!currentSplit) {
                    currentSplit = true;
                    renderSplitColumn();
                } else {
                    const rightCol = document.getElementById('rightCol');
                    if (rightCol) rightCol.classList.add('show');
                }
                document.querySelectorAll('.eye-icon').forEach(icon => icon.style.display = 'inline-block');
                document.getElementById('explainBtn').disabled = true;
                document.getElementById('explainBtn').textContent = 'Đang xem giải thích';
                for (let i = 27; i <= 32; i++) {
                    addBadgeForQuestion(i);
                }
                document.querySelectorAll('.correct-answer-badge').forEach(badge => badge.style.display = 'inline-block');
            });

            document.getElementById('resetBtn').addEventListener('click', () => {
                if (confirm('Reset tất cả câu trả lời?')) resetAll();
            });

            // Font size
            function setFontSize(size) {
                document.querySelectorAll('.font-btn').forEach(btn => btn.classList.remove('active'));
                document.getElementById(`font${size.charAt(0).toUpperCase()+size.slice(1)}`).classList.add('active');
                const wrapper = document.getElementById('testWrapper');
                wrapper.classList.remove('font-small', 'font-medium', 'font-large');
                wrapper.classList.add(`font-${size}`);
            }
            document.getElementById('fontSmall').addEventListener('click', () => setFontSize('small'));
            document.getElementById('fontMedium').addEventListener('click', () => setFontSize('medium'));
            document.getElementById('fontLarge').addEventListener('click', () => setFontSize('large'));

            // Context menu manual highlight
            function showContextMenu(e) {
                const sel = window.getSelection();
                if (sel.toString().trim()) {
                    e.preventDefault();
                    selectedRange = sel.getRangeAt(0);
                    const menu = document.getElementById('contextMenu');
                    menu.style.left = e.pageX + 'px';
                    menu.style.top = e.pageY + 'px';
                    menu.style.display = 'block';
                }
            }
            document.addEventListener('click', () => {
                document.getElementById('contextMenu').style.display = 'none';
                selectedRange = null;
            });
            window.applyHighlight = (color) => {
                if (!selectedRange) return;
                try {
                    const span = document.createElement('span');
                    span.className = `highlight-${color}`;
                    span.appendChild(selectedRange.extractContents());
                    selectedRange.insertNode(span);
                } catch(e) { console.log(e); }
                document.getElementById('contextMenu').style.display = 'none';
                selectedRange = null;
            };
            window.removeHighlight = () => {
                if (!selectedRange) return;
                const highlights = document.querySelectorAll('.highlight-yellow, .highlight-green, .highlight-pink');
                highlights.forEach(h => {
                    if (selectedRange.intersectsNode(h)) {
                        const parent = h.parentNode;
                        while (h.firstChild) parent.insertBefore(h.firstChild, h);
                        parent.removeChild(h);
                    }
                });
                document.getElementById('contextMenu').style.display = 'none';
                selectedRange = null;
            };

            function attachContextMenuToReading() {
                const container = document.querySelector('.left-col, .single-col');
                if (container) {
                    container.addEventListener('contextmenu', showContextMenu);
                }
            }

            // Override render to attach context menu
            const origSingle = renderSingleColumn;
            const origSplit = renderSplitColumn;
            renderSingleColumn = function() {
                origSingle();
                attachContextMenuToReading();
            };
            renderSplitColumn = function() {
                origSplit();
                attachContextMenuToReading();
            };

            // ==================== MODE TOGGLE (Classic/Modern) ====================
            const modeToggle = document.getElementById('modeToggle');
            const styleLink = document.getElementById('styleLink');
            const testWrapper = document.getElementById('testWrapper');
            const html = document.documentElement;
            const savedMode = localStorage.getItem('pet-mode');

            function setMode(isClassic) {
                if (isClassic) {
                    styleLink.href = 'reading-pet-common1.css';
                    testWrapper.classList.add('classic-mode');
                    html.removeAttribute('data-theme');
                    localStorage.removeItem('pet-theme');
                } else {
                    styleLink.href = 'reading-pet-common.css';
                    testWrapper.classList.remove('classic-mode');
                }
                localStorage.setItem('pet-mode', isClassic ? 'classic' : 'modern');
            }

            if (savedMode === 'classic') {
                modeToggle.checked = true;
                setMode(true);
            } else {
                modeToggle.checked = false;
                setMode(false);
            }

            modeToggle.addEventListener('change', () => {
                setMode(modeToggle.checked);
            });

            // ==================== THEME TOGGLE ====================
            const themeToggle = document.getElementById('themeToggle');
            const savedTheme = localStorage.getItem('pet-theme');
            if (savedTheme === 'dark' && !testWrapper.classList.contains('classic-mode')) {
                html.setAttribute('data-theme', 'dark');
            }
            themeToggle.addEventListener('click', () => {
                if (testWrapper.classList.contains('classic-mode')) return;
                const currentTheme = html.getAttribute('data-theme');
                const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
                html.setAttribute('data-theme', newTheme);
                localStorage.setItem('pet-theme', newTheme);
            });

            // Initialize
            createNavButtons();
            renderSingleColumn();
            setFontSize('large');
            updateAnswerCount();
        })();
    </script>
</body>
</html>
