    <link rel="stylesheet" href="listening-pet-common.css" id="styleLink">
</head>

<body>

        <!-- Header -->
        <div class="ielts-header">

                        <option value="0.7">0.7x</option>
                        <option value="0.9">0.9x</option>

                    </select>

                </div>
            </div>
        </div>

        <!-- Question navigator -->
        <div class="question-nav">
            <div class="nav-buttons" id="navButtons"></div>
        </div>

        <!-- Main area -->
        <div class="main-area" id="mainArea">
            <!-- Transcript panel -->
            <div class="transcript-panel" id="transcriptPanel">
                <div class="panel-header"><span>TRANSCRIPT</span></div>
                <div class="transcript-content font-large" id="transcriptContent"></div>
            </div>
            <div class="resizer" id="resizer"></div>

            <!-- Questions panel -->
            <div class="questions-panel" id="questionsPanel">
                <div class="panel-header">
                    <span>QUESTIONS 16–20</span>
                    <span class="answer-badge" id="answeredCount">0/5 answered</span>
                </div>
                <div class="questions-list font-large centered" id="questionsContent">
                    <div>
                        <h3>PART 4 &nbsp; Questions 16–20</h3>
                        <p><em>For each question, choose the correct answer.</em></p>
                        <div class="notes-box" id="questionsContainer"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Bottom bar -->
        <div class="bottom-bar">
            <button class="btn btn-primary" id="submitBtn">Nộp bài</button>
            <button class="btn btn-success" id="explainBtn" disabled>Xem giải thích</button>
            <button class="btn btn-danger" id="resetBtn">Reset</button>
            <div class="progress" id="progressDisplay">Đã làm: 0/5</div>
        </div>

        <!-- Explanation panel -->
        <div class="explanation-panel" id="explanationPanel">
            <div class="resize-handle" id="explanationResizer"></div>
            <div class="explanation-header">
                <span id="explanationTitle">Giải thích</span>
                <span class="close-btn" id="closeExplanation">✕ Đóng</span>
            </div>
            <div class="explanation-content" id="explanationText"></div>
        </div>
    </div>

    <!-- Context menu -->
    <div class="context-menu" id="contextMenu">
        <div onclick="applyHighlight('yellow')">Highlight vàng</div>
        <div onclick="applyHighlight('green')">Highlight xanh lá</div>
        <div onclick="applyHighlight('pink')">Highlight hồng</div>
        <div onclick="removeHighlight()">Xóa highlight</div>
    </div>

    <script src="core-listening-ket.js"></script>
    <script>
        const ketTest1Part4Data = {
            title: "KET 2 · Test 1 · Listening Part 4",
            type: "multiple-choice",
            part: 4,
            book: 2,
            test: 1,

            answerKey: { q16: 'C', q17: 'A', q18: 'C', q19: 'C', q20: 'A' },
            displayAnswers: { q16: 'C', q17: 'A', q18: 'C', q19: 'C', q20: 'A' },

            detailedExplanations: {
                q16: `<strong>Đáp án: C – something to read (thứ gì đó để đọc)</strong><br>
                      Người đàn ông hỏi: <em>"Are you ready to go into town?"</em><br>
                      Người phụ nữ hỏi về áo khoác: <em>"Yes, do you want to try on the coat that you saw last week?"</em><br>
                      Người đàn ông từ chối: <em>"I'd rather go another day… I'd like to go to the bookshop. There's a book I want."</em><br>
                      Người phụ nữ đồng ý: <em>"Great, I'll come with you to get the financial magazine I like."</em><br>
                      Về đồ ăn: Người đàn ông nói <em>"I'll cook instead"</em> → Không mua pizza.<br><br>
                      <strong>✗ A (something to eat) sai:</strong> Người đàn ông từ chối mua pizza và nói sẽ tự nấu ăn.<br>
                      <strong>✗ B (something to wear) sai:</strong> Người đàn ông từ chối thử áo khoác và muốn đi ngày khác.<br>
                      <strong>✓ C (something to read) là đúng – họ đi hiệu sách mua sách và tạp chí.</strong>`,

                q17: `<strong>Đáp án: A – to change their plans (thay đổi kế hoạch)</strong><br>
                      Người phụ nữ nhắn tin: <em>"Hi, Stephanie! I was going to come round to your place this afternoon. I've got that book I agreed to lend you, but guess what? My car's not working, so I'll have to wait for it to be repaired this afternoon. I'm going to the theatre after dinner tonight, so <span class='keyword-highlight'>we'll have to meet another time</span>. I hope that's OK – sorry!"</em><br><br>
                      <strong>✗ B (to ask to borrow something) sai:</strong> Người phụ nữ mang sách ĐẾN cho Stephanie, không phải mượn.<br>
                      <strong>✗ C (to invite her for a meal) sai:</strong> Không có lời mời ăn tối, người phụ nữ nói sẽ đi nhà hát sau bữa tối.<br>
                      <strong>✓ A (to change their plans) là đúng – cô ấy không đến được và hẹn ngày khác ("meet another time").</strong>`,

                q18: `<strong>Đáp án: C – an old school friend (một người bạn cũ ở trường)</strong><br>
                      Người phụ nữ (chị gái) hỏi: <em>"Did you have fun in town?"</em><br>
                      Người đàn ông (em trai) đáp: <em>"I only went for a newspaper, but do you remember Michael?"</em><br>
                      Chị gái hỏi: <em>"The man you live next door to?"</em><br>
                      Em trai đáp: <em>"Not that Michael – <span class='keyword-highlight'>the one who was in my class when I was a kid</span>? We were best mates. He was in the shop and we had a good chat."</em><br><br>
                      <strong>✗ A (a colleague) sai:</strong> Michael là bạn cũ, không phải đồng nghiệp.<br>
                      <strong>✗ B (a neighbour) sai:</strong> Người hàng xóm tên Michael là người khác ("Not that Michael").<br>
                      <strong>✓ C (an old school friend) là đúng – Michael là bạn cùng lớp hồi nhỏ ("in my class when I was a kid").</strong>`,

                q19: `<strong>Đáp án: C – to the beach (đến bãi biển)</strong><br>
                      Người phụ nữ đề xuất: <em>"What a hot day for a picnic! Shall we go to the woods? It'll be cooler under the trees."</em><br>
                      Người đàn ông đáp: <em>"Can't we go someplace where we can go swimming too?"</em><br>
                      Người phụ nữ lo lắng: <em>"Oh, but remember, I'm not a good swimmer. I don't feel safe in the river."</em><br>
                      Người đàn ông đề xuất: <em>"How about <span class='keyword-highlight'>the seaside</span>? It's not dangerous there, and we can watch people sailing."</em><br>
                      Người phụ nữ đồng ý: <em>"Oh, OK."</em><br><br>
                      <strong>✗ A (to the forest) sai:</strong> Đây là đề xuất ban đầu của người phụ nữ nhưng bị từ chối.<br>
                      <strong>✗ B (to the river) sai:</strong> Người phụ nữ không cảm thấy an toàn ở sông ("don't feel safe in the river").<br>
                      <strong>✓ C (to the beach) là đúng – họ quyết định đi biển ("the seaside").</strong>`,

                q20: `<strong>Đáp án: A – A special guest is visiting it (một vị khách đặc biệt đang thăm bảo tàng)</strong><br>
                      Hướng dẫn viên nói: <em>"This is the National Museum. I'm afraid we won't be able to go inside today, which is a pity because it's just been painted and looks lovely. You'll notice some roads are closed too – that's because <span class='keyword-highlight'>an important visitor's arriving today – the Queen</span>! She's here on holiday and is having a private tour of the museum, so we can't go in."</em><br><br>
                      <strong>✗ B (Today is a national holiday) sai:</strong> Không đề cập đến ngày lễ quốc gia.<br>
                      <strong>✗ C (They are painting it) sai:</strong> Bảo tàng vừa được sơn xong ("just been painted"), không phải đang sơn.<br>
                      <strong>✓ A (A special guest is visiting it) là đúng – Nữ hoàng đang có chuyến tham quan riêng ("the Queen... having a private tour").</strong>`
            },

            transcript: `
            <p><strong>PART 4</strong></p>
            <p><em>For each question, choose the correct answer.</em></p>

            <p><strong>Question 16</strong><br>
            You will hear a man and a woman talking about going shopping. What will they buy?<br>
            <strong>Man:</strong> Are you ready to go into town?<br>
            <strong>Woman:</strong> Yes, do you want to try on the coat that you saw last week?<br>
            <strong>Man:</strong> <span class="highlightable" data-q="16">I'd rather go another day… I'd like to go to the bookshop. There's a book I want.</span><br>
            <strong>Woman:</strong> Great, I'll come with you to get the financial magazine I like. Shall we pick up a pizza for dinner?<br>
            <strong>Man:</strong> Hmmm… I'll cook instead.</p>

            <p><strong>Question 17</strong><br>
            You will hear a woman leaving a message for a friend. Why is the woman phoning her friend?<br>
            <strong>Woman:</strong> <span class="highlightable" data-q="17">Hi, Stephanie! I was going to come round to your place this afternoon. I've got that book I agreed to lend you, but guess what? My car's not working, so I'll have to wait for it to be repaired this afternoon. I'm going to the theatre after dinner tonight, so we'll have to meet another time.</span> I hope that's OK – sorry!</p>

            <p><strong>Question 18</strong><br>
            You will hear a man telling his sister about meeting someone yesterday. Who did he see in town?<br>
            <strong>Woman:</strong> Did you have fun in town?<br>
            <strong>Man:</strong> <span class="highlightable" data-q="18">I only went for a newspaper, but do you remember Michael? The man you live next door to? Not that Michael – the one who was in my class when I was a kid? We were best mates. He was in the shop and we had a good chat.</span> He's got an amazing job as a pilot.<br>
            <strong>Woman:</strong> Cool!</p>

            <p><strong>Question 19</strong><br>
            You will hear two friends making plans for the day. Where do they decide to go?<br>
            <strong>Woman:</strong> What a hot day for a picnic! Shall we go to the woods? It'll be cooler under the trees.<br>
            <strong>Man:</strong> Can't we go someplace where we can go swimming too?<br>
            <strong>Woman:</strong> Oh, but remember, I'm not a good swimmer. I don't feel safe in the river.<br>
            <strong>Man:</strong> <span class="highlightable" data-q="19">How about the seaside? It's not dangerous there, and we can watch people sailing.</span><br>
            <strong>Woman:</strong> Oh, OK.</p>

            <p><strong>Question 20</strong><br>
            You will hear a city tour guide giving a talk. Why is the museum closed now?<br>
            <strong>Man:</strong> This is the National Museum. I'm afraid we won't be able to go inside today, which is a pity because it's just been painted and looks lovely. You'll notice some roads are closed too – <span class="highlightable" data-q="20">that's because an important visitor's arriving today – the Queen! She's here on holiday and is having a private tour of the museum, so we can't go in.</span></p>

            <p><em>That is the end of Part Four.</em></p>
            `,

            questions: [
                { num: 16, text: "You will hear a man and a woman talking about going shopping. What will they buy?", options: ["something to eat", "something to wear", "something to read"] },
                { num: 17, text: "You will hear a woman leaving a message for a friend. Why is the woman phoning her friend?", options: ["to change their plans", "to ask to borrow something", "to invite her for a meal"] },
                { num: 18, text: "You will hear a man telling his sister about meeting someone yesterday. Who did he see in town?", options: ["a colleague", "a neighbour", "an old school friend"] },
                { num: 19, text: "You will hear two friends making plans for the day. Where do they decide to go?", options: ["to the forest", "to the river", "to the beach"] },
                { num: 20, text: "You will hear a city tour guide giving a talk. Why is the museum closed now?", options: ["A special guest is visiting it.", "Today is a national holiday.", "They are painting it."] }
            ]
        };

        document.addEventListener('DOMContentLoaded', function () {
            window.listeningCore = new ListeningCore();
            window.listeningCore.initializeTest(ketTest1Part4Data);
            console.log('KET 2 Test 1 Listening Part 4 loaded');
        });
    </script>
