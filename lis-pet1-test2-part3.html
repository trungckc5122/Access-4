<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PET 1 · Test 2 · Part 3</title>
    <link rel="stylesheet" href="listening-pet-common.css" id="styleLink">
</head>
<body>
<div class="test-wrapper" id="testWrapper">
    <!-- Header -->
    <div class="ielts-header">
        <div class="brand">
            <div class="ielts-logo">PET</div>
            <div class="candidate">B1 Preliminary 1 · Test 2 · Part 3</div>
            <div class="audio-controls">
                <audio id="listeningAudio" controls>
                    <source src="audio/B1 Preliminary 1 - Test 2 Part 3.mp3" type="audio/mpeg">
                    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg">
                </audio>
                <select class="speed-select" id="speedSelect">
                    <option value="0.7">0.7x</option>
                    <option value="0.9">0.9x</option>
                    <option value="1.0" selected>1x</option>
                    <option value="1.1">1.1x</option>
                    <option value="1.25">1.25x</option>
                </select>
                <span class="volume-icon">🔊</span>
            </div>
        </div>
        <div class="font-controls">
            <button class="font-btn" id="fontSmall">A-</button>
            <button class="font-btn" id="fontMedium">A</button>
            <button class="font-btn active" id="fontLarge">A+</button>
        </div>
        <div class="mode-toggle" id="modeToggleContainer">
            <span class="mode-label">Hiện đại</span>
            <label class="mode-switch" title="Chuyển đổi chế độ Cổ điển/Hiện đại">
                <input type="checkbox" id="modeToggle">
                <span class="mode-slider"></span>
            </label>
            <span class="mode-label">Cổ điển</span>
        </div>
        <button class="theme-toggle-btn" id="themeToggle" title="Chuyển đổi Dark/Light mode">
            <span class="icon-moon">🌙</span>
            <span class="icon-sun">☀️</span>
        </button>
    </div>

    <!-- Question navigator (14-19) -->
    <div class="question-nav">
        <span style="font-weight:600; color:#1e3a5f;">Câu 14-19:</span>
        <div class="nav-buttons" id="navButtons"></div>
    </div>

    <!-- Main area -->
    <div class="main-area" id="mainArea">
        <!-- Transcript panel (ẩn ban đầu) -->
        <div class="transcript-panel" id="transcriptPanel">
            <div class="panel-header">
                <span>TRANSCRIPT</span>
            </div>
            <div class="transcript-content font-large" id="transcriptContent"></div>
        </div>
        <div class="resizer" id="resizer"></div>

        <!-- Questions panel -->
        <div class="questions-panel" id="questionsPanel">
            <div class="panel-header">
                <span>QUESTIONS 14-19</span>
                <span class="answer-badge" id="answeredCount">0/6 answered</span>
            </div>
            <div class="questions-list font-large centered" id="questionsContent">
                <div>
                    <h3>PART 3 Questions 14-19</h3>
                    <p><em>Write one or two words or a number or a date or a time.</em></p>
                    <div class="notes-box" id="questionsContainer"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bottom bar -->
    <div class="bottom-bar">
        <button class="btn btn-primary" id="submitBtn">Nộp bài</button>
        <button class="btn btn-success" id="explainBtn" disabled>Xem giải thích</button>
        <button class="btn btn-danger" id="resetBtn">Reset tất cả</button>
        <div class="progress" id="progressDisplay">Đã làm: 0/6</div>
    </div>

    <!-- Explanation panel -->
    <div class="explanation-panel" id="explanationPanel">
        <div class="resize-handle" id="explanationResizer"></div>
        <div class="explanation-header">
            <span id="explanationTitle">Giải thích</span>
            <span class="close-btn" id="closeExplanation">✕ Đóng</span>
        </div>
        <div class="explanation-content" id="explanationText"></div>
    </div>
</div>

<!-- Context menu for manual highlighting -->
<div class="context-menu" id="contextMenu">
    <div onclick="applyHighlight('yellow')">Highlight vàng</div>
    <div onclick="applyHighlight('green')">Highlight xanh lá</div>
    <div onclick="applyHighlight('pink')">Highlight hồng</div>
    <div onclick="removeHighlight()">Xóa highlight</div>
</div>

<!-- Core Listening Engine -->
<script src="core-listening.js"></script>

<script>
    // Test Data for PET 1 Test 2 Part 3 (Fill-in-the-blank)
    const pet1Test2Part3Data = {
        title: "B1 Preliminary 1 · Test 2 · Part 3",
        type: "fill-blank",
        part: 3,
        book: 1,
        test: 2,

        // Answer Key
        answerKey: {
            q14: 'art',
            q15: 'people',
            q16: 'animals',
            q17: 'acting',
            q18: ['eight months', '8 months', 'eight', '8'],
            q19: 'website'
        },

        // Display Answers
        displayAnswers: {
            q14: 'ART',
            q15: 'PEOPLE',
            q16: 'ANIMALS',
            q17: 'ACTING',
            q18: 'eight months / 8 months',
            q19: 'WEBSITE'
        },

        // Detailed Explanations
        detailedExplanations: {
            q14: `<strong>Đáp án: ART</strong><br>
                  Kelly nói rằng cô ấy biết nhiều về máy tính nhưng thực tế: <em>"I actually studied art for my degree."</em> → Bằng cấp của cô là nghệ thuật.`,
            q15: `<strong>Đáp án: PEOPLE</strong><br>
                  Cô ấy đánh giá cao phần mềm nhưng nhấn mạnh: <em>"it's the people there that make it such a fantastic place to work."</em> → Chính con người làm công ty tuyệt vời.`,
            q16: `<strong>Đáp án: ANIMALS</strong><br>
                  Phòng của Kelly chịu trách nhiệm: <em>"the one I'm in works on animals in the story"</em> → tạo hình động vật.`,
            q17: `<strong>Đáp án: ACTING</strong><br>
                  Cô ấy vừa mới bắt đầu: <em>"I've just started doing acting classes"</em> để phát triển kỹ năng làm phim.`,
            q18: `<strong>Đáp án: eight months / 8 months</strong><br>
                  Kelly so sánh: <em>"Compare that to the eight months it takes my company to do the same"</em> → công ty cô ấy mất 8 tháng.`,
            q19: `<strong>Đáp án: WEBSITE</strong><br>
                  Dự án tiếp theo: <em>"It's actually something for a website."</em> → phim hoạt hình cho trang web.`
        },

        // Transcript with highlightable spans
        transcript: `
            <p><strong>Woman:</strong> My name's Kelly Robinson and I make cartoons for a living. I do this on computers and I've been doing the job since I left university. Although I now know almost as much about computing as I do about cartoon design, <span class="highlightable" data-q="14">I actually studied art for my degree.</span></p>
            <p>I got a job with a major film studio soon after leaving university. It's a great company to work for. The software programmes we use for making cartoons are really good, but <span class="highlightable" data-q="15">it's the people there that make it such a fantastic place to work.</span></p>
            <p>Each department has its own special job to do when we're making a cartoon film. For example, <span class="highlightable" data-q="16">the one I'm in works on animals in the story</span>, while others focus on the human characters or the buildings. It's then the director's job to bring everything together.</p>
            <p>I'm always learning new skills to help improve my work. I did a writing course last year and learnt a lot about different types of stories. And <span class="highlightable" data-q="17">I've just started doing acting classes, which are surprisingly useful for understanding filmmaking</span>, even though I don't plan to appear in any films.</p>
            <p>Some companies make cartoons the old-fashioned way using thousands of individual drawings but this takes a long time. Using this technique, it can take about two years to create a full-length film. <span class="highlightable" data-q="18">Compare that to the eight months it takes my company to do the same</span> and you see the advantage of using computers.</p>
            <p><span class="highlightable" data-q="19">My next cartoon project will be the first thing I've done that isn't a film for children. It's actually something for a website.</span> After working on so many kids' comedies, it'll be an interesting challenge.</p>
            <p><em>(Now listen again.)</em></p>
            <p>That is the end of Part Three.</p>
        `,

        // Template for fill-in-the-blank questions
        template: `
            <p><strong>Kelly Robinson – maker of cartoon films</strong></p>
            <p>Kelly did a degree in <span class="question-number">(14)</span> <span class="blank-line"><input class="fill-input" id="q14"></span> at university.</p>
            <p>Kelly really enjoys going to work because of the <span class="question-number">(15)</span> <span class="blank-line"><input class="fill-input" id="q15"></span> at the company.</p>
            <p>Kelly's department is responsible for creating <span class="question-number">(16)</span> <span class="blank-line"><input class="fill-input" id="q16"></span> in cartoons.</p>
            <p>At the moment Kelly is trying to develop her <span class="question-number">(17)</span> <span class="blank-line"><input class="fill-input" id="q17"></span> skills.</p>
            <p>It takes Kelly's company <span class="question-number">(18)</span> <span class="blank-line"><input class="fill-input" id="q18"></span> to make a full-length cartoon film.</p>
            <p>Kelly's next project will be some cartoons for a <span class="question-number">(19)</span> <span class="blank-line"><input class="fill-input" id="q19"></span> .</p>
        `,

        // Questions array for navigation
        questions: [
            { num: 14 },
            { num: 15 },
            { num: 16 },
            { num: 17 },
            { num: 18 },
            { num: 19 }
        ]
    };

    // Initialize the listening test when DOM is loaded
    document.addEventListener('DOMContentLoaded', function() {
        window.listeningCore = new ListeningCore();
        window.listeningCore.initializeTest(pet1Test2Part3Data);
        console.log('PET 1 Test 2 Part 3 loaded with core listening engine');
    });
</script>
</body>
</html>
