                      <strong>Girl:</strong> <em>"I hope so."</em><br><br>
                      <strong>✗ A (Rain) sai:</strong> Trời sẽ khô ráo ("it's going to stay dry"), không mưa.<br>
                      <strong>✗ C (Sun) sai:</strong> Nắng là ngày mai ("it'll be sunny again tomorrow"), không phải chiều nay.<br>

                      <strong>✗ C (Hotel/Apartment) sai:</strong> Mẹ muốn ở khách sạn lớn ("Mum wanted to stay in a big hotel") nhưng cuối cùng họ chọn guest house thay thế.<br>
                      <strong>✓ A (Guest house) là đúng – họ ở nhà nghỉ có vườn đẹp ("booked a guest house with a nice garden").</strong>`,

                q4: `<strong>Đáp án: C – History (lịch sử)</strong><br>

                      <strong>✗ B (Geography) sai:</strong> Cậu bé bắt đầu địa lý nhưng chán ("I started geography, but got bored"), chưa xong.<br>
                      <strong>✓ C (History) là đúng – cậu bé đã làm xong tất cả bài tập lịch sử ("did all the history exercise").</strong>`,

                      <strong>Girl:</strong> <em>"Great, thanks. I wanted to go swimming, but there was a competition at the pool all weekend so I couldn't go in."</em><br>

            <strong>Girl:</strong> It was actually. And the place only had two floors.<br>
            <strong>Boy:</strong> Well, I love camping.<br>
            <em>Now listen again. [repeat]</em></p>

            <p><strong>Question 4</strong><br>
