<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KET 2 - Test 1 - Listening Part 1</title>
    <link rel="stylesheet" href="listening-pet-common.css" id="styleLink">
</head>

<body>
    <div class="test-wrapper" id="testWrapper">
        <!-- Header -->
        <div class="ielts-header">
            <div class="brand">
                <div class="ielts-logo">KET</div>
                <div class="candidate"></div>
                <div class="audio-controls">
                    <audio id="listeningAudio" controls>
                        <source src="audio/KET 2 - Test 1 Part 1.mp3" type="audio/mpeg">
                    </audio>
                    <select class="speed-select" id="speedSelect">
                        <option value="0.7">0.7x</option>
                        <option value="0.9">0.9x</option>
                        <option value="1.0" selected>1x</option>
                        <option value="1.1">1.1x</option>
                        <option value="1.25">1.25x</option>
                    </select>
                    <span class="volume-icon">🔊</span>
                </div>
            </div>
        </div>

        <!-- Question navigator -->
        <div class="question-nav">
            <div class="nav-buttons" id="navButtons"></div>
        </div>

        <!-- Main area -->
        <div class="main-area" id="mainArea">
            <!-- Transcript panel -->
            <div class="transcript-panel" id="transcriptPanel">
                <div class="panel-header"><span>TRANSCRIPT</span></div>
                <div class="transcript-content font-large" id="transcriptContent"></div>
            </div>
            <div class="resizer" id="resizer"></div>

            <!-- Questions panel -->
            <div class="questions-panel" id="questionsPanel">
                <div class="panel-header">
                    <span>QUESTIONS 1–5</span>
                    <span class="answer-badge" id="answeredCount">0/5 answered</span>
                </div>
                <div class="questions-list font-large centered" id="questionsContent">
                    <div>
                        <h3>PART 1 &nbsp; Questions 1–5</h3>
                        <p><em>For each question, choose the correct answer.</em></p>
                        <div class="notes-box" id="questionsContainer"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Bottom bar -->
        <div class="bottom-bar">
            <button class="btn btn-primary" id="submitBtn">Nộp bài</button>
            <button class="btn btn-success" id="explainBtn" disabled>Xem giải thích</button>
            <button class="btn btn-danger" id="resetBtn">Reset</button>
            <div class="progress" id="progressDisplay">Đã làm: 0/5</div>
        </div>

        <!-- Explanation panel -->
        <div class="explanation-panel" id="explanationPanel">
            <div class="resize-handle" id="explanationResizer"></div>
            <div class="explanation-header">
                <span id="explanationTitle">Giải thích</span>
                <span class="close-btn" id="closeExplanation">✕ Đóng</span>
            </div>
            <div class="explanation-content" id="explanationText"></div>
        </div>
    </div>

    <!-- Context menu -->
    <div class="context-menu" id="contextMenu">
        <div onclick="applyHighlight('yellow')">Highlight vàng</div>
        <div onclick="applyHighlight('green')">Highlight xanh lá</div>
        <div onclick="applyHighlight('pink')">Highlight hồng</div>
        <div onclick="removeHighlight()">Xóa highlight</div>
    </div>

    <script src="core-listening-ket.js"></script>
    <script>
        const ketTest1Part1Data = {
            title: "KET 2 · Test 1 · Listening Part 1",
            type: "multiple-choice",
            part: 1,
            book: 2,
            test: 1,

            answerKey: { q1: 'B', q2: 'A', q3: 'B', q4: 'A', q5: 'C' },
            displayAnswers: { q1: 'B', q2: 'A', q3: 'B', q4: 'A', q5: 'C' },

            detailedExplanations: {
                q1: `<strong>Đáp án: B – 160°C (160 độ C)</strong><br>
                      Người phụ nữ nói: <em>"I'm going to put the cake in the cooker now. The temperature's at one hundred and forty degrees. Is that enough?"</em><br>
                      Người đàn ông đáp: <em>"That's a bit low. I think a hundred and eighty is better."</em><br>
                      Người phụ nữ quyết định: <em>"Why don't I put it in at <span class='keyword-highlight'>a hundred and sixty</span> because I think a hundred and eighty is too hot?"</em><br>
                      Người đàn ông đồng ý: <em>"All right."</em><br><br>
                      <strong>✗ A (140°C) sai:</strong> Đây là nhiệt độ ban đầu cô ấy định đặt, nhưng người đàn ông nói hơi thấp ("a bit low").<br>
                      <strong>✗ C (180°C) sai:</strong> Người đàn ông gợi ý nhưng người phụ nữ nghĩ quá nóng ("too hot").<br>
                      <strong>✓ B (160°C) là đúng – nhiệt độ thỏa hiệp họ chọn.</strong>`,

                q2: `<strong>Đáp án: A – Leg (chân)</strong><br>
                      Người đàn ông hỏi: <em>"Hi, Clara, do you want to play tennis?"</em><br>
                      Clara đáp: <em>"Sorry, I played yesterday, and I hurt myself, so I can't play today."</em><br>
                      Người đàn ông đoán: <em>"Your foot again? You had problems with that last week as well."</em><br>
                      Clara nói rõ: <em>"No, I hit my <span class='keyword-highlight'>leg</span> with my racket when I was playing. My arms are stronger than I think!"</em><br><br>
                      <strong>✗ B (Arm) sai:</strong> Cô ấy đề cập đến arms nhưng để nói rằng tay cô ấy khỏe, không phải bị thương.<br>
                      <strong>✗ C (Foot) sai:</strong> Đây là vết thương tuần trước, không phải lần này.<br>
                      <strong>✓ A (Leg) là đúng – cô ấy đánh trúng chân bằng vợt ("hit my leg with my racket").</strong>`,

                q3: `<strong>Đáp án: B – Flowers (hoa)</strong><br>
                      Người phụ nữ nói: <em>"These photos are great."</em><br>
                      Người đàn ông đáp: <em>"Thanks. But they're not all mine. Just <span class='keyword-highlight'>the one of the flowers</span>."</em><br>
                      Về ảnh thuyền: <em>"I'm choosing one to put on the wall in my new apartment. I like the boat picture best."</em> → Đây là ảnh người phụ nữ chụp.<br>
                      Về ảnh chim: <em>"Oh, I prefer the one of the birds."</em><br>
                      Người đàn ông nói thêm: <em>"Yes, it's nice. I've tried to take photos of birds before, but I wasn't quick enough."</em> → Anh đã thử chụp chim nhưng không thành công.<br><br>
                      <strong>✗ A (Boat) sai:</strong> Đây là ảnh người phụ nữ chụp, anh ấy chỉ nói thích nhất ("like the boat picture best").<br>
                      <strong>✗ C (Birds) sai:</strong> Người phụ nữ thích ảnh chim nhưng đó không phải ảnh người đàn ông chụp.<br>
                      <strong>✓ B (Flowers) là đúng – đây là bức ảnh duy nhất của người đàn ông ("Just the one of the flowers").</strong>`,

                q4: `<strong>Đáp án: A – Bag (túi xách)</strong><br>
                      Người đàn ông nói: <em>"Wow, you got lots of birthday presents!"</em><br>
                      Người phụ nữ nói về sách: <em>"Yes, I'm lucky. Mum usually gets me a book because I love reading. But not this time because the one I really like isn't available yet."</em> → Không nhận được sách.<br>
                      Về áo len: <em>"OK, but that jumper looks nice."</em><br>
                      Người phụ nữ đáp: <em>"It is, but I'm not sure about the colour."</em> → Không chắc về áo len.<br>
                      Về túi: <em>"Anyway, <span class='keyword-highlight'>this bag from my sister's the perfect size</span>. Just what I wanted."</em><br><br>
                      <strong>✗ B (Sweater/Jumper) sai:</strong> Cô ấy không chắc về màu sắc ("not sure about the colour").<br>
                      <strong>✗ C (Book) sai:</strong> Mẹ cô ấy thường tặng sách nhưng lần này không tặng vì sách cô thích chưa có.<br>
                      <strong>✓ A (Bag) là đúng – cô ấy nói đây là "perfect size" và "Just what I wanted".</strong>`,

                q5: `<strong>Đáp án: C – Mobile Phone (điện thoại di động)</strong><br>
                      Người phụ nữ hỏi: <em>"Hi, Tom. You look sad."</em><br>
                      Tom đáp: <em>"Yes, I can't find my <span class='keyword-highlight'>mobile</span>. I took it to Mark's party last night. I thought it was in my bag with my wallet when I left, but it wasn't."</em><br>
                      Về ví: <em>"I thought it was in my bag with my wallet when I left"</em> → Ví vẫn còn.<br>
                      Người phụ nữ hỏi: <em>"Is this it? It was under my <span class='keyword-highlight'>jacket</span> when I was leaving."</em><br>
                      Tom xác nhận: <em>"Wow – thank you!"</em><br><br>
                      <strong>✗ A (Wallet) sai:</strong> Tom nói ví vẫn còn trong túi ("in my bag with my wallet").<br>
                      <strong>✗ B (Jacket) sai:</strong> Điện thoại được tìm thấy dưới áo khoác của người phụ nữ, không phải Tom mất áo khoác.<br>
                      <strong>✓ C (Mobile Phone) là đúng – Tom mất điện thoại ("can't find my mobile").</strong>`
            },

            transcript: `
            <p><strong>PART 1</strong></p>
            <p><em>For each question, choose the correct answer.</em></p>

            <p><strong>Question 1</strong><br>
            <strong>Woman:</strong> I'm going to put the cake in the cooker now. The temperature's at one hundred and forty degrees. Is that enough?<br>
            <strong>Man:</strong> That's a bit low. I think a hundred and eighty is better.<br>
            <strong>Woman:</strong> <span class="highlightable" data-q="1">Why don't I put it in at a hundred and sixty because I think a hundred and eighty is too hot?</span><br>
            <strong>Man:</strong> All right. I hope it's good!</p>

            <p><strong>Question 2</strong><br>
            <strong>Man:</strong> Hi, Clara, do you want to play tennis?<br>
            <strong>Woman:</strong> Sorry, I played yesterday, and I hurt myself, so I can't play today.<br>
            <strong>Man:</strong> Your foot again? You had problems with that last week as well.<br>
            <strong>Woman:</strong> <span class="highlightable" data-q="2">No, I hit my leg with my racket when I was playing. My arms are stronger than I think!</span><br>
            <strong>Man:</strong> I hope you feel better soon.</p>

            <p><strong>Question 3</strong><br>
            <strong>Woman:</strong> These photos are great.<br>
            <strong>Man:</strong> <span class="highlightable" data-q="3">Thanks. But they're not all mine. Just the one of the flowers.</span> I'm choosing one to put on the wall in my new apartment. I like the boat picture best.<br>
            <strong>Woman:</strong> Oh, I prefer the one of the birds.<br>
            <strong>Man:</strong> Yes, it's nice. I've tried to take photos of birds before, but I wasn't quick enough.</p>

            <p><strong>Question 4</strong><br>
            <strong>Man:</strong> Wow, you got lots of birthday presents!<br>
            <strong>Woman:</strong> Yes, I'm lucky. Mum usually gets me a book because I love reading. But not this time because the one I really like isn't available yet.<br>
            <strong>Man:</strong> OK, but that jumper looks nice.<br>
            <strong>Woman:</strong> It is, but I'm not sure about the colour. <span class="highlightable" data-q="4">Anyway, this bag from my sister's the perfect size. Just what I wanted.</span></p>

            <p><strong>Question 5</strong><br>
            <strong>Woman:</strong> Hi, Tom. You look sad.<br>
            <strong>Man:</strong> <span class="highlightable" data-q="5">Yes, I can't find my mobile. I took it to Mark's party last night. I thought it was in my bag with my wallet when I left, but it wasn't.</span><br>
            <strong>Woman:</strong> Is this it? It was under my jacket when I was leaving. I thought it might be yours!<br>
            <strong>Man:</strong> Wow – thank you!</p>

            <p><em>That is the end of Part One.</em></p>
            `,

            questions: [
                { num: 1, text: "What temperature will the woman use to cook the cake?", options: ["140°C", "160°C", "180°C"] },
                { num: 2, text: "What did Clara hurt when she played tennis?", options: ["Leg", "Arm", "Foot"] },
                { num: 3, text: "Which photo did the man take?", options: ["Boat", "Flowers", "Birds"] },
                { num: 4, text: "Which was the woman's favourite present?", options: ["Bag", "Sweater/Jumper", "Book"] },
                { num: 5, text: "What did Tom lose?", options: ["Wallet", "Jacket", "Mobile Phone"] }
            ]
        };

        document.addEventListener('DOMContentLoaded', function () {
            window.listeningCore = new ListeningCore();
            window.listeningCore.initializeTest(ketTest1Part1Data);
            console.log('KET 2 Test 1 Listening Part 1 loaded');
        });
    </script>
