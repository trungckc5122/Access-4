</head>

<body>

                </div>
            </div>
        </div>

        <!-- Question navigator -->
        <div class="question-nav">
            <div class="nav-buttons" id="navButtons"></div>
        </div>

        <!-- Main area -->
        <div class="main-area" id="mainArea">

            <div class="transcript-panel" id="transcriptPanel">

            <!-- Questions panel -->
            <div class="questions-panel" id="questionsPanel">
                <div class="panel-header">
                    <span>QUESTIONS 16–20</span>
                    <span class="answer-badge" id="answeredCount">0/5 answered</span>
                </div>

                    </div>
                </div>
            </div>
        </div>

        <!-- Bottom bar -->
        <div class="bottom-bar">
            <button class="btn btn-primary" id="submitBtn">Nộp bài</button>
            <button class="btn btn-success" id="explainBtn" disabled>Xem giải thích</button>
            <button class="btn btn-danger" id="resetBtn">Reset</button>
            <div class="progress" id="progressDisplay">Đã làm: 0/5</div>
        </div>

        <!-- Explanation panel -->
        <div class="explanation-panel" id="explanationPanel">
            <div class="resize-handle" id="explanationResizer"></div>
            <div class="explanation-header">
                <span id="explanationTitle">Giải thích</span>

    <!-- Context menu -->
    <div class="context-menu" id="contextMenu">
        <div onclick="applyHighlight('yellow')">Highlight vàng</div>
        <div onclick="applyHighlight('green')">Highlight xanh lá</div>
        <div onclick="applyHighlight('pink')">Highlight hồng</div>
        <div onclick="removeHighlight()">Xóa highlight</div>
    </div>

    <script src="core-listening-ket.js"></script>
    <script>
        const ketTest4Part4Data = {
            title: "KET 2 · Test 4 · Listening Part 4",
            type: "multiple-choice",
            part: 4,
            book: 2,
            test: 4,

            answerKey: { q16: 'A', q17: 'A', q18: 'B', q19: 'C', q20: 'B' },
            displayAnswers: { q16: 'A', q17: 'A', q18: 'B', q19: 'C', q20: 'B' },

            detailedExplanations: {
                q16: `<strong>Đáp án: A – engineer (kỹ sư)</strong><br>
                      Người phụ nữ nói: <em>"If you don't mind spending some of your time outside, then my profession's something you should consider. <span class='keyword-highlight'>Me and my team are building a bridge at the moment</span> – this project might help farmers who've got fields on different sides of a river."</em><br>
                      (building a bridge = engineer – xây cầu là công việc của kỹ sư)<br><br>
                      <strong>✗ B (farmer) sai:</strong> Cô đang giúp nông dân (farmers) chứ không phải làm nông dân.<br>
                      <strong>✗ C (painter) sai:</strong> Vùng nông thôn nổi tiếng với họa sĩ ("very popular with artists") nhưng cô không phải họa sĩ.<br>
                      <strong>✓ A (engineer) là đúng – cô và đội đang xây cầu, đó là công việc của kỹ sư.</strong>`,

                q17: `<strong>Đáp án: A – at work (tại nơi làm việc)</strong><br>
                      Người phụ nữ (chị gái) hỏi: <em>"How was your weekend?"</em><br>
                      Người đàn ông (em trai) đáp: <em>"Great! I went cycling with my friend, Paul. I don't think you know him."</em><br>
                      Chị gái hỏi: <em>"Is he in your football team?"</em><br>
                      Em trai đáp: <em>"I don't think he's into football. <span class='keyword-highlight'>He's a colleague. He started at the company two months ago.</span>"</em><br>
                      (colleague = at work – đồng nghiệp)<br><br>
                      <strong>✗ B (at a party) sai:</strong> Chị gái mời đến dự tiệc vào thứ Sáu nhưng họ gặp nhau ở công ty.<br>
                      <strong>✗ C (at a sports match) sai:</strong> Paul không thích bóng đá.<br>
                      <strong>✓ A (at work) là đúng – Paul là đồng nghiệp (colleague) bắt đầu làm việc tại công ty 2 tháng trước.</strong>`,

                q18: `<strong>Đáp án: B – They want some exercise (họ muốn tập thể dục)</strong><br>
                      Người đàn ông hỏi: <em>"Do you still want to go to the cinema this afternoon?"</em><br>
                      Người phụ nữ đáp: <em>"Sure. The film starts at three – there's a bus at twenty-five to which should get us there on time. Then I won't need to use the car."</em><br>
                      Người đàn ông đề xuất: <em>"Why don't we walk instead? <span class='keyword-highlight'>We spend too much time indoors. Let's get some fresh air.</span>"</em><br>
                      Người phụ nữ đồng ý: <em>"OK. We can be healthy for a change!"</em><br><br>
                      <strong>✗ A (There are no buses today) sai:</strong> Có xe buýt lúc 2:35 ("bus at twenty-five to").<br>
                      <strong>✗ C (The car isn't working) sai:</strong> Người phụ nữ nói "I won't need to use the car" – không phải xe hỏng.<br>
                      <strong>✓ B (They want some exercise) là đúng – họ muốn đi bộ để hít thở không khí trong lành và tập thể dục ("get some fresh air", "be healthy").</strong>`,

                q19: `<strong>Đáp án: C – The hotel was noisy (khách sạn ồn ào)</strong><br>
                      Người phụ nữ hỏi: <em>"How was your holiday?"</em><br>
                      Người đàn ông đáp: <em>"Good, but I've slept better since I got back – <span class='keyword-highlight'>I won't miss that loud music every night, my room was above the nightclub!</span>"</em><br>
                      Người phụ nữ nói: <em>"It's nice going away somewhere warm in winter."</em><br>
                      Người đàn ông nói tiếp: <em>"Yeah. The beach wasn't like the ones here, which are often covered in rubbish."</em> → Bãi biển sạch, không phải vấn đề.<br><br>
                      <strong>✗ A (The weather was bad) sai:</strong> Không đề cập thời tiết xấu, họ đi đến nơi ấm áp.<br>
                      <strong>✗ B (The beach was dirty) sai:</strong> Bãi biển ở đó không giống bãi biển ở đây (thường đầy rác), tức là bãi biển ở đó sạch.<br>
                      <strong>✓ C (The hotel was noisy) là đúng – phòng ở trên hộp đêm nên ồn ào ("loud music every night", "room was above the nightclub").</strong>`,

                q20: `<strong>Đáp án: B – the teacher (giáo viên)</strong><br>
                      Người đàn ông (bố) hỏi: <em>"How was your Chinese lesson?"</em><br>
                      Con gái đáp: <em>"Well, it was hard work learning a new language for a full hour – about half that time would be better. And I was worried before the lesson started because I didn't know anyone, but I think everyone felt as nervous as me!"</em> → Không phải các học sinh khác.<br>
                      Con gái nói tiếp: <em>"And the teacher? <span class='keyword-highlight'>She gave us lots of enjoyable exercises that stopped everyone from getting bored!</span>"</em><br><br>
                      <strong>✗ A (the other students) sai:</strong> Cô bé lo lắng vì không quen ai, mọi người đều hồi hộp.<br>
                      <strong>✗ C (the length of the lesson) sai:</strong> Cô bé nghĩ 1 giờ hơi dài ("half that time would be better"), không phải điều cô thích.<br>
                      <strong>✓ B (the teacher) là đúng – giáo viên cho nhiều bài tập thú vị khiến mọi người không chán.</strong>`
            },

            transcript: `
            <p><strong>PART 4</strong></p>
            <p><em>For each question, choose the correct answer.</em></p>

            <p><strong>Question 16</strong><br>
            You will hear a woman giving a talk. What's the woman's job?<br>
            <strong>Woman:</strong> If you don't mind spending some of your time outside, then my profession's something you should consider. <span class="highlightable" data-q="16">Me and my team are building a bridge at the moment</span> – this project might help farmers who've got fields on different sides of a river. It's really beautiful countryside; and very popular with artists, so we don't want to spoil the view.</p>

            <p><strong>Question 17</strong><br>
            You will hear a man talking to his sister about a new friend. Where did the man meet his new friend?<br>
            <strong>Woman:</strong> How was your weekend?<br>
            <strong>Man:</strong> Great! I went cycling with my friend, Paul. I don't think you know him.<br>
            <strong>Woman:</strong> Is he in your football team?<br>
            <strong>Man:</strong> I don't think he's into football. <span class="highlightable" data-q="17">He's a colleague. He started at the company two months ago.</span><br>
            <strong>Woman:</strong> Another salesman! Well, invite him to come round here with you on Friday. There'll be great people, music and lots of food!</p>

            <p><strong>Question 18</strong><br>
            You will hear a husband and wife talking about going to the cinema. Why do they decide to walk to the cinema?<br>
            <strong>Man:</strong> Do you still want to go to the cinema this afternoon?<br>
            <strong>Woman:</strong> Sure. The film starts at three – there's a bus at twenty-five to which should get us there on time. Then I won't need to use the car.<br>
            <strong>Man:</strong> Why don't we walk instead? <span class="highlightable" data-q="18">We spend too much time indoors. Let's get some fresh air.</span><br>
            <strong>Woman:</strong> OK. We can be healthy for a change!<br>
            <strong>Man:</strong> Yes!</p>

            <p><strong>Question 19</strong><br>
            You will hear a man telling a woman about his holiday. What problem did he have on the holiday?<br>
            <strong>Woman:</strong> How was your holiday?<br>
            <strong>Man:</strong> Good, but I've slept better since I got back – <span class="highlightable" data-q="19">I won't miss that loud music every night, my room was above the nightclub!</span> But I'm having trouble getting used to this cold weather now I'm home.<br>
            <strong>Woman:</strong> It's nice going away somewhere warm in winter.<br>
            <strong>Man:</strong> Yeah. The beach wasn't like the ones here, which are often covered in rubbish.</p>

            <p><strong>Question 20</strong><br>
            You will hear a girl talking with her dad about learning a new language. What did the girl like about her first Chinese lesson?<br>
            <strong>Man:</strong> How was your Chinese lesson?<br>
            <strong>Girl:</strong> Well, it was hard work learning a new language for a full hour – about half that time would be better. And I was worried before the lesson started because I didn't know anyone, but I think everyone felt as nervous as me!<br>
            <strong>Man:</strong> And the teacher?<br>
            <strong>Girl:</strong> <span class="highlightable" data-q="20">She gave us lots of enjoyable exercises that stopped everyone from getting bored!</span></p>

            <p><em>That is the end of Part Four.</em></p>
            `,

            questions: [
                { num: 16, text: "You will hear a woman giving a talk. What's the woman's job?", options: ["engineer", "farmer", "painter"] },
                { num: 17, text: "You will hear a man talking to his sister about a new friend. Where did the man meet his new friend?", options: ["at work", "at a party", "at a sports match"] },
                { num: 18, text: "You will hear a husband and wife talking about going to the cinema. Why do they decide to walk to the cinema?", options: ["There are no buses today.", "They want some exercise.", "The car isn't working."] },
                { num: 19, text: "You will hear a man telling a woman about his holiday. What problem did he have on the holiday?", options: ["The weather was bad.", "The beach was dirty.", "The hotel was noisy."] },
                { num: 20, text: "You will hear a girl talking with her dad about learning a new language. What did the girl like about her first Chinese lesson?", options: ["the other students", "the teacher", "the length of the lesson"] }
            ]
        };

        document.addEventListener('DOMContentLoaded', function () {
            window.listeningCore = new ListeningCore();
            window.listeningCore.initializeTest(ketTest4Part4Data);
            console.log('KET 2 Test 4 Listening Part 4 loaded');
        });
    </script>
