<!DOCTYPE html>

</head>
<body>
<div class="test-wrapper" id="testWrapper">
    <div class="ielts-header">
        <div class="brand"><div class="ielts-logo">PET</div><div class="candidate"></div></div>

    <div class="question-nav">

<script src="core-reading.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const testData = {
            type: 'split-layout',
            part: 6,
            answerKey: { q27: "be", q28: "with", q29: "of", q30: "us", q31: "to", q32: "than" },
            displayAnswers: { q27: "be", q28: "with", q29: "of", q30: "us", q31: "to", q32: "than" },
            detailedExplanations: {
                27: `<div><strong>Cấu trúc cố định:</strong> <em>"to be honest"</em> (thành thật mà nói). Cụm từ này được dùng khi người nói muốn thừa nhận một điều gì đó.<br>
                Dịch: "...và thành thật mà nói, tôi đã khá lo lắng về việc khám phá một thành phố mới một mình."</div>`,
                28: `<div><strong>Giới từ theo sau tính từ:</strong> Tính từ <em>"familiar"</em> đi kèm với giới từ <em>"with"</em> khi nói về việc ai đó biết rõ điều gì đó.<br>
                Dịch: "Tôi hy vọng chuyến tham quan sẽ giúp tôi trở nên quen thuộc hơn với thành phố."</div>`,
                29: `<div><strong>Cụm từ cố định:</strong> <em>"loads of"</em> có nghĩa là rất nhiều (tương đương với <em>"a lot of"</em>).<br>
                Dịch: "Chúng tôi cũng học được rất nhiều sự thật thú vị về văn hóa Đan Mạch."</div>`,
                30: `<div><strong>Đại từ nhân xưng:</strong> <em>"us"</em> (chúng tôi). Có nhiều người trong chuyến tham quan và hướng dẫn viên đã đưa ra gợi ý cho tất cả họ.<br>
                Dịch: "Cuối cùng, anh ấy đã đưa cho chúng tôi tất cả những gợi ý..."</div>`,
                31: `<div><strong>Cấu trúc:</strong> <em>"place + to-infinitive"</em> (nơi để làm gì đó). <em>"to"</em> là phần của động từ nguyên mẫu có "to" (to eat and visit).<br>
                Dịch: "...những nơi tốt nhất để ăn uống và tham quan."</div>`,
                32: `<div><strong>Từ so sánh:</strong> <em>"than"</em> (hơn). Ở đây người viết đang so sánh giữa những gì họ mong đợi và thực tế.<br>
                Dịch: "...tôi thực sự đã vui vẻ hơn nhiều so với những gì tôi mong đợi."</div>`
            },
            template: `
                <div class="reading-card" id="passageCard">
                    <div class="review-title">My travel blog</div>
                    <p>This summer, I travelled to Copenhagen, the capital of Denmark, on my own. I am only 20 and to
                        <span class="input-wrapper">
                            <input type="text" id="q27" class="gap-input" data-q="27" autocomplete="off">
                            <span class="eye-icon" data-question="27">👁️</span>
                        </span>
                        honest, I was nervous about exploring a new city alone. I decided to go on a free walking tour the first day I was there. I hoped the tour would help me to become more familiar
                        <span class="input-wrapper">
                            <input type="text" id="q28" class="gap-input" data-q="28" autocomplete="off">
                            <span class="eye-icon" data-question="28">👁️</span>
                        </span>
                        the city.
                    </p>
                    <p>Unfortunately, the weather wasn't great, but the tour was still absolutely fantastic! Magnus, our tour guide, knew all about the city's history. We also learnt loads
                        <span class="input-wrapper">
                            <input type="text" id="q29" class="gap-input" data-q="29" autocomplete="off">
                            <span class="eye-icon" data-question="29">👁️</span>
                        </span>
                        interesting facts about Danish culture. At the end of the tour, he gave
                        <span class="input-wrapper">
                            <input type="text" id="q30" class="gap-input" data-q="30" autocomplete="off">
                            <span class="eye-icon" data-question="30">👁️</span>
                        </span>
                        all suggestions for the best places
                        <span class="input-wrapper">
                            <input type="text" id="q31" class="gap-input" data-q="31" autocomplete="off">
                            <span class="eye-icon" data-question="31">👁️</span>
                        </span>
                        eat and visit.
                    </p>
                    <p>Apart from learning so much, I actually had a lot more fun on the walking tour
                        <span class="input-wrapper">
                            <input type="text" id="q32" class="gap-input" data-q="32" autocomplete="off">
                            <span class="eye-icon" data-question="32">👁️</span>
                        </span>
                        I'd expected. It was an excellent way to experience the city, and learn about its culture and history.
                    </p>
                </div>
            `,
            questions: [
                { num: 27 }, { num: 28 }, { num: 29 }, { num: 30 }, { num: 31 }, { num: 32 }
            ]
        };

        window.readingCore = new ReadingCore();
        window.readingCore.initializeTest(testData);
    });
</script>
</body>
</html>
