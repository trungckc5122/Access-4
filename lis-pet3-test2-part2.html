            <p><strong>Question 9</strong><br>
            <strong>Girl:</strong> I'm glad we've got a canteen – I've heard lots of schools don't have them, so we're quite lucky and <span class="highlightable" data-q="9">the food's not too expensive either. So everyone can afford to buy lunch.</span> They seem to have the same meals a lot, though – like, a pasta dish two days in a row.<br>
