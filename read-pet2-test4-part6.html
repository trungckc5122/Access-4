<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>PET 2 - Test 4 - Reading Part 6</title>
    <link rel="stylesheet" href="reading-pet-common.css" id="styleLink">
</head>
<body>
<div class="test-wrapper" id="testWrapper">
    <div class="ielts-header">
        <div class="brand"><div class="ielts-logo">PET</div><div class="candidate"></div></div>
    </div>

    <div class="question-nav">
        <div class="nav-buttons" id="navButtons"></div>
        <span id="answeredCount" style="font-size:13px; color:#555; margin-left:10px;">0/6 answered</span>
    </div>

    <div class="main-area split-layout" id="mainArea"></div>

    <div class="bottom-bar">
        <button class="btn btn-primary" id="submitBtn">Nộp bài</button>
        <button class="btn btn-success" id="explainBtn" disabled>Xem giải thích</button>
        <button class="btn btn-danger" id="resetBtn">Reset</button>
        <div class="progress" id="progressDisplay">Đã làm: 0/6</div>
    </div>

    <div class="context-menu" id="contextMenu">
        <div onclick="applyHighlight('yellow')">Highlight vàng</div>
        <div onclick="applyHighlight('green')">Highlight xanh lá</div>
        <div onclick="applyHighlight('pink')">Highlight hồng</div>
        <div onclick="removeHighlight()">Xóa highlight</div>
    </div>
</div>

<script src="core-reading.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const testData = {
            type: 'split-layout',
            part: 6,
            answerKey: { q27: "of", q28: "that", q29: "the", q30: "about", q31: "order", q32: "as" },
            displayAnswers: { q27: "of", q28: "that", q29: "the", q30: "about", q31: "order", q32: "as" },
            detailedExplanations: {
                27: `<div>Giới từ <strong>"of"</strong>.<br>
                Cấu trúc: <em>"plenty of people"</em> = nhiều người.<br>
                "Plenty of" là cụm định lượng phổ biến.<br>
                Dịch: Mời nhiều người và có một vài điều bất ngờ.</div>`,
                28: `<div>Đại từ quan hệ <strong>"that"</strong> (hoặc "which").<br>
                Cấu trúc mệnh đề quan hệ: <em>"ten pizzas that/which are the same flavour"</em>.<br>
                "That" thay thế cho "pizzas" làm chủ ngữ trong mệnh đề.<br>
                Dịch: Đặt mười chiếc pizza cùng một hương vị.</div>`,
                29: `<div>Mạo từ xác định <strong>"the"</strong>.<br>
                Cấu trúc: <em>"the best one"</em> = cái ngon nhất.<br>
                Dùng "the" với tính từ so sánh nhất (superlative).<br>
                Dịch: Bình chọn cái ngon nhất.</div>`,
                30: `<div>Cấu trúc đề xuất <strong>"how about"</strong> = còn... thì sao?<br>
                Cấu trúc: <em>"How about + V-ing?"</em><br>
                Dùng để đề xuất ý tưởng.<br>
                Dịch: Còn chơi trò chơi thì sao?</div>`,
                31: `<div>Thành ngữ <strong>"in order to"</strong> = để/để mà.<br>
                Cấu trúc: <em>"in order to talk to as many different people as possible"</em>.<br>
                Diễn tả mục đích.<br>
                Dịch: Để nói chuyện với càng nhiều người khác nhau càng tốt.</div>`,
                32: `<div>Thành ngữ <strong>"as... as possible"</strong> = càng... càng tốt.<br>
                Cấu trúc: <em>"as many different people as possible"</em>.<br>
                Dịch: Càng nhiều người khác nhau càng tốt.</div>`
            },
            template: `
                <div class="reading-card" id="passageCard">
                    <div class="review-title">How to hold a fun party</div>
                    <p>Are you thinking about holding a party? Then you need to make sure it's lots of fun! Invite plenty
                        <span class="input-wrapper">
                            <input type="text" id="q27" class="gap-input" data-q="27" autocomplete="off">
                            <span class="eye-icon" data-question="27">👁️</span>
                        </span>
                        people and include a few surprises. For example, if you're serving food, try ordering ten pizzas
                        <span class="input-wrapper">
                            <input type="text" id="q28" class="gap-input" data-q="28" autocomplete="off">
                            <span class="eye-icon" data-question="28">👁️</span>
                        </span>
                        are the same flavour but come from different restaurants in your area. Then have a 'taste test' and vote on
                        <span class="input-wrapper">
                            <input type="text" id="q29" class="gap-input" data-q="29" autocomplete="off">
                            <span class="eye-icon" data-question="29">👁️</span>
                        </span>
                        best one. Or how
                        <span class="input-wrapper">
                            <input type="text" id="q30" class="gap-input" data-q="30" autocomplete="off">
                            <span class="eye-icon" data-question="30">👁️</span>
                        </span>
                        playing games? You could have a video games tournament and offer prizes for the winners. You could also have a singing competition and ask each guest to sing a song.
                    </p>
                    <p>
                        If your party includes a meal around a table, for each new course, ask your guests to sit next to someone different, in
                        <span class="input-wrapper">
                            <input type="text" id="q31" class="gap-input" data-q="31" autocomplete="off">
                            <span class="eye-icon" data-question="31">👁️</span>
                        </span>
                        to talk to as many different people
                        <span class="input-wrapper">
                            <input type="text" id="q32" class="gap-input" data-q="32" autocomplete="off">
                            <span class="eye-icon" data-question="32">👁️</span>
                        </span>
                        possible. Finally, play fun music: your guests might even get up and dance!
                    </p>
                </div>
            `,
            questions: [
                { num: 27 }, { num: 28 }, { num: 29 }, { num: 30 }, { num: 31 }, { num: 32 }
            ]
        };

        window.readingCore = new ReadingCore();
        window.readingCore.initializeTest(testData);
    });
</script>
</body>
</html>
