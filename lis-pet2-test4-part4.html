            detailedExplanations: {
                q20: `<strong>Đáp án: C – She admired someone there (cô ấy ngưỡng mộ ai đó ở đó)</strong><br>
                      Jenny nói: <em>"<span class='keyword-highlight'>Then we got a new English Literature teacher who wrote things herself and encouraged us to do the same. I really wanted to write like her</span>."</em> Cô có giáo viên văn học mới tự viết và khuyến khích học sinh, cô muốn viết như giáo viên.

            <p><em>Now look at Part Four. For each question, choose the correct answer. Look at questions 20 to 25 now. You have 45 seconds. You will hear an interview with a young writer called Jenny Taylor, who has just had her first novel published.</em></p>

            <p><strong>Interviewer:</strong> Today I'm talking to Jenny Taylor. Jenny's a young writer who's just had her first novel published.</p>
            <p><strong>Jenny:</strong> Hi.</p>
            <p><strong>Interviewer:</strong> So Jenny, did you enjoy studying literature at school?</p>
            <p><strong>Jenny:</strong> When I was at school, I always loved reading, though I preferred stories to poems. <span class="highlightable" data-q="20">Then we got a new English Literature teacher who wrote things herself and encouraged us to do the same. I really wanted to write like her.</span> That made me work hard even though I never felt what I did was much good.</p>
            <p><strong>Interviewer:</strong> How did you get your ideas for this first novel?</p>
            <p><strong>Jenny:</strong> Well, I always notice how people behave. <span class="highlightable" data-q="21">I'd often go out with friends and family and they'd all go online using their phones, and I'd just sit back and think about the other people around me.</span> I'd start imagining what their lives were like, and it all grew from that.</p>
            <p><strong>Interviewer:</strong> Can you tell us something about your novel?</p>
            <p><strong>Jenny:</strong> Yes, it's about a girl and her parents. It starts when they spend a day somewhere their relatives lived in the past. It includes some interesting facts about the place, but <span class="highlightable" data-q="22">the story focuses on the different challenges they have to deal with</span> as they learn more about what happened long ago. Anyway, I won't tell you more than that!</p>
            <p><strong>Interviewer:</strong> How do you feel about your novel?</p>
            <p><strong>Jenny:</strong> Well, it took quite a while to write. I showed it to a friend when I thought it was ready to be published, and he agreed. He also helped me find a company to do that. <span class="highlightable" data-q="23">I'm sure people will want to keep turning the pages to find out how it ends.</span> Anyway, I really hope it'll sell well.</p>
            <p><strong>Interviewer:</strong> You're now working on a new book. Do you have a routine for writing each day?</p>
            <p><strong>Jenny:</strong> Well, <span class="highlightable" data-q="24">I get up early in the morning and start writing for a couple of hours without changing out of my pyjamas.</span> I'll even have lunch in them, and then write for a couple more hours. When things are going well, I can write for up to sixteen hours. On those days I rarely leave the house – I find I write better as the day goes on.</p>
            <p><strong>Interviewer:</strong> And what do you read for pleasure?</p>
            <p><strong>Jenny:</strong> I read a variety of things as research for my writing – books about science, biographies, that sort of thing. But <span class="highlightable" data-q="25">what I choose when I relax is things that are amusing</span>, rather than anything too serious. It's like an escape from real life. I hardly ever choose thrillers, though. I don't know why.</p>
