<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Giáo viên — KET/PET System</title>
  <meta name="description" content="Quản lý lớp học và theo dõi tiến độ học sinh KET/PET">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #0d9488;
      --primary-dark: #0f766e;
      --primary-light: #ccfbf1;
      --header-bg: linear-gradient(135deg, #134e4a 0%, #0f766e 100%);
      --card-bg: #ffffff;
      --content-bg: #f8fafc;
      --text: #0f172a;
      --text-muted: #64748b;
      --border-light: #e2e8f0;
      --border-medium: #cbd5e1;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #f1f5f9;
      color: var(--text);
      min-height: 100vh;
    }

    #app {
      min-height: 100vh;
    }

    /* Loading state */
    #loading-screen {
      position: fixed;
      inset: 0;
      background: var(--header-bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      color: #fff;
      z-index: 9999;
    }

    .loading-spinner {
      width: 48px;
      height: 48px;
      border: 4px solid rgba(255,255,255,0.2);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Stat cards */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: var(--card-bg);
      border-radius: 12px;
      padding: 16px;
      border: 1.5px solid var(--border-light);
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .stat-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
    }

    .stat-value {
      font-size: 28px;
      font-weight: 800;
      color: var(--primary);
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-medium); border-radius: 4px; }

    @media (max-width: 640px) {
      .hide-mobile { display: none !important; }
    }
  </style>
</head>
<body>

  <!-- Loading screen -->
  <div id="loading-screen">
    <div class="loading-spinner"></div>
    <div style="font-size:15px;font-weight:600;opacity:0.9;">Đang tải dashboard...</div>
  </div>

  <div id="app" style="display:none;"></div>

  <script type="module">
    // Ẩn loading khi app sẵn sàng
    import('./js/dashboard-app.js').then(() => {
      document.getElementById('loading-screen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
    }).catch(err => {
      document.getElementById('loading-screen').innerHTML = `
        <div style="text-align:center;padding:24px;">
          <div style="font-size:40px;margin-bottom:12px;">⚠️</div>
          <div style="font-size:16px;font-weight:600;">Không thể tải dashboard</div>
          <div style="font-size:13px;opacity:0.75;margin-top:6px;">${err.message}</div>
          <button onclick="location.reload()" style="margin-top:16px;padding:8px 20px;border-radius:8px;background:rgba(255,255,255,0.2);border:1.5px solid rgba(255,255,255,0.4);color:#fff;cursor:pointer;font-size:13px;">Thử lại</button>
        </div>
      `;
      console.error(err);
    });
  </script>
</body>
</html>
