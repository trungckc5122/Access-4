<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>PET 3 - Test 4 - Reading Part 6</title>
    <link rel="stylesheet" href="reading-pet-common.css" id="styleLink">
</head>
<body>
<div class="test-wrapper" id="testWrapper">
    <div class="ielts-header">
        <div class="brand"><div class="ielts-logo">PET</div><div class="candidate"></div></div>
    </div>

    <div class="question-nav">
        
        <div class="nav-buttons" id="navButtons"></div>
        <span id="answeredCount" style="font-size:13px; color:#555; margin-left:10px;">0/6 answered</span>
    </div>

    <!-- Main area -->
    <div class="main-area split-layout" id="mainArea"></div>

    <div class="bottom-bar">
        <button class="btn btn-primary" id="submitBtn">Nộp bài</button>
        <button class="btn btn-success" id="explainBtn" disabled>Xem giải thích</button>
        <button class="btn btn-danger" id="resetBtn">Reset</button>
        <div class="progress" id="progressDisplay">Đã làm: 0/6</div>
    </div>

    <div class="context-menu" id="contextMenu">
        <div onclick="applyHighlight('yellow')">Highlight vàng</div>
        <div onclick="applyHighlight('green')">Highlight xanh lá</div>
        <div onclick="applyHighlight('pink')">Highlight hồng</div>
        <div onclick="removeHighlight()">Xóa highlight</div>
    </div>
</div>

<script src="core-reading.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const testData = {
            type: 'split-layout',
            part: 6,
            answerKey: { q27: "we", q28: "of", q29: "to", q30: "the", q31: "were", q32: "part" },
            displayAnswers: { q27: "we", q28: "of", q29: "to", q30: "the", q31: "were", q32: "part" },
            detailedExplanations: {
                27: `<div><strong>Đại từ:</strong> <em>"we"</em> (chúng tôi).<br>
                Câu: <em>"I went with my family and we all really enjoyed ourselves"</em>.<br>
                Dịch: Tôi đi với gia đình và chúng tôi đều thực sự thích thú.</div>`,
                28: `<div><strong>Giới từ:</strong> <em>"of"</em>. Cụm từ "all sorts of" (đủ loại).<br>
                Câu: <em>"people doing all sorts of different things"</em>.<br>
                Dịch: mọi người làm đủ loại việc khác nhau.</div>`,
                29: `<div><strong>Giới từ:</strong> <em>"to"</em>. Cụm từ "chosen to do" (chọn làm).<br>
                Câu: <em>"two students had chosen to do ballet"</em>.<br>
                Dịch: hai sinh viên đã chọn làm múa ba lê.</div>`,
                30: `<div><strong>Mạo từ xác định:</strong> <em>"the"</em>.<br>
                Câu: <em>"I thought it was great to see the range of talent"</em>.<br>
                Dịch: tôi nghĩ thật tuyệt khi thấy phạm vi tài năng.</div>`,
                31: `<div><strong>Động từ "to be":</strong> <em>"were"</em> (quá khứ).<br>
                Câu: <em>"While the students were dancing on stage"</em>.<br>
                Dịch: Trong khi các sinh viên đang nhảy trên sân khấu.</div>`,
                32: `<div><strong>Danh từ:</strong> <em>"part"</em>. Cụm từ "taking part in" (tham gia).<br>
                Câu: <em>"everyone taking part in the show was great"</em>.<br>
                Dịch: mọi người tham gia chương trình đều tuyệt vời.</div>`
            },
            template: `
                <div class="reading-card" id="passageCard">
                    <div class="review-title">Review of our school show</div>
                    <p><em>by Eddie Nicholls</em></p>
                    <p>Last night was the end-of-term show at school. I went with my family and
                        <span class="input-wrapper">
                            <input type="text" id="q27" class="gap-input" data-q="27" autocomplete="off">
                            <span class="eye-icon" data-question="27">👁️</span>
                        </span>
                        all really enjoyed ourselves.
                    </p>
                    <p>What I particularly liked was that as well as music groups, there were people doing all sorts
                        <span class="input-wrapper">
                            <input type="text" id="q28" class="gap-input" data-q="28" autocomplete="off">
                            <span class="eye-icon" data-question="28">👁️</span>
                        </span>
                        different things. For example, some people told jokes, and two students had chosen
                        <span class="input-wrapper">
                            <input type="text" id="q29" class="gap-input" data-q="29" autocomplete="off">
                            <span class="eye-icon" data-question="29">👁️</span>
                        </span>
                        do ballet. I thought it was great to see
                        <span class="input-wrapper">
                            <input type="text" id="q30" class="gap-input" data-q="30" autocomplete="off">
                            <span class="eye-icon" data-question="30">👁️</span>
                        </span>
                        range of talent that there is in our school.
                    </p>
                    <p>One of the most popular performances was by a modern dance group, called Imagine. While the students
                        <span class="input-wrapper">
                            <input type="text" id="q31" class="gap-input" data-q="31" autocomplete="off">
                            <span class="eye-icon" data-question="31">👁️</span>
                        </span>
                        dancing on stage, the whole audience kept silent, because everyone was so amazed by how good they were. And of course, when they finished, everyone stood up and clapped. In fact, everyone taking
                        <span class="input-wrapper">
                            <input type="text" id="q32" class="gap-input" data-q="32" autocomplete="off">
                            <span class="eye-icon" data-question="32">👁️</span>
                        </span>
                        in the show was great. Thanks for a lovely evening, everyone!
                    </p>
                </div>
            `,
            questions: [
                { num: 27 }, { num: 28 }, { num: 29 }, { num: 30 }, { num: 31 }, { num: 32 }
            ]
        };

        window.readingCore = new ReadingCore();
        window.readingCore.initializeTest(testData);
    });
</script>
</body>
</html>
