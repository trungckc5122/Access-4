            <p><strong>Question 9</strong><br>
            <strong>Man:</strong> Have you been on that history website yet?<br>

            <strong>Man:</strong> There are plenty of articles on there, you know. I've found loads connected to stuff on our course. <span class="highlightable" data-q="9">Maybe you haven't tried the advanced search option. That's the best way to find what you want.</span><br>

            <strong>Man:</strong> Sure. No problem.</p>

            <p><strong>Question 10</strong><br>
            <strong>Man:</strong> How was your summer holiday on the south coast?<br>
            <strong>Woman:</strong> We had a brilliant time!<br>
            <strong>Man:</strong> So was your hotel good?<br>
            <strong>Woman:</strong> I've stayed in better, to be honest, but that's OK. <span class="highlightable" data-q="10">What I especially loved was the fact that I didn't need to spend all the money I took with me. Seriously!</span><br>
            <strong>Man:</strong> Wow! You don't often hear someone say that after a holiday. Did you eat out a lot while you were there?<br>
            <strong>Woman:</strong> Every day, actually. It cost so much less than it does here in the city, although there wasn't much variety of dishes to choose from.<br>
            <strong>Man:</strong> Right.</p>

            <p><strong>Question 11</strong><br>
            <strong>Woman:</strong> I went to the new shopping centre yesterday.<br>
            <strong>Man:</strong> Oh, I wasn't impressed by it myself but I only went to a department store and some shoe shops.<br>
            <strong>Woman:</strong> I found everything I needed, but then when I went for something to eat there, could I find a suitable restaurant? Not a chance ... just stalls selling coffee.<br>
            <strong>Man:</strong> Oh, there's a nice place on the top floor. <span class="highlightable" data-q="11">But as for the car park, I can't believe they thought that one would be enough for a place that size.</span><br>
            <strong>Woman:</strong> They really need to do something about that. Anyway, I'm not planning on shopping there again for a while.</p>

            <p><strong>Question 12</strong><br>

            <strong>Man:</strong> Personally, I've never liked it ... I prefer other sports!</p>

            <p><strong>Question 13</strong><br>
            <strong>Woman:</strong> Have you finished reading that novel I lent you?<br>
            <strong>Man:</strong> Yeah. I thought it was OK ... not great. I mean, the situation the family find themselves in is something that most people are familiar with ... but it was kind of hard to get excited about the people in the story. I just didn't feel curious about them. Also, I don't understand why, in a novel that length, the author decided to have so many chapters. <span class="highlightable" data-q="13">It interrupted things and the story didn't flow well.</span><br>
            <strong>Woman:</strong> Oh, OK. Well, I quite enjoyed the story actually.</p>
