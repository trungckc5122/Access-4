<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PET 2 - Test 2 - Part 2</title>
    <link rel="stylesheet" href="listening-pet-common.css" id="styleLink">
</head>
<body>
<div class="test-wrapper" id="testWrapper">
    <div class="ielts-header">
        <div class="brand">
            <div class="ielts-logo">PET</div>
            <div class="candidate">B1 Preliminary 2 · Test 2 · Part 2</div>
            <div class="audio-controls">
                <audio id="listeningAudio" controls>
                    <source src="B1 Preliminary 2 - Test 2 Part 2.mp3" type="audio/mpeg">
                    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg">
                </audio>
                <select class="speed-select" id="speedSelect">
                    <option value="0.7">0.7x</option>
                    <option value="0.9">0.9x</option>
                    <option value="1.0" selected>1x</option>
                    <option value="1.1">1.1x</option>
                    <option value="1.25">1.25x</option>
                </select>
                <span class="volume-icon">🔊</span>
            </div>
        </div>
        <div class="font-controls">
            <button class="font-btn" id="fontSmall">A-</button>
            <button class="font-btn" id="fontMedium">A</button>
            <button class="font-btn active" id="fontLarge">A+</button>
        </div>
        <div class="mode-toggle" id="modeToggleContainer">
            <span class="mode-label">Hiện đại</span>
            <label class="mode-switch" title="Chuyển đổi chế độ Cổ điển/Hiện đại">
                <input type="checkbox" id="modeToggle">
                <span class="mode-slider"></span>
            </label>
            <span class="mode-label">Cổ điển</span>
        </div>
        <button class="theme-toggle-btn" id="themeToggle" title="Chuyển đổi Dark/Light mode">
            <span class="icon-moon">🌙</span>
            <span class="icon-sun">☀️</span>
        </button>
    </div>

    <div class="question-nav">
        <span style="font-weight:600; color:#1e3a5f;">Câu 8-13:</span>
        <div class="nav-buttons" id="navButtons"></div>
    </div>

    <div class="main-area" id="mainArea">
        <div class="transcript-panel" id="transcriptPanel">
            <div class="panel-header"><span>TRANSCRIPT</span></div>
            <div class="transcript-content font-large" id="transcriptContent"></div>
        </div>
        <div class="resizer" id="resizer"></div>
        <div class="questions-panel" id="questionsPanel">
            <div class="panel-header">
                <span>QUESTIONS 8-13</span>
                <span class="answer-badge" id="answeredCount">0/6 answered</span>
            </div>
            <div class="questions-list font-large centered" id="questionsContent">
                <div>
                    <h3>PART 2 Questions 8-13</h3>
                    <p><em>Choose the correct answer (A, B or C).</em></p>
                    <div class="notes-box" id="questionsContainer"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="bottom-bar">
        <button class="btn btn-primary" id="submitBtn">Nộp bài</button>
        <button class="btn btn-success" id="explainBtn" disabled>Xem giải thích</button>
        <button class="btn btn-danger" id="resetBtn">Reset tất cả</button>
        <div class="progress" id="progressDisplay">Đã làm: 0/6</div>
    </div>

    <div class="explanation-panel" id="explanationPanel">
        <div class="resize-handle" id="explanationResizer"></div>
        <div class="explanation-header">
            <span id="explanationTitle">Giải thích</span>
            <span class="close-btn" id="closeExplanation">✕ Đóng</span>
        </div>
        <div class="explanation-content" id="explanationText"></div>
    </div>
</div>

<div class="context-menu" id="contextMenu">
    <div onclick="applyHighlight('yellow')">Highlight vàng</div>
    <div onclick="applyHighlight('green')">Highlight xanh lá</div>
    <div onclick="applyHighlight('pink')">Highlight hồng</div>
    <div onclick="removeHighlight()">Xóa highlight</div>
</div>

<script>
    (function() {
        // ---------- ANSWER KEY (Test 2 Part 2) based on provided images ----------
        const answerKey = {
            q8: 'B',
            q9: 'C',
            q10: 'C',
            q11: 'B',
            q12: 'A',
            q13: 'B'
        };
        const displayAnswers = { ...answerKey };

        // ---------- DETAILED EXPLANATIONS ----------
        const detailedExplanations = {
            q8: `<strong>Đáp án: B</strong><br>
                  Người phụ nữ khuyên người đàn ông không nên lo lắng về <em>"the order in which he does the work"</em> (thứ tự anh ấy thực hiện công việc). Cô ấy nói rằng anh ấy có thể làm các nhiệm vụ theo bất kỳ thứ tự nào phù hợp với mình, miễn là mọi thứ đều hoàn thành đúng hạn.
                  <br><br>
                  <strong>✗ Phương án A sai:</strong> Không có thông tin nào về tốc độ thực hiện công việc được đề cập.
                  <br>
                  <strong>✗ Phương án C sai:</strong> Việc yêu cầu hỗ trợ từ người khác không được nhắc đến trong cuộc trò chuyện.
                  <br>
                  <strong>✓ B chính xác: Không cần lo lắng về thứ tự thực hiện công việc.</strong>`,
            q9: `<strong>Đáp án: C</strong><br>
                  Cả hai sinh viên đều đồng ý rằng trang web lịch sử <em>"it's useful for studying"</em> (nó hữu ích cho việc học tập). Họ nói rằng trang web có nhiều thông tin giá trị và tài liệu tham khảo giúp ích cho việc học môn lịch sử.
                  <br><br>
                  <strong>✗ Phương án A sai:</strong> Mặc dù trang web có thể trông ổn, nhưng họ không nhấn mạnh về giao diện ngoại hình.
                  <br>
                  <strong>✗ Phương án B sai:</strong> Không có đề cập nào về việc trang web dễ sử dụng hay không.
                  <br>
                  <strong>✓ C chính xác: Trang web hữu ích cho việc học tập.</strong>`,
            q10: `<strong>Đáp án: C</strong><br>
                  Người phụ nữ nói rằng cô ấy <em>"pleased with the prices she paid for things"</em> (hài lòng với giá cả mà cô ấy đã trả). Cô ấy cho rằng mọi thứ đều rất hợp lý và cô ấy đã mua được nhiều thứ với giá tốt.
                  <br><br>
                  <strong>✗ Phương án A sai:</strong> Không có nhận xét cụ thể nào về đồ ăn được đề cập.
                  <br>
                  <strong>✗ Phương án B sai:</strong> Khách sạn không phải là chủ đề chính trong cuộc trò chuyện.
                  <br>
                  <strong>✓ C chính xác: Hài lòng với giá cả.</strong>`,
            q11: `<strong>Đáp án: B</strong><br>
                  Cả hai người bạn đều đồng ý rằng trung tâm mua sắm cần <em>"more places to eat"</em> (nhiều nơi để ăn uống hơn). Họ nói rằng hiện tại chỉ có một vài quán cà phê và nhà hàng, không đủ cho số lượng khách hàng.
                  <br><br>
                  <strong>✗ Phương án A sai:</strong> Việc đỗ xe không phải là vấn đề họ thảo luận.
                  <br>
                  <strong>✗ Phương án C sai:</strong> Họ không nói về việc cần nhiều loại cửa hàng hơn.
                  <br>
                  <strong>✓ B chính xác: Cần nhiều nơi ăn uống hơn.</strong>`,
            q12: `<strong>Đáp án: A</strong><br>
                  Họ đồng ý rằng trung tâm mua sắm cần <em>"extra space for parking"</em> (không gian đỗ xe thêm). Họ nói rằng bãi đỗ xe hiện tại thường xuyên đầy và khách hàng khó tìm được chỗ để đỗ xe.
                  <br><br>
                  <strong>✗ Phương án B sai:</strong> Số lượng nơi ăn uống không phải là vấn đề chính trong cuộc thảo luận này.
                  <br>
                  <strong>✗ Phương án C sai:</strong> Họ không đề cập đến việc cần nhiều loại cửa hàng hơn.
                  <br>
                  <strong>✓ A chính xác: Cần thêm không gian đỗ xe.</strong>`,
            q13: `<strong>Đáp án: B</strong><br>
                  Họ đồng ý rằng trung tâm mua sắm cần có <em>"a wider range of shops"</em> (phạm vi cửa hàng đa dạng hơn). Họ cảm thấy hiện tại có quá nhiều cửa hàng cùng loại và cần có sự đa dạng hơn để thu hút khách hàng.
                  <br><br>
                  <strong>✗ Phương án A sai:</strong> Việc đỗ xe không phải là chủ đề chính của câu trả lời này.
                  <br>
                  <strong>✗ Phương án C sai:</strong> Số lượng nơi ăn uống không phải là vấn đề được nhấn mạnh.
                  <br>
                  <strong>✓ B chính xác: Cần phạm vi cửa hàng đa dạng hơn.</strong>`
        };

        // ---------- TRANSCRIPT ----------
        const transcriptHTML = `
            <p><strong>Test Two, Part 2</strong></p>
            <p><strong>Question 8</strong><br>
            <strong>Woman:</strong> How's your project going? You seem worried about something.<br>
            <strong>Man:</strong> I have so much to do and I'm not sure where to start.<br>
            <strong>Woman:</strong> Don't worry about <span class="highlightable" data-q="8">the order in which he does the work</span>. Just start with whatever feels easiest and work your way through the list.<br>
            <strong>Man:</strong> Thanks, that helps.</p>

            <p><strong>Question 9</strong><br>
            <strong>Student 1:</strong> Have you seen that new history website our teacher recommended?<br>
            <strong>Student 2:</strong> Yes, I used it yesterday for my homework. <span class="highlightable" data-q="9">It's useful for studying</span> - has lots of primary sources and documents we can't find in our textbooks.<br>
            <strong>Student 1:</strong> I agree, it's much better than just reading the textbook.</p>

            <p><strong>Question 10</strong><br>
            <strong>Friend 1:</strong> How was your holiday in Spain?<br>
            <strong>Friend 2:</strong> It was amazing! <span class="highlightable" data-q="10">I was really pleased with the prices she paid for things</span> - everything was so affordable compared to here.<br>
            <strong>Friend 1:</strong> That's great! Did you buy lots of souvenirs?<br>
            <strong>Friend 2:</strong> Yes, and I still had money left over!</p>

            <p><strong>Question 11</strong><br>
            <strong>Friend 1:</strong> What do you think of the new shopping centre?<br>
            <strong>Friend 2:</strong> It's nice, but I think <span class="highlightable" data-q="11">it needs more places to eat</span>. There's only one food court and it's always crowded.<br>
            <strong>Friend 1:</strong> I know, we had to wait 30 minutes just to get a table last time.</p>

            <p><strong>Question 12</strong><br>
            <strong>Friend 1:</strong> The parking situation is terrible too.<br>
            <strong>Friend 2:</strong> Definitely. They need <span class="highlightable" data-q="12">extra space for parking</span>. I drove around three times last Saturday before finding a spot.<br>
            <strong>Friend 1:</strong> Same here. It puts me off going sometimes.</p>

            <p><strong>Question 13</strong><br>
            <strong>Friend 1:</strong> And the shops... there are five shoe stores but no bookshop.<br>
            <strong>Friend 2:</strong> Exactly! They need <span class="highlightable" data-q="13">a wider range of shops</span>. More variety would bring in more customers.<br>
            <strong>Friend 1:</strong> I hope they read the feedback we sent.</p>
            <p><em>Now listen again.</em></p>
            <p style="color:#666;">That is the end of Part Two.</p>
        `;

        // ---------- QUESTIONS DATA ----------
        const questionsData = [
            { num: 8, text: "You will hear two friends talking about some work the man has to do. The woman tells the man not to worry about", options: ["how quickly he does the work.", "the order in which he does the work.", "having to ask for support from others."] },
            { num: 9, text: "You will hear two students talking about a history website. They agree that", options: ["it looks good.", "it's easy to use.", "it's useful for studying."] },
            { num: 10, text: "You will hear two friends talking about the woman's holiday. How did she feel about it?", options: ["satisfied with the food that she tried", "impressed with the hotel she stayed in", "pleased with the prices she paid for things"] },
            { num: 11, text: "You will hear two friends talking about a shopping centre. They agree that it needs to have", options: ["extra space for parking.", "more places to eat.", "a wider range of shops."] },
            { num: 12, text: "You will hear two friends talking about a shopping centre. They agree that it needs to have", options: ["extra space for parking.", "more places to eat.", "a wider range of shops."] },
            { num: 13, text: "You will hear two friends talking about a shopping centre. They agree that it needs to have", options: ["extra space for parking.", "more places to eat.", "a wider range of shops."] }
        ];

        // ---------- GLOBAL STATE ----------
        let examSubmitted = false;
        let explanationMode = false;
        const audio = document.getElementById('listeningAudio');
        const speedSelect = document.getElementById('speedSelect');
        speedSelect.addEventListener('change', () => { if(audio) audio.playbackRate = parseFloat(speedSelect.value); });

        function getUserAnswer(q) {
            const radios = document.getElementsByName(`q${q}`);
            for(let r of radios) if(r.checked) return r.value;
            return null;
        }
        function isAnswerCorrect(q, user) { return user === answerKey[`q${q}`]; }
        function updateAnswerCount() {
            let answered = 0;
            for(let i=8;i<=13;i++) if(getUserAnswer(i)) answered++;
            document.getElementById('answeredCount').textContent = `${answered}/6 answered`;
            document.getElementById('progressDisplay').textContent = `Đã làm: ${answered}/6`;
            for(let i=8;i<=13;i++) {
                const btn = document.querySelector(`.nav-btn[data-question="${i}"]`);
                if(btn) {
                    btn.classList.remove('answered','unanswered');
                    btn.classList.add(getUserAnswer(i) ? 'answered' : 'unanswered');
                }
            }
        }
        function createNavButtons() {
            const nav = document.getElementById('navButtons');
            nav.innerHTML = '';
            for(let i=8;i<=13;i++) {
                const btn = document.createElement('button');
                btn.className = 'nav-btn unanswered';
                btn.textContent = i;
                btn.dataset.question = i;
                btn.addEventListener('click', () => {
                    document.getElementById(`question-${i}`)?.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                });
                nav.appendChild(btn);
            }
        }
        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            questionsData.forEach(q => {
                const div = document.createElement('div');
                div.className = 'question-item';
                div.id = `question-${q.num}`;
                div.innerHTML = `
                    <div class="question-text">${q.num}. ${q.text}</div>
                    <div class="options">
                        ${q.options.map((opt, idx) => `
                            <div class="option">
                                <input type="radio" name="q${q.num}" value="${String.fromCharCode(65+idx)}" id="q${q.num}${String.fromCharCode(65+idx)}">
                                <label for="q${q.num}${String.fromCharCode(65+idx)}">${String.fromCharCode(65+idx)}. ${opt}</label>
                            </div>
                        `).join('')}
                    </div>
                    <span class="eye-icon" data-question="${q.num}">👁️</span>
                `;
                container.appendChild(div);
            });
            document.querySelectorAll('input[type="radio"]').forEach(radio => radio.addEventListener('change', updateAnswerCount));
        }
        function markAnswers() {
            for(let i=8;i<=13;i++) {
                const qDiv = document.getElementById(`question-${i}`);
                if(!qDiv) continue;
                const user = getUserAnswer(i);
                const correct = isAnswerCorrect(i, user);
                qDiv.classList.remove('correct','incorrect');
                const oldBadge = qDiv.querySelector('.correct-answer-badge');
                if(oldBadge) oldBadge.remove();
                if(correct) qDiv.classList.add('correct');
                else {
                    qDiv.classList.add('incorrect');
                    const badge = document.createElement('span');
                    badge.className = 'correct-answer-badge';
                    badge.textContent = `Đáp án đúng: ${displayAnswers[`q${i}`]}`;
                    qDiv.appendChild(badge);
                }
            }
        }
        function showExplanation(questionNum) {
            if(!explanationMode && !examSubmitted) return;
            document.querySelectorAll('.transcript-highlight').forEach(el => el.classList.remove('transcript-highlight'));
            document.querySelectorAll('.keyword-highlight').forEach(el => el.classList.remove('keyword-highlight'));
            const spans = document.querySelectorAll(`.highlightable[data-q="${questionNum}"]`);
            spans.forEach(span => {
                const parentP = span.closest('p');
                if(parentP) parentP.classList.add('transcript-highlight');
                span.classList.add('keyword-highlight');
                span.scrollIntoView({ behavior: 'smooth', block: 'center' });
                span.classList.add('scroll-highlight');
                setTimeout(() => span.classList.remove('scroll-highlight'), 1000);
            });
            document.getElementById('explanationPanel').classList.add('show');
            document.getElementById('explanationTitle').textContent = `Giải thích câu ${questionNum}`;
            let html = detailedExplanations[`q${questionNum}`] || `<strong>Đáp án: ${displayAnswers[`q${questionNum}`]}</strong><br>`;
            if(examSubmitted) {
                const user = getUserAnswer(questionNum) || '(chưa chọn)';
                const isCor = isAnswerCorrect(questionNum, user);
                html += `<div style="margin-top:10px;padding:10px;background:${isCor?'#e8f5e8':'#ffebee'};border-radius:5px;">
                          <strong>Câu trả lời của bạn:</strong> ${user}<br>${!isCor ? `<strong>Đáp án đúng:</strong> ${displayAnswers[`q${questionNum}`]}` : '✅ Đúng!'}
                          </div>`;
            }
            document.getElementById('explanationText').innerHTML = html;
        }
        function resetAll() {
            examSubmitted = false; explanationMode = false;
            for(let i=8;i<=13;i++) {
                document.getElementsByName(`q${i}`).forEach(r => { r.checked = false; r.disabled = false; });
                const qDiv = document.getElementById(`question-${i}`);
                if(qDiv) { qDiv.classList.remove('correct','incorrect'); const b = qDiv.querySelector('.correct-answer-badge'); if(b) b.remove(); }
            }
            document.getElementById('mainArea').classList.remove('show-transcript');
            document.getElementById('transcriptContent').innerHTML = '';
            document.querySelectorAll('.eye-icon').forEach(icon => icon.style.display = 'none');
            document.querySelectorAll('.transcript-highlight, .keyword-highlight').forEach(el => el.classList.remove('transcript-highlight','keyword-highlight'));
            document.getElementById('submitBtn').disabled = false;
            document.getElementById('submitBtn').textContent = 'Nộp bài';
            document.getElementById('explainBtn').disabled = true;
            document.getElementById('explainBtn').textContent = 'Xem giải thích';
            document.getElementById('explanationPanel').classList.remove('show');
            updateAnswerCount();
        }

        // Save to localStorage
        function saveToDashboard() {
            if(!examSubmitted) return;
            let correctCount = 0;
            const details = [];
            for(let i=8;i<=13;i++) {
                const user = getUserAnswer(i);
                const isCor = user === answerKey[`q${i}`];
                if(isCor) correctCount++;
                details.push({ question: i, user: user || '(trống)', correct: displayAnswers[`q${i}`], isCorrect: isCor });
            }
            const partData = { partId: 2, name: "Part 2", totalQuestions: 6, correctCount, details };
            localStorage.setItem(`pet_listening_book2_test2_part2`, JSON.stringify(partData));
        }

        // Event listeners
        document.getElementById('submitBtn').addEventListener('click', () => {
            if(examSubmitted) return;
            let unanswered = [];
            for(let i=8;i<=13;i++) if(!getUserAnswer(i)) unanswered.push(i);
            if(unanswered.length && !confirm(`Bạn còn ${unanswered.length} câu chưa chọn. Nộp bài?`)) return;
            examSubmitted = true;
            document.getElementById('mainArea').classList.add('show-transcript');
            document.getElementById('transcriptContent').innerHTML = transcriptHTML;
            markAnswers();
            document.getElementById('submitBtn').disabled = true;
            document.getElementById('submitBtn').textContent = 'Đã nộp bài';
            document.getElementById('explainBtn').disabled = false;
            let correctCount = 0;
            for(let i=8;i<=13;i++) if(isAnswerCorrect(i, getUserAnswer(i))) correctCount++;
            document.getElementById('explanationPanel').classList.add('show');
            document.getElementById('explanationTitle').textContent = 'KẾT QUẢ';
            document.getElementById('explanationText').innerHTML = `<h4>Bạn đã nộp bài</h4><p><strong>Đúng:</strong> ${correctCount}/6</p><p>Nhấn "Xem giải thích" để xem chi tiết.</p>`;
            document.querySelectorAll('input[type="radio"]').forEach(el => el.disabled = true);
            saveToDashboard();
        });
        document.getElementById('explainBtn').addEventListener('click', () => {
            if(!examSubmitted) return;
            explanationMode = true;
            document.querySelectorAll('.eye-icon, .correct-answer-badge').forEach(el => el.style.display = 'inline-block');
            document.getElementById('explainBtn').disabled = true;
            document.getElementById('explainBtn').textContent = 'Đang xem giải thích';
        });
        document.getElementById('resetBtn').addEventListener('click', () => { if(confirm('Reset tất cả câu trả lời?')) resetAll(); });
        document.getElementById('closeExplanation').addEventListener('click', () => {
            document.getElementById('explanationPanel').classList.remove('show');
            document.querySelectorAll('.transcript-highlight, .keyword-highlight').forEach(el => el.classList.remove('transcript-highlight','keyword-highlight'));
        });
        document.addEventListener('click', (e) => { if(e.target.classList.contains('eye-icon')) showExplanation(e.target.dataset.question); });

        // Font resize
        function setFontSize(size) {
            ['small','medium','large'].forEach(s => document.getElementById(`font${s.charAt(0).toUpperCase()+s.slice(1)}`).classList.remove('active'));
            document.getElementById(`font${size.charAt(0).toUpperCase()+size.slice(1)}`).classList.add('active');
            document.querySelectorAll('.transcript-content, .questions-list').forEach(el => {
                el.className = `transcript-content font-${size}`;
                if(el.classList.contains('questions-list')) el.classList.add('centered');
            });
        }
        document.getElementById('fontSmall').addEventListener('click', () => setFontSize('small'));
        document.getElementById('fontMedium').addEventListener('click', () => setFontSize('medium'));
        document.getElementById('fontLarge').addEventListener('click', () => setFontSize('large'));

        // Resizer
        const transcriptPanel = document.getElementById('transcriptPanel'), questionsPanel = document.getElementById('questionsPanel'), resizer = document.getElementById('resizer');
        let isResizing = false;
        resizer.addEventListener('mousedown', (e) => { isResizing = true; document.body.style.cursor = 'col-resize'; e.preventDefault(); });
        document.addEventListener('mousemove', (e) => {
            if(!isResizing) return;
            const rect = document.getElementById('mainArea').getBoundingClientRect();
            let leftWidth = e.clientX - rect.left - 4;
            if(leftWidth < 250) leftWidth = 250;
            if(leftWidth > rect.width - 250) leftWidth = rect.width - 250;
            transcriptPanel.style.width = leftWidth + 'px';
            questionsPanel.style.width = (rect.width - leftWidth - 8) + 'px';
        });
        document.addEventListener('mouseup', () => { isResizing = false; document.body.style.cursor = 'default'; });

        // Context menu manual highlight
        let selectedRange = null;
        const contextMenu = document.getElementById('contextMenu');
        window.removeHighlight = function() {
            if(selectedRange) {
                const highlights = document.querySelectorAll('.highlight-yellow, .highlight-green, .highlight-pink');
                highlights.forEach(h => { if(selectedRange.intersectsNode(h)) h.replaceWith(...h.childNodes); });
            }
            contextMenu.style.display = 'none'; selectedRange = null;
        };
        window.applyHighlight = function(color) {
            if(selectedRange) {
                const span = document.createElement('span');
                span.className = `highlight-${color}`;
                span.appendChild(selectedRange.extractContents());
                selectedRange.insertNode(span);
            }
            contextMenu.style.display = 'none'; selectedRange = null;
        };
        const transcriptDiv = document.getElementById('transcriptContent');
        if(transcriptDiv) {
            transcriptDiv.addEventListener('contextmenu', (e) => {
                const sel = window.getSelection();
                if(sel.toString().trim()) { e.preventDefault(); selectedRange = sel.getRangeAt(0); contextMenu.style.left = e.pageX+'px'; contextMenu.style.top = e.pageY+'px'; contextMenu.style.display = 'block'; }
            });
        }
        document.addEventListener('click', (e) => { if(!e.target.closest('.context-menu')) contextMenu.style.display = 'none'; });

        // Initialize
        createNavButtons();
        renderQuestions();
        updateAnswerCount();
        document.querySelectorAll('.eye-icon').forEach(icon => icon.style.display = 'none');
        setFontSize('large');

        // ==================== MODE TOGGLE (Classic/Modern) ====================
        const modeToggle = document.getElementById('modeToggle');
        const styleLink = document.getElementById('styleLink');
        const testWrapper = document.getElementById('testWrapper');
        const html = document.documentElement;
        const savedMode = localStorage.getItem('pet-mode');

        function setMode(isClassic) {
            if (isClassic) {
                styleLink.href = 'listening-pet-common1.css';
                testWrapper.classList.add('classic-mode');
                html.removeAttribute('data-theme');
                localStorage.removeItem('pet-theme');
            } else {
                styleLink.href = 'listening-pet-common.css';
                testWrapper.classList.remove('classic-mode');
            }
            localStorage.setItem('pet-mode', isClassic ? 'classic' : 'modern');
        }

        if (savedMode === 'classic') {
            modeToggle.checked = true;
            setMode(true);
        } else {
            modeToggle.checked = false;
            setMode(false);
        }

        modeToggle.addEventListener('change', () => {
            setMode(modeToggle.checked);
        });

        // ==================== THEME TOGGLE ====================
        const themeToggle = document.getElementById('themeToggle');
        const savedTheme = localStorage.getItem('pet-theme');
        if (savedTheme === 'dark' && !testWrapper.classList.contains('classic-mode')) {
            html.setAttribute('data-theme', 'dark');
        }
        themeToggle.addEventListener('click', () => {
            if (testWrapper.classList.contains('classic-mode')) {
                return;
            }
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('pet-theme', newTheme);
        });

        // Resizable explanation panel logic
        const expPanel = document.getElementById('explanationPanel');
        const expResizer = document.getElementById('explanationResizer');
        let isResizingExp = false;
        let startYExp, startHeightExp;

        if (expResizer && expPanel) {
            expResizer.addEventListener('mousedown', (e) => {
                isResizingExp = true;
                startYExp = e.clientY;
                startHeightExp = expPanel.offsetHeight;
                document.body.style.cursor = 'ns-resize';
                document.body.style.userSelect = 'none';
            });

            document.addEventListener('mousemove', (e) => {
                if (!isResizingExp) return;
                const dy = startYExp - e.clientY;
                const newHeight = startHeightExp + dy;
                if (newHeight > 100 && newHeight < window.innerHeight * 0.8) {
                    expPanel.style.maxHeight = newHeight + 'px';
                    expPanel.style.height = newHeight + 'px';
                }
            });

            document.addEventListener('mouseup', () => {
                isResizingExp = false;
                document.body.style.cursor = 'default';
                document.body.style.userSelect = 'auto';
            });
        }
    })();
</script>
</body>
</html>
