<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PET 3 - Test 2 - Part 1</title>
    <link rel="stylesheet" href="listening-pet-common.css" id="styleLink">
</head>
<body>
    <div class="test-wrapper" id="testWrapper">
        <!-- Header -->
        <div class="ielts-header">
            <div class="brand">
                <div class="ielts-logo">PET</div>
                <div class="candidate"></div>
                <div class="audio-controls">
                    <audio id="listeningAudio" controls>
                        <source src="audio/B1 Preliminary 3 - Test 2 Part 1.mp3" type="audio/mpeg">
                        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg">
                    </audio>
                    <select class="speed-select" id="speedSelect">
                        <option value="0.7">0.7x</option>
                        <option value="0.9">0.9x</option>
                        <option value="1.0" selected>1x</option>
                        <option value="1.1">1.1x</option>
                        <option value="1.25">1.25x</option>
                    </select>
                    <span class="volume-icon">🔊</span>
                </div>
            </div>

</div>

        <!-- Question navigator (1-7) -->
        <div class="question-nav">
            
            <div class="nav-buttons" id="navButtons"></div>
        </div>

        <!-- Main area -->
        <div class="main-area" id="mainArea">
            <!-- Transcript panel (ẩn ban đầu) -->
            <div class="transcript-panel" id="transcriptPanel">
                <div class="panel-header">
                    <span>TRANSCRIPT</span>
                </div>
                <div class="transcript-content font-large" id="transcriptContent"></div>
            </div>
            <div class="resizer" id="resizer"></div>

            <!-- Questions panel -->
            <div class="questions-panel" id="questionsPanel">
                <div class="panel-header">
                    <span>QUESTIONS 1-7</span>
                    <span class="answer-badge" id="answeredCount">0/7 answered</span>
                </div>
                <div class="questions-list font-large centered" id="questionsContent">
                <div>
                    <h3>PART 1 Questions 1-7</h3>
                    <p><em>Choose the correct answer (A, B or C).</em></p>
                    <div class="notes-box" id="questionsContainer"></div>
                </div>
            </div>
            </div>
        </div>

        <!-- Bottom bar -->
        <div class="bottom-bar">
            <button class="btn btn-primary" id="submitBtn">Nộp bài</button>
            <button class="btn btn-success" id="explainBtn" disabled>Xem giải thích</button>
            <button class="btn btn-danger" id="resetBtn">Reset</button>
            <div class="progress" id="progressDisplay">Đã làm: 0/7</div>
        </div>

        <!-- Explanation panel -->
        <div class="explanation-panel" id="explanationPanel">
            <div class="resize-handle" id="explanationResizer"></div>
            <div class="explanation-header">
                <span id="explanationTitle">Giải thích</span>
                <span class="close-btn" id="closeExplanation">✕ Đóng</span>
            </div>
            <div class="explanation-content" id="explanationText"></div>
        </div>
    </div>

    <!-- Context menu for manual highlighting -->
    <div class="context-menu" id="contextMenu">
        <div onclick="applyHighlight('yellow')">Highlight vàng</div>
        <div onclick="applyHighlight('green')">Highlight xanh lá</div>
        <div onclick="applyHighlight('pink')">Highlight hồng</div>
        <div onclick="removeHighlight()">Xóa highlight</div>
    </div>

    <!-- Core Listening Engine -->
    <script src="core-listening.js"></script>
    
    <script>
        // Test Data for PET 3 Test 2 Part 1
        const pet3Test2Part1Data = {
            title: "B1 Preliminary 3 · Test 2 · Part 1",
            type: "multiple-choice",
            part: 1,
            book: 3,
            test: 2,
            
            // Answer Key
            answerKey: {
                q1: 'B',
                q2: 'B',
                q3: 'B',
                q4: 'C',
                q5: 'A',
                q6: 'A',
                q7: 'B'
            },

            // Display Answers
            displayAnswers: {
                q1: 'B',
                q2: 'B',
                q3: 'B',
                q4: 'C',
                q5: 'A',
                q6: 'A',
                q7: 'B'

                  <br>
                  <strong>✓ B (at the coast) là đáp án đúng.</strong>`,

                q2: `<strong>Đáp án: B (a sports kit - đồ thể thao)</strong><br>
                  Cậu bé nói: <em>"<span class='keyword-highlight'>I have to prepare a presentation for history</span>"</em> và định dùng máy tính ở thư viện sau giờ thể thao. Bố khuyên để laptop ở nhà vì có thể dùng máy tính ở thư viện. Nhưng cậu vẫn phải mang đồ thể thao.

                  <strong>✗ A (a violin) sai:</strong> Bài học violin là ngày mai (<em>"<span class='keyword-highlight'>at least your violin lesson isn't until tomorrow</span>"</em>), không phải hôm nay.

                  Cô gái nói: <em>"<span class='keyword-highlight'>but what about ice skating for a change?</span>"</em> và sau đó <em>"<span class='keyword-highlight'>I think I'll go for your suggestion!</span>"</em> - cô quyết định đi trượt băng.

                  <strong>✗ A (to the swimming pool) sai:</strong> Bể bơi là hoạt động họ đã làm lần trước (<em>"<span class='keyword-highlight'>They all enjoyed going to the pool last time they came</span>"</em>), cô muốn thay đổi.
                  <br>
                  <strong>✗ C (to the cinema) sai:</strong> Cô từng nghĩ đến việc xem phim nhưng quyết định không đi vì không có phim hay (<em>"<span class='keyword-highlight'>I don't think there's anything good on this week</span>"</em>).
                  <br>
                  <strong>✓ B (to the ice rink) là đáp án đúng.</strong>`,

                q4: `<strong>Đáp án: C (by queuing at the ticket office - bằng cách xếp hàng ở quầy vé)</strong><br>
                  Cô gái nói: <em>"<span class='keyword-highlight'>she spent her lunch break in the queue getting them</span>"</em> - mẹ cô đã xếp hàng ở quầy vé để mua vé.
                  <br><br>
                  <strong>✗ A (on a phone app) sai:</strong> Cô đề xuất dùng app điện thoại nhưng vé đắt hơn (<em>"<span class='keyword-highlight'>but they were more expensive there</span>"</em>) nên không mua.

                  <br>
                  <strong>✓ C (by queuing at the ticket office) là đáp án đúng.</strong>`,

                q5: `<strong>Đáp án: A (on horseback - cưỡi ngựa)</strong><br>
                  Cô gái nói: <em>"<span class='keyword-highlight'>Great idea of yours to ride up – it was a lot easier on horse-back than when I tried to come up on my mountain bike</span>"</em> - họ cưỡi ngựa lên núi.
                  <br><br>
                  <strong>✗ B (on bikes) sai:</strong> Cậu bé thử đi xe đạp leo núi nhưng chỉ được nửa đường (<em>"<span class='keyword-highlight'>I only got to about halfway and then I had to turn around</span>"</em>) rồi quay lại.
                  <br>
                  <strong>✗ C (by walking) sai:</strong> Cô gái thường xem người khác đi bộ leo núi từ làng (<em>"<span class='keyword-highlight'>I've always watched people hiking up this mountain from back in the village</span>"</em>) nhưng hôm nay họ cưỡi ngựa.

                  <strong>✗ B (make posters) sai:</strong> Posters về chuỗi thức ăn đã được làm xong (<em>"<span class='keyword-highlight'>You've all worked so hard on your posters of the food chain</span>"</em>) và sẽ được treo ở hội trường, không phải làm trong giờ này.
                  <br>
                  <strong>✗ C (give a presentation) sai:</strong> Bài thuyết trình sẽ diễn ra trong vài ngày tới (<em>"<span class='keyword-highlight'>It's been great practice for the presentations you're going to do in a few days</span>"</em>), không phải hôm nay.
                  <br>
                  <strong>✓ A (use laptops) là đáp án đúng.</strong>`,

                q7: `<strong>Đáp án: B (on her bed - trên giường của cô ấy)</strong><br>
                  Cô gái nói: <em>"<span class='keyword-highlight'>I put it on my bed with my tennis clothes ready to take</span>"</em> - cô để vợt tennis trên giường.
                  <br><br>
                  <strong>✗ A (in the living room) sai:</strong> Túi tennis ở phòng khách (<em>"<span class='keyword-highlight'>my tennis bag's in the living room</span>"</em>) nhưng vợt thì không.
                  <br>
                  <strong>✗ C (by the front door) sai:</strong> Bố tưởng thấy vợt ở cửa (<em>"<span class='keyword-highlight'>I'm sure I saw it by the door last night</span>"</em>) nhưng thực ra nó trên giường.

                  <strong>✓ B (on her bed) là đáp án đúng.</strong>`
            },

            // AI HIGHLIGHT RULE: Always highlight the FULL CONTEXT including the answer.
            // Do NOT highlight only the answer word/phrase. Include complete sentences.
            // Transcript with highlightable spans
            transcript: `
            <p><em>Test Two. There are four parts to the test. You will hear each part twice. We will now stop for a moment. Please ask any questions now because you must not speak during the test.</em></p>
            <p><strong>PART 1 Now open your question papers and look at Part One. For each question, choose the correct answer. Look at question one.</strong></p>

            <p><strong>Question 1</strong><br>
            <strong>Girl:</strong> Hey, how was your holiday?<br>
            <strong>Boy:</strong> It was great, thanks.<br>
            <strong>Girl:</strong> Did you go by car?<br>
            <strong>Boy:</strong> Yes, the journey took ages and my sister and I got a bit bored. We passed through a big city on our way. But <span class="highlightable" data-q="1">when we finally got to the coast it was awesome and we had great fun there</span>. On the way back we took a different route and went really close to some mountains, but we didn't stop – Dad was driving! I'd really like to go back there one day!<br>
            <em>Now listen again.</em></p>

            <p><strong>Question 2</strong><br>
            <strong>Boy:</strong> My school bag's so heavy today, Mum!<br>
            <strong>Woman:</strong> Well, can't you leave something at home?<br>
            <strong>Boy:</strong> Not really, I'll need my football kit for my sports class this afternoon and I really need my laptop, because <span class="highlightable" data-q="2">I have to prepare a presentation for history</span>.<br>
            <strong>Woman:</strong> Could you do that on a computer in the library?<br>
            <strong>Boy:</strong> Yeah, I'm sure I'll have time to go there after sports class. That'll be great. I'll leave my computer behind and go to the library after sports class.<br>
            <strong>Woman:</strong> Well, at least your violin lesson isn't until tomorrow, or you'd really have a lot to carry!<br>
            <em>Now listen again.</em></p>

            <p><strong>Question 3</strong><br>
            <strong>Boy:</strong> Hi Sally. What's wrong? You look worried!<br>
            <strong>Girl:</strong> My cousins are coming at the weekend and I'm trying to think of a fun activity to do with them. I wondered about seeing a film.<br>
            <strong>Boy:</strong> I don't think there's anything good on this week.<br>
            <strong>Girl:</strong> Well then maybe we'd better do something active. They all enjoyed going to the pool last time they came.<br>
            <strong>Boy:</strong> I know everyone loves swimming, but <span class="highlightable" data-q="3">what about ice skating for a change?</span><br>
            <strong>Girl:</strong> You know, I think I'll go for your suggestion! We can always go to the cinema next time.<br>
            <em>Now listen again.</em></p>

            <p><strong>Question 4</strong><br>
            <strong>Boy:</strong> Did you get tickets for the concert?<br>
            <strong>Girl:</strong> Mum got them actually. We looked online as soon as they went on sale but there were problems with the website and we kept losing the internet connection. It was so annoying! The ticket office is right next to where she works. We knew there'd be loads of people trying to get them, though. I suggested getting them from a ticket-sales app on the phone, but they were more expensive there, so <span class="highlightable" data-q="4">she spent her lunch break in the queue getting them</span>!<br>
            <strong>Boy:</strong> Wow! Your mum's awesome!<br>
            <em>Now listen again.</em></p>

            <p><strong>Question 5</strong><br>
            <strong>Girl:</strong> That was quite a climb! It was worth it, though – just look at that view! I've always watched people hiking up this mountain from back in the village. I've never actually reached the top before now.<br>
            <strong>Boy:</strong> Great idea of yours to ride up – <span class="highlightable" data-q="5">it was a lot easier on horse-back than when I tried to come up on my mountain bike</span>. I only got to about halfway and then I had to turn around – my legs were really hurting. It was fun racing back down, though!<br>
            <em>Now listen again.</em></p>

            <p><strong>Question 6</strong><br>
            <strong>Woman:</strong> Right, everyone. I hope you're enjoying Food Week here at school. You've all worked so hard on your posters of the food chain that I thought, rather than display them in the classroom, we'd put them in the school hall for everyone else to take a look at. It's been great practice for the presentations you're going to do in a few days. <span class="highlightable" data-q="6">If you can all go back to the laptops, we'll start learning about the software you'll need to use</span>.<br>
            <em>Now listen again.</em></p>

            <p><strong>Question 7</strong><br>
            <strong>Girl:</strong> Dad – can you help me?<br>
            <strong>Man:</strong> What is it?<br>
            <strong>Girl:</strong> I can't find my tennis racket and we've got to leave for my lesson soon.<br>
            <strong>Man:</strong> I'm sure I saw it by the door last night. Next to your tennis bag?<br>
            <strong>Girl:</strong> No, it's not there, and my tennis bag's in the living room.<br>
            <strong>Man:</strong> Maybe you took it to your bedroom?<br>
            <strong>Girl:</strong> I remember now – <span class="highlightable" data-q="7">I put it on my bed with my tennis clothes ready to take</span>! I'll just get my bag and put everything in it. Then we can go.<br>
            <em>Now listen again.</em></p>
            <p><em>That is the end of Part One.</em></p>
