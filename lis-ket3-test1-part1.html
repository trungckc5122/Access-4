<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KET 3 - Test 1 - Listening Part 1</title>
    <link rel="stylesheet" href="listening-pet-common.css" id="styleLink">
</head>

<body>
    <div class="test-wrapper" id="testWrapper">
        <!-- Header -->
        <div class="ielts-header">
            <div class="brand">
                <div class="ielts-logo">KET</div>
                <div class="candidate"></div>
                <div class="audio-controls">
                    <audio id="listeningAudio" controls>
                        <source src="audio/KET 3 - Test 1 Part 1.mp3" type="audio/mpeg">
                    </audio>
                    <select class="speed-select" id="speedSelect">
                        <option value="0.7">0.7x</option>
                        <option value="0.9">0.9x</option>
                        <option value="1.0" selected>1x</option>
                        <option value="1.1">1.1x</option>
                        <option value="1.25">1.25x</option>
                    </select>
                    <span class="volume-icon">🔊</span>
                </div>
            </div>
        </div>

        <!-- Question navigator -->
        <div class="question-nav">
            <div class="nav-buttons" id="navButtons"></div>
        </div>

        <!-- Main area -->
        <div class="main-area" id="mainArea">
            <!-- Transcript panel -->
            <div class="transcript-panel" id="transcriptPanel">
                <div class="panel-header"><span>TRANSCRIPT</span></div>
                <div class="transcript-content font-large" id="transcriptContent"></div>
            </div>
            <div class="resizer" id="resizer"></div>

            <!-- Questions panel -->
            <div class="questions-panel" id="questionsPanel">
                <div class="panel-header">
                    <span>QUESTIONS 1–5</span>
                    <span class="answer-badge" id="answeredCount">0/5 answered</span>
                </div>
                <div class="questions-list font-large centered" id="questionsContent">
                    <div>
                        <h3>PART 1 &nbsp; Questions 1–5</h3>
                        <p><em>For each question, choose the correct answer.</em></p>
                        <div class="notes-box" id="questionsContainer"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Bottom bar -->
        <div class="bottom-bar">
            <button class="btn btn-primary" id="submitBtn">Nộp bài</button>
            <button class="btn btn-success" id="explainBtn" disabled>Xem giải thích</button>
            <button class="btn btn-danger" id="resetBtn">Reset</button>
            <div class="progress" id="progressDisplay">Đã làm: 0/5</div>
        </div>

        <!-- Explanation panel -->
        <div class="explanation-panel" id="explanationPanel">
            <div class="resize-handle" id="explanationResizer"></div>
            <div class="explanation-header">
                <span id="explanationTitle">Giải thích</span>
                <span class="close-btn" id="closeExplanation">✕ Đóng</span>
            </div>
            <div class="explanation-content" id="explanationText"></div>
        </div>
    </div>

    <!-- Context menu -->
    <div class="context-menu" id="contextMenu">
        <div onclick="applyHighlight('yellow')">Highlight vàng</div>
        <div onclick="applyHighlight('green')">Highlight xanh lá</div>
        <div onclick="applyHighlight('pink')">Highlight hồng</div>
        <div onclick="removeHighlight()">Xóa highlight</div>
    </div>

    <script src="core-listening-ket.js"></script>
    <script>
        const ketTest1Part1Data = {
            title: "KET 3 · Test 1 · Listening Part 1",
            type: "multiple-choice",
            part: 1,
            book: 3,
            test: 1,

            answerKey: { q1: 'A', q2: 'B', q3: 'A', q4: 'C', q5: 'B' },
            displayAnswers: { q1: 'A', q2: 'B', q3: 'A', q4: 'C', q5: 'B' },

            detailedExplanations: {
                q1: `<strong>Đáp án: A – Barbecue</strong><br>
                      Con trai hỏi: <em>"Are we having sandwiches for our family lunch on the beach, Mum?"</em><br>
                      Mẹ đáp: <em>"We usually do that, I know. <span class='keyword-highlight'>Why don't we have a barbecue this time?</span>"</em><br>
                      Con trai gợi ý: <em>"Or perhaps some fish and chips at the café there?"</em><br>
                      Mẹ từ chối: <em>"You're right, but that'll be quite expensive for eight of us."</em><br>
                      Con trai đồng ý: <em>"OK. Your idea sounds good."</em><br><br>
                      <strong>✗ B (Fish and chips) sai:</strong> Mẹ nói đắt ("quite expensive").<br>
                      <strong>✗ C (Sandwiches) sai:</strong> Thường hay ăn nhưng lần này đổi.<br>
                      <strong>✓ A (Barbecue) là đúng – Mẹ đề nghị và con đồng ý.</strong>`,

                q2: `<strong>Đáp án: B – Hockey</strong><br>
                      Con trai nói: <em>"This term I'm doing volleyball for the first time. How about you?"</em><br>
                      Con gái trả lời về volleyball: <em>"I really enjoy volleyball – you will too."</em> Nhưng:<br>
                      <em>"<span class='keyword-highlight'>But my teacher's put my name on the list for hockey</span>, and I'm not sure I'll like it."</em><br>
                      Con trai gợi ý: <em>"I think basketball's a good sport for you."</em><br>
                      Con gái nói: <em>"Well, perhaps I can do that another term!"</em><br><br>
                      <strong>✗ A (Volleyball) sai:</strong> Cô ấy thích nhưng teacher đã đăng ký hockey.<br>
                      <strong>✗ C (Basketball) sai:</strong> Có thể học kỳ sau, không phải kỳ này.<br>
                      <strong>✓ B (Hockey) là đúng – Teacher đã đưa tên cô ấy vào danh sách.</strong>`,

                q3: `<strong>Đáp án: A – Optician </strong><br>
                      Matt hỏi: <em>"Shall we work on our project together at the city library this afternoon, Bella?"</em><br>
                      Bella trả lời: <em>"OK, Matt, but <span class='keyword-highlight'>before that I've got to collect my new glasses from the shop</span>."</em><br>
                      Matt nói về café: <em>"That's no problem – because then we can go to that café next door."</em><br>
                      Bella đồng ý: <em>"Good idea. And it's only ten minutes to walk to the library from there."</em><br><br>
                      <strong>✗ B (Café) sai:</strong> Đi sau khi lấy kính.<br>
                      <strong>✗ C (Library) sai:</strong> Đi sau cùng.<br>
                      <strong>✓ A (Optician) là đúng – Phải lấy kính trước ("before that").</strong>`,

                q4: `<strong>Đáp án: C – Walking</strong><br>
                      Uncle Jack hỏi: <em>"You're looking well, Amy! Are you still riding your bike to school?"</em><br>
                      Amy trả lời: <em>"Well, it's really good exercise for me, I know, but it's hard in winter. <span class='keyword-highlight'>So I've started leaving home early and walking there</span>."</em><br>
                      Về bus: <em>"I caught the bus once, but it was so noisy!"</em><br>
                      Uncle Jack nói: <em>"The bus is much faster."</em><br>
                      Amy nói: <em>"But slower than by bike actually."</em><br><br>
                      <strong>✗ A (Bus) sai:</strong> Chỉ đi 1 lần vì ồn.<br>
                      <strong>✗ B (Bicycle) sai:</strong> Trước đây đi nhưng mùa đông khó.<br>
                      <strong>✓ C (Walking) là đúng – Hiện tại đi bộ ("I've started... walking").</strong>`,

                q5: `<strong>Đáp án: B – Earrings</strong><br>
                      Con trai hỏi: <em>"What shall we get Mum for her birthday this year?"</em><br>
                      Con gái nói về necklace: <em>"Well, she loved the necklace we got her last year."</em><br>
                      Con gái gợi ý: <em>"How about some other jewellery? <span class='keyword-highlight'>I saw some nice silver earrings at the market</span>."</em><br>
                      Con trai nói về bracelet: <em>"Or we could buy a bracelet?"</em><br>
                      Con gái từ chối: <em>"She doesn't often wear those."</em><br>
                      Con trai quyết định: <em>"OK, then. Let's get what you suggested."</em><br><br>
                      <strong>✗ A (Neecklace) sai:</strong> Năm ngoái tặng rồi.<br>
                      <strong>✗ C (Bracelet) sai:</strong> Mẹ không hay đeo.<br>
                      <strong>✓ B (Earrings) là đúng – Con gái gợi ý và con trai đồng ý.</strong>`
            },

            transcript: `
            <p><strong>PART 1</strong></p>
            <p><em>For each question, choose the correct answer.</em></p>

            <p><strong>Question 1</strong><br>
            <strong>Boy:</strong> Are we having sandwiches for our family lunch on the beach, Mum?<br>
            <strong>Mum:</strong> We usually do that, I know. <span class="highlightable" data-q="1">Why don't we have a barbecue this time?</span><br>
            <strong>Boy:</strong> Or perhaps some fish and chips at the café there? They always smell fantastic.<br>
            <strong>Mum:</strong> You're right, but that'll be quite expensive for eight of us. Boy: OK. Your idea sounds good.</p>

            <p><strong>Question 2</strong><br>
            <strong>Boy:</strong> This term I'm doing volleyball for the first time. How about you?<br>
            <strong>Girl:</strong> I really enjoy volleyball – you will too. <span class="highlightable" data-q="2">But my teacher's put my name on the list for hockey, and I'm not sure I'll like it.</span><br>
            <strong>Boy:</strong> Maybe not. I think basketball's a good sport for you. You're tall and run really fast.<br>
            <strong>Girl:</strong> Well, perhaps I can do that another term!</p>

            <p><strong>Question 3</strong><br>
            <strong>Matt:</strong> Shall we work on our project together at the city library this afternoon, Bella?<br>
            <strong>Bella:</strong> OK, Matt, but <span class="highlightable" data-q="3">before that I've got to collect my new glasses from the shop.</span><br>
            <strong>Matt:</strong> That's no problem – because then we can go to that café next door. They sell great cakes.<br>
            <strong>Bella:</strong> Good idea. And it's only ten minutes to walk to the library from there.</p>

            <p><strong>Question 4</strong><br>
            <strong>Uncle Jack:</strong> You're looking well, Amy! Are you still riding your bike to school?<br>
            <strong>Amy:</strong> Well, it's really good exercise for me, Uncle Jack, I know, but it's hard in winter. <span class="highlightable" data-q="4">So I've started leaving home early and walking there.</span> I caught the bus once, but it was so noisy!<br>
            <strong>Uncle Jack:</strong> The bus is much faster.<br>
            <strong>Amy:</strong> But slower than by bike actually.</p>

            <p><strong>Question 5</strong><br>
            <strong>Boy:</strong> What shall we get Mum for her birthday this year?<br>
            <strong>Girl:</strong> Well, she loved the necklace we got her last year. How about some other jewellery? <span class="highlightable" data-q="5">I saw some nice silver earrings at the market.</span><br>
            <strong>Boy:</strong> Mm. That's not a bad idea. Or we could buy a bracelet?<br>
            <strong>Girl:</strong> She doesn't often wear those.<br>
            <strong>Boy:</strong> OK, then. Let's get what you suggested.</p>

            <p><em>That is the end of Part One.</em></p>
            `,

            questions: [
                { num: 1, text: "What will they have for lunch?", options: ["Barbecue", "Fish and chips", "Sandwiches"] },
                { num: 2, text: "Which sport is the girl going to play this term?", options: ["Volleyball", "Hockey", "Basketball"] },
                { num: 3, text: "Where will the friends go first?", options: ["Optician", "Café", "Library"] },
                { num: 4, text: "How does the girl get to school now?", options: ["Bus", "Bicycle", "Walking"] },
                { num: 5, text: "What do they decide to buy for their mother?", options: ["Necklace", "Earrings", "Bracelet"] }
            ]
        };

        document.addEventListener('DOMContentLoaded', function () {
            window.listeningCore = new ListeningCore();
            window.listeningCore.initializeTest(ketTest1Part1Data);
            console.log('KET 3 Test 1 Listening Part 1 loaded');
        });
    </script>
</body>

</html>
