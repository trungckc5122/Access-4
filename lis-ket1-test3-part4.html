<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KET 1 - Test 3 - Listening Part 4</title>
    <link rel="stylesheet" href="listening-pet-common.css" id="styleLink">
</head>

<body>
    <div class="test-wrapper" id="testWrapper">
        <!-- Header -->
        <div class="ielts-header">
            <div class="brand">
                <div class="ielts-logo">KET</div>
                <div class="candidate"></div>
                <div class="audio-controls">
                    <audio id="listeningAudio" controls>
                        <source src="audio/KET 1 - Test 3 Part 4.mp3" type="audio/mpeg">
                    </audio>
                    <select class="speed-select" id="speedSelect">
                        <option value="0.7">0.7x</option>
                        <option value="0.9">0.9x</option>
                        <option value="1.0" selected>1x</option>
                        <option value="1.1">1.1x</option>
                        <option value="1.25">1.25x</option>
                    </select>
                    <span class="volume-icon">🔊</span>
                </div>
            </div>
        </div>

        <!-- Question navigator -->
        <div class="question-nav">
            <div class="nav-buttons" id="navButtons"></div>
        </div>

        <!-- Main area -->
        <div class="main-area" id="mainArea">
            <!-- Transcript panel -->
            <div class="transcript-panel" id="transcriptPanel">
                <div class="panel-header"><span>TRANSCRIPT</span></div>
                <div class="transcript-content font-large" id="transcriptContent"></div>
            </div>
            <div class="resizer" id="resizer"></div>

            <!-- Questions panel -->
            <div class="questions-panel" id="questionsPanel">
                <div class="panel-header">
                    <span>QUESTIONS 16–20</span>
                    <span class="answer-badge" id="answeredCount">0/5 answered</span>
                </div>
                <div class="questions-list font-large centered" id="questionsContent">
                    <div>
                        <h3>PART 4 &nbsp; Questions 16–20</h3>
                        <p><em>For each question, choose the correct answer.</em></p>
                        <div class="notes-box" id="questionsContainer"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Bottom bar -->
        <div class="bottom-bar">
            <button class="btn btn-primary" id="submitBtn">Nộp bài</button>
            <button class="btn btn-success" id="explainBtn" disabled>Xem giải thích</button>
            <button class="btn btn-danger" id="resetBtn">Reset</button>
            <div class="progress" id="progressDisplay">Đã làm: 0/5</div>
        </div>

        <!-- Explanation panel -->
        <div class="explanation-panel" id="explanationPanel">
            <div class="resize-handle" id="explanationResizer"></div>
            <div class="explanation-header">
                <span id="explanationTitle">Giải thích</span>
                <span class="close-btn" id="closeExplanation">✕ Đóng</span>
            </div>
            <div class="explanation-content" id="explanationText"></div>
        </div>
    </div>

    <!-- Context menu -->
    <div class="context-menu" id="contextMenu">
        <div onclick="applyHighlight('yellow')">Highlight vàng</div>
        <div onclick="applyHighlight('green')">Highlight xanh lá</div>
        <div onclick="applyHighlight('pink')">Highlight hồng</div>
        <div onclick="removeHighlight()">Xóa highlight</div>
    </div>

    <script src="core-listening-ket.js"></script>
    <script>
        const ketTest3Part4Data = {
            title: "KET 1 · Test 3 · Listening Part 4",
            type: "multiple-choice",
            part: 4,
            book: 1,
            test: 3,

            answerKey: { q16: 'B', q17: 'B', q18: 'B', q19: 'A', q20: 'C' },
            displayAnswers: { q16: 'B', q17: 'B', q18: 'B', q19: 'A', q20: 'C' },

            detailedExplanations: {
                q16: `<strong>Đáp án: B – There was a problem with her car</strong><br>
                      Người đàn ông hỏi: <em>"Did you lose your keys or something?"</em><br>
                      Người phụ nữ đáp: <em>"My keys weren't the problem... <span class='keyword-highlight'>My engine stopped and I couldn't start it again.</span>"</em><br>
                      Về đường: <em>"The road that I usually take was fine, it wasn't busy."</em><br><br>
                      <strong>✗ A (The road was closed) sai:</strong> Đường vẫn mở, không bận rộn.<br>
                      <strong>✗ C (She couldn't find her car keys) sai:</strong> Chìa khóa không phải vấn đề.<br>
                      <strong>✓ B (There was a problem with her car) là đúng – động cơ chết máy.</strong>`,

                q17: `<strong>Đáp án: B – in another country</strong><br>
                      Người phụ nữ mời: <em>"there's a sailing course I'd like to do at Blue Water Lake on Saturday. Would you like to come?"</em><br>
                      Người đàn ông đáp: <em>"I'd love to, but <span class='keyword-highlight'>I'm going on a foreign business trip</span>..."</em><br>
                      Về cuối tuần sau: <em>"I'm really sorry, it's my mum's birthday and we've planned a celebration."</em> → Không phải cuối tuần này.<br><br>
                      <strong>✗ A (at a party) sai:</strong> Tiệc sinh nhật mẹ là cuối tuần sau.<br>
                      <strong>✗ C (on a boat) sai:</strong> Anh ấy từ chối lời mời đi thuyền.<br>
                      <strong>✓ B (in another country) là đúng – anh ấy đi công tác nước ngoài.</strong>`,

                q18: `<strong>Đáp án: B – where it is</strong><br>
                      Người đàn ông nói: <em>"That's why all the stages are in the park, because the town square can no longer handle the crowds for this exciting festival."</em> → <span class='keyword-highlight'>Thay đổi địa điểm</span> từ quảng trường thành công viên.<br>
                      Về thời gian: <em>"It's the summer festival, so put it in your calendar. And it's always the last weekend in August."</em> → Thời gian không đổi.<br><br>
                      <strong>✗ A (how long it is) sai:</strong> Không đề cập thay đổi thời lượng.<br>
                      <strong>✗ C (when it is) sai:</strong> Vẫn là cuối tuần cuối cùng tháng 8.<br>
                      <strong>✓ B (where it is) là đúng – chuyển từ quảng trường thành phố sang công viên.</strong>`,

                q19: `<strong>Đáp án: A – history</strong><br>
                      Người đàn ông hỏi: <em>"Was science your favourite lesson when we were at school?"</em><br>
                      Người phụ nữ đáp: <em>"Well, I loved those chemistry experiments we did... Oh? I didn't. <span class='keyword-highlight'>I thought learning about life in Rome centuries ago was much more interesting.</span>"</em> → Lịch sử (Rome).<br>
                      Người phụ nữ đồng ý: <em>"I agree. All those amazing buildings they created."</em> → Đều thích lịch sử.<br>
                      Về địa lý: <em>"I thought the most boring lessons at school were when we had to draw maps of different countries."</em> → Không thích địa lý.<br><br>
                      <strong>✗ B (geography) sai:</strong> Cả hai đều thấy địa lý nhàm chán.<br>
                      <strong>✗ C (science) sai:</strong> Người phụ nữ thích thí nghiệm hóa học nhưng người đàn ông không thích.<br>
                      <strong>✓ A (history) là đúng – cả hai đều thích học về Rome (lịch sử).</strong>`,

                q20: `<strong>Đáp án: C – fruit</strong><br>
                      Người phụ nữ nói: <em>"Grapes and pears are <span class='keyword-highlight'>half price</span>."</em> → Nho và lê là trái cây.<br>
                      Về kem: <em>"This week we have fantastic new chocolate ice cream – it's only four pounds ninety-nine for one litre!"</em> → Không giảm giá.<br>
                      Về nước ngọt: <em>"If you're planning a party, we now sell extra large bottles of lemonade."</em> → Không đề cập giảm giá.<br><br>
                      <strong>✗ A (desserts) sai:</strong> Kem chocolate không giảm giá.<br>
                      <strong>✗ B (soft drinks) sai:</strong> Nước chanh không đề cập giảm giá.<br>
                      <strong>✓ C (fruit) là đúng – nho và lê giảm giá một nửa.</strong>`
            },

            transcript: `
            <p><strong>PART 4</strong></p>
            <p><em>For each question, choose the correct answer.</em></p>

            <p><strong>Question 16</strong><br>
            You will hear a woman talking to a friend about getting to work. Why did the woman arrive at the office late?<br>
            <strong>Man:</strong> You're never late for work! What happened? Did you lose your keys or something?<br>
            <strong>Woman:</strong> My keys weren't the problem.<br>
            <strong>Man:</strong> Was it because of the road repairs?<br>
            <strong>Woman:</strong> <span class="highlightable" data-q="16">The road that I usually take was fine, it wasn't busy. My engine stopped and I couldn't start it again.</span> Luckily, I didn't have to wait long at the side of the road for help.</p>

            <p><strong>Question 17</strong><br>
            You will hear a man, Peter, talking to a friend about his plans. Where will Peter be this Saturday?<br>
            <strong>Woman:</strong> Hi Peter, there's a sailing course I'd like to do at Blue Water Lake on Saturday. Would you like to come?<br>
            <strong>Man:</strong> <span class="highlightable" data-q="17">I'd love to, but I'm going on a foreign business trip...</span> Oh! I've still got to change some money.<br>
            <strong>Woman:</strong> Oh, what about the following weekend?<br>
            <strong>Man:</strong> I'm really sorry, it's my mum's birthday and we've planned a celebration.<br>
            <strong>Woman:</strong> Never mind!</p>

            <p><strong>Question 18</strong><br>
            You will hear a man talking about a music festival. What's different about the festival this year?<br>
            <strong>Man:</strong> Don't miss this year's rock music festival! It's more and more popular every year! That's why <span class="highlightable" data-q="18">all the stages are in the park, because the town square can no longer handle the crowds</span> for this exciting festival. It's the summer festival, so put it in your calendar. And it's always the last weekend in August. Tickets are on sale now.</p>

            <p><strong>Question 19</strong><br>
            You will hear two people talking about their school days. Which subject did they both enjoy at school?<br>
            <strong>Man:</strong> Was science your favourite lesson when we were at school?<br>
            <strong>Woman:</strong> Well, I loved those chemistry experiments we did.<br>
            <strong>Man:</strong> Oh? I didn't. <span class="highlightable" data-q="19">I thought learning about life in Rome centuries ago was much more interesting.</span><br>
            <strong>Woman:</strong> I agree. All those amazing buildings they created. I thought the most boring lessons at school were when we had to draw maps of different countries.<br>
            <strong>Man:</strong> You're right!</p>

            <p><strong>Question 20</strong><br>
            You will hear someone speaking to customers in a supermarket. What's cheaper in the supermarket this week?<br>
            <strong>Woman:</strong> <span class="highlightable" data-q="20">Welcome to your local supermarket. This week we have fantastic new chocolate ice cream – it's only four pounds ninety-nine for one litre! Grapes and pears are half price.</span> If you're planning a party, we now sell extra large bottles of lemonade. If you need help finding things, please ask.</p>

            <p><em>That is the end of Part Four.</em></p>
            `,

            questions: [
                { num: 16, text: "You will hear a woman talking to a friend about getting to work. Why did the woman arrive at the office late?", options: ["The road was closed.", "There was a problem with her car.", "She couldn't find her car keys."] },
                { num: 17, text: "You will hear a man, Peter, talking to a friend about his plans. Where will Peter be this Saturday?", options: ["at a party", "in another country", "on a boat"] },
                { num: 18, text: "You will hear a man talking about a music festival. What's different about the festival this year?", options: ["how long it is", "where it is", "when it is"] },
                { num: 19, text: "You will hear two people talking about their school days. Which subject did they both enjoy at school?", options: ["history", "geography", "science"] },
                { num: 20, text: "You will hear someone speaking to customers in a supermarket. What's cheaper in the supermarket this week?", options: ["desserts", "soft drinks", "fruit"] }
            ]
        };

        document.addEventListener('DOMContentLoaded', function () {
            window.listeningCore = new ListeningCore();
            window.listeningCore.initializeTest(ketTest3Part4Data);
            console.log('KET 1 Test 3 Listening Part 4 loaded');
        });
    </script>
