<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>PET 2 - Test 3 - Reading Part 6</title>
    <link rel="stylesheet" href="reading-pet-common.css" id="styleLink">
</head>
<body>
<div class="test-wrapper" id="testWrapper">
    <div class="ielts-header">
        <div class="brand"><div class="ielts-logo">PET</div><div class="candidate"></div></div>
    </div>

    <div class="question-nav">
        <div class="nav-buttons" id="navButtons"></div>
        <span id="answeredCount" style="font-size:13px; color:#555; margin-left:10px;">0/6 answered</span>
    </div>

    <div class="main-area split-layout" id="mainArea"></div>

    <div class="bottom-bar">
        <button class="btn btn-primary" id="submitBtn">Nộp bài</button>
        <button class="btn btn-success" id="explainBtn" disabled>Xem giải thích</button>
        <button class="btn btn-danger" id="resetBtn">Reset</button>
        <div class="progress" id="progressDisplay">Đã làm: 0/6</div>
    </div>

    <div class="context-menu" id="contextMenu">
        <div onclick="applyHighlight('yellow')">Highlight vàng</div>
        <div onclick="applyHighlight('green')">Highlight xanh lá</div>
        <div onclick="applyHighlight('pink')">Highlight hồng</div>
        <div onclick="removeHighlight()">Xóa highlight</div>
    </div>
</div>

<script src="core-reading.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const testData = {
            type: 'split-layout',
            part: 6,
            answerKey: { q27: "used", q28: "have", q29: "so", q30: "if", q31: "will", q32: "your" },
            displayAnswers: { q27: "used", q28: "have", q29: "so", q30: "if", q31: "will", q32: "your" },
            detailedExplanations: {
                27: `<div><strong>Cấu trúc cố định:</strong> <em>"used to"</em> (đã từng/đã từng là).<br>
                Câu đầy đủ: <em>"it's much better than the old one used to be"</em>.<br>
                Dịch: Nó tốt hơn nhiều so với cái cũ trước đây.<br>
                <strong>Lưu ý:</strong> "used to be" = đã từng như thế nào.</div>`,
                28: `<div>Thì <strong>hiện tại hoàn thành</strong>: <em>"have + P2"</em>.<br>
                Cấu trúc: <em>"have now taken out"</em> = đã tháo bỏ.<br>
                "Now" cho thấy hành động vừa mới hoàn thành có liên quan đến hiện tại.<br>
                Dịch: Chủ sở hữu mới đã tháo bỏ tất cả ghế cũ.</div>`,
                29: `<div>Cấu trúc <strong>"so... that..."</strong> = quá... đến mức mà...<br>
                Dùng để diễn tả kết quả (mệnh đề chỉ kết quả).<br>
                Câu: <em>"it was sometimes so hot that it was difficult to concentrate"</em><br>
                Dịch: Đôi khi trời nóng đến mức khó tập trung vào phim!</div>`,
                30: `<div>Liên từ <strong>"if"</strong> = nếu. Dùng để giới thiệu điều kiện.<br>
                Câu: <em>"if you buy two tickets, you can choose something for free"</em><br>
                Dịch: Nếu bạn mua hai vé, bạn có thể chọn một thứ miễn phí.<br>
                <strong>Hoặc có thể dùng:</strong> when/whenever/provided (khi/bất cứ khi nào/miễn là).</div>`,
                31: `<div>Động từ <strong>"will"</strong> diễn tả dự đoán về tương lai.<br>
                Câu: <em>"I'm sure this will be popular"</em><br>
                Dịch: Tôi chắc điều này sẽ được ưa chuộng.<br>
                "I'm sure" cho thấy sự chắc chắn về dự đoán tương lai.</div>`,
                32: `<div>Tính từ sở hữu <strong>"your"</strong> = của bạn.<br>
                Câu: <em>"you can't bring your own food into the cinema"</em><br>
                Dịch: Bạn không thể mang đồ ăn của riêng bạn vào rạp chiếu phim.<br>
                "Your own" = của chính bạn, nhấn mạnh sở hữu cá nhân.</div>`
            },
            template: `
                <div class="reading-card" id="passageCard">
                    <div class="review-title">The Westway Cinema</div>
                    <p>The new Westway Cinema is finally open! I went last night with my brother, and we both agreed it's much better than the old one
                        <span class="input-wrapper">
                            <input type="text" id="q27" class="gap-input" data-q="27" autocomplete="off">
                            <span class="eye-icon" data-question="27">👁️</span>
                        </span>
                        to be. Although the ticket prices are higher, the extra cost is worth paying.
                    </p>
                    <p>
                        The new owners
                        <span class="input-wrapper">
                            <input type="text" id="q28" class="gap-input" data-q="28" autocomplete="off">
                            <span class="eye-icon" data-question="28">👁️</span>
                        </span>
                        now taken out all the old seats and put in brand new ones that are really comfortable. There's also new air conditioning. This is fantastic because in the past it was sometimes
                        <span class="input-wrapper">
                            <input type="text" id="q29" class="gap-input" data-q="29" autocomplete="off">
                            <span class="eye-icon" data-question="29">👁️</span>
                        </span>
                        hot that it was difficult to concentrate on the film!
                    </p>
                    <p>
                        There are also special offers available. For example,
                        <span class="input-wrapper">
                            <input type="text" id="q30" class="gap-input" data-q="30" autocomplete="off">
                            <span class="eye-icon" data-question="30">👁️</span>
                        </span>
                        you buy two tickets, you can choose something for free – either a snack or a drink. I'm sure this
                        <span class="input-wrapper">
                            <input type="text" id="q31" class="gap-input" data-q="31" autocomplete="off">
                            <span class="eye-icon" data-question="31">👁️</span>
                        </span>
                        be popular, as you can't bring
                        <span class="input-wrapper">
                            <input type="text" id="q32" class="gap-input" data-q="32" autocomplete="off">
                            <span class="eye-icon" data-question="32">👁️</span>
                        </span>
                        own food into the cinema.
                    </p>
                    <p>I'd really recommend going to the Westway Cinema – it's a great night out.</p>
                </div>
            `,
            questions: [
                { num: 27 }, { num: 28 }, { num: 29 }, { num: 30 }, { num: 31 }, { num: 32 }
            ]
        };

        window.readingCore = new ReadingCore();
        window.readingCore.initializeTest(testData);
    });
</script>
</body>
</html>
