    <script>
        const ketTest3Part4Data = {
            title: "KET 3 · Test 3 · Listening Part 4",

            part: 4,
            book: 3,
            test: 3,

            answerKey: { q16: 'C', q17: 'C', q18: 'A', q19: 'A', q20: 'B' },
            displayAnswers: { q16: 'C', q17: 'C', q18: 'A', q19: 'A', q20: 'B' },

            detailedExplanations: {
                q16: `<strong>Đáp án: C – jewellery (trang sức)</strong><br>
                      <strong>Girl:</strong> <em>"My brother's bought Mum chocolates for her birthday. Her favourite kind! It's funny, I was going to buy those too, but <span class='keyword-highlight'>I saw some earrings at that new market and I'm going to get them tomorrow</span>. I'd left my purse at home today. It's an awesome market. My classmate, Ben, bought a really cool T-shirt there."</em><br><br>
                      <strong>✗ A (clothes) sai:</strong> Ben mua T-shirt ("My classmate, Ben, bought a really cool T-shirt"), không phải cô gái.<br>
                      <strong>✗ B (food) sai:</strong> Anh trai đã mua chocolate ("My brother's bought Mum chocolates"), cô gái định mua nhưng đổi ý sang mua earrings.<br>
                      <strong>✓ C (jewellery) là đúng – cô gái mua earrings (bông tai) = trang sức ("I saw some earrings... and I'm going to get them").</strong>`,

                q17: `<strong>Đáp án: C – return something (trả lại đồ)</strong><br>
                      <strong>Boy:</strong> <em>"Hi, Mum. My bike's got a flat tyre and I must get my books back to the city library before 5:30. I've got extra athletics training which will finish too late for me to walk there. <span class='keyword-highlight'>Could you possibly do it for me?</span> They're on my desk. Thanks! I'll get you your favourite magazine on my way home."</em><br><br>
                      <strong>✗ A (buy something) sai:</strong> Cậu bé không nhờ mua đồ – câu nói về tạp chí là để cảm ơn trước, không phải nhờ mua.<br>
                      <strong>✗ B (repair something) sai:</strong> Cậu bé nhắc xe đạp bị xẹp lốp ("My bike's got a flat tyre") nhưng không nhờ mẹ sửa, mà nhờ việc khác.<br>
                      <strong>✓ C (return something) là đúng – nhờ mẹ trả sách về thư viện ("get my books back to the city library... Could you possibly do it for me?").</strong>`,

                q18: `<strong>Đáp án: A – taking part in a sports event (tham gia sự kiện thể thao)</strong><br>
                      <strong>Granny:</strong> <em>"How was school today?"</em><br>
                      <strong>Boy:</strong> <em>"Not bad. Our history teacher showed us a documentary about life in Ancient Rome this morning."</em><br>
                      <strong>Granny:</strong> <em>"Interesting."</em><br>

                q19: `<strong>Đáp án: A – a sports club (câu lạc bộ thể thao)</strong><br>
                      <strong>Girl:</strong> <em>"There are brilliant clubs at this school!"</em><br>
                      <strong>Boy:</strong> <em>"I know! I love doing landscape painting after school on Thursdays."</em><br>
                      <strong>Girl:</strong> <em>"I go to basketball then. It's fun."</em><br>
                      <strong>Boy:</strong> <em>"Yeah. <span class='keyword-highlight'>I do that on Wednesdays</span>. And on Fridays I sing in the choir!"</em><br>

                      <strong>✗ B (an art club) sai:</strong> Chỉ cậu bé thích vẽ ("I love doing landscape painting"), cô gái không tham gia.<br>
                      <strong>✗ C (a music club) sai:</strong> Cậu bé hát trong dàn hợp xướng ("sing in the choir"), cô gái chơi kèn trumpet nhưng đã dừng ("I've stopped now").<br>
                      <strong>✓ A (a sports club) là đúng – cả hai đều chơi bóng rổ (basketball): cô gái đi vào thứ 5 ("I go to basketball then"), cậu bé chơi vào thứ 4 ("I do that on Wednesdays").</strong>`,

                q20: `<strong>Đáp án: B – one of its stars (một trong các diễn viên)</strong><br>
                      <strong>Girl:</strong> <em>"I didn't really like that film yesterday."</em><br>
                      <strong>Boy:</strong> <em>"I was disappointed too. <span class='keyword-highlight'>The main actor was no good</span>."</em><br>
                      <strong>Girl:</strong> <em>"I know. He never is."</em><br>

                      <strong>✗ C (the way it ended) sai:</strong> Cô gái nghĩ kết thúc "quite an interesting way" (khá thú vị), không phải điều họ không thích.<br>
                      <strong>✓ B (one of its stars) là đúng – cả hai đều không thích diễn viên chính: cậu bé nói "main actor was no good", cô gái đồng ý "I know. He never is".</strong>`

            transcript: `
            <p><strong>PART 4</strong></p>
            <p><em>For each question, choose the correct answer.</em></p>

            <p><strong>Question 16</strong><br>
            You will hear a girl talking about buying a present. What kind of present does she decide to buy?<br>

            <p><strong>Question 17</strong><br>
            You will hear a boy leaving a message for his mother. What does he want her to do for him?<br>
            <strong>Boy:</strong> Hi, Mum. My bike's got a flat tyre and <span class="highlightable" data-q="17">I must get my books back to the city library before 5:30</span>. I've got extra athletics training which will finish too late for me to walk there. <span class="highlightable" data-q="17">Could you possibly do it for me?</span> They're on my desk. Thanks! I'll get you your favourite magazine on my way home.</p>

            <p><strong>Question 18</strong><br>
            You will hear a boy talking to his grandmother about his day at school. What did he enjoy most?<br>
            <strong>Granny:</strong> <span class="highlightable" data-q="18">How was school today?</span><br>
            <strong>Boy:</strong> Not bad. Our history teacher showed us a documentary about life in Ancient Rome this morning.<br>
            <strong>Granny:</strong> Interesting.<br>
            <strong>Boy:</strong> A bit boring actually. <span class="highlightable" data-q="18">At lunchtime we had a table-tennis competition. That was the best bit of the day</span>. In the afternoon we started preparing for this year's concert but I'd forgotten my guitar so I couldn't do much.</p>

            <p><strong>Question 19</strong><br>
            You will hear two friends talking about the clubs they go to after school. What kind of club do they both enjoy going to?<br>
            <strong>Girl:</strong> There are brilliant clubs at this school!<br>
            <strong>Boy:</strong> I know! I love doing landscape painting after school on Thursdays.<br>
            <strong>Girl:</strong> <span class="highlightable" data-q="19">I go to basketball then. It's fun.</span><br>
            <strong>Boy:</strong> Yeah. <span class="highlightable" data-q="19">I do that on Wednesdays</span>. And on Fridays I sing in the choir!<br>
            <strong>Girl:</strong> You are busy! I started playing the trumpet in a jazz band on Mondays as well but I've stopped now.</p>

            <p><strong>Question 20</strong><br>
            You will hear two friends talking about a film. What didn't they like about the film?<br>
            <strong>Girl:</strong> <span class="highlightable" data-q="20">I didn't really like that film yesterday.</span><br>
            <strong>Boy:</strong> <span class="highlightable" data-q="20">I was disappointed too. The main actor was no good.</span><br>
            <strong>Girl:</strong> I know. He never is.<br>
            <strong>Boy:</strong> At least it wasn't too long!<br>
            <strong>Girl:</strong> You're right. I was pleased when it ended. But the story finished in quite an interesting way, I suppose.</p>

            <p><em>That is the end of Part Four.</em></p>
            `,

            questions: [
