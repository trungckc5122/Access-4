<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PET 1 - Test 1 - Sec 4</title>
    <link rel="stylesheet" href="listening-pet-common.css" id="styleLink">
</head>
<body>
<div class="test-wrapper" id="testWrapper">
    <!-- Header -->
    <div class="ielts-header">
        <div class="brand">
            <div class="ielts-logo">PET</div>
            <div class="candidate">B1 Preliminary 1 · Test 1 · Part 4</div>
            <div class="audio-controls">
                <audio id="listeningAudio" controls>
                    <source src="B1 Preliminary 1 - Test 1 Part 4.mp3" type="audio/mpeg">
                    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg"> <!-- fallback -->
                </audio>
                <select class="speed-select" id="speedSelect">
                    <option value="0.7">0.7x</option>
                    <option value="0.9">0.9x</option>
                    <option value="1.0" selected>1x</option>
                    <option value="1.1">1.1x</option>
                    <option value="1.25">1.25x</option>
                </select>
                <span class="volume-icon">🔊</span>
            </div>
        </div>
        <div class="font-controls">
            <button class="font-btn" id="fontSmall">A-</button>
            <button class="font-btn" id="fontMedium">A</button>
            <button class="font-btn active" id="fontLarge">A+</button>
        </div>
        <div class="mode-toggle" id="modeToggleContainer">
            <span class="mode-label">Hiện đại</span>
            <label class="mode-switch" title="Chuyển đổi chế độ Cổ điển/Hiện đại">
                <input type="checkbox" id="modeToggle">
                <span class="mode-slider"></span>
            </label>
            <span class="mode-label">Cổ điển</span>
        </div>
        <button class="theme-toggle-btn" id="themeToggle" title="Chuyển đổi Dark/Light mode">
            <span class="icon-moon">🌙</span>
            <span class="icon-sun">☀️</span>
        </button>
    </div>

    <!-- Question navigator (20-25) -->
    <div class="question-nav">
        <span style="font-weight:600; color:#1e3a5f;">Câu 20-25:</span>
        <div class="nav-buttons" id="navButtons"></div>
    </div>

    <!-- Main area -->
    <div class="main-area" id="mainArea">
        <!-- Transcript panel (ẩn ban đầu) -->
        <div class="transcript-panel" id="transcriptPanel">
            <div class="panel-header">
                <span>TRANSCRIPT</span>
            </div>
            <div class="transcript-content font-large" id="transcriptContent"></div>
        </div>
        <div class="resizer" id="resizer"></div>

        <!-- Questions panel -->
        <div class="questions-panel" id="questionsPanel">
            <div class="panel-header">
                <span>QUESTIONS 20-25</span>
                <span class="answer-badge" id="answeredCount">0/6 answered</span>
            </div>
            <div class="questions-list font-large centered" id="questionsContent">
                <div>
                    <h3>PART 4 Questions 20-25</h3>
                    <p><em>Choose the correct answer (A, B or C).</em></p>

                    <div class="notes-box" id="questionsContainer">
                        <!-- Các câu hỏi sẽ được tạo bằng JavaScript để dễ quản lý -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bottom bar -->
    <div class="bottom-bar">
        <button class="btn btn-primary" id="submitBtn">Nộp bài</button>
        <button class="btn btn-success" id="explainBtn" disabled>Xem giải thích</button>
        <button class="btn btn-danger" id="resetBtn">Reset tất cả</button>
        <div class="progress" id="progressDisplay">Đã làm: 0/6</div>
    </div>

    <!-- Explanation panel -->
    <div class="explanation-panel" id="explanationPanel">
        <div class="resize-handle" id="explanationResizer"></div>
        <div class="explanation-header">
            <span id="explanationTitle">Giải thích</span>
            <span class="close-btn" id="closeExplanation">✕ Đóng</span>
        </div>
        <div class="explanation-content" id="explanationText"></div>
    </div>
</div>

<!-- ===== THÊM CONTEXT MENU CHO HIGHLIGHT THỦ CÔNG ===== -->
<div class="context-menu" id="contextMenu">
    <div onclick="applyHighlight('yellow')">Highlight vàng</div>
    <div onclick="applyHighlight('green')">Highlight xanh lá</div>
    <div onclick="applyHighlight('pink')">Highlight hồng</div>
    <div onclick="removeHighlight()">Xóa highlight</div>
</div>

<script>
    (function() {
        // ---------- ANSWER KEY (chữ cái) ----------
        const answerKey = {
            q20: 'A',
            q21: 'C',
            q22: 'B',
            q23: 'A',
            q24: 'C',
            q25: 'B'
        };

        // ---------- Đáp án hiển thị (dạng chữ cái) ----------
        const displayAnswers = {
            q20: 'A',
            q21: 'C',
            q22: 'B',
            q23: 'A',
            q24: 'C',
            q25: 'B'
        };

        // ---------- GIẢI THÍCH CHI TIẾT (đã chỉnh sửa theo format mới) ----------
        const detailedExplanations = {
            q20: `<strong>Đáp án: A</strong><br>
                  Mickey giải thích: <em>"a friend said I could help in his hairdresser's shop, so I did, and <u>I ended up staying!</u>"</em><br>
                  Anh không có ý định ban đầu, nhưng sau khi được bạn đề nghị, anh ở lại và trở thành thợ cắt tóc.
                  <br><br>
                  <strong>✗ Phương án B sai:</strong> Anh không dự định đi theo nghề của gia đình vì lúc đầu anh mong đợi làm gì đó hoàn toàn khác ("I really expected to do something completely different").
                  <br>
                  <strong>✗ Phương án C sai:</strong> Mặc dù bố mẹ anh làm việc với người nổi tiếng ("worked with lots of well-known TV stars"), anh không đề cập đây là lý do muốn trở thành thợ cắt tóc.`,
            q21: `<strong>Đáp án: C</strong><br>
                  Mickey nói về việc phân công công việc: <em>"it's best if we <u>mix things up – do a few women's cuts, some men's, some colour</u>."</em><br>
                  Điều này có nghĩa anh ấy cố gắng làm nhiều loại việc khác nhau trong ngày.
                  <br><br>
                  <strong>✗ Phương án A sai:</strong> Anh nói dù việc nghỉ ngơi khó khăn nhưng luôn dành thời gian cho nó ("Stopping for a coffee or a rest can be difficult but I always make time for that").
                  <br>
                  <strong>✗ Phương án B sai:</strong> Anh thường ở lại muộn nhưng anh thấy ổn với điều đó ("that's fine with me").`,
            q22: `<strong>Đáp án: B</strong><br>
                  Khi được hỏi phần thích nhất của công việc, Mickey trả lời: <em>"I really enjoy <u>exchanging news with the people who come back regularly</u> for haircuts."</em><br>
                  Anh thích nghe tin tức về cuộc sống của khách hàng quen.
                  <br><br>
                  <strong>✗ Phương án A sai:</strong> Anh không thích sáng tạo ra kiểu mới ("Sometimes they want a new style and ask me to be creative. I'm not keen on doing that...").
                  <br>
                  <strong>✗ Phương án C sai:</strong> Giống như A, anh không thích dùng trí tưởng tượng mà chỉ đưa ảnh để khách chọn ("I prefer to show people pictures... and get them to choose one").`,
            q23: `<strong>Đáp án: A</strong><br>
                  Mickey không thích: <em>"health and safety courses which <u>I find extremely dull</u>."</em><br>
                  Anh thấy các khóa học về sức khỏe và an toàn rất buồn tẻ.
                  <br><br>
                  <strong>✗ Phương án B sai:</strong> Anh không ngại chia sẻ ý tưởng với đồng nghiệp ("I don't mind sharing my knowledge though").
                  <br>
                  <strong>✗ Phương án C sai:</strong> Anh không để bụng nếu khách hàng thô lỗ ("I never let anyone bother me").`,
            q24: `<strong>Đáp án: C</strong><br>
                  Sau khi cắt tóc, Mickey nói: <em>"I usually feel there's something <u>I could do better, so I'm always trying to improve</u>."</em><br>
                  Điều này cho thấy anh luôn muốn học hỏi và cải thiện.
                  <br><br>
                  <strong>✗ Phương án A sai:</strong> Anh không lo lắng họ tức giận mà anh chỉ muốn khiến họ hài lòng.
                  <br>
                  <strong>✗ Phương án B sai:</strong> Mặc dù việc cắt đúng là quan trọng, nhưng anh luôn cảm thấy có thể làm tốt hơn nữa.`,
            q25: `<strong>Đáp án: B</strong><br>
                  Lời khuyên của Mickey: <em>"a lot of people make the mistake of thinking <u>they've learned all there is to learn – that's rarely true</u>."</em><br>
                  Anh khuyên không nên nghĩ rằng mình đã biết hết mọi thứ.
                  <br><br>
                  <strong>✗ Phương án A sai:</strong> Không có lời khuyên về việc từ chối công việc đầu tiên.
                  <br>
                  <strong>✗ Phương án C sai:</strong> Anh cho rằng công việc có thể kiếm tiền tốt nhờ tiền tips ("money can actually be quite good with tips added").`
        };

        // ---------- TRANSCRIPT với các span highlight ----------
        const transcriptHTML = `
            <p><strong>Woman:</strong> Welcome to the careers interview. Today we’re talking to Mickey Diaz who’ll tell us what it’s like to work as a hairdresser. Mickey, why did you become a hairdresser?</p>
            <p><strong>Man:</strong> Both my parents were hairdressers and worked with lots of well-known TV stars but I really expected to do something completely different. It was after college when I was looking for work that <span class="highlightable" data-q="20">a friend said I could help in his hairdresser’s shop, so I did, and I ended up staying!</span></p>
            <p><strong>Woman:</strong> So, what’s a normal working day like?</p>
            <p><strong>Man:</strong> Busy! I get in early. We decide who’s going to do which jobs each day – <span class="highlightable" data-q="21">it’s best if we mix things up – do a few women’s cuts, some men’s, some colour</span>. Stopping for a coffee or a rest can be difficult but I always make time for that. I often stay late to prepare things for the next day too, but that’s fine with me.</p>
            <p><strong>Woman:</strong> What’s the best part of the job?</p>
            <p><strong>Man:</strong> <span class="highlightable" data-q="22">I really enjoy exchanging news with the people who come back regularly for haircuts</span>. Sometimes they want a new style and ask me to be creative. I’m not keen on doing that – I prefer to show people pictures of the latest haircuts and get them to choose one instead.</p>
            <p><strong>Woman:</strong> So, is there anything you don’t like about your job?</p>
            <p><strong>Man:</strong> Some hairdressers get upset if customers are rude, but I never let anyone bother me. We have to take <span class="highlightable" data-q="23">health and safety courses which I find extremely dull</span> but I know they’re necessary. I’m also responsible for training new colleagues at the shop. I prefer cutting hair – I don’t mind sharing my knowledge though.</p>
            <p><strong>Woman:</strong> I see. How does it feel when you’ve finished a haircut?</p>
            <p><strong>Man:</strong> It’s very important to me to get a haircut right but when the customer walks out of the door, the hair’s already growing back. I know I won’t see that exact same cut again, which is a shame. <span class="highlightable" data-q="24">I usually feel there’s something I could do better, so I’m always trying to improve, to keep customers satisfied.</span></p>
            <p><strong>Woman:</strong> Finally, any advice for people who’d like to become hairdressers?</p>
            <p><strong>Man:</strong> You can study hairdressing at college, but you don’t learn as much as you would in a full-time job. People often think hairdressing’s badly paid but the money can actually be quite good with tips added. Never forget that you’re only as good as your last haircut – <span class="highlightable" data-q="25">a lot of people make the mistake of thinking they’ve learned all there is to learn – that’s rarely true.</span></p>
            <p><strong>Woman:</strong> Well, Mickey…(fade)</p>
            <p><em>Now listen again.</em></p>
            <p style="color:#666;">That is the end of Part Four.</p>
        `;

        // ---------- Dữ liệu câu hỏi ----------
        const questionsData = [
            { num: 20, text: "Why did Mickey decide to become a hairdresser?", options: ["He was offered a job by a friend.", "He wanted to do what his family did.", "He hoped to meet some famous people."] },
            { num: 21, text: "On a typical day at work, Mickey says that he", options: ["doesn’t take enough time for breaks.", "works longer hours than he would like to.", "tries to do a range of jobs."] },
            { num: 22, text: "The part of the job which Mickey likes most is", options: ["creating new haircuts.", "hearing about customers’ lives.", "using his imagination."] },
            { num: 23, text: "What part of his job does Mickey dislike?", options: ["having to do boring courses.", "sharing ideas with colleagues.", "dealing with difficult customers."] },
            { num: 24, text: "How does Mickey feel after cutting a customer’s hair?", options: ["worried that the customer may be annoyed.", "proud of what he’s achieved.", "keen to continue learning."] },
            { num: 25, text: "Mickey recommends that people who want to work as hairdressers", options: ["shouldn’t take the first job they’re offered.", "shouldn’t believe they know everything.", "shouldn’t expect to earn much at first."] }
        ];

        // ---------- STATE ----------
        let examSubmitted = false;
        let explanationMode = false;
        const audio = document.getElementById('listeningAudio');
        const speedSelect = document.getElementById('speedSelect');

        speedSelect.addEventListener('change', function() {
            audio.playbackRate = parseFloat(this.value);
        });

        // Helper: lấy câu trả lời của người dùng (chữ cái A, B, C hoặc null)
        function getUserAnswer(q) {
            const radios = document.getElementsByName(`q${q}`);
            for (let radio of radios) {
                if (radio.checked) return radio.value;
            }
            return null;
        }

        // Kiểm tra một câu có đúng không
        function isAnswerCorrect(q, userAnswer) {
            return userAnswer === answerKey[`q${q}`];
        }

        // Cập nhật số câu đã làm và màu nav
        function updateAnswerCount() {
            let answered = 0;
            for (let i = 20; i <= 25; i++) if (getUserAnswer(i)) answered++;
            document.getElementById('answeredCount').textContent = `${answered}/6 answered`;
            document.getElementById('progressDisplay').textContent = `Đã làm: ${answered}/6`;
            for (let i = 20; i <= 25; i++) {
                const btn = document.querySelector(`.nav-btn[data-question="${i}"]`);
                if (btn) {
                    btn.classList.remove('answered', 'unanswered');
                    btn.classList.add(getUserAnswer(i) ? 'answered' : 'unanswered');
                }
            }
        }

        // Tạo nút điều hướng từ 20 đến 25
        function createNavButtons() {
            const nav = document.getElementById('navButtons');
            nav.innerHTML = '';
            for (let i = 20; i <= 25; i++) {
                const btn = document.createElement('button');
                btn.className = 'nav-btn unanswered';
                btn.textContent = i;
                btn.dataset.question = i;
                btn.addEventListener('click', function() {
                    const q = this.dataset.question;
                    document.getElementById(`question-${q}`)?.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                });
                nav.appendChild(btn);
            }
        }

        // Tạo HTML cho các câu hỏi
        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            questionsData.forEach(q => {
                const div = document.createElement('div');
                div.className = 'question-item';
                div.id = `question-${q.num}`;
                div.innerHTML = `
                    <div class="question-text">${q.num}. ${q.text}</div>
                    <div class="options">
                        ${q.options.map((opt, index) => `
                            <div class="option">
                                <input type="radio" name="q${q.num}" value="${String.fromCharCode(65 + index)}" id="q${q.num}${String.fromCharCode(65 + index)}">
                                <label for="q${q.num}${String.fromCharCode(65 + index)}">${String.fromCharCode(65 + index)}. ${opt}</label>
                            </div>
                        `).join('')}
                    </div>
                    <span class="eye-icon" data-question="${q.num}">👁️</span>
                `;
                container.appendChild(div);
            });
        }

        // Đánh dấu đúng/sai và hiển thị badge
        function markAnswers() {
            for (let i = 20; i <= 25; i++) {
                const questionDiv = document.getElementById(`question-${i}`);
                if (!questionDiv) continue;
                const user = getUserAnswer(i);
                const correct = isAnswerCorrect(i, user);
                questionDiv.classList.remove('correct', 'incorrect');
                const oldBadge = questionDiv.querySelector('.correct-answer-badge');
                if (oldBadge) oldBadge.remove();
                if (correct) {
                    questionDiv.classList.add('correct');
                } else {
                    questionDiv.classList.add('incorrect');
                    // Hiển thị badge đáp án đúng
                    const badge = document.createElement('span');
                    badge.className = 'correct-answer-badge';
                    badge.textContent = `Đáp án đúng: ${displayAnswers[`q${i}`]}`;
                    questionDiv.appendChild(badge);
                }
            }
        }

        // Hiển thị giải thích cho câu hỏi
        function showExplanation(questionNum) {
            if (!explanationMode && !examSubmitted) return;

            document.querySelectorAll('.transcript-highlight').forEach(el => el.classList.remove('transcript-highlight'));
            document.querySelectorAll('.keyword-highlight').forEach(el => el.classList.remove('keyword-highlight'));

            const highlightSpans = document.querySelectorAll(`.highlightable[data-q="${questionNum}"]`);
            highlightSpans.forEach(span => {
                const parentP = span.closest('p');
                if (parentP) parentP.classList.add('transcript-highlight');
                span.classList.add('keyword-highlight');
                span.scrollIntoView({ behavior: 'smooth', block: 'center' });
                span.classList.add('scroll-highlight');
                setTimeout(() => span.classList.remove('scroll-highlight'), 1000);
            });

            document.getElementById('explanationPanel').classList.add('show');
            document.getElementById('explanationTitle').textContent = `Giải thích câu ${questionNum}`;
            let html = detailedExplanations[`q${questionNum}`] || `<strong>Đáp án: ${displayAnswers[`q${questionNum}`]}</strong><br>`;
            if (examSubmitted) {
                const user = getUserAnswer(questionNum) || '(chưa chọn)';
                const isCorrect = isAnswerCorrect(questionNum, user);
                html += `<div style="margin-top:10px;padding:10px; background:${isCorrect ? '#e8f5e8' : '#ffebee'}; border-radius:5px;">`;
                html += `<strong>Câu trả lời của bạn:</strong> ${user}<br>`;
                if (!isCorrect) html += `<strong>Đáp án đúng:</strong> ${displayAnswers[`q${questionNum}`]}`;
                else html += `<strong>✅ Đúng!</strong>`;
                html += `</div>`;
            }
            document.getElementById('explanationText').innerHTML = html;
        }

        // Reset tất cả
        function resetAll() {
            examSubmitted = false;
            explanationMode = false;
            for (let i = 20; i <= 25; i++) {
                const radios = document.getElementsByName(`q${i}`);
                radios.forEach(r => {
                    r.checked = false;
                    r.disabled = false;
                });
                const questionDiv = document.getElementById(`question-${i}`);
                if (questionDiv) {
                    questionDiv.classList.remove('correct', 'incorrect');
                    const badge = questionDiv.querySelector('.correct-answer-badge');
                    if (badge) badge.remove();
                }
            }
            const mainArea = document.getElementById('mainArea');
            mainArea.classList.remove('show-transcript');
            document.getElementById('transcriptContent').innerHTML = '';
            document.querySelectorAll('.eye-icon').forEach(icon => icon.style.display = 'none');
            document.querySelectorAll('.transcript-highlight').forEach(el => el.classList.remove('transcript-highlight'));
            document.querySelectorAll('.keyword-highlight').forEach(el => el.classList.remove('keyword-highlight'));
            document.getElementById('submitBtn').disabled = false;
            document.getElementById('submitBtn').textContent = 'Nộp bài';
            document.getElementById('explainBtn').disabled = true;
            document.getElementById('explainBtn').textContent = 'Xem giải thích';
            document.getElementById('explanationPanel').classList.remove('show');
            updateAnswerCount();
        }

        // ========== CHỨC NĂNG LƯU VÀO DASHBOARD (LOCALSTORAGE) ==========
        function getPetInfo() {
            const candidateText = document.querySelector('.candidate')?.textContent || '';
            let book = 1, test = 1, part = 4;
            const bookMatch = candidateText.match(/Preliminary\s+(\d+)/i);
            if (bookMatch) book = parseInt(bookMatch[1]);
            const testMatch = candidateText.match(/Test\s+(\d+)/i);
            if (testMatch) test = parseInt(testMatch[1]);
            const partMatch = candidateText.match(/Part\s+(\d+)/i);
            if (partMatch) part = parseInt(partMatch[1]);
            return { book, test, part };
        }

        function saveToDashboard() {
            if (!examSubmitted) return;

            const { book, test, part } = getPetInfo();
            const skill = 'listening'; // Part 4 always listening (PET Listening)
            
            const details = [];
            let correctCount = 0;
            
            // Xác định số câu hỏi từ answerKey (20-25)
            const keys = Object.keys(answerKey);
            const numbers = keys.map(k => parseInt(k.slice(1))).filter(n => !isNaN(n));
            const minQ = Math.min(...numbers);
            const maxQ = Math.max(...numbers);
            
            for (let i = minQ; i <= maxQ; i++) {
                const user = getUserAnswer(i);
                const correct = answerKey[`q${i}`];
                const isCorrect = user === correct;
                if (isCorrect) correctCount++;
                details.push({
                    question: i,
                    user: user || '(trống)',
                    correct: displayAnswers[`q${i}`] || correct,
                    isCorrect: isCorrect
                });
            }
            
            const partData = {
                partId: part,
                name: `Part ${part}`,
                totalQuestions: details.length,
                correctCount: correctCount,
                details: details
            };
            
            const key = `pet_${skill}_book${book}_test${test}_part${part}`;
            localStorage.setItem(key, JSON.stringify(partData));
            console.log(`✅ Đã lưu kết quả ${skill} với key: ${key}`);
        }

        // ---------- EVENT LISTENERS ----------
        // Gắn sự kiện change cho radio để cập nhật số lượng đã làm
        document.addEventListener('change', function(e) {
            if (e.target && e.target.matches('input[type="radio"]')) {
                updateAnswerCount();
            }
        });

        // Xử lý nộp bài và lưu kết quả
        const submitBtn = document.getElementById('submitBtn');
        submitBtn.addEventListener('click', function() {
            if (examSubmitted) return;
            let unanswered = [];
            for (let i = 20; i <= 25; i++) if (!getUserAnswer(i)) unanswered.push(i);
            if (unanswered.length > 0 && !confirm(`Bạn còn ${unanswered.length} câu chưa chọn. Nộp bài?`)) return;

            examSubmitted = true;
            const mainArea = document.getElementById('mainArea');
            mainArea.classList.add('show-transcript');
            document.getElementById('transcriptContent').innerHTML = transcriptHTML;
            markAnswers();
            submitBtn.disabled = true;
            submitBtn.textContent = 'Đã nộp bài';
            document.getElementById('explainBtn').disabled = false;

            let correctCount = 0;
            for (let i = 20; i <= 25; i++) {
                if (isAnswerCorrect(i, getUserAnswer(i))) correctCount++;
            }
            document.getElementById('explanationPanel').classList.add('show');
            document.getElementById('explanationTitle').textContent = 'KẾT QUẢ';
            document.getElementById('explanationText').innerHTML = `
                <h4>Bạn đã nộp bài</h4>
                <p><strong>Đúng:</strong> ${correctCount}/6</p>
                <p>Nhấn vào nút <strong>Xem giải thích</strong> để xem hiệu ứng và đáp án đúng.</p>
            `;
            
            // Lưu kết quả vào localStorage
            saveToDashboard();
            document.querySelectorAll('input[type="radio"]').forEach(el => el.disabled = true);
        });

        document.getElementById('explainBtn').addEventListener('click', function() {
            if (!examSubmitted) return;
            explanationMode = true;
            document.querySelectorAll('.eye-icon, .correct-answer-badge').forEach(el => el.style.display = 'inline-block');
            this.disabled = true;
            this.textContent = 'Đang xem giải thích';
            document.getElementById('explanationPanel').classList.remove('show');
        });

        document.getElementById('resetBtn').addEventListener('click', function() {
            if (confirm('Reset tất cả câu trả lời?')) resetAll();
        });

        document.getElementById('closeExplanation').addEventListener('click', function() {
            document.getElementById('explanationPanel').classList.remove('show');
            document.querySelectorAll('.transcript-highlight').forEach(el => el.classList.remove('transcript-highlight'));
            document.querySelectorAll('.keyword-highlight').forEach(el => el.classList.remove('keyword-highlight'));
        });

        document.addEventListener('click', function(e) {
            if (e.target.classList.contains('eye-icon')) {
                const q = e.target.dataset.question;
                showExplanation(q);
            }
        });

        // Font size
        function setFontSize(size) {
            document.querySelectorAll('.font-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`font${size.charAt(0).toUpperCase()+size.slice(1)}`).classList.add('active');
            document.querySelectorAll('.transcript-content, .questions-list').forEach(el => {
                el.className = `transcript-content font-${size}`;
                if (el.classList.contains('questions-list')) {
                    el.classList.add('centered');
                }
            });
        }
        document.getElementById('fontSmall').addEventListener('click', () => setFontSize('small'));
        document.getElementById('fontMedium').addEventListener('click', () => setFontSize('medium'));
        document.getElementById('fontLarge').addEventListener('click', () => setFontSize('large'));

        // Resizer
        const transcriptPanel = document.getElementById('transcriptPanel');
        const questionsPanel = document.getElementById('questionsPanel');
        const resizer = document.getElementById('resizer');
        let isResizing = false;
        resizer.addEventListener('mousedown', () => { isResizing = true; document.body.style.cursor = 'col-resize'; });
        document.addEventListener('mousemove', (e) => {
            if (!isResizing) return;
            const mainArea = document.getElementById('mainArea');
            const rect = mainArea.getBoundingClientRect();
            let leftWidth = e.clientX - rect.left - 4;
            if (leftWidth < 250) leftWidth = 250;
            if (leftWidth > rect.width - 250) leftWidth = rect.width - 250;
            transcriptPanel.style.width = leftWidth + 'px';
            questionsPanel.style.width = (rect.width - leftWidth - 8) + 'px';
        });
        document.addEventListener('mouseup', () => { isResizing = false; document.body.style.cursor = 'default'; });

        // Khởi tạo
        createNavButtons();
        renderQuestions();
        updateAnswerCount();
        document.querySelectorAll('.eye-icon').forEach(icon => icon.style.display = 'none');
        setFontSize('large');

            // Resizable explanation panel logic
            const expPanel = document.getElementById('explanationPanel');
            const expResizer = document.getElementById('explanationResizer');
            let isResizingExp = false;
            let startYExp, startHeightExp;

            if (expResizer && expPanel) {
                expResizer.addEventListener('mousedown', (e) => {
                    isResizingExp = true;
                    startYExp = e.clientY;
                    startHeightExp = expPanel.offsetHeight;
                    document.body.style.cursor = 'ns-resize';
                    document.body.style.userSelect = 'none';
                });

                document.addEventListener('mousemove', (e) => {
                    if (!isResizingExp) return;
                    const dy = startYExp - e.clientY;
                    const newHeight = startHeightExp + dy;
                    if (newHeight > 100 && newHeight < window.innerHeight * 0.8) {
                        expPanel.style.maxHeight = newHeight + 'px';
                        expPanel.style.height = newHeight + 'px';
                    }
                });

                document.addEventListener('mouseup', () => {
                    isResizingExp = false;
                    document.body.style.cursor = 'default';
                    document.body.style.userSelect = 'auto';
                });
            }
            // ==================== THEME TOGGLE ====================
        const themeToggle = document.getElementById('themeToggle');
        const html = document.documentElement;
        const savedTheme = localStorage.getItem('pet-theme');
        if (savedTheme === 'dark') {
            html.setAttribute('data-theme', 'dark');
        }
        themeToggle.addEventListener('click', () => {
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('pet-theme', newTheme);
        });

    })();

    // ========== THÊM CHỨC NĂNG HIGHLIGHT THỦ CÔNG ==========
    let selectedRange = null;
    const contextMenu = document.getElementById('contextMenu');

    // Bắt sự kiện chuột phải trên transcript và phần câu hỏi
    document.getElementById('transcriptContent')?.addEventListener('contextmenu', handleRightClick);
    document.getElementById('questionsContent')?.addEventListener('contextmenu', handleRightClick);

    function handleRightClick(e) {
        e.preventDefault();
        const selection = window.getSelection();
        if (selection.toString().trim()) {
            selectedRange = selection.getRangeAt(0);
            contextMenu.style.left = e.pageX + 'px';
            contextMenu.style.top = e.pageY + 'px';
            contextMenu.style.display = 'block';
        }
    }

    // Ẩn menu khi click ra ngoài
    document.addEventListener('click', () => {
        contextMenu.style.display = 'none';
        selectedRange = null;
    });

    // Hàm áp dụng highlight (được gọi từ onclick trong menu)
    window.applyHighlight = function(color) {
        if (!selectedRange) return;
        try {
            const span = document.createElement('span');
            span.className = `highlight-${color}`;
            span.appendChild(selectedRange.extractContents());
            selectedRange.insertNode(span);
        } catch (e) {
            console.warn('Không thể highlight đoạn này');
        }
        contextMenu.style.display = 'none';
        selectedRange = null;
    };

    // Hàm xoá highlight (chỉ xoá trong vùng được chọn)
    window.removeHighlight = function() {
        if (!selectedRange) return;
        try {
            // Tìm các thẻ highlight nằm trong vùng chọn và thay bằng nội dung gốc
            const iterator = document.createNodeIterator(
                selectedRange.commonAncestorContainer,
                NodeFilter.SHOW_ELEMENT,
                {
                    acceptNode: function(node) {
                        if (node.classList && (node.classList.contains('highlight-yellow') || node.classList.contains('highlight-green') || node.classList.contains('highlight-pink'))) {
                            if (selectedRange.intersectsNode(node)) {
                                return NodeFilter.FILTER_ACCEPT;
                            }
                        }
                        return NodeFilter.FILTER_REJECT;
                    }
                }
            );
            let node;
            while (node = iterator.nextNode()) {
                node.replaceWith(...node.childNodes); // xoá thẻ span, giữ lại text
            }
        } catch (e) {
            console.warn('Không thể xoá highlight');
        }
        contextMenu.style.display = 'none';
        selectedRange = null;
    };
</script>
