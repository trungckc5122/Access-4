<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PET 1 - Test 1 - Part 4</title>
    <link rel="stylesheet" href="listening-pet-common.css" id="styleLink">
</head>
<body>
<div class="test-wrapper" id="testWrapper">
    <!-- Header -->
    <div class="ielts-header">
        <div class="brand">
            <div class="ielts-logo">PET</div>
            <div class="candidate">B1 Preliminary 1 · Test 1 · Part 4</div>
            <div class="audio-controls">
                <audio id="listeningAudio" controls>
                    <source src="audio/B1 Preliminary 1 - Test 1 Part 4.mp3" type="audio/mpeg">
                    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg">
                </audio>
                <select class="speed-select" id="speedSelect">
                    <option value="0.7">0.7x</option>
                    <option value="0.9">0.9x</option>
                    <option value="1.0" selected>1x</option>
                    <option value="1.1">1.1x</option>
                    <option value="1.25">1.25x</option>
                </select>
                <span class="volume-icon">🔊</span>
            </div>
        </div>
        <div class="font-controls">
            <button class="font-btn" id="fontSmall">A-</button>
            <button class="font-btn" id="fontMedium">A</button>
            <button class="font-btn active" id="fontLarge">A+</button>
        </div>
        <button class="theme-toggle-btn" id="themeToggle" title="Chuyển đổi Dark/Light mode">
            <span class="icon-moon">🌙</span>
            <span class="icon-sun">☀️</span>
        </button>
    </div>

    <!-- Question navigator (20-25) -->
    <div class="question-nav">
        <span style="font-weight:600; color:#1e3a5f;">Câu 20-25:</span>
        <div class="nav-buttons" id="navButtons"></div>
    </div>

    <!-- Main area -->
    <div class="main-area" id="mainArea">
        <!-- Transcript panel (ẩn ban đầu) -->
        <div class="transcript-panel" id="transcriptPanel">
            <div class="panel-header">
                <span>TRANSCRIPT</span>
            </div>
            <div class="transcript-content font-large" id="transcriptContent"></div>
        </div>
        <div class="resizer" id="resizer"></div>

        <!-- Questions panel -->
        <div class="questions-panel" id="questionsPanel">
            <div class="panel-header">
                <span>QUESTIONS 20-25</span>
                <span class="answer-badge" id="answeredCount">0/6 answered</span>
            </div>
            <div class="questions-list font-large centered" id="questionsContent">
                <div>
                    <h3>PART 4 Questions 20-25</h3>
                    <p><em>Choose the correct answer (A, B or C).</em></p>
                    <div class="notes-box" id="questionsContainer"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bottom bar -->
    <div class="bottom-bar">
        <button class="btn btn-primary" id="submitBtn">Nộp bài</button>
        <button class="btn btn-success" id="explainBtn" disabled>Xem giải thích</button>
        <button class="btn btn-danger" id="resetBtn">Reset tất cả</button>
        <div class="progress" id="progressDisplay">Đã làm: 0/6</div>
    </div>

    <!-- Explanation panel -->
    <div class="explanation-panel" id="explanationPanel">
        <div class="resize-handle" id="explanationResizer"></div>
        <div class="explanation-header">
            <span id="explanationTitle">Giải thích</span>
            <span class="close-btn" id="closeExplanation">✕ Đóng</span>
        </div>
        <div class="explanation-content" id="explanationText"></div>
    </div>
</div>

<!-- Context menu for manual highlighting -->
<div class="context-menu" id="contextMenu">
    <div onclick="applyHighlight('yellow')">Highlight vàng</div>
    <div onclick="applyHighlight('green')">Highlight xanh lá</div>
    <div onclick="applyHighlight('pink')">Highlight hồng</div>
    <div onclick="removeHighlight()">Xóa highlight</div>
</div>

<!-- Core Listening Engine -->
<script src="core-listening.js"></script>

<script>
    // Test Data for PET 1 Test 1 Part 4
    const pet1Test1Part4Data = {
        title: "B1 Preliminary 1 · Test 1 · Part 4",
        type: "multiple-choice",
        part: 4,
        book: 1,
        test: 1,

        // Answer Key
        answerKey: {
            q20: 'A',
            q21: 'C',
            q22: 'B',
            q23: 'A',
            q24: 'C',
            q25: 'B'
        },

        // Display Answers
        displayAnswers: {
            q20: 'A',
            q21: 'C',
            q22: 'B',
            q23: 'A',
            q24: 'C',
            q25: 'B'
        },

        // Detailed Explanations
        detailedExplanations: {
            q20: `<strong>Đáp án: A</strong><br>
                  Mickey giải thích: <em>"a friend said I could help in his hairdresser's shop, so I did, and <u>I ended up staying!</u>"</em><br>
                  Anh không có ý định ban đầu, nhưng sau khi được bạn đề nghị, anh ở lại và trở thành thợ cắt tóc.
                  <br><br>
                  <strong>✗ Phương án B sai:</strong> Anh không dự định đi theo nghề của gia đình vì lúc đầu anh mong đợi làm gì đó hoàn toàn khác ("I really expected to do something completely different").
                  <br>
                  <strong>✗ Phương án C sai:</strong> Mặc dù bố mẹ anh làm việc với người nổi tiếng ("worked with lots of well-known TV stars"), anh không đề cập đây là lý do muốn trở thành thợ cắt tóc.`,
            q21: `<strong>Đáp án: C</strong><br>
                  Mickey nói về việc phân công công việc: <em>"it's best if we <u>mix things up – do a few women's cuts, some men's, some colour</u>."</em><br>
                  Điều này có nghĩa anh ấy cố gắng làm nhiều loại việc khác nhau trong ngày.
                  <br><br>
                  <strong>✗ Phương án A sai:</strong> Anh nói dù việc nghỉ ngơi khó khăn nhưng luôn dành thời gian cho nó ("Stopping for a coffee or a rest can be difficult but I always make time for that").
                  <br>
                  <strong>✗ Phương án B sai:</strong> Anh thường ở lại muộn nhưng anh thấy ổn với điều đó ("that's fine with me").`,
            q22: `<strong>Đáp án: B</strong><br>
                  Khi được hỏi phần thích nhất của công việc, Mickey trả lời: <em>"I really enjoy <u>exchanging news with the people who come back regularly</u> for haircuts."</em><br>
                  Anh thích nghe tin tức về cuộc sống của khách hàng quen.
                  <br><br>
                  <strong>✗ Phương án A sai:</strong> Anh không thích sáng tạo ra kiểu mới ("Sometimes they want a new style and ask me to be creative. I'm not keen on doing that...").
                  <br>
                  <strong>✗ Phương án C sai:</strong> Giống như A, anh không thích dùng trí tưởng tượng mà chỉ đưa ảnh để khách chọn ("I prefer to show people pictures... and get them to choose one").`,
            q23: `<strong>Đáp án: A</strong><br>
                  Mickey không thích: <em>"health and safety courses which <u>I find extremely dull</u>."</em><br>
                  Anh thấy các khóa học về sức khỏe và an toàn rất buồn tẻ.
                  <br><br>
                  <strong>✗ Phương án B sai:</strong> Anh không ngại chia sẻ ý tưởng với đồng nghiệp ("I don't mind sharing my knowledge though").
                  <br>
                  <strong>✗ Phương án C sai:</strong> Anh không để bụng nếu khách hàng thô lỗ ("I never let anyone bother me").`,
            q24: `<strong>Đáp án: C</strong><br>
                  Sau khi cắt tóc, Mickey nói: <em>"I usually feel there's something <u>I could do better, so I'm always trying to improve</u>."</em><br>
                  Điều này cho thấy anh luôn muốn học hỏi và cải thiện.
                  <br><br>
                  <strong>✗ Phương án A sai:</strong> Anh không lo lắng họ tức giận mà anh chỉ muốn khiến họ hài lòng.
                  <br>
                  <strong>✗ Phương án B sai:</strong> Mặc dù việc cắt đúng là quan trọng, nhưng anh luôn cảm thấy có thể làm tốt hơn nữa.`,
            q25: `<strong>Đáp án: B</strong><br>
                  Lời khuyên của Mickey: <em>"a lot of people make the mistake of thinking <u>they've learned all there is to learn – that's rarely true</u>."</em><br>
                  Anh khuyên không nên nghĩ rằng mình đã biết hết mọi thứ.
                  <br><br>
                  <strong>✗ Phương án A sai:</strong> Không có lời khuyên về việc từ chối công việc đầu tiên.
                  <br>
                  <strong>✗ Phương án C sai:</strong> Anh cho rằng công việc có thể kiếm tiền tốt nhờ tiền tips ("money can actually be quite good with tips added").`
        },

        // Transcript with highlightable spans
        transcript: `
            <p><strong>Woman:</strong> Welcome to the careers interview. Today we're talking to Mickey Diaz who'll tell us what it's like to work as a hairdresser. Mickey, why did you become a hairdresser?</p>
            <p><strong>Man:</strong> Both my parents were hairdressers and worked with lots of well-known TV stars but I really expected to do something completely different. It was after college when I was looking for work that <span class="highlightable" data-q="20">a friend said I could help in his hairdresser's shop, so I did, and I ended up staying!</span></p>
            <p><strong>Woman:</strong> So, what's a normal working day like?</p>
            <p><strong>Man:</strong> Busy! I get in early. We decide who's going to do which jobs each day – <span class="highlightable" data-q="21">it's best if we mix things up – do a few women's cuts, some men's, some colour</span>. Stopping for a coffee or a rest can be difficult but I always make time for that. I often stay late to prepare things for the next day too, but that's fine with me.</p>
            <p><strong>Woman:</strong> What's the best part of the job?</p>
            <p><strong>Man:</strong> <span class="highlightable" data-q="22">I really enjoy exchanging news with the people who come back regularly for haircuts</span>. Sometimes they want a new style and ask me to be creative. I'm not keen on doing that – I prefer to show people pictures of the latest haircuts and get them to choose one instead.</p>
            <p><strong>Woman:</strong> So, is there anything you don't like about your job?</p>
            <p><strong>Man:</strong> Some hairdressers get upset if customers are rude, but I never let anyone bother me. We have to take <span class="highlightable" data-q="23">health and safety courses which I find extremely dull</span> but I know they're necessary. I'm also responsible for training new colleagues at the shop. I prefer cutting hair – I don't mind sharing my knowledge though.</p>
            <p><strong>Woman:</strong> I see. How does it feel when you've finished a haircut?</p>
            <p><strong>Man:</strong> It's very important to me to get a haircut right but when the customer walks out of the door, the hair's already growing back. I know I won't see that exact same cut again, which is a shame. <span class="highlightable" data-q="24">I usually feel there's something I could do better, so I'm always trying to improve, to keep customers satisfied.</span></p>
            <p><strong>Woman:</strong> Finally, any advice for people who'd like to become hairdressers?</p>
            <p><strong>Man:</strong> You can study hairdressing at college, but you don't learn as much as you would in a full-time job. People often think hairdressing's badly paid but the money can actually be quite good with tips added. Never forget that you're only as good as your last haircut – <span class="highlightable" data-q="25">a lot of people make the mistake of thinking they've learned all there is to learn – that's rarely true.</span></p>
            <p><strong>Woman:</strong> Well, Mickey…(fade)</p>
            <p><em>Now listen again.</em></p>
            <p style="color:#666;">That is the end of Part Four.</p>
        `,

        // Questions Data
        questions: [
            { num: 20, text: "Why did Mickey decide to become a hairdresser?", options: ["He was offered a job by a friend.", "He wanted to do what his family did.", "He hoped to meet some famous people."] },
            { num: 21, text: "On a typical day at work, Mickey says that he", options: ["doesn't take enough time for breaks.", "works longer hours than he would like to.", "tries to do a range of jobs."] },
            { num: 22, text: "The part of the job which Mickey likes most is", options: ["creating new haircuts.", "hearing about customers' lives.", "using his imagination."] },
            { num: 23, text: "What part of his job does Mickey dislike?", options: ["having to do boring courses.", "sharing ideas with colleagues.", "dealing with difficult customers."] },
            { num: 24, text: "How does Mickey feel after cutting a customer's hair?", options: ["worried that the customer may be annoyed.", "proud of what he's achieved.", "keen to continue learning."] },
            { num: 25, text: "Mickey recommends that people who want to work as hairdressers", options: ["shouldn't take the first job they're offered.", "shouldn't believe they know everything.", "shouldn't expect to earn much at first."] }
        ]
    };

    // Initialize the listening test when DOM is loaded
    document.addEventListener('DOMContentLoaded', function() {
        window.listeningCore = new ListeningCore();
        window.listeningCore.initializeTest(pet1Test1Part4Data);
        console.log('PET 1 Test 1 Part 4 loaded with core listening engine');
    });
</script>
</body>
</html>
