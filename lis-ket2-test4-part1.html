        const ketTest4Part1Data = {

                      <strong>✓ A (T-shirt) là đúng – Paul mua áo phông ("something to wear"), đó là T-shirt với hình người đạp xe.</strong>`,

            <strong>Woman:</strong> Hi. So sorry, I missed the bus and drove into town. <span class="highlightable" data-q="3">I've just found a space in the car park and am getting my ticket.</span> Could you walk up the road to the market? I'll be there in two minutes.<br>
            <strong>Man:</strong> Sure. See you soon.</p>

            <strong>Woman:</strong> I'd like some information about doing sport here.<br>
            <strong>Man:</strong> Our tennis classes on Wednesday evenings are very popular.<br>
            <strong>Woman:</strong> Oh, that's no good, I work late on Wednesdays.<br>
            <strong>Man:</strong> What about swimming? The pool's open every day. We also have a new diving club on Friday evenings.<br>
            <strong>Woman:</strong> Oh, that sounds good. <span class="highlightable" data-q="4">I like swimming, but I'd like to try something new.</span></p>
